<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="ring-dynasty-encoding-sentinel" content="한글보호">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RING DYNASTY - STEP 4</title>
  <style>
    :root {
      --ui-scale: 1;
      --bg: #050b12;
      --bg-deep: #08111b;
      --surface: rgba(9, 18, 30, 0.86);
      --surface-strong: rgba(10, 22, 37, 0.94);
      --card: rgba(13, 28, 45, 0.94);
      --card-strong: rgba(18, 36, 57, 0.98);
      --card-soft: rgba(255, 255, 255, 0.045);
      --accent: #ff623f;
      --accent-soft: rgba(255, 98, 63, 0.18);
      --accent-warm: #ffb85c;
      --accent-cool: #5fcfff;
      --gold: #ffd166;
      --fame: #ff9f43;
      --ticket: #77c6ff;
      --text: #f8f1e8;
      --muted: #97a8ba;
      --muted-strong: #bac6d2;
      --border: rgba(248, 241, 232, 0.1);
      --border-strong: rgba(248, 241, 232, 0.16);
      --shadow: 0 32px 84px rgba(0, 0, 0, 0.4);
      --shadow-lift: 0 18px 48px rgba(0, 0, 0, 0.28);
      --success: #40d58a;
      --danger: #ff7b72;
      --info: #5ec4ff;
      --warning: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 14% 16%, rgba(255, 98, 63, 0.24), transparent 0 24%),
        radial-gradient(circle at 86% 10%, rgba(95, 207, 255, 0.16), transparent 0 18%),
        radial-gradient(circle at 50% 34%, rgba(255, 184, 92, 0.06), transparent 0 30%),
        linear-gradient(180deg, #09131f 0%, #060d16 42%, #03070d 100%);
      color: var(--text);
      font-family: "Bahnschrift", "Segoe UI", "Noto Sans KR", sans-serif;
      letter-spacing: 0.012em;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.03) 0, rgba(255, 255, 255, 0.03) 1px, transparent 1px, transparent 44px),
        linear-gradient(25deg, rgba(255, 255, 255, 0.022) 0, rgba(255, 255, 255, 0.022) 1px, transparent 1px, transparent 58px),
        radial-gradient(circle at center, rgba(255, 255, 255, 0.06), transparent 62%);
      opacity: 0.24;
    }

    body::after {
      background: radial-gradient(circle at center, transparent 52%, rgba(0, 0, 0, 0.38) 100%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: none;
      background: none;
      color: inherit;
      transition: filter 0.2s ease, transform 0.2s ease, background-color 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      filter: brightness(1.2);
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: none;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      max-width: 1600px;
      margin: 0 auto;
      padding: 18px 18px 36px;
      transform-origin: top center;
      zoom: var(--ui-scale);
    }

    .app-shell::before {
      content: "";
      position: absolute;
      inset: 10px 10px auto;
      height: 280px;
      border-radius: 36px;
      background:
        linear-gradient(135deg, rgba(255, 98, 63, 0.12), transparent 44%),
        linear-gradient(315deg, rgba(95, 207, 255, 0.08), transparent 34%);
      filter: blur(20px);
      opacity: 0.8;
      pointer-events: none;
      z-index: -1;
    }

    .header {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.24fr) minmax(300px, 0.88fr);
      gap: 18px;
      align-items: stretch;
      margin-bottom: 16px;
      padding: 22px 24px;
      border-radius: 32px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.012) 46%, rgba(255, 184, 92, 0.03) 100%),
        linear-gradient(180deg, rgba(8, 18, 29, 0.96), rgba(7, 15, 24, 0.94));
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      isolation: isolate;
      animation: riseIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .header::before,
    .header::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .header::before {
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(95, 207, 255, 0.13), transparent 24%),
        radial-gradient(circle at left center, rgba(255, 98, 63, 0.14), transparent 28%);
      z-index: -2;
    }

    .header::after {
      inset: 18px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      z-index: -1;
    }

    .brand-stack {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-kicker,
    .status-caption,
    .panel-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(247, 241, 227, 0.56);
    }

    .logo {
      font-family: "Impact", "Haettenschweiler", "Arial Narrow Bold", "Bahnschrift", sans-serif;
      font-size: clamp(42px, 6vw, 72px);
      line-height: 0.92;
      font-weight: 900;
      color: #fff3de;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      text-shadow:
        0 12px 34px rgba(255, 98, 63, 0.24),
        0 0 28px rgba(255, 184, 92, 0.12);
    }

    .brand-copy {
      margin: 0;
      max-width: 760px;
      color: var(--muted-strong);
      font-size: 15px;
      line-height: 1.82;
    }

    .brand-signal-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .signal-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e7edf5;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .signal-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.38);
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.24);
    }

    .signal-pill.accent {
      background: linear-gradient(135deg, rgba(255, 98, 63, 0.18), rgba(255, 184, 92, 0.08));
      border-color: rgba(255, 98, 63, 0.24);
      color: #fff5e7;
    }

    .signal-pill.accent::before {
      background: var(--accent);
      box-shadow: 0 0 16px rgba(255, 98, 63, 0.5);
    }

    .brand-meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      max-width: 860px;
    }

    .brand-meta-card {
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.025));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .brand-meta-label {
      margin-bottom: 8px;
      color: rgba(247, 241, 227, 0.52);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand-meta-value {
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
    }

    .header-status {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
      justify-content: center;
    }

    .status-heading-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-stack {
      padding: 20px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.02)),
        rgba(9, 21, 34, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow-lift);
    }

    .stage-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 56px;
      padding: 16px 20px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(255, 98, 63, 0.18), rgba(255, 184, 92, 0.08) 48%, rgba(95, 207, 255, 0.1)),
        rgba(11, 26, 43, 0.94);
      border: 1px solid rgba(255, 184, 92, 0.24);
      font-size: 15px;
      font-weight: 800;
      color: #fff4df;
      text-align: center;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .status-note {
      margin: 14px 0 12px;
      color: var(--muted-strong);
      font-size: 13px;
      line-height: 1.72;
    }

    .status-rail {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .status-rail-fill {
      width: 68%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-warm) 52%, var(--accent-cool) 100%);
      box-shadow: 0 0 24px rgba(255, 98, 63, 0.2);
    }

    .status-mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .status-mini-card {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .status-mini-label {
      margin-bottom: 8px;
      color: rgba(247, 241, 227, 0.52);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .status-mini-value {
      color: #fff4dd;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.4;
    }

    .resource-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .resource-card {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.018)),
        var(--card-strong);
      border-radius: 18px;
      padding: 13px 14px 12px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: var(--shadow);
      min-height: 104px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
      isolation: isolate;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      animation: riseIn 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .resource-card:nth-child(1) { animation-delay: 0.06s; }
    .resource-card:nth-child(2) { animation-delay: 0.12s; }
    .resource-card:nth-child(3) { animation-delay: 0.18s; }

    .resource-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.12), transparent 30%);
      opacity: 0.45;
      pointer-events: none;
      z-index: -1;
    }

    .resource-card::after {
      content: "";
      position: absolute;
      inset: auto 18px 0 18px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0), currentColor 36%, rgba(255, 255, 255, 0));
      opacity: 0.6;
    }

    .resource-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: 0 24px 56px rgba(0, 0, 0, 0.34);
    }

    .resource-card.gold-card {
      color: var(--gold);
    }

    .resource-card.fame-card {
      color: var(--fame);
    }

    .resource-card.ticket-card {
      color: var(--ticket);
    }

    .resource-card-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
      margin-bottom: 10px;
    }

    .resource-icon {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff7ea;
      font-size: 14px;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .resource-icon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.28));
      pointer-events: none;
      user-select: none;
    }

    .resource-card-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .resource-trend {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(247, 241, 227, 0.6);
    }

    .resource-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ui-inline-icon {
      width: 18px;
      height: 18px;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.28));
      pointer-events: none;
      user-select: none;
    }

    .ui-inline-icon.lg {
      width: 28px;
      height: 28px;
    }

    .button-inline-label,
    .button-inline-cost,
    .ticket-count-label,
    .ticket-count-number,
    .section-heading-title,
    .fragment-name-row,
    .fragment-summary-row,
    .pity-label-main {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .button-inline-label,
    .button-inline-cost {
      justify-content: center;
    }

    .resource-value {
      font-size: clamp(24px, 2vw, 32px);
      font-weight: 900;
      letter-spacing: 0.03em;
      transform-origin: center bottom;
      display: inline-block;
      line-height: 1;
    }

    .resource-value.gold {
      color: var(--gold);
    }

    .resource-value.fame {
      color: var(--fame);
    }

    .resource-value.tickets {
      color: var(--ticket);
    }

    .resource-value.pop,
    .number-pop.pop {
      animation: popValue 0.3s ease;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
      align-items: stretch;
    }

    .panel {
      position: relative;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.018)),
        var(--surface);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: var(--shadow);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
      backdrop-filter: blur(18px);
      overflow: hidden;
      animation: riseIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0));
      opacity: 0.9;
      pointer-events: none;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      border-bottom: 1px solid rgba(247, 241, 227, 0.08);
      padding-bottom: 16px;
    }

    .panel-title {
      margin: 6px 0 0;
      font-size: 20px;
      line-height: 1.1;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .panel-subtitle {
      margin: 8px 0 0;
      color: var(--muted-strong);
      font-size: 12px;
      line-height: 1.55;
      max-width: 680px;
    }

    .main-panel-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .main-info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .info-chip {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.025));
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 10px 12px;
      min-height: 72px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .info-chip::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, rgba(255, 91, 61, 0.8), rgba(255, 209, 102, 0.24));
      opacity: 0.72;
    }

    .info-chip-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .info-chip-value {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.15;
    }

    .main-dynamic-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      isolation: isolate;
    }
    .placeholder-box {
      flex: 1;
      min-height: 320px;
      border: 1px dashed rgba(247, 241, 227, 0.18);
      border-radius: 24px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      padding: 28px;
      line-height: 1.8;
    }

    .side-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .embedded-side-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid rgba(247, 241, 227, 0.08);
    }

    .embedded-side-header {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .embedded-side-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      color: var(--text);
    }

    .side-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.025));
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .side-card-title {
      font-size: 13px;
      font-weight: 800;
    }

    .side-card-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .tab-bar {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015)),
        rgba(7, 20, 32, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      animation: riseIn 0.92s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .tab-button {
      padding: 10px 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      letter-spacing: 0.03em;
      transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease;
    }

    .tab-button[hidden],
    .tab-button.tab-button-hidden {
      display: none !important;
    }

    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 10px;
      line-height: 1.1;
      pointer-events: none;
    }

    .nav-tab-icon {
      font-size: 14px;
      line-height: 1;
    }

    .nav-tab-label {
      text-align: center;
      white-space: nowrap;
    }

    .tab-button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .tab-button.active {
      background: linear-gradient(135deg, rgba(255, 98, 63, 0.24), rgba(255, 184, 92, 0.08) 46%, rgba(95, 207, 255, 0.08));
      color: #fff4e6;
      border-color: rgba(255, 98, 63, 0.32);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .tab-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      background: #e74c3c;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.14);
    }

    .tab-badge.hidden {
      display: none;
    }

    .roster-topline {
      display: flex;
      justify-content: space-between;

    function getLocalDateKey(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getWeeklyResetKey(date = new Date()) {
      const copy = new Date(date);
      const day = copy.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      copy.setDate(copy.getDate() + diff);
      copy.setHours(0, 0, 0, 0);
      return getLocalDateKey(copy);
    }

    function getNextDailyRefreshTimestamp(now = new Date()) {
      const next = new Date(now);
      next.setHours(24, 0, 0, 0);
      return next.getTime();
    }

      const legend = wrestlerPool.find((wrestler) => wrestler.grade === "LEGEND");

      const fallback = wrestlerPool.find((wrestler) => wrestler.grade === "S");
      return fallback ? fallback.id : wrestlerPool[0]?.id || "";
    }

        label: definition.label,
        metric: definition.metric,
        target: definition.target,
        reward: structuredClone(definition.reward),
        baseline: getCurrentWeekMetric(definition.metric),
        claimed: false

    function getWeeklyMissionProgress(definition, stageIndex) {
      const stage = definition.stages[stageIndex];
      return getCurrentWeekMetric(stage.metric || definition.metric);
    }

    function isWeeklyMissionStageComplete(definition, stageIndex) {
      const stage = definition.stages[stageIndex];
      return getWeeklyMissionProgress(definition, stageIndex) >= stage.target;
    }

    function getDailyQuestRefreshKey(lastRefresh) {
      return lastRefresh ? getLocalDateKey(new Date(lastRefresh)) : "";
    }

    function getWeeklyMissionRefreshKey(lastRefresh) {
      return lastRefresh ? getWeeklyResetKey(new Date(lastRefresh)) : "";
    }

    function refreshDailyQuests(force = false) {
      const now = new Date();
      const currentKey = getLocalDateKey(now);
      if (!force && getDailyQuestRefreshKey(gameState.dailyQuests.lastRefresh) === currentKey && gameState.dailyQuests.quests.length === 3) {
        return false;
      }

      const pool = DAILY_QUEST_POOL.slice().sort(() => Math.random() - 0.5).slice(0, 3);
      if (getWeeksUntilNextPpv() === 1) {
        pool[0] = {
          id: "ppv_training_push",
          difficulty: "medium",
          label: "PPV 전 최종 훈련: 선수 스탯을 70 이상으로 올려라",
          metric: "matchesPlayed",
          target: 1,
          reward: { type: "tickets", amount: 2, label: "뽑기권 +2" }
        };
      }
      gameState.dailyQuests = {
        lastRefresh: now.getTime(),
        quests: pool.map((definition) => buildDailyQuestInstance(definition))
      };
      return true;
    }

    function refreshWeeklyMissions(force = false) {
      const now = new Date();
      const currentKey = getWeeklyResetKey(now);
      if (!force && getWeeklyMissionRefreshKey(gameState.weeklyMissions.lastRefresh) === currentKey && gameState.weeklyMissions.missions.length === WEEKLY_MISSION_DEFS.length) {
        return false;
      }

      gameState.weeklyMissions = {
        lastRefresh: now.getTime(),
        missions: buildWeeklyMissionState()
      };
      gameState.currentWeekStats = createDefaultWeeklyStats();
      return true;
    }

    function sanitizeDailyQuests(rawDailyQuests) {
      const source = rawDailyQuests && typeof rawDailyQuests === "object" ? rawDailyQuests : {};
      return {
        lastRefresh: Number.isFinite(source.lastRefresh) ? source.lastRefresh : 0,
        quests: Array.isArray(source.quests)
          ? source.quests
              .map((quest) => {
                const template = getDailyQuestTemplateById(quest?.templateId);
                if (!template) {
                  return null;
                }
                return {
                  id: typeof quest?.id === "string" ? quest.id : `${template.id}_restored`,
                  templateId: template.id,
                  difficulty: template.difficulty,
                  label: template.label,
                  metric: template.metric,
                  target: template.target,
                  reward: structuredClone(template.reward),
                  baseline: Number.isFinite(quest?.baseline) ? Math.max(0, Math.floor(quest.baseline)) : 0,
                  claimed: Boolean(quest?.claimed)
                };
              })
              .filter(Boolean)
              .slice(0, 3)
          : []
      };
    }

    function sanitizeWeeklyStats(rawWeeklyStats) {
      const defaults = createDefaultWeeklyStats();
      const safe = { ...defaults };
      Object.keys(defaults).forEach((key) => {
        safe[key] = Number.isFinite(rawWeeklyStats?.[key]) ? Math.max(0, Math.floor(rawWeeklyStats[key])) : defaults[key];
      });
      return safe;
    }

    function sanitizeWeeklyMissions(rawWeeklyMissions) {
      const source = rawWeeklyMissions && typeof rawWeeklyMissions === "object" ? rawWeeklyMissions : {};
      const missions = buildWeeklyMissionState();
      missions.forEach((mission) => {
        const rawMission = Array.isArray(source.missions) ? source.missions.find((item) => item?.id === mission.id) : null;
        if (rawMission && Array.isArray(rawMission.claimedStages)) {
          mission.claimedStages = mission.claimedStages.map((_, index) => Boolean(rawMission.claimedStages[index]));
        }
      });
      return {
        lastRefresh: Number.isFinite(source.lastRefresh) ? source.lastRefresh : 0,
        missions
      };
    }

    function getClaimableMissionCount() {
      const dailyCount = gameState.dailyQuests.quests.filter((quest) => !quest.claimed && isDailyQuestComplete(quest)).length;
      const weeklyCount = WEEKLY_MISSION_DEFS.reduce((sum, definition) => {
        const state = getWeeklyMissionStateById(definition.id);
        if (!state) {
          return sum;
        }
        return sum + definition.stages.filter((stage, index) => !state.claimedStages[index] && isWeeklyMissionStageComplete(definition, index)).length;
      }, 0);
      return dailyCount + weeklyCount;
    }

    function addWeeklyStat(metric, amount) {
      if (!metric || !Number.isFinite(amount)) {
        return;
      }
      gameState.currentWeekStats[metric] = Math.max(0, Math.floor((gameState.currentWeekStats[metric] || 0) + amount));
    }

    function applyMatchSummaryToWeeklyStats(summary) {
      if (!summary) {
        return;
      }
      addWeeklyStat("matchesPlayed", summary.matchCount);
      addWeeklyStat("matchesWon", summary.leftWins);
      addWeeklyStat("matchesLost", summary.leftLosses);
      addWeeklyStat("goldEarned", summary.totalIncome);
      addWeeklyStat("fameGained", summary.fameGain);
      addWeeklyStat("audienceTotal", summary.totalAudience);

      let totalDamage = 0;
      let totalCrits = 0;
      let finisherWins = 0;
      let finisherUses = 0;
      let closeMatches = 0;
      let lowStaminaComebacks = 0;
      let cGradeMatches = 0;
      let hype70Matches = 0;
      let rivalryMatches = 0;
      let rivalryClimaxes = 0;
      let titleMatches = 0;

      summary.results.forEach((result) => {
        const wrestlerA = findWrestlerById(result.wrestlerAId);
        const wrestlerB = findWrestlerById(result.wrestlerBId);
        totalDamage += (result.battleResult.winnerStats.damageDealt || 0) + (result.battleResult.loserStats.damageDealt || 0);
        totalCrits += result.battleResult.winnerStats.criticalHits || 0;
        if (result.battleResult.finishType === "PINFALL" && result.battleResult.winnerStats.finisherUsed) {
          finisherWins += 1;
        }
        if (result.battleResult.winnerStats.finisherUsed) {
          finisherUses += 1;
        }
        if (result.battleResult.loserStats.finisherUsed) {
          finisherUses += 1;
        }
        if (result.highlightLabel === "박빙 승부") {
          closeMatches += 1;
        }
        if ((result.battleResult.winnerStats.stamina || 100) <= 10) {
          lowStaminaComebacks += 1;
        }
        if ((wrestlerA && wrestlerA.grade === "C") || (wrestlerB && wrestlerB.grade === "C")) {
          cGradeMatches += 1;
        }
        if (result.hypeAfterMatch >= 70) {
          hype70Matches += 1;
        }
        if (result.rivalryBadge) {
          rivalryMatches += 1;
        }
        if (result.rivalryStageLabel === "클라이맥스 경기") {
          rivalryClimaxes += 1;
        }
        if (result.titleOutcome) {
          titleMatches += 1;
        }
      });

      addWeeklyStat("damageDealt", totalDamage);
      addWeeklyStat("criticalHits", totalCrits);
      addWeeklyStat("finisherWins", finisherWins);
      addWeeklyStat("finishersUsed", finisherUses);
      addWeeklyStat("closeMatches", closeMatches);
      addWeeklyStat("lowStaminaComebackWins", lowStaminaComebacks);
      addWeeklyStat("cGradeMatches", cGradeMatches);
      addWeeklyStat("hype70Matches", hype70Matches);
      addWeeklyStat("rivalryMatches", rivalryMatches);
      addWeeklyStat("rivalryClimaxes", rivalryClimaxes);
      addWeeklyStat("titleMatches", titleMatches);
      if (summary.matchCount > 0 && summary.leftLosses === 0) {
        addWeeklyStat("perfectWeeks", 1);
      }
      notifyMissionCompletionIfNeeded();
    }

    function renderTabBadges() {
      tabButtons.forEach((button) => {
        const badge = button.querySelector(".tab-badge");
        if (!badge) {
          return;
        }
        const tabName = button.dataset.tab;
        const shouldShow = tabName === "cards"
          ? gameState.weeklyCard.some((slot) => Boolean(slot.wrestlerAId || slot.wrestlerBId))
          : tabName === "missions"
            ? getClaimableMissionCount() > 0
            : tabName === "shop"
              ? gameState.tickets >= 3
              : false;
        if (shouldShow) {
          badge.textContent = "";
          badge.classList.remove("hidden");
        } else {
          badge.textContent = "";
          badge.classList.add("hidden");
        }
      });
    }

    function notifyMissionCompletionIfNeeded() {
      const claimable = getClaimableMissionCount();
      if (claimable > (window.__lastMissionClaimableCount || 0)) {
        showAchievementToast("✅ 퀘스트 완료! 보상을 수령하세요");
      }
      window.__lastMissionClaimableCount = claimable;
      renderTabBadges();
    }

    function ensureMissionRefreshes() {
      const dailyChanged = refreshDailyQuests(false);
      const weeklyChanged = refreshWeeklyMissions(false);
      if (dailyChanged || weeklyChanged) {
        window.__lastMissionClaimableCount = getClaimableMissionCount();
      }
    }

    function applyMissionReward(reward) {
      if (!reward) {
        return;
      }
      if (reward.type === "tickets" || reward.type === "legendTicket") {
        gameState.tickets += reward.amount || 0;
        return;
      }
      if (reward.type === "gold") {
        gameState.gold += reward.amount || 0;
        return;
      }
      if (reward.type === "fame") {
        gameState.fame += reward.amount || 0;
        return;
      }
      if (reward.type === "combo") {
        gameState.tickets += reward.tickets || 0;
        gameState.gold += reward.gold || 0;
        gameState.fame += reward.fame || 0;
        return;
      }
      if (reward.type === "specialFragments") {
        addFragments(getSpecialFragmentTemplateId(), reward.amount || 0);
      }
    }

    function claimDailyQuest(questId) {
      const quest = gameState.dailyQuests.quests.find((item) => item.id === questId);
      if (!quest || quest.claimed || !isDailyQuestComplete(quest)) {
        return;
      }
      quest.claimed = true;
      applyMissionReward(quest.reward);
      notifyMissionCompletionIfNeeded();
      render();
      saveGameState();
    }

    function claimWeeklyMissionStage(missionId, stageIndex) {
      const definition = WEEKLY_MISSION_DEFS.find((mission) => mission.id === missionId);
      const state = getWeeklyMissionStateById(missionId);
      if (!definition || !state || state.claimedStages[stageIndex] || !isWeeklyMissionStageComplete(definition, stageIndex)) {
        return;
      }
      state.claimedStages[stageIndex] = true;
      applyMissionReward(definition.stages[stageIndex].reward);
      notifyMissionCompletionIfNeeded();
      render();
      saveGameState();
    }

    function getDailyCountdownText() {
      const remaining = Math.max(0, getNextDailyRefreshTimestamp() - Date.now());
      const hours = String(Math.floor(remaining / 3600000)).padStart(2, "0");
      const minutes = String(Math.floor((remaining % 3600000) / 60000)).padStart(2, "0");
      const seconds = String(Math.floor((remaining % 60000) / 1000)).padStart(2, "0");
      return `${hours}:${minutes}:${seconds}`;
    }

    function syncFacilitiesDerived(facilities) {
      const safeFacilities = structuredClone(createDefaultFacilities());
      Object.keys(safeFacilities).forEach((facilityKey) => {
        const target = safeFacilities[facilityKey];
        const rawFacility = facilities?.[facilityKey] || {};
        const levels = FACILITY_LEVELS[facilityKey];
        const levelKeys = Object.keys(levels).map(Number);
        const minLevel = Math.min(...levelKeys);
        const maxLevel = Math.max(...levelKeys);
        const level = clamp(Number.isFinite(rawFacility.level) ? Math.floor(rawFacility.level) : target.level, minLevel, maxLevel);
        Object.assign(target, rawFacility, { level }, levels[level] || {});
      });
      return safeFacilities;
    }

    function hashString(value) {
      let hash = 0;
      for (let index = 0; index < value.length; index += 1) {

      }
      return Math.abs(hash);

        { style: "technician", value: stats.technique },

      ];
      const maxValue = Math.max(...candidates.map((item) => item.value));
      const tied = candidates.filter((item) => item.value === maxValue);
      if (tied.length === 1) {
        return tied[0].style;
      }
      return tied[hashString(seed || JSON.stringify(stats)) % tied.length].style;

      return wrestler.wins / totalMatches;

          return wrestler.contractWeeks || 0;
        case "grade":
          return gradeRank(wrestler.grade);
        default:
          return getWrestlerPower(wrestler);
      }
    }

    function matchesRosterStatusFilter(wrestler, filterKey) {
      if (filterKey === "idle") return wrestler.status === "idle";
      if (filterKey === "training") return wrestler.status === "training";
      if (filterKey === "injured") return wrestler.status === "injured";
      return true;
    }

    function getFilteredRoster() {
      const search = rosterViewState.search.trim().toLowerCase();
      const gradeFilters = rosterViewState.gradeFilters;
      const styleFilters = rosterViewState.styleFilters;
      return gameState.roster.filter((wrestler) => {
        if (gradeFilters.length && !gradeFilters.includes(wrestler.grade)) {
          return false;
        }
        if (!matchesRosterStatusFilter(wrestler, rosterViewState.statusFilter)) {
          return false;
        }
        if (styleFilters.length && !styleFilters.includes(wrestler.style)) {
          return false;
        }
        if (rosterViewState.alignmentFilter !== "all" && (wrestler.alignment || "neutral") !== rosterViewState.alignmentFilter) {
          return false;
        }
        if (rosterViewState.favoritesOnly && !wrestler.isFavorite) {
          return false;
        }
        if (search) {
          const haystack = `${wrestler.name} ${wrestler.nickname}`.toLowerCase();
          if (!haystack.includes(search)) {
            return false;
          }
        }
        return true;
      });
    }

    function getSortedRoster() {
      const roster = getFilteredRoster().slice();
      const sortKey = rosterViewState.sortKey || "power";
      const direction = rosterViewState.sortDirection === "asc" ? 1 : -1;
      return roster.sort((left, right) => {
        const leftValue = getRosterSortValue(left, sortKey);
        const rightValue = getRosterSortValue(right, sortKey);
        if (typeof leftValue === "string" || typeof rightValue === "string") {
          return String(leftValue).localeCompare(String(rightValue), "ko") * direction || (getWrestlerPower(right) - getWrestlerPower(left));
        }
        return ((leftValue > rightValue ? 1 : leftValue < rightValue ? -1 : 0) * direction) || (getWrestlerPower(right) - getWrestlerPower(left));
      });
    }

    function clearInvalidRosterSelections() {
      const validIds = new Set(gameState.roster.map((wrestler) => wrestler.id));
      rosterViewState.selectedIds = rosterViewState.selectedIds.filter((id) => validIds.has(id));
    }

    function getSelectedRosterWrestlers() {
      clearInvalidRosterSelections();
      const selectedSet = new Set(rosterViewState.selectedIds);
      return gameState.roster.filter((wrestler) => selectedSet.has(wrestler.id));
    }

    function getRosterFilterSummaryText(filteredCount) {
      const labels = [];
      if (rosterViewState.gradeFilters.length) labels.push(`${rosterViewState.gradeFilters.join("/")}`);
      if (rosterViewState.statusFilter !== "all") {
        labels.push(rosterViewState.statusFilter === "idle" ? "대기중" : rosterViewState.statusFilter === "training" ? "훈련중" : "부상중");
      }
      if (rosterViewState.styleFilters.length) {
        labels.push(rosterViewState.styleFilters.map((style) => getStyleMeta(style).label).join("/"));
      }
      if (rosterViewState.alignmentFilter !== "all") {
        labels.push(getAlignmentMeta(rosterViewState.alignmentFilter).label);
      }
      if (rosterViewState.favoritesOnly) labels.push("즐겨찾기");
      return `총 ${gameState.roster.length}명 중 ${filteredCount}명 표시 중${labels.length ? ` (${labels.join(", ")})` : ""}`;
    }

    function resetRosterFilters() {
      rosterViewState.gradeFilters = [];
      rosterViewState.statusFilter = "all";
      rosterViewState.styleFilters = [];
      rosterViewState.alignmentFilter = "all";
      rosterViewState.favoritesOnly = false;
      rosterViewState.search = "";
      rosterViewState.sortKey = "power";
      rosterViewState.sortDirection = "desc";
    }

    function pushCareerHistorySnapshot(wrestler, weekValue = gameState.week) {
      if (!wrestler) {
        return;
      }
      wrestler.careerHistory = Array.isArray(wrestler.careerHistory) ? wrestler.careerHistory.slice(-11) : [];
      wrestler.careerHistory.push({
        week: weekValue,
        total: Math.round((wrestler.stats.power + wrestler.stats.stamina + wrestler.stats.technique + wrestler.stats.charisma + wrestler.stats.fame) * 10) / 10
      });
      wrestler.careerHistory = wrestler.careerHistory.slice(-12);
    }

    function buildCareerGraphSvg(wrestler) {
      const history = (wrestler.careerHistory || []).slice(-12);
      if (history.length < 2) {
        return '<div class="gacha-small-text">아직 커리어 데이터가 충분하지 않습니다.</div>';
      }
      const width = 320;
      const height = 120;
      const minValue = Math.min(...history.map((entry) => entry.total));
      const maxValue = Math.max(...history.map((entry) => entry.total));
      const range = Math.max(1, maxValue - minValue);
      const points = history.map((entry, index) => {
        const x = 12 + (index * ((width - 24) / Math.max(1, history.length - 1)));
        const y = height - 12 - (((entry.total - minValue) / range) * (height - 24));
        return `${x},${y}`;
      }).join(" ");
      return `
        <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="width:100%;max-width:320px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;">
          <polyline points="${points}" fill="none" stroke="#f1c40f" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polyline>
        </svg>
      `;
    }

    function getStyleMatchup(leftStyle, rightStyle) {
      if (leftStyle === rightStyle) {
        return 0;
      }
      const winsAgainst = {
        powerhouse: "showman",
        showman: "technician",
        technician: "powerhouse"
      };
      return winsAgainst[leftStyle] === rightStyle ? 1 : -1;
    }

    function getStyleImpactModifier(attackerStyle, defenderStyle) {
      const matchup = getStyleMatchup(attackerStyle, defenderStyle);
      if (matchup > 0) {
        return { matchup, damage: 1.2, accuracy: 8, finisher: 1.15, text: "⚡ 스타일 우세!" };
      }
      if (matchup < 0) {
        return { matchup, damage: 0.85, accuracy: -8, finisher: 1, text: "" };
      }
      return { matchup: 0, damage: 1, accuracy: 0, finisher: 1, text: "" };
    }

    function getStyleBadgeHtml(style) {
      const meta = getStyleMeta(style);
      return `<span class="inline-asset-badge style-badge ${style}" title="${meta.tooltip}">${meta.icon}<span>${meta.label}</span></span>`;
    }

    function getStyleMatchupIndicatorHtml(leftWrestler, rightWrestler) {
      if (!leftWrestler || !rightWrestler) {
        return "";
      }
      const leftMeta = getStyleMeta(leftWrestler.style);
      const rightMeta = getStyleMeta(rightWrestler.style);
      const leftMatchup = getStyleMatchup(leftWrestler.style, rightWrestler.style);
      const rightMatchup = getStyleMatchup(rightWrestler.style, leftWrestler.style);
      const leftIcon = leftMatchup > 0 ? "✅" : leftMatchup < 0 ? "⚠️" : "➖";
      const rightIcon = rightMatchup > 0 ? "✅" : rightMatchup < 0 ? "⚠️" : "➖";
      return `
        <div style="grid-column:1 / -1;color:#bdc3c7;font-size:12px;" title="${leftMeta.tooltip}">
          ${leftMeta.icon} ${leftWrestler.name} ${leftIcon} vs ${rightMeta.icon} ${rightWrestler.name} ${rightIcon}
        </div>
      `;
    }

    function buildStatsForPortrait(baseName, grade, popularity) {
      const [minStat, maxStat] = getGradeStatRange(grade);
      const baseValue = minStat + ((popularity / 100) * (maxStat - minStat));
      const bias = STYLE_BIAS_OVERRIDES[baseName] || { power: 0, stamina: 0, technique: 0, charisma: 0 };
      const hash = hashString(baseName);
      return {
        power: clamp(Math.round(baseValue + bias.power + ((hash % 9) - 4)), minStat, maxStat),
        stamina: clamp(Math.round(baseValue + bias.stamina + (((hash >> 3) % 9) - 4)), minStat, maxStat),
        technique: clamp(Math.round(baseValue + bias.technique + (((hash >> 6) % 9) - 4)), minStat, maxStat),
        charisma: clamp(Math.round(baseValue + bias.charisma + (((hash >> 9) % 9) - 4)), minStat, maxStat),
        fame: clamp(Math.round(popularity + (((hash >> 12) % 7) - 3)), Math.max(minStat, 20), 99)
      };
    }

    function createPoolWrestler(entry) {
      return {
        salary: {
          C: 55,
          B: 90,
          A: 140,
          S: 220,
          LEGEND: 320
        }[entry.grade] || 50,
        passiveHypeBonus: entry.grade === "LEGEND" ? 20 : 0,
        spriteFrames: 1,
        portraitMode: true,
        alignment: entry.alignment || getDefaultAlignmentForGrade(entry.grade, entry.id || entry.name || ""),
        age: Number.isFinite(entry.age) ? entry.age : getDefaultAgeForGrade(entry.grade, entry.id || entry.name || ""),
        potentialStars: Number.isFinite(entry.potentialStars) ? entry.potentialStars : getPotentialStarsForGrade(entry.grade, entry.id || entry.name || ""),
        potentialCapGrade: entry.potentialCapGrade || getPotentialCapGradeFromStars(Number.isFinite(entry.potentialStars) ? entry.potentialStars : getPotentialStarsForGrade(entry.grade, entry.id || entry.name || "")),
        careerHistory: Array.isArray(entry.careerHistory) ? entry.careerHistory : [],
        ...entry
      };
    }

    function getCustomSpriteRegistry() {
      const registry = window.CUSTOM_WRESTLER_SPRITES;
      return registry && typeof registry === "object" ? registry : {};
    }

    function getCustomWrestlerTemplates() {
      return Array.isArray(window.CUSTOM_WRESTLER_TEMPLATES) ? window.CUSTOM_WRESTLER_TEMPLATES : [];
    }

    function getCustomWrestlerLookupKeys(wrestler) {
      return [wrestler?.templateId, wrestler?.id]
        .filter((value, index, list) => typeof value === "string" && value.trim() && list.indexOf(value) === index);
    }

    function getCustomSpriteOverride(wrestler) {
      const registry = getCustomSpriteRegistry();
      const keys = getCustomWrestlerLookupKeys(wrestler);
      for (const key of keys) {
        const override = registry[key];
        if (override && typeof override === "object") {
          return override;
        }
      }
      return null;
    }

    function getResolvedStandSpriteSheet(wrestler) {
      const override = getCustomSpriteOverride(wrestler);
      if (typeof override?.spriteSheet === "string" && override.spriteSheet) {
        return override.spriteSheet;
      }
      return wrestler?.spriteSheet || "";
    }

    function getBasePortraitSpriteSheet(wrestler) {
      const keys = getCustomWrestlerLookupKeys(wrestler);
      for (const key of keys) {
        if (PORTRAIT_FILE_PATH_MAP[key]) {
          return PORTRAIT_FILE_PATH_MAP[key];
        }
      }
      const spriteSheet = typeof wrestler?.spriteSheet === "string" ? wrestler.spriteSheet.trim() : "";
      const normalizedPath = normalizeSpriteAssetPath(spriteSheet);
      if (
        spriteSheet &&
        normalizedPath.includes("data/images/wrestlers/") &&
        !normalizedPath.includes("data/images/wrestlers/custom/")
      ) {
        return spriteSheet;
      }
      return "";
    }

    function getResolvedPortraitSpriteSheet(wrestler) {
      return getBasePortraitSpriteSheet(wrestler) || getResolvedStandSpriteSheet(wrestler);
    }

    function getResolvedSpriteSheet(wrestler) {
      return getResolvedStandSpriteSheet(wrestler);
    }

    function applyCustomSpriteOverrideToWrestler(wrestler) {
      if (!wrestler) {
        return wrestler;
      }
      const override = getCustomSpriteOverride(wrestler);
      if (!override) {
        return wrestler;
      }
      return {
        ...wrestler,
        spriteSheet: typeof override.spriteSheet === "string" && override.spriteSheet ? override.spriteSheet : wrestler.spriteSheet,
        battleSpriteSheet: typeof override.battleSpriteSheet === "string" && override.battleSpriteSheet ? override.battleSpriteSheet : wrestler.battleSpriteSheet,
        spriteFrames: Number.isFinite(override.spriteFrames) ? Math.max(1, Math.floor(override.spriteFrames)) : wrestler.spriteFrames,
        battleSpriteFrames: Number.isFinite(override.battleSpriteFrames) ? Math.max(1, Math.floor(override.battleSpriteFrames)) : wrestler.battleSpriteFrames,
        portraitMode: typeof override.portraitMode === "boolean" ? override.portraitMode : wrestler.portraitMode,
        spriteColor: typeof override.spriteColor === "string" && override.spriteColor ? override.spriteColor : wrestler.spriteColor
      };
    }

    function createCustomTemplateEntry(rawTemplate) {
      if (!rawTemplate || typeof rawTemplate !== "object") {
        return null;
      }
      const templateId = typeof rawTemplate.id === "string" ? rawTemplate.id.trim() : "";
      if (!templateId) {
        return null;
      }
      const popularity = Number.isFinite(rawTemplate.popularity)
        ? clamp(Math.round(rawTemplate.popularity), 20, 99)
        : getPopularityScore(templateId);
      const grade = typeof rawTemplate.grade === "string" && rawTemplate.grade.trim()
        ? rawTemplate.grade.trim().toUpperCase()
        : getGradeFromPopularity(popularity);
      const displayName = typeof rawTemplate.name === "string" && rawTemplate.name.trim()
        ? rawTemplate.name.trim()
        : formatPortraitDisplayName(templateId);
      const defaultStats = buildStatsForPortrait(templateId, grade, popularity);
      const stats = {
        ...defaultStats,
        ...(rawTemplate.stats && typeof rawTemplate.stats === "object" ? rawTemplate.stats : {})
      };
      const entry = {
        id: templateId,
        name: displayName,
        nickname: typeof rawTemplate.nickname === "string" && rawTemplate.nickname.trim()
          ? rawTemplate.nickname.trim()
          : getPortraitNickname(templateId, displayName),
        grade,
        finisher: typeof rawTemplate.finisher === "string" && rawTemplate.finisher.trim()
          ? rawTemplate.finisher.trim()
          : getPortraitFinisher(templateId, displayName),
        spriteColor: typeof rawTemplate.spriteColor === "string" && rawTemplate.spriteColor.trim()
          ? rawTemplate.spriteColor.trim()
          : getDeterministicColor(templateId),
        spriteSheet: typeof rawTemplate.spriteSheet === "string" && rawTemplate.spriteSheet.trim()
          ? rawTemplate.spriteSheet.trim()
          : `data/images/wrestlers/${templateId}.png`,
        battleSpriteSheet: typeof rawTemplate.battleSpriteSheet === "string" && rawTemplate.battleSpriteSheet.trim()
          ? rawTemplate.battleSpriteSheet.trim()
          : null,
        spriteFrames: Number.isFinite(rawTemplate.spriteFrames) ? Math.max(1, Math.floor(rawTemplate.spriteFrames)) : 1,
        portraitMode: typeof rawTemplate.portraitMode === "boolean" ? rawTemplate.portraitMode : true,
        stats,
        style: rawTemplate.style || deriveWrestlerStyle(stats, templateId),
        alignment: rawTemplate.alignment || getDefaultAlignmentForGrade(grade, templateId),
        age: Number.isFinite(rawTemplate.age) ? rawTemplate.age : getDefaultAgeForGrade(grade, templateId),
        potentialStars: Number.isFinite(rawTemplate.potentialStars) ? rawTemplate.potentialStars : getPotentialStarsForGrade(grade, templateId),
        potentialCapGrade: rawTemplate.potentialCapGrade || getPotentialCapGradeFromStars(Number.isFinite(rawTemplate.potentialStars) ? rawTemplate.potentialStars : getPotentialStarsForGrade(grade, templateId))
      };
      if (Number.isFinite(rawTemplate.salary)) {
        entry.salary = Math.max(1, Math.floor(rawTemplate.salary));
      }
      if (Number.isFinite(rawTemplate.passiveHypeBonus)) {
        entry.passiveHypeBonus = Math.floor(rawTemplate.passiveHypeBonus);
      }
      if (Array.isArray(rawTemplate.careerHistory)) {
        entry.careerHistory = rawTemplate.careerHistory.slice(-12);
      }
      return createPoolWrestler(entry);
    }

    function applyCustomWrestlerTemplates() {
      const templates = getCustomWrestlerTemplates();
      if (!templates.length) {
        return;
      }
      templates.forEach((rawTemplate) => {
        const nextTemplate = createCustomTemplateEntry(rawTemplate);
        if (!nextTemplate) {
          return;
        }
        const existingIndex = wrestlerPool.findIndex((wrestler) => wrestler.id === nextTemplate.id);
        if (existingIndex >= 0) {
          wrestlerPool[existingIndex] = applyCustomSpriteOverrideToWrestler({
            ...wrestlerPool[existingIndex],
            ...nextTemplate
          });
          return;
        }
        wrestlerPool.push(applyCustomSpriteOverrideToWrestler(nextTemplate));
      });
    }

    function applyCustomSpriteOverridesToCollection(collection) {
      if (!Array.isArray(collection)) {
        return collection;
      }
      return collection.map((wrestler) => applyCustomSpriteOverrideToWrestler(wrestler));
    }

    function applyCustomSpriteOverridesToState(state) {
      if (!state || typeof state !== "object") {
        return state;
      }
      state.roster = applyCustomSpriteOverridesToCollection(state.roster);
      state.freeAgents = applyCustomSpriteOverridesToCollection(state.freeAgents);
      state.prospects = applyCustomSpriteOverridesToCollection(state.prospects);
      if (state.pendingGachaSession?.results?.length) {
        state.pendingGachaSession = {
          ...state.pendingGachaSession,
          results: state.pendingGachaSession.results.map((result) => ({
            ...result,
            wrestler: applyCustomSpriteOverrideToWrestler(result.wrestler)
          }))
        };
      }
      return state;
    }

    function createRealPoolWrestler(fileName) {
      const baseName = getPortraitBaseName(fileName);
      if (EXCLUDED_PORTRAIT_BASE_NAMES.has(baseName)) {
        return null;
      }
      const displayName = formatPortraitDisplayName(baseName);
      const popularity = getPopularityScore(baseName);
      const grade = getGradeFromPopularity(popularity);
      const stats = buildStatsForPortrait(baseName, grade, popularity);
      return createPoolWrestler({
        id: baseName,
        name: displayName,
        nickname: getPortraitNickname(baseName, displayName),
        grade,
        finisher: getPortraitFinisher(baseName, displayName),
        spriteColor: getDeterministicColor(baseName),
        spriteSheet: `data/images/wrestlers/${fileName}`,
        stats,
        style: deriveWrestlerStyle(stats, baseName)
      });
    }

    const wrestlerPool = PORTRAIT_FILES
      .map((fileName) => createRealPoolWrestler(fileName))
      .filter(Boolean);

    function getCanonicalTemplateMatch(wrestler) {
      const templateId = typeof wrestler?.templateId === "string" && wrestler.templateId.trim()
        ? wrestler.templateId.trim()
        : "";
      if (templateId) {
        const byId = wrestlerPool.find((template) => template.id === templateId);
        if (byId) {
          return byId;
        }
      }
      const normalizedName = typeof wrestler?.name === "string" ? wrestler.name.trim().toLowerCase() : "";
      if (!normalizedName) {
        return null;
      }
      return wrestlerPool.find((template) => String(template.name || "").trim().toLowerCase() === normalizedName) || null;
    }

    function isNonRealCWrestler(wrestler) {
      if (String(wrestler?.grade || "").toUpperCase() !== "C") {
        return false;
      }
      return !getCanonicalTemplateMatch(wrestler);
    }

    function purgeNonRealCWrestlersFromState(state) {
      if (!state || typeof state !== "object") {
        return state;
      }
      const normalizeCollection = (collection) => {
        if (!Array.isArray(collection)) {
          return [];
        }
        return collection
          .filter((wrestler) => !isNonRealCWrestler(wrestler))
          .map((wrestler) => {
            const template = getCanonicalTemplateMatch(wrestler);
            if (!template || wrestler.templateId === template.id) {
              return wrestler;
            }
            return {
              ...wrestler,
              templateId: template.id
            };
          });
      };
      state.roster = normalizeCollection(state.roster);
      state.freeAgents = normalizeCollection(state.freeAgents);
      state.prospects = normalizeCollection(state.prospects);
      return state;
    }

    const LEGACY_EXCLUSIVE_TEMPLATE = createPoolWrestler({

      const resolvedLegacyState = legacyState || createDefaultLegacy();
      const prestigeCount = Number(resolvedLegacyState?.prestigeCount || 0);
      if (prestigeCount >= 3 && !wrestlerPool.some((wrestler) => wrestler.id === LEGACY_EXCLUSIVE_TEMPLATE.id)) {

    // 상태 표시 문자열을 정의한다.

    };

    const GRADE_FRAGMENT_KEYS = ["A", "S", "LEGEND"];

      LEGEND: "레전드 조각"
    };

    function createEmptySideMatch(slotIndex) {

    function createEmptyWeeklySchedule() {
      return {

        },

          createEmptySideMatch(0),

    function createDefaultCircuitProgress() {
      return {
        currentRank: 1,
        defeatedOpponents: [],
        consecutiveWins: 0,
        consecutiveLosses: 0,

        seenOpponentIds: [],
        completed: false,

      };

    function sanitizeWeeklySchedule(rawWeeklySchedule, rawWeeklyCard = []) {
      const defaults = createEmptyWeeklySchedule();
      const mainCardFallback = Array.isArray(rawWeeklyCard) ? rawWeeklyCard.find((slot) => slot?.wrestlerAId || slot?.wrestlerBId) : null;
      const mainMatch = rawWeeklySchedule?.mainMatch && typeof rawWeeklySchedule.mainMatch === "object"
        ? rawWeeklySchedule.mainMatch
        : {};
      const sideMatches = Array.isArray(rawWeeklySchedule?.sideMatches)
        ? rawWeeklySchedule.sideMatches
        : [];

      return {
        mainMatch: {
          wrestlerId: typeof mainMatch.wrestlerId === "string"
            ? mainMatch.wrestlerId
            : (typeof mainCardFallback?.wrestlerAId === "string" ? mainCardFallback.wrestlerAId : null),
          forfeit: Boolean(mainMatch.forfeit)
        },
        sideMatches: defaults.sideMatches.map((baseSlot, index) => {
          const rawSlot = sideMatches[index]
            || (Array.isArray(rawWeeklyCard) ? rawWeeklyCard[index + 1] : null)
            || {};
          return {
            id: baseSlot.id,
            wrestlerAId: typeof rawSlot.wrestlerAId === "string" ? rawSlot.wrestlerAId : null,
            wrestlerBId: typeof rawSlot.wrestlerBId === "string" ? rawSlot.wrestlerBId : null,
            mode: rawSlot.mode === "revenge" ? "revenge" : "free",
            opponentId: typeof rawSlot.opponentId === "string" ? rawSlot.opponentId : ""
          };
        })
      };
    }

    function sanitizeCircuitProgress(rawCircuitProgress) {
      const defaults = createDefaultCircuitProgress();
      const safe = rawCircuitProgress && typeof rawCircuitProgress === "object" ? rawCircuitProgress : {};
      return {
        currentRank: Number.isFinite(safe.currentRank) ? clamp(Math.floor(safe.currentRank), 1, 25) : defaults.currentRank,
        defeatedOpponents: Array.isArray(safe.defeatedOpponents) ? safe.defeatedOpponents.filter((item) => typeof item === "string").slice(0, 25) : [],
        consecutiveWins: Number.isFinite(safe.consecutiveWins) ? Math.max(0, Math.floor(safe.consecutiveWins)) : 0,

        revengeAvailable: Boolean(safe.revengeAvailable),
        seenOpponentIds: Array.isArray(safe.seenOpponentIds) ? safe.seenOpponentIds.filter((item) => typeof item === "string").slice(0, 25) : [],
        completed: Boolean(safe.completed),
        sponsorPenalty: Number.isFinite(safe.sponsorPenalty) ? Math.max(0, Math.floor(safe.sponsorPenalty)) : 0,

      const resolvedLegacyState = legacyState || createDefaultLegacy();

            "akira_tozawa",
            "andre_chase"
          ]
        : ["akira_tozawa", "andre_chase", "brooks_jensen"];
      return starterIds
        .filter(Boolean)
        .map((templateId, index) => createRosterWrestlerFromTemplate(templateId, `w_${String(index + 1).padStart(3, "0")}`))

    };

    function getCurrentGachaRatePercentages() {
      const rateLevel = getLegacyUpgradeLevel("gachaRate");
      const legendBonus = getLegacyUpgradeLevel("legendChance") * 0.5;
      const legendRate = BASE_GACHA_RATE_PERCENT.LEGEND + legendBonus + (rateLevel * 0.2);
      const sRate = BASE_GACHA_RATE_PERCENT.S + (rateLevel * 0.15);
      const aRate = BASE_GACHA_RATE_PERCENT.A + (rateLevel * 0.1);
      const bRate = BASE_GACHA_RATE_PERCENT.B + (rateLevel * 0.05);
      const cRate = Math.max(0, 100 - (legendRate + sRate + aRate + bRate));
      return {
        C: cRate,
        B: bRate,
        A: aRate,
        S: sRate,
        LEGEND: legendRate
      };
    }

    function getBasePityTargets(legacyState = gameState.legacy) {
      const reduce = Number(legacyState?.upgrades?.pityReduce || 0) * 5;
      return {
        pityB: Math.max(5, 10 - reduce),
        pityA: Math.max(20, 50 - reduce),
        pityLegend: Math.max(80, 200 - (reduce * 2))
      };
    }

    function createStateFromLegacy(legacyState) {
      const legacy = structuredClone(legacyState || createDefaultLegacy());
      ensureLegacyExclusiveUnlocked(legacy);
      const baseState = createDefaultState();
      const pityTargets = getBasePityTargets(legacy);
      baseState.legacy = legacy;

        pityB: pityTargets.pityB,

        pityLegend: pityTargets.pityLegend

      return baseState;

    function deriveNextWrestlerSeq(roster) {
      const maxNumber = roster.reduce((maxId, wrestler) => {
        const match = String(wrestler.id || "").match(/(\d+)$/);
        return Math.max(maxId, match ? Number(match[1]) : 0);
      }, 0);
      return Math.max(4, maxNumber + 1);
    }

    function getGradeColor(grade) {

    function getStatusMeta(wrestler) {
      if (wrestler.status === "injured") {

      return STATUS_META[wrestler.status] || STATUS_META.idle;
    }
    // 레슬러 전투력과 승률을 계산한다.
    function getWrestlerPower(wrestler) {
      const total = wrestler.stats.power + wrestler.stats.stamina + wrestler.stats.technique + wrestler.stats.charisma + wrestler.stats.fame;

      if (!gameState.roster.length) {

      const total = gameState.roster.reduce((sum, wrestler) => sum + getWrestlerPower(wrestler), 0);
      return formatAverage(total / gameState.roster.length);

    function getWinRate(wrestler) {
      const totalMatches = wrestler.wins + wrestler.losses;
      if (totalMatches === 0) {

      return `${Math.round((wrestler.wins / totalMatches) * 100)}%`;
