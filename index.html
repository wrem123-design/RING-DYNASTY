    function getDivisionAutoScore(wrestler) {
      const stats = getGmStats(wrestler);
      const seed = hashString(`${gameState.week}:${wrestler.id}:division`);
      const gradeBonus = { C: 0, B: 8, A: 18, S: 30, LEGEND: 36 }[String(wrestler.grade || "").toUpperCase()] || 0;
      return Math.round((getWrestlerPower(wrestler) * 0.48) + (stats.pop * 0.42) + gradeBonus - (getFatiguePercent(wrestler) * 0.25) + ((seed % 7) - 3));
    }

    function isLikelyTagTeamWrestler(wrestler) {
      const name = String(wrestler?.name || wrestler?.templateId || wrestler?.id || "").toLowerCase();
      const archetype = getGmArchetype(wrestler);
      if (archetype === "tagExpert") {
        return true;
      }
      if ((gameState.stables || []).some((stable) => stable.memberIds?.includes(wrestler?.id))) {
        return true;
      }
      return /dawkins|montez|dudley|gallows|anderson|tama|tanga|uso|enzo|cass|cade|london|chase|lorenzo|stacks|briggs|jensen/.test(name);
    }

    function getDivisionAutoAssignmentScore(wrestler, definition) {
      if (!wrestler || !definition) {
        return 0;
      }
      const stats = getGmStats(wrestler);
      const gradeValue = gradeRank(wrestler.grade);
      const ovr = getWrestlerPower(wrestler);
      const fatiguePenalty = getFatiguePercent(wrestler) * 0.22;
      const tagFit = isLikelyTagTeamWrestler(wrestler) ? 1 : 0;
      const base = (ovr * 0.5) + (stats.pop * 0.28) + (gradeValue * 8) - fatiguePenalty;
      if (definition.key === "women") {
        return Math.round(base + (stats.mic * 0.08) + (stats.cha * 0.08));
      }
      if (definition.key === "tag") {
        const stableBonus = (gameState.stables || []).some((stable) => stable.memberIds?.includes(wrestler.id) || stable.leaderId === wrestler.id) ? 16 : 0;
        return Math.round((ovr * 0.34) + (stats.pop * 0.22) + (stats.sta * 0.18) + (stats.cha * 0.12) + (gradeValue * 4) + (tagFit ? 36 : 0) + stableBonus - fatiguePenalty);
      }
      if (definition.key === "world") {
        return Math.round((ovr * 0.58) + (stats.pop * 0.34) + (gradeValue * 13) + (stats.mic * 0.08) - (tagFit ? 34 : 0) - fatiguePenalty);
      }
      if (definition.key === "ic") {
        const midcardSweetSpot = 18 - Math.abs(gradeValue - gradeRank("A")) * 5;
        return Math.round((ovr * 0.48) + (stats.tech * 0.22) + (stats.pop * 0.2) + midcardSweetSpot + (gradeValue * 5) - (tagFit ? 22 : 0) - fatiguePenalty);
      }
      return getDivisionAutoScore(wrestler);
    }

    function findCompatibleDivisionPair(definition, usedIds) {
      const candidates = getAvailableCardRoster()
        .filter((wrestler) => !usedIds.has(wrestler.id) && isWrestlerEligibleForDivision(wrestler, definition))
        .sort((left, right) => getDivisionAutoAssignmentScore(right, definition) - getDivisionAutoAssignmentScore(left, definition));
      for (let leftIndex = 0; leftIndex < candidates.length; leftIndex += 1) {
        for (let rightIndex = leftIndex + 1; rightIndex < candidates.length; rightIndex += 1) {
          if (getBookingMatchRestriction(candidates[leftIndex], candidates[rightIndex]).ok) {
            return [candidates[leftIndex], candidates[rightIndex]];
          }
        }
      }
      return [candidates[0] || null, candidates[1] || null].filter(Boolean);
    }

    function getFirstOpenDivisionTargetForWrestler(wrestler) {
      const booking = ensureDivisionBookingState();
      for (const definition of SHOW_DIVISION_DEFS) {
        if (!isWrestlerEligibleForDivision(wrestler, definition)) {
          continue;
        }
        const division = booking.divisions[definition.key];
        if (!division.contenderId) {
          return { divisionKey: definition.key, role: "member", index: 0 };
        }
        const openLineupIndex = (division.lineupIds || []).findIndex((id) => !id);
        if (openLineupIndex >= 0) {
          return { divisionKey: definition.key, role: "member", index: openLineupIndex + 1 };
        }
      }
      return null;
    }

    function getFirstOpenSlotInDivision(divisionKey) {
      const booking = ensureDivisionBookingState();
      const definition = getDivisionDefinition(divisionKey);
      const division = booking.divisions[definition.key];
      if (!division) {
        return null;
      }
      if (!division.contenderId) {
        return { divisionKey: definition.key, role: "member", index: 0 };
      }
      const openLineupIndex = (division.lineupIds || []).findIndex((id) => !id);
      if (openLineupIndex >= 0) {
        return { divisionKey: definition.key, role: "member", index: openLineupIndex + 1 };
      }
      return null;
    }

    function getRosterPickDivisionTarget(wrestler) {
      const booking = ensureDivisionBookingState();
      const selectedTarget = booking.selectedTarget || null;
      if (selectedTarget) {
        const selectedDefinition = getDivisionDefinition(selectedTarget.divisionKey);
        if (isWrestlerEligibleForDivision(wrestler, selectedDefinition)) {
          return selectedTarget;
        }
        booking.selectedTarget = null;
      }
      return getFirstOpenDivisionTargetForWrestler(wrestler);
    }

    function autoAssignDivisionBooking() {
      gameState.divisionBooking = createDefaultDivisionBooking();
      const booking = ensureDivisionBookingState();
      const usedIds = new Set();
      const assignmentOrder = ["women", "tag", "world", "ic"]
        .map((key) => SHOW_DIVISION_DEFS.find((definition) => definition.key === key))
        .filter(Boolean);
      assignmentOrder.forEach((definition) => {
        const division = booking.divisions[definition.key];
        const pair = findCompatibleDivisionPair(definition, usedIds);
        if (pair[0]) {
          division.contenderId = pair[0].id;
          usedIds.add(pair[0].id);
        }
        if (pair[1]) {
          division.lineupIds[0] = pair[1].id;
          usedIds.add(pair[1].id);
        }
        const lineup = getAvailableCardRoster()
          .filter((wrestler) => !usedIds.has(wrestler.id) && isWrestlerEligibleForDivision(wrestler, definition))
          .sort((left, right) => getDivisionAutoAssignmentScore(right, definition) - getDivisionAutoAssignmentScore(left, definition))
          .slice(0, DIVISION_LINEUP_SLOT_COUNT - 1);
        lineup.forEach((wrestler, index) => {
          division.lineupIds[index + 1] = wrestler.id;
          usedIds.add(wrestler.id);
        });
      });
      renderActiveTab();
    }

    function ensureRdOriginRivalryForSlot(slot, index = 0, reason = "weekly") {
      if (!slot?.wrestlerAId || !slot?.wrestlerBId) {
        return null;
      }
      if (getRivalryBetween(slot.wrestlerAId, slot.wrestlerBId)) {
        return null;
      }
      const left = findWrestlerById(slot.wrestlerAId);
      const right = findWrestlerById(slot.wrestlerBId);
      if (!left || !right) {
        return null;
      }
      const rivalry = createOrUpdateRivalry(left.id, right.id, slot.titleMatch ? "title" : "grudge", index === 0 ? 22 : 16);
      const reasonText = reason === "main"
        ? `${left.name}가 이번 주 메인 스팟을 차지하자 ${right.name}가 공개적으로 끼어들었습니다.`
        : `${left.name}와 ${right.name}가 백스테이지에서 서로의 경기 순서를 두고 충돌했습니다.`;
      addRivalryHistory(rivalry, {
        week: gameState.week,
        segmentType: "opening_promo",
        summary: reasonText,
        participants: [left.id, right.id],
        heatChange: index === 0 ? 8 : 5,
        crowdReaction: clamp(gameState.hype + (index === 0 ? 14 : 8), 0, 100)
      });
      rivalry.nextTrigger = index === 0 ? "메인 이벤트 직전 도발 또는 경기 중 변수가 발생할 수 있습니다." : "언더카드 이후 후속 충돌이 이어질 수 있습니다.";
      rivalry.nextTriggerType = index === 0 ? "interference" : "backstage";
      slot.rdStorySeeded = true;
      slot.rdStoryReason = reasonText;
      createStoryHook({
        type: "origin_followup",
        rivalryKey: getRivalryKey(left.id, right.id),
        targetWeek: gameState.week + 1,
        priority: index === 0 ? 82 : 68,
        title: `${left.name} vs ${right.name} 후속 충돌`,
        description: reasonText,
        suggestedSegmentType: index === 0 ? "opening_promo" : "backstage",
        participants: [left.id, right.id]
      });
      return rivalry;
    }

    function buildDivisionWeeklyCardFromRivalries() {
      ensureWeeklyMissionState();
      const rivalries = getDivisionRivalries().filter((rivalry) => getBookingMatchRestriction(rivalry.champion, rivalry.contender).ok);
      if (!rivalries.length) {
        showDivisionStartBlockedPopup();
        return false;
      }
      const mainRivalry = rivalries.find((rivalry) => rivalry.definition.key === "world") || rivalries[0];
      const sideRivalries = rivalries.filter((rivalry) => rivalry !== mainRivalry).slice(0, 2);
      const ppvInfo = getPpvInfo();
      gameState.weeklyCard = createEmptyWeeklyCard(gameState.week).map((slot) => ({
        ...slot,
        wrestlerAId: null,
        wrestlerBId: null,
        titleMatch: false,
        championshipKey: "",
        matchType: "",
        divisionGenerated: true,
        divisionKey: "",
        segmentType: ""
      }));

      const applyRivalryToSlot = (slot, rivalry, index) => {
        if (!slot || !rivalry) {
          return;
        }
        slot.wrestlerAId = rivalry.champion.id;
        slot.wrestlerBId = rivalry.contender.id;
        slot.divisionGenerated = true;
        slot.divisionKey = rivalry.definition.key;
        slot.segmentType = index === 0 ? "main_event" : "division_match";
        slot.titleMatch = Boolean(rivalry.vacantTitle || (ppvInfo.isPpv && gameState.championships?.[rivalry.definition.titleKey]));
        slot.championshipKey = slot.titleMatch ? rivalry.definition.titleKey : "";
        slot.matchType = rivalry.vacantTitle ? "vacant_title_decider" : index === 0 ? (slot.titleMatch ? "ppv_title_match" : "division_main_event") : "division_rivalry";
      };

      applyRivalryToSlot(gameState.weeklyCard[0], mainRivalry, 0);
      sideRivalries.forEach((rivalry, index) => applyRivalryToSlot(gameState.weeklyCard[index + 1], rivalry, index + 1));
      gameState.divisionBooking.lastGeneratedSegments = getGeneratedShowSegments().map((segment) => ({
        type: segment.type,
        title: segment.title,
        reaction: segment.reaction,
        divisionKey: segment.rivalry?.definition?.key || ""
      }));
      return true;
    }

    function beginDivisionShowFlow() {
      if (!buildDivisionWeeklyCardFromRivalries()) {
        return false;
      }
      const booking = ensureDivisionBookingState();
      let segments = getGeneratedShowSegments();
      if (!segments.length) {
        segments = getFallbackShowSegmentsFromWeeklyCard();
      }
      if (!segments.length) {
        showDivisionStartBlockedPopup(["자동 쇼 세그먼트를 생성할 수 없습니다. 디비전에 선수를 2명 이상 배정하거나 자동 배정을 다시 실행하세요."]);
        return false;
      }
      (segments || []).forEach((segment) => {
        if (segment.fromHookId) {
          const hook = (booking.storyHooks || []).find((item) => item.id === segment.fromHookId);
          if (hook) {
            hook.consumed = true;
          }
        }
      });
      booking.showState = {
        week: gameState.week,
        isPpv: Boolean(getPpvInfo().isPpv),
        showName: getPpvInfo().isPpv ? getPpvInfo().name : "MONDAY NIGHT RAW",
        currentIndex: 0,
        choiceCount: 0,
        gmChoices: [],
        segments
      };
      booking.activePage = "opening";
      window.__divisionRuntimeShowState = booking.showState;
      window.__divisionRuntimeActivePage = "segment";
      window.__divisionShowFlowMode = "home";
      return true;
    }

    function applyGmChoice(choice) {
      const booking = ensureDivisionBookingState();
      const segment = getCurrentShowSegment();
      if (!booking.showState || !segment) {
        return;
      }
      booking.showState.choiceCount = Number(booking.showState.choiceCount || 0) + 1;
      const effect = choice === "security"
        ? { heat: 2, crowd: -2, note: "보안요원 투입" }
        : choice === "announce"
          ? { heat: 4, crowd: 1, note: "징계 예고" }
          : { heat: 5, crowd: 5, note: "혼란 방치" };
      segment.expectedHeatChange = Number(segment.expectedHeatChange || 0) + effect.heat;
      segment.reaction = clamp(Number(segment.reaction || 0) + effect.crowd, 0, 100);
      booking.showState.gmChoices.push({
        segmentId: segment.id,
        rivalryKey: segment.rivalry ? getRivalryKey(segment.rivalry.champion.id, segment.rivalry.contender.id) : "",
        choice,
        note: effect.note,
        week: gameState.week,
        effects: {
          heatChange: effect.heat,
          crowdReactionChange: effect.crowd,
          nextHookCreated: choice === "announce"
        }
      });
      booking.gmChoiceLog = (booking.gmChoiceLog || []).slice(-20);
      booking.gmChoiceLog.push(booking.showState.gmChoices[booking.showState.gmChoices.length - 1]);
      if (choice === "announce" && segment.rivalry) {
        createStoryHook({
          type: "gm_discipline",
          rivalryKey: getRivalryKey(segment.rivalry.champion.id, segment.rivalry.contender.id),
          priority: 78,
          title: "GM 징계 발표",
          description: `${segment.rivalry.champion.name}와 ${segment.rivalry.contender.name} 대립에 GM이 개입합니다.`,
          suggestedSegmentType: "opening_promo",
          participants: [segment.rivalry.champion.id, segment.rivalry.contender.id]
        });
      }
      showToast(`${effect.note} 선택이 반영되었습니다.`, "info");
      renderActiveTab();
    }

    function applySegmentResultToState(segment, result) {
      if (!segment?.rivalry) {
        return;
      }
      const rivalryKey = getRivalryKey(segment.rivalry.champion.id, segment.rivalry.contender.id);
      if (segment.titleDecider && result.winnerId) {
        const titleKey = segment.rivalry.definition.titleKey;
        if (titleKey) {
          gameState.championships = gameState.championships || createDefaultChampionships();
          if (!gameState.championships[titleKey]) {
            gameState.championships[titleKey] = {
              name: segment.rivalry.definition.title,
              belt: "🏆",
              holderId: null,
              defenseWeek: 0,
              unlocked: true
            };
          }
          gameState.championships[titleKey].holderId = result.winnerId;
          gameState.championships[titleKey].defenseWeek = 0;
          segment.rivalry.division.championId = result.winnerId;
        }
      }
      let rivalry = null;
      if (segment.rivalry?.champion?.id && segment.rivalry?.contender?.id && segment.rivalry?.definition?.key) {
        rivalry = createOrUpdateRivalry(
          segment.rivalry.champion.id,
          segment.rivalry.contender.id,
          segment.rivalry.definition.key === "world" ? "title" : "grudge",
          0
        );
        ensureRivalryExtendedState(rivalry);
        rivalry.matches_fought = Math.max(0, rivalry.matches_fought - 1);
        rivalry.heat = clamp(Number(rivalry.heat || rivalry.intensity || 0), 0, 100);
        rivalry.intensity = rivalry.heat;
        rivalry.level = getRivalryLevelFromHeat(rivalry.heat);
        rivalry.phaseWeek = getRivalryPhaseWeek(rivalry, gameState.week);
        rivalry.lastIncident = result.note || segment.description || rivalry.lastIncident;
        rivalry.nextTrigger = getRivalryNextTriggerByPhase({ ...segment.rivalry, ...rivalry, phaseWeek: getRivalryPhaseWeek(rivalry, gameState.week) }, false);
        if (segment.ppvLock || segment.type === "contract_signing") {
          rivalry.ppvMatchConfirmed = true;
          rivalry.ppvLocked = true;
          rivalry.status = "ppv_locked";
          rivalry.ppvMatchType = "championship";
        }
        adjustRivalryFreshness(rivalry, segment.type);
        addRivalryHistory(rivalry, {
          week: gameState.week,
          showType: getPpvInfo().isPpv ? "PPV" : "RAW",
          segmentType: segment.type,
          summary: result.note || segment.description || segment.title,
          participants: [...(segment.participants || []), ...(segment.interfererId ? [segment.interfererId] : [])],
          resultType: result.finishType || "segment",
          heatChange: Number(result.heatChange || 0),
          crowdReaction: Number(result.crowdReaction || 0),
          winnerId: result.winnerId || "",
          loserId: result.loserId || ""
        });
      }
      if (segment.type === "interference") {
        const target = findWrestlerById(segment.targetId) || segment.rivalry.contender;
        const interferer = findWrestlerById(segment.interfererId) || segment.rivalry.champion;
        createStoryHook({
          type: "revenge_promo",
          rivalryKey,
          priority: 86,
          title: `${target.name} 분노 프로모`,
          description: `${target.name}가 ${interferer.name}의 난입에 대한 보복 발언을 준비합니다.`,
          suggestedSegmentType: "opening_promo",
          participants: [target.id, interferer.id]
        });
      } else if (segment.type === "backstage") {
        createStoryHook({
          type: "security_followup",
          rivalryKey,
          priority: 72,
          title: "백스테이지 충돌 후속",
          description: `${segment.rivalry.champion.name}와 ${segment.rivalry.contender.name}의 충돌 여파가 이어집니다.`,
          suggestedSegmentType: "backstage",
          participants: segment.participants || []
        });
      }
      segment.participants.forEach((wrestlerId) => {
        const wrestler = findWrestlerById(wrestlerId);
        if (!wrestler) {
          return;
        }
        wrestler.condition = clamp((wrestler.condition || 100) - Number(result.fatigue || 0), 0, 100);
        wrestler.morale = clamp((wrestler.morale || 70) + Number(result.morale || 0), 0, 100);
        wrestler.pop = clamp((wrestler.pop || getGmStats(wrestler).pop) + Math.max(0, Math.floor(result.crowdReaction / 25)), 0, 100);
      });
    }

    function resolveShowSegment(segment, index, showState) {
      const heatChange = Number(segment.expectedHeatChange || 0);
      const crowdReaction = clamp(Number(segment.reaction || 50) + ((hashString(`${gameState.week}:${segment.id}`) % 13) - 6), 0, 100);
      const left = findWrestlerById(segment.participants?.[0]);
      const right = findWrestlerById(segment.participants?.[1]);
      const isMatch = ["match", "main_event", "interference"].includes(segment.type);
      const battlePreview = isMatch ? prepareSegmentPresentation(segment) : null;
      const leftScore = left ? getWrestlerPower(left) + ((hashString(`${segment.id}:${left.id}`) % 21) - 10) : 0;
      const rightScore = right ? getWrestlerPower(right) + ((hashString(`${segment.id}:${right.id}`) % 21) - 10) : 0;
      const fallbackWinner = isMatch ? (leftScore >= rightScore ? left : right) : null;
      const winner = isMatch ? (findWrestlerById(battlePreview?.winnerId) || fallbackWinner) : null;
      const loser = isMatch ? (findWrestlerById(battlePreview?.loserId) || (winner?.id === left?.id ? right : left)) : null;
      const finishType = segment.ppvResolution ? "ppv_resolution" : segment.type === "interference" ? "interference" : segment.type === "backstage" ? "no_contest" : segment.type === "contract_signing" ? "contract_signed" : (battlePreview?.finishType || "clean");
      const result = {
        title: segment.title,
        segmentType: segment.type,
        winnerId: winner?.id || "",
        loserId: loser?.id || "",
        finishType,
        crowdReaction,
        heatChange,
        fatigue: segment.type === "backstage" ? 5 : isMatch ? 8 : 2,
        morale: winner ? 3 : 0,
        battleEvents: battlePreview?.events || [],
        interference: battlePreview?.interference || null,
        note: segment.type === "interference"
          ? `${battlePreview?.interference?.interfererName || findWrestlerById(segment.interfererId)?.name || "난입자"}의 개입으로 대립 열기가 크게 상승했습니다.`
          : segment.type === "contract_signing"
            ? `${segment.rivalry?.definition?.title || "PPV"} 계약식 완료 · 결착전 확정`
          : segment.titleDecider && winner
            ? `${winner.name} 새 챔피언 등극`
          : segment.ppvResolution && winner
            ? `${winner.name} PPV 결착전 승리 · 대립 종료`
          : winner
            ? `${winner.name} 승리 · ${finishType === "clean" ? "클린 피니시" : "이벤트 피니시"}`
            : "프로모/충돌 세그먼트 완료"
      };
      applySegmentResultToState(segment, result);
      return result;
    }

    function clearDivisionShowRuntimeState(options = {}) {
      const booking = ensureDivisionBookingState();
      booking.showState = null;
      booking.activePage = options.activePage || "result";
      gameState.divisionBooking = booking;
      window.__divisionRuntimeShowState = null;
      window.__divisionRuntimeActivePage = booking.activePage;
      window.__divisionShowFlowMode = "";
      if (options.clearWeeklyCard) {
        (gameState.weeklyCard || []).forEach((slot) => {
          if (slot?.divisionGenerated) {
            slot.wrestlerAId = "";
            slot.wrestlerBId = "";
            slot.divisionGenerated = false;
            slot.divisionKey = "";
            slot.segmentType = "";
            slot.matchType = "";
          }
        });
      }
    }

    function finalizeDivisionShow() {
      const booking = ensureDivisionBookingState();
      const showState = booking.showState;
      if (!showState?.segments?.length) {
        return;
      }
      const segmentResults = showState.segments.map((segment, index) => resolveShowSegment(segment, index, showState));
      const crowdReaction = Math.round(segmentResults.reduce((sum, result) => sum + result.crowdReaction, 0) / Math.max(1, segmentResults.length));
      const showRating = crowdReaction >= 90 ? "A" : crowdReaction >= 82 ? "B+" : crowdReaction >= 72 ? "B" : crowdReaction >= 62 ? "C+" : "C";
      const fanGain = Math.max(300, Math.round(crowdReaction * (showState.isPpv ? 190 : 115)));
      const incomeGain = Math.max(180, Math.round(crowdReaction * (showState.isPpv ? 18 : 9) * getPromotionGoldIncomeMultiplier()));
      gameState.fame += Math.max(1, Math.round(crowdReaction / 18));
      gameState.gold += incomeGain;
      gameState.hype = clamp(Math.round((gameState.hype * 0.55) + (crowdReaction * 0.45)), 0, 100);
      if (showState.isPpv) {
        finishPpvRivalries(showState.segments, segmentResults);
      }
      const freshnessWarnings = (gameState.rivalries || []).filter((rivalry) => Number(rivalry.freshness || 100) < 35).slice(0, 2);
      const storedHooks = (booking.storyHooks || []).filter((hook) => !hook.consumed && Number(hook.targetWeek || gameState.week + 1) >= gameState.week + 1).slice(0, 4);
      booking.lastShowResult = {
        week: gameState.week,
        showName: showState.showName,
        showRating,
        crowdReaction,
        fanGain,
        incomeGain,
        segmentResults,
        gmChoices: showState.gmChoices || [],
        nextWeekHooks: [...storedHooks.map((hook) => hook.description || hook.title), ...buildNextWeekHooks(showState.segments)].slice(0, 5),
        snsReactions: generateSnsReactions(showState, segmentResults, freshnessWarnings)
      };
      clearDivisionShowRuntimeState({ activePage: "result", clearWeeklyCard: true });
      decayRivalries(segmentResults.map((result) => {
        const segment = showState.segments.find((item) => item.title === result.title);
        return segment?.rivalry ? getRivalryKey(segment.rivalry.champion.id, segment.rivalry.contender.id) : "";
      }).filter(Boolean));
      gameState.week += 1;
      saveGameState();
      renderActiveTab();
    }

    window.finalizeDivisionShow = finalizeDivisionShow;

    function finishPpvRivalries(segments, segmentResults) {
      const booking = ensureDivisionBookingState();
      (segmentResults || []).filter((result) => result.winnerId && result.loserId).forEach((result) => {
        const segment = (segments || []).find((item) => item.title === result.title);
        if (!segment?.rivalry || (!segment.ppvResolution && !segment.titleDecider)) {
          return;
        }
        const key = getRivalryKey(segment.rivalry.champion.id, segment.rivalry.contender.id);
        booking.rivalryCooldowns[key] = gameState.week + 8;
        const rivalry = (gameState.rivalries || []).find((entry) => getRivalryKey(entry.wrestlerAId, entry.wrestlerBId) === key);
        if (rivalry) {
          ensureRivalryExtendedState(rivalry);
          rivalry.status = "cooled_down";
          rivalry.winnerId = result.winnerId;
          rivalry.loserId = result.loserId;
          rivalry.heat = clamp(Number(rivalry.heat || rivalry.intensity || 0), 0, 100);
          rivalry.intensity = rivalry.heat;
          rivalry.freshness = 100;
          rivalry.cooldownUntilWeek = gameState.week + 8;
          rivalry.rematchBlockedUntilWeek = gameState.week + 8;
          addRivalryHistory(rivalry, {
            week: gameState.week,
            showType: "PPV",
            segmentType: "ppv_resolution",
            summary: `${findWrestlerById(result.winnerId)?.name || "승자"}가 PPV에서 대립을 끝냈습니다.`,
            participants: [result.winnerId, result.loserId],
            resultType: "ppv_resolution",
            heatChange: -45,
            crowdReaction: result.crowdReaction,
            winnerId: result.winnerId,
            loserId: result.loserId
          });
        }
        const loser = findWrestlerById(result.loserId);
        const winner = findWrestlerById(result.winnerId);
        if (loser) {
          loser.hiddenDivisionScore = Math.max(0, Number(loser.hiddenDivisionScore || getWrestlerPower(loser)) - 25);
        }
        if (winner) {
          winner.hiddenDivisionScore = Number(winner.hiddenDivisionScore || getWrestlerPower(winner)) + 15;
        }
        createStoryHook({
          type: "next_contender",
          rivalryKey: key,
          priority: 82,
          title: "차기 도전자 발표",
          description: `${segment.rivalry.definition.title}의 새 도전자 구도가 다음 RAW에서 드러납니다.`,
          suggestedSegmentType: "opening_promo",
          participants: [result.winnerId]
        });
      });
      gameState.rivalries = gameState.rivalries.filter((rivalry) => Number(rivalry.heat || rivalry.intensity || 0) > 0);
    }

    function generateSnsReactions(showState, segmentResults, freshnessWarnings = []) {
      const reactions = [];
      if ((segmentResults || []).some((result) => result.finishType === "interference")) {
        reactions.push('"난입 때문에 다음 주 RAW 봐야겠네."');
        reactions.push('"저건 선 넘었지. GM이 뭐라도 해야 함."');
      }
      if (showState?.isPpv) {
        reactions.push('"드디어 끝났다. 다음 도전자는 누구?"');
        reactions.push('"패자는 이제 뒤로 밀려야지."');
      }
      if (freshnessWarnings.length) {
        reactions.push('"또 이 조합이야? 슬슬 새 도전자가 필요함."');
      }
      if (!reactions.length) {
        reactions.push(`"${showState?.segments?.[0]?.titleDecider ? "새 챔피언 결정전" : `${showState?.segments?.[0]?.rivalry?.champion?.name || "디비전"} 대립`}이 제대로 불붙었다."`);
        reactions.push('"프로모와 경기 흐름이 다음 주를 보게 만든다."');
      }
      reactions.push('"PPV에서 결착 나면 무조건 본다."');
      return reactions.slice(0, 4);
    }

    function buildNextWeekHooks(segments) {
      return (segments || []).slice(0, 3).map((segment) => {
        const rivalry = segment.rivalry;
        if (!rivalry) {
          return "GM이 다음 주 쇼 카드 조정을 예고했습니다.";
        }
        if (segment.type === "interference") {
          return `${rivalry.contender.name}의 분노 프로모 후보`;
        }
        if (segment.type === "backstage") {
          return `${rivalry.champion.name} vs ${rivalry.contender.name} 백스테이지 후속 충돌`;
        }
        return `${rivalry.definition.title} 대립 다음 트리거: ${rivalry.nextTrigger}`;
      });
    }

    function advanceDivisionShowSegment() {
      const booking = ensureDivisionBookingState();
      if (!booking.showState?.segments?.length) {
        beginDivisionShowFlow();
        return;
      }
      const segmentStageVisible = Boolean(mainDynamicContentEl.querySelector(".segment-stage"));
      if (booking.activePage === "opening" && !segmentStageVisible) {
        window.__divisionShowFlowMode = "segment";
        window.__divisionRuntimeActivePage = "segment";
        booking.activePage = "segment";
        booking.showState.currentIndex = 0;
        window.__divisionRuntimeShowState = booking.showState;
        renderActiveTab();
        return;
      }
      if (Number(booking.showState.currentIndex || 0) >= booking.showState.segments.length - 1) {
        finalizeDivisionShow();
        return;
      }
      booking.showState.currentIndex = Number(booking.showState.currentIndex || 0) + 1;
      window.__divisionRuntimeShowState = booking.showState;
      window.__divisionRuntimeActivePage = "segment";
      renderActiveTab();
    }

    window.advanceDivisionShowSegment = advanceDivisionShowSegment;

    function startDivisionGeneratedShow() {
      const now = performance.now();
      if (Number(window.__lastDivisionShowStartAt || 0) && now - Number(window.__lastDivisionShowStartAt || 0) < 500) {
        return;
      }
      window.__lastDivisionShowStartAt = now;
      const started = beginDivisionShowFlow();
      if (started) {
        window.__divisionShowFlowMode = "opening";
        queueDivisionShowOpeningRender();
      }
      window.__lastDivisionShowStartResult = started ? "started" : "blocked";
      document.body.dataset.lastDivisionShowStart = window.__lastDivisionShowStartResult;
    }

    window.startDivisionGeneratedShow = startDivisionGeneratedShow;

    function renderDivisionShowOpeningNow() {
      activeTab = "cards";
      const booking = ensureDivisionBookingState();
      if (!booking.showState?.segments?.length) {
        return;
      }
      booking.activePage = "opening";
      renderShowOpeningMainContent();
      attachDivisionBookingEvents();
    }

    function queueDivisionShowOpeningRender() {
      renderDivisionShowOpeningNow();
      window.clearTimeout(window.__divisionShowOpeningTimer);
      window.__divisionShowOpeningTimer = window.setTimeout(() => {
        renderDivisionShowOpeningNow();
      }, 60);
      window.clearTimeout(window.__divisionShowOpeningLateTimer);
      window.__divisionShowOpeningLateTimer = window.setTimeout(() => {
        if (window.__divisionShowFlowMode === "opening") {
          renderDivisionShowOpeningNow();
        }
      }, 300);
    }

    function handleStartShowHash() {
      if (window.location.hash !== "#start-show") {
        return;
      }
      window.history.replaceState(null, "", `${window.location.pathname}${window.location.search}`);
      startDivisionGeneratedShow();
      window.clearTimeout(window.__rdStartShowHashTimer);
      window.__rdStartShowHashTimer = window.setTimeout(() => {
        const booking = ensureDivisionBookingState();
        if (!booking.showState?.segments?.length || activeTab !== "home") {
          startDivisionGeneratedShow();
        }
      }, 180);
    }

    function handleRouteHash() {
      const tabMatch = String(window.location.hash || "").match(/^#tab-([a-z]+)$/);
      if (tabMatch) {
        window.history.replaceState(null, "", `${window.location.pathname}${window.location.search}`);
        switchAppTab(tabMatch[1]);
        return;
      }
      handleStartShowHash();
    }

    function attachDivisionBookingEvents() {
      const booking = ensureDivisionBookingState();
      mainDynamicContentEl.dataset.divisionEventsBound = String(Date.now());
      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="division-page-tab"]')).forEach((button) => {
        button.addEventListener("click", () => {
          booking.activePage = button.dataset.page || "assignment";
          renderActiveTab();
        });
      });

      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="select-division-slot"]')).forEach((button) => {
        button.addEventListener("click", () => {
          booking.selectedTarget = {
            divisionKey: button.dataset.divisionKey,
            role: button.dataset.role,
            index: Number(button.dataset.index)
          };
          showToast("배정할 선수를 선택하세요.", "info");
        });
      });

      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="clear-division-slot"]')).forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          clearDivisionSlot(button.dataset.divisionKey, button.dataset.role, Number(button.dataset.index));
        });
      });

      Array.from(mainDynamicContentEl.querySelectorAll('[data-division-drag-wrestler]')).forEach((card) => {
        card.addEventListener("click", () => {
          if (performance.now() < suppressCardClickUntil) {
            return;
          }
          if (card.dataset.action !== "pick-division-wrestler") {
            return;
          }
          const wrestler = findWrestlerById(card.dataset.wrestlerId);
          const target = getRosterPickDivisionTarget(wrestler);
          if (!target) {
            showToast("열려 있는 디비전 슬롯이 없습니다.", "info");
            return;
          }
          assignWrestlerToDivisionSlot(card.dataset.wrestlerId, target.divisionKey, target.role, Number(target.index));
        });
        card.addEventListener("dragstart", (event) => {
          cardDragWrestlerId = card.dataset.divisionDragWrestler || card.dataset.wrestlerId || "";
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("application/x-ring-wrestler", cardDragWrestlerId);
            event.dataTransfer.setData("text/plain", cardDragWrestlerId);
          }
        });
        card.addEventListener("dragend", () => {
          cardDragWrestlerId = "";
        });
        card.addEventListener("pointerdown", (event) => {
          if (event.button !== 0 || event.target.closest?.(".slot-remove")) {
            return;
          }
          cardPointerDragState = {
            mode: "division",
            pointerId: event.pointerId,
            wrestlerId: card.dataset.divisionDragWrestler || card.dataset.wrestlerId || "",
            startX: event.clientX,
            startY: event.clientY,
            moved: false
          };
        });
      });

      Array.from(mainDynamicContentEl.querySelectorAll(".division-slot.dropzone")).forEach((slot) => {
        slot.addEventListener("dragover", (event) => {
          event.preventDefault();
          slot.classList.add("drop-target");
        });
        slot.addEventListener("dragleave", () => slot.classList.remove("drop-target"));
        slot.addEventListener("drop", (event) => {
          event.preventDefault();
          slot.classList.remove("drop-target");
          const wrestlerId = event.dataTransfer
            ? (event.dataTransfer.getData("application/x-ring-wrestler") || event.dataTransfer.getData("text/plain") || cardDragWrestlerId)
            : cardDragWrestlerId;
          assignWrestlerToDivisionSlot(wrestlerId, slot.dataset.divisionKey, slot.dataset.role, Number(slot.dataset.index));
        });
      });

      Array.from(mainDynamicContentEl.querySelectorAll(".division-card[data-division-key]")).forEach((card) => {
        card.addEventListener("dragover", (event) => {
          event.preventDefault();
        });
        card.addEventListener("drop", (event) => {
          const slot = event.target.closest?.(".division-slot.dropzone[data-division-key]");
          if (slot) {
            return;
          }
          event.preventDefault();
          const wrestlerId = event.dataTransfer
            ? (event.dataTransfer.getData("application/x-ring-wrestler") || event.dataTransfer.getData("text/plain") || cardDragWrestlerId)
            : cardDragWrestlerId;
          const wrestler = findWrestlerById(wrestlerId);
          const definition = getDivisionDefinition(card.dataset.divisionKey);
          if (!wrestler || !isWrestlerEligibleForDivision(wrestler, definition)) {
            showToast("이 디비전에 배정할 수 없는 선수입니다.", "info");
            return;
          }
          const target = getFirstOpenSlotInDivision(definition.key);
          if (!target) {
            showToast("해당 디비전에 빈 슬롯이 없습니다.", "info");
            return;
          }
          assignWrestlerToDivisionSlot(wrestlerId, target.divisionKey, target.role, target.index);
        });
      });

      const resetButton = mainDynamicContentEl.querySelector('[data-action="reset-division-booking"]');
      if (resetButton) {
        resetButton.addEventListener("click", resetDivisionBooking);
      }
      const autoButton = mainDynamicContentEl.querySelector('[data-action="auto-division-booking"]');
      if (autoButton) {
        autoButton.addEventListener("click", autoAssignDivisionBooking);
      }
      const startButton = mainDynamicContentEl.querySelector('[data-action="start-division-show"]');
      if (startButton) {
        startButton.addEventListener("click", (event) => {
          runButtonActionWithLoading(startButton, startDivisionGeneratedShow);
        });
      }
      const generateButton = mainDynamicContentEl.querySelector('[data-action="generate-show-card"]');
      if (generateButton) {
        generateButton.addEventListener("click", () => {
          booking.showState = {
            week: gameState.week,
            isPpv: Boolean(getPpvInfo().isPpv),
            showName: getPpvInfo().isPpv ? getPpvInfo().name : "MONDAY NIGHT RAW",
            currentIndex: 0,
            choiceCount: 0,
            gmChoices: [],
            segments: getGeneratedShowSegments()
          };
          showToast("자동 쇼 카드가 갱신되었습니다.", "info");
          renderActiveTab();
        });
      }
      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="advance-show-segment"]')).forEach((button) => {
        button.addEventListener("click", advanceDivisionShowSegment);
      });
      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="finalize-division-show"]')).forEach((button) => {
        button.addEventListener("click", finalizeDivisionShow);
      });
      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="gm-choice"]')).forEach((button) => {
        button.addEventListener("click", () => applyGmChoice(button.dataset.choice || "chaos"));
      });
    }

    function handleDivisionDelegatedClick(event) {
      if (!mainDynamicContentEl.contains(event.target)) {
        return false;
      }
      const card = event.target.closest?.('[data-action="pick-division-wrestler"][data-wrestler-id]');
      if (!card || performance.now() < suppressCardClickUntil) {
        return false;
      }
      event.preventDefault();
      event.stopPropagation();
      const wrestler = findWrestlerById(card.dataset.wrestlerId);
      const target = getRosterPickDivisionTarget(wrestler);
      if (!target) {
        showToast("열려 있는 디비전 슬롯이 없습니다.", "info");
        return true;
      }
      assignWrestlerToDivisionSlot(card.dataset.wrestlerId, target.divisionKey, target.role, Number(target.index));
      return true;
    }

    function handleDivisionDelegatedDrop(event) {
      if (!mainDynamicContentEl.contains(event.target)) {
        return false;
      }
      const wrestlerId = event.dataTransfer
        ? (event.dataTransfer.getData("application/x-ring-wrestler") || event.dataTransfer.getData("text/plain") || cardDragWrestlerId)
        : cardDragWrestlerId;
      if (!wrestlerId) {
        return false;
      }
      const slot = event.target.closest?.(".division-slot.dropzone[data-division-key]");
      if (slot) {
        event.preventDefault();
        assignWrestlerToDivisionSlot(wrestlerId, slot.dataset.divisionKey, slot.dataset.role, Number(slot.dataset.index));
        return true;
      }
      const divisionCard = event.target.closest?.(".division-card[data-division-key]");
      if (divisionCard) {
        event.preventDefault();
        const target = getFirstOpenSlotInDivision(divisionCard.dataset.divisionKey);
        if (!target) {
          showToast("해당 디비전에 빈 슬롯이 없습니다.", "info");
          return true;
        }
        assignWrestlerToDivisionSlot(wrestlerId, target.divisionKey, target.role, target.index);
        return true;
      }
      return false;
    }

    function getRosterCatalogGradeOrder() {
      return ["LEGEND", "S", "A", "B", "C"];
    }

    function getRosterCatalogOwnedMap() {
      const map = new Map();
      (gameState.roster || []).forEach((wrestler) => {
        [wrestler?.templateId, wrestler?.id]
          .filter(Boolean)
          .forEach((key) => map.set(String(key), wrestler));
      });
      return map;
    }

    function getRosterCatalogEntries() {
      const ownedMap = getRosterCatalogOwnedMap();
      const seen = new Set();
      return (wrestlerPool || [])
        .filter(Boolean)
        .map((template) => {
          const key = String(template.templateId || template.id || template.name || "");
          if (!key || seen.has(key)) {
            return null;
          }
          seen.add(key);
          const owned = ownedMap.get(String(template.id)) || ownedMap.get(String(template.templateId || "")) || null;
          const wrestler = owned || template;
          return {
            template,
            wrestler,
            owned,
            id: key,
            name: wrestler.name || template.name || "Unknown",
            grade: getNormalizedDisplayGrade(wrestler.grade || template.grade || "C"),
            gender: getWrestlerGender(wrestler || template),
            power: getWrestlerPower(wrestler || template)
          };
        })
        .filter(Boolean)
        .sort((left, right) => {
          const genderSort = left.gender === right.gender ? 0 : left.gender === "male" ? -1 : 1;
          if (genderSort) return genderSort;
          const gradeOrder = getRosterCatalogGradeOrder();
          const gradeSort = gradeOrder.indexOf(left.grade) - gradeOrder.indexOf(right.grade);
          if (gradeSort) return gradeSort;
          return right.power - left.power || left.name.localeCompare(right.name);
        });
    }

    function getRosterCatalogStats() {
      const entries = getRosterCatalogEntries();
      const maleEntries = entries.filter((entry) => entry.gender !== "female");
      const femaleEntries = entries.filter((entry) => entry.gender === "female");
      return {
        total: entries.length,
        owned: entries.filter((entry) => entry.owned).length,
        locked: entries.filter((entry) => !entry.owned).length,
        maleTotal: maleEntries.length,
        maleOwned: maleEntries.filter((entry) => entry.owned).length,
        femaleTotal: femaleEntries.length,
        femaleOwned: femaleEntries.filter((entry) => entry.owned).length
      };
    }

    function getCatalogCardHtml(entry) {
      const gradeClass = getGradeCssClass(entry.grade);
      const ownedClass = entry.owned ? "owned" : "locked";
      return `
        <article class="catalog-wrestler-card ${ownedClass} ${gradeClass}" title="${escapeHtml(entry.name)}">
          <div class="catalog-card-portrait" style="${getWrestlerCardPortraitStyle(entry.wrestler, "background-position:center bottom;background-size:contain;")}"></div>
          <div class="catalog-card-info">
            <div class="catalog-card-name">

              <span class="catalog-ovr-chip">${entry.power}</span>
            </div>
          </div>
        </article>
      `;
    }

    function getCatalogGradeSectionHtml(entries, grade) {
      const gradeEntries = entries.filter((entry) => entry.grade === grade);
      if (!gradeEntries.length) {
        return "";
      }
      const ownedCount = gradeEntries.filter((entry) => entry.owned).length;
      return `
        <section class="catalog-grade-section">
          <div class="catalog-grade-header">
            <h4 class="catalog-grade-title">${getGradeBadgeHtml(grade)} ${grade} 등급</h4>
            <div class="catalog-grade-count">${ownedCount}/${gradeEntries.length}</div>
          </div>
          <div class="catalog-card-grid">
            ${gradeEntries.map(getCatalogCardHtml).join("")}
          </div>
        </section>
      `;
    }

    function getCatalogGenderSectionHtml(label, entries) {

      return {
        C: "grade-c",
        B: "grade-b",
        A: "grade-a",
        S: "grade-s",
        LEGEND: "grade-legend"

        C: 25,
        B: 80,

      }[grade] || 0;

    function formatFragmentRewardLabel(grade, amount, reasons = []) {
      const normalizedAmount = Math.max(0, Math.floor(amount || 0));
      if (normalizedAmount <= 0 || !GRADE_FRAGMENT_LABELS[grade]) {
        return "조각 없음";
      }
      return `${GRADE_FRAGMENT_LABELS[grade]} ${normalizedAmount}개${reasons.length ? ` (${reasons.join(", ")})` : ""}`;
    }

    function getFragmentExchangeEntries() {
      return wrestlerPool
        .filter((wrestler) => gradeRank(wrestler.grade) >= gradeRank("A"))
        .slice()
        .sort((left, right) => gradeRank(right.grade) - gradeRank(left.grade) || left.name.localeCompare(right.name));
    }

    function getFacilityDescription(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      if (facilityKey === "gym" || facilityKey === "matRoom" || facilityKey === "prStudio") {
        return `훈련 슬롯 ${facility.slots || 0}개 · 속도 x${(facility.speedBonus || 1).toFixed(2)}`;
      }
      if (facilityKey === "medical") {
        return `부상 회복 x${(facility.healSpeed || 1).toFixed(1)} · 예방 ${(facility.prevention || 0) * 100}%`;
      }
      if (facilityKey === "scoutTeam") {
        return `주당 후보 ${facility.weeklyCandidates || 3}명 · 최고 ${facility.maxGrade || "B"}급`;
      }
      if (facilityKey === "tvStudio") {
        return `주당 TV 보너스 +${formatNumber(facility.tvBonus || 0)}G`;
      }
      if (facilityKey === "rosterOffice") {
        return `선수단 한도 ${facility.rosterLimit || gameState.rosterLimit}명`;
      }
      return "";
    }

    function getFacilityCurrentEffectText(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      if (facilityKey === "prStudio") {
        return `팬 수익 +${Math.round((facility.incomeBonus || 0) * 100)}% · 주당 인기도 +${facility.weeklyFame || 0}`;
      }
      if (facilityKey === "rosterOffice") {
        return `로스터 한도 ${facility.rosterLimit || gameState.rosterLimit}명`;
      }
      return getFacilityDescription(facilityKey);
    }

    function handleGradeFragmentSummon(grade) {
      if (!GRADE_FRAGMENT_KEYS.includes(grade)) {
        return;
      }
      if (gameState.roster.length >= gameState.rosterLimit) {
        openRosterFullModal();
        return;
      }
      const cost = getFragmentCostByGrade(grade);
      if (!spendGradeFragments(grade, cost)) {
        window.alert("조각이 부족합니다.");
        return;
      }
      const pool = wrestlerPool.filter((wrestler) => wrestler.grade === grade);
      const selected = structuredClone(pickRandom(pool));
      if (gameState.roster.some((wrestler) => wrestler.templateId === selected.id)) {
        addFragments(selected.id, getDuplicateFragmentReward(grade));
      } else {
        addRosterMember(createWrestler({
          ...selected,
          id: createWrestlerId("w"),
          templateId: selected.id,
          joinedWeek: gameState.week,
          status: "idle",
          injuryWeeks: 0,
          wins: 0,
          losses: 0
        }));
      }
      render();
      saveGameState();
    }

    function handleGradeFragmentUpgrade(fromGrade) {
      const rule = getGradeFragmentConvertRequirement(fromGrade);
      if (!rule || !spendGradeFragments(fromGrade, rule.cost)) {
        return;
      }
      addGradeFragments(rule.targetGrade, 1);
      render();
      saveGameState();
    }

    function handleTicketPurchase(count) {
      const normalizedCount = count === 10 ? 10 : 1;
      const cost = normalizedCount * 500;
      if (gameState.gold < cost) {
        window.alert("골드가 부족합니다.");
        return;
      }
      gameState.gold -= cost;
      gameState.tickets += normalizedCount;
      render();
      saveGameState();
    }

    function getFragmentRingSvg(percent, color) {
      const normalized = clamp(percent, 0, 100);
      const radius = 30;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference * (1 - (normalized / 100));
      return `
        <svg viewBox="0 0 80 80" aria-hidden="true">
          <circle cx="40" cy="40" r="${radius}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"></circle>
          <circle cx="40" cy="40" r="${radius}" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"></circle>
        </svg>
      `;
    }

    function getFacilityLevelClass(facilityKey, facility) {
      const maxLevel = Math.max(...Object.keys(FACILITY_LEVELS[facilityKey] || {}).map(Number));
      if ((facility.level || 0) >= maxLevel) {
        return "level-max";
      }
      if ((facility.level || 0) <= 0) {
        return "level-0";
      }
      if ((facility.level || 0) >= 2) {
        return "level-2";
      }
      return "level-1";
    }

    function getFacilityUpgradePreviewText(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      const nextLevel = getFacilityNextLevelData(facilityKey);
      if (!facility || !nextLevel) {
        return "최대 레벨에 도달했습니다.";
      }
      if (facilityKey === "gym" || facilityKey === "matRoom" || facilityKey === "prStudio") {
        return `슬롯 ${facility.slots || 0} → ${nextLevel.slots || 0}개 · 속도 x${(facility.speedBonus || 1).toFixed(2)} → x${(nextLevel.speedBonus || 1).toFixed(2)}`;
      }
      if (facilityKey === "medical") {
        return `회복 x${(facility.healSpeed || 1).toFixed(1)} → x${(nextLevel.healSpeed || 1).toFixed(1)} · 예방 ${(facility.prevention || 0) * 100}% → ${(nextLevel.prevention || 0) * 100}%`;
      }
      if (facilityKey === "scoutTeam") {
        return `후보 ${facility.weeklyCandidates || 0} → ${nextLevel.weeklyCandidates || 0}명 · 최고 ${facility.maxGrade || "B"} → ${nextLevel.maxGrade || "B"}급`;
      }
      if (facilityKey === "tvStudio") {
        return `TV 보너스 ${formatNumber(facility.tvBonus || 0)}G → ${formatNumber(nextLevel.tvBonus || 0)}G`;
      }

        return `로스터 ${facility.rosterLimit || gameState.rosterLimit} → ${nextLevel.rosterLimit || gameState.rosterLimit}명`;
      }
      return `${getFacilityCurrentEffectText(facilityKey)} → ${nextLevel.nextText || "업그레이드"}`;

    function handleSpecificFragmentSummon(templateId) {
      const target = getPoolWrestlerByTemplateId(templateId);
      if (!target) {
        return;
      }
      if (gradeRank(target.grade) < gradeRank("A")) {
        window.alert("B/C급 조각 소환은 더 이상 지원하지 않습니다.");
        return;
      }
      const current = Number(gameState.fragments[templateId] || 0);
      if (current < 40) {
        window.alert("선수 조각이 부족합니다.");
        return;
      }
      gameState.fragments[templateId] = current - 40;
      const owned = gameState.roster.find((wrestler) => wrestler.templateId === templateId);
      if (owned) {
        ["power", "stamina", "technique", "charisma", "fame"].forEach((statKey) => {
          owned.stats[statKey] = clamp((owned.stats[statKey] || 0) + 2, 1, getAdjustedStatCap(owned));
        });
      } else {
        if (gameState.roster.length >= gameState.rosterLimit) {
          openRosterFullModal();
          gameState.fragments[templateId] += 40;
          return;
        }
        addRosterMember(createWrestler({
          ...structuredClone(target),
          id: createWrestlerId("w"),
          templateId: target.id,
          joinedWeek: gameState.week,
          status: "idle",
          injuryWeeks: 0,
          wins: 0,
          losses: 0
        }));
      }
      render();
      saveGameState();
    }

    function dismantlePendingSingleGachaResult() {
      if (!pendingGachaRewards?.results?.length || pendingGachaRewards.pullCount !== 1) {
        closeModal(true);
        return;
      }
      const [result] = pendingGachaRewards.results;
      const rewardGold = getInstantDismantleReward(result.grade);
      if (rewardGold > 0) {
        gameState.gold += rewardGold;
      }
      pendingGachaRewards = null;
      clearPendingGachaRosterReleaseSelection();
      syncPendingGachaSessionToState();
      closeModal(true);
      render();
      saveGameState();
    }

      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="summon-grade-fragment"]')).forEach((button) => {
        button.addEventListener("click", () => {
          handleGradeFragmentSummon(button.dataset.grade);
        });
      });
      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="upgrade-grade-fragment"]')).forEach((button) => {
        button.addEventListener("click", () => {
          handleGradeFragmentUpgrade(button.dataset.grade);
        });
      });

      upgradeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          handleFacilityUpgrade(button.dataset.facilityKey);
        });
      });
      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="upgrade-legacy"]')).forEach((button) => {
        button.addEventListener("click", () => {
          handleLegacyUpgrade(button.dataset.upgradeKey);
        });
      });
      const declareLegacyButton = mainDynamicContentEl.querySelector('[data-action="declare-legacy"]');
      if (declareLegacyButton) {
        declareLegacyButton.addEventListener("click", () => {
          openLegacyDeclarationModal();
        });
      }
    }

    function clearPendingGachaRosterReleaseSelection() {
      pendingGachaRosterReleaseSelection = [];
    }

    function getPendingGachaKeptRosterCount(session = pendingGachaRewards) {
      if (!session?.results?.length) {
        return 0;
      }
      return session.results.filter((result) => !result.isDuplicate && !result.convertSelected).length;
    }

    function getPendingGachaRequiredRosterSpace(session = pendingGachaRewards) {
      if (!session?.results?.length) {
        return 0;
      }
      return Math.max(0, gameState.roster.length + getPendingGachaKeptRosterCount(session) - gameState.rosterLimit);
    }

    function canFinalizePendingGachaRewards(session = pendingGachaRewards) {
      return Boolean(session?.results?.length) && getPendingGachaRequiredRosterSpace(session) <= 0;
    }

    function getPendingGachaRewardText(result) {
      if (!result) {
        return "";
      }
      if (result.isDuplicate) {
        return result.fragmentReward > 0
          ? `선수 조각 ${formatNumber(result.fragmentReward)}개`
          : "중복 정리";
      }
      return (result.overflowReward || 0) > 0
        ? `${GRADE_FRAGMENT_LABELS[result.grade]} ${formatNumber(result.overflowReward || 0)}개`
        : "조각 없음 · 정리만";
    }

    function getPendingGachaCapacitySummary(session = pendingGachaRewards) {
      const keepCount = getPendingGachaKeptRosterCount(session);
      const convertCount = session?.results?.filter((result) => !result.isDuplicate && result.convertSelected).length || 0;
      const duplicateCount = session?.results?.filter((result) => result.isDuplicate).length || 0;
      const requiredSpace = getPendingGachaRequiredRosterSpace(session);
      return {
        title: `보유 ${gameState.roster.length}/${gameState.rosterLimit} · 신규 보관 ${keepCount}명`,
        note: requiredSpace > 0
          ? `${requiredSpace}명 더 정리하거나 결과에서 변환을 선택해야 확정됩니다. 중복 ${duplicateCount}장은 자동으로 조각 처리됩니다.`
          : `변환 선택 ${convertCount}장 · 중복 ${duplicateCount}장 자동 조각 처리 후 바로 확정할 수 있습니다.`
      };
    }

    function reopenPendingGachaResultModal() {
      if (!pendingGachaRewards?.results?.length) {
        return;
      }
      openGachaResultModal(pendingGachaRewards.results, pendingGachaRewards.pullCount, { reusePending: true, skipReveal: true });
    }

    function togglePendingGachaResultConversion(index) {
      if (!pendingGachaRewards?.results?.[index] || pendingGachaRewards.results[index].isDuplicate) {
        return;
      }
      pendingGachaRewards.results[index].convertSelected = !pendingGachaRewards.results[index].convertSelected;
      syncPendingGachaSessionToState();
      silentSaveGameState();
    }

    function openPendingGachaConversionModal() {
      if (!pendingGachaRewards?.results?.length) {
        return;
      }
      const selectedCount = pendingGachaRewards.results.filter((result) => !result.isDuplicate && result.convertSelected).length;
      const summary = getPendingGachaCapacitySummary(pendingGachaRewards);
      const cardsHtml = pendingGachaRewards.results.map((result, index) => {
        const selected = !result.isDuplicate && result.convertSelected;
        const statusText = result.isDuplicate ? "중복 자동 조각" : selected ? "변환 선택" : "보관 예정";
        return `
          <button class="gacha-convert-card ${selected ? "selected" : ""} ${result.isDuplicate ? "disabled" : ""}" data-action="toggle-pending-convert" data-result-index="${index}" ${result.isDuplicate ? "disabled" : ""} aria-label="${escapeHtml(result.wrestler.name)} ${statusText}">
            <div class="gacha-card-stage gacha-convert-card-stage">
              <div class="gacha-card-inner flipped ${selected ? "convert-selected" : ""}">
                ${buildGachaCardFrontHtml(result)}
              </div>
            </div>
            <div class="gacha-convert-card-status">${statusText} · ${getPendingGachaRewardText(result)}</div>
          </button>
        `;
      }).join("");
      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">조각변환 선택</h3>
            <p class="modal-subtitle">결과 카드 중 정리할 선수를 고르세요. 중복 카드는 자동으로 조각 처리됩니다.</p>
          </div>
        </div>
        <div class="gacha-convert-toolbar">
          <div class="gacha-manage-summary">
            <div class="gacha-manage-summary-pill">선택 ${selectedCount}장</div>
            <div class="gacha-manage-summary-pill">${summary.title}</div>
          </div>
          <div class="gacha-convert-toolbar-actions">
            <button class="modal-action-button cancel" id="backFromGachaConvertButton">결과로 돌아가기</button>
            <button class="modal-action-button cancel" id="selectLowGradeGachaConvertButton">B 이하 일괄 선택</button>
            <button class="modal-action-button cancel" id="clearGachaConvertSelectionButton">선택 해제</button>
            <button class="modal-action-button confirm" id="finishGachaConvertButton">확인</button>
          </div>
        </div>
        <div class="gacha-convert-grid">${cardsHtml}</div>
        <div class="gacha-capacity-box" style="margin-bottom:16px;">
          <div class="gacha-capacity-title">확정 조건</div>
          <div class="gacha-capacity-note">${summary.note}</div>
        </div>
      `, { locked: true, className: "gacha-management-modal" });
      Array.from(document.querySelectorAll('[data-action="toggle-pending-convert"]')).forEach((button) => {
        button.addEventListener("click", () => {
          togglePendingGachaResultConversion(Number(button.dataset.resultIndex));
          openPendingGachaConversionModal();
        });
      });
      const selectLowGradeButton = document.getElementById("selectLowGradeGachaConvertButton");
      if (selectLowGradeButton) {
        selectLowGradeButton.addEventListener("click", () => {
          pendingGachaRewards.results.forEach((result) => {
            const displayGrade = getNormalizedDisplayGrade(result.wrestler?.grade || result.grade);
            if (!result.isDuplicate && gradeRank(displayGrade) <= gradeRank("B")) {
              result.convertSelected = true;
            }
          });
          syncPendingGachaSessionToState();
          silentSaveGameState();
          openPendingGachaConversionModal();
        });
      }
      const clearButton = document.getElementById("clearGachaConvertSelectionButton");
      if (clearButton) {
        clearButton.addEventListener("click", () => {
          pendingGachaRewards.results.forEach((result) => {
            if (!result.isDuplicate) {
              result.convertSelected = false;
            }
          });
          syncPendingGachaSessionToState();
          silentSaveGameState();
          openPendingGachaConversionModal();
        });
      }
      const finishButton = document.getElementById("finishGachaConvertButton");
      if (finishButton) {
        finishButton.addEventListener("click", reopenPendingGachaResultModal);
      }
      const backButton = document.getElementById("backFromGachaConvertButton");
      if (backButton) {
        backButton.addEventListener("click", reopenPendingGachaResultModal);
      }
    }

    function convertSinglePendingGachaReward() {
      if (!pendingGachaRewards?.results?.length || pendingGachaRewards.pullCount !== 1) {
        openPendingGachaConversionModal();
        return;
      }
      const [result] = pendingGachaRewards.results;
      let rewardText = "조각변환 완료";
      if (result.isDuplicate) {
        if (result.fragmentReward > 0) {
          addFragments(result.templateId, result.fragmentReward);
          rewardText = `선수 조각 +${formatNumber(result.fragmentReward)}`;
        } else {
          rewardText = "중복 카드를 정리했습니다.";
        }
      } else if ((result.overflowReward || 0) > 0) {
        addGradeFragments(result.grade, result.overflowReward || 0);
        rewardText = `${GRADE_FRAGMENT_LABELS[result.grade]} +${formatNumber(result.overflowReward || 0)}`;
      } else {
        rewardText = "조각 없이 결과를 정리했습니다.";
      }
      pendingGachaRewards = null;
      clearPendingGachaRosterReleaseSelection();
      syncPendingGachaSessionToState();
      closeModal(true);
      render();
      saveGameState();
      showToast(rewardText, "info");
    }

    function openGachaRosterCleanupModal() {
      if (!pendingGachaRewards?.results?.length) {
        return;
      }
      const roster = gameState.roster
        .slice()
        .sort((left, right) => gradeRank(left.grade) - gradeRank(right.grade) || getWrestlerPower(left) - getWrestlerPower(right));
      const selectedRoster = roster.filter((wrestler) => pendingGachaRosterReleaseSelection.includes(wrestler.id));
      const summary = summarizeReleaseRewards(selectedRoster);
      const summaryPills = [
        `<div class="gacha-manage-summary-pill">선택 ${selectedRoster.length}명</div>`,
        ...GRADE_FRAGMENT_KEYS
          .filter((grade) => Number(summary.summary?.[grade] || 0) > 0)
          .map((grade) => `<div class="gacha-manage-summary-pill">${GRADE_FRAGMENT_LABELS[grade]} +${formatNumber(summary.summary[grade])}</div>`)
      ].join("");
      const cardsHtml = roster.map((wrestler) => {
        const selected = pendingGachaRosterReleaseSelection.includes(wrestler.id);
        const displayGrade = getNormalizedDisplayGrade(wrestler.grade);
        const gradeClass = getGradeCssClass(displayGrade);
        return `
          <button class="gacha-manage-card ${gradeClass} ${selected ? "selected" : ""}" data-action="toggle-gacha-roster-release" data-wrestler-id="${wrestler.id}">
            <div class="gacha-manage-card-top">
              ${getGradeBadgeHtml(displayGrade)}
              <div class="gacha-manage-meta">PWR ${formatAverage(getWrestlerPower(wrestler))}</div>
            </div>
            <div class="gacha-manage-portrait" style="${getWrestlerVisualStyle(wrestler, "background-position:center 10%;")}"></div>
            <div class="gacha-manage-name">${escapeHtml(wrestler.name)}</div>
            <div class="gacha-manage-meta">계약 ${Math.max(0, wrestler.contractWeeks || 0)}주 · 주급 ${formatNumber(wrestler.salary || 0)}G</div>
            <div class="gacha-manage-reward">${getPendingGachaRewardText({ isDuplicate: false, grade: wrestler.grade, overflowReward: getReleaseFragmentReward(wrestler).amount })}</div>
          </button>
        `;
      }).join("");
      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">보유 선수 정리</h3>
            <p class="modal-subtitle">방출할 선수를 골라 로스터 자리를 비우세요. 정리 후 뽑기 결과로 돌아갑니다.</p>
          </div>
          <button class="modal-close" id="backFromGachaCleanupButton">결과로 돌아가기</button>
        </div>
        <div class="gacha-manage-summary">${summaryPills || '<div class="gacha-manage-summary-pill">선택된 선수가 없습니다.</div>'}</div>
        <div class="gacha-manage-grid">${cardsHtml || '<div class="countdown-box">정리할 보유 선수가 없습니다.</div>'}</div>
        <div class="modal-actions">
          <button class="modal-action-button cancel" id="clearGachaCleanupSelectionButton">선택 해제</button>
          <button class="modal-action-button confirm" id="confirmGachaCleanupButton" ${selectedRoster.length ? "" : "disabled"}>선택 방출</button>
        </div>
      `, { locked: true, className: "gacha-management-modal" });
      Array.from(document.querySelectorAll('[data-action="toggle-gacha-roster-release"]')).forEach((button) => {
        button.addEventListener("click", () => {
          const wrestlerId = button.dataset.wrestlerId || "";
          if (!wrestlerId) {
            return;
          }
          if (pendingGachaRosterReleaseSelection.includes(wrestlerId)) {
            pendingGachaRosterReleaseSelection = pendingGachaRosterReleaseSelection.filter((id) => id !== wrestlerId);
          } else {
            pendingGachaRosterReleaseSelection = pendingGachaRosterReleaseSelection.concat(wrestlerId);
          }
          openGachaRosterCleanupModal();
        });
      });
      const clearButton = document.getElementById("clearGachaCleanupSelectionButton");
      if (clearButton) {
        clearButton.addEventListener("click", () => {
          clearPendingGachaRosterReleaseSelection();
          openGachaRosterCleanupModal();
        });
      }
      const confirmButton = document.getElementById("confirmGachaCleanupButton");
      if (confirmButton) {
        confirmButton.addEventListener("click", () => {
          const selectedIds = pendingGachaRosterReleaseSelection.filter((wrestlerId) => gameState.roster.some((wrestler) => wrestler.id === wrestlerId));
          if (!selectedIds.length) {
            return;
          }
          const shouldRelease = window.confirm(`선택한 ${selectedIds.length}명을 방출할까요?`);
          if (!shouldRelease) {
            return;
          }
          const released = releaseRosterMembers(selectedIds);
          clearPendingGachaRosterReleaseSelection();
          syncPendingGachaSessionToState();
          render();
          saveGameState();
          showToast(`${released.length}명을 정리했습니다.`, "warning");
          reopenPendingGachaResultModal();
        });
      }
      const backButton = document.getElementById("backFromGachaCleanupButton");
      if (backButton) {
        backButton.addEventListener("click", () => {
          clearPendingGachaRosterReleaseSelection();
          reopenPendingGachaResultModal();
        });
      }
    }

    function buildGachaCardFrontHtml(result) {
      const wrestler = result.wrestler;
      const displayGrade = getNormalizedDisplayGrade(wrestler?.grade || result.grade);
      const gradeClass = getGradeCssClass(displayGrade);
      const styleMeta = getStyleMeta(wrestler?.style);
      const styleBadgePath = getStyleBadgePath(wrestler?.style);
      const overall = Math.round(getWrestlerPower(wrestler));
      const statusMark = result.isDuplicate
        ? '<div class="gacha-result-mark duplicate">중복</div>'
        : result.convertSelected
          ? '<div class="gacha-result-mark convert">변환</div>'
          : '<div></div>';
      return `
        <div class="gacha-face front ${gradeClass} ${result.convertSelected ? "convert-selected" : ""}">
          <div class="gacha-card-grade-word">${displayGrade}</div>
          <div class="gacha-card-overall">${overall}</div>

            ${statusMark}

          ${result.supportBonus ? `<div class="gm-support-reward">${escapeHtml(result.supportBonus.icon || "★")} ${escapeHtml(result.supportBonus.name)} +1</div>` : ""}
          <div class="gacha-card-nameplate">
            <div class="gacha-card-name">${escapeHtml(wrestler.name)}</div>
            <div class="gacha-card-subname">${escapeHtml(styleMeta.label)} · ${displayGrade}</div>
          </div>
        </div>
      `;
    }

    function getLockerRoomMood() {
      const roster = gameState.roster || [];
      if (!roster.length) {
        return { happy: 0, uneasy: 0, angry: 0, stable: 100 };
      }
      const angry = roster.filter((wrestler) => Number(wrestler.roleSatisfaction ?? 70) < 35).length;
      const uneasy = roster.filter((wrestler) => Number(wrestler.roleSatisfaction ?? 70) >= 35 && Number(wrestler.roleSatisfaction ?? 70) < 60).length;
      const happy = roster.length - angry - uneasy;
      return {
        happy,
        uneasy,
        angry,
        stable: clamp(Math.round((happy / roster.length) * 100 - angry * 5), 0, 100)
      };
    }

    function renderStablesMainContent() {
      ensureWeeklyMissionState();

        stable.leaderId = leader.id;

    function getPrimaryStable() {
      gameState.stables = sanitizeStables(gameState.stables, gameState.roster);
      if (!gameState.stables.length) {
        gameState.stables = createDefaultStables();
      }
      return gameState.stables[0];
    }

    function addStableMember(wrestlerId, mode = "member") {
      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler) {
        return;
      }
      const stable = getPrimaryStable();
      if (mode === "leader") {
        if (stable.leaderId && stable.leaderId !== wrestlerId && !stable.memberIds.includes(stable.leaderId)) {
          stable.memberIds.unshift(stable.leaderId);
        }
        stable.leaderId = wrestlerId;
        stable.memberIds = stable.memberIds.filter((id) => id !== wrestlerId).slice(0, 5);
        stable.unity = clamp((stable.unity || 0) + 3, 0, 100);
      } else if (!stable.memberIds.includes(wrestlerId) && stable.leaderId !== wrestlerId) {
        stable.memberIds = stable.memberIds.concat(wrestlerId).slice(0, 5);
        stable.unity = clamp((stable.unity || 0) + 2, 0, 100);
      }
      stable.fanBuzz = clamp((stable.fanBuzz || 0) + Math.floor(getGmStats(wrestler).pop / 20), 0, 100);
      stable.eventLog = [`${wrestler.name} 합류`, ...(stable.eventLog || [])].slice(0, 8);
      renderActiveTab();
      saveGameState();
    }

    function removeStableMember(wrestlerId) {
      const stable = getPrimaryStable();
      stable.memberIds = stable.memberIds.filter((id) => id !== wrestlerId);
      if (stable.leaderId === wrestlerId) {
        stable.leaderId = stable.memberIds.shift() || "";
      }
      stable.tension = clamp((stable.tension || 0) + 3, 0, 100);
      renderActiveTab();
      saveGameState();
    }

    function attachStableEditorEvents() {
      const stable = getPrimaryStable();
      const saveButton = mainDynamicContentEl.querySelector('[data-action="save-stable-name"]');
      const nameInput = mainDynamicContentEl.querySelector('[data-action="stable-name-input"]');
      if (saveButton && nameInput) {
        saveButton.addEventListener("click", () => {
          stable.name = String(nameInput.value || "NEW ERA").trim().slice(0, 22) || "NEW ERA";
          stable.eventLog = [`팀 이름 변경: ${stable.name}`, ...(stable.eventLog || [])].slice(0, 8);
          renderActiveTab();
          saveGameState();
        });
      }
      const conceptSelect = mainDynamicContentEl.querySelector('[data-action="stable-concept-select"]');
      if (conceptSelect) {
        conceptSelect.addEventListener("change", () => {
          stable.concept = GM_STABLE_CONCEPTS[conceptSelect.value] ? conceptSelect.value : "underdog";
          stable.unity = clamp((stable.unity || 0) + 4, 0, 100);
          renderActiveTab();
          saveGameState();
        });
      }
      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="remove-stable-member"]')).forEach((button) => {
        button.addEventListener("click", () => removeStableMember(button.dataset.wrestlerId));
      });
      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="stable-drag-card"]')).forEach((card) => {
        card.addEventListener("dragstart", (event) => {
          if (!event.dataTransfer) return;
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", card.dataset.wrestlerId || "");
          card.classList.add("dragging");
        });
        card.addEventListener("dragend", () => card.classList.remove("dragging"));
      });
      Array.from(mainDynamicContentEl.querySelectorAll("[data-stable-drop]")).forEach((dropzone) => {
        dropzone.addEventListener("dragover", (event) => {
          event.preventDefault();
          dropzone.classList.add("drag-over");
        });
        dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-over"));
        dropzone.addEventListener("drop", (event) => {
          event.preventDefault();
          dropzone.classList.remove("drag-over");
          const wrestlerId = event.dataTransfer ? event.dataTransfer.getData("text/plain") : "";
          addStableMember(wrestlerId, dropzone.dataset.stableDrop || "member");
        });
      });
    }
