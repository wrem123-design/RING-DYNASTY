    function collectPendingGachaRewards() {
      if (!pendingGachaRewards || !pendingGachaRewards.results?.length) {
        closeModal(true);
        return;
      }
      const requiredSpace = getPendingGachaRequiredRosterSpace(pendingGachaRewards);
      if (requiredSpace > 0) {
        showToast(`${requiredSpace}명 더 정리하거나 결과를 변환해야 합니다.`, "warning");
        return;
      }
      pendingGachaRewards.results.forEach((result) => {
        if (result.supportBonus?.key) {
          addGmSupportCard(result.supportBonus.key, 1);
        }
        if (result.isDuplicate) {
          if (result.fragmentReward > 0) {
            addFragments(result.templateId, result.fragmentReward);
          }
          return;
        }
        if (result.convertSelected) {
          if ((result.overflowReward || 0) > 0) {
            addGradeFragments(result.grade, result.overflowReward || 0);
          }
          return;
        }
        addRosterMember(result.wrestler);
      });
      pendingGachaRewards = null;
      clearPendingGachaRosterReleaseSelection();
      syncPendingGachaSessionToState();
      closeModal(true);
      render();
      saveGameState();
    }

    function finalizePendingGachaRewardsForSave() {
      syncPendingGachaSessionToState();
    }

    function openGachaResultModal(results, pullCount, options = {}) {
      const reusePending = Boolean(options.reusePending && pendingGachaRewards?.results?.length);
      if (!reusePending) {
        pendingGachaRewards = {
          pullCount: Number.isFinite(pullCount) ? Math.max(1, Math.floor(pullCount)) : Math.max(1, Array.isArray(results) ? results.length : 1),
          revealed: false,
          results: Array.isArray(results)
            ? results.map((result) => ({
                ...result,
                convertSelected: Boolean(result?.convertSelected)
              }))
            : []
        };
        clearPendingGachaRosterReleaseSelection();
      }
      if (!pendingGachaRewards?.results?.length) {
        return;
      }
      if (options.skipReveal) {
        pendingGachaRewards.revealed = true;
      }
      syncPendingGachaSessionToState();
      const session = pendingGachaRewards;
      const single = session.pullCount === 1;
      const highestRank = Math.max(...session.results.map((result) => gradeRank(result.grade)));
      const capacity = getPendingGachaCapacitySummary(session);
      const allRevealed = Boolean(options.skipReveal || session.revealed);
      const canFinalize = allRevealed && canFinalizePendingGachaRewards(session);

      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">${single ? "뽑기 결과" : "10연 뽑기 결과"}</h3>
            <p class="modal-subtitle">결과 카드를 직접 정리하거나 변환한 뒤 확정하세요. 새로고침해도 현재 대기 결과는 유지됩니다.</p>
          </div>
        </div>
        <div class="gacha-modal-shell">
          ${highestRank === 5 ? '<div class="gacha-particle-text legend">LEGEND!!!</div>' : ""}
          <div class="${single ? "gacha-single-wrap" : "gacha-card-grid"}" id="gachaRevealGrid">
            ${session.results.map((result, index) => buildGachaCardHtml(result, index, single, Boolean(options.skipReveal || session.revealed))).join("")}
          </div>
          <div class="gacha-result-footer">
            <div class="gacha-capacity-box">
              <div class="gacha-capacity-title">${capacity.title}</div>
              <div class="gacha-capacity-note">${capacity.note}</div>
            </div>
            <div class="gacha-result-actions">
              <button class="gacha-result-secondary" id="openGachaRosterCleanupButton" ${allRevealed ? "" : "disabled"}>보유 선수 정리</button>
              <button class="gacha-result-secondary" id="openGachaConversionButton" ${allRevealed ? "" : "disabled"}>조각변환</button>
              <button class="gacha-result-primary" id="collectGachaRewardsButton" ${canFinalize ? "" : "disabled"}>${single ? "보관 완료" : "결과 확정"}</button>
            </div>
          </div>
        </div>
      `, { locked: true, className: "gacha-management-modal" });

      Array.from(document.querySelectorAll('[data-action="reveal-gacha-card"]')).forEach((card) => {
        card.addEventListener("click", () => {
          if (card.classList.contains("flipped")) {
            return;
          }
          card.classList.add("flipped");
          const allCards = Array.from(document.querySelectorAll('[data-action="reveal-gacha-card"]'));
          pendingGachaRewards.revealed = allCards.every((item) => item.classList.contains("flipped"));
          if (pendingGachaRewards.revealed) {
            const collectButton = document.getElementById("collectGachaRewardsButton");
            const cleanupButton = document.getElementById("openGachaRosterCleanupButton");
            const convertButton = document.getElementById("openGachaConversionButton");
            if (collectButton) {
              collectButton.disabled = !canFinalizePendingGachaRewards(pendingGachaRewards);
            }
            if (cleanupButton) {
              cleanupButton.disabled = false;
            }
            if (convertButton) {
              convertButton.disabled = false;
            }
          }
          syncPendingGachaSessionToState();
          silentSaveGameState();
        });
      });

      const collectButton = document.getElementById("collectGachaRewardsButton");
      if (collectButton) {
        collectButton.addEventListener("click", collectPendingGachaRewards);
      }
      const cleanupButton = document.getElementById("openGachaRosterCleanupButton");
      if (cleanupButton) {
        cleanupButton.addEventListener("click", openGachaRosterCleanupModal);
      }
      const convertButton = document.getElementById("openGachaConversionButton");
      if (convertButton) {
        convertButton.addEventListener("click", () => {
          if (pendingGachaRewards?.pullCount === 1) {
            convertSinglePendingGachaReward();
          } else {
            openPendingGachaConversionModal();
          }
        });
      }
    }

    function handleGachaPull(count) {
      if (pendingGachaRewards?.results?.length) {
        reopenPendingGachaResultModal();
        return;
      }
      if (gameState.tickets < count) {
        window.alert("뽑기권이 부족합니다.");
        return;
      }

      gameState.tickets -= count;
      const seenTemplateIds = new Set(gameState.roster.map((wrestler) => wrestler.templateId).filter(Boolean));
      const results = Array.from({ length: count }, () => performSingleGachaRoll()).map((result) => {
        const supportBonus = rollGmSupportBonus(result.grade);
        const withBonus = supportBonus
          ? { ...result, supportBonus: { key: supportBonus.key, name: supportBonus.name, type: supportBonus.type, grade: supportBonus.grade, effect: supportBonus.effect, icon: supportBonus.icon } }
          : result;
        if (seenTemplateIds.has(result.templateId)) {
          return { ...withBonus, isDuplicate: true };
        }
        seenTemplateIds.add(result.templateId);
        return withBonus;
      });
      render();
      openGachaResultModal(results, count);
      silentSaveGameState();
    }

    function handleFragmentExchange(templateId) {
      const target = getPoolWrestlerByTemplateId(templateId);
      if (!target) {
        return;
      }
      if (gradeRank(target.grade) < gradeRank("A")) {
        window.alert("B/C급 조각 영입은 지원하지 않습니다.");
        return;
      }
      if (gameState.roster.some((wrestler) => wrestler.templateId === templateId)) {
        window.alert("이미 보유 중인 레슬러입니다.");
        return;
      }
      if (gameState.roster.length >= gameState.rosterLimit) {
        window.alert("로스터가 가득 찼습니다.");
        return;
      }

      const cost = getFragmentCostByGrade(target.grade);
      const current = gameState.fragments[templateId] || 0;
      if (current < cost) {
        window.alert("조각이 부족합니다.");
        return;
      }

      gameState.fragments[templateId] = current - cost;
      addRosterMember(createWrestler({
        ...structuredClone(target),
        id: createWrestlerId("w"),
        templateId: target.id,
        status: "idle",
        injuryWeeks: 0,
        wins: 0,
        losses: 0
      }));
      render();
      saveGameState();
    }

    function handleFacilityUpgrade(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      if (!facility) {
        return;
      }
      const upgradeCost = getFacilityUpgradeCost(facilityKey);
      if (!upgradeCost) {
        return;
      }
      if (gameState.gold < upgradeCost) {
        window.alert("골드가 부족합니다.");
        return;
      }
      gameState.gold -= upgradeCost;
      facility.level += 1;
      gameState.facilities = syncFacilitiesDerived(gameState.facilities);
      if (facilityKey === "rosterOffice") {
        gameState.rosterLimit = getRosterLimitFromState();
      }
      render();
      saveGameState();
    }

    function getRdPromoBlueprint(seed) {
      const promos = [
        { type: "opening_promo", tag: "콜아웃 프로모", title: "정면 도발", line: "{A}: 오늘 밤 도망칠 곳은 없어. {B}, 링 위에서 끝장을 보자." },
        { type: "interview", tag: "인터뷰", title: "백스테이지 인터뷰", line: "{A}: 카메라 똑바로 잡아. {B}, 내 이름을 부른 대가를 오늘 치르게 될 거야." },
        { type: "backstage", tag: "백스테이지 세그먼트", title: "복도 충돌", line: "{B}: 여기까지 따라왔어? 좋아. 말은 끝났고, 다음엔 주먹으로 답해." },
        { type: "contract_signing", tag: "계약식", title: "계약서 위의 선전포고", line: "{A}: 서명은 끝났어. 이제 {B}를 쓰러뜨리는 일만 남았다." },
        { type: "interference", tag: "난입 예고", title: "불길한 음악", line: "{B}: 내 음악이 울리는 순간, {A}의 밤은 끝난다." },
        { type: "callout", tag: "마이크 배틀", title: "관중 앞 설전", line: "{A}: 팬들이 원하는 건 변명 없는 승부야. {B}, 지금 나와." }
      ];
      return promos[Math.abs(hashString(`${gameState.week}:${seed}:promo`)) % promos.length];

    function formatRdSegmentLine(template = "", left = null, right = null) {
      return String(template || "")
        .replaceAll("{A}", left?.name || "상대")
        .replaceAll("{B}", right?.name || "상대");
    }

    function getRdSegmentFaces(segment) {
      const left = findWrestlerById(segment?.participants?.[0]);
      const right = findWrestlerById(segment?.participants?.[1]);
      return { left, right };
    }

    function isRdCalloutSegment(segment) {
      return ["opening_promo", "callout"].includes(String(segment?.type || ""));
    }

    function isRdIncidentChoiceSegment(segment) {
      return ["backstage", "interference", "interview", "contract_signing"].includes(String(segment?.type || ""))
        && !segment?.incidentResolved
        && Array.isArray(segment?.participants)
        && segment.participants.filter(Boolean).length >= 2;
    }

    function getRdCalloutActors(segment) {
      const faces = getRdSegmentFaces(segment);
      return {
        caller: faces.left,
        target: faces.right
      };
    }

    function getRdCalloutRivalry(caller, target, createIfMissing = false) {
      if (!caller || !target) {
        return null;
      }
      return getRivalryBetween(caller.id, target.id) || (createIfMissing ? createOrUpdateRivalry(caller.id, target.id, "grudge", 10) : null);
    }

    function getRdCalloutChoiceHtml(segment) {
      if (!isRdCalloutSegment(segment) || segment.calloutResolved) {
        return "";
      }
      return `
        <div class="rd-callout-choice-row">
          <button class="rd-callout-choice accept" type="button" data-action="rd-callout-choice" data-choice="accept">응한다<span>다음 주 공식 경기 확정</span></button>

        </div>
      `;
    }

    function getRdIncidentChoiceHtml(segment) {
      if (!isRdIncidentChoiceSegment(segment)) {
        return "";
      }
      const directLabel = segment.type === "interference" ? "난입 허용" : "방송에 태운다";
      const instantDisabled = segment.allowInstantMatch === false;
      const instantTitle = instantDisabled ? "이미 진행된 매치업이라 즉석 경기는 잠겨 있습니다." : "";
      return `
        <div class="rd-callout-choice-row incident">
          <button class="rd-callout-choice accept" type="button" data-action="rd-incident-choice" data-choice="broadcast">${directLabel}<span>Hype +8 · 대립 열기 +9</span></button>
          <button class="rd-callout-choice ignore" type="button" data-action="rd-incident-choice" data-choice="security">보안 투입<span>Hype -4 · 대립 열기 -3</span></button>
          <button class="rd-callout-choice ambush" type="button" data-action="rd-incident-choice" data-choice="unsanctioned" ${instantDisabled ? "disabled" : ""} title="${escapeHtml(instantTitle)}">즉석 경기<span>컨디션 -12 · 대립 열기 +14</span></button>
        </div>
      `;
    }

    function getRdMatchMotivationText(context) {
      if (!context?.wrestlerA || !context?.wrestlerB) {
        return "이번 주 쇼의 흐름을 바꿀 수 있는 카드입니다.";
      }
      const rivalry = context.rivalry ? ensureRivalryExtendedState(context.rivalry) : null;
      const lastIncident = rivalry?.lastIncident || rivalry?.history?.[rivalry.history.length - 1]?.summary || "";
      if (lastIncident) {
        return `발단: ${lastIncident}`;
      }
      if (context.championshipKey) {
        return `${context.wrestlerA.name}와 ${context.wrestlerB.name}는 타이틀 전선을 두고 충돌합니다.`;
      }
      if (context.alignmentBonus?.hypeBonus >= 15) {
        return `${context.wrestlerA.name}와 ${context.wrestlerB.name}의 선악 구도가 관중 반응을 끌어올리고 있습니다.`;
      }
      return `${context.wrestlerA.name}와 ${context.wrestlerB.name}가 메인 스팟을 증명하려 합니다.`;
    }

    function createRdWeeklyIncidentSegment(matchContexts = [], options = {}) {
      const context = matchContexts[0] || matchContexts[1] || null;
      if (!context?.wrestlerA || !context?.wrestlerB) {
        return null;
      }
      const booking = ensureDivisionBookingState();
      const seed = Number.isFinite(options.seed) ? options.seed : Math.floor(Math.random() * 1000000000);
      const roll = Math.abs(hashString(`${seed}:${gameState.week}:${context.matchupKey}:rd-incident`)) % 100;
      const rivalryState = context.rivalry ? ensureRivalryExtendedState(context.rivalry) : null;
      const lastRivalryIncidentWeek = Number(rivalryState?.lastIncidentWeek || 0);
      const lastGlobalIncidentWeek = Number(booking.lastIncidentWeek || 0);
      const onCooldown = (lastRivalryIncidentWeek && gameState.week - lastRivalryIncidentWeek < 2)
        || (!context.rivalry && lastGlobalIncidentWeek && gameState.week - lastGlobalIncidentWeek < 1);
      const chance = context.rivalry ? (onCooldown ? 22 : 62) : (onCooldown ? 12 : 36);
      if (roll >= chance) {
        return null;
      }
      const type = roll < 24 ? "backstage" : roll < 48 ? "interference" : roll < 64 ? "interview" : "contract_signing";
      const titleMap = {
        backstage: "복도에서 터진 신경전",
        interference: "불길한 음악",
        interview: "카메라 앞 도발",
        contract_signing: "계약서 위의 선전포고"
      };
      const descMap = {
        backstage: `${context.wrestlerB.name}가 백스테이지에서 ${context.wrestlerA.name}의 길을 막아섭니다. ${getRdMatchMotivationText(context)}`,
        interference: `경기장 조명이 꺼지고 ${context.wrestlerB.name}의 등장을 암시하는 음악이 울립니다. 난입 가능성이 커집니다.`,
        interview: `${context.wrestlerA.name}가 인터뷰 중 ${context.wrestlerB.name}를 공개적으로 자극합니다. ${getRdMatchMotivationText(context)}`,
        contract_signing: `${context.wrestlerA.name}와 ${context.wrestlerB.name}가 링 앞 계약 테이블에서 서로를 노려봅니다.`
      };
      return {
        id: `rd_incident_${type}_${gameState.week}_${Math.abs(hashString(context.matchupKey || "main"))}`,
        type,
        label: "돌발 세그먼트",
        title: titleMap[type],
        description: descMap[type],
        reaction: clamp(gameState.hype + 18 + (roll % 12), 40, 100),
        participants: [context.wrestlerA.id, context.wrestlerB.id].filter(Boolean),
        matchContextIndex: context.matchIndex,
        surpriseIncident: true,
        rivalryKey: context.rivalryKey || getRivalryKey(context.wrestlerA.id, context.wrestlerB.id),
        allowInstantMatch: matchContexts.length > 1 || context.matchIndex !== 0
      };
    }

    function applyRdCalloutChoice(choice = "accept") {
      const booking = ensureDivisionBookingState();
      const showState = booking.showState;
      const segment = getCurrentShowSegment();
      if (!showState?.segments?.length || !isRdCalloutSegment(segment)) {
        return;
      }
      const { caller, target } = getRdCalloutActors(segment);
      if (!caller || !target) {
        advanceDivisionShowSegment();
        return;
      }
      const rivalry = getRdCalloutRivalry(caller, target, choice !== "ignore");
      segment.calloutResolved = choice;
      if (choice === "ignore") {
        if (rivalry) {
          rivalry.status = "cooled_down";
          rivalry.heat = 0;
          rivalry.intensity = 0;
          rivalry.cooldownUntilWeek = gameState.week + 4;
          rivalry.rematchBlockedUntilWeek = gameState.week + 4;
          addRivalryHistory(rivalry, {
            week: gameState.week,
            segmentType: "opening_promo",
            summary: `${target.name}가 ${caller.name}의 콜아웃을 무시하며 대립이 식었습니다.`,
            participants: [caller.id, target.id],
            heatChange: -100,
            crowdReaction: Math.max(25, Number(segment.reaction || 50) - 20)
          });
        }
        segment.description = `${target.name}가 응답하지 않습니다. ${caller.name}의 도발은 허공에 흩어집니다.`;
        showState.currentIndex = Math.min(showState.segments.length - 1, Number(showState.currentIndex || 0) + 1);
        window.__divisionRuntimeShowState = showState;
        render();
        return;
      }
      if (choice === "ambush") {
        caller.condition = clamp(Number(caller.condition || 100) - 18, 0, 100);
        if (rivalry) {
          addRivalryHistory(rivalry, {
            week: gameState.week,
            segmentType: "interference",
            summary: `${target.name}가 링으로 뛰어들어 ${caller.name}를 기습했습니다.`,
            participants: [caller.id, target.id],
            heatChange: 16,
            crowdReaction: clamp(Number(segment.reaction || 60) + 12, 0, 100)
          });
        }
        segment.type = "match";
        segment.label = "기습 경기";
        segment.title = `${caller.name} vs ${target.name}`;
        segment.description = `${target.name}의 기습으로 ${caller.name}의 컨디션이 하락한 채 경기가 시작됩니다.`;
        segment.matchType = "ambush_match";
        segment.participants = [caller.id, target.id];
        segment.matchContextIndex = getRdShowSegmentContextIndex(segment, showState);
        const context = getRdShowSegmentMatchContext(segment, showState, { persist: true });
        if (context) {
          setRdEntranceStep(showState, segment, 1);
          startCurrentShowSegmentMatch();
        } else {
          render();
        }
        return;
      }
      if (rivalry) {
        addRivalryHistory(rivalry, {
          week: gameState.week,
          segmentType: "opening_promo",
          summary: `${target.name}가 ${caller.name}의 도전을 받아들였습니다. 다음 주 공식 경기가 잡힙니다.`,
          participants: [caller.id, target.id],
          heatChange: 8,
          crowdReaction: clamp(Number(segment.reaction || 60) + 8, 0, 100)
        });
        createStoryHook({
          type: "callout_accepted_match",
          rivalryKey: getRivalryKey(caller.id, target.id),
          targetWeek: gameState.week + 1,
          priority: 96,
          title: `${caller.name} vs ${target.name} 공식 경기`,
          description: `${target.name}가 ${caller.name}의 콜아웃에 응했습니다. 다음 주 링에서 정식으로 맞붙습니다.`,
          suggestedSegmentType: "match",
          participants: [caller.id, target.id]
        });
      }
      segment.description = `${target.name}가 도전을 받아들입니다. 다음 주, 링 위에서 답을 내기로 했습니다.`;
      showState.currentIndex = Math.min(showState.segments.length - 1, Number(showState.currentIndex || 0) + 1);
      window.__divisionRuntimeShowState = showState;
      render();
    }

    function applyRdIncidentChoice(choice = "broadcast") {
      const booking = ensureDivisionBookingState();
      const showState = booking.showState;
      const segment = getCurrentShowSegment();
      if (!showState?.segments?.length || !isRdIncidentChoiceSegment(segment)) {
        return;
      }
      const faces = getRdSegmentFaces(segment);
      const left = faces.left;
      const right = faces.right;
      if (!left || !right) {
        advanceDivisionShowSegment();
        return;
      }
      const rivalry = getRdCalloutRivalry(left, right, true);
      segment.incidentResolved = choice;
      if (rivalry) {
        ensureRivalryExtendedState(rivalry).lastIncidentWeek = gameState.week;
      }
      booking.lastIncidentWeek = gameState.week;
      if (pendingWeeklySession) {
        pendingWeeklySession.rdIncidentCount = Math.max(0, Math.floor(Number(pendingWeeklySession.rdIncidentCount || 0))) + 1;
      }
      if (choice === "unsanctioned" && segment.allowInstantMatch === false) {
        choice = "broadcast";
        segment.incidentResolved = choice;
      }
      if (choice === "security") {
        gameState.hype = clamp(gameState.hype - 4, 0, 100);
        if (rivalry) {
          addRivalryHistory(rivalry, {
            week: gameState.week,
            segmentType: segment.type,
            summary: `보안팀이 ${left.name}와 ${right.name}의 충돌을 막으며 불씨만 남겼습니다.`,
            participants: [left.id, right.id],
            heatChange: -3,
            crowdReaction: clamp(Number(segment.reaction || 50) - 8, 0, 100)
          });
        }
        segment.description = "보안팀이 둘을 갈라놓습니다. 당장의 충돌은 막았지만 관중은 찝찝한 야유를 보냅니다.";
        showState.currentIndex = Math.min(showState.segments.length - 1, Number(showState.currentIndex || 0) + 1);
        window.__divisionRuntimeShowState = showState;
        render();
        return;
      }
      if (choice === "unsanctioned") {
        left.condition = clamp(Number(left.condition || 100) - 12, 0, 100);
        right.condition = clamp(Number(right.condition || 100) - 12, 0, 100);
        if (rivalry) {
          addRivalryHistory(rivalry, {
            week: gameState.week,
            segmentType: "backstage",
            summary: `${left.name}와 ${right.name}의 충돌이 즉석 경기로 번졌습니다.`,
            participants: [left.id, right.id],
            heatChange: 14,
            crowdReaction: clamp(Number(segment.reaction || 60) + 12, 0, 100)
          });
        }
        segment.type = "match";
        segment.label = "즉석 경기";
        segment.title = `${left.name} vs ${right.name}`;
        segment.description = "통제되지 않은 충돌이 그대로 경기로 이어집니다. 두 선수 모두 컨디션을 소모한 상태입니다.";
        segment.matchType = "unsanctioned";
        segment.participants = [left.id, right.id];
        segment.matchContextIndex = getRdShowSegmentContextIndex(segment, showState);
        const context = getRdShowSegmentMatchContext(segment, showState, { persist: true });
        if (context) {
          setRdEntranceStep(showState, segment, 1);
          startCurrentShowSegmentMatch();
        } else {
          render();
        }
        return;
      }
      gameState.hype = clamp(gameState.hype + 8, 0, 100);
      if (rivalry) {
        addRivalryHistory(rivalry, {
          week: gameState.week,
          segmentType: segment.type === "interference" ? "interference" : "opening_promo",
          summary: `${left.name}와 ${right.name}의 돌발 장면이 방송을 타며 대립이 선명해졌습니다.`,
          participants: [left.id, right.id],
          heatChange: 9,
          crowdReaction: clamp(Number(segment.reaction || 60) + 10, 0, 100)
        });
        createStoryHook({
          type: "heated_followup",
          rivalryKey: getRivalryKey(left.id, right.id),
          priority: 78,
          title: `${left.name}와 ${right.name} 후속 대치`,
          description: "이번 주 돌발 장면 이후, 두 선수의 다음 발언이 기다려집니다.",
          suggestedSegmentType: "opening_promo",
          participants: [left.id, right.id]
        });
      }
      segment.description = "카메라는 이 장면을 끝까지 잡습니다. 관중 반응이 커지고, 다음 주 후속 대립의 명분이 생겼습니다.";
      showState.currentIndex = Math.min(showState.segments.length - 1, Number(showState.currentIndex || 0) + 1);
      window.__divisionRuntimeShowState = showState;
      render();
    }

    function getRdFaceHtml(wrestler) {
      return `<div class="rd-step-face" style="${wrestler ? getWrestlerCardPortraitStyle(wrestler, "background-position:center bottom;background-size:contain;") : ""}"></div>`;
    }

    function getRdShowSegments(matchContexts = [], options = {}) {
      const firstMatch = matchContexts[1] || null;
      const mainMatch = matchContexts[0] || matchContexts[1] || null;
      const promoA = getRdPromoBlueprint("a");
      const promoB = getRdPromoBlueprint("b");
      const firstLeft = findWrestlerById(firstMatch?.wrestlerA?.id);
      const firstRight = findWrestlerById(firstMatch?.wrestlerB?.id);
      const mainLeft = findWrestlerById(mainMatch?.wrestlerA?.id);
      const mainRight = findWrestlerById(mainMatch?.wrestlerB?.id);
      const promoALeft = firstLeft || mainLeft;
      const promoARight = firstRight || mainRight;
      const promoBLeft = mainLeft || firstLeft;
      const promoBRight = mainRight || firstRight;
      const incidentSegment = createRdWeeklyIncidentSegment(matchContexts, options);
      const ppvBuildSegment = window.__RING_DYNASTY_PPV_INVADERS_API__?.getBuildShowSegment?.([
        mainLeft?.id,
        mainRight?.id,
        firstLeft?.id,
        firstRight?.id
      ]);
      const extraMatchSegments = matchContexts.slice(2).map((context, index) => ({
        id: `rd_match_${index + 2}_${gameState.week}`,
        type: "match",
        label: `경기 ${index + 2}`,
        title: `${context.wrestlerA.name} vs ${context.wrestlerB.name}`,
        description: "언더카드 경기입니다. 짧은 입장 연출 후 턴제 경기로 진행됩니다.",
        reaction: clamp(gameState.hype + 12 + index * 2, 38, 100),
        participants: [context.wrestlerA.id, context.wrestlerB.id].filter(Boolean),
        matchContextIndex: context.matchIndex
      }));
      return [
        {
          id: `rd_start_${gameState.week}`,
          type: "show_start",
          label: "쇼 시작",
          title: getPpvInfo().isPpv ? getPpvInfo().name : "MONDAY NIGHT RAW",
          description: `WEEK ${gameState.week}의 쇼가 시작됩니다.`,
          reaction: clamp(gameState.hype + 18, 35, 100),
          participants: [mainLeft?.id, mainRight?.id].filter(Boolean)
        },
        {
          id: `rd_card_${gameState.week}`,
          type: "matchup_preview",
          label: "매치업 예고",
          title: "오늘의 카드 공개",
          description: `이번 주 공식 카드는 총 ${Math.max(1, matchContexts.length)}경기입니다.`,
          reaction: clamp(gameState.hype + 12, 35, 100),
          participants: [firstLeft?.id || mainLeft?.id, firstRight?.id || mainRight?.id].filter(Boolean)
        },
        {
          id: `rd_promo_1_${gameState.week}`,
          type: promoA.type,
          label: promoA.tag,
          title: promoA.title,
          description: `${formatRdSegmentLine(promoA.line, promoALeft, promoARight)} ${getRdMatchMotivationText(firstMatch || mainMatch)}`,
          reaction: clamp(gameState.hype + 10 + (hashString(`p1:${gameState.week}`) % 18), 35, 100),
          participants: [promoALeft?.id, promoARight?.id].filter(Boolean)
        },
        ...(ppvBuildSegment ? [ppvBuildSegment] : []),
        ...(firstMatch ? [{
          id: `rd_match_1_${gameState.week}`,
          type: "match",
          label: "경기 1",
          title: firstMatch ? `${firstMatch.wrestlerA.name} vs ${firstMatch.wrestlerB.name}` : "경기 1",
          description: "선수 입장 연출 후 기존 턴제 경기로 진행됩니다.",
          reaction: clamp(gameState.hype + 15, 40, 100),
          participants: [firstMatch?.wrestlerA?.id, firstMatch?.wrestlerB?.id].filter(Boolean),
          matchContextIndex: matchContexts.indexOf(firstMatch)
        }] : []),
        ...extraMatchSegments,
        ...(incidentSegment ? [incidentSegment] : []),
        {
          id: `rd_promo_2_${gameState.week}`,
          type: promoB.type,
          label: promoB.tag,
          title: promoB.title,
          description: `${formatRdSegmentLine(promoB.line, promoBLeft, promoBRight)} ${getRdMatchMotivationText(mainMatch || firstMatch)}`,
          reaction: clamp(gameState.hype + 14 + (hashString(`p2:${gameState.week}`) % 20), 35, 100),
          participants: [promoBLeft?.id, promoBRight?.id].filter(Boolean)
        },
        {
          id: `rd_main_${gameState.week}`,
          type: "main_event",
          label: "메인 이벤트",
          title: mainMatch ? `${mainMatch.wrestlerA.name} vs ${mainMatch.wrestlerB.name}` : "메인 이벤트",
          description: "쇼의 마지막 경기입니다. 입장 연출 후 턴제 경기로 마무리됩니다.",
          reaction: clamp(gameState.hype + 24, 50, 100),
          participants: [mainMatch?.wrestlerA?.id, mainMatch?.wrestlerB?.id].filter(Boolean),
          matchContextIndex: matchContexts.indexOf(mainMatch)
        }
      ];
    }

    function buildDivisionWeeklyCardFromRivalries() {
      ensureWeeklyMissionState();
      const rivalries = getDivisionRivalries().filter((rivalry) => getBookingMatchRestriction(rivalry.champion, rivalry.contender).ok);
      const ppvInfo = getPpvInfo();
      const mainRivalry = rivalries.find((rivalry) => rivalry.definition.key === "world") || rivalries[0] || null;
      const usedIds = new Set(mainRivalry ? [mainRivalry.champion.id, mainRivalry.contender.id] : []);
      let sideRivalry = mainRivalry
        ? rivalries.find((rivalry) => rivalry !== mainRivalry && !usedIds.has(rivalry.champion.id) && !usedIds.has(rivalry.contender.id)) || rivalries.find((rivalry) => rivalry !== mainRivalry) || null
        : null;
      gameState.weeklyCard = createEmptyWeeklyCard(gameState.week).map((slot) => ({
        ...slot,
        wrestlerAId: null,
        wrestlerBId: null,
        titleMatch: false,
        championshipKey: "",
        matchType: "",
        divisionGenerated: true,
        divisionKey: "",
        segmentType: ""
      }));
      const applyRivalryToSlot = (slot, rivalry, index) => {
        if (!slot || !rivalry) {
          return;
        }
        slot.wrestlerAId = rivalry.champion.id;
        slot.wrestlerBId = rivalry.contender.id;
        usedIds.add(rivalry.champion.id);
        usedIds.add(rivalry.contender.id);
        slot.divisionGenerated = true;
        slot.divisionKey = rivalry.definition.key;
        slot.segmentType = index === 0 ? "main_event" : "division_match";
        slot.titleMatch = Boolean(rivalry.vacantTitle || (ppvInfo.isPpv && index === 0 && gameState.championships?.[rivalry.definition.titleKey]));
        slot.championshipKey = slot.titleMatch ? rivalry.definition.titleKey : "";
        slot.matchType = index === 0 ? "division_main_event" : "division_rivalry";
      };
      applyRivalryToSlot(gameState.weeklyCard[0], mainRivalry, 0);
      if (sideRivalry) {
        applyRivalryToSlot(gameState.weeklyCard[1], sideRivalry, 1);
      }
      const pair = getAvailableCardRoster()
        .filter((wrestler) => !usedIds.has(wrestler.id) && wrestler.status === "idle")
        .sort((left, right) => getWrestlerPower(right) - getWrestlerPower(left));
      if (!gameState.weeklyCard[0].wrestlerAId && pair.length) {
        gameState.weeklyCard[0].wrestlerAId = pair.shift().id;
        gameState.weeklyCard[0].wrestlerBId = gameState.weeklyCpuOpponent.id;
        gameState.weeklyCard[0].divisionGenerated = true;
        gameState.weeklyCard[0].segmentType = "main_event";
        gameState.weeklyCard[0].matchType = "weekly_main_event";
      }
      if (!gameState.weeklyCard[1].wrestlerAId) {
        for (let leftIndex = 0; leftIndex < pair.length; leftIndex += 1) {
          for (let rightIndex = leftIndex + 1; rightIndex < pair.length; rightIndex += 1) {
            if (getBookingMatchRestriction(pair[leftIndex], pair[rightIndex]).ok) {
              gameState.weeklyCard[1].wrestlerAId = pair[leftIndex].id;
              gameState.weeklyCard[1].wrestlerBId = pair[rightIndex].id;
              gameState.weeklyCard[1].divisionGenerated = true;
              gameState.weeklyCard[1].segmentType = "division_match";
              gameState.weeklyCard[1].matchType = "weekly_opener";
              break;
            }
          }
          if (gameState.weeklyCard[1].wrestlerAId) {
            break;
          }
        }
      }
      const fallbackRoster = (gameState.roster || []).filter(Boolean).sort((left, right) => getWrestlerPower(right) - getWrestlerPower(left));
      if (!gameState.weeklyCard[0].wrestlerAId && fallbackRoster[0]) {
        gameState.weeklyCard[0].wrestlerAId = fallbackRoster[0].id;
        gameState.weeklyCard[0].wrestlerBId = gameState.weeklyCpuOpponent.id;
        gameState.weeklyCard[0].divisionGenerated = true;
        gameState.weeklyCard[0].segmentType = "main_event";
        gameState.weeklyCard[0].matchType = "weekly_main_event";
      }
      if (!gameState.weeklyCard[1].wrestlerAId && fallbackRoster.length >= 3) {
        gameState.weeklyCard[1].wrestlerAId = fallbackRoster[1].id;
        gameState.weeklyCard[1].wrestlerBId = fallbackRoster[2].id;
        gameState.weeklyCard[1].divisionGenerated = true;
        gameState.weeklyCard[1].segmentType = "division_match";
        gameState.weeklyCard[1].matchType = "weekly_opener";
      }
      gameState.weeklyCard.forEach((slot, index) => {
        ensureRdOriginRivalryForSlot(slot, index, index === 0 ? "main" : "opener");
      });
      gameState.weeklyCard = gameState.weeklyCard.slice(0, 2);
      const divisionReadySlots = (gameState.weeklyCard || []).filter((slot) => slot?.wrestlerAId && slot?.wrestlerBId).slice(0, 2);
      if (!divisionReadySlots.length) {
        showDivisionStartBlockedPopup(["보유 선수가 부족해 쇼를 시작할 수 없습니다. 최소 1명의 선수와 CPU 상대가 필요합니다."]);
      }
      return divisionReadySlots.length > 0;
    }

    function createRdPendingWeeklySession(matchContexts, ppvInfo) {
      const medicalHealAmount = getMedicalWeeklyHealAmount();
      pendingWeeklySession = {
        week: gameState.week,
        previousHype: getEffectiveHypeValue(gameState.hype),
        previousFame: gameState.fame,
        runningHype: clamp(gameState.hype + 5, 0, 100),
        totalIncome: 0,
        fameGain: 0,
        leftWins: 0,
        leftLosses: 0,
        totalAudience: 0,
        heelBribeCostTotal: 0,
        matchupKeys: matchContexts.map((context) => context.matchupKey),
        newlyInjuredIds: [],
        titleChanges: [],
        rivalryHighlights: [],
        touchedRivalryKeys: matchContexts.map((context) => context.rivalryKey).filter(Boolean),
        rivalryTicketBonus: 0,
        ticketReward: 0,
        bonusLines: [],
        warningLines: [],
        injuries: [],
        fameDelta: 0,
        mainWrestlerId: matchContexts[0]?.wrestlerA?.id || "",
        opponentId: matchContexts[0]?.wrestlerB?.id || "",
        mainMatchLost: false,
        mainMatchCompleted: false,
        mainStatsAppliedDuringShow: false,
        sideIncomeSnapshot: 0,
        weeklyIncomeMultiplier: 1,
        rdShowSession: true,
        rdIncidentCount: 0,
        recoveredPreviewIds: gameState.roster
          .filter((wrestler) => wrestler.status === "injured" && wrestler.injuryWeeks > 0 && Math.max(0, wrestler.injuryWeeks - medicalHealAmount) === 0)
          .map((wrestler) => wrestler.id),
        results: [],
        battlePackages: [],
        trainingGrowthPreview: previewWeeklyTraining(),
        salaryBreakdown: getWeeklySalaryBreakdown(),
        salaryTotal: getWeeklySalaryTotal(),
        ppvInfo,
        matchContexts
      };
    }

    function createRdFallbackWeeklyContext(slot, matchIndex, ppvInfo) {
      const standardContext = createWeeklyMatchContext(slot, matchIndex, ppvInfo);
      if (standardContext) {
        return standardContext;
      }
      const wrestlerA = findWrestlerById(slot?.wrestlerAId);
      const wrestlerB = findWrestlerById(slot?.wrestlerBId) || gameState.weeklyCpuOpponent;
      if (!wrestlerA || !wrestlerB) {
        return null;
      }
      wrestlerA.status = "match";
      wrestlerB.status = "match";
      return {
        kind: "weekly-context",
        matchIndex,
        slot,
        wrestlerA,
        wrestlerB,
        battleWrestlerA: wrestlerA,
        battleWrestlerB: wrestlerB,
        matchupKey: getMatchupKey(wrestlerA.id, wrestlerB.id),
        championshipKey: "",
        defendingChampionId: "",
        rivalry: null,
        rivalryKey: "",
        rivalryStoryText: "",
        rivalryHypeBonus: 0,
        rivalryRevenueMultiplier: 1,
        rivalryBadge: "",
        rivalryFinisherMultiplier: 1,
        alignmentBonus: getAlignmentMatchupBonus(wrestlerA, wrestlerB),
        bookingHype: calcHypeChange([{ aId: wrestlerA.id, bId: wrestlerB.id, isTitleMatch: false }]) - 5,
        matchType: ppvInfo.isPpv && matchIndex === 0 ? gameState.ppvState.featuredMatchType : "",
        rdCircuitOpponent: wrestlerB?.circuitSource || null,
        committed: false
      };
    }

    function createRdRuntimeContextFromSnapshot(rawContext, fallbackIndex = 0, ppvInfo = getPpvInfo()) {
      if (rawContext?.wrestlerA?.id && rawContext?.wrestlerB?.id) {
        [rawContext.wrestlerA, rawContext.wrestlerB].forEach((wrestler) => {
          if (wrestler && !wrestler.isGuest && !wrestler.isCircuitOpponent && !isWeeklyCpuId(wrestler.id)) {
            wrestler.status = "match";
          }
        });
        return rawContext;
      }
      const snapshot = sanitizeRdShowContextSnapshot(rawContext, fallbackIndex);
      if (!snapshot) {
        return null;
      }
      const slot = snapshot.slot || {};
      const wrestlerA = findWrestlerById(slot.wrestlerAId);
      const wrestlerB = findWrestlerById(slot.wrestlerBId);
      if (!wrestlerA || !wrestlerB) {
        return null;
      }
      if (!wrestlerA.isGuest && !wrestlerA.isCircuitOpponent && !isWeeklyCpuId(wrestlerA.id)) {
        wrestlerA.status = "match";
      }
      if (!wrestlerB.isGuest && !wrestlerB.isCircuitOpponent && !isWeeklyCpuId(wrestlerB.id)) {
        wrestlerB.status = "match";
      }
      const championshipKey = slot.titleMatch ? slot.championshipKey : snapshot.championshipKey || "";
      const defendingChampionId = championshipKey ? gameState.championships[championshipKey]?.holderId : "";
      const rivalry = getRivalryBetween(wrestlerA.id, wrestlerB.id);
      return {
        kind: "weekly-context",
        matchIndex: snapshot.matchIndex,
        slot,
        wrestlerA,
        wrestlerB,
        battleWrestlerA: defendingChampionId === wrestlerA.id ? createTitleDefenseWrestler(wrestlerA) : wrestlerA,
        battleWrestlerB: defendingChampionId === wrestlerB.id ? createTitleDefenseWrestler(wrestlerB) : wrestlerB,
        matchupKey: snapshot.matchupKey || getMatchupKey(wrestlerA.id, wrestlerB.id),
        championshipKey,
        defendingChampionId,
        rivalry,
        rivalryKey: rivalry ? getRivalryKey(wrestlerA.id, wrestlerB.id) : snapshot.rivalryKey || "",
        rivalryStoryText: getRivalryStoryText(rivalry),
        rivalryHypeBonus: getRivalryHypeBonus(rivalry),
        rivalryRevenueMultiplier: getRivalryRevenueMultiplier(rivalry),
        rivalryBadge: rivalry && rivalry.arc_stage >= 1 ? "🔥 라이벌 매치!" : "",
        rivalryFinisherMultiplier: rivalry && rivalry.arc_stage >= 2 ? 1.5 : 1,
        alignmentBonus: getAlignmentMatchupBonus(wrestlerA, wrestlerB),
        bookingHype: calcHypeChange([{ aId: wrestlerA.id, bId: wrestlerB.id, isTitleMatch: Boolean(slot.titleMatch) }]) - 5,
        matchType: ppvInfo.isPpv && snapshot.matchIndex === 0 ? gameState.ppvState.featuredMatchType : snapshot.matchType || "",
        rdCircuitOpponent: wrestlerB?.circuitSource || null,
        committed: Boolean(snapshot.committed),
        runtimeBattle: null
      };
    }

    function hydrateRdShowStateMatchContexts(showState) {
      if (!showState?.segments?.length) {
        return [];
      }
      const ppvInfo = getPpvInfo();
      const sourceContexts = Array.isArray(showState.matchContexts) ? showState.matchContexts : [];
      const byIndex = new Map();
      sourceContexts.forEach((context, index) => {
        const hydrated = createRdRuntimeContextFromSnapshot(context, index, ppvInfo);
        if (hydrated) {
          byIndex.set(Number(hydrated.matchIndex || index), hydrated);
        }
      });
      showState.segments.forEach((segment) => {
        if (!(segment?.type === "match" || segment?.type === "main_event")) {
          return;
        }
        const contextIndex = Number.isFinite(segment.matchContextIndex) ? Math.max(0, Math.floor(segment.matchContextIndex)) : Number(showState.currentIndex || 0);
        if (byIndex.has(contextIndex)) {
          return;
        }
        const slot = {
          wrestlerAId: segment.participants?.[0] || "",
          wrestlerBId: segment.participants?.[1] || "",
          titleMatch: Boolean(segment.championshipKey),
          championshipKey: segment.championshipKey || "",
          matchType: segment.matchType || "",
          divisionGenerated: true,
          segmentType: segment.type
        };
        const hydrated = createRdRuntimeContextFromSnapshot({ matchIndex: contextIndex, slot }, contextIndex, ppvInfo);
        if (hydrated) {
          byIndex.set(contextIndex, hydrated);
        }
      });
      const contexts = [];
      Array.from(byIndex.entries()).forEach(([contextIndex, context]) => {
        contexts[contextIndex] = context;
      });
      showState.matchContexts = contexts;
      window.__divisionRuntimeShowState = showState;
      return showState.matchContexts.filter(Boolean);
    }

    function restoreRdPendingWeeklySessionFromShowState() {
      if (pendingWeeklySession) {
        return true;
      }
      const booking = ensureDivisionBookingState();
      const showState = booking.showState;
      if (!showState?.segments?.length) {
        return false;
      }
      const matchContexts = hydrateRdShowStateMatchContexts(showState);
      if (!matchContexts.length) {
        return false;
      }
      createRdPendingWeeklySession(matchContexts, getPpvInfo());
      pendingWeeklySession.rdRestoredSession = true;
      const playedIndexes = Array.isArray(showState.playedMatchIndexes) ? showState.playedMatchIndexes : [];
      playedIndexes.forEach((contextIndex) => {
        const context = matchContexts.find((item) => Number(item.matchIndex) === Number(contextIndex)) || matchContexts[Number(contextIndex)];
        if (!context || context.committed) {
          return;
        }
        const battlePackage = buildBattlePackageForWeeklyContext(context, pendingWeeklySession.runningHype);
        autoResolveBattlePackage(battlePackage);
        applyBattlePackageToWeeklySession(context, battlePackage);
      });
      return true;
    }

    function beginDivisionShowFlow() {
      if (!buildDivisionWeeklyCardFromRivalries()) {
        return false;
      }
      const ppvInfo = getPpvInfo();
      const matchContexts = (gameState.weeklyCard || []).filter((slot) => slot?.wrestlerAId && slot?.wrestlerBId).slice(0, 2)
        .map((slot, matchIndex) => createRdFallbackWeeklyContext(slot, matchIndex, ppvInfo))
        .filter(Boolean);
      if (!matchContexts.length) {
        ensureWeeklyMissionState();
        const fallbackWrestler = (gameState.roster || []).find((wrestler) => wrestler?.id);
        if (!fallbackWrestler) {
          showDivisionStartBlockedPopup(["이번 주에 진행할 경기를 만들 수 없습니다. 기본 선수가 필요합니다."]);
          return false;
        }
        gameState.weeklyCard = createEmptyWeeklyCard(gameState.week);
        gameState.weeklyCard[0].wrestlerAId = fallbackWrestler.id;
        gameState.weeklyCard[0].wrestlerBId = gameState.weeklyCpuOpponent.id;
        gameState.weeklyCard[0].divisionGenerated = true;
        const fallbackContext = createRdFallbackWeeklyContext(gameState.weeklyCard[0], 0, ppvInfo);
        if (fallbackContext) {
          matchContexts.push(fallbackContext);
        }
      }
      if (!matchContexts.length) {
        showDivisionStartBlockedPopup(["이번 주에 진행할 경기를 만들 수 없습니다."]);
        return false;
      }
      createRdPendingWeeklySession(matchContexts, ppvInfo);
      const showSeed = Math.floor(Math.random() * 1000000000);
      const booking = ensureDivisionBookingState();
      booking.showState = {
        week: gameState.week,
        isPpv: Boolean(ppvInfo.isPpv),
        showName: ppvInfo.isPpv ? ppvInfo.name : "MONDAY NIGHT RAW",
        eventSeed: showSeed,
        currentIndex: 0,
        choiceCount: 0,
        gmChoices: [],
        matchContexts,
        playedMatchIndexes: [],
        entranceSteps: {},
        segments: getRdShowSegments(matchContexts, { seed: showSeed })
      };
      booking.activePage = "opening";
      window.__divisionRuntimeShowState = booking.showState;
      window.__divisionRuntimeActivePage = "opening";
      return true;
    }

    function renderShowSegmentMainContent() {
      const booking = ensureDivisionBookingState();
      const showState = booking.showState;
      const segment = getCurrentShowSegment();
      if (!showState || !segment) {
        booking.activePage = "card";
        renderAutoShowCardMainContent();
        return;
      }
      activeTab = "home";
      booking.activePage = "segment";
      render();
    }

    function advanceDivisionShowSegment() {
      const booking = ensureDivisionBookingState();
      if (!booking.showState?.segments?.length) {
        beginDivisionShowFlow();
        activeTab = "home";
        booking.activePage = "segment";
        render();
        return;
      }
      restoreRdPendingWeeklySessionFromShowState();
      if (booking.activePage === "opening") {
        booking.activePage = "segment";
        booking.showState.currentIndex = 0;
        activeTab = "home";
        render();
        return;
      }
      const current = getCurrentShowSegment();
      if ((current?.type === "match" || current?.type === "main_event") && !(booking.showState.playedMatchIndexes || []).includes(getRdShowSegmentContextIndex(current, booking.showState))) {
        activeTab = "home";
        booking.activePage = "segment";
        render();
        return;
      }
      if (Number(booking.showState.currentIndex || 0) >= booking.showState.segments.length - 1) {
        finalizePendingWeeklySession();
        return;
      }
      booking.showState.currentIndex = Number(booking.showState.currentIndex || 0) + 1;
      window.__divisionRuntimeShowState = booking.showState;
      window.__divisionRuntimeActivePage = "segment";
      activeTab = "home";
      booking.activePage = "segment";
      render();
    }

    function startCurrentShowSegmentMatch() {
      const booking = ensureDivisionBookingState();
      restoreRdPendingWeeklySessionFromShowState();
      const segment = getCurrentShowSegment();
      const contextIndex = getRdShowSegmentContextIndex(segment, booking.showState);
      const context = getRdShowSegmentMatchContext(segment, booking.showState, { persist: true });
      if (!context) {
        forceExitStuckShowRuntimeForNavigation();
        render();
        return;
      }
      if (getRdEntranceStep(booking.showState, segment) < 1) {
        advanceCurrentMatchEntrance();
        return;
      }
      if ((booking.showState.playedMatchIndexes || []).includes(contextIndex)) {
        advanceDivisionShowSegment();
        return;
      }
      booking.showState.playedMatchIndexes = Array.from(new Set([...(booking.showState.playedMatchIndexes || []), contextIndex]));
      activeTab = "home";
      matchAnimationState.finishCallback = () => {
        const latest = ensureDivisionBookingState();
        if (Number(latest.showState?.currentIndex || 0) >= (latest.showState?.segments?.length || 1) - 1) {
          clearDivisionShowRuntimeState({ activePage: "result", clearWeeklyCard: true });
          finalizePendingWeeklySession();
          return;
        }
        latest.showState.currentIndex = Number(latest.showState.currentIndex || 0) + 1;
        latest.activePage = "segment";
        window.__divisionRuntimeShowState = latest.showState;
        window.__divisionRuntimeActivePage = "segment";
        activeTab = "home";
        render();
      };
      startMatchAnimation([context]);
      render();
    }

    window.startCurrentShowSegmentMatch = startCurrentShowSegmentMatch;

    function finalizeDivisionShow() {
      clearDivisionShowRuntimeState({ activePage: "result", clearWeeklyCard: true });
      finalizePendingWeeklySession();
    }

    function startDivisionGeneratedShow() {
      const now = performance.now();
      if (Number(window.__lastDivisionShowStartAt || 0) && now - Number(window.__lastDivisionShowStartAt || 0) < 250) {
        return;
      }
      window.__lastDivisionShowStartAt = now;
      const started = beginDivisionShowFlow();
      window.__lastDivisionShowStartResult = started ? "started" : "blocked";
      document.body.dataset.lastDivisionShowStart = window.__lastDivisionShowStartResult;
      if (!started) {
        return;
      }
      activeTab = "home";
      window.__divisionShowFlowMode = "home";
      const booking = ensureDivisionBookingState();
      booking.activePage = "segment";
      booking.showState.currentIndex = 0;
      window.__divisionRuntimeActivePage = "segment";
      window.__divisionRuntimeShowState = booking.showState;
      render();
    }

    window.startDivisionGeneratedShow = startDivisionGeneratedShow;
    window.advanceDivisionShowSegment = advanceDivisionShowSegment;
    window.finalizeDivisionShow = finalizeDivisionShow;

    const rdOriginalHandleDivisionDelegatedClick = handleDivisionDelegatedClick;
    handleDivisionDelegatedClick = function(event) {
      if (!mainDynamicContentEl.contains(event.target)) {
        return false;
      }
      const startShowButton = event.target.closest?.('[data-action="start-division-show"]');
      if (startShowButton) {
        event.preventDefault();
        event.stopPropagation();
        startDivisionGeneratedShow();
        return true;
      }
      const advanceShowButton = event.target.closest?.('[data-action="advance-show-segment"], [data-action="finalize-division-show"]');
      if (advanceShowButton) {
        event.preventDefault();
        event.stopPropagation();
        if (advanceShowButton.dataset.action === "finalize-division-show") {
          finalizeDivisionShow();
        } else {
          advanceDivisionShowSegment();
        }
        return true;
      }
      const startMatchButton = event.target.closest?.('[data-action="start-segment-match"]');
      if (startMatchButton) {
        event.preventDefault();
        event.stopPropagation();
        startCurrentShowSegmentMatch();
        return true;
      }
      const advanceEntranceButton = event.target.closest?.('[data-action="advance-match-entrance"]');
      if (advanceEntranceButton) {
        event.preventDefault();
        event.stopPropagation();
        advanceCurrentMatchEntrance();
        return true;
      }
      const previousShowButton = event.target.closest?.('[data-action="previous-show-segment"]');
      if (previousShowButton) {
        event.preventDefault();
        event.stopPropagation();
        if (!previousShowButton.disabled) {
          previousDivisionShowSegment();
        }
        return true;
      }
      return rdOriginalHandleDivisionDelegatedClick(event);
    };

    function getRdHomeSpriteAssetPath(wrestler) {
      const customKeys = wrestler && typeof getCustomWrestlerLookupKeys === "function" ? getCustomWrestlerLookupKeys(wrestler) : [];
      const directManifestPath = customKeys.length ? `data/images/wrestlers/custom/manifest_sprites/${customKeys[0]}.png` : "";
      const resolved = wrestler ? getResolvedStandSpriteSheet(wrestler) : "";
      return resolved && normalizeSpriteAssetPath(resolved).includes("data/images/wrestlers/custom/manifest_sprites/")
        ? resolved
        : directManifestPath || resolved;
    }

    function getRdManifestSpriteStyle(wrestler, extra = "") {
      const spriteSheet = getRdHomeSpriteAssetPath(wrestler);
      const style = spriteSheet
        ? `background-image:url('${spriteSheet}');background-color:transparent;`
        : "background-color:transparent;";
      return `${style}${extra}`;
    }

    const RD_BACKSTAGE_INTERVIEWER_SPRITE = "data/images/ui/generated/show_cutscenes/backstage_interviewer_sprite.png";

    function getRdHomeWrestlerHtml(wrestler, side = "left", extraClass = "") {
      const hasSprite = Boolean(wrestler && getRdHomeSpriteAssetPath(wrestler));
      const style = wrestler ? getRdManifestSpriteStyle(wrestler, "background-position:center bottom;background-size:contain;") : "";
      return `<div class="rd-home-wrestler ${escapeHtml(side)} ${escapeHtml(extraClass)}${hasSprite ? "" : " generic-shadow"}" style="${style}" aria-label="${escapeHtml(wrestler?.name || "TBA")}"></div>`;
    }

    function getRdHomePerformerPairHtml(left, right, centerText = "VS") {
      return `
        <div class="rd-home-performers">
          ${getRdHomeWrestlerHtml(left, "left")}
          <div class="rd-home-vs">${escapeHtml(centerText)}</div>
          ${getRdHomeWrestlerHtml(right, "right")}
        </div>
      `;
    }

    function isRdBackstageInterviewSegment(segment) {
      const type = String(segment?.type || "");
      const title = `${segment?.title || ""} ${segment?.label || ""}`;
      return type === "interview" || (type === "backstage" && /인터뷰|interview/i.test(title));
    }

    function getRdBackstageInterviewHtml(segment) {
      const faces = getRdSegmentFaces(segment);
      const interviewee = faces.left || faces.right;
      const line = segment?.description || `${interviewee?.name || "선수"}가 백스테이지 인터뷰에 응합니다.`;
      return `
        <div class="rd-backstage-interview-scene">
          <div class="rd-backstage-interviewer" style="background-image:url('${RD_BACKSTAGE_INTERVIEWER_SPRITE}')" aria-label="Backstage interviewer"></div>
          <div class="rd-backstage-interviewee">
            ${getRdHomeWrestlerHtml(interviewee, "right", "interviewee")}
          </div>
          <div class="rd-backstage-interview-copy">
            <div class="rd-backstage-interview-tag">BACKSTAGE INTERVIEW</div>
            <div class="rd-backstage-interview-line">${escapeHtml(line)}</div>
          </div>
        </div>
      `;
    }

    function getRdRawNamebarHtml(wrestler) {
      return `
        <div class="rd-raw-namebar">
          <img src="data/images/shows/raw.png" alt="RAW">
          <div class="rd-raw-namebar-name">${escapeHtml(wrestler?.name || "ENTRANCE")}</div>
        </div>
      `;
    }

    function getRdHomeStageClass(segment) {
      if (!segment) {
        return "show-start";
      }
      if (segment.type === "matchup_preview") {
        return "matchup";
      }
      if (segment.type === "match" || segment.type === "main_event") {
        return "entrance";
      }
      if (segment.type === "show_start") {
        return "show-start";
      }
      return `promo promo-${String(segment.type || "ring").replace(/[^a-z0-9_-]/gi, "_")}`;
    }

    const RD_CUTSCENE_BACKGROUNDS = {
      arena: [
        "data/images/ui/generated/show_cutscenes/raw_arena_stage.png",
        "data/images/ui/generated/show_cutscenes/promo_arena_silhouette_v2.png"
      ],
      entrance: [
        "data/images/ui/generated/show_cutscenes/raw_entrance_ramp.png",
        "data/images/ui/generated/show_cutscenes/run_in_entrance_v2.png"
      ],
      backstage: [
        "data/images/ui/generated/show_cutscenes/backstage_hallway.png",
        "data/images/ui/generated/show_cutscenes/backstage_confrontation_v2.png"
      ],
      contract: [
        "data/images/ui/generated/show_cutscenes/contract_interview_stage.png",
        "data/images/ui/generated/show_cutscenes/contract_signing_silhouette_v2.png"
      ]
    };

    function pickRdCutsceneBackground(paths, segment) {
      const list = Array.isArray(paths) && paths.length ? paths : RD_CUTSCENE_BACKGROUNDS.arena;
      const seed = `${gameState.week}:${segment?.id || ""}:${segment?.type || ""}:${segment?.title || ""}`;
      return list[hashString(seed) % list.length];
    }

    function getRdHomeSceneBackgroundPath(segment) {
      const type = String(segment?.type || "show_start");
      if (type === "match" || type === "main_event") {
        return pickRdCutsceneBackground(RD_CUTSCENE_BACKGROUNDS.entrance, segment);
      }
      if (type === "interference") {
        return pickRdCutsceneBackground(RD_CUTSCENE_BACKGROUNDS.entrance, segment);
      }
      if (type === "backstage") {
        return pickRdCutsceneBackground(RD_CUTSCENE_BACKGROUNDS.backstage, segment);
      }
      if (type === "interview") {
        return pickRdCutsceneBackground([...RD_CUTSCENE_BACKGROUNDS.backstage, ...RD_CUTSCENE_BACKGROUNDS.contract], segment);
      }
      if (type === "contract_signing") {
        return pickRdCutsceneBackground(RD_CUTSCENE_BACKGROUNDS.contract, segment);
      }
      return pickRdCutsceneBackground(RD_CUTSCENE_BACKGROUNDS.arena, segment);
    }

    function getRdEntranceStep(showState, segment) {
      const key = segment?.id || String(showState?.currentIndex || 0);
      return clamp(Number(showState?.entranceSteps?.[key] || 0), 0, 1);
    }

    function setRdEntranceStep(showState, segment, step) {
      if (!showState || !segment) {
        return;
      }
      const key = segment.id || String(showState.currentIndex || 0);
      showState.entranceSteps = { ...(showState.entranceSteps || {}), [key]: clamp(Number(step || 0), 0, 1) };
      window.__divisionRuntimeShowState = showState;
    }

    function getRdHomeActionHtml(segment, showState) {
      const previousDisabled = Number(showState?.currentIndex || 0) <= 0 && getRdEntranceStep(showState, segment) <= 0;
      const previousButton = `<button class="rd-scene-arrow" type="button" data-action="previous-show-segment" aria-label="이전 장면" onclick="event.preventDefault();event.stopPropagation();window.previousDivisionShowSegment?.();return false;" ${previousDisabled ? "disabled" : ""}>‹</button>`;
      if (isRdCalloutSegment(segment) && !segment.calloutResolved) {
        return `${getRdCalloutChoiceHtml(segment)}<div class="rd-scene-nav solo">${previousButton}</div>`;
      }
      if (isRdIncidentChoiceSegment(segment)) {
        return `${getRdIncidentChoiceHtml(segment)}<div class="rd-scene-nav solo">${previousButton}</div>`;
      }
      let nextAction = "advance-show-segment";
      let nextHandler = "window.advanceDivisionShowSegment()";
      if (segment?.type === "match" || segment?.type === "main_event") {
        const step = getRdEntranceStep(showState, segment);
        const alreadyPlayed = (showState?.playedMatchIndexes || []).includes(getRdShowSegmentContextIndex(segment, showState));
        if (alreadyPlayed) {
          nextAction = Number(showState?.currentIndex || 0) >= Number(showState?.segments?.length || 1) - 1 ? "finalize-division-show" : "advance-show-segment";
          nextHandler = nextAction === "finalize-division-show" ? "window.finalizeDivisionShow()" : "window.advanceDivisionShowSegment()";
        } else if (step <= 0) {
          nextAction = "advance-match-entrance";
          nextHandler = "window.advanceCurrentMatchEntrance()";
        } else {
          nextAction = "start-segment-match";
          nextHandler = "window.startCurrentShowSegmentMatch()";
        }
      } else if (Number(showState?.currentIndex || 0) >= Number(showState?.segments?.length || 1) - 1) {
        nextAction = "finalize-division-show";
        nextHandler = "window.finalizeDivisionShow()";
      }
      return `<div class="rd-scene-nav">${previousButton}<button class="rd-scene-arrow" type="button" data-action="${nextAction}" aria-label="다음 장면" onclick="event.preventDefault();event.stopPropagation();${nextHandler};return false;">›</button></div>`;
    }

    function runRdSceneButtonAction(button, event) {
      if (!button) {
        return false;
      }
      event?.preventDefault?.();
      event?.stopPropagation?.();
      event?.stopImmediatePropagation?.();
      if (button.disabled) {
        return true;
      }
      const action = button.dataset.action;
      if (action === "previous-show-segment") {
        previousDivisionShowSegment();
      } else if (action === "advance-match-entrance") {
        advanceCurrentMatchEntrance();
      } else if (action === "start-segment-match") {
        startCurrentShowSegmentMatch();
      } else if (action === "finalize-division-show") {
        finalizeDivisionShow();
      } else {
        advanceDivisionShowSegment();
      }
      return true;
    }

    function runRdCalloutChoiceAction(button, event) {
      if (!button) {
        return false;
      }
      event?.preventDefault?.();
      event?.stopPropagation?.();
      event?.stopImmediatePropagation?.();
      applyRdCalloutChoice(button.dataset.choice || "accept");
      return true;
    }

    function runRdIncidentChoiceAction(button, event) {
      if (!button) {
        return false;
      }
      event?.preventDefault?.();
      event?.stopPropagation?.();
      event?.stopImmediatePropagation?.();
      applyRdIncidentChoice(button.dataset.choice || "broadcast");
      return true;
    }

    function attachRdHomeSceneEvents() {
      mainDynamicContentEl.querySelectorAll("[data-action='rd-callout-choice'], [data-action='rd-incident-choice']").forEach((button) => {
        if (button.dataset.rdBound === "true") {
          return;
        }
        button.dataset.rdBound = "true";
        const runChoiceAction = (event) => {
          if (button.dataset.action === "rd-incident-choice") {
            runRdIncidentChoiceAction(button, event);
          } else {
            runRdCalloutChoiceAction(button, event);
          }
        };
        button.addEventListener("pointerdown", runChoiceAction);
        button.addEventListener("click", runChoiceAction);
      });
      mainDynamicContentEl.querySelectorAll(".rd-scene-arrow").forEach((button) => {
        if (button.dataset.rdBound === "true") {
          return;
        }
        button.dataset.rdBound = "true";
        const runSceneAction = (event) => {
          runRdSceneButtonAction(button, event);
        };
        button.addEventListener("pointerdown", runSceneAction);
        button.addEventListener("click", runSceneAction);
      });
    }

    function getRdHomeMatchupCardsHtml(showState) {
      const contexts = (showState?.matchContexts || []).filter(Boolean).slice(0, 5);
      return `
        <div class="rd-home-match-list">
          ${contexts.map((context, index) => `
            <article class="rd-home-match-card">
              <div>
                <div class="rd-home-kicker">${index === 0 ? "MAIN EVENT" : "MATCH 1"}</div>
                <div class="gm-panel-title">${escapeHtml(context?.wrestlerA?.name || "TBA")} VS ${escapeHtml(context?.wrestlerB?.name || "TBA")}</div>
              </div>
              ${getRdHomePerformerPairHtml(context?.wrestlerA, context?.wrestlerB, "VS")}
              <div class="division-wrestler-name">${escapeHtml(context?.rivalryStoryText || "이번 주 경기 카드에 공식 편성되었습니다.")}</div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function getRdShowSegmentContextIndex(segment, showState) {
      const rawIndex = Number(segment?.matchContextIndex);
      if (Number.isFinite(rawIndex) && rawIndex >= 0) {
        return Math.floor(rawIndex);
      }
      const participants = Array.isArray(segment?.participants) ? segment.participants.filter(Boolean) : [];
      const matchedIndex = (showState?.matchContexts || []).findIndex((context) => (
        context
        && participants.includes(context.wrestlerA?.id)
        && participants.includes(context.wrestlerB?.id)
      ));
      if (matchedIndex >= 0) {
        return matchedIndex;
      }
      return Math.max(0, Math.floor(Number(showState?.currentIndex || 0)));
    }

    function getRdShowSegmentMatchContext(segment, showState, options = {}) {
      if (!(segment?.type === "match" || segment?.type === "main_event")) {
        return null;
      }
      const contextIndex = getRdShowSegmentContextIndex(segment, showState);
      const existing = showState?.matchContexts?.[contextIndex];
      if (existing?.wrestlerA && existing?.wrestlerB) {
        return existing;
      }
      const participants = Array.isArray(segment.participants) ? segment.participants.filter(Boolean) : [];
      const faces = getRdSegmentFaces(segment);
      const wrestlerA = findWrestlerById(participants[0]) || faces.left;
      const wrestlerB = findWrestlerById(participants[1]) || faces.right;
      if (!wrestlerA || !wrestlerB) {
        return null;
      }
      const slot = {
        wrestlerAId: wrestlerA.id,
        wrestlerBId: wrestlerB.id,
        divisionGenerated: true,
        divisionKey: segment.divisionKey || segment.rivalry?.definition?.key || "",
        segmentType: segment.type === "main_event" ? "main_event" : "division_match",
        matchType: segment.matchType || "division_rivalry",
        titleMatch: Boolean(segment.titleDecider),
        championshipKey: segment.championshipKey || ""
      };
      const fallback = createRdFallbackWeeklyContext(slot, contextIndex, getPpvInfo());
      if (!fallback) {
        return null;
      }
      fallback.rivalryStoryText = segment.description || fallback.rivalryStoryText || "이번 주 경기 카드에 공식 편성되었습니다.";
      if (options.persist && showState) {
        showState.matchContexts = Array.isArray(showState.matchContexts) ? showState.matchContexts : [];
        showState.matchContexts[contextIndex] = fallback;
        segment.matchContextIndex = contextIndex;
        window.__divisionRuntimeShowState = showState;
      }
      return fallback;
    }

    function getRdHomeSceneBodyHtml(segment, showState) {
      if (segment?.type === "matchup_preview") {
        return getRdHomeMatchupCardsHtml(showState);
      }
      if (segment?.type === "show_start") {
        return `<div class="rd-home-show-open"></div>`;
      }
      if (isRdBackstageInterviewSegment(segment)) {
        return getRdBackstageInterviewHtml(segment);
      }
      if (isRdCalloutSegment(segment)) {
        const { caller, target } = getRdCalloutActors(segment);
        return `
          <div class="rd-callout-ring-scene">
            <div class="rd-callout-ring-ropes"></div>
            <div class="rd-callout-speaker">
              ${getRdHomeWrestlerHtml(caller, "left", "promo-speaker")}
              <div class="rd-callout-mic">MIC</div>
            </div>
            <div class="rd-callout-promo-box">
              <div class="rd-callout-name">${escapeHtml(caller?.name || "PROMO")}</div>
              <div class="rd-callout-line">${escapeHtml(segment.description || `${caller?.name || "선수"}가 링 중앙에서 마이크를 잡습니다.`)}</div>
              ${target ? `<div class="rd-callout-target">CALL OUT · ${escapeHtml(target.name)}</div>` : ""}
            </div>
          </div>
        `;
      }
      const context = (segment?.type === "match" || segment?.type === "main_event")
        ? getRdShowSegmentMatchContext(segment, showState, { persist: true })
        : null;
      if (context) {
        const step = getRdEntranceStep(showState, segment);
        const entrant = step <= 0 ? context.wrestlerA : context.wrestlerB;
        return `
          <div class="rd-home-entrance-focus">
            ${getRdHomeWrestlerHtml(entrant, step <= 0 ? "left" : "right", "entrant")}
            ${getRdRawNamebarHtml(entrant)}
          </div>
        `;
      }
      const faces = context
        ? { left: context.wrestlerA, right: context.wrestlerB }
        : getRdSegmentFaces(segment);
      return getRdHomePerformerPairHtml(faces.left, faces.right, segment?.type === "show_start" ? "RAW" : "VS");
    }

    function getRdHomeDialogueLine(segment, showState) {
      if (!segment) {
        return "";
      }
      if (segment.type === "match" || segment.type === "main_event") {
        return "";
      }
      if (segment.type === "show_start") {
        return "";
      }
      if (segment.type === "matchup_preview") {
        return "오늘 밤의 공식 카드가 공개됩니다.";
      }
      if (isRdCalloutSegment(segment)) {
        return "";
      }
      if (isRdBackstageInterviewSegment(segment)) {
        return "";
      }
      return segment.description || "";
    }

    function advanceCurrentMatchEntrance() {
      const booking = ensureDivisionBookingState();
      const segment = getCurrentShowSegment();
      if (!(segment?.type === "match" || segment?.type === "main_event")) {
        return;
      }
      setRdEntranceStep(booking.showState, segment, 1);
      activeTab = "home";
      render();
    }

    function previousDivisionShowSegment() {
      const booking = ensureDivisionBookingState();
      const showState = booking.showState;
      const segment = getCurrentShowSegment();
      if (!showState?.segments?.length) {
        return;
      }
      if ((segment?.type === "match" || segment?.type === "main_event") && getRdEntranceStep(showState, segment) > 0) {
        setRdEntranceStep(showState, segment, 0);
      } else {
        showState.currentIndex = Math.max(0, Number(showState.currentIndex || 0) - 1);
      }
      window.__divisionRuntimeShowState = showState;
      window.__divisionRuntimeActivePage = "segment";
      activeTab = "home";
      render();
    }

    function renderHomeShowSceneMainContent() {
      const booking = ensureDivisionBookingState();
      const showState = booking.showState;
      const segment = getCurrentShowSegment();
      if (!showState?.segments?.length || !segment) {
        renderRdDefaultHomeMainContent();
        return;
      }
      restoreRdPendingWeeklySessionFromShowState();
      const sceneClass = getRdHomeStageClass(segment);
      const sceneBackgroundPath = getRdHomeSceneBackgroundPath(segment);
      const isMatchScene = segment.type === "match" || segment.type === "main_event";
      const entranceStep = getRdEntranceStep(showState, segment);
      const kicker = isMatchScene ? (segment.type === "main_event" ? "MAIN EVENT" : "MATCH") : (segment.type === "show_start" ? "LIVE" : segment.label);
      const subtitle = isMatchScene ? (entranceStep <= 0 ? "FIRST ENTRANCE" : "SECOND ENTRANCE") : "";
      const line = getRdHomeDialogueLine(segment, showState);
      const titleText = isMatchScene
        ? segment.title
        : segment.type === "show_start"
          ? `WEEK ${showState.week || gameState.week}`
          : segment.title || showState.showName;
      mainDynamicContentEl.innerHTML = `
        <div class="rd-home-show-shell">
          <section class="rd-home-stage ${sceneClass}" style="--rd-scene-bg:url('${escapeHtml(sceneBackgroundPath)}')">
            <div class="rd-home-scene-head">
              <img class="rd-show-logo-img" src="data/images/shows/raw.png" alt="RAW">
              <div class="rd-home-kicker">${escapeHtml(kicker)}${subtitle ? ` · ${escapeHtml(subtitle)}` : ""}</div>
              <div class="rd-home-title">${escapeHtml(titleText)}</div>
              ${subtitle ? `<div class="rd-home-subtitle">${escapeHtml(subtitle)}</div>` : ""}
            </div>
            ${getRdHomeSceneBodyHtml(segment, showState)}
            <div>
              ${line ? `<div class="rd-home-dialogue compact">${escapeHtml(line)}</div>` : ""}
              <div class="rd-home-control">
                ${getRdHomeActionHtml(segment, showState)}
              </div>
            </div>
          </section>
        </div>
      `;
      attachRdHomeSceneEvents();
    }

    window.advanceCurrentMatchEntrance = advanceCurrentMatchEntrance;
    window.previousDivisionShowSegment = previousDivisionShowSegment;

    function renderHomeMainContent() {
      const currentBooking = ensureDivisionBookingState();
      if (currentBooking?.showState?.segments?.length && !matchAnimationState.running) {
        renderHomeShowSceneMainContent();
        return;
      }
      renderRdDefaultHomeMainContent();
    }

    function render() {
      applyUiScale();
      renderResources();
      renderActiveTab();
    }

    function saveGameState() {
      try {
        syncPendingGachaSessionToState();
        gameState.lastSaved = Date.now();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
        showSaveToast();
      } catch (error) {
        console.error("저장에 실패했습니다.", error);
      }
    }

    function silentSaveGameState() {
      try {
        syncPendingGachaSessionToState();
        gameState.lastSaved = Date.now();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
      } catch (error) {
        console.error("조용한 저장에 실패했습니다.", error);
      }
    }

    function getRdRuntimeMatchContexts() {
      const showContexts = ensureDivisionBookingState()?.showState?.matchContexts;
      const sessionContexts = pendingWeeklySession?.matchContexts;
      return (Array.isArray(sessionContexts) && sessionContexts.length ? sessionContexts : showContexts) || [];
    }

    function releaseRdPendingMatchStatuses() {
      getRdRuntimeMatchContexts().forEach((context) => {
        [context?.wrestlerA, context?.wrestlerB].forEach((wrestler) => {
          if (!wrestler || wrestler.isGuest || wrestler.isCircuitOpponent || isWeeklyCpuId(wrestler.id)) {
            return;
          }
          if (wrestler.status === "match") {
            wrestler.status = "idle";
          }
        });
      });
    }

    function autoResolvePendingWeeklySessionMatches() {
      if (!pendingWeeklySession) {
        return;
      }
      (pendingWeeklySession.matchContexts || []).forEach((context) => {
        if (!context || context.committed) {
          return;
        }
        const battlePackage = buildBattlePackageForWeeklyContext(context, pendingWeeklySession.runningHype);
        autoResolveBattlePackage(battlePackage);
        applyBattlePackageToWeeklySession(context, battlePackage);
      });
    }

    function forceExitStuckShowRuntimeForNavigation() {
      const hasShowProgress = Boolean(
        pendingWeeklySession?.results?.length
        || matchAnimationState.currentBattle
        || ensureDivisionBookingState()?.showState?.playedMatchIndexes?.length
      );
      if (hasShowProgress && pendingWeeklySession) {
        autoResolvePendingWeeklySessionMatches();
        stopCanvasLoop();
        stopBattleBgm();
        resetBattlePlaybackState();
        matchAnimationState.running = false;
        matchAnimationState.queue = [];
        matchAnimationState.matchIndex = 0;
        matchAnimationState.currentBattle = null;
        matchAnimationState.effectBattle = null;
        matchAnimationState.effectOutroBattle = null;
        matchAnimationState.finishCallback = null;
        if (typeof clearDivisionShowRuntimeState === "function") {
          clearDivisionShowRuntimeState({ activePage: "result", clearWeeklyCard: true });
        }
        finalizePendingWeeklySession();
        silentSaveGameState();
        return;
      }
      stopCanvasLoop();
      stopBattleBgm();
      resetBattlePlaybackState();
      matchAnimationState.running = false;
      matchAnimationState.queue = [];
      matchAnimationState.matchIndex = 0;
      matchAnimationState.currentBattle = null;
      matchAnimationState.effectBattle = null;
      matchAnimationState.effectOutroBattle = null;
      matchAnimationState.finishCallback = null;
      if (typeof clearDivisionShowRuntimeState === "function") {
        clearDivisionShowRuntimeState({ activePage: "assignment", clearWeeklyCard: true });
      } else {
        const booking = ensureDivisionBookingState();
        booking.showState = null;
        booking.activePage = "assignment";
        gameState.divisionBooking = booking;
        window.__divisionRuntimeShowState = null;
        window.__divisionRuntimeActivePage = "assignment";
        window.__divisionShowFlowMode = "";
      }
      pendingWeeklySummary = null;
      releaseRdPendingMatchStatuses();
      pendingWeeklySession = null;
      silentSaveGameState();
    }

    window.forceExitStuckShowRuntimeForNavigation = forceExitStuckShowRuntimeForNavigation;

    function switchAppTab(nextTab = "home") {
      if (nextTab !== "home" && (matchAnimationState.running || ensureDivisionBookingState()?.showState?.segments?.length || window.__divisionShowFlowMode === "home")) {
        forceExitStuckShowRuntimeForNavigation();
      }
      activeTab = nextTab === "records" ? "missions" : nextTab;
      renderActiveTab();
    }

    window.switchAppTab = switchAppTab;
    window.handleTabButtonClick = function(event, nextTab = "home") {

    function clearDraggedCardState() {
      document.querySelectorAll(".mini-wrestler-card.dragging").forEach((card) => {

      cardDragWrestlerId = "";
      cardPointerDragState = null;
