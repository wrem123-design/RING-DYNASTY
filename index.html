      return Math.floor(((base + staminaBonus) * (gradeMultiplier[wrestler.grade] || 1)) * 0.5);
    }

    // 경기 시작 시 전투용 임시 상태를 만든다.
    function createBattleState(wrestler, opponent = null) {
      const effectiveStats = getEffectiveWrestlerStats(wrestler, opponent);
      const maxHP = calcMaxHP({ ...wrestler, stats: effectiveStats });
      const ageMeta = getAgeStageMeta(wrestler.age || 20);
      return {
        id: wrestler.id,
        templateId: wrestler.templateId || wrestler.id,
        name: wrestler.name,
        nickname: wrestler.nickname,
        grade: wrestler.grade,
        style: wrestler.style,
        alignment: wrestler.alignment || "neutral",
        finisher: wrestler.finisher,
        spriteColor: wrestler.spriteColor,
        spriteSheet: wrestler.spriteSheet,
        battleSpriteSheet: wrestler.battleSpriteSheet || null,
        attackSpriteSheet: getAttackSpritePath(wrestler) || null,
        spriteFrames: wrestler.spriteFrames,
        battleSpriteFrames: wrestler.battleSpriteFrames || 12,
        attackSpriteFrames: wrestler.attackSpriteFrames || 4,
        portraitMode: wrestler.portraitMode,
        maxHP,
        currentHP: maxHP,
        maxStamina: 100,
        currentStamina: 100,
        finisherGauge: 0,
        finisherChargeMultiplier: ageMeta.finisherMultiplier || 1,
        momentum: 50,
        isStunned: false,
        isGrapped: false,
        isDown: false,
        downCount: 0,
        pinCount: 0,
        isPinned: false,
        totalDamageDealt: 0,
        totalDamageReceived: 0,
        attackCount: 0,
        finisherUsed: false,
        criticalHits: 0,
        kickoutsAt2: 0,
        forcedRestTurn: false,
        usedFinisherToWin: false,
        usedCheapShot: false,
        lossStreak: getRecentLossStreak(wrestler),
        age: wrestler.age || 20,
        highlightFlags: {
          criticalComeback: false
        },
        stats: { ...effectiveStats }
      };
    }

    // 전투 상태를 캔버스 렌더링용으로 복사한다.
    function snapshotBattleState(battleState) {
      return {
        id: battleState.id,
        templateId: battleState.templateId || battleState.id,
        name: battleState.name,
        nickname: battleState.nickname,
        grade: battleState.grade,
        style: battleState.style,
        alignment: battleState.alignment,
        finisher: battleState.finisher,
        spriteColor: battleState.spriteColor,
        spriteSheet: battleState.spriteSheet,
        battleSpriteSheet: battleState.battleSpriteSheet || null,
        attackSpriteSheet: getAttackSpritePath(battleState) || null,
        spriteFrames: battleState.spriteFrames,
        battleSpriteFrames: battleState.battleSpriteFrames || 12,
        attackSpriteFrames: battleState.attackSpriteFrames || 4,
        portraitMode: battleState.portraitMode,
        currentHP: battleState.currentHP,
        maxHP: battleState.maxHP,
        currentStamina: battleState.currentStamina,
        maxStamina: battleState.maxStamina,
        finisherGauge: battleState.finisherGauge,
        momentum: battleState.momentum,
        isDown: battleState.isDown,
        isPinned: battleState.isPinned,
        isStunned: battleState.isStunned,
        downCount: battleState.downCount,
        stats: { ...battleState.stats }
      };
    }

    // 스태미나 상태에 따른 데미지 보정을 계산한다.
    function getStaminaModifier(currentStamina) {
      if (currentStamina <= 0) {
        return 0;
      }
      if (currentStamina < 10) {
        return 0.4;
      }
      if (currentStamina < 40) {
        return 0.65;
      }
      if (currentStamina < 70) {
        return 0.85;
      }
      return 1;
    }

    // 스태미나 상태에 따른 성공률 패널티를 계산한다.
    function getStaminaAccuracyPenalty(currentStamina) {
      if (currentStamina <= 0) {
        return 100;
      }
      if (currentStamina < 10) {
        return 30;
      }
      if (currentStamina < 40) {
        return 15;
      }
      if (currentStamina < 70) {
        return 5;
      }
      return 0;
    }

    // 스태미나 상태 문구를 만든다.
    function getStaminaStateLabel(currentStamina) {
      if (currentStamina <= 0) {
        return "완전 탈진";
      }
      if (currentStamina < 10) {
        return "체력 한계!";
      }
      if (currentStamina < 30) {
        return "숨이 가쁘다";
      }
      return "";
    }

    // 턴 시작 시 스태미나 회복량을 계산한다.
    function getStaminaRecoveryAmount(battleState) {
      const recovery = 8 + (battleState.stats.stamina * 0.12);
      return battleState.isDown ? recovery * 2 : recovery;
    }

    // 피니셔 게이지를 충전한다.
    function chargeFinisherGauge(battleState, amount) {
      const gainMultiplier = 1 + (battleState.stats.fame * 0.0025);
      const momentumPenalty = battleState.momentum <= 20 ? 0.7 : 1;
      const styleMod = battleState.styleFinisherChargeModifier || 1;
      battleState.finisherGauge = clamp(
        battleState.finisherGauge + (amount * gainMultiplier * momentumPenalty * (battleState.finisherChargeMultiplier || 1) * styleMod),
        0,
        100
      );
    }

    // 모멘텀을 100 합계로 고정한다.
    function normalizeMomentum(leftState, rightState) {
      leftState.momentum = clamp(leftState.momentum, 0, 100);
      rightState.momentum = clamp(100 - leftState.momentum, 0, 100);
      leftState.momentum = clamp(100 - rightState.momentum, 0, 100);
    }

    // 모멘텀 이동을 적용한다.
    function shiftMomentum(attacker, defender, amount, currentHype, leftState, rightState) {
      const actualAmount = amount * (currentHype >= 80 ? 1.3 : 1);
      attacker.momentum += actualAmount;
      defender.momentum -= actualAmount;
      normalizeMomentum(leftState, rightState);
    }

    // 기본 데미지 공식을 반환한다.
    function getMoveBaseDamage(attacker, moveType) {
      if (moveType === "basic") {
        return 10 + (attacker.stats.power * 0.75);
      }
      if (moveType === "power") {
        return 24 + (attacker.stats.power * 1.5);
      }
      if (moveType === "technical") {
        return 18 + (attacker.stats.power * 0.7) + (attacker.stats.technique * 0.55);
      }
      if (moveType === "finisher") {
        return (24 + (attacker.stats.power * 1.45)) * 3.2;
      }
      return 0;
    }

    // 실제 데미지를 계산한다.
    function calcDamage(attacker, defender, moveType) {
      const base = getMoveBaseDamage(attacker, moveType);
      const staminaMod = getStaminaModifier(attacker.currentStamina);
      const powerMod = clamp(1 + ((attacker.stats.power - 60) * 0.009), 0.75, 1.45);
      const random = 0.9 + (Math.random() * 0.25);
      const defense = clamp(1 - (defender.stats.stamina * 0.0025), 0.72, 1);
      const styleImpact = getStyleImpactModifier(attacker.style, defender.style);
      const momentumMod = attacker.momentum > 60
        ? 1 + ((attacker.momentum - 60) * 0.006)
        : 1 - ((60 - attacker.momentum) * 0.004);
      const critChance = clamp(((attacker.stats.power - 55) * 0.003) + (attacker.stats.technique * 0.0015), 0.03, 0.18);
      const isCrit = Math.random() < critChance;
      const critMod = isCrit ? 1.65 : 1;
      const finalDamage = Math.floor(base * staminaMod * powerMod * random * defense * momentumMod * critMod * styleImpact.damage);

      return {
        damage: Math.max(1, finalDamage),
        isCrit,
        styleImpact
      };
    }

    // 명중률을 계산한다.
    function calcAttackSuccessChance(attacker, defender) {
      let successChance = 82;
      successChance += attacker.stats.technique * 0.08;
      successChance -= getStaminaAccuracyPenalty(attacker.currentStamina);
      successChance += getStyleImpactModifier(attacker.style, defender.style).accuracy;
      if (attacker.momentum >= 80) {
        successChance += 6;
      }
      if (attacker.momentum <= 30) {
        successChance -= 8;
      }
      return clamp(successChance, 45, 97);
    }

    // 피니셔 성공률을 계산한다.
    function calcFinisherSuccessChance(attacker, defender) {
      let successChance = 70;
      successChance += attacker.stats.fame * 0.25;
      if ((defender.currentStamina / defender.maxStamina) < 0.2) {
        successChance += 20;
      }
      successChance -= defender.stats.technique * 0.15;
      return clamp(successChance, 40, 95);
    }

    function calcDodgeChance(attacker, defender) {
      const staminaRatio = defender.currentStamina / Math.max(1, defender.maxStamina || 100);
      let chance = 0.02;
      chance += defender.stats.technique * 0.0018;
      chance -= attacker.stats.technique * 0.0007;
      chance += defender.momentum >= 70 ? 0.015 : 0;
      chance -= attacker.momentum >= 75 ? 0.01 : 0;
      if (staminaRatio < 0.35) {
        chance *= 0.7;
      }
      return clamp(chance, 0.02, 0.18);
    }

    function calcBlockChance(attacker, defender) {
      const staminaRatio = defender.currentStamina / Math.max(1, defender.maxStamina || 100);
      let chance = 0.05;
      chance += defender.stats.charisma * 0.0022;
      chance -= attacker.stats.power * 0.0008;
      chance += defender.momentum >= 65 ? 0.015 : 0;
      if (staminaRatio < 0.25) {
        chance *= 0.75;
      }
      return clamp(chance, 0.05, 0.28);
    }

    function resolveDefenseReaction(attacker, defender, moveType) {
      if (moveType === "finisher" || moveType === "submission") {
        return { type: "none", multiplier: 1 };
      }
      if (Math.random() < calcDodgeChance(attacker, defender)) {
        return { type: "dodge", multiplier: 0 };
      }
      if (Math.random() < calcBlockChance(attacker, defender)) {
        return { type: "block", multiplier: 0.5 };
      }
      return { type: "none", multiplier: 1 };
    }

    function calcAttackCount(attacker, moveType) {
      if (moveType === "finisher" || moveType === "submission") {
        return 1;
      }
      const tech = attacker.stats.technique || 0;
      if (tech >= 85) {
        const roll = Math.random();
        if (roll < 0.02) {
          return 3;
        }
        if (roll < 0.16) {
          return 2;
        }
        return 1;
      }
      if (tech >= 70) {
        return Math.random() < 0.08 ? 2 : 1;
      }
      return 1;
    }

    // 자동 전투 AI가 사용할 기술을 선택한다.
    function chooseMove(attacker, defender) {
      if (attacker.finisherGauge >= 100 && ((defender.currentHP / defender.maxHP) < 0.35 || attacker.ppvLadderMode)) {
        return "finisher";
      }

      if (defender.isDown && attacker.stats.technique >= 55 && attacker.currentStamina >= 25) {
        if (Math.random() < attacker.stats.technique * 0.008) {
          return "submission";
        }
      }

      if (attacker.currentStamina < 12) {
        return "basic";
      }

      const powerPrefer = attacker.stats.power * 0.012;
      const techPrefer = attacker.stats.technique * 0.010;
      const random = Math.random();
      const total = powerPrefer + techPrefer + 0.4;

      if (random < 0.4 / total) {
        return "basic";
      }
      if (random < (0.4 + powerPrefer) / total) {
        return "power";
      }
      if (attacker.stats.technique >= 40) {
        return "technical";
      }
      return "basic";
    }

    // 기술 사용 가능 여부를 검사한다.
    function canUseMove(attacker, defender, moveType) {
      if (moveType === "basic") {
        return attacker.currentStamina >= 5;
      }
      if (moveType === "power") {
        return attacker.currentStamina >= 12 && attacker.stats.technique >= 20;
      }
      if (moveType === "technical") {
        return attacker.currentStamina >= 18 && attacker.stats.technique >= 40;
      }
      if (moveType === "submission") {
        return attacker.currentStamina >= 25 && attacker.stats.technique >= 55 && defender.isDown;
      }
      if (moveType === "finisher") {
        return attacker.currentStamina >= 40 && attacker.finisherGauge >= 100 && ((defender.currentHP / defender.maxHP) <= 0.35 || attacker.ppvLadderMode);
      }
      return false;
    }

    // 현재 턴 선공을 정한다.
    function chooseAttackerOrder(leftState, rightState, nextAttackerId = "") {
      if (nextAttackerId === leftState.id) {
        return [leftState, rightState];
      }
      if (nextAttackerId === rightState.id) {
        return [rightState, leftState];
      }
      const leftInitiative = (leftState.stats.fame * 1.1) + (leftState.momentum * 0.2) + (leftState.currentStamina * 0.08);
      const rightInitiative = (rightState.stats.fame * 1.1) + (rightState.momentum * 0.2) + (rightState.currentStamina * 0.08);
      if (Math.abs(leftInitiative - rightInitiative) >= 6) {
        return leftInitiative > rightInitiative ? [leftState, rightState] : [rightState, leftState];
      }
      return Math.random() < 0.5 ? [leftState, rightState] : [rightState, leftState];
    }

    function shouldGrantBonusTurn(attacker, defender, moveType, success) {
      if (!success || moveType === "finisher" || moveType === "submission") {
        return false;
      }
      const fameGap = (attacker.stats.fame || 0) - (defender.stats.fame || 0);
      const staminaRatio = attacker.currentStamina / Math.max(1, attacker.maxStamina || 100);
      let chance = 0.02;
      chance += Math.max(0, fameGap) * 0.0022;
      chance += attacker.stats.fame >= 85 ? 0.04 : attacker.stats.fame >= 70 ? 0.02 : 0;
      if (staminaRatio < 0.35) {
        chance *= 0.6;
      }
      if ((defender.currentHP / Math.max(1, defender.maxHP || 1)) < 0.25) {
        chance += 0.02;
      }
      return Math.random() < clamp(chance, 0.02, 0.18);
    }

    // 턴 시작 리소스 회복을 처리한다.
    function recoverBattleResources(leftState, rightState, currentHype) {
      [leftState, rightState].forEach((battleState) => {
        if (battleState.currentStamina <= 0) {
          battleState.currentStamina = clamp(battleState.currentStamina + 20, 0, battleState.maxStamina);
          battleState.forcedRestTurn = true;
          return;
        }

        battleState.currentStamina = clamp(
          battleState.currentStamina + getStaminaRecoveryAmount(battleState),
          0,
          battleState.maxStamina
        );

        if (currentHype >= 70) {
          chargeFinisherGauge(battleState, 2);
        }
      });
    }

    // 핀폴 탈출 확률을 계산한다.
    function calcKickoutChance(defender) {
      let chance = ((defender.currentHP / defender.maxHP) * 100) + (defender.stats.stamina * 0.4) - (defender.downCount * 12);
      if (defender.alignment === "face") {
        chance += 5;
      }
      return clamp(chance, 5, 90);
    }

    // 핀폴 시도를 계산한다.
    function resolvePinAttempt(attacker, defender) {
      defender.isPinned = true;
      const kickoutChance = calcKickoutChance(defender);
      const biasedReferee = attacker.alignment === "heel";

      for (let count = 1; count <= (biasedReferee ? 1 : 2); count += 1) {
        if ((Math.random() * 100) < kickoutChance) {
          defender.isPinned = false;
          defender.isDown = false;
          defender.currentHP = clamp(defender.currentHP + (defender.maxHP * 0.05), 0, defender.maxHP);
          if (count === 2) {
            defender.kickoutsAt2 += 1;
            defender.highlightFlags.criticalComeback = true;
          }
          return {
            escapedAt: count,
            kickoutChance,
            winner: null,
            pinText: count === 1 ? "1 카운트 탈출!" : "2 카운트 탈출!"
          };
        }
      }

      return {
        escapedAt: 0,
        kickoutChance,
        winner: attacker,
        pinText: `3! ${attacker.name} 승리!`
      };
    }

    // 서브미션 판정을 계산한다.
    function resolveSubmission(attacker, defender) {
      attacker.currentStamina = clamp(attacker.currentStamina - MOVE_COSTS.submission, 0, attacker.maxStamina);
      defender.currentStamina = clamp(defender.currentStamina - 20, 0, defender.maxStamina);
      attacker.attackCount += 1;
      attacker.isGrapped = true;
      const surviveChance = clamp(defender.stats.stamina * 0.9, 5, 95);
      const escaped = (Math.random() * 100) < surviveChance;
      attacker.isGrapped = false;

      return {
        success: true,
        damage: 0,
        isCrit: false,
        tappedOut: !escaped,
        text: escaped ? `${defender.name}가 서브미션을 버텨냈다!` : `${defender.name}가 탭아웃했다!`,
        moveName: "Submission"
      };
    }

    // 다운 판정을 계산한다.
    function shouldKnockDown(defender, moveType, wasFinisherSuccess) {
      if (wasFinisherSuccess) {
        return true;
      }

      let chance = 0;
      if ((defender.currentHP / defender.maxHP) <= 0.3) {
        chance = Math.max(chance, 0.8);
      }
      if (defender.currentStamina <= 0 && moveType === "power") {
        chance = Math.max(chance, 0.5);
      }
      chance += defender.downCount * 0.1;
      return Math.random() < clamp(chance, 0, 0.95);
    }

    // 경기 하이라이트 유형을 판정한다.
    function getBattleHighlight(winnerState, loserState) {
      if (winnerState.usedFinisherToWin) {
        return "FINISHER";
      }
      if (loserState.highlightFlags.criticalComeback && loserState.kickoutsAt2 > 0) {
        return "CRITICAL_COMEBACK";
      }
      if (Math.abs(winnerState.currentHP - loserState.currentHP) <= (winnerState.maxHP * 0.15)) {
        return "CLOSE_MATCH";
      }
      if ((winnerState.currentHP / winnerState.maxHP) >= 0.7) {
        return "DOMINANT";
      }
      return "CLOSE_MATCH";
    }

    // 디버그 로그를 콘솔에 남긴다.
    function logDebugTurn(turn, attacker, moveType, result) {
      if (!DEBUG_MODE) {
        return;
      }
      console.log(`TURN ${turn}: ${attacker.name} uses ${moveType}`);
      console.log(`  → Damage: ${result.damage || 0} (crit: ${Boolean(result.isCrit)})`);
      if (result.defender) {
        console.log(`  → HP: ${Math.floor(result.defender.currentHP)}/${Math.floor(result.defender.maxHP)}`);
      }
      console.log(`  → Finisher: ${Math.floor(attacker.finisherGauge)}%`);
    }

    // 전투 이벤트 데이터를 한 번에 만든다.
    function createBattleEvent(turn, attacker, defender, beforeLeft, beforeRight, afterLeft, afterRight, payload) {
      return {
        turn,
        attackerId: attacker.id,
        defenderId: defender.id,
        beforeLeft,
        beforeRight,
        afterLeft,
        afterRight,
        ...payload
      };
    }

    // 전투를 완전히 계산해서 애니메이션 타임라인과 결과를 만든다.
    function runBattleSimulation(wrestlerA, wrestlerB, options = {}) {
      const leftState = createBattleState(wrestlerA, wrestlerB);
      const rightState = createBattleState(wrestlerB, wrestlerA);
      const matchType = options.matchType || "";
      const turnLimit = getBattleTurnLimit(matchType);
      const battlePaceMultiplier = matchType === "IRON_MAN_MATCH" ? 1.12 : 1.18;
      const ironManScores = { [leftState.id]: 0, [rightState.id]: 0 };
      leftState.finisherChargeMultiplier = (options.finisherChargeMultiplier || 1) * battlePaceMultiplier;
      rightState.finisherChargeMultiplier = (options.finisherChargeMultiplier || 1) * battlePaceMultiplier;
      leftState.ppvLadderMode = matchType === "LADDER_MATCH";
      rightState.ppvLadderMode = matchType === "LADDER_MATCH";
      leftState.styleFinisherChargeModifier = getStyleImpactModifier(leftState.style, rightState.style).finisher;
      rightState.styleFinisherChargeModifier = getStyleImpactModifier(rightState.style, leftState.style).finisher;
      const battleEvents = [];
      let winnerState = null;
      let loserState = null;
      let finishType = "PINFALL";
      let turn = 0;
      let nextAttackerId = "";
      let currentHype = clamp(options.startingHype ?? gameState.hype, 0, 100);
      const styleMessage = getStyleImpactModifier(leftState.style, rightState.style).text || getStyleImpactModifier(rightState.style, leftState.style).text;
      if (leftState.alignment === "heel" && rightState.alignment !== "heel") {
        leftState.momentum += 10;
        rightState.momentum -= 10;
      }
      if (rightState.alignment === "heel" && leftState.alignment !== "heel") {
        rightState.momentum += 10;
        leftState.momentum -= 10;
      }
      normalizeMomentum(leftState, rightState);

      while (!winnerState && turn < turnLimit) {
        turn += 1;
        recoverBattleResources(leftState, rightState, currentHype);
        const [attacker, defender] = chooseAttackerOrder(leftState, rightState, nextAttackerId);
        const beforeLeft = snapshotBattleState(leftState);
        const beforeRight = snapshotBattleState(rightState);
        let moveType = chooseMove(attacker, defender);
        let eventType = "hit";
        let success = true;
        let damage = 0;
        let isCrit = false;
        let actionText = "";
        let resultText = "";
        let pinResult = null;
        let usedFinisher = false;
        let cheapShotUsed = false;
        let cheapShotCaught = false;
        let escapeAttempted = false;
        let comboCount = 1;
        let hitDamages = [];
        let defenseReaction = "none";

        if (matchType === "CAGE_MATCH" && Math.random() < 0.10) {
          escapeAttempted = true;
          if (Math.random() < (attacker.alignment === "heel" ? 0.20 : 0.10)) {
            winnerState = attacker;
            loserState = defender;
            finishType = "ESCAPE";
            actionText = `${attacker.name}가 철창 탈출을 시도한다!`;
            resultText = "철창 탈출 성공!";
          } else {
            shiftMomentum(defender, attacker, 15, currentHype, leftState, rightState);
            actionText = `${attacker.name}가 철창 탈출을 시도한다!`;
            resultText = `${defender.name}가 탈출을 저지했다!`;
          }
        }

        if (escapeAttempted) {
          battleEvents.push(createBattleEvent(
            turn,
            attacker,
            defender,
            beforeLeft,
            beforeRight,
            snapshotBattleState(leftState),
            snapshotBattleState(rightState),
            {
              type: "escape",
              moveType: "escape",
              moveName: "Escape",
              success: Boolean(winnerState),
              damage: 0,
              isCrit: false,
              actionText,
              resultText,
              pinResult: null,
              usedFinisher: false,
              hypeAfter: currentHype,
              debugText: "escape-attempt",
              styleAdvantage: false
            }
          ));
          if (winnerState) {
            break;
          }
          nextAttackerId = defender.id;
          continue;
        }

        if (attacker.isStunned) {
          attacker.isStunned = false;
          battleEvents.push(createBattleEvent(
            turn,
            attacker,
            defender,
            beforeLeft,
            beforeRight,
            snapshotBattleState(leftState),
            snapshotBattleState(rightState),
            {
              type: "stunned",
              moveType: "stunned",
              moveName: "Stunned",
              success: false,
              damage: 0,
              isCrit: false,
              actionText: `${attacker.name}는 기절 상태다!`,
              resultText: "이번 턴은 아무것도 하지 못했다.",
              pinResult: null,
              usedFinisher: false,
              hypeAfter: currentHype,
              debugText: "stunned",
              styleAdvantage: false
            }
          ));
          logDebugTurn(turn, attacker, "stunned", { damage: 0, defender });
          nextAttackerId = defender.id;
          continue;
        }

        if (attacker.forcedRestTurn) {
          attacker.forcedRestTurn = false;
          battleEvents.push(createBattleEvent(
            turn,
            attacker,
            defender,
            beforeLeft,
            beforeRight,
            snapshotBattleState(leftState),
            snapshotBattleState(rightState),
            {
              type: "rest",
              moveType: "rest",
              moveName: "Rest",
              success: true,
              damage: 0,
              isCrit: false,
              actionText: `${attacker.name}가 숨을 고른다.`,
              resultText: "스태미나 +20",
              pinResult: null,
              usedFinisher: false,
              hypeAfter: currentHype,
              debugText: "forced-rest",
              styleAdvantage: false
            }
          ));
          logDebugTurn(turn, attacker, "rest", { damage: 0, defender });
          nextAttackerId = defender.id;
          continue;
        }

        if (!canUseMove(attacker, defender, moveType)) {
          moveType = "basic";
        }

        if (!canUseMove(attacker, defender, moveType)) {
          attacker.currentStamina = clamp(attacker.currentStamina + 20, 0, attacker.maxStamina);
          battleEvents.push(createBattleEvent(
            turn,
            attacker,
            defender,
            beforeLeft,
            beforeRight,
            snapshotBattleState(leftState),
            snapshotBattleState(rightState),
            {
              type: "rest",
              moveType: "rest",
              moveName: "Rest",
              success: true,
              damage: 0,
              isCrit: false,
              actionText: `${attacker.name}가 체력을 회복한다.`,
              resultText: "행동 불가로 휴식",
              pinResult: null,
              usedFinisher: false,
              hypeAfter: currentHype,
              debugText: "rest-by-cost",
              styleAdvantage: false
            }
          ));
          logDebugTurn(turn, attacker, "rest", { damage: 0, defender });
          nextAttackerId = defender.id;
          continue;
        }

        actionText = `${attacker.name}가 ${moveType === "finisher" ? attacker.finisher : (MOVE_LABELS[moveType] || moveType)}를 시도한다!`;

        if (moveType === "submission") {
          const submissionResult = resolveSubmission(attacker, defender);
          eventType = "submission";
          success = true;
          resultText = submissionResult.text;
          if (submissionResult.tappedOut) {
            winnerState = attacker;
            loserState = defender;
            finishType = "SUBMISSION";
          }
        } else {
          const successChance = calcAttackSuccessChance(attacker, defender);
          const attackSucceeded = Math.random() * 100 < successChance;

          if (!attackSucceeded) {
            success = false;
            eventType = "miss";
            resultText = "DODGE!";
            shiftMomentum(defender, attacker, 5, currentHype, leftState, rightState);
          } else if (moveType === "finisher") {
            usedFinisher = true;
            attacker.currentStamina = clamp(attacker.currentStamina - MOVE_COSTS.finisher, 0, attacker.maxStamina);
            const finisherChance = calcFinisherSuccessChance(attacker, defender);

            if (Math.random() * 100 <= finisherChance) {
            const finisherDamage = calcDamage(attacker, defender, "finisher");
            damage = finisherDamage.damage;
            isCrit = finisherDamage.isCrit;
              hitDamages = [damage];
              defender.currentHP = clamp(defender.currentHP - damage, 0, defender.maxHP);
              attacker.totalDamageDealt += damage;
              defender.totalDamageReceived += damage;
              attacker.attackCount += 1;
              attacker.finisherGauge = 0;
              attacker.finisherUsed = true;
              chargeFinisherGauge(attacker, damage * 0.08);
              chargeFinisherGauge(defender, damage * 0.04);
              defender.isDown = true;
              defender.downCount += 1;
              currentHype = clamp(currentHype + 10, 0, 100);
              eventType = "finisher";
              resultText = `${attacker.finisher}!!! → ${damage} 데미지`;
              shiftMomentum(attacker, defender, isCrit ? 20 : 18, currentHype, leftState, rightState);
              if (matchType === "LADDER_MATCH") {
                winnerState = attacker;
                loserState = defender;
                attacker.usedFinisherToWin = true;
                finishType = "LADDER";
              } else {
                pinResult = resolvePinAttempt(attacker, defender);
                if (pinResult.escapedAt > 0) {
                  currentHype = clamp(currentHype + 8, 0, 100);
                  shiftMomentum(defender, attacker, 12 + (defender.alignment === "face" ? 10 : 0), currentHype, leftState, rightState);
                  chargeFinisherGauge(defender, 15);
                  resultText += ` / ${pinResult.pinText}`;
                  if ((defender.currentHP / defender.maxHP) <= 0.1) {
                    defender.highlightFlags.criticalComeback = true;
                  }
                } else if (pinResult.winner) {
                  if (matchType === "IRON_MAN_MATCH") {
                    ironManScores[attacker.id] += 1;
                    defender.isDown = false;
                    attacker.currentHP = clamp(attacker.currentHP + (attacker.maxHP * 0.15), 0, attacker.maxHP);
                    defender.currentHP = clamp(defender.maxHP * 0.55, 0, defender.maxHP);
                    resultText += ` / 폴 획득! ${ironManScores[leftState.id]}:${ironManScores[rightState.id]}`;
                  } else {
                    winnerState = attacker;
                    loserState = defender;
                    attacker.usedFinisherToWin = true;
                    finishType = "PINFALL";
                  }
                }
              }
            } else {
              success = false;
              eventType = "finisher-counter";
              damage = 50;
              hitDamages = [damage];
              attacker.currentHP = clamp(attacker.currentHP - damage, 0, attacker.maxHP);
              attacker.totalDamageReceived += damage;
              defender.totalDamageDealt += damage;
              attacker.finisherGauge = clamp(attacker.finisherGauge - 50, 0, 100);
              resultText = `${defender.name}이 피니셔를 카운터했다!`;
              shiftMomentum(defender, attacker, 15, currentHype, leftState, rightState);
            }
          } else {
            const defenseOutcome = resolveDefenseReaction(attacker, defender, moveType);
            defenseReaction = defenseOutcome.type;
            if (defenseOutcome.type === "dodge") {
              success = false;
              eventType = "miss";
              resultText = "DODGE!";
              shiftMomentum(defender, attacker, 7, currentHype, leftState, rightState);
            } else {
            comboCount = calcAttackCount(attacker, moveType);
            attacker.currentStamina = clamp(attacker.currentStamina - MOVE_COSTS[moveType] - ((comboCount - 1) * 4), 0, attacker.maxStamina);
            hitDamages = [];
            for (let comboIndex = 0; comboIndex < comboCount; comboIndex += 1) {
              const damageResult = calcDamage(attacker, defender, moveType);
              let hitDamage = damageResult.damage;
              if (comboIndex > 0) {
                hitDamage = Math.max(1, Math.floor(hitDamage * Math.pow(0.7, comboIndex)));
              }
              damage += hitDamage;
              hitDamages.push(hitDamage);
              isCrit = isCrit || damageResult.isCrit;
            }
            if (defenseOutcome.type === "block") {
              eventType = "block";
              hitDamages = hitDamages.map((value) => Math.max(1, Math.floor(value * defenseOutcome.multiplier)));
              damage = hitDamages.reduce((sum, value) => sum + value, 0);
            }
            if (attacker.alignment === "heel" && moveType !== "technical" && Math.random() < 0.15) {
              cheapShotUsed = true;
              attacker.usedCheapShot = true;
              const cheapShotMultiplier = matchType === "CAGE_MATCH" ? 1.8 : 1.4;
              hitDamages = hitDamages.map((value) => Math.max(1, Math.floor(value * cheapShotMultiplier)));
              damage = hitDamages.reduce((sum, value) => sum + value, 0);
              if (Math.random() < 0.5) {
                cheapShotCaught = true;
                currentHype = clamp(currentHype - 8, 0, 100);
              }
            }
            defender.currentHP = clamp(defender.currentHP - damage, 0, defender.maxHP);
            attacker.totalDamageDealt += damage;
            defender.totalDamageReceived += damage;
            attacker.attackCount += comboCount;
            chargeFinisherGauge(attacker, damage * 0.08);
            chargeFinisherGauge(defender, damage * 0.04);
            resultText = `${defenseOutcome.type === "block" ? "BLOCK! " : "→ "}${damage} 데미지${comboCount > 1 ? ` / ${comboCount}연타` : ""}${isCrit ? " (치명타)" : ""}${cheapShotUsed ? " / 반칙 공격!" : ""}${cheapShotCaught ? " / 발각! Hype -8" : ""}`;
            shiftMomentum(attacker, defender, defenseOutcome.type === "block" ? 3 : (isCrit ? 10 : 5), currentHype, leftState, rightState);

            if (isCrit) {
              attacker.criticalHits += 1;
              currentHype = clamp(currentHype + 5, 0, 100);
              if ((moveType === "power" || moveType === "technical") && Math.random() < 0.3) {
                defender.isStunned = true;
              }
            }
            if (comboCount > 1) {
              currentHype = clamp(currentHype + comboCount, 0, 100);
            }

            if (shouldKnockDown(defender, moveType, false) || defender.currentHP <= 0) {
              defender.isDown = true;
              defender.downCount += 1;
              eventType = "pin";
              if (matchType !== "LADDER_MATCH") {
                pinResult = resolvePinAttempt(attacker, defender);
                if (pinResult.escapedAt > 0) {
                  currentHype = clamp(currentHype + 8, 0, 100);
                  shiftMomentum(defender, attacker, 12 + (defender.alignment === "face" ? 10 : 0), currentHype, leftState, rightState);
                  chargeFinisherGauge(defender, 15);
                  resultText += ` / ${pinResult.pinText}`;
                  if ((defender.currentHP / defender.maxHP) <= 0.1) {
                    defender.highlightFlags.criticalComeback = true;
                  }
                } else if (pinResult.winner) {
                  if (matchType === "IRON_MAN_MATCH") {
                    ironManScores[attacker.id] += 1;
                    defender.isDown = false;
                    attacker.currentHP = clamp(attacker.currentHP + (attacker.maxHP * 0.10), 0, attacker.maxHP);
                    defender.currentHP = clamp(defender.maxHP * 0.55, 0, defender.maxHP);
                    resultText += ` / 폴 획득! ${ironManScores[leftState.id]}:${ironManScores[rightState.id]}`;
                  } else {
                    winnerState = attacker;
                    loserState = defender;
                    finishType = "PINFALL";
                  }
                }
              }
            }
            if (cheapShotUsed && attacker.lossStreak >= 3 && attacker.alignment !== "heel") {
              attacker.pendingAlignmentTurn = "heel";
            }
            }
          }
        }

        const event = createBattleEvent(
          turn,
          attacker,
          defender,
          beforeLeft,
          beforeRight,
          snapshotBattleState(leftState),
          snapshotBattleState(rightState),
          {
            type: eventType,
            moveType,
            moveName: moveType === "finisher" ? attacker.finisher : (MOVE_LABELS[moveType] || moveType),
            success,
            damage,
            isCrit,
            actionText,
            resultText,
            pinResult,
            usedFinisher,
            comboCount,
            hitDamages,
            hypeAfter: currentHype,
            debugText: `${attacker.name}/${moveType}/${resultText}`,
            styleAdvantage: getStyleImpactModifier(attacker.style, defender.style).matchup > 0,
            cheapShotUsed,
            cheapShotCaught,
            defenseReaction
          }
        );
        battleEvents.push(event);
        nextAttackerId = shouldGrantBonusTurn(attacker, defender, moveType, success) ? attacker.id : defender.id;
        logDebugTurn(turn, attacker, moveType, { damage, isCrit, defender });
      }

      if ((matchType === "IRON_MAN_MATCH") && !winnerState) {
        winnerState = ironManScores[leftState.id] >= ironManScores[rightState.id] ? leftState : rightState;
        loserState = winnerState.id === leftState.id ? rightState : leftState;
        finishType = "IRON_MAN";
      }

      if (!winnerState || !loserState) {
        winnerState = leftState.currentHP >= rightState.currentHP ? leftState : rightState;
        loserState = winnerState.id === leftState.id ? rightState : leftState;
        finishType = "TIME_LIMIT";
        battleEvents.push(createBattleEvent(
          turn,
          winnerState,
          loserState,
          snapshotBattleState(leftState),
          snapshotBattleState(rightState),
          snapshotBattleState(leftState),
          snapshotBattleState(rightState),
          {
            type: "time-limit",
            moveType: "time-limit",
            moveName: "Time Limit",
            success: true,
            damage: 0,
            isCrit: false,
            actionText: "시간 제한 도달",
            resultText: `TIME LIMIT! ${winnerState.name} 판정승!`,
            pinResult: null,
            usedFinisher: false,
            hypeAfter: currentHype,
            debugText: "time-limit"
          }
        ));
      }

      const highlight = getBattleHighlight(winnerState, loserState);
      let hypeGenerated = clamp(
        Math.floor(turn / 4)
        + HIGHLIGHT_BONUS[highlight]
        + (winnerState.criticalHits * 2)
        + (loserState.kickoutsAt2 * 4),
        5,
        40
      );
      if (matchType === "LADDER_MATCH") {
        hypeGenerated = clamp(hypeGenerated + 20, 5, 60);
      } else if (matchType === "IRON_MAN_MATCH") {
        hypeGenerated = clamp(hypeGenerated + 30, 5, 70);
      }

      return {
        leftState,
        rightState,
        battleEvents,
        styleMessage,
        battleResult: {
          winnerId: winnerState.id,
          loserId: loserState.id,
          totalTurns: Math.max(turn, 1),
          turnLimit,
          finishType,
          winnerStats: {
            damageDealt: winnerState.totalDamageDealt,
            damageReceived: winnerState.totalDamageReceived,
            finisherUsed: winnerState.finisherUsed,
            criticalHits: winnerState.criticalHits,
            stamina: Math.floor(winnerState.currentStamina),
            cheapShotUsed: Boolean(winnerState.usedCheapShot)
          },
          loserStats: {
            damageDealt: loserState.totalDamageDealt,
            damageReceived: loserState.totalDamageReceived,
            kickoutsAt2: loserState.kickoutsAt2,
            finisherUsed: loserState.finisherUsed,
            cheapShotUsed: Boolean(loserState.usedCheapShot)
          },
          hypeGenerated,
          highlight,
          matchTypeLabel: matchType || "STANDARD",
          alignmentTurn: winnerState.pendingAlignmentTurn || loserState.pendingAlignmentTurn || "",
          alignmentTurnId: winnerState.pendingAlignmentTurn ? winnerState.id : (loserState.pendingAlignmentTurn ? loserState.id : "")
        },
        animationTimings: BATTLE_ANIMATION_TIMINGS,
        totalDuration: BATTLE_ANIMATION_TIMINGS.intro + (battleEvents.length * BATTLE_ANIMATION_TIMINGS.event) + BATTLE_ANIMATION_TIMINGS.outro
      };
    }

    // 홈 탭 표시 문구를 STEP 4 전투 기준으로 다시 정의한다.
    function getHomeArenaLabel() {
      return `${STAGE_LABELS[gameState.stage] || "인디 체육관"} 경기장`;
    }

    function getHomeMatchPreviewLines() {
      const readyMatches = getReadyMatches().map((slot) => {
        const wrestlerA = findWrestlerById(slot.wrestlerAId);
        const wrestlerB = findWrestlerById(slot.wrestlerBId);
        if (!wrestlerA || !wrestlerB) {
          return null;
        }
        return `${wrestlerA.name} VS ${wrestlerB.name}`;
      }).filter(Boolean);

      return readyMatches.length ? readyMatches : ["이번 주 아직 편성된 경기가 없습니다"];
    }

    function getBattleCommandLabel(commandKey, snapshot = null) {
      if (commandKey === "basic") {
        return "기본 타격";
      }
      if (commandKey === "power") {
        return "파워 무브";
      }
      if (commandKey === "technical") {
        return "테크니컬";
      }
      if (commandKey === "submission") {
        return "서브미션";
      }
      if (commandKey === "finisher") {
        return snapshot?.finisher || "피니셔";
      }
      return "기본 타격";
    }

    function getBattleActionOptionsForSnapshot(attackerSnapshot, defenderSnapshot) {
      const attacker = attackerSnapshot || {
        style: "powerhouse",
        currentStamina: 100,
        maxStamina: 100,
        finisherGauge: 0,
        stats: { technique: 60 },
        finisher: "피니셔"
      };
      const defender = defenderSnapshot || {
        currentHP: 100,
        maxHP: 100,
        currentStamina: 100,
        maxStamina: 100,
        isDown: false,
        stats: { technique: 55 }
      };
      const preferredKeys = attacker.style === "technician"
        ? ["technical", "basic", "submission", "power", "finisher"]
        : attacker.style === "showman"
          ? ["technical", "power", "basic", "finisher", "submission"]
          : ["power", "basic", "technical", "finisher", "submission"];
      const keys = [];
      preferredKeys.concat(["basic", "power", "technical", "submission", "finisher"]).forEach((key) => {
        if (!keys.includes(key)) {
          keys.push(key);
        }
      });
      const enabledKeys = keys.filter((key) => canUseMove(attacker, defender, key));
      const visibleKeys = [];
      enabledKeys.forEach((key) => {
        if (!visibleKeys.includes(key) && visibleKeys.length < 3) {
          visibleKeys.push(key);
        }
      });
      keys.forEach((key) => {
        if (!visibleKeys.includes(key) && visibleKeys.length < 3) {
          visibleKeys.push(key);
        }
      });
      return visibleKeys.map((key) => ({
        key,
        label: getBattleCommandLabel(key, attacker),
        enabled: canUseMove(attacker, defender, key)
      }));
    }

    function getBattleIntroDuration() {
      return typeof INTRO_DURATION === "number" ? INTRO_DURATION : BATTLE_ANIMATION_TIMINGS.intro;
    }

    function getBattleOutroDuration() {
      return typeof OUTRO_DURATION === "number" ? OUTRO_DURATION : BATTLE_ANIMATION_TIMINGS.outro;
    }

    function resetBattlePlaybackState() {
      battlePlaybackState.battleIndex = -1;
      battlePlaybackState.phase = "idle";
      battlePlaybackState.phaseStartTime = 0;
      battlePlaybackState.sequenceCursor = 0;
      battlePlaybackState.currentSourceEventIndex = -1;
      battlePlaybackState.selectedCommandKey = "";
      battlePlaybackState.renderEvent = null;
    }

    function getBattleCommandTimeoutMs() {
      return 15000;
    }

    function autoSelectBattleCommand(now = performance.now()) {
      const battlePackage = matchAnimationState.currentBattle;
      const event = getCurrentPlayerCommandEvent(battlePackage);
      if (!battlePackage || !event || battlePlaybackState.phase !== "wait-command") {
        return false;
      }
      const resolution = resolveBattleTurn(battlePackage, "basic");
      if (!resolution.event) {
        return false;
      }
      battlePlaybackState.selectedCommandKey = "basic";
      battlePlaybackState.currentSourceEventIndex = battlePackage.battleEvents.length - 1;
      battlePlaybackState.renderEvent = resolution.event;
      battlePlaybackState.sequenceCursor = battlePackage.battleEvents.length;
      battlePlaybackState.phase = resolution.attackerIsPlayer ? "event-player" : "event-enemy";
      battlePlaybackState.phaseStartTime = now;
      battleCommandState.selectedByTurn[`${matchAnimationState.matchIndex}:${event.turn || 0}`] = "basic";
      battleCommandState.lastPanelKey = "";
      updateBattleActionPanel(true);
      return true;
    }

    function findBattleEventIndex(battlePackage, startIndex, predicate) {
      if (!battlePackage || !Array.isArray(battlePackage.battleEvents)) {
        return -1;
      }
      for (let index = Math.max(0, startIndex); index < battlePackage.battleEvents.length; index += 1) {
        const event = battlePackage.battleEvents[index];
        if (predicate(event, index)) {
          return index;
        }
      }
      return -1;
    }

    function getBattleStateById(battlePackage, wrestlerId) {
      if (!battlePackage || !wrestlerId) {
        return null;
      }
      if (battlePackage.leftState?.id === wrestlerId) {
        return battlePackage.leftState;
      }
      if (battlePackage.rightState?.id === wrestlerId) {
        return battlePackage.rightState;
      }
      return null;
    }

    function getEventPreAttacker(event) {
      if (!event) {
        return null;
      }
      return event.attackerId === event.beforeLeft?.id ? event.beforeLeft : event.beforeRight;
    }

    function getEventPreDefender(event) {
      if (!event) {
        return null;
      }
      return event.defenderId === event.beforeLeft?.id ? event.beforeLeft : event.beforeRight;
    }

    function createBattlePackage(wrestlerA, wrestlerB, options = {}) {
      const leftState = createBattleState(wrestlerA, wrestlerB);
      const rightState = createBattleState(wrestlerB, wrestlerA);
      const matchType = options.matchType || "";
      const turnLimit = getBattleTurnLimit(matchType);
      const battlePaceMultiplier = matchType === "IRON_MAN_MATCH" ? 1.12 : 1.18;
      leftState.finisherChargeMultiplier = (options.finisherChargeMultiplier || 1) * battlePaceMultiplier;
      rightState.finisherChargeMultiplier = (options.finisherChargeMultiplier || 1) * battlePaceMultiplier;
      leftState.ppvLadderMode = matchType === "LADDER_MATCH";
      rightState.ppvLadderMode = matchType === "LADDER_MATCH";
      leftState.styleFinisherChargeModifier = getStyleImpactModifier(leftState.style, rightState.style).finisher;
      rightState.styleFinisherChargeModifier = getStyleImpactModifier(rightState.style, leftState.style).finisher;
      const styleMessage = getStyleImpactModifier(leftState.style, rightState.style).text || getStyleImpactModifier(rightState.style, leftState.style).text;
      if (leftState.alignment === "heel" && rightState.alignment !== "heel") {
        leftState.momentum += 10;
        rightState.momentum -= 10;
      }
      if (rightState.alignment === "heel" && leftState.alignment !== "heel") {
        rightState.momentum += 10;
        leftState.momentum -= 10;
      }
      normalizeMomentum(leftState, rightState);
      return {
        leftState,
        rightState,
        battleEvents: [],
        styleMessage,
        battleResult: null,
        animationTimings: BATTLE_ANIMATION_TIMINGS,
        canvasEventTimingCache: new Map(),
        matchType,
        turnLimit,
        turn: 0,
        nextAttackerId: leftState.id,
        currentHype: clamp(options.startingHype ?? gameState.hype, 0, 100),
        finishType: "PINFALL",
        winnerState: null,
        loserState: null,
        ironManScores: { [leftState.id]: 0, [rightState.id]: 0 },
        pendingTurn: null
      };
    }

    function checkBattleInterferenceOpportunity(battlePackage, activeRivalries = []) {
      if (!battlePackage || battlePackage.interferenceChecked) {
        return null;
      }
      battlePackage.interferenceChecked = true;
      const participants = [battlePackage.leftState?.id, battlePackage.rightState?.id].filter(Boolean);
      const directCandidates = (activeRivalries || []).filter((rivalry) => {
        if (!rivalry || rivalry.status === "finished") {
          return false;
        }
        const aInMatch = participants.includes(rivalry.wrestlerAId);
        const bInMatch = participants.includes(rivalry.wrestlerBId);
        return aInMatch && bInMatch && Number(rivalry.heat || rivalry.intensity || 0) >= 50;
      });
      if (directCandidates.length) {
        const rivalry = [...directCandidates].sort((a, b) => Number(b.heat || b.intensity || 0) - Number(a.heat || a.intensity || 0))[0];
        const heat = Number(rivalry.heat || rivalry.intensity || 0);
        const roll = Math.abs(hashString(`${gameState.week}:${battlePackage.leftState.id}:${battlePackage.rightState.id}:${rivalry.id || getRivalryKey(rivalry.wrestlerAId, rivalry.wrestlerBId)}:dirty`)) % 100;
        const chance = Math.min(58, 18 + (heat * 0.25));
        if (roll <= chance) {
          const targetId = battlePackage.leftState.currentHP <= battlePackage.rightState.currentHP ? battlePackage.leftState.id : battlePackage.rightState.id;
          const interfererId = targetId === rivalry.wrestlerAId ? rivalry.wrestlerBId : rivalry.wrestlerAId;
          return {
            rivalryId: rivalry.id,
            rivalryKey: getRivalryKey(rivalry.wrestlerAId, rivalry.wrestlerBId),
            targetId,
            interfererId,
            type: "dirty_tactic",
            directRivalMoment: true
          };
        }
      }
      const candidates = (activeRivalries || []).filter((rivalry) => {
        if (!rivalry || rivalry.status === "finished") {
          return false;
        }
        const aInMatch = participants.includes(rivalry.wrestlerAId);
        const bInMatch = participants.includes(rivalry.wrestlerBId);
        return (aInMatch || bInMatch) && !(aInMatch && bInMatch) && Number(rivalry.heat || rivalry.intensity || 0) >= 60;
      });
      if (!candidates.length) {
        return null;
      }
      const sorted = [...candidates].sort((a, b) => (Number(b.heat || b.intensity || 0) + Number(b.level || b.arc_stage || 1) * 10) - (Number(a.heat || a.intensity || 0) + Number(a.level || a.arc_stage || 1) * 10));
      const rivalry = sorted[0];
      const targetId = participants.includes(rivalry.wrestlerAId) ? rivalry.wrestlerAId : rivalry.wrestlerBId;
      const interfererId = targetId === rivalry.wrestlerAId ? rivalry.wrestlerBId : rivalry.wrestlerAId;
      const chance = Math.min(70, 15 + Number(rivalry.heat || rivalry.intensity || 0) * 0.35 + Number(rivalry.level || rivalry.arc_stage || 1) * 5);
      const roll = hashString(`${gameState.week}:${battlePackage.leftState.id}:${battlePackage.rightState.id}:${rivalry.id || getRivalryKey(rivalry.wrestlerAId, rivalry.wrestlerBId)}`) % 100;
      if (roll > chance) {
        return null;
      }
      return {
        rivalryId: rivalry.id,
        rivalryKey: getRivalryKey(rivalry.wrestlerAId, rivalry.wrestlerBId),
        targetId,
        interfererId,
        type: Number(rivalry.heat || rivalry.intensity || 0) >= 82 ? "forced_loss" : "dq"
      };
    }

    function applyBattleInterference(battlePackage, interference) {
      if (!battlePackage || !interference) {
        return null;
      }
      const targetState = getBattleStateById(battlePackage, interference.targetId);
      const opponentState = targetState?.id === battlePackage.leftState.id ? battlePackage.rightState : battlePackage.leftState;
      const interferer = findWrestlerById(interference.interfererId);
      if (!targetState || !opponentState || !interferer) {
        return null;
      }
      const beforeLeft = snapshotBattleState(battlePackage.leftState);
      const beforeRight = snapshotBattleState(battlePackage.rightState);
      const isDirtyTactic = interference.type === "dirty_tactic";
      targetState.currentHP = Math.max(1, targetState.currentHP - Math.floor(targetState.maxHP * (isDirtyTactic ? 0.16 : 0.28)));
      targetState.momentum = Math.max(0, targetState.momentum - (isDirtyTactic ? 12 : 18));
      opponentState.momentum = Math.min(100, opponentState.momentum + (isDirtyTactic ? 9 : 14));
      battlePackage.turn += 1;
      battlePackage.currentHype = clamp(Number(battlePackage.currentHype || 0) + (isDirtyTactic ? 8 : 12), 0, 100);
      battlePackage.battleEvents.push(createBattleEvent(
        battlePackage.turn,
        opponentState,
        targetState,
        beforeLeft,
        beforeRight,
        snapshotBattleState(battlePackage.leftState),
        snapshotBattleState(battlePackage.rightState),
        {
          type: "interference",
          moveType: "interference",
          moveName: isDirtyTactic ? "CHEAP SHOT" : "INTERFERENCE",
          success: true,
          damage: 0,
          isCrit: false,
          actionText: isDirtyTactic ? `[RIVALRY!] ${interferer.name} 비열한 기습!` : `[INTERFERENCE!] ${interferer.name} 난입!`,
          resultText: isDirtyTactic ? `${interferer.name}가 심판 시야 밖에서 ${targetState.name}를 흔들었습니다!` : `${interferer.name}가 ${targetState.name}를 방해했습니다!`,
          pinResult: null,
          usedFinisher: false,
          comboCount: 1,
          hitDamages: [],
          hypeAfter: battlePackage.currentHype,
          debugText: "interference",
          styleAdvantage: false,
          cheapShotUsed: false,
          cheapShotCaught: false,
          defenseReaction: "none"
        }
      ));
      battlePackage.interference = {
        ...interference,
        targetName: targetState.name,
        interfererName: interferer.name,
        winnerId: opponentState.id,
        loserId: targetState.id
      };
      if (isDirtyTactic) {
        battlePackage.directRivalMoment = battlePackage.interference;
        return battlePackage.interference;
      }
      battlePackage.winnerState = opponentState;
      battlePackage.loserState = targetState;
      battlePackage.finishType = interference.type === "dq" ? "DQ" : "INTERFERENCE";
      finalizeBattlePackage(battlePackage);
      if (battlePackage.battleResult) {
        battlePackage.battleResult.interference = battlePackage.interference;
      }
      return battlePackage.interference;
    }

    function createPendingTurnPreviewEvent(battlePackage, pendingTurn, attacker) {
      return createBattleEvent(
        pendingTurn.turn,
        attacker,
        getBattleStateById(battlePackage, pendingTurn.defenderId),
        pendingTurn.beforeLeft,
        pendingTurn.beforeRight,
        pendingTurn.beforeLeft,
        pendingTurn.beforeRight,
        {
          type: "command",
          moveType: "command",
          moveName: "Command",
          success: true,
          damage: 0,
          isCrit: false,
          actionText: `${attacker.name} 차례`,
          resultText: "행동 선택 대기",
          pinResult: null,
          usedFinisher: false,
          comboCount: 1,
          hitDamages: [],
          hypeAfter: battlePackage.currentHype,
          debugText: "pending-command",
          styleAdvantage: false,
          cheapShotUsed: false,
          cheapShotCaught: false,
          defenseReaction: "none"
        }
      );
    }

    function ensureBattleTurn(battlePackage) {
      if (!battlePackage || battlePackage.battleResult) {
        return null;
      }
      if (battlePackage.pendingTurn) {
        return battlePackage.pendingTurn;
      }
      if (battlePackage.turn >= battlePackage.turnLimit) {
        finalizeBattlePackage(battlePackage);
        return null;
      }
      battlePackage.turn += 1;
      recoverBattleResources(battlePackage.leftState, battlePackage.rightState, battlePackage.currentHype);
      const [attacker, defender] = chooseAttackerOrder(battlePackage.leftState, battlePackage.rightState, battlePackage.nextAttackerId);
      const pendingTurn = {
        turn: battlePackage.turn,
        attackerId: attacker.id,
        defenderId: defender.id,
        beforeLeft: snapshotBattleState(battlePackage.leftState),
        beforeRight: snapshotBattleState(battlePackage.rightState)
      };
      pendingTurn.previewEvent = createPendingTurnPreviewEvent(battlePackage, pendingTurn, attacker);
      battlePackage.pendingTurn = pendingTurn;
      return pendingTurn;
    }

    function finalizeBattlePackage(battlePackage) {
      if (!battlePackage || battlePackage.battleResult) {
        return battlePackage?.battleResult || null;
      }
      let winnerState = battlePackage.winnerState;
      let loserState = battlePackage.loserState;
      let finishType = battlePackage.finishType || "PINFALL";
      const { leftState, rightState, matchType } = battlePackage;
      if ((matchType === "IRON_MAN_MATCH") && !winnerState) {
        winnerState = battlePackage.ironManScores[leftState.id] >= battlePackage.ironManScores[rightState.id] ? leftState : rightState;
        loserState = winnerState.id === leftState.id ? rightState : leftState;
        finishType = "IRON_MAN";
      }
      if (!winnerState || !loserState) {
        winnerState = leftState.currentHP >= rightState.currentHP ? leftState : rightState;
        loserState = winnerState.id === leftState.id ? rightState : leftState;
        finishType = "TIME_LIMIT";
        const lastEvent = battlePackage.battleEvents[battlePackage.battleEvents.length - 1];
        if (!lastEvent || lastEvent.type !== "time-limit") {
          battlePackage.battleEvents.push(createBattleEvent(
            battlePackage.turn,
            winnerState,
            loserState,
            snapshotBattleState(leftState),
            snapshotBattleState(rightState),
            snapshotBattleState(leftState),
            snapshotBattleState(rightState),
            {
              type: "time-limit",
              moveType: "time-limit",
              moveName: "Time Limit",
              success: true,
              damage: 0,
              isCrit: false,
              actionText: "시간 제한 도달",
              resultText: `TIME LIMIT! ${winnerState.name} 판정승!`,
              pinResult: null,
              usedFinisher: false,
              comboCount: 1,
              hitDamages: [],
              hypeAfter: battlePackage.currentHype,
              debugText: "time-limit",
              styleAdvantage: false,
              cheapShotUsed: false,
              cheapShotCaught: false,
              defenseReaction: "none"
            }
          ));
        }
      }
      const highlight = getBattleHighlight(winnerState, loserState);
      let hypeGenerated = clamp(
        Math.floor(battlePackage.turn / 4)
        + HIGHLIGHT_BONUS[highlight]
        + (winnerState.criticalHits * 2)
        + (loserState.kickoutsAt2 * 4),
        5,
        40
      );
      if (matchType === "LADDER_MATCH") {
        hypeGenerated = clamp(hypeGenerated + 20, 5, 60);
      } else if (matchType === "IRON_MAN_MATCH") {
        hypeGenerated = clamp(hypeGenerated + 30, 5, 70);
      }
      battlePackage.winnerState = winnerState;
      battlePackage.loserState = loserState;
      battlePackage.finishType = finishType;
      battlePackage.pendingTurn = null;
      battlePackage.battleResult = {
        winnerId: winnerState.id,
        loserId: loserState.id,
        totalTurns: Math.max(battlePackage.turn, 1),
        turnLimit: battlePackage.turnLimit,
        finishType,
        winnerStats: {
          damageDealt: winnerState.totalDamageDealt,
          damageReceived: winnerState.totalDamageReceived,
          finisherUsed: winnerState.finisherUsed,
          criticalHits: winnerState.criticalHits,
          stamina: Math.floor(winnerState.currentStamina),
          cheapShotUsed: Boolean(winnerState.usedCheapShot)
        },
        loserStats: {
          damageDealt: loserState.totalDamageDealt,
          damageReceived: loserState.totalDamageReceived,
          kickoutsAt2: loserState.kickoutsAt2,
          finisherUsed: loserState.finisherUsed,
          cheapShotUsed: Boolean(loserState.usedCheapShot)
        },
        hypeGenerated,
        highlight,
        matchTypeLabel: matchType || "STANDARD",
        alignmentTurn: winnerState.pendingAlignmentTurn || loserState.pendingAlignmentTurn || "",
        alignmentTurnId: winnerState.pendingAlignmentTurn ? winnerState.id : (loserState.pendingAlignmentTurn ? loserState.id : "")
      };
      return battlePackage.battleResult;
    }

    function resolveBattleTurn(battlePackage, forcedMoveType = "") {
      if (!battlePackage || battlePackage.battleResult) {
        return {
          event: null,
          needsPlayerInput: false,
          attackerIsPlayer: false,
          battleEnded: Boolean(battlePackage?.battleResult),
          battleResult: battlePackage?.battleResult || null
        };
      }
      const pendingTurn = ensureBattleTurn(battlePackage);
      if (!pendingTurn) {
        return {
          event: battlePackage.battleEvents[battlePackage.battleEvents.length - 1] || null,
          needsPlayerInput: false,
          attackerIsPlayer: false,
          battleEnded: Boolean(battlePackage.battleResult),
          battleResult: battlePackage.battleResult
        };
      }
      const { leftState, rightState, matchType } = battlePackage;
      const attacker = getBattleStateById(battlePackage, pendingTurn.attackerId);
      const defender = getBattleStateById(battlePackage, pendingTurn.defenderId);
      const attackerIsPlayer = attacker?.id === leftState?.id;
      const beforeLeft = pendingTurn.beforeLeft;
      const beforeRight = pendingTurn.beforeRight;
      let currentHype = battlePackage.currentHype;
      let moveType = forcedMoveType || "";
      let eventType = "hit";
      let success = true;
      let damage = 0;
      let isCrit = false;
      let actionText = "";
      let resultText = "";
      let pinResult = null;
      let usedFinisher = false;
      let cheapShotUsed = false;
      let cheapShotCaught = false;
      let comboCount = 1;
      let hitDamages = [];
      let defenseReaction = "none";

      if (!attacker || !defender) {
        finalizeBattlePackage(battlePackage);
        return { event: null, needsPlayerInput: false, attackerIsPlayer, battleEnded: true, battleResult: battlePackage.battleResult };
      }

      if (matchType === "CAGE_MATCH" && Math.random() < 0.10) {
        actionText = `${attacker.name}가 철창 탈출을 시도한다!`;
        if (Math.random() < (attacker.alignment === "heel" ? 0.20 : 0.10)) {
          battlePackage.winnerState = attacker;
          battlePackage.loserState = defender;
          battlePackage.finishType = "ESCAPE";
          resultText = "철창 탈출 성공!";
        } else {
          shiftMomentum(defender, attacker, 15, currentHype, leftState, rightState);
          resultText = `${defender.name}가 탈출을 저지했다!`;
        }
        const event = createBattleEvent(
          pendingTurn.turn,
          attacker,
          defender,
          beforeLeft,
          beforeRight,
          snapshotBattleState(leftState),
          snapshotBattleState(rightState),
          {
            type: "escape",
            moveType: "escape",
            moveName: "Escape",
            success: Boolean(battlePackage.winnerState),
            damage: 0,
            isCrit: false,
            actionText,
            resultText,
            pinResult: null,
            usedFinisher: false,
            comboCount: 1,
            hitDamages: [],
            hypeAfter: currentHype,
            debugText: "escape-attempt",
            styleAdvantage: false,
            cheapShotUsed: false,
            cheapShotCaught: false,
            defenseReaction: "none"
          }
        );
        battlePackage.currentHype = currentHype;
        battlePackage.pendingTurn = null;
        battlePackage.battleEvents.push(event);
        battlePackage.nextAttackerId = defender.id;
        if (battlePackage.winnerState) {
          finalizeBattlePackage(battlePackage);
        }
        return { event, needsPlayerInput: false, attackerIsPlayer, battleEnded: Boolean(battlePackage.battleResult), battleResult: battlePackage.battleResult };
      }

      if (attacker.isStunned) {
        attacker.isStunned = false;
        const event = createBattleEvent(
          pendingTurn.turn,
          attacker,
          defender,
          beforeLeft,
          beforeRight,
          snapshotBattleState(leftState),
          snapshotBattleState(rightState),
          {
            type: "stunned",
            moveType: "stunned",
            moveName: "Stunned",
            success: false,
            damage: 0,
            isCrit: false,
            actionText: `${attacker.name}는 기절 상태다!`,
            resultText: "이번 턴은 아무것도 하지 못했다.",
            pinResult: null,
            usedFinisher: false,
            comboCount: 1,
            hitDamages: [],
            hypeAfter: currentHype,
            debugText: "stunned",
            styleAdvantage: false,
            cheapShotUsed: false,
            cheapShotCaught: false,
            defenseReaction: "none"
          }
        );
        battlePackage.currentHype = currentHype;
        battlePackage.pendingTurn = null;
        battlePackage.battleEvents.push(event);
        battlePackage.nextAttackerId = defender.id;
        logDebugTurn(pendingTurn.turn, attacker, "stunned", { damage: 0, defender });
        if (battlePackage.turn >= battlePackage.turnLimit) {
          finalizeBattlePackage(battlePackage);
        }
        return { event, needsPlayerInput: false, attackerIsPlayer, battleEnded: Boolean(battlePackage.battleResult), battleResult: battlePackage.battleResult };
      }

      if (attacker.forcedRestTurn) {
        attacker.forcedRestTurn = false;
        const event = createBattleEvent(
          pendingTurn.turn,
          attacker,
          defender,
          beforeLeft,
          beforeRight,
          snapshotBattleState(leftState),
          snapshotBattleState(rightState),
          {
            type: "rest",
            moveType: "rest",
            moveName: "Rest",
            success: true,
            damage: 0,
            isCrit: false,
            actionText: `${attacker.name}가 숨을 고른다.`,
            resultText: "스태미나 +20",
            pinResult: null,
            usedFinisher: false,
            comboCount: 1,
            hitDamages: [],
            hypeAfter: currentHype,
            debugText: "forced-rest",
            styleAdvantage: false,
            cheapShotUsed: false,
            cheapShotCaught: false,
            defenseReaction: "none"
          }
        );
        battlePackage.currentHype = currentHype;
        battlePackage.pendingTurn = null;
        battlePackage.battleEvents.push(event);
        battlePackage.nextAttackerId = defender.id;
        logDebugTurn(pendingTurn.turn, attacker, "rest", { damage: 0, defender });
        if (battlePackage.turn >= battlePackage.turnLimit) {
          finalizeBattlePackage(battlePackage);
        }
        return { event, needsPlayerInput: false, attackerIsPlayer, battleEnded: Boolean(battlePackage.battleResult), battleResult: battlePackage.battleResult };
      }

      if (!moveType) {
        if (attackerIsPlayer) {
          return { event: pendingTurn.previewEvent, needsPlayerInput: true, attackerIsPlayer: true, battleEnded: false, battleResult: null };
        }
        moveType = chooseMove(attacker, defender);
      }

      if (!canUseMove(attacker, defender, moveType)) {
        moveType = "basic";
      }

      if (!canUseMove(attacker, defender, moveType)) {
        attacker.currentStamina = clamp(attacker.currentStamina + 20, 0, attacker.maxStamina);
        const event = createBattleEvent(
          pendingTurn.turn,
          attacker,
          defender,
          beforeLeft,
          beforeRight,
          snapshotBattleState(leftState),
          snapshotBattleState(rightState),
          {
            type: "rest",
            moveType: "rest",
            moveName: "Rest",
            success: true,
            damage: 0,
            isCrit: false,
            actionText: `${attacker.name}가 체력을 회복한다.`,
            resultText: "행동 불가로 휴식",
            pinResult: null,
            usedFinisher: false,
            comboCount: 1,
            hitDamages: [],
            hypeAfter: currentHype,
            debugText: "rest-by-cost",
            styleAdvantage: false,
            cheapShotUsed: false,
            cheapShotCaught: false,
            defenseReaction: "none"
          }
        );
        battlePackage.currentHype = currentHype;
        battlePackage.pendingTurn = null;
        battlePackage.battleEvents.push(event);
        battlePackage.nextAttackerId = defender.id;
        logDebugTurn(pendingTurn.turn, attacker, "rest", { damage: 0, defender });
        if (battlePackage.turn >= battlePackage.turnLimit) {
          finalizeBattlePackage(battlePackage);
        }
        return { event, needsPlayerInput: false, attackerIsPlayer, battleEnded: Boolean(battlePackage.battleResult), battleResult: battlePackage.battleResult };
      }

      actionText = `${attacker.name}가 ${moveType === "finisher" ? attacker.finisher : (MOVE_LABELS[moveType] || moveType)}를 시도한다!`;
      if (moveType === "submission") {
        const submissionResult = resolveSubmission(attacker, defender);
        eventType = "submission";
        resultText = submissionResult.text;
        if (submissionResult.tappedOut) {
          battlePackage.winnerState = attacker;
          battlePackage.loserState = defender;
          battlePackage.finishType = "SUBMISSION";
        }
      } else {
        const successChance = calcAttackSuccessChance(attacker, defender);
        const attackSucceeded = Math.random() * 100 < successChance;
        if (!attackSucceeded) {
          success = false;
          eventType = "miss";
          resultText = "DODGE!";
          shiftMomentum(defender, attacker, 5, currentHype, leftState, rightState);
        } else if (moveType === "finisher") {
          usedFinisher = true;
          attacker.currentStamina = clamp(attacker.currentStamina - MOVE_COSTS.finisher, 0, attacker.maxStamina);
          const finisherChance = calcFinisherSuccessChance(attacker, defender);
          if (Math.random() * 100 <= finisherChance) {
            const finisherDamage = calcDamage(attacker, defender, "finisher");
            damage = finisherDamage.damage;
            isCrit = finisherDamage.isCrit;
            hitDamages = [damage];
            defender.currentHP = clamp(defender.currentHP - damage, 0, defender.maxHP);
            attacker.totalDamageDealt += damage;
            defender.totalDamageReceived += damage;
            attacker.attackCount += 1;
            attacker.finisherGauge = 0;
            attacker.finisherUsed = true;
            chargeFinisherGauge(attacker, damage * 0.08);
            chargeFinisherGauge(defender, damage * 0.04);
            defender.isDown = true;
            defender.downCount += 1;
            currentHype = clamp(currentHype + 10, 0, 100);
            eventType = "finisher";
            resultText = `${attacker.finisher}!!! → ${damage} 데미지`;
            shiftMomentum(attacker, defender, isCrit ? 20 : 18, currentHype, leftState, rightState);
            if (matchType === "LADDER_MATCH") {
              battlePackage.winnerState = attacker;
              battlePackage.loserState = defender;
              attacker.usedFinisherToWin = true;
              battlePackage.finishType = "LADDER";
            } else {
              pinResult = resolvePinAttempt(attacker, defender);
              if (pinResult.escapedAt > 0) {
                currentHype = clamp(currentHype + 8, 0, 100);
                shiftMomentum(defender, attacker, 12 + (defender.alignment === "face" ? 10 : 0), currentHype, leftState, rightState);
                chargeFinisherGauge(defender, 15);
                resultText += ` / ${pinResult.pinText}`;
                if ((defender.currentHP / defender.maxHP) <= 0.1) {
                  defender.highlightFlags.criticalComeback = true;
                }
              } else if (pinResult.winner) {
                if (matchType === "IRON_MAN_MATCH") {
                  battlePackage.ironManScores[attacker.id] += 1;
                  defender.isDown = false;
                  attacker.currentHP = clamp(attacker.currentHP + (attacker.maxHP * 0.15), 0, attacker.maxHP);
                  defender.currentHP = clamp(defender.maxHP * 0.55, 0, defender.maxHP);
                  resultText += ` / 폴 획득! ${battlePackage.ironManScores[leftState.id]}:${battlePackage.ironManScores[rightState.id]}`;
                } else {
                  battlePackage.winnerState = attacker;
                  battlePackage.loserState = defender;
                  attacker.usedFinisherToWin = true;
                  battlePackage.finishType = "PINFALL";
                }
              }
            }
          } else {
            success = false;
            eventType = "finisher-counter";
            damage = 50;
            hitDamages = [damage];
            attacker.currentHP = clamp(attacker.currentHP - damage, 0, attacker.maxHP);
            attacker.totalDamageReceived += damage;
            defender.totalDamageDealt += damage;
            attacker.finisherGauge = clamp(attacker.finisherGauge - 50, 0, 100);
            resultText = `${defender.name}이 피니셔를 카운터했다!`;
            shiftMomentum(defender, attacker, 15, currentHype, leftState, rightState);
          }
        } else {
          const defenseOutcome = resolveDefenseReaction(attacker, defender, moveType);
          defenseReaction = defenseOutcome.type;
          if (defenseOutcome.type === "dodge") {
            success = false;
            eventType = "miss";
            resultText = "DODGE!";
            shiftMomentum(defender, attacker, 7, currentHype, leftState, rightState);
          } else {
            comboCount = calcAttackCount(attacker, moveType);
            attacker.currentStamina = clamp(attacker.currentStamina - MOVE_COSTS[moveType] - ((comboCount - 1) * 4), 0, attacker.maxStamina);
            hitDamages = [];
            for (let comboIndex = 0; comboIndex < comboCount; comboIndex += 1) {
              const damageResult = calcDamage(attacker, defender, moveType);
              let hitDamage = damageResult.damage;
              if (comboIndex > 0) {
                hitDamage = Math.max(1, Math.floor(hitDamage * Math.pow(0.7, comboIndex)));
              }
              damage += hitDamage;
              hitDamages.push(hitDamage);
              isCrit = isCrit || damageResult.isCrit;
            }
            if (defenseOutcome.type === "block") {
              eventType = "block";
              hitDamages = hitDamages.map((value) => Math.max(1, Math.floor(value * defenseOutcome.multiplier)));
              damage = hitDamages.reduce((sum, value) => sum + value, 0);
            }
            if (attacker.alignment === "heel" && moveType !== "technical" && Math.random() < 0.15) {
              cheapShotUsed = true;
              attacker.usedCheapShot = true;
              const cheapShotMultiplier = matchType === "CAGE_MATCH" ? 1.8 : 1.4;
              hitDamages = hitDamages.map((value) => Math.max(1, Math.floor(value * cheapShotMultiplier)));
              damage = hitDamages.reduce((sum, value) => sum + value, 0);
              if (Math.random() < 0.5) {
                cheapShotCaught = true;
                currentHype = clamp(currentHype - 8, 0, 100);
              }
            }
            defender.currentHP = clamp(defender.currentHP - damage, 0, defender.maxHP);
            attacker.totalDamageDealt += damage;
            defender.totalDamageReceived += damage;
            attacker.attackCount += comboCount;
            chargeFinisherGauge(attacker, damage * 0.08);
            chargeFinisherGauge(defender, damage * 0.04);
            resultText = `${defenseOutcome.type === "block" ? "BLOCK! " : "→ "}${damage} 데미지${comboCount > 1 ? ` / ${comboCount}연타` : ""}${isCrit ? " (치명타)" : ""}${cheapShotUsed ? " / 반칙 공격!" : ""}${cheapShotCaught ? " / 발각! Hype -8" : ""}`;
            shiftMomentum(attacker, defender, defenseOutcome.type === "block" ? 3 : (isCrit ? 10 : 5), currentHype, leftState, rightState);
            if (isCrit) {
              attacker.criticalHits += 1;
              currentHype = clamp(currentHype + 5, 0, 100);
              if ((moveType === "power" || moveType === "technical") && Math.random() < 0.3) {
                defender.isStunned = true;
              }
            }
            if (comboCount > 1) {
              currentHype = clamp(currentHype + comboCount, 0, 100);
            }
            if (shouldKnockDown(defender, moveType, false) || defender.currentHP <= 0) {
              defender.isDown = true;
              defender.downCount += 1;
              eventType = "pin";
              if (matchType !== "LADDER_MATCH") {
                pinResult = resolvePinAttempt(attacker, defender);
                if (pinResult.escapedAt > 0) {
                  currentHype = clamp(currentHype + 8, 0, 100);
                  shiftMomentum(defender, attacker, 12 + (defender.alignment === "face" ? 10 : 0), currentHype, leftState, rightState);
                  chargeFinisherGauge(defender, 15);
                  resultText += ` / ${pinResult.pinText}`;
                  if ((defender.currentHP / defender.maxHP) <= 0.1) {
                    defender.highlightFlags.criticalComeback = true;
                  }
                } else if (pinResult.winner) {
                  if (matchType === "IRON_MAN_MATCH") {
                    battlePackage.ironManScores[attacker.id] += 1;
                    defender.isDown = false;
                    attacker.currentHP = clamp(attacker.currentHP + (attacker.maxHP * 0.10), 0, attacker.maxHP);
                    defender.currentHP = clamp(defender.maxHP * 0.55, 0, defender.maxHP);
                    resultText += ` / 폴 획득! ${battlePackage.ironManScores[leftState.id]}:${battlePackage.ironManScores[rightState.id]}`;
                  } else {
                    battlePackage.winnerState = attacker;
                    battlePackage.loserState = defender;
                    battlePackage.finishType = "PINFALL";
                  }
                }
              }
            }
            if (cheapShotUsed && attacker.lossStreak >= 3 && attacker.alignment !== "heel") {
              attacker.pendingAlignmentTurn = "heel";
            }
          }
        }
      }

      const event = createBattleEvent(
        pendingTurn.turn,
        attacker,
        defender,
        beforeLeft,
        beforeRight,
        snapshotBattleState(leftState),
        snapshotBattleState(rightState),
        {
          type: eventType,
          moveType,
          moveName: moveType === "finisher" ? attacker.finisher : (MOVE_LABELS[moveType] || moveType),
          success,
          damage,
          isCrit,
          actionText,
          resultText,
          pinResult,
          usedFinisher,
          comboCount,
          hitDamages,
          hypeAfter: currentHype,
          debugText: `${attacker.name}/${moveType}/${resultText}`,
          styleAdvantage: getStyleImpactModifier(attacker.style, defender.style).matchup > 0,
          cheapShotUsed,
          cheapShotCaught,
          defenseReaction
        }
      );
      battlePackage.currentHype = currentHype;
      battlePackage.pendingTurn = null;
      battlePackage.battleEvents.push(event);
      battlePackage.nextAttackerId = defender.id;
      logDebugTurn(pendingTurn.turn, attacker, moveType, { damage, isCrit, defender });
      if (battlePackage.winnerState || battlePackage.turn >= battlePackage.turnLimit) {
        finalizeBattlePackage(battlePackage);
      }
      return { event, needsPlayerInput: false, attackerIsPlayer, battleEnded: Boolean(battlePackage.battleResult), battleResult: battlePackage.battleResult };
    }

    function runBattleSimulation(wrestlerA, wrestlerB, options = {}) {
      const battlePackage = createBattlePackage(wrestlerA, wrestlerB, options);
      while (!battlePackage.battleResult) {
        const resolution = resolveBattleTurn(battlePackage);
        if (resolution.needsPlayerInput) {
          resolveBattleTurn(battlePackage, chooseMove(battlePackage.leftState, battlePackage.rightState));
        }
        if (!battlePackage.battleResult && battlePackage.turn >= 3 && !battlePackage.interferenceChecked) {
          const interference = checkBattleInterferenceOpportunity(battlePackage, options.activeRivalries || []);
          if (interference) {
            applyBattleInterference(battlePackage, interference);
          }
        }
      }
