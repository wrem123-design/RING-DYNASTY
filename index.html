    function setupGlobalDragCleanup() {
      const cleanup = () => {
        requestAnimationFrame(clearDraggedCardState);
      };
      window.addEventListener("pointermove", (event) => {
        if (!cardPointerDragState || cardPointerDragState.pointerId !== event.pointerId) {
          return;
        }
        const distance = Math.hypot(event.clientX - cardPointerDragState.startX, event.clientY - cardPointerDragState.startY);
        if (distance < 8 && !cardPointerDragState.moved) {
          return;
        }
        cardPointerDragState.moved = true;
        event.preventDefault();
        clearCardDropzoneHighlight();
        if (cardPointerDragState.mode === "division") {
          const hoveredDivisionSlot = document.elementFromPoint(event.clientX, event.clientY)?.closest?.(".division-slot.dropzone[data-division-key]");
          if (hoveredDivisionSlot) {
            hoveredDivisionSlot.classList.add("drop-target");
          } else {
            const hoveredDivisionCard = document.elementFromPoint(event.clientX, event.clientY)?.closest?.(".division-card[data-division-key]");
            const firstOpen = hoveredDivisionCard ? getFirstOpenSlotInDivision(hoveredDivisionCard.dataset.divisionKey) : null;
            if (firstOpen) {
              const openSlot = mainDynamicContentEl.querySelector(`.division-slot.dropzone[data-division-key="${CSS.escape(firstOpen.divisionKey)}"][data-index="${firstOpen.index}"]`);
              openSlot?.classList.add("drop-target");
            }
          }
        } else {
          const hoveredDropzone = document.elementFromPoint(event.clientX, event.clientY)?.closest?.(".dropzone[data-slot-index][data-side]");
          if (hoveredDropzone) {
            hoveredDropzone.classList.add("drag-over");
          }
        }
      }, { passive: false });
      window.addEventListener("pointerup", (event) => {
        if (!cardPointerDragState || cardPointerDragState.pointerId !== event.pointerId) {
          return;
        }
        const dragState = cardPointerDragState;
        cardPointerDragState = null;
        if (!dragState.moved) {
          return;
        }
        suppressCardClickUntil = performance.now() + 250;
        if (dragState.mode === "division") {
          suppressCardClickUntil = performance.now() + 250;
          const divisionSlot = document.elementFromPoint(event.clientX, event.clientY)?.closest?.(".division-slot.dropzone[data-division-key]");
          clearCardDropzoneHighlight();
          if (divisionSlot) {
            assignWrestlerToDivisionSlot(dragState.wrestlerId, divisionSlot.dataset.divisionKey, divisionSlot.dataset.role, Number(divisionSlot.dataset.index));
            return;
          }
          const divisionCard = document.elementFromPoint(event.clientX, event.clientY)?.closest?.(".division-card[data-division-key]");
          const target = divisionCard ? getFirstOpenSlotInDivision(divisionCard.dataset.divisionKey) : null;
          if (target) {
            assignWrestlerToDivisionSlot(dragState.wrestlerId, target.divisionKey, target.role, target.index);
          }
          return;
        }
        const dropzone = document.elementFromPoint(event.clientX, event.clientY)?.closest?.(".dropzone[data-slot-index][data-side]");
        clearCardDropzoneHighlight();
        if (!dropzone) {
          return;
        }
        placeWrestlerIntoSpecificSlot(dragState.wrestlerId, Number(dropzone.dataset.slotIndex), dropzone.dataset.side);
      });
      window.addEventListener("dragend", cleanup);
      window.addEventListener("drop", cleanup);
      window.addEventListener("blur", cleanup);
    }

    function findBookedSlotPosition(wrestlerId) {
      for (let slotIndex = 0; slotIndex < gameState.weeklyCard.length; slotIndex += 1) {
        const slot = gameState.weeklyCard[slotIndex];
        if (slot.wrestlerAId === wrestlerId) {
          return { slotIndex, side: "A" };
        }
        if (slot.wrestlerBId === wrestlerId) {
          return { slotIndex, side: "B" };
        }
      }
      return null;
    }

    function placeWrestlerIntoSpecificSlot(wrestlerId, slotIndex, side, options = {}) {
      if (!wrestlerId || !["A", "B"].includes(side)) {
        return false;
      }
      if (slotIndex === 0 && side === "B" && !isWeeklyCpuId(wrestlerId)) {
        if (!options.silent) {
          showToast("이번 주 메인 이벤트 상대는 고정 CPU 미션입니다.", "info");
        }
        return false;
      }

      const slot = gameState.weeklyCard[slotIndex];
      const wrestler = findWrestlerById(wrestlerId);
      if (!slot || !wrestler || wrestler.status !== "idle") {
        return false;
      }
      if (slotIndex === 0 && side === "A") {
        const mainRequirementFailure = getWrestlerMainEventRequirementFailure(wrestler);
        if (mainRequirementFailure) {
          if (!options.silent) {
            window.alert(mainRequirementFailure);
          }
          return false;
        }
      }

      const targetKey = side === "A" ? "wrestlerAId" : "wrestlerBId";
      const oppositeKey = side === "A" ? "wrestlerBId" : "wrestlerAId";
      if (slot[oppositeKey] === wrestlerId) {
        if (!options.silent) {
          window.alert("같은 선수는 한 경기 양쪽에 동시에 배치할 수 없습니다");
        }
        return false;
      }
      const oppositeWrestler = findWrestlerById(slot[oppositeKey]);
      const matchupRestriction = getBookingMatchRestriction(wrestler, oppositeWrestler);
      if (!matchupRestriction.ok) {
        if (!options.silent) {
          window.alert(matchupRestriction.reason);
        }
        return false;
      }

      const currentPosition = findBookedSlotPosition(wrestlerId);
      if (currentPosition && (currentPosition.slotIndex !== slotIndex || currentPosition.side !== side)) {
        const currentSlot = gameState.weeklyCard[currentPosition.slotIndex];
        if (currentPosition.side === "A") {
          currentSlot.wrestlerAId = null;
        } else {
          currentSlot.wrestlerBId = null;
        }
      }

      slot[targetKey] = wrestlerId;
      renderActiveTab();
      return true;
    }

    function placeWrestlerIntoWeeklyCard(wrestlerId) {
      if (!wrestlerId) {
        return;
      }

      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler || wrestler.status !== "idle") {
        return;
      }

      const position = getNextEmptySlotPosition();
      if (!position) {
        window.alert("편성 가능한 슬롯이 없습니다.");
        return;
      }

      placeWrestlerIntoSpecificSlot(wrestlerId, position.slotIndex, position.side);
    }

    function removeWrestlerFromWeeklyCard(slotIndex, side) {
      const slot = gameState.weeklyCard[slotIndex];
      if (!slot) {
        return;
      }

      if (side === "A") {
        slot.wrestlerAId = null;
      } else if (side === "B") {
        slot.wrestlerBId = slotIndex === 0 ? gameState.weeklyCpuOpponent.id : null;
      }

      renderActiveTab();
    }

    function getAutoBookingScore(wrestler, opponent = null) {
      const stats = getGmStats(wrestler);
      const baseScore = getWrestlerPower(wrestler, opponent)
        + ((wrestler.condition || 100) * 0.35)
        + (stats.pop * 0.18)
        + (stats.mic * 0.08)
        - (getFatiguePercent(wrestler) * 0.2);
      const jitterSeed = hashString(`${gameState.week}:${wrestler.id}:auto-book`);
      const efficiencyNoise = ((jitterSeed % 17) - 8) * 1.8;
      return (baseScore * 0.8) + efficiencyNoise;
    }

    function autoFillWeeklyCard() {
      ensureWeeklyMissionState();
      const available = getAvailableCardRoster().filter((wrestler) => !isWrestlerBooked(wrestler.id));
      const shuffled = available.slice().sort((left, right) => getAutoBookingScore(right) - getAutoBookingScore(left));
      const takeBestCompatible = (opponent = null, options = {}) => {
        const index = shuffled.findIndex((candidate) => {
          if (options.mainEvent && !canUseWrestlerInMainEvent(candidate)) {
            return false;
          }
          return getBookingMatchRestriction(candidate, opponent).ok;
        });
        if (index < 0) {
          return null;
        }
        return shuffled.splice(index, 1)[0];
      };

      gameState.weeklyCard.forEach((slot, slotIndex) => {
        if (!slot.wrestlerAId && shuffled.length) {
          const opponent = slotIndex === 0 ? gameState.weeklyCpuOpponent : findWrestlerById(slot.wrestlerBId);
          const pick = takeBestCompatible(opponent, { mainEvent: slotIndex === 0 });
          if (pick) {
            slot.wrestlerAId = pick.id;
          } else if (slotIndex === 0) {
            showToast("이번 주 메인 이벤트 조건을 만족하는 자동 배치 후보가 없습니다.", "info");
          }
        }
        if (slotIndex === 0) {
          slot.wrestlerBId = gameState.weeklyCpuOpponent.id;
        } else if (!slot.wrestlerBId && shuffled.length) {
          const opponent = findWrestlerById(slot.wrestlerAId);
          const pick = takeBestCompatible(opponent);
          if (pick) {
            slot.wrestlerBId = pick.id;
          }
        }
      });

      renderActiveTab();
    }

    function getHighlightLabel(highlight) {
      return {
        FINISHER: "피니셔 피니시",
        CRITICAL_COMEBACK: "크리티컬 역전극",
        CLOSE_MATCH: "박빙 승부",
        DOMINANT: "압도적 경기"
      }[highlight] || "일반 경기";
    }

    function startWeeklyMatches() {
      ensureWeeklyMissionState();
      const readyMatches = getReadyMatches();
      if (!readyMatches.length) {
        return;
      }
      const invalidMatch = readyMatches
        .map((slot, index) => ({
          index,
          wrestlerA: findWrestlerById(slot.wrestlerAId),
          wrestlerB: findWrestlerById(slot.wrestlerBId)
        }))
        .find((entry) => !getBookingMatchRestriction(entry.wrestlerA, entry.wrestlerB).ok);
      if (invalidMatch) {
        const restriction = getBookingMatchRestriction(invalidMatch.wrestlerA, invalidMatch.wrestlerB);
        window.alert(`${invalidMatch.index + 1}번 경기 편성 오류: ${restriction.reason}`);
        return;
      }
      const mainSlot = readyMatches[0] || null;
      const mainWrestler = findWrestlerById(mainSlot?.wrestlerAId);
      const mainRequirementFailure = mainSlot?.divisionGenerated ? "" : getWrestlerMainEventRequirementFailure(mainWrestler);
      if (mainRequirementFailure) {
        window.alert(`메인 이벤트 편성 오류: ${mainRequirementFailure}`);
        return;
      }
      const ppvInfo = getPpvInfo();
      if (ppvInfo.isPpv && getAvailableTitleMatchChampionship() && !hasTitleMatchBooked()) {
        window.alert("PPV 주간에는 메인 이벤트 타이틀 매치가 필요합니다.");
        return;
      }
      if (ppvInfo.isPpv && !gameState.ppvState.featuredMatchType) {
        gameState.ppvState.featuredMatchType = ppvInfo.featuredMatchType || PPV_MATCH_TYPES[Math.floor(Math.random() * PPV_MATCH_TYPES.length)];
      }

      const previousHype = getEffectiveHypeValue(gameState.hype);
      const previousFame = gameState.fame;
      let runningHype = clamp(gameState.hype + 5, 0, 100);
      let totalIncome = 0;
      let fameGain = 0;
      let leftWins = 0;
      let leftLosses = 0;
      let totalAudience = 0;
      let heelBribeCostTotal = 0;
      const matchupKeys = [];
      const newlyInjuredIds = [];
      const titleChanges = [];
      const rivalryHighlights = [];
      const touchedRivalryKeys = [];
      let rivalryTicketBonus = 0;
      const medicalHealAmount = getMedicalWeeklyHealAmount();
      const recoveredPreviewIds = gameState.roster
        .filter((wrestler) => wrestler.status === "injured" && wrestler.injuryWeeks > 0 && Math.max(0, wrestler.injuryWeeks - medicalHealAmount) === 0)
        .map((wrestler) => wrestler.id);
      const results = [];
      const battlePackages = [];
      const trainingGrowthPreview = previewWeeklyTraining();
      const salaryBreakdown = getWeeklySalaryBreakdown();
      const salaryTotal = getWeeklySalaryTotal();

      readyMatches.forEach((slot, matchIndex) => {
        const wrestlerA = findWrestlerById(slot.wrestlerAId);
        const wrestlerB = findWrestlerById(slot.wrestlerBId);
        if (!wrestlerA || !wrestlerB) {
          return;
        }
        if (matchIndex === 0) {
          const mainRequirementFailure = getWrestlerMainEventRequirementFailure(wrestlerA);
          if (mainRequirementFailure) {
            window.alert(`메인 이벤트 편성 오류: ${mainRequirementFailure}`);
            return;
          }
        }

        wrestlerA.status = "match";
        wrestlerB.status = "match";

        const matchupKey = getMatchupKey(wrestlerA.id, wrestlerB.id);
        matchupKeys.push(matchupKey);
        const championshipKey = slot.titleMatch ? slot.championshipKey : "";
        const defendingChampionId = championshipKey ? gameState.championships[championshipKey]?.holderId : "";
        const battleWrestlerA = defendingChampionId === wrestlerA.id ? createTitleDefenseWrestler(wrestlerA) : wrestlerA;
        const battleWrestlerB = defendingChampionId === wrestlerB.id ? createTitleDefenseWrestler(wrestlerB) : wrestlerB;
        const repeatedMatchup = checkRepeatMatchup(wrestlerA.id, wrestlerB.id);
        let rivalry = getRivalryBetween(wrestlerA.id, wrestlerB.id);
        if (!rivalry && repeatedMatchup) {
          rivalry = createOrUpdateRivalry(wrestlerA.id, wrestlerB.id, championshipKey ? "title" : "grudge", championshipKey ? 40 : 30);
        } else if (rivalry) {
          rivalry = createOrUpdateRivalry(wrestlerA.id, wrestlerB.id, championshipKey ? "title" : rivalry.type, 15);
        }
        if (rivalry) {
          touchedRivalryKeys.push(getRivalryKey(wrestlerA.id, wrestlerB.id));
        }
        const rivalryStoryText = getRivalryStoryText(rivalry);
        const rivalryHypeBonus = getRivalryHypeBonus(rivalry);
        const rivalryRevenueMultiplier = getRivalryRevenueMultiplier(rivalry);
        const rivalryBadge = rivalry && rivalry.arc_stage >= 1 ? "🔥 라이벌 매치!" : "";
        const rivalryFinisherMultiplier = rivalry && rivalry.arc_stage >= 2 ? 1.5 : 1;
        const alignmentBonus = getAlignmentMatchupBonus(wrestlerA, wrestlerB);

        const bookingHype = calcHypeChange([{
          aId: wrestlerA.id,
          bId: wrestlerB.id,
          isTitleMatch: Boolean(slot.titleMatch)
        }]) - 5;

        const battlePackage = runBattleSimulation(battleWrestlerA, battleWrestlerB, {
          startingHype: runningHype,
          finisherChargeMultiplier: rivalryFinisherMultiplier,
          matchType: ppvInfo.isPpv && matchIndex === 0 ? gameState.ppvState.featuredMatchType : "",
          activeRivalries: gameState.rivalries || []
        });
        battlePackages.push(battlePackage);

        const battleResult = battlePackage.battleResult;
        if (battleResult?.interference) {
          const interferenceRivalry = (gameState.rivalries || []).find((item) => item.id === battleResult.interference.rivalryId || getRivalryKey(item.wrestlerAId, item.wrestlerBId) === battleResult.interference.rivalryKey);
          if (interferenceRivalry) {
            ensureRivalryExtendedState(interferenceRivalry);
            adjustRivalryFreshness(interferenceRivalry, "interference");
            addRivalryHistory(interferenceRivalry, {
              week: gameState.week,
              showType: ppvInfo.isPpv ? "PPV" : "RAW",
              segmentType: "interference",
              summary: `${battleResult.interference.interfererName}가 ${battleResult.interference.targetName} 경기 중 난입했습니다.`,
              participants: [battleResult.interference.interfererId, battleResult.interference.targetId, battleResult.winnerId],
              resultType: battleResult.finishType,
              heatChange: 15,
              crowdReaction: clamp(runningHype + 12, 0, 100),
              winnerId: battleResult.winnerId,
              loserId: battleResult.loserId
            });
            createStoryHook({
              type: "revenge_promo",
              rivalryKey: battleResult.interference.rivalryKey,
              priority: 88,
              title: `${battleResult.interference.targetName} 분노 프로모`,
              description: `${battleResult.interference.targetName}가 지난 경기 난입에 대한 보복을 예고합니다.`,
              suggestedSegmentType: "opening_promo",
              participants: [battleResult.interference.targetId, battleResult.interference.interfererId]
            });
          }
        }
        const winner = battleResult.winnerId === wrestlerA.id ? wrestlerA : wrestlerB;
        const loser = winner.id === wrestlerA.id ? wrestlerB : wrestlerA;
        const winnerBattleState = battleResult.winnerId === wrestlerA.id ? battlePackage.leftState : battlePackage.rightState;
        const loserBattleState = winner.id === wrestlerA.id ? battlePackage.rightState : battlePackage.leftState;

        if (winner.id === wrestlerA.id) {
          leftWins += 1;
        } else {
          leftLosses += 1;
        }

        winner.wins += 1;
        loser.losses += 1;
        gameState.totalWins += 1;
        gameState.totalMatches += 1;
        recordWrestlerResult(winner, true);
        recordWrestlerResult(loser, false);

        const baseIncome = 200 * gameState.stage;
        const winnerIncome = Math.floor(baseIncome * getRosterGradeMultiplier(winner.grade));
        const loserIncome = Math.floor(baseIncome * 0.3);
        const projectedMatchHype = clamp(runningHype + bookingHype + battleResult.hypeGenerated + rivalryHypeBonus + alignmentBonus.hypeBonus, 0, 100);
        const effectiveProjectedMatchHype = getEffectiveHypeValue(projectedMatchHype);
        const revenueTier = getHypeTierInfo(effectiveProjectedMatchHype);
        const faceRevenueMultiplier = getFaceRevenueMultiplierForMatch(wrestlerA, wrestlerB);
        const veteranRevenueMultiplier = Math.max(getAgingRevenueMultiplier(wrestlerA), getAgingRevenueMultiplier(wrestlerB));
        let matchIncome = Math.floor((winnerIncome + loserIncome) * revenueTier.multiplier * rivalryRevenueMultiplier * alignmentBonus.revenueMultiplier * faceRevenueMultiplier * veteranRevenueMultiplier * ppvInfo.revenueMultiplier);
        const heelBribeCost = [wrestlerA, wrestlerB].filter((wrestler) => wrestler.alignment === "heel").length * 200;
        heelBribeCostTotal += heelBribeCost;
        matchIncome = Math.max(0, matchIncome - heelBribeCost);
        totalIncome += matchIncome;
        totalAudience += Math.floor(((120 * gameState.stage * revenueTier.multiplier) + (battleResult.hypeGenerated * 25)) * ppvInfo.audienceMultiplier);

        let totalMatchHype = (battleResult.hypeGenerated + bookingHype + rivalryHypeBonus + alignmentBonus.hypeBonus) * ppvInfo.hypeMultiplier;
        if (winner.alignment === "face") {
          totalMatchHype += Math.max(2, Math.floor(battleResult.hypeGenerated * 0.15));
        }
        runningHype = clamp(runningHype + totalMatchHype, 0, 100);
        fameGain += runningHype >= 80 ? 10 : runningHype >= 50 ? 5 : 1;
        fameGain += (getAgeStageMeta(wrestlerA.age).fameBonus || 0) + (getAgeStageMeta(wrestlerB.age).fameBonus || 0);

        let injuryInfo = null;
        const injuryChance = clamp(
          0.15 + (loserBattleState.downCount * 0.05) + ((loserBattleState.totalDamageReceived / loserBattleState.maxHP) * 0.05) - getMedicalInjuryPrevention() + (getAgeStageMeta(loser.age).injuryBonus || 0),
          0.15,
          0.45
        );
        if (Math.random() < injuryChance) {
          loser.status = "injured";
          loser.injuryWeeks = randomBetween(1, 3);
          newlyInjuredIds.push(loser.id);
          injuryInfo = {
            wrestlerName: loser.name,
            injuryWeeks: loser.injuryWeeks
          };
        }

        let titleOutcome = "";
        if (championshipKey) {
          const championship = gameState.championships[championshipKey];
          if (championship) {
            if (winner.id === defendingChampionId) {
              championship.defenseWeek += 1;
              titleOutcome = `${championship.belt} ${winner.name} 방어 성공 (${championship.defenseWeek}회)`;
            } else {
              championship.holderId = winner.id;
              championship.defenseWeek = 0;
              titleOutcome = `${championship.belt} 새 챔피언 탄생! ${winner.name}`;
            }
            titleChanges.push(titleOutcome);
          }
        }

        if (rivalry && rivalry.arc_stage === 3) {
          rivalryTicketBonus += 2;
          matchIncome = Math.floor(matchIncome * 1);
          winner.stats.fame = clamp(winner.stats.fame + 20, 1, 100);
          loser.stats.fame = clamp(loser.stats.fame + 10, 1, 100);
          totalIncome += 0;
          rivalryHighlights.push(`🔥 라이벌전 클라이맥스! ${winner.name}가 ${loser.name}를 꺾고 악연을 마무리했다.`);
          rivalry.intensity = 0;
        } else if (rivalryStoryText) {
          rivalryHighlights.push(`"${rivalryStoryText}"`);
        }
        if (ppvInfo.isPpv && matchIndex === 0) {
          rivalryHighlights.push(`🎟 ${ppvInfo.name} 특수 경기: ${(battleResult.matchTypeLabel || "").replaceAll("_", " ")}`);
        }

        if (battleResult.alignmentTurn === "heel" && battleResult.alignmentTurnId) {
          const turnedWrestler = findWrestlerById(battleResult.alignmentTurnId);
          if (turnedWrestler && turnedWrestler.alignment !== "heel") {
            applyAlignmentTurn(turnedWrestler, "heel", { direct: false });
          }
        }

        results.push({
          wrestlerAName: wrestlerA.name,
          wrestlerBName: wrestlerB.name,
          wrestlerAId: wrestlerA.id,
          wrestlerBId: wrestlerB.id,
          winnerName: winner.name,
          winnerId: winner.id,
          income: matchIncome,
          hearts: getHeartsByHype(getEffectiveHypeValue(runningHype)),
          injury: injuryInfo,
          hypeAfterMatch: getEffectiveHypeValue(runningHype),
          battleResult,
          finishType: battleResult.finishType,
          highlightLabel: getHighlightLabel(battleResult.highlight),
          turnCount: battleResult.totalTurns,
          crowdLabel: revenueTier.label,
          crowdMultiplier: revenueTier.multiplier,
          titleOutcome,
          championshipKey,
          matchTypeLabel: battleResult.matchTypeLabel || "",
          rivalryBadge,
          rivalryStageLabel: getRivalryStageLabel(rivalry),
          rivalryStoryText,
          rivalryHypeBonus,
          rivalryRevenueMultiplier,
          alignmentLabel: alignmentBonus.label,
          alignmentRevenueMultiplier: alignmentBonus.revenueMultiplier,
          heelBribeCost
        });
      });

      gameState.rivalries = gameState.rivalries.filter((rivalry) => rivalry.intensity > 0);

      const fanRevenueBonus = Math.floor(totalIncome * (getPRIncomeMultiplier() - 1));
      const tvRevenueBonus = getTVWeeklyBonus();
      totalIncome += fanRevenueBonus + tvRevenueBonus;
      const championshipRevenueBonus = Math.floor(totalIncome * (getChampionshipIncomeMultiplier() - 1));
      totalIncome += championshipRevenueBonus;
      const eventRevenueMultiplier = Math.max(1, gameState.eventEffects.nextWeekRevenueMultiplier || 1);
      const preEventIncome = totalIncome;
      totalIncome = Math.floor(totalIncome * eventRevenueMultiplier);
      const eventRevenueBonus = totalIncome - preEventIncome;
      const promotionBrandSummary = { totalIncome, bonusLines: [] };
      const promotionBrandBonus = applyPromotionBrandIncomeBonus(promotionBrandSummary);
      totalIncome = promotionBrandSummary.totalIncome;
      fameGain += getPRWeeklyFameBonus() + getChampionshipWeeklyFameBonus();
      applyPassiveStaminaGrowthFromMatches(results);

      gameState.gold += totalIncome;
      gameState.fame += fameGain;
      gameState.hype = runningHype;

      const monthlyLegendTicketBonus = getChampionshipMonthlyLegendTicketBonus();

      pendingWeeklySummary = {
        week: gameState.week,
        previousHype,
        previousFame,
        results,
        battlePackages,
        totalIncome,
        fanRevenueBonus,
        tvRevenueBonus,
        championshipRevenueBonus,
        eventRevenueBonus,
        promotionBrandBonus,
        eventRevenueMultiplier,
        heelBribeCostTotal,
        salaryTotal,
        salaryBreakdown,
        fameGain,
        finalHype: getEffectiveHypeValue(runningHype),
        currentFame: gameState.fame,
        matchCount: results.length,
        leftWins,
        leftLosses,
        totalAudience,
        matchupKeys,
        newlyInjuredIds,
        recoveredPreviewIds,
        trainingGrowthPreview,
        monthlyLegendTicketBonus,
        ppvInfo,
        ppvMvpId: "",
        ppvAwardText: "",
        titleChanges,
        rivalryHighlights,
        rivalryTicketBonus,
        touchedRivalryKeys
      };

      if (ppvInfo.isPpv && results.length) {
        const mvpResult = results.slice().sort((left, right) => ((right.battleResult?.winnerStats?.damageDealt || 0) + (right.battleResult?.hypeGenerated || 0)) - ((left.battleResult?.winnerStats?.damageDealt || 0) + (left.battleResult?.hypeGenerated || 0)))[0];
        const mvp = findWrestlerById(mvpResult?.winnerId);
        if (mvp) {
          pendingWeeklySummary.ppvMvpId = mvp.id;
          pendingWeeklySummary.ppvAwardText = results.some((result) => result.battleResult?.highlight === "CRITICAL_COMEBACK") ? "올해의 경기상" : "이번 PPV 최우수 선수";
        }
      }

      applyMatchSummaryToWeeklyStats(pendingWeeklySummary);

      activeTab = "home";
      render();
      matchAnimationState.finishCallback = openWeeklyResultsModal;
      startMatchAnimation(battlePackages);
    }

    function isWeeklyMatchContext(entry) {
      return Boolean(entry && entry.kind === "weekly-context");
    }

    function createWeeklyMatchContext(slot, matchIndex, ppvInfo) {
      const wrestlerA = findWrestlerById(slot.wrestlerAId);
      const wrestlerB = findWrestlerById(slot.wrestlerBId);
      if (!wrestlerA || !wrestlerB) {
        return null;
      }
      if (matchIndex === 0 && !slot.divisionGenerated) {
        const mainRequirementFailure = getWrestlerMainEventRequirementFailure(wrestlerA);
        if (mainRequirementFailure) {
          window.alert(`메인 이벤트 편성 오류: ${mainRequirementFailure}`);
          return null;
        }
      }
      wrestlerA.status = "match";
      wrestlerB.status = "match";
      const championshipKey = slot.titleMatch ? slot.championshipKey : "";
      const defendingChampionId = championshipKey ? gameState.championships[championshipKey]?.holderId : "";
      const repeatedMatchup = checkRepeatMatchup(wrestlerA.id, wrestlerB.id);
      let rivalry = getRivalryBetween(wrestlerA.id, wrestlerB.id);
      const rdCircuitOpponent = wrestlerB?.circuitSource || null;
      if (!rivalry && repeatedMatchup) {
        rivalry = createOrUpdateRivalry(wrestlerA.id, wrestlerB.id, championshipKey ? "title" : "grudge", championshipKey ? 40 : 30);
      } else if (rivalry) {
        rivalry = createOrUpdateRivalry(wrestlerA.id, wrestlerB.id, championshipKey ? "title" : rivalry.type, 15);
      }
      const rivalryKey = rivalry ? getRivalryKey(wrestlerA.id, wrestlerB.id) : "";
      return {
        kind: "weekly-context",
        matchIndex,
        slot,
        wrestlerA,
        wrestlerB,
        battleWrestlerA: defendingChampionId === wrestlerA.id ? createTitleDefenseWrestler(wrestlerA) : wrestlerA,
        battleWrestlerB: defendingChampionId === wrestlerB.id ? createTitleDefenseWrestler(wrestlerB) : wrestlerB,
        matchupKey: getMatchupKey(wrestlerA.id, wrestlerB.id),
        championshipKey,
        defendingChampionId,
        rivalry,
        rivalryKey,
        rivalryStoryText: getRivalryStoryText(rivalry),
        rivalryHypeBonus: getRivalryHypeBonus(rivalry),
        rivalryRevenueMultiplier: getRivalryRevenueMultiplier(rivalry),
        rivalryBadge: rivalry && rivalry.arc_stage >= 1 ? "🔥 라이벌 매치!" : "",
        rivalryFinisherMultiplier: rivalry && rivalry.arc_stage >= 2 ? 1.5 : 1,
        alignmentBonus: getAlignmentMatchupBonus(wrestlerA, wrestlerB),
        bookingHype: calcHypeChange([{
          aId: wrestlerA.id,
          bId: wrestlerB.id,
          isTitleMatch: Boolean(slot.titleMatch)
        }]) - 5,
        matchType: ppvInfo.isPpv && matchIndex === 0 ? gameState.ppvState.featuredMatchType : "",
        rdCircuitOpponent,
        committed: false,
        runtimeBattle: null
      };
    }

    function buildBattlePackageForWeeklyContext(context, startingHype) {
      if (!context) {
        return null;
      }
      if (context.runtimeBattle) {
        return context.runtimeBattle;
      }
      const battlePackage = createBattlePackage(context.battleWrestlerA, context.battleWrestlerB, {
        startingHype,
        finisherChargeMultiplier: context.rivalryFinisherMultiplier,
        matchType: context.matchType
      });
      context.runtimeBattle = battlePackage;
      if (pendingWeeklySession && !pendingWeeklySession.battlePackages.includes(battlePackage)) {
        pendingWeeklySession.battlePackages.push(battlePackage);
      }
      return battlePackage;
    }

    function applyRdCircuitBattlePackageToWeeklySession(context, battlePackage) {
      const session = pendingWeeklySession;
      const circuitApi = window.__RING_DYNASTY_CIRCUIT_API__ || {};
      const opponent = context?.rdCircuitOpponent || context?.wrestlerB?.circuitSource || null;
      if (!session || !context?.wrestlerA || !opponent || typeof circuitApi.applyCircuitOutcomeFromBattle !== "function") {
        return false;
      }
      const previousFameDelta = Number(session.fameDelta || 0);
      const outcome = circuitApi.applyCircuitOutcomeFromBattle(context.wrestlerA, opponent, battlePackage, session, {
        skipRecord: true,
        skipConditionLoss: false
      });
      if (!outcome?.mainResult) {
        return false;
      }
      const battleResult = battlePackage.battleResult;
      const won = Boolean(outcome.won);
      if (won) {
        session.leftWins += 1;
        context.wrestlerA.wins = Math.max(0, Math.floor(context.wrestlerA.wins || 0) + 1);
      } else {
        session.leftLosses += 1;
        context.wrestlerA.losses = Math.max(0, Math.floor(context.wrestlerA.losses || 0) + 1);
      }
      recordWrestlerResult(context.wrestlerA, won);
      session.fameGain += Number(session.fameDelta || 0) - previousFameDelta;
      session.runningHype = clamp(session.runningHype + Number(battleResult.hypeGenerated || 0) + (won ? 8 : -5), 0, 100);
      session.totalAudience += Math.floor((120 * gameState.stage) + (Number(battleResult.hypeGenerated || 0) * 28));
      context.wrestlerA.lastBookedWeek = gameState.week;
      context.wrestlerA.roleSatisfaction = clamp(Number(context.wrestlerA.roleSatisfaction ?? 70) + (won ? 7 : -5), 0, 100);
      context.wrestlerA.status = context.wrestlerA.status === "injured" ? "injured" : "match";
      outcome.mainResult.hearts = getHeartsByHype(getEffectiveHypeValue(session.runningHype));
      outcome.mainResult.hypeAfterMatch = getEffectiveHypeValue(session.runningHype);
      outcome.mainResult.rdCircuitShow = true;
      session.results.push(outcome.mainResult);
      context.committed = true;
      return true;
    }

    function applyBattlePackageToWeeklySession(context, battlePackage) {
      if (!pendingWeeklySession || !context || context.committed || !battlePackage?.battleResult) {
        return;
      }
      const session = pendingWeeklySession;
      const { wrestlerA, wrestlerB, championshipKey, defendingChampionId, rivalry, rivalryStoryText, rivalryHypeBonus, rivalryRevenueMultiplier, rivalryBadge, alignmentBonus, matchIndex } = context;
      const battleResult = battlePackage.battleResult;
      if (battleResult?.interference && !battleResult.interference.storyRecorded) {
        const interferenceRivalry = (gameState.rivalries || []).find((item) => (
          item.id === battleResult.interference.rivalryId
          || getRivalryKey(item.wrestlerAId, item.wrestlerBId) === battleResult.interference.rivalryKey
        ));
        if (interferenceRivalry) {
          ensureRivalryExtendedState(interferenceRivalry);
          adjustRivalryFreshness(interferenceRivalry, "interference");
          addRivalryHistory(interferenceRivalry, {
            week: gameState.week,
            showType: session.ppvInfo?.isPpv ? "PPV" : "RAW",
            segmentType: "interference",
            summary: `${battleResult.interference.interfererName}가 ${battleResult.interference.targetName} 경기 중 난입했습니다.`,
            participants: [battleResult.interference.interfererId, battleResult.interference.targetId, battleResult.winnerId],
            resultType: battleResult.finishType,
            heatChange: 15,
            crowdReaction: clamp(session.runningHype + 12, 0, 100),
            winnerId: battleResult.winnerId,
            loserId: battleResult.loserId
          });
          createStoryHook({
            type: "revenge_promo",
            rivalryKey: battleResult.interference.rivalryKey,
            priority: 88,
            title: `${battleResult.interference.targetName} 분노 프로모`,
            description: `${battleResult.interference.targetName}가 지난 경기 난입에 대한 보복을 예고합니다.`,
            suggestedSegmentType: "opening_promo",
            participants: [battleResult.interference.targetId, battleResult.interference.interfererId]
          });
          session.rivalryHighlights.push(`${battleResult.interference.interfererName}의 난입으로 ${battleResult.interference.targetName}와의 악연이 다음 주까지 이어집니다.`);
        }
        battleResult.interference.storyRecorded = true;
      }
      if (battlePackage.directRivalMoment && !battlePackage.directRivalMoment.storyRecorded) {
        const directRivalry = (gameState.rivalries || []).find((item) => (
          item.id === battlePackage.directRivalMoment.rivalryId
          || getRivalryKey(item.wrestlerAId, item.wrestlerBId) === battlePackage.directRivalMoment.rivalryKey
        ));
        if (directRivalry) {
          ensureRivalryExtendedState(directRivalry);
          adjustRivalryFreshness(directRivalry, "interference");
          addRivalryHistory(directRivalry, {
            week: gameState.week,
            showType: session.ppvInfo?.isPpv ? "PPV" : "RAW",
            segmentType: "interference",
            summary: `${battlePackage.directRivalMoment.interfererName}가 경기 중 ${battlePackage.directRivalMoment.targetName}에게 비열한 수를 썼습니다.`,
            participants: [battlePackage.directRivalMoment.interfererId, battlePackage.directRivalMoment.targetId],
            heatChange: 7,
            crowdReaction: clamp(session.runningHype + 8, 0, 100)
          });
          session.rivalryHighlights.push(`${battlePackage.directRivalMoment.interfererName}의 반칙성 도발로 ${battlePackage.directRivalMoment.targetName}와의 감정선이 더 선명해졌습니다.`);
        }
        battlePackage.directRivalMoment.storyRecorded = true;
      }
      if (context.rdCircuitOpponent && applyRdCircuitBattlePackageToWeeklySession(context, battlePackage)) {
        return;
      }
      const winner = battleResult.winnerId === wrestlerA.id ? wrestlerA : wrestlerB;
      const loser = winner.id === wrestlerA.id ? wrestlerB : wrestlerA;
      const winnerBattleState = battleResult.winnerId === wrestlerA.id ? battlePackage.leftState : battlePackage.rightState;
      const loserBattleState = winner.id === wrestlerA.id ? battlePackage.rightState : battlePackage.leftState;

      if (winner.id === wrestlerA.id) {
        session.leftWins += 1;
      } else {
        session.leftLosses += 1;
      }

      winner.wins += 1;
      loser.losses += 1;
      gameState.totalWins += 1;
      gameState.totalMatches += 1;
      if (matchIndex === 0) {
        session.mainStatsAppliedDuringShow = true;
      }
      recordWrestlerResult(winner, true);
      recordWrestlerResult(loser, false);
      [wrestlerA, wrestlerB].forEach((wrestler) => {
        if (isWeeklyCpuId(wrestler.id)) {
          return;
        }
        const fatigueGain = 12 + (getGmArchetype(wrestler) === "brawler" ? 4 : 0) + (getGmArchetype(wrestler) === "highflyer" ? 3 : 0);
        wrestler.condition = clamp((wrestler.condition || 100) - fatigueGain, 0, 100);
        wrestler.lastBookedWeek = gameState.week;
        wrestler.roleSatisfaction = clamp(Number(wrestler.roleSatisfaction ?? 70) + (matchIndex === 0 ? 6 : gradeRank(wrestler.grade) >= gradeRank("A") ? -4 : 2), 0, 100);
      });

      const baseIncome = 200 * gameState.stage;
      const winnerIncome = Math.floor(baseIncome * getRosterGradeMultiplier(winner.grade));
      const loserIncome = Math.floor(baseIncome * 0.3);
      const projectedMatchHype = clamp(session.runningHype + context.bookingHype + battleResult.hypeGenerated + rivalryHypeBonus + alignmentBonus.hypeBonus, 0, 100);
      const effectiveProjectedMatchHype = getEffectiveHypeValue(projectedMatchHype);
      const revenueTier = getHypeTierInfo(effectiveProjectedMatchHype);
      const faceRevenueMultiplier = getFaceRevenueMultiplierForMatch(wrestlerA, wrestlerB);
      const veteranRevenueMultiplier = Math.max(getAgingRevenueMultiplier(wrestlerA), getAgingRevenueMultiplier(wrestlerB));
      let matchIncome = Math.floor((winnerIncome + loserIncome) * revenueTier.multiplier * rivalryRevenueMultiplier * alignmentBonus.revenueMultiplier * faceRevenueMultiplier * veteranRevenueMultiplier * session.ppvInfo.revenueMultiplier);
      const heelBribeCost = [wrestlerA, wrestlerB].filter((wrestler) => wrestler.alignment === "heel").length * 200;
      session.heelBribeCostTotal += heelBribeCost;
      matchIncome = Math.max(0, matchIncome - heelBribeCost);
      session.totalIncome += matchIncome;
      session.totalAudience += Math.floor(((120 * gameState.stage * revenueTier.multiplier) + (battleResult.hypeGenerated * 25)) * session.ppvInfo.audienceMultiplier);

      let totalMatchHype = (battleResult.hypeGenerated + context.bookingHype + rivalryHypeBonus + alignmentBonus.hypeBonus) * session.ppvInfo.hypeMultiplier;
      if (winner.alignment === "face") {
        totalMatchHype += Math.max(2, Math.floor(battleResult.hypeGenerated * 0.15));
      }
      session.runningHype = clamp(session.runningHype + totalMatchHype, 0, 100);
      session.fameGain += session.runningHype >= 80 ? 10 : session.runningHype >= 50 ? 5 : 1;
      session.fameGain += (getAgeStageMeta(wrestlerA.age).fameBonus || 0) + (getAgeStageMeta(wrestlerB.age).fameBonus || 0);

      let injuryInfo = null;
      const injuryChance = clamp(
        0.15 + (loserBattleState.downCount * 0.05) + ((loserBattleState.totalDamageReceived / loserBattleState.maxHP) * 0.05) - getMedicalInjuryPrevention() + (getAgeStageMeta(loser.age).injuryBonus || 0),
        0.15,
        0.45
      );
      if (Math.random() < injuryChance) {
        loser.status = "injured";
        loser.injuryWeeks = randomBetween(1, 3);
        session.newlyInjuredIds.push(loser.id);
        injuryInfo = {
          wrestlerName: loser.name,
          injuryWeeks: loser.injuryWeeks
        };
      }

      let titleOutcome = "";
      if (championshipKey) {
        const championship = gameState.championships[championshipKey];
        if (championship) {
          if (winner.id === defendingChampionId) {
            championship.defenseWeek += 1;
            titleOutcome = `${championship.belt} ${winner.name} 방어 성공 (${championship.defenseWeek}회)`;
          } else {
            championship.holderId = winner.id;
            championship.defenseWeek = 0;
            titleOutcome = `${championship.belt} 새 챔피언 탄생! ${winner.name}`;
          }
          session.titleChanges.push(titleOutcome);
        }
      }

      if (rivalry && rivalry.arc_stage === 3) {
        session.rivalryTicketBonus += 2;
        winner.stats.fame = clamp(winner.stats.fame + 20, 1, 100);
        loser.stats.fame = clamp(loser.stats.fame + 10, 1, 100);
        session.rivalryHighlights.push(`🔥 라이벌전 클라이맥스! ${winner.name}가 ${loser.name}를 꺾고 악연을 마무리했다.`);
        rivalry.intensity = 0;
      } else if (rivalryStoryText) {
        session.rivalryHighlights.push(`"${rivalryStoryText}"`);
      }
      if (session.ppvInfo.isPpv && matchIndex === 0) {
        session.rivalryHighlights.push(`🎟 ${session.ppvInfo.name} 특수 경기: ${(battleResult.matchTypeLabel || "").replaceAll("_", " ")}`);
      }

      if (battleResult.alignmentTurn === "heel" && battleResult.alignmentTurnId) {
        const turnedWrestler = findWrestlerById(battleResult.alignmentTurnId);
        if (turnedWrestler && turnedWrestler.alignment !== "heel") {
          applyAlignmentTurn(turnedWrestler, "heel", { direct: false });
        }
      }

      const projection = getMatchProjection({ wrestlerAId: wrestlerA.id, wrestlerBId: wrestlerB.id }, matchIndex);
      const snsLine = projection.crowd >= 78
        ? `"${winner.name} 중심으로 쇼 분위기가 확 살아났다."`
        : projection.quality >= 72
          ? `"화려하진 않아도 경기 완성도는 확실했다."`
          : `"이번 매치는 빌드업이 더 필요해 보인다."`;

      session.results.push({
        kind: matchIndex === 0 ? "main" : "side",
        wrestlerAName: wrestlerA.name,
        wrestlerBName: wrestlerB.name,
        wrestlerAId: wrestlerA.id,
        wrestlerBId: wrestlerB.id,
        winnerName: winner.name,
        winnerId: winner.id,
        income: matchIncome,
        hearts: getHeartsByHype(getEffectiveHypeValue(session.runningHype)),
        injury: injuryInfo,
        hypeAfterMatch: getEffectiveHypeValue(session.runningHype),
        battleResult,
        finishType: battleResult.finishType,
        highlightLabel: getHighlightLabel(battleResult.highlight),
        turnCount: battleResult.totalTurns,
        crowdLabel: revenueTier.label,
        crowdMultiplier: revenueTier.multiplier,
        titleOutcome,
        championshipKey,
        matchTypeLabel: battleResult.matchTypeLabel || "",
        rivalryBadge,
        rivalryStageLabel: getRivalryStageLabel(rivalry),
        rivalryStoryText,
        rivalryHypeBonus,
        rivalryRevenueMultiplier,
        alignmentLabel: alignmentBonus.label,
        alignmentRevenueMultiplier: alignmentBonus.revenueMultiplier,
        heelBribeCost,
        gmProjection: projection,
        fatigueDelta: 12,
        satisfactionDelta: matchIndex === 0 ? 6 : -2,
        snsLine,
        summaryText: matchIndex === 0 ? "메인 이벤트" : "오프닝 매치",
        rewardText: titleOutcome || (rivalryBadge ? rivalryBadge : "랭킹 변동 없음"),
        triggeredEffects: projection.labels || []
      });
      context.committed = true;
    }

    function finalizePendingWeeklySession() {
      if (!pendingWeeklySession && !restoreRdPendingWeeklySessionFromShowState()) {
        return;
      }
      const session = pendingWeeklySession;
      gameState.rivalries = gameState.rivalries.filter((rivalry) => rivalry.intensity > 0);
      const fanRevenueBonus = Math.floor(session.totalIncome * (getPRIncomeMultiplier() - 1));
      const tvRevenueBonus = getTVWeeklyBonus();
      session.totalIncome += fanRevenueBonus + tvRevenueBonus;
      const championshipRevenueBonus = Math.floor(session.totalIncome * (getChampionshipIncomeMultiplier() - 1));
      session.totalIncome += championshipRevenueBonus;
      const eventRevenueMultiplier = Math.max(1, gameState.eventEffects.nextWeekRevenueMultiplier || 1);
      const preEventIncome = session.totalIncome;
      session.totalIncome = Math.floor(session.totalIncome * eventRevenueMultiplier);
      const eventRevenueBonus = session.totalIncome - preEventIncome;
      const promotionBrandBonus = applyPromotionBrandIncomeBonus(session);
      const weeklyIncomeMultiplier = Math.max(0, Number(session.weeklyIncomeMultiplier || 1));
      if (weeklyIncomeMultiplier !== 1) {
        session.totalIncome = Math.floor(session.totalIncome * weeklyIncomeMultiplier);
      }
      session.fameGain += getPRWeeklyFameBonus() + getChampionshipWeeklyFameBonus();
      applyPassiveStaminaGrowthFromMatches(session.results);

      gameState.gold += session.totalIncome;
      gameState.fame += session.fameGain;
      gameState.hype = session.runningHype;

      const monthlyLegendTicketBonus = getChampionshipMonthlyLegendTicketBonus();
      pendingWeeklySummary = {
        week: session.week,
        previousHype: session.previousHype,
        previousFame: session.previousFame,
        results: session.results,
        battlePackages: session.battlePackages,
        totalIncome: session.totalIncome,
        fanRevenueBonus,
        tvRevenueBonus,
        championshipRevenueBonus,
        eventRevenueBonus,
        promotionBrandBonus,
        eventRevenueMultiplier,
        heelBribeCostTotal: session.heelBribeCostTotal,
        salaryTotal: session.salaryTotal,
        salaryBreakdown: session.salaryBreakdown,
        fameGain: session.fameGain,
        finalHype: getEffectiveHypeValue(session.runningHype),
        currentFame: gameState.fame,
        matchCount: session.results.length,
        leftWins: session.leftWins,
        leftLosses: session.leftLosses,
        totalAudience: session.totalAudience,
        matchupKeys: session.matchupKeys,
        newlyInjuredIds: session.newlyInjuredIds,
        recoveredPreviewIds: session.recoveredPreviewIds,
        trainingGrowthPreview: session.trainingGrowthPreview,
        monthlyLegendTicketBonus,
        ppvInfo: session.ppvInfo,
        ppvMvpId: "",
        ppvAwardText: "",
        titleChanges: session.titleChanges,
        rivalryHighlights: session.rivalryHighlights,
        rivalryTicketBonus: session.rivalryTicketBonus,
        touchedRivalryKeys: session.touchedRivalryKeys,
        fameBefore: session.previousFame,
        fameAfter: gameState.fame,
        fameDelta: session.fameGain,
        ticketReward: Number(session.ticketReward || 0),
        bonusLines: Array.isArray(session.bonusLines) ? session.bonusLines : [],
        warningLines: Array.isArray(session.warningLines) ? session.warningLines : [],
        injuries: Array.isArray(session.injuries) ? session.injuries : [],
        opponentId: session.opponentId || session.matchContexts?.[0]?.wrestlerB?.id || "",
        mainWrestlerId: session.mainWrestlerId || session.matchContexts?.[0]?.wrestlerA?.id || "",
        mainMatchLost: Boolean(session.mainMatchLost),
        mainMatchCompleted: Boolean(session.mainMatchCompleted),
        mainStatsAppliedDuringShow: Boolean(session.mainStatsAppliedDuringShow),
        rdIncidentCount: Number(session.rdIncidentCount || 0),
        rdShowSession: true
      };
      if (session.ppvInfo.isPpv && session.results.length) {
        const mvpResult = session.results.slice().sort((left, right) => ((right.battleResult?.winnerStats?.damageDealt || 0) + (right.battleResult?.hypeGenerated || 0)) - ((left.battleResult?.winnerStats?.damageDealt || 0) + (left.battleResult?.hypeGenerated || 0)))[0];
        const mvp = findWrestlerById(mvpResult?.winnerId);
        if (mvp) {
          pendingWeeklySummary.ppvMvpId = mvp.id;
          pendingWeeklySummary.ppvAwardText = session.results.some((result) => result.battleResult?.highlight === "CRITICAL_COMEBACK") ? "올해의 경기상" : "이번 PPV 최우수 선수";
        }
      }
      applyMatchSummaryToWeeklyStats(pendingWeeklySummary);
      pendingWeeklySession = null;
      openWeeklyResultsModal();
    }

    function autoResolveBattlePackage(battlePackage) {
      if (!battlePackage) {
        return null;
      }
      while (!battlePackage.battleResult) {
        const resolution = resolveBattleTurn(battlePackage);
        if (resolution.needsPlayerInput) {
          resolveBattleTurn(battlePackage, chooseMove(battlePackage.leftState, battlePackage.rightState));
        }
      }
      return battlePackage;
    }

    function autoResolveRemainingWeeklyMatches() {
      if (!pendingWeeklySession || !Array.isArray(matchAnimationState.queue)) {
        return;
      }
      for (let index = matchAnimationState.matchIndex; index < matchAnimationState.queue.length; index += 1) {
        const entry = matchAnimationState.queue[index];
        if (!isWeeklyMatchContext(entry) || entry.committed) {
          continue;
        }
        const battlePackage = index === matchAnimationState.matchIndex && matchAnimationState.currentBattle
          ? matchAnimationState.currentBattle
          : buildBattlePackageForWeeklyContext(entry, pendingWeeklySession.runningHype);
        autoResolveBattlePackage(battlePackage);
        applyBattlePackageToWeeklySession(entry, battlePackage);
      }
    }

    function resolveMatchQueueEntryForAnimation(entry) {
      if (!entry) {
        return null;
      }
      if (isWeeklyMatchContext(entry)) {
        return buildBattlePackageForWeeklyContext(entry, pendingWeeklySession?.runningHype ?? clamp(gameState.hype + 5, 0, 100));
      }
      return entry;
    }

    function startWeeklyMatches() {
      ensureWeeklyMissionState();
      const readyMatches = getReadyMatches();
      if (!readyMatches.length) {
        return;
      }
      const invalidMatch = readyMatches
        .map((slot, index) => ({
          index,
          wrestlerA: findWrestlerById(slot.wrestlerAId),
          wrestlerB: findWrestlerById(slot.wrestlerBId)
        }))
        .find((entry) => !getBookingMatchRestriction(entry.wrestlerA, entry.wrestlerB).ok);
      if (invalidMatch) {
        const restriction = getBookingMatchRestriction(invalidMatch.wrestlerA, invalidMatch.wrestlerB);
        window.alert(`${invalidMatch.index + 1}번 경기 편성 오류: ${restriction.reason}`);
        return;
      }
      const mainSlot = readyMatches[0] || null;
      const mainWrestler = findWrestlerById(mainSlot?.wrestlerAId);
      const mainRequirementFailure = mainSlot?.divisionGenerated ? "" : getWrestlerMainEventRequirementFailure(mainWrestler);
      if (mainRequirementFailure) {
        window.alert(`메인 이벤트 편성 오류: ${mainRequirementFailure}`);
        return;
      }
      const ppvInfo = getPpvInfo();
      if (ppvInfo.isPpv && getAvailableTitleMatchChampionship() && !hasTitleMatchBooked()) {
        window.alert("PPV 주간에는 메인 이벤트 타이틀 매치가 필요합니다.");
        return;
      }
      if (ppvInfo.isPpv && !gameState.ppvState.featuredMatchType) {
        gameState.ppvState.featuredMatchType = ppvInfo.featuredMatchType || PPV_MATCH_TYPES[Math.floor(Math.random() * PPV_MATCH_TYPES.length)];
      }
      const matchContexts = readyMatches
        .map((slot, matchIndex) => createWeeklyMatchContext(slot, matchIndex, ppvInfo))
        .filter(Boolean);
      if (!matchContexts.length) {
        return;
      }
      const medicalHealAmount = getMedicalWeeklyHealAmount();
      pendingWeeklySession = {
        week: gameState.week,
        previousHype: getEffectiveHypeValue(gameState.hype),
        previousFame: gameState.fame,
        runningHype: clamp(gameState.hype + 5, 0, 100),
        totalIncome: 0,
        fameGain: 0,
        leftWins: 0,
        leftLosses: 0,
        totalAudience: 0,
        heelBribeCostTotal: 0,
        matchupKeys: matchContexts.map((context) => context.matchupKey),
        newlyInjuredIds: [],
        titleChanges: [],
        rivalryHighlights: [],
        touchedRivalryKeys: matchContexts.map((context) => context.rivalryKey).filter(Boolean),
        rivalryTicketBonus: 0,
        recoveredPreviewIds: gameState.roster
          .filter((wrestler) => wrestler.status === "injured" && wrestler.injuryWeeks > 0 && Math.max(0, wrestler.injuryWeeks - medicalHealAmount) === 0)
          .map((wrestler) => wrestler.id),
        results: [],
        battlePackages: [],
        trainingGrowthPreview: previewWeeklyTraining(),
        salaryBreakdown: getWeeklySalaryBreakdown(),
        salaryTotal: getWeeklySalaryTotal(),
        ppvInfo,
        matchContexts
      };
      activeTab = "home";
      render();
      matchAnimationState.finishCallback = finalizePendingWeeklySession;
      startMatchAnimation(matchContexts);
    }

    const startManualWeeklyMatches = startWeeklyMatches;

    function openWeeklyResultsModal() {
      if (!pendingWeeklySummary) {
        return;
      }
      const ppvSummaryBlock = pendingWeeklySummary.ppvInfo?.isPpv
        ? `<div class="result-summary-item" style="margin-bottom:14px;">
            <div class="result-summary-label">${pendingWeeklySummary.ppvInfo.name} 특별 결산</div>
            <div style="color:#bdc3c7;font-size:13px;line-height:1.8;">
              <div>🎖 MVP: ${findWrestlerById(pendingWeeklySummary.ppvMvpId)?.name || "미선정"}</div>
              <div>🏅 ${pendingWeeklySummary.ppvAwardText || "특별 수상 없음"}</div>
              <div>🎪 특수 매치: ${(pendingWeeklySummary.ppvInfo.featuredMatchType || "").replaceAll("_", " ")}</div>
              ${pendingWeeklySummary.ppvInfo.isMania ? "<div>👑 RING DYNASTY MANIA 보너스: 레거시 포인트 +3</div>" : ""}
            </div>
          </div>`
        : "";

      const netProfit = pendingWeeklySummary.totalIncome - pendingWeeklySummary.salaryTotal;
      const gmResults = pendingWeeklySummary.results.filter((result) => result.gmProjection);
      const avgQuality = gmResults.length ? Math.round(gmResults.reduce((sum, result) => sum + Number(result.gmProjection.quality || 0), 0) / gmResults.length) : 0;
      const avgCrowd = gmResults.length ? Math.round(gmResults.reduce((sum, result) => sum + Number(result.gmProjection.crowd || 0), 0) / gmResults.length) : pendingWeeklySummary.finalHype;
      const avgRisk = gmResults.length ? Math.round(gmResults.reduce((sum, result) => sum + Number(result.gmProjection.risk || 0), 0) / gmResults.length) : 0;
      const showGrade = avgQuality >= 88 ? "A" : avgQuality >= 78 ? "B+" : avgQuality >= 68 ? "B-" : avgQuality >= 56 ? "C+" : "C";
      const injuredLines = pendingWeeklySummary.results
        .filter((result) => result.injury)
        .map((result) => `<div>🩹 ${result.injury.wrestlerName} - ${result.injury.injuryWeeks}주 부상</div>`)
        .join("");
      const recoveredLines = pendingWeeklySummary.recoveredPreviewIds
        .map((wrestlerId) => findWrestlerById(wrestlerId))
        .filter(Boolean)
        .map((wrestler) => `<div>✅ ${wrestler.name} - 다음 주 시작 시 회복 완료</div>`)
        .join("");
      const salaryLines = pendingWeeklySummary.salaryBreakdown
        .map((entry) => `<div>${entry.name}: -${formatNumber(entry.salary)} G</div>`)
        .join("");
      const growthLines = pendingWeeklySummary.trainingGrowthPreview
        .map((entry) => `<div>${entry.name} · ${entry.statKey === "power" ? "힘" : entry.statKey === "technique" ? "기술" : "카리스마"}: ${formatAverage(entry.before)} → ${formatAverage(entry.after)} (+${formatAverage(entry.gain)})${entry.modeLabel ? ` · ${entry.modeLabel}` : ""}${entry.staminaDelta ? ` · 체력 ${entry.staminaDelta > 0 ? "+" : ""}${entry.staminaDelta}` : ""}${entry.goldBonus ? ` · 팬 수익 +${formatNumber(entry.goldBonus)}G` : ""}${entry.newStyle ? ` · ⚡ 스타일 변화 예정: ${getStyleMeta(entry.newStyle).label}` : ""}${entry.hitCap ? " · ⚠️ 한계 도달" : ""}</div>`)
        .join("");
      const titleLines = pendingWeeklySummary.titleChanges
        .map((line) => `<div>${line}</div>`)
        .join("");
      const rivalryHeader = pendingWeeklySummary.rivalryHighlights.length
        ? `<div class="${pendingWeeklySummary.rivalryHighlights.some((line) => /클라이맥스|악연/.test(line)) ? "story-banner rivalry" : ""}" style="${pendingWeeklySummary.rivalryHighlights.some((line) => /클라이맥스|악연/.test(line)) ? "padding:12px;" : ""}font-style:italic;color:#f5cba7;margin-bottom:12px;line-height:1.8;">${pendingWeeklySummary.rivalryHighlights.map((line) => `<div>${line}</div>`).join("")}</div>`
        : "";
      const resultsHtml = pendingWeeklySummary.results.map((result, index) => `
        <div class="result-card result-reveal" style="animation-delay:${(index * 0.8).toFixed(1)}s;">

    function advanceToNextWeek() {
      if (!pendingWeeklySummary) {
        return;
      }

      const salaryResult = applySalaryForWeek();
      const appliedTrainingGrowth = applyWeeklyTraining();
      if (pendingWeeklySummary.ppvMvpId) {
        const mvp = findWrestlerById(pendingWeeklySummary.ppvMvpId);
        if (mvp) {
          mvp.stats.charisma = clamp(mvp.stats.charisma + 5, 1, getAdjustedStatCap(mvp));
          mvp.stats.fame = clamp(mvp.stats.fame + 15, 1, 100);
        }
      }
      if (pendingWeeklySummary.results.some((result) => result.battleResult?.highlight === "CRITICAL_COMEBACK")) {
        gameState.ppvState.annualAwardBuffWeeks = Math.max(gameState.ppvState.annualAwardBuffWeeks, 4);
      }
      if (pendingWeeklySummary.ppvInfo?.isMania) {
        gameState.legacy.points += 3;
        gameState.legacy.totalEarned += 3;
      }
      gameState.tickets += 1 + pendingWeeklySummary.monthlyLegendTicketBonus + pendingWeeklySummary.rivalryTicketBonus;
      pendingWeeklySummary.results.forEach((result) => {
        gameState.matchHistory.push({
          week: pendingWeeklySummary.week,
          wrestlerAId: result.wrestlerAId,
          wrestlerBId: result.wrestlerBId,
          winnerId: result.winnerId
        });
      });
      gameState.matchHistory = gameState.matchHistory.slice(-100);
      gameState.history.unshift({
        week: pendingWeeklySummary.week,
        matchCount: pendingWeeklySummary.matchCount,
        record: `${pendingWeeklySummary.leftWins}승 ${pendingWeeklySummary.leftLosses}패`,
        income: pendingWeeklySummary.totalIncome - salaryResult.totalSalary,
        hype: pendingWeeklySummary.finalHype
      });
      gameState.history = gameState.history.slice(0, 20);
      gameState.lastWeekMatchups = pendingWeeklySummary.matchupKeys.slice();
      decayRivalries(pendingWeeklySummary.touchedRivalryKeys || []);
      if (gameState.eventEffects.fanDoubleWeeks > 0) {
        gameState.eventEffects.fanDoubleWeeks -= 1;
      }
      if (gameState.eventEffects.tvDealWeeks > 0) {
        gameState.eventEffects.tvDealWeeks -= 1;
        if (gameState.eventEffects.tvDealWeeks === 0) {
          gameState.eventEffects.tvDealBonus = 0;
        }
      }
      if (gameState.ppvState.annualAwardBuffWeeks > 0) {
        gameState.ppvState.annualAwardBuffWeeks -= 1;
      }
      gameState.eventEffects.nextWeekRevenueMultiplier = 1;
      decrementContracts();
      const expiringContractIds = gameState.roster
        .filter((wrestler) => wrestler.contractWeeks > 0 && wrestler.contractWeeks <= 2)
        .map((wrestler) => wrestler.id);
      const expiredContractNames = removeExpiredContracts().map((wrestler) => wrestler.name);
      const completedPpvWeek = Boolean(pendingWeeklySummary.ppvInfo?.isPpv);
      const agedUpNames = [];
      if (pendingWeeklySummary.week % 4 === 0) {
        const trackAging = (collection) => {
          (collection || []).forEach((wrestler) => {
            if (!wrestler) {
              return;
            }
            wrestler.age = Math.max(16, Math.floor((wrestler.age || 18) + 1));
            agedUpNames.push(wrestler.name);
          });
        };
        trackAging(gameState.roster);
        trackAging(gameState.freeAgents);
        trackAging(gameState.prospects);
      }
      const retirementCandidates = applyWeeklyAgingEffects();
      gameState.week += 1;
      gameState.weeklyCard = createEmptyWeeklyCard(gameState.week);
      gameState.weeklyCpuOpponent = createWeeklyCpuOpponent(gameState.week);
      if (gameState.weeklyCard[0]) {
        gameState.weeklyCard[0].wrestlerBId = gameState.weeklyCpuOpponent.id;
      }
      gameState.roster.forEach((wrestler) => {
        if (gradeRank(wrestler.grade) >= gradeRank("A") && Number(wrestler.lastBookedWeek || 0) < gameState.week - 2) {
          wrestler.roleSatisfaction = clamp(Number(wrestler.roleSatisfaction ?? 70) - 8, 0, 100);
        }
        if (wrestler.restMode || wrestler.status === "idle") {
          wrestler.condition = clamp((wrestler.condition || 70) + 8, 0, 100);
        }
        wrestler.restMode = false;
      });
      const recoveredIds = updateInjuryRecoveryForNewWeek(pendingWeeklySummary.newlyInjuredIds || []);
      gameState.freeAgents = generateFreeAgentsForWeek();
      gameState.freeAgentsWeek = gameState.week;
      gameState.prospects = generateProspectScoutsForWeek();
      gameState.prospectsWeek = gameState.week;
      if (getWeeksUntilNextPpv() === 2 && gameState.ppvState.selectedMainEventIds.length === 2 && gameState.ppvState.buildAppliedWeek !== gameState.week) {
        const [leftId, rightId] = gameState.ppvState.selectedMainEventIds;
        const rivalry = createOrUpdateRivalry(leftId, rightId, "grudge", 10);
        if (rivalry) {
          gameState.ppvState.buildAppliedWeek = gameState.week;
        }
      }
      if (completedPpvWeek) {
        gameState.ppvState.selectedMainEventIds = [];
      }
      if (!getPpvInfo().isPpv) {
        gameState.ppvState.featuredMatchType = "";
      }
      const stageUnlockMessage = checkStageUnlock();
      const championshipUnlockMessages = checkChampionshipUnlocks();
      const unlockedAchievements = checkPersistentAchievements({
        matchCount: pendingWeeklySummary.matchCount,
        totalAudience: pendingWeeklySummary.totalAudience
      });
      const triggerEnding = getWorldEndingReady();
      if (triggerEnding) {
        gameState.achievements.titles.push("월드 제패");
      }
      const eventData = triggerEnding ? null : rollWeeklyEvent();
      pendingWeeklySummary = null;
      clearDivisionShowRuntimeState({ activePage: "assignment", clearWeeklyCard: true });
      closeModal(true);
      saveGameState();
      render();
      openPostAdvanceNotices({
        stageUnlockMessage,
        championshipUnlockMessages,
        appliedTrainingGrowth,
        recoveredIds,
        retirementCandidates,
        expiringContractIds,
        expiredContractNames,
        agedUpNames,
        unlockedAchievements,
        eventData,
        triggerEnding
      });
    }

    function openModal(contentHtml, options = {}) {
      modalWindowEl.innerHTML = contentHtml;
      modalWindowEl.className = `modal-window${options.className ? ` ${options.className}` : ""}`;
      modalOverlayEl.classList.add("show");
      modalLocked = Boolean(options.locked);
      const closeButtons = Array.from(modalWindowEl.querySelectorAll("[data-modal-close]"));
      closeButtons.forEach((button) => button.addEventListener("click", closeModal));
    }

    function closeModal(force = false) {
      if (modalLocked && !force) {
        return;
      }
      modalOverlayEl.classList.remove("show");
      modalWindowEl.innerHTML = "";
      modalWindowEl.className = "modal-window";
      modalLocked = false;
    }

    function createCoachFromWrestler(wrestler) {
      return {
        id: `coach_${wrestler.id}`,
        name: wrestler.name,
        facilityKey: getCoachFacilityForWrestler(wrestler),
        bonusMultiplier: 1.2,
        sourceWrestlerId: wrestler.id,
        spriteSheet: getResolvedPortraitSpriteSheet(wrestler),
        spriteColor: wrestler.spriteColor
      };
    }

    function clearWrestlerFromOwnership(wrestlerId) {
      gameState.weeklyCard.forEach((slot) => {
        if (slot.wrestlerAId === wrestlerId) {
          slot.wrestlerAId = null;
        }
        if (slot.wrestlerBId === wrestlerId) {
          slot.wrestlerBId = null;
        }
      });
      Object.keys(gameState.championships).forEach((key) => {
        if (gameState.championships[key].holderId === wrestlerId) {
          gameState.championships[key].holderId = null;
          gameState.championships[key].defenseWeek = 0;
        }
      });
      gameState.rivalries = gameState.rivalries.filter((rivalry) => rivalry.wrestlerAId !== wrestlerId && rivalry.wrestlerBId !== wrestlerId);
    }

    function retireWrestler(wrestlerId, asCoach = false) {
      const targetIndex = gameState.roster.findIndex((item) => item.id === wrestlerId);
      if (targetIndex === -1) {
        return false;
      }
      const wrestler = gameState.roster[targetIndex];
      clearWrestlerFromOwnership(wrestlerId);
      gameState.hype = clamp(gameState.hype + 20, 0, 100);
      if (asCoach) {
        gameState.coaches.push(createCoachFromWrestler(wrestler));
      }
      gameState.roster.splice(targetIndex, 1);
      return true;
    }

        return;

        });
