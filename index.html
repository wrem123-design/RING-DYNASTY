    }
    // 레슬러 전투력과 승률을 계산한다.
    function getWrestlerPower(wrestler, opponent = null) {
      if (!wrestler) {
        return 0;
      }
      const effectiveStats = getEffectiveWrestlerStats(wrestler, opponent);
      const total = effectiveStats.power + effectiveStats.stamina + effectiveStats.technique + effectiveStats.charisma + effectiveStats.fame;
      return total / 5;
    }

    function formatAverageRosterPower() {
      if (!gameState.roster.length) {
        return "0.0";
      }
      const total = gameState.roster.reduce((sum, wrestler) => sum + getWrestlerPower(wrestler), 0);
      return formatAverage(total / gameState.roster.length);
    }

    function getWinRate(wrestler) {
      const totalMatches = wrestler.wins + wrestler.losses;
      if (totalMatches === 0) {
        return "0%";
      }
      return `${Math.round((wrestler.wins / totalMatches) * 100)}%`;
    }

    // 경기 승률을 계산한다.
    function calcWinRate(wrestlerA, wrestlerB) {
      const totalA = Object.values(wrestlerA.stats).reduce((a, b) => a + b, 0);
      const totalB = Object.values(wrestlerB.stats).reduce((a, b) => a + b, 0);

      let winRate = totalA / (totalA + totalB);
      const gradeBonus = { LEGEND: 0.15, S: 0.1, A: 0.05, B: 0, C: -0.05 };
      winRate += (gradeBonus[wrestlerA.grade] || 0) - (gradeBonus[wrestlerB.grade] || 0);
      winRate += (Math.random() - 0.5) * 0.2;

      return Math.max(0.05, Math.min(0.95, winRate));
    }

    // 주간 경기 운영용 공용 함수를 정의한다.
    function findWrestlerById(wrestlerId) {
      return gameState.roster.find((wrestler) => wrestler.id === wrestlerId)
        || (gameState.weeklyCpuOpponent?.id === wrestlerId ? gameState.weeklyCpuOpponent : null)
        || null;
    }

    function getRosterGradeMultiplier(grade) {
      return {
        C: 1.0,
        B: 1.5,
        A: 2.5,
        S: 4.0,
        LEGEND: 8.0
      }[grade] || 1.0;
    }

    function getMatchupKey(wrestlerAId, wrestlerBId) {
      return [wrestlerAId, wrestlerBId].filter(Boolean).sort().join("__");
    }

    function getBookedWrestlerIds() {
      return gameState.weeklyCard.flatMap((slot) => [slot.wrestlerAId, slot.wrestlerBId]).filter(Boolean);
    }

    function isWrestlerBooked(wrestlerId) {
      return getBookedWrestlerIds().includes(wrestlerId);
    }

    function getAvailableCardRoster() {
      return gameState.roster.filter((wrestler) => wrestler.status === "idle");
    }

    function getNextEmptySlotPosition() {
      for (let slotIndex = 0; slotIndex < gameState.weeklyCard.length; slotIndex += 1) {
        const slot = gameState.weeklyCard[slotIndex];
        if (!slot.wrestlerAId) {
          return { slotIndex, side: "A" };
        }
        if (slotIndex === 0) {
          continue;
        }
        if (!slot.wrestlerBId) {
          return { slotIndex, side: "B" };
        }
      }
      return null;
    }

    function getReadyMatches() {
      return gameState.weeklyCard.filter((slot) => slot.wrestlerAId && slot.wrestlerBId);
    }

    function isWeeklyCpuId(wrestlerId) {
      return Boolean(wrestlerId && gameState.weeklyCpuOpponent?.id === wrestlerId);
    }

    function ensureWeeklyMissionState() {
      if (!gameState.weeklyCpuOpponent || gameState.weeklyCpuOpponent.id !== `cpu_week_${gameState.week}`) {
        gameState.weeklyCpuOpponent = createWeeklyCpuOpponent(gameState.week);
      }
      if (!Array.isArray(gameState.stables) || !gameState.stables.length) {
        gameState.stables = sanitizeStables([], gameState.roster);
      }
      if (!Array.isArray(gameState.gmSupportCards)) {
        gameState.gmSupportCards = createDefaultGmSupportCards();
      }
      if (gameState.weeklyCard?.[0] && !gameState.weeklyCard[0].divisionGenerated) {
        gameState.weeklyCard[0].wrestlerBId = gameState.weeklyCpuOpponent.id;
      }
    }

    function getFatiguePercent(wrestler) {
      return clamp(100 - Math.floor(wrestler?.condition ?? 100), 0, 100);
    }

    function getGmStats(wrestler) {
      const stats = wrestler?.stats || {};
      const pwr = Math.round(getWrestlerPower(wrestler));
      const pop = clamp(Math.round(((stats.fame || 0) * 0.72) + ((stats.charisma || 0) * 0.28)), 1, 100);
      const mic = clamp(Math.round(((stats.charisma || 0) * 0.82) + ((stats.fame || 0) * 0.18)), 1, 100);
      const cha = clamp(Math.round(((stats.charisma || 0) * 0.62) + (pwr * 0.18) + ((stats.fame || 0) * 0.2)), 1, 100);
      const tech = clamp(Math.round(stats.technique || pwr), 1, 100);
      const sta = clamp(Math.round(stats.stamina || pwr), 1, 100);
      const loy = clamp(Math.round(58 + (sta * 0.16) - (gradeRank(wrestler?.grade) * 3) + ((wrestler?.wins || 0) - (wrestler?.losses || 0))), 1, 100);
      const ego = clamp(Math.round(28 + (gradeRank(wrestler?.grade) * 8) + (pop * 0.26)), 1, 100);
      const heat = clamp(Math.round((wrestler?.alignment === "heel" ? 34 : 8) + (pop * 0.36) + (mic * 0.2)), 1, 100);
      return { pwr, pop, mic, cha, tech, sta, loy, ego, heat };
    }

    function getGmArchetype(wrestler) {
      const stats = getGmStats(wrestler);
      const seed = String(wrestler?.templateId || wrestler?.id || wrestler?.name || "");
      if (stats.cha >= 82 && stats.pop >= 74) return "leader";
      if (stats.mic >= 82) return "talker";
      if (stats.heat >= 78 && wrestler?.alignment === "heel") return "heelHeat";
      if (stats.tech >= 82) return "technician";
      if (stats.pwr >= 82) return "powerhouse";
      if (stats.sta >= 78 && stats.pwr >= 68) return "brawler";
      if (gradeRank(wrestler?.grade) <= gradeRank("B") && stats.pop >= 55) return "underdog";
      if (seed.length % 5 === 0) return "tagExpert";
      if ((stats.pop + stats.cha) > (stats.pwr + stats.tech)) return "showman";
      return wrestler?.style === "technician" ? "technician" : wrestler?.style === "showman" ? "showman" : "highflyer";
    }

    function getGmArchetypeMeta(wrestler) {
      return GM_ARCHETYPE_META[getGmArchetype(wrestler)] || GM_ARCHETYPE_META.brawler;
    }

    function getGmTrait(wrestler) {
      const archetype = getGmArchetype(wrestler);
      const name = wrestler?.name || "Unknown";
      if (/cody/i.test(name)) return { name: "끝나지 않은 이야기", effect: "메인 이벤트 기대치 +12 / 라이벌리 보너스" };
      if (/roman/i.test(name)) return { name: "부족장", effect: "스테이블 리더 시 HEAT +8 / 라커룸 영향 큼" };
      if (/seth/i.test(name)) return { name: "쇼 스틸러", effect: "TECH 높은 상대와 경기 품질 상승" };
      if (/dominik/i.test(name)) return { name: "핵어그로", effect: "패배해도 관중 반응 손실 감소" };
      if (/rhea/i.test(name)) return { name: "지배자", effect: "강한 상대와 경기 시 PWR 보너스" };
      return {
        powerhouse: { name: "괴물 압박", effect: "낮은 등급 상대 승률 +6 / 품질 -2" },
        technician: { name: "클린 매치", effect: "경기 품질 +8 / 흥행 폭발력 낮음" },
        brawler: { name: "거친 승부", effect: "승률 안정 / 피로도 +4" },
        highflyer: { name: "공중 폭발", effect: "관중 반응 +7 / 부상 위험 +4" },
        showman: { name: "관중 장악", effect: "POP/MIC 기반 쇼 점수 상승" },
        talker: { name: "마이크 장악", effect: "프로모 슬롯 효과 +10" },
        heelHeat: { name: "야유 흡수", effect: "패배해도 HEAT 유지" },
        underdog: { name: "언더독 서사", effect: "강자 상대 선전 시 팬 상승" },
        leader: { name: "라커룸 중심", effect: "스테이블 단결도 영향 증가" },
        tagExpert: { name: "태그 케미", effect: "스테이블/태그 보너스 +8" }
      }[archetype] || { name: "링 센스", effect: "상황 보너스 소폭 상승" };
    }

    function getMainEventRequirement() {
      const week = Math.max(1, Math.floor(gameState.week || 1));
      const cycle = (week - 1) % 6;
      const rankStep = Math.floor((week - 1) / 4);
      const requirements = [
        {
          key: "ovrMin",
          title: `Main Event OVR ${Math.min(86, 58 + (rankStep * 4))}+`,
          desc: `메인 이벤트는 OVR ${Math.min(86, 58 + (rankStep * 4))} 이상 선수만 가능`,
          ovrMin: Math.min(86, 58 + (rankStep * 4))
        },
        {
          key: "ovrMax",
          title: `Main Event OVR ${Math.max(48, 72 - Math.min(18, rankStep * 3))}-`,
          desc: `메인 이벤트는 OVR ${Math.max(48, 72 - Math.min(18, rankStep * 3))} 이하 언더독만 가능`,
          ovrMax: Math.max(48, 72 - Math.min(18, rankStep * 3))
        },
        {
          key: "gradeLimit",
          title: "Main Event B-tier or lower",
          desc: "메인 이벤트는 B급 이하 선수만 가능",
          gradeMax: "B"
        },
        {
          key: "fatigueMin",
          title: `Main Event ${Math.min(40, 15 + (rankStep * 5))}%+ fatigue`,
          desc: `메인 이벤트는 피로도 ${Math.min(40, 15 + (rankStep * 5))}% 이상 선수만 가능`,
          fatigueMin: Math.min(40, 15 + (rankStep * 5))
        },
        {
          key: "fatigueMax",
          title: `Main Event under ${Math.max(20, 45 - (rankStep * 3))}% fatigue`,
          desc: `메인 이벤트는 피로도 ${Math.max(20, 45 - (rankStep * 3))}% 이하 선수만 가능`,
          fatigueMax: Math.max(20, 45 - (rankStep * 3))
        },
        {
          key: "archetype",
          title: "Main Event Highflyer / Showman",
          desc: "메인 이벤트는 하이플라이어 또는 쇼맨 유형만 가능",
          archetypes: ["highflyer", "showman"]
        }
      ];
      return requirements[cycle];
    }

    function getWrestlerMainEventRequirementFailure(wrestler, requirement = getMainEventRequirement()) {
      if (!wrestler || !requirement) {
        return "";
      }
      const ovr = Math.round(getWrestlerPower(wrestler));
      const fatigue = getFatiguePercent(wrestler);
      const gradeValue = gradeRank(wrestler.grade);
      if (Number.isFinite(requirement.ovrMin) && ovr < requirement.ovrMin) {
        return `이번 주 메인 이벤트는 OVR ${requirement.ovrMin} 이상만 가능합니다.`;
      }
      if (Number.isFinite(requirement.ovrMax) && ovr > requirement.ovrMax) {
        return `이번 주 메인 이벤트는 OVR ${requirement.ovrMax} 이하 언더독만 가능합니다.`;
      }
      if (requirement.gradeMax && gradeValue > gradeRank(requirement.gradeMax)) {
        return `이번 주 메인 이벤트는 ${requirement.gradeMax}급 이하만 가능합니다.`;
      }
      if (Number.isFinite(requirement.fatigueMin) && fatigue < requirement.fatigueMin) {
        return `이번 주 메인 이벤트는 피로도 ${requirement.fatigueMin}% 이상 선수만 가능합니다.`;
      }
      if (Number.isFinite(requirement.fatigueMax) && fatigue > requirement.fatigueMax) {
        return `이번 주 메인 이벤트는 피로도 ${requirement.fatigueMax}% 이하 선수만 가능합니다.`;
      }
      if (Array.isArray(requirement.archetypes) && requirement.archetypes.length) {
        const archetype = getGmArchetype(wrestler);
        const style = wrestler.style || "";
        if (!requirement.archetypes.includes(archetype) && !requirement.archetypes.includes(style)) {
          const labels = requirement.archetypes.map((key) => GM_ARCHETYPE_META[key]?.label || getStyleMeta(key).label || key).join(" / ");
          return `이번 주 메인 이벤트는 ${labels} 유형만 가능합니다.`;
        }
      }
      return "";
    }

    function canUseWrestlerInMainEvent(wrestler) {
      return !getWrestlerMainEventRequirementFailure(wrestler);
    }

    function getWeeklyObjectiveSet() {
      ensureWeeklyMissionState();
      const cpu = gameState.weeklyCpuOpponent;
      const cpuType = getGmArchetypeMeta(cpu);
      const targetRating = gameState.week >= 12 ? "B-" : gameState.week >= 6 ? "C+" : "C";
      const typeKey = ["powerhouse", "technician", "showman"][gameState.week % 3];
      const mainRequirement = getMainEventRequirement();
      return {
        cpu,
        targetRating,
        requiredType: typeKey,
        fatigueCap: 70,
        mainRequirement,
        objectives: [
          { key: "mainWin", title: "Win the Main Event", desc: "메인 이벤트에서 승리" },
          { key: "mainRestriction", title: mainRequirement.title, desc: mainRequirement.desc },
          { key: "rating", title: `Show Rating ${targetRating}`, desc: `쇼 평점 ${targetRating} 이상` },
          { key: "fatigue", title: "No wrestler above 70% fatigue", desc: "피로도 70% 이상 출전 금지" }
        ],
        bonus: `+${formatNumber(200 + (gameState.week * 20))}G · 팬 +${3 + Math.floor(gameState.week / 4)}%`,
        scouting: `${cpu.name} · ${cpuType.label} / 약점: ${getStyleMeta(getCounterStyle(cpu.style)).label}`
      };
    }

    function getCounterStyle(style) {
      return style === "powerhouse" ? "technician" : style === "technician" ? "showman" : "powerhouse";
    }

    function getMatchProjection(slot, slotIndex = 0) {
      const left = findWrestlerById(slot?.wrestlerAId);
      const right = findWrestlerById(slot?.wrestlerBId) || (slotIndex === 0 ? gameState.weeklyCpuOpponent : null);
      if (!left || !right) {
        return { ready: false, win: 0, quality: 0, crowd: 0, risk: 0, rating: "-", labels: ["선수 배치 대기"] };
      }
      const leftPower = Number(getWrestlerPower(left, right)) || Number(left.power) || 0;
      const rightPower = Number(getWrestlerPower(right, left)) || Number(right.power) || 0;
      const fatiguePenalty = (Number(getFatiguePercent(left)) || 0) * 0.16;
      const styleMatch = getStyleMatchup(left.style, right.style) || {};
      const styleBonus = (Number(styleMatch.matchup ?? styleMatch.score ?? styleMatch.value) || 0) * 8;
      const rivalry = getRivalryBetween(left.id, right.id);
      const stableBonus = getStableBonusForPair(left.id, right.id);
      const underdogSupport = getGmSupportCount("underdog_hero") > 0 && gradeRank(left.grade) < gradeRank(right.grade) ? 8 : 0;
      const entranceSupport = getGmSupportCount("entrance_theme") > 0 ? 5 : 0;
      const recoverySupport = getGmSupportCount("recovery_kit") > 0 ? -4 : 0;
      const stableWin = Number(stableBonus.win) || 0;
      const stableQuality = Number(stableBonus.quality) || 0;
      const stableCrowd = Number(stableBonus.crowd) || 0;
      const win = clamp(Math.round(50 + ((leftPower - rightPower) * 1.35) + styleBonus + stableWin + underdogSupport - fatiguePenalty), 5, 95);
      const leftStats = getGmStats(left);
      const rightStats = getGmStats(right);
      const repeatPenalty = checkRepeatMatchup(left.id, right.id) ? 12 : 0;
      const quality = clamp(Math.round(((leftStats.tech + rightStats.tech) / 2) + (rivalry ? 8 : 0) + stableQuality - repeatPenalty - ((Number(getFatiguePercent(left)) || 0) * 0.1)), 1, 100);
      const crowd = clamp(Math.round(((leftStats.pop + rightStats.pop + leftStats.mic + rightStats.heat) / 4) + (slotIndex === 0 ? 12 : 0) + (rivalry ? getRivalryHypeBonus(rivalry) * 0.6 : 0) + stableCrowd + entranceSupport - repeatPenalty), 1, 100);
      const risk = clamp(Math.round(8 + ((Number(getFatiguePercent(left)) || 0) * 0.45) + (getGmArchetype(left) === "highflyer" ? 7 : 0) + (getGmArchetype(left) === "brawler" ? 4 : 0) + recoverySupport), 1, 95);
      const showScore = Math.round((win * 0.28) + (quality * 0.36) + (crowd * 0.36));
      const rating = showScore >= 88 ? "A" : showScore >= 78 ? "B+" : showScore >= 70 ? "B-" : showScore >= 60 ? "C+" : showScore >= 48 ? "C" : "D";
      const labels = [
        rivalry ? `라이벌리 +${getRivalryHypeBonus(rivalry)}` : "신규 매치",
        stableBonus.label,
        underdogSupport ? "언더독 히어로 +8" : "",
        entranceSupport ? "입장 연출 +5" : "",
        recoverySupport ? "회복 키트 위험 -4" : "",
        getFatiguePercent(left) >= 70 ? "피로 위험" : "컨디션 관리 가능"
      ].filter(Boolean);
      return { ready: true, win, quality, crowd, risk, rating, showScore, labels };
    }

    function getStableBonusForPair(leftId, rightId) {
      const stable = (gameState.stables || []).find((item) => item.memberIds?.includes(leftId) || item.memberIds?.includes(rightId));
      if (!stable) {
        return { win: 0, quality: 0, crowd: 0, label: "" };
      }
      const sameStable = stable.memberIds.includes(leftId) && stable.memberIds.includes(rightId);
      const unityBonus = Math.floor((stable.unity || 0) / 20);
      return {
        win: sameStable ? unityBonus : Math.floor(unityBonus / 2),
        quality: sameStable ? unityBonus + 2 : 0,
        crowd: Math.floor((stable.fanBuzz || 0) / 12),
        label: sameStable ? `스테이블 케미 +${unityBonus}` : `스테이블 버즈 +${Math.floor((stable.fanBuzz || 0) / 12)}`
      };
    }

    function checkRepeatMatchup(wrestlerAId, wrestlerBId, weeks = 2) {
      const recent = gameState.matchHistory.filter((match) => match.week >= gameState.week - weeks);
      return recent.some((match) => (
        (match.wrestlerAId === wrestlerAId && match.wrestlerBId === wrestlerBId)
        || (match.wrestlerAId === wrestlerBId && match.wrestlerBId === wrestlerAId)
      ));
    }

    function sanitizeRivalries(rawRivalries) {
      if (!Array.isArray(rawRivalries)) {
        return [];
      }

      return rawRivalries.slice(-30).map((entry) => {
        const intensity = Number.isFinite(entry?.intensity) ? clamp(Math.floor(entry.intensity), 0, 100) : 0;
        const history = Array.isArray(entry?.history) ? entry.history.slice(-12).map((event) => ({
          week: Number.isFinite(event?.week) ? Math.max(1, Math.floor(event.week)) : 1,
          showType: event?.showType === "PPV" ? "PPV" : "RAW",
          segmentType: typeof event?.segmentType === "string" ? event.segmentType : "match",
          summary: typeof event?.summary === "string" ? event.summary : "",
          participants: Array.isArray(event?.participants) ? event.participants.filter((id) => typeof id === "string").slice(0, 6) : [],
          resultType: typeof event?.resultType === "string" ? event.resultType : "",
          heatChange: Number.isFinite(event?.heatChange) ? Math.floor(event.heatChange) : 0,
          crowdReaction: Number.isFinite(event?.crowdReaction) ? clamp(Math.floor(event.crowdReaction), 0, 100) : 50,
          winnerId: typeof event?.winnerId === "string" ? event.winnerId : "",
          loserId: typeof event?.loserId === "string" ? event.loserId : ""
        })).filter((event) => event.summary) : [];
        return {
          wrestlerAId: typeof entry?.wrestlerAId === "string" ? entry.wrestlerAId : "",
          wrestlerBId: typeof entry?.wrestlerBId === "string" ? entry.wrestlerBId : "",
          intensity,
          heat: Number.isFinite(entry?.heat) ? clamp(Math.floor(entry.heat), 0, 100) : intensity,
          level: Number.isFinite(entry?.level) ? clamp(Math.floor(entry.level), 1, 4) : getRivalryLevelFromHeat(intensity),
          phaseWeek: Number.isFinite(entry?.phaseWeek) ? clamp(Math.floor(entry.phaseWeek), 1, 4) : 1,
          freshness: Number.isFinite(entry?.freshness) ? clamp(Math.floor(entry.freshness), 0, 100) : 100,
          status: ["active", "ppv_locked", "finished", "cooled_down"].includes(entry?.status) ? entry.status : "active",
          type: ["heel_vs_face", "title", "grudge"].includes(entry?.type) ? entry.type : "grudge",
          week_started: Number.isFinite(entry?.week_started) ? Math.max(0, Math.floor(entry.week_started)) : 0,
          matches_fought: Number.isFinite(entry?.matches_fought) ? Math.max(0, Math.floor(entry.matches_fought)) : 0,
          arc_stage: Number.isFinite(entry?.arc_stage) ? clamp(Math.floor(entry.arc_stage), 0, 3) : 0,
          history,
          lastIncident: typeof entry?.lastIncident === "string" ? entry.lastIncident : "",
          nextTrigger: typeof entry?.nextTrigger === "string" ? entry.nextTrigger : "",
          nextTriggerType: typeof entry?.nextTriggerType === "string" ? entry.nextTriggerType : "",
          ppvMatchConfirmed: Boolean(entry?.ppvMatchConfirmed),
          ppvMatchType: typeof entry?.ppvMatchType === "string" ? entry.ppvMatchType : "",
          winnerId: typeof entry?.winnerId === "string" ? entry.winnerId : "",
          loserId: typeof entry?.loserId === "string" ? entry.loserId : "",
          cooldownUntilWeek: Number.isFinite(entry?.cooldownUntilWeek) ? Math.max(0, Math.floor(entry.cooldownUntilWeek)) : 0,
          rematchBlockedUntilWeek: Number.isFinite(entry?.rematchBlockedUntilWeek) ? Math.max(0, Math.floor(entry.rematchBlockedUntilWeek)) : 0,
          lastIncidentWeek: Number.isFinite(entry?.lastIncidentWeek) ? Math.max(0, Math.floor(entry.lastIncidentWeek)) : 0,
          interferenceCount: Number.isFinite(entry?.interferenceCount) ? Math.max(0, Math.floor(entry.interferenceCount)) : 0,
          directMatchCount: Number.isFinite(entry?.directMatchCount) ? Math.max(0, Math.floor(entry.directMatchCount)) : 0,
          promoCount: Number.isFinite(entry?.promoCount) ? Math.max(0, Math.floor(entry.promoCount)) : 0,
          backstageCount: Number.isFinite(entry?.backstageCount) ? Math.max(0, Math.floor(entry.backstageCount)) : 0
        };
      }).filter((entry) => entry.wrestlerAId && entry.wrestlerBId && entry.intensity > 0 && entry.status !== "finished");
    }

    function getRivalryTypeLabel(type) {
      return {
        heel_vs_face: "악역 vs 선역",
        title: "타이틀",
        grudge: "앙금"
      }[type] || "라이벌";
    }

    function getRivalryStageFromIntensity(intensity) {
      if (intensity >= 91) {
        return 3;
      }
      if (intensity >= 61) {
        return 2;
      }
      if (intensity >= 31) {
        return 1;
      }
      return intensity > 0 ? 0 : 0;
    }

    function getRivalryBetween(wrestlerAId, wrestlerBId) {
      return gameState.rivalries.find((rivalry) => (
        (rivalry.wrestlerAId === wrestlerAId && rivalry.wrestlerBId === wrestlerBId)
        || (rivalry.wrestlerAId === wrestlerBId && rivalry.wrestlerBId === wrestlerAId)
      )) || null;
    }

    function getRivalryKey(wrestlerAId, wrestlerBId) {
      return [wrestlerAId, wrestlerBId].filter(Boolean).sort().join("__");
    }

    function getRivalryPhaseWeek(rivalry, weekValue = gameState.week) {
      return clamp(((weekValue - (rivalry?.week_started || weekValue)) % 4) + 1, 1, 4);
    }

    function ensureRivalryExtendedState(rivalry) {
      if (!rivalry) {
        return null;
      }
      rivalry.heat = Number.isFinite(rivalry.heat) ? clamp(Math.floor(rivalry.heat), 0, 100) : clamp(rivalry.intensity || 0, 0, 100);
      rivalry.level = getRivalryLevelFromHeat(rivalry.heat);
      rivalry.phaseWeek = getRivalryPhaseWeek(rivalry);
      rivalry.freshness = Number.isFinite(rivalry.freshness) ? clamp(Math.floor(rivalry.freshness), 0, 100) : clamp(100 - ((rivalry.matches_fought || 0) * 10), 25, 100);
      rivalry.status = ["active", "ppv_locked", "finished", "cooled_down"].includes(rivalry.status) ? rivalry.status : "active";
      rivalry.history = Array.isArray(rivalry.history) ? rivalry.history.slice(-12) : [];
      rivalry.lastIncident = typeof rivalry.lastIncident === "string" ? rivalry.lastIncident : "";
      rivalry.nextTrigger = typeof rivalry.nextTrigger === "string" ? rivalry.nextTrigger : "";
      rivalry.nextTriggerType = typeof rivalry.nextTriggerType === "string" ? rivalry.nextTriggerType : "";
      rivalry.ppvMatchConfirmed = Boolean(rivalry.ppvMatchConfirmed);
      rivalry.ppvMatchType = typeof rivalry.ppvMatchType === "string" ? rivalry.ppvMatchType : "";
      rivalry.cooldownUntilWeek = Number.isFinite(rivalry.cooldownUntilWeek) ? Math.max(0, Math.floor(rivalry.cooldownUntilWeek)) : 0;
      rivalry.rematchBlockedUntilWeek = Number.isFinite(rivalry.rematchBlockedUntilWeek) ? Math.max(0, Math.floor(rivalry.rematchBlockedUntilWeek)) : 0;
      rivalry.lastIncidentWeek = Number.isFinite(rivalry.lastIncidentWeek) ? Math.max(0, Math.floor(rivalry.lastIncidentWeek)) : 0;
      rivalry.interferenceCount = Number.isFinite(rivalry.interferenceCount) ? Math.max(0, Math.floor(rivalry.interferenceCount)) : 0;
      rivalry.directMatchCount = Number.isFinite(rivalry.directMatchCount) ? Math.max(0, Math.floor(rivalry.directMatchCount)) : 0;
      rivalry.promoCount = Number.isFinite(rivalry.promoCount) ? Math.max(0, Math.floor(rivalry.promoCount)) : 0;
      rivalry.backstageCount = Number.isFinite(rivalry.backstageCount) ? Math.max(0, Math.floor(rivalry.backstageCount)) : 0;
      return rivalry;
    }

    function addRivalryHistory(rivalry, event = {}) {
      const target = ensureRivalryExtendedState(rivalry);
      if (!target) {
        return null;
      }
      const historyEvent = {
        week: Number.isFinite(event.week) ? Math.max(1, Math.floor(event.week)) : gameState.week,
        showType: event.showType === "PPV" ? "PPV" : "RAW",
        segmentType: typeof event.segmentType === "string" ? event.segmentType : "match",
        summary: typeof event.summary === "string" && event.summary ? event.summary : "라이벌리 이벤트가 발생했습니다.",
        participants: Array.isArray(event.participants) ? event.participants.filter((id) => typeof id === "string").slice(0, 6) : [target.wrestlerAId, target.wrestlerBId],
        resultType: typeof event.resultType === "string" ? event.resultType : "",
        heatChange: Number.isFinite(event.heatChange) ? Math.floor(event.heatChange) : 0,
        crowdReaction: Number.isFinite(event.crowdReaction) ? clamp(Math.floor(event.crowdReaction), 0, 100) : 50,
        winnerId: typeof event.winnerId === "string" ? event.winnerId : "",
        loserId: typeof event.loserId === "string" ? event.loserId : ""
      };
      target.history.push(historyEvent);
      target.history = target.history.slice(-12);
      target.lastIncident = historyEvent.summary;
      target.heat = clamp((target.heat || target.intensity || 0) + historyEvent.heatChange, 0, 100);
      target.intensity = target.heat;
      target.level = getRivalryLevelFromHeat(target.heat);
      target.arc_stage = getRivalryStageFromIntensity(target.heat);
      if (historyEvent.segmentType === "interference") {
        target.interferenceCount += 1;
      } else if (["match", "main_event"].includes(historyEvent.segmentType)) {
        target.directMatchCount += 1;
      } else if (["promo", "opening_promo", "contract_signing"].includes(historyEvent.segmentType)) {
        target.promoCount += 1;
      } else if (historyEvent.segmentType === "backstage") {
        target.backstageCount += 1;
      }
      return historyEvent;
    }

    function getFreshnessPenalty(freshness) {
      if (freshness >= 70) return 0;
      if (freshness >= 50) return -5;
      if (freshness >= 30) return -12;
      return -25;
    }

    function adjustRivalryFreshness(rivalry, segmentType) {
      const target = ensureRivalryExtendedState(rivalry);
      if (!target) {
        return 100;
      }
      const delta = {
        match: -18,
        main_event: -18,
        opening_promo: -8,
        promo: -8,
        contract_signing: -8,
        interference: -5,
        backstage: -6,
        rest: 5
      }[segmentType] ?? -4;
      target.freshness = clamp((target.freshness || 100) + delta, 0, 100);
      return target.freshness;
    }

    function createStoryHook(hook = {}) {
      const booking = ensureDivisionBookingState();
      const storyHook = {
        id: `hook_${gameState.week}_${hashString(`${hook.type || "story"}:${hook.rivalryKey || ""}:${hook.title || ""}`)}`,
        weekCreated: gameState.week,
        targetWeek: Number.isFinite(hook.targetWeek) ? Math.max(gameState.week + 1, Math.floor(hook.targetWeek)) : gameState.week + 1,
        type: hook.type || "story",
        rivalryKey: hook.rivalryKey || "",
        priority: Number.isFinite(hook.priority) ? clamp(Math.floor(hook.priority), 0, 100) : 50,
        title: hook.title || "다음 주 후속 이벤트",
        description: hook.description || "",
        suggestedSegmentType: hook.suggestedSegmentType || "opening_promo",
        participants: Array.isArray(hook.participants) ? hook.participants.filter(Boolean).slice(0, 6) : [],
        expiresInWeeks: Number.isFinite(hook.expiresInWeeks) ? Math.max(1, Math.floor(hook.expiresInWeeks)) : 2,
        consumed: false
      };
      booking.storyHooks = (booking.storyHooks || []).filter((item) => !item.consumed).slice(-15);
      booking.storyHooks.push(storyHook);
      return storyHook;
    }

    function getRivalryPreview(wrestlerAId, wrestlerBId, isTitleMatch = false) {
      const existing = getRivalryBetween(wrestlerAId, wrestlerBId);
      if (existing) {
        return existing;
      }
      if (checkRepeatMatchup(wrestlerAId, wrestlerBId)) {
        const type = isTitleMatch ? "title" : "grudge";
        return {
          wrestlerAId,
          wrestlerBId,
          intensity: isTitleMatch ? 40 : 30,
          type,
          week_started: gameState.week,
          matches_fought: 1,
          arc_stage: getRivalryStageFromIntensity(isTitleMatch ? 40 : 30)
        };
      }
      return null;
    }

    function getRivalryHypeBonus(rivalry) {
      if (!rivalry || rivalry.intensity <= 0) {
        return 0;
      }
      if (rivalry.arc_stage === 3) {
        return 50;
      }
      if (rivalry.arc_stage === 2) {
        return 35;
      }
      if (rivalry.arc_stage === 1) {
        return 20;
      }
      return 10;
    }

    function getRivalryRevenueMultiplier(rivalry) {
      if (!rivalry || rivalry.intensity <= 0) {
        return 1;
      }
      if (rivalry.arc_stage === 3) {
        return 2.5;
      }
      if (rivalry.arc_stage === 2) {
        return 1.8;
      }
      if (rivalry.arc_stage === 1) {
        return 1.4;
      }
      return 1;
    }

    function getRivalryStageLabel(rivalry) {
      if (!rivalry) {
        return "";
      }
      return ["긴장감 조성", "라이벌 선언", "클라이맥스", "클라이맥스 경기"][rivalry.arc_stage] || "라이벌";
    }

    function getRivalryStoryText(rivalry) {
      if (!rivalry || rivalry.intensity <= 0) {
        return "";
      }
      const wrestlerA = findWrestlerById(rivalry.wrestlerAId);
      const wrestlerB = findWrestlerById(rivalry.wrestlerBId);
      const nameA = wrestlerA?.name || "A";
      const nameB = wrestlerB?.name || "B";
      const textPool = {
        heel_vs_face: [
          `${nameA}가 경기 중 반칙으로 ${nameB}를 쓰러뜨렸다!`,
          `${nameB}가 복수를 선언했다. "다음엔 내가 이긴다!"`,
          "이제 모든 게 결판날 시간이다..."
        ],
        title: [
          `${nameB}가 챔피언 ${nameA}에게 정식 도전장을 내밀었다`,
          `${nameA}는 벨트를 걸고 ${nameB}와 정면 승부를 피하지 않겠다`,
          "챔피언십을 건 최후의 결전!"
        ],
        grudge: [
          "두 선수의 과거 악연이 다시 수면 위로 올라왔다",
          "이건 이제 스포츠가 아니다. 개인적인 감정 싸움이다",
          "오직 한 명만이 이 링을 떠날 수 있다"
        ]
      };
      const stageIndex = Math.min(2, Math.max(0, rivalry.arc_stage === 0 ? 0 : rivalry.arc_stage - 1));
      return (textPool[rivalry.type] || textPool.grudge)[stageIndex];
    }

    function getRivalryStageTarget(rivalry) {
      if (!rivalry) {
        return 0;
      }
      if (rivalry.arc_stage === 0) {
        return 31;
      }
      if (rivalry.arc_stage === 1) {
        return 61;
      }
      if (rivalry.arc_stage === 2) {
        return 91;
      }
      return 100;
    }

    function createOrUpdateRivalry(wrestlerAId, wrestlerBId, type = "grudge", amount = 15) {
      let rivalry = getRivalryBetween(wrestlerAId, wrestlerBId);
      if (!rivalry) {
        rivalry = {
          wrestlerAId,
          wrestlerBId,
          intensity: 0,
          heat: 0,
          level: 1,
          phaseWeek: 1,
          freshness: 100,
          status: "active",
          type,
          week_started: gameState.week,
          matches_fought: 0,
          arc_stage: 0,
          history: [],
          lastIncident: "",
          nextTrigger: "",
          nextTriggerType: "",
          ppvMatchConfirmed: false,
          ppvMatchType: "",
          winnerId: "",
          loserId: "",
          cooldownUntilWeek: 0,
          rematchBlockedUntilWeek: 0,
          interferenceCount: 0,
          directMatchCount: 0,
          promoCount: 0,
          backstageCount: 0
        };
        gameState.rivalries.push(rivalry);
      }

      ensureRivalryExtendedState(rivalry);
      if (rivalry.status === "cooled_down" && Number(rivalry.cooldownUntilWeek || 0) <= gameState.week) {
        rivalry.status = "active";
      }
      rivalry.type = type || rivalry.type;
      rivalry.intensity = clamp(rivalry.intensity + amount, 0, 100);
      rivalry.heat = rivalry.intensity;
      rivalry.matches_fought += 1;
      rivalry.arc_stage = getRivalryStageFromIntensity(rivalry.intensity);
      rivalry.level = getRivalryLevelFromHeat(rivalry.intensity);
      rivalry.phaseWeek = getRivalryPhaseWeek(rivalry);
      return rivalry;
    }

    function decayRivalries(excludedKeys = []) {
      gameState.rivalries = gameState.rivalries
        .map((rivalry) => {
          const key = getRivalryKey(rivalry.wrestlerAId, rivalry.wrestlerBId);
          const nextIntensity = excludedKeys.includes(key) ? rivalry.intensity : clamp(rivalry.intensity - 5, 0, 100);
          return {
            ...rivalry,
            intensity: nextIntensity,
            arc_stage: getRivalryStageFromIntensity(nextIntensity)
          };
        })
        .filter((rivalry) => rivalry.intensity > 0);
    }

    function getWrestlerRivalrySummary(wrestlerId) {
      const rivalry = gameState.rivalries.find((entry) => entry.wrestlerAId === wrestlerId || entry.wrestlerBId === wrestlerId);
      if (!rivalry) {
        return "";
      }
      const opponentId = rivalry.wrestlerAId === wrestlerId ? rivalry.wrestlerBId : rivalry.wrestlerAId;
      const opponent = findWrestlerById(opponentId);
      return opponent ? `🔥 vs ${opponent.name} (강도: ${rivalry.intensity})` : "";
    }

    function getRivalrySectionHtml() {
      if (!gameState.rivalries.length) {
        return `
          <div class="side-card side-card--info">
            <div class="side-card-title">현재 라이벌</div>
            <div class="side-card-desc">활성 라이벌 관계가 없습니다.</div>
          </div>
        `;
      }

      return `
        <div class="side-card side-card--danger" style="background:
          linear-gradient(rgba(20, 12, 10, 0.72), rgba(20, 12, 10, 0.82)),
          url('${GENERATED_UI_ASSETS.story.rivalry}') center/cover no-repeat;">
          <div class="side-card-title">현재 라이벌</div>
          <div class="side-card-desc" style="display:flex;flex-direction:column;gap:10px;">
            ${gameState.rivalries.slice(0, 4).map((rivalry) => {
              const wrestlerA = findWrestlerById(rivalry.wrestlerAId);
              const wrestlerB = findWrestlerById(rivalry.wrestlerBId);
              const nextStageTarget = getRivalryStageTarget(rivalry);
              const remaining = Math.max(0, nextStageTarget - rivalry.intensity);
              return `
                <div>
                  <div>${wrestlerA?.name || "A"} vs ${wrestlerB?.name || "B"}</div>
                  <div style="font-size:12px;color:#f39c12;">${getRivalryTypeLabel(rivalry.type)} · ${getRivalryStageLabel(rivalry)} · 강도 ${rivalry.intensity}</div>
                  <div class="hype-bar" style="height:8px;margin:6px 0;">
                    <div class="hype-fill" style="width:${rivalry.intensity}%;"></div>
                  </div>
                  <div style="font-size:11px;color:#95a5a6;">다음 단계까지: ${remaining}포인트</div>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function calcHypeChange(matchCard) {
      let hypeChange = 5;

      matchCard.forEach((match) => {
        const wrestlerA = findWrestlerById(match.aId);
        const wrestlerB = findWrestlerById(match.bId);
        if (!wrestlerA || !wrestlerB) {
          return;
        }

        if (checkRepeatMatchup(match.aId, match.bId)) {
          hypeChange -= 10;
        }

        const grades = [wrestlerA.grade, wrestlerB.grade];
        if (grades.includes("LEGEND")) {
          hypeChange += 25;
        } else if (grades.includes("S")) {
          hypeChange += 20;
        } else if (grades.includes("A")) {
          hypeChange += 12;
        } else if (grades.every((grade) => grade === "C")) {
          hypeChange -= 5;
        }

        if (match.isTitleMatch) {
          hypeChange += 30;
        }

        hypeChange += getAlignmentMatchupBonus(wrestlerA, wrestlerB).hypeBonus;

        const rivalry = getRivalryPreview(match.aId, match.bId, Boolean(match.isTitleMatch));
        hypeChange += getRivalryHypeBonus(rivalry);
      });

      return hypeChange;
    }

    function getProjectedWeeklyCard() {
      return getReadyMatches().map((slot) => ({
        aId: slot.wrestlerAId,
        bId: slot.wrestlerBId,
        isTitleMatch: Boolean(slot.titleMatch)
      }));
    }

    function getProjectedHypeChange() {
      return calcHypeChange(getProjectedWeeklyCard());
    }

    function getProjectedHypeValue() {
      return clamp(getEffectiveHypeValue(gameState.hype + getProjectedHypeChange()), 0, 100);
    }

    function getHypeTierInfo(hypeValue) {
      if (hypeValue >= 90) {
        return { multiplier: 2.0, label: "만원 경기장!" };
      }
      if (hypeValue >= 70) {
        return { multiplier: 1.5, label: "열기 넘치는 경기장" };
      }
      if (hypeValue >= 50) {
        return { multiplier: 1.0, label: "평균적인 반응" };
      }
      if (hypeValue >= 30) {
        return { multiplier: 0.7, label: "다소 냉담한 반응" };
      }
      return { multiplier: 0.4, label: "관중이 지루해합니다" };
    }

    function getLegendAuraBonus() {
      return gameState.roster.reduce((sum, wrestler) => sum + Math.max(0, wrestler.passiveHypeBonus || 0), 0);
    }

    function getEffectiveHypeValue(baseHype = gameState.hype) {
      return clamp(baseHype + getLegendAuraBonus(), 0, 100);
    }

    function getFragmentCostByGrade(grade) {
      return {
        S: 300,
        LEGEND: 520
      }[grade] || 100;
    }

    function getDuplicateFragmentReward(grade) {
      return {
        C: 0,
        B: 0,
        A: 12,
        S: 20,
        LEGEND: 35
      }[grade] || 0;
    }

    function getRosterOverflowFragmentReward(grade) {
      return {
        C: 0,
        B: 0,
        A: 8,
        S: 20,
        LEGEND: 60
      }[grade] || 0;
    }

    function getReleaseBaseGradeFragments(grade) {
      return {
        C: 0,
        B: 0,
        A: 0,
        S: 35,
        LEGEND: 100
      }[grade] || 0;
    }

    function getGradeFragmentConvertRequirement(fromGrade) {
      return {
        S: { targetGrade: "LEGEND", cost: 12 }
      }[fromGrade] || null;
    }

    function getContractExtensionCost(grade) {
      return {
        C: 150,
        B: 450,
        A: 1000,
        S: 2500,
        LEGEND: 7000
      }[grade] || 150;
    }

    function getGradeAveragePower(grade) {
      const pool = wrestlerPool.filter((wrestler) => wrestler.grade === grade);
      if (!pool.length) {
        return 0;
      }
      return pool.reduce((sum, wrestler) => sum + getWrestlerPower(wrestler), 0) / pool.length;
    }

    function getGradeFragmentCount(grade) {
      return Number(gameState.gradeFragments?.[grade] || 0);
    }

    function addGradeFragments(grade, amount) {
      if (!GRADE_FRAGMENT_KEYS.includes(grade) || amount <= 0) {
        return;
      }
      gameState.gradeFragments[grade] = getGradeFragmentCount(grade) + Math.max(0, Math.floor(amount));
    }

    function spendGradeFragments(grade, amount) {
      if (!GRADE_FRAGMENT_KEYS.includes(grade) || amount <= 0 || getGradeFragmentCount(grade) < amount) {
        return false;
      }
      gameState.gradeFragments[grade] -= Math.floor(amount);
      return true;
    }

    function getPityProgress(current, max) {
      return Math.max(0, Math.min(100, ((max - current) / max) * 100));
    }

    function gradeRank(grade) {
      return {
        C: 1,
        B: 2,
        A: 3,
        S: 4,
        LEGEND: 5
      }[grade] || 0;
    }

    function getOwnedTemplateIds() {
      return new Set(gameState.roster.map((wrestler) => wrestler.templateId).filter(Boolean));
    }

    function getPoolWrestlerByTemplateId(templateId) {
      return wrestlerPool.find((wrestler) => wrestler.id === templateId) || null;
    }

    function performSingleGachaRoll() {
      gameState.pitySystem.pityCount += 1;

      let grade;
      const rates = getCurrentGachaRatePercentages();
      const roll = Math.random();
      const legendRate = rates.LEGEND / 100;
      const sRate = rates.S / 100;
      const aRate = rates.A / 100;
      const bRate = rates.B / 100;
      if (roll < legendRate) {
        grade = "LEGEND";
      } else if (roll < legendRate + sRate) {
        grade = "S";
      } else if (roll < legendRate + sRate + aRate) {
        grade = "A";
      } else if (roll < legendRate + sRate + aRate + bRate) {
        grade = "B";
      } else {
        grade = "C";
      }

      const pool = wrestlerPool.filter((wrestler) => wrestler.grade === grade);
      const selected = structuredClone(pool[Math.floor(Math.random() * pool.length)]);
      const isDuplicate = gameState.roster.some((wrestler) => wrestler.templateId === selected.id);

      return {
        wrestler: createWrestler({
          ...selected,
          id: createWrestlerId("w"),
          templateId: selected.id,
          age: rollAgeForGrade(selected.grade),
          status: "idle",
          injuryWeeks: 0,
          wins: 0,
          losses: 0
        }),
        templateId: selected.id,
        isDuplicate,
        grade,
        pityLabel: "",
        fragmentReward: getDuplicateFragmentReward(grade),
        overflowReward: getRosterOverflowFragmentReward(grade)
      };
    }

    function addFragments(templateId, amount) {
      if (!templateId || amount <= 0) {
        return;
      }
      gameState.fragments[templateId] = (gameState.fragments[templateId] || 0) + amount;
    }

    function getFavoriteStarHtml(wrestler) {
      return `<button class="favorite-toggle ${wrestler.isFavorite ? "active" : ""}" data-action="toggle-favorite" data-wrestler-id="${wrestler.id}" title="${wrestler.isFavorite ? "즐겨찾기 해제" : "즐겨찾기"}">${wrestler.isFavorite ? "★" : "☆"}</button>`;
    }

    function isChampionHolder(wrestlerId) {
      return Object.values(gameState.championships || {}).some((championship) => championship.holderId === wrestlerId);
    }

    function hasRivalry(wrestlerId) {
      return (gameState.rivalries || []).some((rivalry) => rivalry.wrestlerAId === wrestlerId || rivalry.wrestlerBId === wrestlerId);
    }

    function getProtectedRosterIds() {
      return new Set(
        gameState.roster
          .filter((wrestler) => wrestler.isFavorite || isChampionHolder(wrestler.id) || hasRivalry(wrestler.id))
          .map((wrestler) => wrestler.id)
      );
    }

    function getReleaseFragmentReward(wrestler) {
      let amount = getReleaseBaseGradeFragments(wrestler.grade);
      const reasons = [];
      if ((gameState.week - (wrestler.joinedWeek || gameState.week)) >= 12 && amount > 0) {
        amount += 1;
        reasons.push("+1 보유기간");
      }
      if ((getWrestlerPower(wrestler) - getGradeAveragePower(wrestler.grade)) >= 15 && amount > 0) {
        amount += 1;
        reasons.push("+1 고스탯");
      }
      if (wrestler.status === "injured" && amount > 0) {
        amount -= 2;
        reasons.push("-2 부상 감가");
      }
      return {
        grade: wrestler.grade,
        amount: Math.max(0, amount),
        reasons
      };
    }

    function getRosterWarningSummary(wrestlers) {
      return {
        favorite: wrestlers.filter((wrestler) => wrestler.isFavorite),
        champion: wrestlers.filter((wrestler) => isChampionHolder(wrestler.id)),
        rivalry: wrestlers.filter((wrestler) => hasRivalry(wrestler.id)),
        training: wrestlers.filter((wrestler) => wrestler.status === "training")
      };
    }

    function getSafeReleaseCandidates(wrestlers) {
      return wrestlers.filter((wrestler) => wrestler && !wrestler.isFavorite && !isChampionHolder(wrestler.id) && !hasRivalry(wrestler.id));
    }

    function summarizeReleaseRewards(wrestlers) {
      const summary = createEmptyGradeFragments();
      const table = wrestlers.map((wrestler) => {
        const reward = getReleaseFragmentReward(wrestler);
        if (GRADE_FRAGMENT_KEYS.includes(wrestler.grade) && reward.amount > 0) {
          summary[wrestler.grade] += reward.amount;
        }
        return {
          wrestler,
          reward
        };
      });
      return { table, summary };
    }

    function pushReleaseLog(wrestler, fragments) {
      gameState.releaseLog.unshift({
        week: gameState.week,
        wrestlerName: wrestler.name,
        grade: wrestler.grade,
        fragments
      });
      gameState.releaseLog = gameState.releaseLog.slice(0, 20);
      if (GRADE_FRAGMENT_KEYS.includes(wrestler.grade)) {
        gameState.releasedFragmentTotals[wrestler.grade] = Number(gameState.releasedFragmentTotals[wrestler.grade] || 0) + Math.max(0, Math.floor(fragments));
      }
    }

    function releaseRosterMembers(wrestlerIds) {
      const released = [];
      wrestlerIds.forEach((wrestlerId) => {
        const wrestler = findWrestlerById(wrestlerId);
        if (!wrestler) {
          return;
        }
        const reward = getReleaseFragmentReward(wrestler);
        addGradeFragments(wrestler.grade, reward.amount);
        pushReleaseLog(wrestler, reward.amount);
        clearWrestlerFromOwnership(wrestler.id);
        const index = gameState.roster.findIndex((item) => item.id === wrestler.id);
        if (index !== -1) {
          gameState.roster.splice(index, 1);
          released.push({ wrestler, reward });
        }
      });
      return released;
    }

    function removeExpiredContracts() {
      const expired = gameState.roster.filter((wrestler) => wrestler.contractWeeks <= 0);
      expired.forEach((wrestler) => {
        clearWrestlerFromOwnership(wrestler.id);
      });
      gameState.roster = gameState.roster.filter((wrestler) => wrestler.contractWeeks > 0);
      return expired;
    }

    function getRosterExpansionUpgradeCost() {
      const level = Number(gameState.facilities?.rosterOffice?.level || 1);
      return ROSTER_EXPANSION_DATA[level]?.upgradeCost || 0;
    }

    function canExpandRoster() {
      return getRosterExpansionUpgradeCost() > 0;
    }

    function handleRosterExpansionUpgrade() {
      const facility = gameState.facilities.rosterOffice;
      const currentLevel = Number(facility.level || 1);
      const nextData = ROSTER_EXPANSION_DATA[currentLevel];
      if (!nextData?.upgradeCost) {
        return;
      }
      if (gameState.gold < nextData.upgradeCost) {
        window.alert("골드가 부족합니다.");
        return;
      }
      gameState.gold -= nextData.upgradeCost;
      facility.level = Math.min(4, currentLevel + 1);
      Object.assign(facility, ROSTER_EXPANSION_DATA[facility.level] || {});
      gameState.rosterLimit = getRosterLimitFromState();
      render();
      saveGameState();
    }

    function openRosterFullModal() {
      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">선수단이 가득 찼습니다</h3>
            <p class="modal-subtitle">현재 ${gameState.roster.length}/${gameState.rosterLimit}명을 보유 중입니다.</p>
          </div>
          <button class="modal-close" data-modal-close>닫기</button>
        </div>
        <p class="confirm-message">
          선수단이 가득 찼습니다.<br>
          선수를 방출하거나 선수단을 확장하세요.
        </p>
        <div class="modal-actions">
          <button class="modal-action-button cancel" id="goRosterFromFullButton">방출하러 가기</button>
          <button class="modal-action-button confirm" id="goShopFromFullButton">로스터 확장으로 가기</button>
        </div>
      `);
      const goRoster = document.getElementById("goRosterFromFullButton");
      if (goRoster) {
        goRoster.addEventListener("click", () => {
          activeTab = "roster";
          closeModal();
          render();
        });
      }
      const goShop = document.getElementById("goShopFromFullButton");
      if (goShop) {
        goShop.addEventListener("click", () => {
          activeTab = "roster";
          closeModal();
          render();
        });
      }
    }

    function getRosterRecommendationCandidates() {
      const protectedIds = getProtectedRosterIds();
      const excludedIds = new Set();
      const candidates = [];
      const addCandidate = (wrestler, reason) => {
        if (!wrestler || excludedIds.has(wrestler.id) || protectedIds.has(wrestler.id) || ["S", "LEGEND"].includes(wrestler.grade)) {
          return;
        }
        excludedIds.add(wrestler.id);
        candidates.push({ wrestler, reason });
      };

      gameState.roster.filter((wrestler) => (wrestler.contractWeeks || 0) <= 1).forEach((wrestler) => {
        addCandidate(wrestler, "계약 잔여 1주 이하");
      });

      GRADE_FRAGMENT_KEYS.forEach((grade) => {
        const sameGrade = gameState.roster
          .filter((wrestler) => wrestler.grade === grade && !excludedIds.has(wrestler.id) && !protectedIds.has(wrestler.id))
          .sort((left, right) => getWrestlerPower(left) - getWrestlerPower(right));
        const count = Math.max(0, Math.floor(sameGrade.length * 0.25));
        sameGrade.slice(0, count).forEach((wrestler) => addCandidate(wrestler, `${grade}급 하위 전투력`));
      });

      gameState.roster
        .filter((wrestler) => wrestler.grade === "C" && wrestler.status === "injured" && (wrestler.injuryWeeks || 0) >= 3)
        .forEach((wrestler) => addCandidate(wrestler, "장기 부상 C급"));

      ["powerhouse", "technician", "showman"].forEach((style) => {
        const sameStyle = gameState.roster
          .filter((wrestler) => wrestler.style === style && !excludedIds.has(wrestler.id) && !protectedIds.has(wrestler.id))
          .sort((left, right) => getWrestlerPower(left) - getWrestlerPower(right));
        if (sameStyle.length >= 3) {
          addCandidate(sameStyle[0], `스타일 중복(${getStyleMeta(style).label}) 최약체`);
        }
      });

      return candidates;
    }

    function getBulkReleaseCandidatesByGrade(grade) {
      return getSafeReleaseCandidates(gameState.roster.filter((wrestler) => wrestler.grade === grade));
    }

    function getBulkReleaseCandidatesByDuplicate() {
      const byTemplate = new Map();
      gameState.roster.forEach((wrestler) => {
        const templateId = wrestler.templateId || wrestler.id;
        const list = byTemplate.get(templateId) || [];
        list.push(wrestler);
        byTemplate.set(templateId, list);
      });
      const candidates = [];
      byTemplate.forEach((list) => {
        if (list.length < 2) {
          return;
        }
        const safeList = getSafeReleaseCandidates(list).sort((left, right) => getWrestlerPower(left) - getWrestlerPower(right));
        safeList.slice(0, Math.max(0, safeList.length - 1)).forEach((wrestler) => candidates.push(wrestler));
      });
      return candidates;
    }

    function extendWrestlerContract(wrestlerId) {
      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler) {
        return false;
      }
      const cost = getContractExtensionCost(wrestler.grade);
      if (gameState.gold < cost) {
        window.alert("골드가 부족합니다.");
        return false;
      }
      gameState.gold -= cost;
      wrestler.contractWeeks += 4;
      return true;
    }

    function getStatCap(grade, wrestler = null) {
      const baseCap = {
        C: 60,
        B: 75,
        A: 85,
        S: 92,
        LEGEND: 99
      }[grade] || 60;
      if (!wrestler) {
        return baseCap;
      }
      return baseCap + (getAgeStageMeta(wrestler.age).capBonus || 0);
    }

    function getFacilityCurrentLevelData(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      return FACILITY_LEVELS[facilityKey]?.[facility.level] || null;
    }

    function getFacilityNextLevelData(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      return FACILITY_LEVELS[facilityKey]?.[facility.level + 1] || null;
    }

    function getFacilityUpgradeCost(facilityKey) {
      const current = getFacilityCurrentLevelData(facilityKey);
      return current?.upgradeCost || 0;
    }

    function getFacilityOccupants(facilityKey) {
      return gameState.roster.filter((wrestler) => wrestler.trainingFacility === facilityKey && wrestler.status === "training");
    }

    function getAvailableFacilitySlots(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      return Math.max(0, (facility.slots || 0) - getFacilityOccupants(facilityKey).length);
    }

    function getTrainingFacilities() {
      return ["gym", "matRoom", "prStudio"];
    }

    function getTrainingBaseGain(facilityKey) {
      return {
        gym: 3,
        matRoom: 3,
        prStudio: 3
      }[facilityKey] || 0;
    }

    function getTrainingStyleForFacility(facilityKey) {
      return {
        gym: "powerhouse",
        matRoom: "technician",
        prStudio: "showman"
      }[facilityKey] || "powerhouse";
    }

    function getTrainingSpecialization(wrestler, facilityKey) {
      if (!wrestler) {
        return { gainMultiplier: 1, staminaDelta: 0, goldBonus: 0, injuryRiskBonus: 0, label: "" };
      }
      if (facilityKey === "gym" && wrestler.style === "powerhouse") {
        return { gainMultiplier: 1.5, staminaDelta: 0, goldBonus: 0, injuryRiskBonus: 0.05, label: "헤비 리프팅" };
      }
      if (facilityKey === "matRoom" && wrestler.style === "technician") {
        return { gainMultiplier: 1.5, staminaDelta: -1, goldBonus: 0, injuryRiskBonus: 0, label: "매트 집중 훈련" };
      }
      if (facilityKey === "prStudio" && wrestler.style === "showman") {
        return { gainMultiplier: 5 / 3, staminaDelta: 0, goldBonus: 200, injuryRiskBonus: 0, label: "팬 미팅" };
      }
      return { gainMultiplier: 1, staminaDelta: 0, goldBonus: 0, injuryRiskBonus: 0, label: "" };
    }

    function getTrainingGainPreview(facilityKey, wrestler = null) {
      const facility = gameState.facilities[facilityKey];
      const specialization = getTrainingSpecialization(wrestler, facilityKey);
      const ageMultiplier = wrestler ? getAgeStageMeta(wrestler.age).trainingMultiplier || 1 : 1;
      const coachMultiplier = getCoachTrainingMultiplier(facilityKey);
      return getTrainingBaseGain(facilityKey) * (facility.speedBonus || 1) * specialization.gainMultiplier * ageMultiplier * coachMultiplier;
    }

    function getProjectedStyleShift(wrestler, facilityKey) {
      const targetStyle = getTrainingStyleForFacility(facilityKey);
      const progress = (wrestler.trainingProgress?.[facilityKey] || 0) + 1;
      return progress >= 10 && wrestler.style !== targetStyle ? targetStyle : "";
    }

    function getMedicalWeeklyHealAmount() {
      return Math.max(1, Math.floor(gameState.facilities.medical.healSpeed || 1));
    }

    function getMedicalInjuryPrevention() {
      return gameState.facilities.medical.prevention || 0;
    }

    function getScoutSettings() {
      return {
        weeklyCandidates: gameState.facilities.scoutTeam.weeklyCandidates || 3,
        maxGrade: gameState.facilities.scoutTeam.maxGrade || "B"
      };
    }

    function createProspectFromTemplate(template) {
      const prospectStars = Math.random() < 0.03 ? 5 : Math.random() < 0.12 ? 4 : Math.random() < 0.55 ? 3 : 2;
      const potentialCapGrade = getPotentialCapGradeFromStars(prospectStars);
      return createWrestler({
        ...structuredClone(template),
        id: createWrestlerId("pr"),
        templateId: template.id,
        grade: "C",
        age: randomBetween(18, 20),
        isProspect: true,
        potentialStars: prospectStars,
        potentialCapGrade,
        salary: Math.max(25, Math.floor((template.salary || 50) * 0.55)),
        stats: {
          power: randomBetween(15, 30),
          stamina: randomBetween(15, 30),
          technique: randomBetween(15, 30),
          charisma: randomBetween(15, 30),
          fame: randomBetween(10, 22)
        },
        status: "idle",
        injuryWeeks: 0,
        wins: 0,
        losses: 0,
        careerHistory: []
      });
    }

    function generateProspectScout() {
      const excludedTemplateIds = new Set([
        ...gameState.roster.map((wrestler) => wrestler.templateId).filter(Boolean),
        ...gameState.freeAgents.map((wrestler) => wrestler.templateId).filter(Boolean),
        ...gameState.prospects.map((wrestler) => wrestler.templateId).filter(Boolean)
      ]);
      const candidatePool = wrestlerPool.filter((wrestler) => gradeRank(wrestler.grade) >= gradeRank("C") && !excludedTemplateIds.has(wrestler.id));
      const selected = candidatePool.length ? pickRandom(candidatePool) : pickRandom(wrestlerPool);
      return createProspectFromTemplate(selected);
    }

    function generateProspectScoutsForWeek() {
      const scout = getScoutSettings();
      const count = scout.maxGrade === "S" ? 4 : scout.maxGrade === "A" ? 3 : 2;
      return Array.from({ length: count }, () => generateProspectScout());
    }

    function getPRIncomeMultiplier() {
      const facilityMultiplier = 1 + (gameState.facilities.prStudio.incomeBonus || 0);
      const eventMultiplier = gameState.eventEffects.fanDoubleWeeks > 0 ? 2 : 1;
      const awardMultiplier = gameState.ppvState?.annualAwardBuffWeeks > 0 ? 1.5 : 1;
      return facilityMultiplier * eventMultiplier * awardMultiplier;
    }

    function getFaceRevenueMultiplierForMatch(wrestlerA, wrestlerB) {
      const faceCount = [wrestlerA, wrestlerB].filter((wrestler) => wrestler?.alignment === "face").length;
      if (faceCount <= 0) {
        return 1;
      }
      return 1 + (0.1 * faceCount);
    }

    function getRecentLossStreak(wrestler) {
      if (!wrestler || !Array.isArray(wrestler.recentResults)) {
        return 0;
      }
      let streak = 0;
      for (let index = wrestler.recentResults.length - 1; index >= 0; index -= 1) {
        if (wrestler.recentResults[index] === "L") {
          streak += 1;
        } else {
          break;
        }
      }
      return streak;
    }

    function recordWrestlerResult(wrestler, didWin) {
      if (!wrestler) {
        return;
      }
      wrestler.recentResults = Array.isArray(wrestler.recentResults) ? wrestler.recentResults.slice(-4) : [];
      wrestler.recentResults.push(didWin ? "W" : "L");
      wrestler.recentResults = wrestler.recentResults.slice(-5);
    }

    function canChangeAlignment(wrestler, targetAlignment) {
      if (!wrestler || wrestler.alignment === targetAlignment) {
        return false;
      }
      if (gameState.gold < 500) {
        return false;
      }
      return getAlignmentTurnCooldownRemaining(wrestler) <= 0;
    }

    function applyAlignmentTurn(wrestler, targetAlignment, options = {}) {
      if (!wrestler || wrestler.alignment === targetAlignment) {
        return false;
      }
      const isDirect = Boolean(options.direct);
      if (isDirect && !canChangeAlignment(wrestler, targetAlignment)) {
        return false;
      }
      if (isDirect) {
        gameState.gold -= 500;
      }
      wrestler.alignment = targetAlignment;
      wrestler.alignmentCooldownUntilWeek = gameState.week + 2;
      if (targetAlignment === "heel") {
        gameState.hype = clamp(gameState.hype + 25, 0, 100);
        showAchievementToast(`⚠️ ${wrestler.name}이 다크사이드로 전향했다!`);
      } else if (targetAlignment === "face") {
        gameState.hype = clamp(gameState.hype + 30, 0, 100);
        gameState.eventEffects.fanDoubleWeeks = Math.max(gameState.eventEffects.fanDoubleWeeks, 1);
        showAchievementToast(`✨ ${wrestler.name}이 관중의 마음을 돌렸다!`);
      }
      return true;
    }

    function getPRWeeklyFameBonus() {
      return gameState.facilities.prStudio.weeklyFame || 0;
    }

    function getTVWeeklyBonus() {
      return (gameState.facilities.tvStudio.tvBonus || 0) + (gameState.eventEffects.tvDealWeeks > 0 ? gameState.eventEffects.tvDealBonus : 0);
    }

    function canTrainAtFacility(wrestler, facilityKey) {
      if (!wrestler || wrestler.status === "injured") {
        return false;
      }
      return (gameState.facilities[facilityKey]?.slots || 0) > 0;
    }

    function assignWrestlerToFacility(wrestlerId, facilityKey) {
      const wrestler = findWrestlerById(wrestlerId);
      const facility = gameState.facilities[facilityKey];
      if (!wrestler || !facility) {
        return false;
      }
      if (wrestler.status === "injured") {
        return false;
      }
      if (getAvailableFacilitySlots(facilityKey) <= 0) {
        return false;
      }
      wrestler.status = "training";
      wrestler.trainingFacility = facilityKey;
      wrestler.trainingStartWeek = gameState.week;
      return true;
    }

    function removeWrestlerFromTraining(wrestlerId) {
      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler) {
        return;
      }
      wrestler.trainingFacility = "";
      wrestler.trainingStartWeek = 0;
      if (wrestler.status === "training") {
        wrestler.status = "idle";
      }
    }

    function applyWeeklyTraining() {
      const growthReport = previewWeeklyTraining();
      growthReport.forEach((entry) => {
        const wrestler = findWrestlerById(entry.wrestlerId);
        if (!wrestler) {
          return;
        }
        wrestler.stats[entry.statKey] = entry.after;
        wrestler.stats.stamina = clamp(wrestler.stats.stamina + (entry.staminaDelta || 0), 1, getAdjustedStatCap(wrestler));
        wrestler.trainingProgress = {
          gym: entry.facilityKey === "gym" ? entry.nextProgress : 0,
          matRoom: entry.facilityKey === "matRoom" ? entry.nextProgress : 0,
          prStudio: entry.facilityKey === "prStudio" ? entry.nextProgress : 0
        };
        if (entry.newStyle) {
          wrestler.style = entry.newStyle;
        }
        if (entry.goldBonus) {
          gameState.gold += entry.goldBonus;
          addWeeklyStat("goldEarned", entry.goldBonus);
        }
        if (entry.injuryRiskBonus && Math.random() < entry.injuryRiskBonus) {
          wrestler.status = "injured";
          wrestler.injuryWeeks = Math.max(wrestler.injuryWeeks, 1);
          wrestler.trainingFacility = "";
          wrestler.trainingStartWeek = 0;
          entry.trainingInjury = true;
        }
      });
      return growthReport;
    }

    function previewWeeklyTraining() {
      const growthReport = [];
      gameState.roster.forEach((wrestler) => {
        if (wrestler.status !== "training" || !wrestler.trainingFacility) {
          return;
        }
        const facilityKey = wrestler.trainingFacility;
        const facility = gameState.facilities[facilityKey];
        if (!facility) {
          return;
        }
        const statKey = facility.trainStat;
        const before = wrestler.stats[statKey];
        const gain = getTrainingGainPreview(facilityKey, wrestler);
        const cap = getAdjustedStatCap(wrestler);
        const after = clamp(Math.round((before + gain) * 10) / 10, 1, cap);
        const specialization = getTrainingSpecialization(wrestler, facilityKey);
        const nextProgress = (wrestler.trainingProgress?.[facilityKey] || 0) + 1;
        const newStyle = getProjectedStyleShift(wrestler, facilityKey);
        growthReport.push({
          wrestlerId: wrestler.id,
          name: wrestler.name,
          facilityKey,
          statKey,
          before,
          after,
          gain: Math.max(0, Math.round((after - before) * 10) / 10),
          hitCap: after >= cap,
          modeLabel: specialization.label,
          staminaDelta: specialization.staminaDelta,
          goldBonus: specialization.goldBonus,
          injuryRiskBonus: specialization.injuryRiskBonus,
          nextProgress,
          newStyle
        });
      });
      return growthReport;
    }

    function applyPassiveStaminaGrowthFromMatches(matchResults) {
      const touchedIds = new Set();
      matchResults.forEach((result) => {
        touchedIds.add(result.wrestlerAId);
        touchedIds.add(result.wrestlerBId);
      });
      touchedIds.forEach((wrestlerId) => {
        const wrestler = findWrestlerById(wrestlerId);
        if (!wrestler) {
          return;
        }
        const cap = getAdjustedStatCap(wrestler);
        wrestler.stats.stamina = clamp(wrestler.stats.stamina + 1, 1, cap);
      });
    }

    function getTotalWins() {
      return gameState.roster.reduce((sum, wrestler) => sum + wrestler.wins, 0);
    }

    function getWinStreakLikeValue() {
      return getTotalWins();
    }

    function getChampionshipHolder(championshipKey) {
      const holderId = gameState.championships[championshipKey]?.holderId;
      return holderId ? findWrestlerById(holderId) : null;
    }

    function getUnlockedChampionshipKeys() {
      return Object.keys(gameState.championships).filter((key) => gameState.championships[key].unlocked);
    }

    function getHighestUnlockedChampionshipKey() {
      return ["world", "regional", "indie"].find((key) => gameState.championships[key].unlocked) || "";
    }

    function getChampionshipIncomeMultiplier() {
      let multiplier = 1;
      if (gameState.championships.indie.holderId) {
        multiplier += 0.10;
      }
      if (gameState.championships.regional.holderId) {
        multiplier += 0.25;
      }
      if (gameState.championships.world.holderId) {
        multiplier += 0.50;
      }
      return multiplier;
    }

    function getChampionshipWeeklyFameBonus() {
      return gameState.championships.indie.holderId ? 3 : 0;
    }

    function getChampionshipMonthlyLegendTicketBonus() {
      return gameState.championships.world.holderId && (gameState.week + 1) % 4 === 0 ? 1 : 0;
    }

    function createTitleDefenseWrestler(wrestler) {
      const titleDefenseMultiplier = wrestler.alignment === "heel" ? 1.15 : 1.1;
      const boostedStats = Object.fromEntries(
        Object.entries(wrestler.stats).map(([statKey, value]) => [
          statKey,
          clamp(Math.round(value * titleDefenseMultiplier), 1, getStatCap(wrestler.grade))
        ])
      );

      return {
        ...structuredClone(wrestler),
        stats: boostedStats
      };
    }

    function getWorldEndingReady() {
      return Boolean(gameState.championships.world.holderId) && !gameState.achievements.titles.includes("월드 제패");
    }

    function getHighestCurrentWrestler() {
      return gameState.roster
        .slice()
        .sort((left, right) => getWrestlerPower(right) - getWrestlerPower(left))[0] || null;
    }

    function handleLegacyUpgrade(upgradeKey) {
      const upgrade = getLegacyUpgradeDefs().find((entry) => entry.key === upgradeKey);
      if (!upgrade) {
        return;
      }
      const currentLevel = Number(gameState.legacy?.upgrades?.[upgradeKey] || 0);
      if (currentLevel >= upgrade.maxLevel || (gameState.legacy?.points || 0) < upgrade.cost) {
        return;
      }
      gameState.legacy.points -= upgrade.cost;
      gameState.legacy.upgrades[upgradeKey] = currentLevel + 1;
      if (upgradeKey === "wrestlerSlots") {
        gameState.rosterLimit = getRosterLimitFromState();
      }
      render();
      saveGameState();
    }

    function getLegacyResetSummary() {
      const highestWrestler = getHighestCurrentWrestler();
      const totalIncome = gameState.history.reduce((sum, entry) => sum + entry.income, 0);
      const champion = getChampionshipHolder("world");
      return {
        totalIncome,
        highestWrestler,
        champion
      };
    }

    function applyPrestigeRewards(legacyState) {
      const count = Number(legacyState.prestigeCount || 0);
      legacyState.titles = Array.isArray(legacyState.titles) ? legacyState.titles : [];
      if (count >= 1 && !legacyState.titles.includes("레전드 프로모터")) {

      const earnedPoints = calcLegacyPoints();
      const nextLegacy = structuredClone(gameState.legacy || createDefaultLegacy());
      nextLegacy.points += earnedPoints;

      nextLegacy.prestigeCount += 1;

      gameState = createStateFromLegacy(nextLegacy);
      titleScreenVisible = false;
      titleScreenHasSave = true;
      pendingWeeklySummary = null;
      pendingGachaRewards = null;
      clearPendingGachaRosterReleaseSelection();
      saveGameState();
      render();

    function openPostAdvanceNotices(options = {}) {

        stageUnlockMessage = "",

        recoveredIds = [],
        retirementCandidates = [],
        expiringContractIds = [],
        expiredContractNames = [],

      } = options;

        stageUnlockMessage ? `<div>🏟 ${stageUnlockMessage}</div>` : "",

        ...championshipUnlockMessages.map((message) => `<div>🏆 ${message}</div>`),
        ...appliedTrainingGrowth
          .filter((entry) => entry.hitCap)
          .map((entry) => `<div>⚠️ ${entry.name}의 ${entry.statKey === "power" ? "힘" : entry.statKey === "technique" ? "기술" : "카리스마"}이 한계에 도달했습니다. 시설을 업그레이드하세요!</div>`),
        ...appliedTrainingGrowth
          .filter((entry) => entry.newStyle)
          .map((entry) => `<div>⚡ ${entry.name}의 스타일이 변화했습니다! → ${getStyleMeta(entry.newStyle).label}</div>`),
        ...appliedTrainingGrowth
          .filter((entry) => entry.trainingInjury)
          .map((entry) => `<div>🩹 ${entry.name}이 특수 훈련 중 부상을 입었습니다.</div>`),
        ...recoveredIds.map((wrestlerId) => {
          const wrestler = findWrestlerById(wrestlerId);
          return wrestler ? `<div>✅ ${wrestler.name}이 부상에서 회복했습니다!</div>` : "";
        }),
        ...expiringContractIds.map((wrestlerId) => {
          const wrestler = findWrestlerById(wrestlerId);
          return wrestler ? `<div>⚠️ 계약 만료 임박: ${wrestler.name} (${wrestler.grade}급) - ${wrestler.contractWeeks}주 후 계약 만료</div>` : "";
        }),
        ...expiredContractNames.map((name) => `<div>📭 ${name}의 계약이 만료되어 단체를 떠났습니다</div>`),
        ...agedUpNames.map((name) => `<div>🎂 ${name}이 한 살 더 먹었습니다.</div>`),
        ...retirementCandidates.map((wrestlerId) => {
          const wrestler = findWrestlerById(wrestlerId);
          return wrestler ? `<div>📴 ${wrestler.name}이 은퇴를 고민하고 있습니다.</div>` : "";
        }),
        ...unlockedAchievements.map((label) => `<div>🏅 업적 달성: ${label}</div>`)
      ].filter(Boolean);

      const continueAfterNotice = () => {
        closeModal(true);
        if (expiringContractIds.length) {
          openContractQueue(expiringContractIds.slice(), () => {
            if (retirementCandidates.length) {
              openRetirementQueue(retirementCandidates.slice(), () => {
                if (triggerEnding) {
                  openEndingModal();
                } else if (eventData) {
                  openRandomEventModal(eventData);
                }
              });
            } else if (triggerEnding) {
              openEndingModal();
            } else if (eventData) {
              openRandomEventModal(eventData);
            }
          });
        } else if (retirementCandidates.length) {
          openRetirementQueue(retirementCandidates.slice(), () => {
            if (triggerEnding) {
              openEndingModal();
            } else if (eventData) {
              openRandomEventModal(eventData);
            }
          });
        } else if (triggerEnding) {
          openEndingModal();
        } else if (eventData) {
          openRandomEventModal(eventData);
        }
      };

      if (!lines.length) {
        continueAfterNotice();
        return;
      }

      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">주간 알림</h3>
            <p class="modal-subtitle">단체 운영과 선수단에 발생한 주요 변화를 정리했습니다.</p>

        </div>
        <div class="result-summary-item" style="line-height:1.8;">${lines.join("")}</div>
        <div class="modal-actions" style="margin-top:14px;">
          <button class="modal-action-button confirm" id="postAdvanceContinueButton">계속</button>
        </div>
      `, { locked: true });

      if (continueButton) {
        continueButton.addEventListener("click", continueAfterNotice);
      }
    }

    function openContractQueue(queue, onComplete) {
      const nextId = queue.shift();
      if (!nextId) {
        if (typeof onComplete === "function") {
          onComplete();
        }
        return;
      }
      const wrestler = findWrestlerById(nextId);
      if (!wrestler) {
        openContractQueue(queue, onComplete);
        return;
      }
      const cost = getContractExtensionCost(wrestler.grade);
      const urgent = ["S", "LEGEND"].includes(wrestler.grade) && wrestler.contractWeeks <= 1;
      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">${urgent ? "🚨 계약 만료 임박" : "⚠️ 계약 만료 임박"}</h3>
            <p class="modal-subtitle">${wrestler.name} (${wrestler.grade}급) - ${wrestler.contractWeeks}주 후 계약 만료</p>
          </div>
        </div>
        <p class="confirm-message">
          ${urgent ? `${wrestler.name}의 계약이 곧 만료됩니다! 연장하지 않으면 손실이 큽니다.` : `${wrestler.name}의 계약을 4주 연장하시겠습니까?`}<br>
          연장 비용: ${formatNumber(cost)}G
        </p>
        <div class="modal-actions">
          <button class="modal-action-button cancel" id="skipContractQueueButton">만료 예정으로 두기</button>
          <button class="modal-action-button confirm" id="extendContractQueueButton">계약 연장 ${formatNumber(cost)}</button>
        </div>
      `, { locked: true });
      const proceed = () => {
        closeModal(true);
        render();
        saveGameState();
        openContractQueue(queue, onComplete);
      };
      const skipContractQueueButton = document.getElementById("skipContractQueueButton");
      if (skipContractQueueButton) {
        skipContractQueueButton.addEventListener("click", proceed);
      }
      const extendContractQueueButton = document.getElementById("extendContractQueueButton");
      if (extendContractQueueButton) {
        extendContractQueueButton.addEventListener("click", () => {
          if (extendWrestlerContract(wrestler.id)) {
            proceed();
          }
        });
      }
    }

    function openRetirementQueue(queue, onComplete) {
      const nextId = queue.shift();
      if (!nextId) {
        if (typeof onComplete === "function") {
          onComplete();
        }
        return;
      }
      const wrestler = findWrestlerById(nextId);
      if (!wrestler) {
        openRetirementQueue(queue, onComplete);
        return;
      }
      openModal(`

          <div>
            <h3 class="modal-title">은퇴 이벤트</h3>
            <p class="modal-subtitle">${wrestler.name}이 마지막 결정을 기다리고 있습니다.</p>

          ${wrestler.name}이 링 위에서 마지막 인사를 전했습니다.<br>
          코치로 전환하면 ${gameState.facilities[getCoachFacilityForWrestler(wrestler)]?.name || "훈련 시설"} 효율이 올라갑니다.
        </p>
        <div class="modal-actions">
          <button class="modal-action-button cancel" id="retireQueueCoachButton">코치로 전환</button>
          <button class="modal-action-button confirm" id="retireQueueOnlyButton">은퇴</button>
        </div>

      const proceed = (asCoach) => {
