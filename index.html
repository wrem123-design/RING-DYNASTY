      const retireAsCoachButton = document.getElementById("retireAsCoachButton");
      if (retireAsCoachButton) {
        retireAsCoachButton.addEventListener("click", () => {
          retireWrestler(wrestlerId, true);
          closeModal(true);
          render();
          saveGameState();
        });
      }
    }

    function handleToggleFavorite(wrestlerId) {
      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler) {
        return;
      }
      wrestler.isFavorite = !wrestler.isFavorite;
      renderActiveTab();
      saveGameState();
    }

    function handleRosterSelectionToggle(wrestlerId, checked) {
      if (!wrestlerId) {
        return;
      }
      if (checked) {
        if (!rosterViewState.selectedIds.includes(wrestlerId)) {
          rosterViewState.selectedIds.push(wrestlerId);
        }
      } else {
        rosterViewState.selectedIds = rosterViewState.selectedIds.filter((id) => id !== wrestlerId);
      }
      renderActiveTab();
    }

    function toggleRosterGradeFilter(grade) {
      if (!grade) {
        return;
      }
      if (rosterViewState.gradeFilters.includes(grade)) {
        rosterViewState.gradeFilters = rosterViewState.gradeFilters.filter((item) => item !== grade);
      } else {
        rosterViewState.gradeFilters.push(grade);
      }
      renderActiveTab();
    }

    function toggleRosterStyleFilter(style) {
      if (!style) {
        return;
      }
      if (rosterViewState.styleFilters.includes(style)) {
        rosterViewState.styleFilters = rosterViewState.styleFilters.filter((item) => item !== style);
      } else {
        rosterViewState.styleFilters.push(style);
      }
      renderActiveTab();
    }

    function getReleaseSummaryHtml(summary) {
      const lines = GRADE_FRAGMENT_KEYS
        .filter((grade) => summary[grade] > 0)
        .map((grade) => `${GRADE_FRAGMENT_LABELS[grade]} ${summary[grade]}개`)
        .join(" / ");
      return lines || "획득 조각 없음";
    }

    function openBulkReleaseConfirmModal(inputWrestlers, title = "선수 방출 확인") {
      const wrestlers = Array.isArray(inputWrestlers) ? inputWrestlers.filter(Boolean) : [];
      if (!wrestlers.length) {
        window.alert("방출할 선수가 없습니다.");
        return;
      }
      const safeCandidates = getSafeReleaseCandidates(wrestlers);
      if (!safeCandidates.length) {
        window.alert("즐겨찾기, 챔피언, 라이벌 선수는 자동 보호되어 방출할 수 없습니다.");
        return;
      }
      const warnings = getRosterWarningSummary(wrestlers);
      const { table, summary } = summarizeReleaseRewards(safeCandidates);
      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">⚠️ ${title}</h3>
            <p class="modal-subtitle">${safeCandidates.length}명의 선수를 방출하면 아래 조각을 획득합니다.</p>
          </div>
          <button class="modal-close" data-modal-close>닫기</button>
        </div>
        <table class="release-table">
          <thead>
            <tr><th>선수명</th><th>등급</th><th>획득 조각</th></tr>
          </thead>
          <tbody>
            ${table.map((entry) => `<tr><td>${entry.wrestler.name}</td><td>${entry.wrestler.grade}</td><td>${formatFragmentRewardLabel(entry.wrestler.grade, entry.reward.amount, entry.reward.reasons)}</td></tr>`).join("")}
          </tbody>
        </table>
        <div class="countdown-box">총 획득: ${getReleaseSummaryHtml(summary)}</div>
        <div class="roster-warning-list">
          ${warnings.rivalry.length ? `<div>⚠️ ${warnings.rivalry.map((item) => item.name).join(", ")}은 현재 라이벌 관계입니다</div>` : ""}
          ${warnings.champion.length ? `<div>🏆 ${warnings.champion.map((item) => item.name).join(", ")}은 현재 챔피언이라 자동 제외됩니다</div>` : ""}
          ${warnings.training.length ? `<div>🏋️ ${warnings.training.map((item) => item.name).join(", ")}은 훈련 중이며 방출 시 훈련이 중단됩니다</div>` : ""}
          ${warnings.favorite.length ? `<div>⭐ 즐겨찾기 선수는 자동 제외됩니다</div>` : ""}
        </div>
        <div class="modal-actions">
          <button class="modal-action-button cancel" data-modal-close>취소</button>
          <button class="modal-action-button confirm" id="confirmBulkReleaseButton">방출 확정</button>
        </div>
      `);
      const confirmBulkReleaseButton = document.getElementById("confirmBulkReleaseButton");
      if (confirmBulkReleaseButton) {
        confirmBulkReleaseButton.addEventListener("click", () => {
          releaseRosterMembers(safeCandidates.map((wrestler) => wrestler.id));
          rosterViewState.selectedIds = rosterViewState.selectedIds.filter((id) => !safeCandidates.some((wrestler) => wrestler.id === id));
          closeModal();
          render();
          saveGameState();
        });
      }
    }

    function openSmartReleaseRecommendModal() {
      const candidates = getRosterRecommendationCandidates();
      if (!candidates.length) {
        window.alert("현재 추천할 정리 대상이 없습니다.");
        return;
      }
      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">🧹 정리 추천: ${candidates.length}명</h3>
            <p class="modal-subtitle">추천 기준에 따라 자동 선별된 선수입니다.</p>
          </div>
          <button class="modal-close" data-modal-close>닫기</button>
        </div>
        <table class="release-table">
          <thead><tr><th>선수명</th><th>등급</th><th>추천 이유</th></tr></thead>
          <tbody>
            ${candidates.map((entry) => `<tr><td>${entry.wrestler.name}</td><td>${entry.wrestler.grade}</td><td>${entry.reason}</td></tr>`).join("")}
          </tbody>
        </table>
        <div class="modal-actions">
          <button class="modal-action-button cancel" data-modal-close>취소</button>
          <button class="modal-action-button confirm" id="applySmartReleaseButton">선택 방출</button>
        </div>
      `);
      const applySmartReleaseButton = document.getElementById("applySmartReleaseButton");
      if (applySmartReleaseButton) {
        applySmartReleaseButton.addEventListener("click", () => {
          closeModal();
          openBulkReleaseConfirmModal(candidates.map((entry) => entry.wrestler), "정리 추천 방출");
        });
      }
    }

    function openBulkTrainingAssignmentModal(wrestlers) {
      const candidates = wrestlers.filter((wrestler) => wrestler.status !== "injured");
      if (!candidates.length) {
        window.alert("훈련에 배치할 수 있는 선수가 없습니다.");
        return;
      }
      const sections = getTrainingFacilities().map((facilityKey) => {
        const freeSlots = getAvailableFacilitySlots(facilityKey);
        const facility = gameState.facilities[facilityKey];
        return `<button class="training-assign-button" data-action="bulk-assign-training" data-facility-key="${facilityKey}" ${freeSlots ? "" : "disabled"}>${facility.name} (${freeSlots}칸)</button>`;
      }).join("");
      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">선택 훈련 배치</h3>
            <p class="modal-subtitle">선택한 ${candidates.length}명 중 빈 슬롯 수만큼 순서대로 배치합니다.</p>
          </div>
          <button class="modal-close" data-modal-close>닫기</button>
        </div>
        <div class="training-facility-group">${sections}</div>
      `);
      Array.from(modalWindowEl.querySelectorAll('[data-action="bulk-assign-training"]')).forEach((button) => {
        button.addEventListener("click", () => {
          const facilityKey = button.dataset.facilityKey;
          let freeSlots = getAvailableFacilitySlots(facilityKey);
          candidates.forEach((wrestler) => {
            if (freeSlots <= 0) {
              return;
            }
            if (canTrainAtFacility(wrestler, facilityKey)) {
              removeWrestlerFromTraining(wrestler.id);
              if (assignWrestlerToFacility(wrestler.id, facilityKey)) {
                freeSlots -= 1;
              }
            }
          });
          closeModal();
          render();
          saveGameState();
        });
      });
    }

    function openContractExtensionModal(wrestlerId) {
      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler) {
        return;
      }
      const cost = getContractExtensionCost(wrestler.grade);
      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">계약 연장</h3>
            <p class="modal-subtitle">${wrestler.name}의 계약을 4주 연장합니다.</p>
          </div>
          <button class="modal-close" data-modal-close>닫기</button>
        </div>
        <p class="confirm-message">현재 계약 ${wrestler.contractWeeks}주 · 연장 비용 ${formatNumber(cost)}G</p>
        <div class="modal-actions">
          <button class="modal-action-button cancel" data-modal-close>취소</button>
          <button class="modal-action-button confirm" id="confirmExtendContractButton">연장</button>
        </div>
      `);
      const confirmExtendContractButton = document.getElementById("confirmExtendContractButton");
      if (confirmExtendContractButton) {
        confirmExtendContractButton.addEventListener("click", () => {
          if (extendWrestlerContract(wrestlerId)) {
            closeModal();
            render();
            saveGameState();
          }
        });
      }
    }

    function openReleaseConfirmModal(wrestlerId) {
      const wrestler = gameState.roster.find((item) => item.id === wrestlerId);
      if (!wrestler) {
        return;
      }
      const reward = getReleaseFragmentReward(wrestler);

      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">레슬러 방출 확인</h3>
            <p class="modal-subtitle">${wrestler.name}를 로스터에서 제거합니다.</p>
          </div>
          <button class="modal-close" data-modal-close>닫기</button>
        </div>
        <p class="confirm-message">
          ${wrestler.name} "${wrestler.nickname}" 선수를 방출하면 로스터에서 제거됩니다.<br>
          획득 조각: ${formatFragmentRewardLabel(wrestler.grade, reward.amount, reward.reasons)}
        </p>
        <div class="roster-warning-list">
          ${hasRivalry(wrestler.id) ? `<div>⚠️ 현재 라이벌 관계 선수입니다</div>` : ""}
          ${isChampionHolder(wrestler.id) ? `<div>🏆 현재 챔피언이라 방출 시 벨트를 반납합니다</div>` : ""}
          ${wrestler.status === "training" ? `<div>🏋️ 훈련 중인 선수라 훈련이 중단됩니다</div>` : ""}
          ${wrestler.isFavorite ? `<div>⭐ 즐겨찾기 선수입니다. 정말 방출하시겠습니까?</div>` : ""}
        </div>
        <div class="modal-actions">
          <button class="modal-action-button cancel" data-modal-close>취소</button>
          <button class="modal-action-button confirm" id="confirmReleaseButton">방출</button>
        </div>
      `);

      const confirmButton = document.getElementById("confirmReleaseButton");
      if (confirmButton) {
        confirmButton.addEventListener("click", () => {
          if (wrestler.isFavorite && !window.confirm(`⭐ ${wrestler.name}은 즐겨찾기 선수입니다. 정말 방출하시겠습니까?`)) {
            return;
          }
          handleReleaseWrestler(wrestlerId);
          closeModal();
        });
      }
    }

    function openTrainingAssignmentModal(wrestlerId) {
      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler) {
        return;
      }

      const trainingSections = getTrainingFacilities().map((facilityKey) => {
        const facility = gameState.facilities[facilityKey];
        const occupants = getFacilityOccupants(facilityKey);
        const availableSlots = getAvailableFacilitySlots(facilityKey);
        const occupantList = occupants.length
          ? occupants.map((occupant) => `<div>• ${occupant.name}</div>`).join("")
          : "<div>현재 훈련 중인 선수 없음</div>";
        const canAssign = canTrainAtFacility(wrestler, facilityKey) && (availableSlots > 0 || wrestler.trainingFacility === facilityKey);
        return `
          <div class="training-slot-card">
            <div class="facility-title-row">
              <div>
                <div class="facility-title">${facility.name}</div>
                <div class="facility-level">${facility.trainStat === "power" ? "힘" : facility.trainStat === "technique" ? "기술" : "카리스마"} 훈련 · 슬롯 ${occupants.length}/${facility.slots}</div>
              </div>
            </div>
            <div class="fragment-meta">${occupantList}</div>
            <div class="gacha-small-text">주간 성장량 +${formatAverage(getTrainingGainPreview(facilityKey, wrestler))} · 속도 x${facility.speedBonus.toFixed(2)} · 코치 x${getCoachTrainingMultiplier(facilityKey).toFixed(2)}</div>
            <button class="training-assign-button" data-action="assign-training" data-wrestler-id="${wrestler.id}" data-facility-key="${facilityKey}" ${canAssign ? "" : "disabled"}>배치</button>
          </div>
        `;
      }).join("");

      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">${wrestler.name} 훈련 배치</h3>
            <p class="modal-subtitle">해금된 훈련 시설 슬롯 중 하나를 선택해 배치합니다.</p>
          </div>
          <button class="modal-close" data-modal-close>닫기</button>
        </div>
        <div class="training-facility-group">
          <div class="result-summary-item">
            <div class="result-summary-label">현재 상태</div>
            <div class="result-summary-value">${wrestler.status === "training" ? `${gameState.facilities[wrestler.trainingFacility]?.name || "훈련"} 배치 중` : wrestler.status === "injured" ? "부상 중" : "대기 중"}</div>
          </div>
          ${trainingSections}
          ${wrestler.status === "training" ? '<button class="modal-action-button cancel" id="removeTrainingButton">훈련 해제</button>' : ""}
        </div>
      `);

      Array.from(modalWindowEl.querySelectorAll('[data-action="assign-training"]')).forEach((button) => {
        button.addEventListener("click", () => {
          const targetWrestlerId = button.dataset.wrestlerId;
          const facilityKey = button.dataset.facilityKey;
          removeWrestlerFromTraining(targetWrestlerId);
          if (!assignWrestlerToFacility(targetWrestlerId, facilityKey)) {
            window.alert("해당 시설에 배치할 수 없습니다.");
            return;
          }
          closeModal();
          render();
          saveGameState();
        });
      });

      const removeTrainingButton = document.getElementById("removeTrainingButton");
      if (removeTrainingButton) {
        removeTrainingButton.addEventListener("click", () => {
          removeWrestlerFromTraining(wrestler.id);
          closeModal();
          render();
          saveGameState();
        });
      }
    }

    function handleTrainAssignment(wrestlerId) {
      const wrestler = gameState.roster.find((item) => item.id === wrestlerId);
      if (!wrestler) {
        return;
      }
      if (wrestler.status === "injured") {
        window.alert("부상 선수는 훈련할 수 없습니다.");
        return;
      }
      openTrainingAssignmentModal(wrestlerId);
    }

    function handleAlignmentTurnAction(wrestlerId, targetAlignment) {
      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler) {
        return;
      }
      if (!canChangeAlignment(wrestler, targetAlignment)) {
        const cooldown = getAlignmentTurnCooldownRemaining(wrestler);
        if (cooldown > 0) {
          window.alert(`역할 전환은 ${cooldown}주 후 다시 가능합니다.`);
        } else if (gameState.gold < 500) {
          window.alert("골드가 부족합니다.");
        }
        return;
      }
      if (!applyAlignmentTurn(wrestler, targetAlignment, { direct: true })) {
        return;
      }
      render();
      saveGameState();
    }

    function handleReleaseWrestler(wrestlerId) {
      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler) {
        return;
      }
      releaseRosterMembers([wrestlerId]);
      render();
      saveGameState();
    }

    function handleHireFreeAgent(wrestlerId) {
      const targetIndex = gameState.freeAgents.findIndex((item) => item.id === wrestlerId);
      if (targetIndex === -1) {
        return;
      }

      if (gameState.roster.length >= gameState.rosterLimit) {
        openRosterFullModal();
        return;
      }

      const wrestler = gameState.freeAgents[targetIndex];
      const recruitCost = getGradeHireCost(wrestler.grade);

      if (gameState.gold < recruitCost) {
        window.alert("골드가 부족합니다.");
        return;
      }

      gameState.gold -= recruitCost;
      addRosterMember({ ...wrestler, id: createWrestlerId("w") });
      gameState.freeAgents.splice(targetIndex, 1);

      render();
    }

    function handleHireProspect(wrestlerId) {
      const targetIndex = gameState.prospects.findIndex((item) => item.id === wrestlerId);
      if (targetIndex === -1) {
        return;
      }
      if (gameState.roster.length >= gameState.rosterLimit) {
        openRosterFullModal();
        return;
      }
      const wrestler = gameState.prospects[targetIndex];
      const recruitCost = getProspectHireCost(wrestler);
      if (gameState.gold < recruitCost) {
        window.alert("골드가 부족합니다.");
        return;
      }
      gameState.gold -= recruitCost;
      addRosterMember(createWrestler({
        ...structuredClone(wrestler),
        id: createWrestlerId("w"),
        status: "idle",
        injuryWeeks: 0,
        wins: 0,
        losses: 0
      }));
      gameState.prospects.splice(targetIndex, 1);
      render();
    }

    function startIdleIncome() {
      setInterval(() => {
        const income = getIdleIncomePerSecond();
        gameState.gold += income;
        addWeeklyStat("goldEarned", income);
        ensureMissionRefreshes();
        notifyMissionCompletionIfNeeded();
        if (activeTab !== "home" && activeTab !== "roster") {
          renderActiveTab();
        } else {
          renderTabBadges();
        }
      }, 1000);
    }

    function startAutoSave() {
      setInterval(() => {
        saveGameState();
      }, 5000);
    }

    modalOverlayEl.addEventListener("click", (event) => {
      if (event.target === modalOverlayEl) {
        closeModal();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modalOverlayEl.classList.contains("show")) {
        closeModal();
      }
    });

    window.addEventListener("pointerdown", () => {
      renderResources();
      updateBattleActionPanel();
    });

    window.addEventListener("beforeunload", () => {
      stopBattleBgm();
      finalizePendingGachaRewardsForSave();
      silentSaveGameState();
    });

    function init() {
      titleScreenHasSave = Boolean(localStorage.getItem(STORAGE_KEY));
      applyCustomWrestlerTemplates();
      const loaded = loadGameState();
      gameState = applyCustomSpriteOverridesToState(loaded.state);
      pendingGachaRewards = gameState.pendingGachaSession ? structuredClone(gameState.pendingGachaSession) : null;
      titleScreenVisible = false;
      wrestlerPool.splice(0, wrestlerPool.length, ...applyCustomSpriteOverridesToCollection(wrestlerPool));
      ensureMissionRefreshes();
      window.__lastMissionClaimableCount = getClaimableMissionCount();
      if (headerUiScaleSelectEl && !headerUiScaleSelectEl.dataset.bound) {
        headerUiScaleSelectEl.value = String(normalizeUiScale(gameState.uiScale));
        headerUiScaleSelectEl.addEventListener("change", () => {
          gameState.uiScale = normalizeUiScale(headerUiScaleSelectEl.value);
          applyUiScale();
          saveGameState();
        });
        headerUiScaleSelectEl.dataset.bound = "true";
      }
      if (headerSoundOptionsButtonEl && !headerSoundOptionsButtonEl.dataset.bound) {
        headerSoundOptionsButtonEl.addEventListener("click", openSoundOptionsModal);
        headerSoundOptionsButtonEl.dataset.bound = "true";
      }
      setupTabs();
      setupGlobalDragCleanup();
      render();
      handleRouteHash();
      startIdleIncome();
      startAutoSave();
      showOfflinePopup(loaded.offlineGold);
      if (pendingGachaRewards?.results?.length) {
        openGachaResultModal(pendingGachaRewards.results, pendingGachaRewards.pullCount, { reusePending: true, skipReveal: true });
      }
    }
  </script>

  <script>
    function rdDashPercent(value) {
      return clamp(Math.round(Number(value || 0)), 0, 100);
    }

    function rdDashWrestlerPortraitStyle(wrestler) {
      return wrestler ? getWrestlerCardPortraitStyle(wrestler, "background-position:center bottom;background-size:contain;") : "";
    }

    function rdDashFindChampionCandidate(definition, division) {
      const championId = getDivisionChampionId(definition, division);
      const champion = championId ? findWrestlerById(championId) : null;
      if (champion) {
        return champion;
      }
      const assigned = [division?.contenderId, ...(division?.lineupIds || [])]
        .map(findWrestlerById)
        .filter(Boolean);
      if (assigned.length) {
        return assigned.sort((left, right) => getWrestlerPower(right) - getWrestlerPower(left))[0];
      }
      return (gameState.roster || [])
        .filter((wrestler) => isWrestlerEligibleForDivision(wrestler, definition))
        .sort((left, right) => getWrestlerPower(right) - getWrestlerPower(left))[0] || null;
    }

    function rdDashChampionCardsHtml() {
      const booking = ensureDivisionBookingState();
      return SHOW_DIVISION_DEFS.map((definition) => {
        const division = booking.divisions?.[definition.key] || {};
        const champion = rdDashFindChampionCandidate(definition, division);
        const holderId = getDivisionChampionId(definition, division);
        const status = holderId ? "챔피언" : "후보";
        return `
          <article class="rd-champion-card" style="--rd-accent:${escapeHtml(definition.accent || "#e6372d")}">
            <div class="rd-champion-label">${escapeHtml(definition.title)}</div>
            <div class="rd-champion-portrait" style="${rdDashWrestlerPortraitStyle(champion)}"></div>
            ${definition.titleImage ? `<img class="rd-champion-belt" src="${TITLE_IMAGE_BASE_PATH}${escapeHtml(definition.titleImage)}" alt="${escapeHtml(definition.title)}">` : ""}
            <div class="rd-champion-name">${escapeHtml(champion?.name || "VACANT")} <span style="font-size:11px;color:#d9c9bd;">${escapeHtml(status)}</span></div>
          </article>
        `;
      }).join("");
    }

    function rdDashRivalryCardsHtml() {
      const rivalries = getDivisionRivalries().slice(0, 3);
      if (!rivalries.length) {
        return `<div class="rd-empty-note">디비전에 선수를 2명 이상 배정하면 활성 라이벌리가 생성됩니다.</div>`;
      }
      return rivalries.map((rivalry) => {
        const heat = rdDashPercent(rivalry.heat);
        const flames = "🔥".repeat(Math.max(1, Math.ceil(heat / 25))).padEnd(5, "☆");
        return `
          <article class="rd-rivalry-card">
            <div class="division-wrestler-name">${escapeHtml(rivalry.champion?.name || "TBA")} VS ${escapeHtml(rivalry.contender?.name || "TBA")}</div>
            <div class="rd-rivalry-faces">
              <div class="rd-rivalry-face" style="${rdDashWrestlerPortraitStyle(rivalry.champion)}"></div>
              <div class="rd-rivalry-vs">VS</div>
              <div class="rd-rivalry-face" style="${rdDashWrestlerPortraitStyle(rivalry.contender)}"></div>
            </div>
            <div class="rd-heat-row"><span>라이벌리 강도</span><div class="rd-mini-meter"><span style="--value:${heat}%;"></span></div><strong>${flames}</strong></div>
            <div class="rd-heat-row"><span>진행 상황</span><div class="rd-mini-meter"><span style="--value:${rdDashPercent((rivalry.phaseWeek / 4) * 100)}%;"></span></div><strong>${rivalry.phaseWeek} / 4 주차</strong></div>
          </article>
        `;
      }).join("");
    }

    function rdDashShowFeatureHtml() {
      const ppv = getPpvInfo();
      const logoPath = ppv.logoPath || "data/images/shows/raw.png";
      const topRivalry = getDivisionRivalries()[0] || null;
      const best = getTopRosterWrestler();
      const story = topRivalry
        ? `${topRivalry.champion.name}와 ${topRivalry.contender.name}의 긴장이 이번 주 메인 스토리입니다.`
        : best
          ? `${best.name} 중심으로 이번 주 카드를 준비하세요.`
          : "이번 주 쇼 카드 편성이 필요합니다.";
      const dateText = typeof getCurrentUiDateText === "function" ? getCurrentUiDateText() : `Week ${gameState.week || 1}`;
      return `
        <section class="rd-dash-panel">
          <div class="rd-dash-panel-head">
            <div class="rd-dash-title">이번 주 쇼</div>
            <button class="rd-dash-link" type="button" data-rd-home-action="open-booking">쇼 상세 보기 ›</button>
          </div>
            <div class="rd-show-feature" style="--rd-show-bg:url('${escapeHtml(ppv.isPpv ? "data/images/ui/story/ppv_night_banner.png" : "data/images/ui/generated/show_cutscenes/promo_arena_silhouette_v2.png")}')">
            <img class="rd-show-logo-panel" src="${escapeHtml(logoPath)}" alt="${escapeHtml(ppv.name)}">
            <div class="rd-show-copy">
              <h3>${escapeHtml(ppv.isPpv ? ppv.name : "TONIGHT'S STORY")}</h3>
              <div style="color:#e9dfd4;font-weight:800;line-height:1.55;">${escapeHtml(story)}</div>
              <div class="rd-show-meta">
                <span>쇼 타입 ${ppv.isPpv ? "PPV" : "RAW"}</span>
                <span>${escapeHtml(dateText)}</span>
                <span>${STAGE_LABELS[gameState.stage] || "인디 체육관"}</span>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function rdDashBestCardHtml() {
      const wrestler = getTopRosterWrestler();
      if (!wrestler) {
        return `<section class="rd-dash-panel"><div class="rd-empty-note">보유 선수가 없습니다.</div></section>`;
      }
      const stats = getGmStats(wrestler);
      const power = Math.round(getWrestlerPower(wrestler));
      return `
        <section class="rd-dash-panel">
          <div class="rd-dash-panel-head">
            <div class="rd-dash-title">최고 카드</div>
          </div>
          <div class="rd-super-card">
            <div class="rd-super-portrait" style="${rdDashWrestlerPortraitStyle(wrestler)}"></div>
            <div style="display:grid;gap:8px;align-content:start;">
              <div class="rd-pop-badge"><span style="font-size:11px;">POP</span><br>${stats.pop}</div>
              <h3>${escapeHtml(wrestler.name)}</h3>
              <div class="rd-alert-note">${escapeHtml(wrestler.nickname || "")}</div>
              <div style="color:#ffd166;font-weight:1000;">${"★".repeat(Math.max(1, Math.min(5, Math.ceil(stats.pop / 20))))}</div>
            </div>
            <div class="rd-stat-strip">
              <div class="rd-stat"><span>경기력</span><strong>${power}</strong></div>
              <div class="rd-stat"><span>마이크</span><strong>${stats.mic}</strong></div>
              <div class="rd-stat"><span>인기</span><strong>${stats.pop}</strong></div>
              <div class="rd-stat"><span>체력</span><strong>${Math.round(wrestler.condition || 0)}</strong></div>
              <div class="rd-stat"><span>멘탈</span><strong>${stats.heat}</strong></div>
            </div>
          </div>
        </section>
      `;
    }

    function rdDashAlertsHtml() {
      const contract = getContractAlertSummary();
      const injured = (gameState.roster || []).filter((wrestler) => wrestler.status === "injured" || Number(wrestler.condition || 0) < 45);
      const topRivalry = getDivisionRivalries()[0] || null;
      const alerts = [
        { icon: "⚠", title: contract.count ? "계약 만료 임박" : "계약 안정", note: contract.note, action: "로스터" },
        { icon: "🛡", title: injured.length ? "부상 경고" : "부상 없음", note: injured.length ? `${injured[0].name} 상태 확인 필요` : "위험 상태 선수가 없습니다.", action: "" },
        { icon: "ℹ", title: "스토리 기회", note: topRivalry ? topRivalry.nextTrigger : "디비전 배정으로 스토리를 시작하세요.", action: "자세히 보기" },
        { icon: "★", title: "팬 기대 상승", note: `현재 Hype ${gameState.hype || 0}% · 이번 주 쇼 카드 기대치 확인`, action: "카드 편집" }
      ];
      return `
        <section class="rd-dash-panel">
          <div class="rd-dash-panel-head"><div class="rd-dash-title">주요 알림</div></div>
          <div class="rd-alert-list">
            ${alerts.map((alert) => `
              <div class="rd-alert-row">
                <div class="rd-alert-icon">${escapeHtml(alert.icon)}</div>
                <div><div class="rd-alert-title">${escapeHtml(alert.title)}</div><div class="rd-alert-note">${escapeHtml(alert.note)}</div></div>
                ${alert.action ? `<button class="rd-alert-action" type="button" data-rd-home-action="open-booking">${escapeHtml(alert.action)}</button>` : ""}
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function rdDashBrandsHtml() {
      const brandRows = [
        { key: "raw", label: "RAW", logo: "data/images/shows/raw.png", value: 92, trend: "상승세" },
        { key: "smack", label: "SMACKDOWN", logo: "data/images/shows/smack_down.png", value: 87, trend: "안정적" },
        { key: "nxt", label: "NXT", logo: "data/images/shows/nxt.png", value: 74, trend: "상승세" }
      ];
      return `
        <section class="rd-dash-panel">
          <div class="rd-dash-panel-head"><div class="rd-dash-title">디비전 현황</div><button class="rd-dash-link" data-rd-home-action="open-booking">전체 보기 ›</button></div>
          <div class="rd-brand-list">
            ${brandRows.map((row) => {
              const value = rdDashPercent(row.value);
              return `
                <div class="rd-brand-row">
                  <img class="rd-brand-logo" src="${escapeHtml(row.logo)}" alt="${escapeHtml(row.label)}">
                  <div><div class="rd-brand-name">인기 ${value}</div><div class="rd-mini-meter"><span style="--value:${value}%;"></span></div></div>
                  <div class="rd-brand-note">${escapeHtml(row.trend)}</div>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function rdDashAttachHomeActions() {
      mainDynamicContentEl.querySelectorAll("[data-rd-home-action]").forEach((button) => {
        button.addEventListener("click", () => {
          switchAppTab("roster");
        });
      });
    }

    function renderRingDynastyDashboardHome() {
      if (matchAnimationState.running) {
        renderRdDefaultHomeMainContent();
        return;
      }
      const booking = ensureDivisionBookingState();
      if (booking?.showState?.segments?.length && typeof renderHomeShowSceneMainContent === "function") {
        renderHomeShowSceneMainContent();
        return;
      }
      mainDynamicContentEl.innerHTML = `
        <div class="rd-dashboard">
          <div class="rd-dashboard-grid">
            <section class="rd-dash-panel">
              <div class="rd-dash-panel-head"><div class="rd-dash-title">현재 챔피언</div><button class="rd-dash-link" data-rd-home-action="open-booking">모든 타이틀 보기 ›</button></div>
              <div class="rd-champion-grid">${rdDashChampionCardsHtml()}</div>
            </section>
            <section class="rd-dash-panel">
              <div class="rd-dash-panel-head"><div class="rd-dash-title">🔥 활성 라이벌리</div><button class="rd-dash-link" data-rd-home-action="open-booking">모든 라이벌리 보기 ›</button></div>
              <div class="rd-rivalry-list">${rdDashRivalryCardsHtml()}</div>
            </section>
          </div>
          <div class="rd-dashboard-bottom">
            ${rdDashShowFeatureHtml()}
            ${rdDashBestCardHtml()}
            ${rdDashAlertsHtml()}
            ${rdDashBrandsHtml()}
          </div>
        </div>
      `;
      rdDashAttachHomeActions();
    }

    renderHomeMainContent = renderRingDynastyDashboardHome;

    const legacyAutoStartWeeklyMatches = startWeeklyMatches;

    function shouldDeferToDedicatedWeeklyStart() {
      return Boolean(window.__RING_DYNASTY_PPV_INVADERS_API__?.shouldUseDedicatedWeeklyStart?.());
    }

    function startRdWeeklyShowFromCurrentCard() {
      if (matchAnimationState.running) {
        return true;
      }
      if (typeof ensureWeeklyMissionState === "function") {
        ensureWeeklyMissionState();
      }
      const maxShowMatches = Math.max(2, Math.min(5, typeof getWeeklyCardSlotCount === "function" ? getWeeklyCardSlotCount() : 3));
      const readyMatches = getReadyMatches().slice(0, maxShowMatches);
      if (!readyMatches.length) {
        return false;
      }
      const invalidMatch = readyMatches
        .map((slot, index) => ({
          index,
          wrestlerA: findWrestlerById(slot.wrestlerAId),
          wrestlerB: findWrestlerById(slot.wrestlerBId)
        }))
        .find((entry) => !getBookingMatchRestriction(entry.wrestlerA, entry.wrestlerB).ok);
      if (invalidMatch) {
        const restriction = getBookingMatchRestriction(invalidMatch.wrestlerA, invalidMatch.wrestlerB);
        window.alert(`${invalidMatch.index + 1}번 경기 편성 오류: ${restriction.reason}`);
        return true;
      }
      const mainSlot = readyMatches[0] || null;
      const mainWrestler = findWrestlerById(mainSlot?.wrestlerAId);
      const mainRequirementFailure = mainSlot?.divisionGenerated ? "" : getWrestlerMainEventRequirementFailure(mainWrestler);
      if (mainRequirementFailure) {
        window.alert(`메인 이벤트 편성 오류: ${mainRequirementFailure}`);
        return true;
      }
      const ppvInfo = getPpvInfo();
      if (ppvInfo.isPpv && getAvailableTitleMatchChampionship() && !hasTitleMatchBooked()) {
        window.alert("PPV 주간에는 메인 이벤트 타이틀 매치가 필요합니다.");
        return true;
      }
      if (ppvInfo.isPpv && !gameState.ppvState.featuredMatchType) {
        gameState.ppvState.featuredMatchType = ppvInfo.featuredMatchType || PPV_MATCH_TYPES[Math.floor(Math.random() * PPV_MATCH_TYPES.length)];
      }
      const matchContexts = readyMatches
        .map((slot, matchIndex) => createWeeklyMatchContext(slot, matchIndex, ppvInfo))
        .filter(Boolean);
      if (!matchContexts.length) {
        return false;
      }
      createRdPendingWeeklySession(matchContexts, ppvInfo);
      const showSeed = Math.floor(Math.random() * 1000000000);
      const booking = ensureDivisionBookingState();
      booking.showState = {
        week: gameState.week,
        isPpv: Boolean(ppvInfo.isPpv),
        showName: ppvInfo.isPpv ? ppvInfo.name : "MONDAY NIGHT RAW",
        eventSeed: showSeed,
        currentIndex: 0,
        choiceCount: 0,
        gmChoices: [],
        matchContexts,
        playedMatchIndexes: [],
        entranceSteps: {},
        segments: getRdShowSegments(matchContexts, { seed: showSeed })
      };
      booking.activePage = "opening";
      window.__divisionRuntimeShowState = booking.showState;
      window.__divisionRuntimeActivePage = "opening";
      activeTab = "home";
      render();
      return true;
    }

    const rdBaseOpenWeeklyResultsModal = openWeeklyResultsModal;
    openWeeklyResultsModal = function () {
      if (pendingWeeklySummary && !pendingWeeklySummary.managementMapBonusApplied && typeof applyManagementMapBonusesToSummary === "function") {
        pendingWeeklySummary.managementMapBonusApplied = true;
        applyManagementMapBonusesToSummary();
      }
      rdBaseOpenWeeklyResultsModal();
    };

    startWeeklyMatches = function () {
      if (shouldDeferToDedicatedWeeklyStart()) {
        legacyAutoStartWeeklyMatches();
        return;
      }
      if (window.__RING_DYNASTY_GM_OVERHAUL__?.activeBookingBoard) {
        if (!startRdWeeklyShowFromCurrentCard()) {
          startManualWeeklyMatches();
        }
        return;
      }
      if (typeof ensureManagementMapState === "function") {
        ensureManagementMapState();
      }
      if (typeof autoClearInvalidAssignments === "function") {
        autoClearInvalidAssignments();
      }
      if (typeof getWeeklyMatchAssignmentIssues === "function" && gameState?.managementMap) {
        const issues = getWeeklyMatchAssignmentIssues(gameState.managementMap.assignments, gameState.managementMap);
        if (issues.length) {
          window.alert(issues[0]);
          return;
        }
      }
      if (typeof syncManagementMapToWeeklySchedule === "function") {
        syncManagementMapToWeeklySchedule();
      }
      if (!startRdWeeklyShowFromCurrentCard()) {
        startManualWeeklyMatches();
      }
    };

    init();
  </script>
</body>
</html>
