    function ensureDivisionBookingState() {
      gameState.divisionBooking = sanitizeDivisionBooking(gameState.divisionBooking, gameState.roster);
      if (window.__divisionRuntimeShowState?.segments?.length && ["opening", "segment", "home"].includes(window.__divisionShowFlowMode)) {
        gameState.divisionBooking.showState = window.__divisionRuntimeShowState;
        gameState.divisionBooking.activePage = window.__divisionRuntimeActivePage || gameState.divisionBooking.activePage || "opening";
      }
      return gameState.divisionBooking;
    }

    function getDivisionDefinition(key) {
      return SHOW_DIVISION_DEFS.find((definition) => definition.key === key) || SHOW_DIVISION_DEFS[0];
    }

    function getDivisionAssignedIds(division = null) {
      const source = division || {};
      return [source.contenderId, ...(source.lineupIds || [])].filter(Boolean);
    }

    function getAllDivisionAssignedIds() {
      const booking = ensureDivisionBookingState();
      const ids = new Set();
      Object.values(booking.divisions || {}).forEach((division) => {
        getDivisionAssignedIds(division).forEach((id) => ids.add(id));
      });
      return ids;
    }

    function getDivisionChampionId(definition, division = null) {
      const source = division || {};
      const titleHolderId = gameState.championships?.[definition.titleKey]?.holderId || "";
      const titleHolder = findWrestlerById(titleHolderId);
      if (titleHolderId && isWrestlerGenderEligibleForDivision(titleHolder, definition)) {
        return titleHolderId;
      }
      const assignedChampion = findWrestlerById(source.championId);
      return assignedChampion && isWrestlerGenderEligibleForDivision(assignedChampion, definition) ? source.championId : "";
    }

    function getDivisionMemberIds(division = null) {
      return getDivisionAssignedIds(division);
    }

    function isWrestlerAssignedToAnyDivision(wrestlerId) {
      const booking = ensureDivisionBookingState();
      return Object.values(booking.divisions).some((division) => getDivisionAssignedIds(division).includes(wrestlerId));
    }

    function isWrestlerGenderEligibleForDivision(wrestler, definition) {
      if (!wrestler) {
        return false;
      }
      if (definition.gender === "female") {
        return getWrestlerGender(wrestler) === "female";
      }
      if (definition.gender === "male") {
        return getWrestlerGender(wrestler) === "male";
      }
      return true;
    }

    function isWrestlerEligibleForDivision(wrestler, definition) {
      return Boolean(wrestler && isWrestlerGenderEligibleForDivision(wrestler, definition));
    }

    function getDivisionHeat(definition, division) {
      const champion = findWrestlerById(getDivisionChampionId(definition, division));
      const members = getDivisionMemberIds(division).map(findWrestlerById).filter(Boolean);
      const wrestlers = [champion, ...members].filter(Boolean);
      if (!wrestlers.length) {
        return 0;
      }
      const contender = members[0] || null;
      const avgPop = wrestlers.reduce((sum, wrestler) => sum + getGmStats(wrestler).pop, 0) / wrestlers.length;
      const avgPower = wrestlers.reduce((sum, wrestler) => sum + getWrestlerPower(wrestler), 0) / wrestlers.length;
      const rivalry = champion && contender ? getRivalryBetween(champion.id, contender.id) : null;
      const fillBonus = Math.min(20, wrestlers.length * 4);
      const titleBonus = definition.key === "world" ? 12 : definition.key === "tag" ? 5 : 8;
      const rivalryBonus = rivalry ? Math.min(24, Math.floor(rivalry.intensity / 4)) : 8;
      return clamp(Math.round((avgPop * 0.32) + (avgPower * 0.24) + fillBonus + titleBonus + rivalryBonus), 0, 100);
    }

    function getRivalryLevelFromHeat(heat) {
      return heat >= 88 ? 4 : heat >= 72 ? 3 : heat >= 50 ? 2 : 1;
    }

    function getDivisionCooldownUntil(wrestlerAId, wrestlerBId) {
      const booking = ensureDivisionBookingState();
      const key = getRivalryKey(wrestlerAId, wrestlerBId);
      const bookingCooldown = Number(booking.rivalryCooldowns?.[key] || 0);
      const rivalry = getRivalryBetween(wrestlerAId, wrestlerBId);
      return Math.max(bookingCooldown, Number(rivalry?.rematchBlockedUntilWeek || 0), Number(rivalry?.cooldownUntilWeek || 0));
    }

    function isRematchCooldownActive(wrestlerAId, wrestlerBId, weekValue = gameState.week) {
      return getDivisionCooldownUntil(wrestlerAId, wrestlerBId) > weekValue;
    }

    function getDivisionRankingEntries(definition, division) {
      const championId = getDivisionChampionId(definition, division);
      return getDivisionMemberIds(division).map(findWrestlerById).filter(Boolean).map((wrestler) => {
        const stats = getGmStats(wrestler);
        const baseScore = (getWrestlerPower(wrestler) * 0.25) + (stats.pop * 0.25) + ((wrestler.hiddenDivisionScore || getWrestlerPower(wrestler)) * 0.25);
        const fitBonus = definition.gender === "any" ? 6 : isWrestlerGenderEligibleForDivision(wrestler, definition) ? 10 : -30;
        const fatiguePenalty = getFatiguePercent(wrestler) * 0.22;
        const recentLossPenalty = (wrestler.recentResults || []).slice(-3).filter((result) => result === "L").length * 7;
        const cooldownPenalty = championId && isRematchCooldownActive(wrestler.id, championId) ? 60 : 0;
        const momentum = (wrestler.recentResults || []).slice(-5).reduce((sum, result) => sum + (result === "W" ? 8 : -5), 0);
        return {
          wrestlerId: wrestler.id,
          score: clamp(Math.round(baseScore + fitBonus + momentum - fatiguePenalty - recentLossPenalty - cooldownPenalty), 0, 120),
          momentum,
          recentLossPenalty,
          cooldownUntil: championId ? getDivisionCooldownUntil(wrestler.id, championId) : 0
        };
      }).sort((left, right) => right.score - left.score);
    }

    function selectDivisionOpponent(definition, division, championId) {
      const champion = findWrestlerById(championId);
      const rankings = getDivisionRankingEntries(definition, division);
      return rankings
        .filter((entry) => entry.wrestlerId !== championId)
        .filter((entry) => !championId || entry.cooldownUntil <= gameState.week)
        .map((entry) => findWrestlerById(entry.wrestlerId))
        .find((candidate) => candidate && isWrestlerGenderEligibleForDivision(candidate, definition) && (!champion || getBookingMatchRestriction(champion, candidate).ok)) || null;
    }

    function selectVacantDivisionPair(definition, division) {
      const ranked = getDivisionRankingEntries(definition, division)
        .map((entry) => findWrestlerById(entry.wrestlerId))
        .filter((wrestler) => wrestler && isWrestlerGenderEligibleForDivision(wrestler, definition));
      for (let leftIndex = 0; leftIndex < ranked.length; leftIndex += 1) {
        for (let rightIndex = 0; rightIndex < ranked.length; rightIndex += 1) {
          if (leftIndex === rightIndex) {
            continue;
          }
          const left = ranked[leftIndex];
          const right = ranked[rightIndex];
          if (isRematchCooldownActive(left.id, right.id)) {
            continue;
          }
          if (getBookingMatchRestriction(left, right).ok) {
            return [left, right];
          }
        }
      }
      return ranked.length >= 2 ? [ranked[0], ranked[1]] : [ranked[0] || null, null];
    }

    function hasCompatibleDivisionPair(wrestlers) {
      for (let leftIndex = 0; leftIndex < wrestlers.length; leftIndex += 1) {
        for (let rightIndex = leftIndex + 1; rightIndex < wrestlers.length; rightIndex += 1) {
          const left = wrestlers[leftIndex];
          const right = wrestlers[rightIndex];
          if (!left || !right || isRematchCooldownActive(left.id, right.id)) {
            continue;
          }
          if (getBookingMatchRestriction(left, right).ok) {
            return true;
          }
        }
      }
      return false;
    }

    function getDivisionShowStartIssues() {
      const booking = ensureDivisionBookingState();
      const rivalries = getDivisionRivalries();
      if (rivalries.length) {
        return [];
      }
      const issues = SHOW_DIVISION_DEFS.map((definition) => {
        const division = booking.divisions[definition.key];
        const champion = findWrestlerById(getDivisionChampionId(definition, division));
        const assigned = getDivisionMemberIds(division).map(findWrestlerById).filter(Boolean);
        const eligible = assigned.filter((wrestler) => isWrestlerGenderEligibleForDivision(wrestler, definition));
        const wrongGenderCount = assigned.length - eligible.length;

        if (champion) {
          const candidates = eligible.filter((wrestler) => wrestler.id !== champion.id);
          if (!candidates.length) {
            return `${definition.title}: 챔피언 상대가 필요합니다. ${definition.gender === "female" ? "여성" : "남성"} 선수를 1명 이상 배정하세요.`;
          }
          const available = candidates.filter((wrestler) => !isRematchCooldownActive(champion.id, wrestler.id));
          if (!available.length) {
            return `${definition.title}: 배정된 상대가 모두 재대립 쿨다운 중입니다. 다른 선수를 넣거나 다음 주까지 기다리세요.`;
          }
          const compatible = available.find((wrestler) => getBookingMatchRestriction(champion, wrestler).ok);
          if (!compatible) {
            return `${definition.title}: 선역/악역 제한을 만족하는 상대가 없습니다. 반대 성향 또는 중립 선수를 배정하세요.`;
          }
          return "";
        }

        if (eligible.length < 2) {
          const extra = wrongGenderCount > 0 ? ` 현재 성별이 맞지 않는 배정 ${wrongGenderCount}명이 제외되었습니다.` : "";
          return `${definition.title}: 챔피언 공석이라 결정전 후보 2명이 필요합니다.${extra}`;
        }
        if (!hasCompatibleDivisionPair(eligible)) {
          const hasCooldownPair = eligible.some((left, leftIndex) => eligible.some((right, rightIndex) => leftIndex < rightIndex && isRematchCooldownActive(left.id, right.id)));
          return hasCooldownPair
            ? `${definition.title}: 가능한 후보 조합이 재대립 쿨다운 또는 선역/악역 제한에 막혀 있습니다.`
            : `${definition.title}: 후보 2명은 있지만 선역/악역 제한을 만족하지 않습니다. 반대 성향 또는 중립 선수를 섞어주세요.`;
        }
        return "";
      }).filter(Boolean);
      return issues.length ? issues : ["쇼를 시작할 수 있는 디비전 대립이 없습니다. 디비전에 같은 성별 선수 2명 이상을 배정하세요."];
    }

    function showDivisionStartBlockedPopup(issues = []) {
      const lines = (issues.length ? issues : getDivisionShowStartIssues()).slice(0, 6);
      window.alert(`쇼를 시작할 수 없습니다.\n\n${lines.map((line) => `- ${line}`).join("\n")}`);
    }

    function syncTagTeamsFromDivision() {
      const booking = ensureDivisionBookingState();
      const tagDefinition = SHOW_DIVISION_DEFS.find((definition) => definition.key === "tag");
      const tagDivision = booking.divisions?.tag;
      if (!tagDefinition || !tagDivision) {
        return [];
      }
      const ids = getDivisionMemberIds(tagDivision).filter(Boolean);
      const teams = [];
      for (let index = 0; index < ids.length - 1; index += 2) {
        const first = findWrestlerById(ids[index]);
        const second = findWrestlerById(ids[index + 1]);
        if (!first || !second) {
          continue;
        }
        const chemistry = clamp(Math.round((getWrestlerPower(first) + getWrestlerPower(second) + getGmStats(first).pop + getGmStats(second).pop) / 4), 0, 100);
        teams.push({
          id: `tag_${first.id}_${second.id}`,
          name: `${first.name} & ${second.name}`,
          memberIds: [first.id, second.id],
          teamChemistry: chemistry,
          alignment: first.alignment === second.alignment ? first.alignment : "neutral",
          divisionId: "tag",
          hiddenScore: chemistry,
          isChampion: Boolean(getDivisionChampionId(tagDefinition, tagDivision) === first.id)
        });
      }
      booking.tagTeams = teams;
      return teams;
    }

    function getRivalryNextTriggerByPhase(rivalry, isPpv = false) {
      if (rivalry.vacantTitle) {
        return { text: "챔피언 결정전 자동 편성", type: "title_decider" };
      }
      if (isPpv || rivalry.phaseWeek >= 4 || rivalry.ppvMatchConfirmed) {
        return { text: "PPV 결착전 확정", type: "ppv_resolution" };
      }
      if (rivalry.phaseWeek === 3) {
        return { text: "경기 중 난입 또는 GM 선택지 후보", type: "interference" };
      }
      if (rivalry.phaseWeek === 2) {
        return { text: "백스테이지 충돌/논타이틀 경기 후보", type: "backstage" };
      }
      return { text: "오프닝 프로모/인터뷰 발언 후보", type: "opening_promo" };
    }

    function getDivisionRivalries() {
      const booking = ensureDivisionBookingState();
      syncTagTeamsFromDivision();
      return SHOW_DIVISION_DEFS.map((definition) => {
        const division = booking.divisions[definition.key];
        const champion = findWrestlerById(getDivisionChampionId(definition, division));
        const members = getDivisionMemberIds(division).map(findWrestlerById).filter(Boolean);
        const vacantPair = champion ? null : selectVacantDivisionPair(definition, division);
        const contender = champion ? selectDivisionOpponent(definition, division, champion.id) : vacantPair?.[1];
        const vacancyCandidate = champion ? null : vacantPair?.[0];
        const left = champion || vacancyCandidate;
        const right = contender;
        const vacantTitle = !champion && Boolean(left && right);
        const heat = getDivisionHeat(definition, division);
        if (!left || !right) {
          return null;
        }
        const cooldownUntil = getDivisionCooldownUntil(left.id, right.id);
        const blockedWeeks = Math.max(0, cooldownUntil - gameState.week);
        if (blockedWeeks > 0) {
          return null;
        }
        const restriction = getBookingMatchRestriction(left, right);
        if (!restriction.ok) {
          return null;
        }
        const existingRivalry = getRivalryBetween(left.id, right.id);
        ensureRivalryExtendedState(existingRivalry);
        const phaseWeek = existingRivalry ? getRivalryPhaseWeek(existingRivalry) : clamp(((gameState.week - 1) % 4) + 1, 1, 4);
        const rivalryHeat = clamp(existingRivalry ? Math.max(heat, existingRivalry.intensity) : heat, 0, 100);
        const freshness = existingRivalry ? existingRivalry.freshness : 100;
        const phaseTrigger = getRivalryNextTriggerByPhase({ vacantTitle, phaseWeek, ppvMatchConfirmed: Boolean(existingRivalry?.ppvMatchConfirmed) }, getPpvInfo().isPpv);
        return {
          id: `${definition.key}_${left.id}_${right.id}`,
          definition,
          division,
          champion: left,
          contender: right,
          vacantTitle,
          heat: rivalryHeat,
          level: getRivalryLevelFromHeat(rivalryHeat),
          phaseWeek,
          freshness,
          existingRivalry,
          status: existingRivalry?.status || "active",
          ppvMatchConfirmed: Boolean(existingRivalry?.ppvMatchConfirmed || phaseWeek >= 4),
          blockedWeeks: 0,
          lastIncident: vacantTitle
            ? `${definition.title} 챔피언이 공석입니다. ${left.name}와 ${right.name}가 챔피언 결정전 후보로 지명되었습니다.`
            : existingRivalry?.lastIncident || `${left.name}가 ${right.name}의 챔피언십 자격을 공개적으로 조롱했습니다.`,
          nextTrigger: phaseTrigger.text,
          nextTriggerType: phaseTrigger.type,
          eventTag: vacantTitle ? "챔피언 공석 / 결정전" : phaseWeek >= 4 ? "PPV 결착 대기" : rivalryHeat >= 80 ? "프로모 중심 / 간섭 가능" : rivalryHeat >= 60 ? "경기 중심 / 간섭 가능" : "신경전"
        };
      }).filter(Boolean).sort((left, right) => ((right.heat * 0.6) + (right.freshness * 0.4)) - ((left.heat * 0.6) + (left.freshness * 0.4)));
    }

    function getTagRivalryTeams(rivalry) {
      const members = getDivisionMemberIds(rivalry?.division)
        .map(findWrestlerById)
        .filter(Boolean);
      const firstTeam = members.slice(0, 2);
      const secondTeam = members.slice(2, 4);
      return {
        first: firstTeam.length ? firstTeam : [rivalry?.champion].filter(Boolean),
        second: secondTeam.length ? secondTeam : [rivalry?.contender].filter(Boolean)
      };
    }

    function consumeStoryHooksForShow(rivalries) {
      const booking = ensureDivisionBookingState();
      const hooks = (booking.storyHooks || [])
        .filter((hook) => !hook.consumed && hook.targetWeek <= gameState.week)
        .sort((left, right) => right.priority - left.priority)
        .slice(0, 2);
      return hooks.map((hook) => {
        const rivalry = rivalries.find((item) => getRivalryKey(item.champion.id, item.contender.id) === hook.rivalryKey) || rivalries[0];
        return { hook, rivalry };
      }).filter((entry) => entry.rivalry);
    }

    function createSegmentFromHook(entry, order) {
      const { hook, rivalry } = entry;
      return {
        id: `seg_hook_${hook.id}`,
        order,
        type: hook.suggestedSegmentType || "opening_promo",
        label: "후속 스토리",
        title: hook.title || `${rivalry.definition.title} 후속 이벤트`,
        description: hook.description || rivalry.nextTrigger,
        rivalry,
        participants: hook.participants?.length ? hook.participants : [rivalry.champion.id, rivalry.contender.id],
        hidden: false,
        matchType: hook.suggestedSegmentType === "match" ? "non_title" : "promo_only",
        expectedHeatChange: hook.type === "revenge_promo" ? 9 : 6,
        reaction: clamp(rivalry.heat + hook.priority * 0.18 + getFreshnessPenalty(rivalry.freshness), 30, 100),
        fromHookId: hook.id
      };
    }

    function getPhaseSegmentBlueprint(rivalry, isPpv) {
      if (rivalry.vacantTitle) {
        return { type: "main_event", label: "챔피언 결정전", matchType: "singles", titleSuffix: "챔피언 결정전", heatChange: 12, hidden: false, titleDecider: true };
      }
      if (isPpv || rivalry.ppvMatchConfirmed) {
        return { type: "main_event", label: "PPV 결착전", matchType: "singles", titleSuffix: "PPV 결착전", heatChange: -22, hidden: false, ppvResolution: true };
      }
      if (rivalry.phaseWeek >= 4) {
        return { type: "contract_signing", label: "계약식", matchType: "promo_only", titleSuffix: "PPV 계약식", heatChange: 10, hidden: false, ppvLock: true };
      }
      if (rivalry.phaseWeek === 3) {
        return { type: "interference", label: "난입", matchType: "non_title", titleSuffix: "경기 중 난입", heatChange: 14, hidden: true };
      }
      if (rivalry.phaseWeek === 2) {
        return { type: rivalry.definition.key === "women" ? "backstage" : "match", label: rivalry.definition.key === "women" ? "백스테이지" : "논타이틀 매치", matchType: rivalry.definition.key === "women" ? "promo_only" : "non_title", titleSuffix: rivalry.definition.key === "women" ? "백스테이지 충돌" : "논타이틀 경기", heatChange: rivalry.definition.key === "women" ? 10 : 6, hidden: false };
      }
      return { type: "opening_promo", label: "오프닝 프로모", matchType: "promo_only", titleSuffix: "오프닝 프로모", heatChange: 7, hidden: false };
    }

    function selectInterferenceMatchOpponent(rivalry) {
      if (!rivalry?.definition || !rivalry?.contender) {
        return null;
      }
      const usedIds = new Set([rivalry.champion?.id, rivalry.contender?.id].filter(Boolean));
      const divisionCandidates = getDivisionMemberIds(rivalry.division)
        .map(findWrestlerById)
        .filter((wrestler) => wrestler && !usedIds.has(wrestler.id) && isWrestlerGenderEligibleForDivision(wrestler, rivalry.definition));
      const rosterCandidates = getAvailableCardRoster()
        .filter((wrestler) => wrestler && !usedIds.has(wrestler.id) && isWrestlerGenderEligibleForDivision(wrestler, rivalry.definition));
      return [...divisionCandidates, ...rosterCandidates]
        .sort((left, right) => Math.abs(getWrestlerPower(left) - getWrestlerPower(rivalry.contender)) - Math.abs(getWrestlerPower(right) - getWrestlerPower(rivalry.contender)))[0] || rivalry.champion || null;
    }

    function getGeneratedShowSegments() {
      const rivalries = getDivisionRivalries();
      const segments = [];
      const ppvInfo = getPpvInfo();
      const isPpv = Boolean(ppvInfo.isPpv);
      const prioritized = isPpv
        ? rivalries.filter((rivalry) => rivalry.ppvMatchConfirmed || rivalry.heat >= 70 || rivalry.vacantTitle)
        : rivalries;
      consumeStoryHooksForShow(prioritized).forEach((entry) => segments.push(createSegmentFromHook(entry, segments.length + 1)));
      prioritized.slice(0, isPpv ? 5 : 4).forEach((rivalry) => {
        if (segments.some((segment) => segment.rivalry === rivalry && segment.fromHookId)) {
          return;
        }
        const blueprint = getPhaseSegmentBlueprint(rivalry, isPpv);
        const interferenceOpponent = blueprint.type === "interference" ? selectInterferenceMatchOpponent(rivalry) : null;
        const title = `${rivalry.definition.title} ${blueprint.titleSuffix}`;
        const description = blueprint.ppvResolution
          ? `${rivalry.champion.name}와 ${rivalry.contender.name}가 PPV에서 결착전을 치릅니다.`
          : blueprint.titleDecider
            ? `${rivalry.champion.name} vs ${rivalry.contender.name}. 승자가 새 챔피언이 됩니다.`
            : blueprint.type === "contract_signing"
              ? `${rivalry.champion.name}와 ${rivalry.contender.name}의 PPV 계약식입니다.`
              : blueprint.type === "interference"
                ? `${rivalry.contender.name} 경기 중 ${rivalry.champion.name}의 난입 가능성이 큽니다.`
                : blueprint.type === "backstage"
                  ? `${rivalry.champion.name}와 ${rivalry.contender.name}가 백스테이지에서 충돌합니다.`
                  : blueprint.type === "match"
                    ? `${rivalry.contender.name} vs ${rivalry.champion.name} 논타이틀 경기입니다.`
                    : `${rivalry.champion.name}가 ${rivalry.contender.name}를 향해 마이크를 잡습니다.`;
        segments.push({
          id: `seg_${blueprint.type}_${rivalry.id}`,
          order: segments.length + 1,
          type: blueprint.type,
          label: blueprint.label,
          title,
          description,
          rivalry,
          participants: blueprint.type === "interference" && interferenceOpponent
            ? [rivalry.contender.id, interferenceOpponent.id]
            : [rivalry.champion.id, rivalry.contender.id],
          interfererId: blueprint.type === "interference" ? rivalry.champion.id : "",
          targetId: blueprint.type === "interference" ? rivalry.contender.id : "",
          hidden: blueprint.hidden,
          matchType: blueprint.matchType,
          titleDecider: Boolean(blueprint.titleDecider),
          ppvResolution: Boolean(blueprint.ppvResolution),
          ppvLock: Boolean(blueprint.ppvLock),
          expectedHeatChange: blueprint.heatChange,
          reaction: clamp(rivalry.heat + 4 + getFreshnessPenalty(rivalry.freshness), 25, 100)
        });
      });
      const tagRivalry = rivalries.find((rivalry) => rivalry.definition.key === "tag");
      if (tagRivalry && !segments.some((segment) => segment.rivalry === tagRivalry)) {
        segments.push({
          id: `seg_tag_${tagRivalry.id}`,
          order: segments.length + 1,
          type: "interview",
          label: "인터뷰",
          title: "태그팀 디비전 인터뷰 또는 난입",
          description: `${tagRivalry.champion.name} 인터뷰 중 ${tagRivalry.contender.name} 측이 신경전을 겁니다.`,
          rivalry: tagRivalry,
          participants: [tagRivalry.champion.id, tagRivalry.contender.id],
          hidden: true,
          matchType: "promo_only",
          expectedHeatChange: 6,
          reaction: clamp(tagRivalry.heat - 2, 30, 98)
        });
      }
      const hottest = prioritized[0];
      const interferenceRivalry = !isPpv && (rivalries.find((rivalry) => rivalry.heat >= 60 && rivalry.phaseWeek >= 3 && rivalry !== hottest) || null);
      if (interferenceRivalry && interferenceRivalry.heat >= 60) {
        const interferenceOpponent = selectInterferenceMatchOpponent(interferenceRivalry);
        segments.push({
          id: `seg_interference_${interferenceRivalry.id}`,
          order: segments.length + 1,
          type: "interference",
          label: "난입",
          title: `${interferenceRivalry.contender.name} 경기 중 ${interferenceRivalry.champion.name} 난입`,
          description: `경기 막판, ${interferenceRivalry.champion.name}가 나타나 ${interferenceRivalry.contender.name}를 방해합니다.`,
          rivalry: interferenceRivalry,
          participants: interferenceOpponent
            ? [interferenceRivalry.contender.id, interferenceOpponent.id]
            : [interferenceRivalry.champion.id, interferenceRivalry.contender.id],
          interfererId: interferenceRivalry.champion.id,
          targetId: interferenceRivalry.contender.id,
          hidden: true,
          matchType: "non_title",
          expectedHeatChange: 14,
          reaction: clamp(interferenceRivalry.heat + 8, 45, 100)
        });
      }
      if (!isPpv && hottest && !segments.some((segment) => segment.type === "main_event")) {
        const mainIsTitleMatch = Boolean(hottest.vacantTitle || isPpv);
        segments.push({
          id: `seg_main_${hottest.id}`,
          order: segments.length + 1,
          type: "main_event",
          label: "메인 이벤트",
          title: hottest.vacantTitle ? `${hottest.definition.title} 챔피언 결정전` : `${hottest.definition.title} 라이벌 ${isPpv ? "타이틀 매치" : "논타이틀 매치"}`,
          description: hottest.vacantTitle
            ? `${hottest.champion.name}와 ${hottest.contender.name}가 공석 타이틀을 두고 맞붙습니다.`
            : isPpv
            ? `${hottest.champion.name}와 ${hottest.contender.name}가 PPV에서 타이틀 결착전을 치릅니다.`
            : `${hottest.champion.name}와 ${hottest.contender.name}가 RAW 메인 이벤트 논타이틀 매치로 맞붙습니다.`,
          rivalry: hottest,
          participants: [hottest.champion.id, hottest.contender.id],
          hidden: false,
          matchType: mainIsTitleMatch ? "singles" : "non_title",
          titleDecider: Boolean(hottest.vacantTitle),
          expectedHeatChange: hottest.vacantTitle ? 12 : isPpv ? -18 : 7,
          reaction: clamp(hottest.heat + 6, 30, 100)
        });
      }
      if (segments.length <= 5) {
        return segments;
      }
      const mainSegment = segments.find((segment) => segment.type === "main_event") || segments[segments.length - 1];
      const interferenceSegment = segments.find((segment) => segment.type === "interference");
      const core = segments.filter((segment) => segment !== mainSegment && segment !== interferenceSegment).slice(0, interferenceSegment ? 3 : 4);
      return [...core, ...(interferenceSegment ? [interferenceSegment] : []), mainSegment].slice(0, 5);
    }

    function getFallbackShowSegmentsFromWeeklyCard() {
      const slots = Array.isArray(gameState.weeklyCard) ? gameState.weeklyCard : [];
      return slots
        .filter((slot) => slot?.wrestlerAId && slot?.wrestlerBId)
        .slice(0, 5)
        .map((slot, index) => {
          const left = findWrestlerById(slot.wrestlerAId);
          const right = findWrestlerById(slot.wrestlerBId);
          const definition = getDivisionDefinition(slot.divisionKey || "world");
          const isMain = index === 0 || slot.segmentType === "main_event";
          return {
            id: `fallback_segment_${gameState.week}_${index}`,
            order: index + 1,
            type: isMain ? "main_event" : "match",
            label: isMain ? "메인 이벤트" : "논타이틀 매치",
            title: slot.titleMatch ? `${definition.title} 챔피언 결정전` : `${definition.title} 라이벌 매치`,
            description: `${left?.name || "TBA"} vs ${right?.name || "TBA"} 자동 편성 경기입니다.`,
            rivalry: null,
            participants: [slot.wrestlerAId, slot.wrestlerBId],
            hidden: false,
            matchType: slot.titleMatch ? "singles" : "non_title",
            titleDecider: Boolean(slot.titleMatch),
            expectedHeatChange: slot.titleMatch ? 12 : 6,
            reaction: clamp(((left ? getWrestlerPower(left) : 45) + (right ? getWrestlerPower(right) : 45)) / 2 + 8, 35, 95)
          };
        });
    }

    function getHeatCellsHtml(heat) {
      const filled = Math.round((clamp(heat, 0, 100) / 100) * 12);
      return Array.from({ length: 12 }, (_, index) => `<span class="division-heat-cell ${index < filled ? "filled" : ""}"></span>`).join("");
    }

    function getDivisionChampionDisplayHtml(definition) {
      const booking = ensureDivisionBookingState();
      const division = booking.divisions[definition.key];
      const champion = findWrestlerById(getDivisionChampionId(definition, division));
      if (!champion) {
        return `
          <div class="division-champion-summary">
            ${getDivisionTitleImageHtml(definition)}
            <div class="division-champion-vacant">챔피언 공석<br>쇼 시작 시 결정전</div>
          </div>
        `;
      }
      return `
        <div class="division-champion-summary">
          ${getDivisionTitleImageHtml(definition)}
          <div class="division-champion-person">
            <div class="division-portrait" style="${getWrestlerCardPortraitStyle(champion, "")}"></div>
            <div>
              <div class="division-wrestler-name">${escapeHtml(champion.name)}</div>
              <div class="division-wrestler-meta">챔피언</div>
            </div>
          </div>
        </div>
      `;
    }

    function getDivisionTitleImageHtml(definition, extraClass = "") {
      if (!definition?.titleImage) {
        return "";
      }
      return `<img class="division-title-belt ${extraClass}" src="${TITLE_IMAGE_BASE_PATH}${definition.titleImage}" alt="${escapeHtml(definition.title)}">`;
    }

    function getDivisionSlotHtml(definition, index = 0) {
      const booking = ensureDivisionBookingState();
      const division = booking.divisions[definition.key];
      const slotIndex = Math.max(0, Math.min(DIVISION_MEMBER_SLOT_COUNT - 1, Math.floor(Number(index) || 0)));
      const wrestlerId = slotIndex === 0 ? division.contenderId : division.lineupIds[slotIndex - 1] || "";
      const label = `디비전 슬롯 ${slotIndex + 1}`;
      const targetAttrs = `data-division-key="${definition.key}" data-role="member" data-index="${slotIndex}"`;
      const wrestler = findWrestlerById(wrestlerId);
      const tagPairClass = definition.key === "tag" ? (Math.floor(slotIndex / 2) % 2 === 0 ? "tag-pair-a" : "tag-pair-b") : "";
      const teamText = definition.key === "tag" ? `팀 ${Math.floor(slotIndex / 2) + 1} · ${slotIndex % 2 === 0 ? "A" : "B"}` : "";
      const inlineDropAttrs = "";
      if (!wrestler) {
        return `<button class="division-slot member empty dropzone ${tagPairClass}" ${targetAttrs} ${inlineDropAttrs} data-action="select-division-slot" title="${escapeHtml(definition.key === "tag" ? teamText : label)}"><span>+</span></button>`;
      }
      return `
        <article class="division-slot member dropzone ${tagPairClass}" ${targetAttrs} ${inlineDropAttrs} draggable="true" data-division-drag-wrestler="${escapeHtml(wrestler.id)}" data-wrestler-id="${escapeHtml(wrestler.id)}" title="${escapeHtml(wrestler.name)} · ${escapeHtml(wrestler.grade)} · OVR ${Math.round(getDivisionAutoScore(wrestler))}">
          <div class="division-slot-row">
            <div class="division-slot-label">${escapeHtml(wrestler.name)}</div>
            <button class="slot-remove" data-action="clear-division-slot" ${targetAttrs}>X</button>
          </div>
          <div class="division-wrestler">
            <div class="division-portrait" style="${getWrestlerCardPortraitStyle(wrestler, "")}"></div>
            <div>
              <div class="division-wrestler-name">${escapeHtml(wrestler.name)}</div>
              <div class="division-wrestler-meta">${wrestler.grade} · OVR ${Math.round(getDivisionAutoScore(wrestler))}</div>
              ${teamText ? `<div class="division-pair-tag">${teamText}</div>` : ""}
            </div>
          </div>
        </article>
      `;
    }

    function getTagTeamPairSlotHtml(definition, pairIndex = 0) {
      const firstIndex = pairIndex * 2;
      return `
        <div class="tag-team-pair">
          <div class="tag-team-pair-label">TEAM ${pairIndex + 1}</div>
          <div class="tag-team-pair-slots">
            ${getDivisionSlotHtml(definition, firstIndex)}
            ${getDivisionSlotHtml(definition, firstIndex + 1)}
          </div>
        </div>
      `;
    }

    function getDivisionCardHtml(definition) {
      const booking = ensureDivisionBookingState();
      const division = booking.divisions[definition.key];
      const heat = getDivisionHeat(definition, division);
      const championId = getDivisionChampionId(definition, division);
      const cooldownNotes = getDivisionMemberIds(division)
        .filter((id) => championId && id !== championId)
        .map((id) => {
          const until = getDivisionCooldownUntil(championId, id);
          const weeksLeft = Math.max(0, until - gameState.week);
          const wrestler = findWrestlerById(id);
          return weeksLeft > 0 && wrestler ? `${wrestler.name}: 재대립 제한 ${weeksLeft}주` : "";
        })
        .filter(Boolean)
        .slice(0, 2);
      return `
        <section class="division-card ${definition.key}" data-division-card="${definition.key}" data-division-key="${definition.key}">
          <div class="division-card-header">
            <div class="division-title-wrap compact">
              <div>
                <div class="division-title">${escapeHtml(definition.title)}</div>
                <div class="division-subtitle">${escapeHtml(definition.subtitle)} · 최대 ${DIVISION_MEMBER_SLOT_COUNT}명</div>
              </div>
            </div>
            ${getDivisionChampionDisplayHtml(definition)}
          </div>
          ${definition.key === "tag"
            ? `<div class="tag-team-lineup">${Array.from({ length: DIVISION_MEMBER_SLOT_COUNT / 2 }, (_, pairIndex) => getTagTeamPairSlotHtml(definition, pairIndex)).join("")}</div>`
            : `<div class="division-lineup">${Array.from({ length: DIVISION_MEMBER_SLOT_COUNT }, (_, slotIndex) => getDivisionSlotHtml(definition, slotIndex)).join("")}</div>`}
          ${cooldownNotes.length ? `<div class="gm-objective-sub" style="margin-top:10px;color:#f7c948;"><strong>재대립 제한</strong><br>${cooldownNotes.map(escapeHtml).join("<br>")}</div>` : ""}
        </section>
      `;
    }

      { key: "assignment", label: "디비전 배정" },
      { key: "rivalries", label: "라이벌리 현황" },
      { key: "card", label: "자동 쇼 카드" },
      { key: "opening", label: "쇼 진행" },
      { key: "result", label: "쇼 결과" }
    ];

      `;

            <div class="rivalry-visual-vs">VS</div>

              <div class="division-wrestler-meta">${rivalry.vacantTitle ? "결정전 후보" : "도전자"} · PWR ${Math.round(getWrestlerPower(rivalry.contender))}</div>

          <div class="rivalry-visual-summary">
            <span>${escapeHtml(rivalry.definition.title)}</span>
            <span>열기 ${rivalry.heat}%</span>

          <div class="gm-tag-row" style="margin-top:8px;">

                <div style="flex:1;min-width:0;">

              RAW 일반 타이틀 매치 금지<br>
              공석 챔피언 결정전 자동 허용<br>
              논타이틀/프로모/난입 중심<br>
              같은 대립의 직접 경기 반복 억제<br>
              PPV에서 4주 대립 결착

          </aside>
        </div>
      `;

    function getShowMatchups(segments) {
      return (segments || []).filter((segment) => ["match", "main_event", "interference"].includes(segment.type));
    }

    function renderShowOpeningMainContent() {
      const booking = ensureDivisionBookingState();
      const showState = booking.showState;
      if (!showState?.segments?.length) {
        booking.activePage = "card";
        renderAutoShowCardMainContent();
        return;
      }
      const matchups = getShowMatchups(showState.segments).filter((segment) => !segment.hidden || segment.type !== "interference");
      mainDynamicContentEl.innerHTML = `
        ${getDivisionTabsHtml(booking.activePage)}
        <section class="show-opening-hero">
          <div>
            <div class="gm-match-kicker">${showState.isPpv ? "PREMIUM LIVE EVENT" : "MONDAY NIGHT"}</div>
            <div class="raw-show-logo">${showState.isPpv ? "RING DYNASTY PPV" : "RAW"}</div>
            <div class="gm-objective-sub">WEEK ${gameState.week} · LIVE FROM SEOUL, KOREA</div>
          </div>
          <div>
            <div class="gm-panel-title">TODAY'S MATCHUPS</div>
            <div class="show-matchup-strip">
              ${matchups.map((segment, index) => {
                const left = findWrestlerById(segment.participants?.[0]);
                const right = findWrestlerById(segment.participants?.[1]);
                return `<div class="show-matchup-card">
                  <div class="gm-match-kicker">${segment.type === "main_event" ? "MAIN EVENT" : `MATCH ${index + 1}`}</div>
                  ${segment.rivalry?.definition ? getDivisionTitleImageHtml(segment.rivalry.definition, "mini") : ""}
                  <div class="division-wrestler-name">${escapeHtml(left?.name || "TBA")} vs ${escapeHtml(right?.name || "TBA")}</div>
                  <div class="division-wrestler-meta">${escapeHtml(segment.titleDecider ? "CHAMPIONSHIP DECIDER" : segment.matchType === "non_title" ? "NON-TITLE" : segment.matchType || "MATCH")}</div>
                </div>`;
              }).join("") || '<div class="gm-empty-note">확정 매치업이 없습니다.</div>'}
            </div>
          </div>
        </section>
        <div class="gm-start-row">
          <button class="gm-start-button" data-action="advance-show-segment">첫 세그먼트 진행</button>
        </div>
      `;
    }

    function getCurrentShowSegment() {
      const booking = ensureDivisionBookingState();
      const showState = booking.showState;
      if (!showState?.segments?.length) {
        return null;
      }
      return showState.segments[clamp(Number(showState.currentIndex || 0), 0, showState.segments.length - 1)] || null;
    }

    function getSegmentDisplayEntities(segment) {
      const left = findWrestlerById(segment?.participants?.[0]);
      const right = findWrestlerById(segment?.participants?.[1]);
      const runIn = segment?.interfererId ? findWrestlerById(segment.interfererId) : null;
      return { left, right, runIn };
    }

    function escapeRegExp(text = "") {
      return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function isPlayableMatchSegment(segment) {
      return Boolean(segment && ["match", "main_event", "interference"].includes(segment.type));
    }

    function getBattleEventHpPercent(state) {
      if (!state || !Number.isFinite(state.maxHP) || state.maxHP <= 0) {
        return 100;
      }
      return clamp(Math.round((Number(state.currentHP || 0) / state.maxHP) * 100), 0, 100);
    }

    function getSegmentBattleEventSummary(event) {
      if (!event) {
        return null;
      }
      return {
        type: event.type || "hit",
        actionText: event.actionText || "",
        resultText: event.resultText || "",
        attackerId: event.attackerId || "",
        defenderId: event.defenderId || "",
        leftHp: getBattleEventHpPercent(event.afterLeft),
        rightHp: getBattleEventHpPercent(event.afterRight)
      };
    }

    function getSegmentBattleTimeline(battlePackage) {
      const events = Array.isArray(battlePackage?.battleEvents) ? battlePackage.battleEvents : [];
      const important = events.filter((event) => ["interference", "finisher", "pin", "submission", "time-limit"].includes(event.type));
      const selected = [...events.slice(0, 1), ...important.slice(-3), ...events.slice(-2)];
      const seen = new Set();
      return selected
        .filter(Boolean)
        .filter((event) => {
          const key = `${event.turn}:${event.type}:${event.actionText}:${event.resultText}`;
          if (seen.has(key)) {
            return false;
          }
          seen.add(key);
          return true;
        })
        .map(getSegmentBattleEventSummary)
        .filter(Boolean)
        .slice(-5);
    }

    function runDivisionSegmentBattle(left, right, segment) {
      if (!left || !right) {
        return null;
      }
      const battlePackage = createBattlePackage(left, right, {
        matchType: segment?.titleDecider || segment?.ppvResolution ? "TITLE_MATCH" : "",
        startingHype: segment?.reaction || gameState.hype
      });
      let safety = 0;
      while (!battlePackage.battleResult && safety < 80) {
        safety += 1;
        const resolution = resolveBattleTurn(battlePackage);
        if (resolution.needsPlayerInput) {
          resolveBattleTurn(battlePackage, chooseMove(battlePackage.leftState, battlePackage.rightState));
        }
        if (!battlePackage.battleResult && battlePackage.turn >= 3 && !battlePackage.interferenceChecked) {
          if (segment?.type === "interference" && segment.interfererId && segment.targetId) {
            battlePackage.interferenceChecked = true;
            applyBattleInterference(battlePackage, {
              rivalryId: segment.rivalry?.existingRivalry?.id || segment.rivalry?.id || "",
              rivalryKey: segment.rivalry ? getRivalryKey(segment.rivalry.champion.id, segment.rivalry.contender.id) : "",
              targetId: segment.targetId,
              interfererId: segment.interfererId,
              type: Number(segment.rivalry?.heat || 0) >= 82 ? "forced_loss" : "dq"
            });
          } else {
            const interference = checkBattleInterferenceOpportunity(battlePackage, gameState.rivalries || []);
            if (interference) {
              applyBattleInterference(battlePackage, interference);
            }
          }
        }
      }
      if (!battlePackage.battleResult) {
        finalizeBattlePackage(battlePackage);
      }
      return battlePackage;
    }

    function prepareSegmentPresentation(segment) {
      if (!isPlayableMatchSegment(segment) || segment.battlePreview) {
        return segment?.battlePreview || null;
      }
      const { left, right } = getSegmentDisplayEntities(segment);
      const battlePackage = runDivisionSegmentBattle(left, right, segment);
      if (!battlePackage?.battleResult) {
        return null;
      }
      segment.battlePreview = {
        winnerId: battlePackage.battleResult.winnerId || "",
        loserId: battlePackage.battleResult.loserId || "",
        finishType: battlePackage.battleResult.finishType || "PINFALL",
        hypeGenerated: Number(battlePackage.battleResult.hypeGenerated || 0),
        highlight: battlePackage.battleResult.highlight || "",
        interference: battlePackage.interference || battlePackage.battleResult.interference || null,
        events: getSegmentBattleTimeline(battlePackage)
      };
      return segment.battlePreview;
    }

    function getSegmentDialogue(segment) {
      const { left, right, runIn } = getSegmentDisplayEntities(segment);
      const battlePreview = prepareSegmentPresentation(segment);
      if (!segment || !left) {
        return "오늘 밤의 쇼가 준비 중입니다.";
      }
      if (segment.type === "interference") {
        const target = findWrestlerById(segment.targetId) || left;
        return `SYSTEM: 경기 막판, 관중석이 술렁입니다. ${runIn?.name || "라이벌"}가 난입해 ${target.name}의 흐름을 끊었습니다! ${battlePreview?.finishType ? `피니시: ${battlePreview.finishType}` : ""}`;
      }
      if (segment.type === "backstage") {
        return `SYSTEM: 백스테이지에서 고성이 들려옵니다. ${left.name}와 ${right?.name || "상대"}의 감정이 폭발했습니다.`;
      }
      if (segment.type === "contract_signing") {
        return `SYSTEM: 계약서가 테이블 위에 올라왔습니다. ${left.name}와 ${right?.name || "상대"}의 PPV 결착전이 공식화됩니다.`;
      }
      if (segment.type === "opening_promo") {
        if (segment.rivalry?.vacantTitle) {
          return `SYSTEM: ${segment.rivalry.definition.title} 챔피언이 공석입니다. ${left.name}와 ${right?.name || "상대"}가 오늘 밤 새 챔피언을 가립니다.`;
        }
        return `${left.name}: 오늘 밤 이 쇼의 주인은 나다. ${right?.name || "너"}는 내 앞에서 증명해야 할 게 많아.`;
      }
      if (segment.type === "match" || segment.type === "main_event") {
        const winner = findWrestlerById(battlePreview?.winnerId);
        if (segment.titleDecider) {
          return `SYSTEM: 공석 챔피언십 결정전입니다. ${left.name}와 ${right?.name || "상대"} 중 승자가 새 챔피언이 됩니다. ${winner ? `예상 피니시: ${winner.name} 승리` : ""}`;
        }
        return `SYSTEM: ${segment.type === "main_event" ? "오늘 밤의 메인 이벤트" : "경기"}입니다. ${left.name}와 ${right?.name || "상대"}가 ${segment.matchType === "non_title" ? "논타이틀 매치" : "결착전"}로 충돌합니다. ${winner ? `시뮬레이션 피니시: ${winner.name} 승리` : ""}`;
      }
      return `${left.name}와 ${right?.name || "상대"}의 대립이 다음 단계로 넘어갑니다.`;
    }

    function getSegmentSceneMeta(segment) {
      const type = segment?.type || "match";
      if (segment?.ppvResolution) {
        return { sceneClass: "scene-ppv", banner: "PPV", alert: false };
      }
      if (segment?.titleDecider) {
        return { sceneClass: "scene-title", banner: "TITLE DECIDER", alert: false };
      }
      if (type === "interference") {
        return { sceneClass: "scene-interference", banner: "INTERFERENCE", alert: true };
      }
      if (type === "backstage") {
        return { sceneClass: "scene-backstage", banner: "BACKSTAGE", alert: true };
      }
      if (type === "interview") {
        return { sceneClass: "scene-interview", banner: "INTERVIEW", alert: false };
      }
      if (type === "contract_signing") {
        return { sceneClass: "scene-contract", banner: "CONTRACT SIGNING", alert: true };
      }
      if (type === "opening_promo" || type === "callout") {
        return { sceneClass: "scene-ring", banner: type === "callout" ? "CALL OUT" : "PROMO", alert: false };
      }
      if (type === "main_event") {
        return { sceneClass: "scene-match", banner: "MAIN EVENT", alert: false };
      }
      return { sceneClass: "scene-match", banner: "MATCH IN PROGRESS", alert: false };
    }

    function getSegmentWrestlerSpriteHtml(wrestler, side = "left", segment = null) {
      if (!wrestler) {
        return `
          <div class="segment-performer ${side}">
            <div class="segment-sprite" style="background:rgba(255,255,255,0.04);"></div>
            <div class="segment-nameplate">
              <div class="division-wrestler-name">TBA</div>
              <div class="division-wrestler-meta">대기 중</div>
            </div>
          </div>
        `;
      }
      const stats = getGmStats(wrestler);
      const hp = clamp(100 - getFatiguePercent(wrestler), 20, 100);
      const typeMeta = getGmArchetypeMeta(wrestler);
      const showAlert = side === "right" && ["interference", "backstage", "contract_signing"].includes(segment?.type);
      return `
        <div class="segment-performer ${side}">
          <div class="segment-status-bubble ${showAlert ? "" : "hidden"}">!</div>
          <div class="segment-sprite" style="${getWrestlerCardPortraitStyle(wrestler, "")}"></div>
          <div class="segment-nameplate">
            <div class="division-wrestler-name">${escapeHtml(wrestler.name)}</div>

            <div class="segment-hp-bar"><div class="segment-hp-fill" style="width:${hp}%;"></div></div>
          </div>
        </div>

    function getSegmentEffectCellsHtml(value) {
      const filled = Math.round((clamp(value, 0, 100) / 100) * 12);
      return Array.from({ length: 12 }, (_, index) => `<span class="segment-effect-cell ${index < filled ? "filled" : ""}"></span>`).join("");
    }

    function getSegmentRunInHtml(segment) {
      const runIn = segment?.interfererId ? findWrestlerById(segment.interfererId) : null;
      if (!runIn) {
        return "";
      }
      return `
        <div class="segment-run-in">
          <div class="segment-sprite" style="${getWrestlerCardPortraitStyle(runIn, "")}"></div>
          <div class="segment-run-in-label">RUN-IN · ${escapeHtml(runIn.name)}</div>
        </div>
      `;
    }

    function getSegmentBattleLogHtml(segment) {
      const preview = prepareSegmentPresentation(segment);
      const events = Array.isArray(preview?.events) ? preview.events : [];
      if (!events.length) {
        return "";
      }
      return `
        <div class="segment-battle-log">
          ${events.slice(-4).map((event) => `
            <div class="segment-battle-log-line ${event.type === "interference" ? "interference" : ""}">
              ${escapeHtml(event.actionText || "경기 진행")} ${event.resultText ? `· ${escapeHtml(event.resultText)}` : ""}
            </div>
          `).join("")}
        </div>
      `;
    }

    function getSegmentDialogueSpeakerClass(segment) {
      if (!segment || /^SYSTEM:/i.test(getSegmentDialogue(segment))) {
        return "speaker-system";
      }
      return "speaker-left";
    }

    function shouldOfferGmChoice(segment) {
      const booking = ensureDivisionBookingState();
      const used = Number(booking.showState?.choiceCount || 0);
      return used < 2 && segment?.rivalry?.heat >= 75 && ["opening_promo", "interference", "backstage"].includes(segment.type);
    }

    function renderShowSegmentMainContent() {
      const booking = ensureDivisionBookingState();
      window.__divisionRuntimeActivePage = "segment";
      booking.activePage = "segment";
      const showState = booking.showState;
      const segment = getCurrentShowSegment();
      if (!showState || !segment) {
        booking.activePage = "card";
        renderAutoShowCardMainContent();
        return;

      const left = findWrestlerById(segment.participants?.[0]);
      const right = findWrestlerById(segment.participants?.[1]);
      const offerChoice = shouldOfferGmChoice(segment);
      const sceneMeta = getSegmentSceneMeta(segment);
      const dialogue = getSegmentDialogue(segment);
      const speakerClass = getSegmentDialogueSpeakerClass(segment);
      mainDynamicContentEl.innerHTML = `
        ${getDivisionTabsHtml(booking.activePage)}
        <div class="show-flow-layout">
          <section class="segment-stage ${sceneMeta.sceneClass}">
            <div class="segment-scene">
              <div class="segment-scene-header">
                <div class="segment-scene-titlebar">
                  <div class="segment-banner ${escapeHtml(segment.type || "")}">${escapeHtml(sceneMeta.banner)}</div>
                  <div class="segment-title-line">${escapeHtml(segment.title)}</div>
                </div>
                <div class="segment-scene-belt">
                  ${segment.rivalry?.definition ? getDivisionTitleImageHtml(segment.rivalry.definition) : segment.titleDecider ? getDivisionTitleImageHtml(getDivisionDefinition(segment.divisionKey || "world")) : ""}
                </div>
              </div>
              <div class="segment-performers">
                ${getSegmentWrestlerSpriteHtml(left, "left", segment)}
                <div class="segment-vs-stack">
                  <div class="segment-mini-ring"></div>
                  <div class="gm-vs-text">VS</div>
                </div>
                ${getSegmentWrestlerSpriteHtml(right, "right", segment)}
                ${getSegmentRunInHtml(segment)}
              </div>
              <div>
                <div class="segment-dialogue ${speakerClass}"><strong>${/^SYSTEM:/i.test(dialogue) ? "SYSTEM" : escapeHtml(left?.name || "PROMO")}:</strong> ${escapeHtml(dialogue.replace(/^SYSTEM:\s*/i, "").replace(new RegExp(`^${escapeRegExp(left?.name || "")}:\\s*`, "i"), ""))}</div>

    function removeWrestlerFromDivisionBooking(wrestlerId) {
      if (!wrestlerId) {
        return;
      }
      const booking = ensureDivisionBookingState();
      Object.values(booking.divisions).forEach((division) => {
        if (division.contenderId === wrestlerId) {
          division.contenderId = "";
        }
        division.lineupIds = (division.lineupIds || []).map((id) => id === wrestlerId ? "" : id).slice(0, DIVISION_LINEUP_SLOT_COUNT);
        while (division.lineupIds.length < DIVISION_LINEUP_SLOT_COUNT) {
          division.lineupIds.push("");
        }
      });
    }

    function assignWrestlerToDivisionSlot(wrestlerId, divisionKey, role, index = -1, options = {}) {
      const booking = ensureDivisionBookingState();
      const definition = getDivisionDefinition(divisionKey);
      const division = booking.divisions[definition.key];
      const wrestler = findWrestlerById(wrestlerId);
      if (!division || !wrestler || !isWrestlerEligibleForDivision(wrestler, definition)) {
        if (!options.silent) {
          showToast("이 디비전에 배정할 수 없는 선수입니다.", "info");
        }
        return false;
      }
      removeWrestlerFromDivisionBooking(wrestlerId);
      const currentBooking = ensureDivisionBookingState();
      const currentDivision = currentBooking.divisions[definition.key];
      if (!currentDivision) {
        return false;
      }
      if (role === "contender" || (role === "member" && Number(index) === 0)) {
        currentDivision.contenderId = wrestlerId;
      } else {
        const openIndex = (currentDivision.lineupIds || []).findIndex((id) => !id);
        const slotIndex = role === "member" && Number.isFinite(index) && index > 0 ? Math.min(DIVISION_LINEUP_SLOT_COUNT - 1, Math.floor(index) - 1) : openIndex;
        currentDivision.lineupIds[slotIndex >= 0 ? slotIndex : 0] = wrestlerId;
      }
      booking.selectedTarget = null;
      renderActiveTab();
      return true;
    }

    function assignDivisionRosterPick(wrestlerId) {
      const wrestler = findWrestlerById(wrestlerId);

        showToast("열려 있는 디비전 슬롯이 없습니다.", "info");
        return false;

      return assignWrestlerToDivisionSlot(wrestlerId, target.divisionKey, target.role, Number(target.index));

    function clearDivisionSlot(divisionKey, role, index = -1) {

    function resetDivisionBooking() {
