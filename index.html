    function renderHomeSidePanel() {
      const contractSummary = getContractAlertSummary(2, 3);
      const claimable = getClaimableMissionCount();
      const netProfit = pendingWeeklySummary
        ? formatNumber((pendingWeeklySummary.totalIncome || 0) - (pendingWeeklySummary.salaryTotal || 0))
        : null;
      sideListEl.innerHTML = `
        <div class="hype-panel">
          <div class="side-card home-side-list-card">
            <div class="side-card-title">지금 해야 할 일</div>
            <div class="home-mini-list">
              <div class="home-mini-item">
                <div>
                  <div class="home-mini-name">보상 수령</div>
                  <div class="home-mini-meta">미션 탭에서 바로 정리</div>
                </div>
                <div class="home-mini-name">${claimable ? `${claimable}개` : "없음"}</div>
              </div>
              <div class="home-mini-item">
                <div>
                  <div class="home-mini-name">계약 임박</div>
                  <div class="home-mini-meta">${contractSummary.note}</div>
                </div>
                <div class="home-mini-name">${contractSummary.value}</div>
              </div>
              <div class="home-mini-item">
                <div>
                  <div class="home-mini-name">직전 결산</div>
                  <div class="home-mini-meta">${pendingWeeklySummary ? `순이익 ${netProfit}G` : "아직 결산 없음"}</div>
                </div>
                <div class="home-mini-name">${pendingWeeklySummary ? `${netProfit}G` : "대기"}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // 캔버스용 스프라이트 캐시를 가져온다.
    function getSpriteImage(path) {
      if (!path) {
        return null;
      }
      if (!spriteImageCache.has(path)) {
        const img = new Image();
        img.src = path;
        spriteImageCache.set(path, img);
      }
      return spriteImageCache.get(path);
    }

    function drawWrestlerSprite(ctx, x, y, img, frameIndex, totalFrames) {
      if (!img || !img.complete || !img.width || !img.height || !totalFrames) {
        return;
      }
      const frameWidth = img.width / totalFrames;
      ctx.drawImage(
        img,
        frameWidth * frameIndex,
        0,
        frameWidth,
        img.height,
        x - frameWidth / 2,
        y - img.height,
        frameWidth,
        img.height
      );
    }

    function drawWrestler(ctx, x, y, color, grade, frame, state, name) {
      const scale = 2;
      const jumpOffset = state === "victory" ? Math.abs(Math.sin(frame * 0.2)) * 10 : 0;
      const legOffset = state === "walk" || state === "attack" ? Math.sin(frame * 0.2) * 4 : 0;
      const bodyY = y - jumpOffset;

      ctx.save();
      if (state === "down") {
        ctx.translate(x, bodyY - 8);
        ctx.rotate(-Math.PI / 2);
        ctx.translate(-x, -(bodyY - 8));
      }

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, bodyY - 40, 12 * scale / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(x - 8, bodyY - 30, 16, 22);

      if (state === "attack" || state === "victory") {
        ctx.fillRect(x - 14, bodyY - 28, 6, 14);
        ctx.fillRect(x + 8, bodyY - 28, 16, 6);
      } else {
        ctx.fillRect(x - 14, bodyY - 28, 6, 14);
        ctx.fillRect(x + 8, bodyY - 28, 6, 14);
      }

      ctx.fillRect(x - 6, bodyY - 8, 5, 20 + legOffset);
      ctx.fillRect(x + 1, bodyY - 8, 5, 20 - legOffset);

      if (grade === "LEGEND" || grade === "S") {
        ctx.fillStyle = "#f1c40f";
        ctx.font = `${10 * scale / 2}px serif`;
        ctx.textAlign = "center";
        ctx.fillText(grade === "LEGEND" ? "♛" : "★", x, bodyY - 56);
      }
      ctx.restore();

      ctx.fillStyle = "#ecf0f1";
      ctx.font = '10px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText(name, x, y + 24);
    }

    function drawBattleStandPortrait(ctx, snapshot, x, y, img, frame, state) {
      if (!img || !img.complete || !img.width || !img.height) {
        return false;
      }
      const isAggressive = state === "attack" || state === "finisher";
      const jumpOffset = state === "victory" ? Math.abs(Math.sin(frame * 0.18)) * 12 : 0;
      const swayOffset = state === "walk" ? Math.sin(frame * 0.18) * 5 : 0;
      const lungeOffset = isAggressive ? 10 : 0;
      const baseX = x + swayOffset + lungeOffset;
      const baseY = y - jumpOffset;

      ctx.save();
      ctx.fillStyle = state === "down" ? "rgba(0,0,0,0.22)" : "rgba(0,0,0,0.34)";
      ctx.beginPath();
      ctx.ellipse(baseX, baseY + (state === "down" ? 8 : 6), state === "down" ? 48 : 34, state === "down" ? 12 : 9, 0, 0, Math.PI * 2);
      ctx.fill();

      if (state === "down") {
        ctx.translate(baseX, baseY - 10);
        ctx.rotate(-Math.PI / 2);
        drawImageFittedToFrame(ctx, img, -80, -46, 160, 92, {
          alignY: "bottom",
          inset: 4,
          zoom: 0.96
        });
        ctx.restore();
        return true;
      }

      drawImageFittedToFrame(ctx, img, baseX - 58, baseY - 164, 116, 164, {
        alignY: "bottom",
        inset: 4,
        zoom: isAggressive ? 1.02 : 1
      });
      ctx.restore();
      return true;
    }

    function drawBattleWrestler(ctx, snapshot, x, y, frame, state, flip = false) {
      const staminaRatio = snapshot.currentStamina / snapshot.maxStamina;
      const opacity = staminaRatio <= 0.3 ? 0.8 : 1;
      const shake = staminaRatio <= 0.1 ? Math.sin(frame * 0.55) * 2.5 : 0;
      const spriteImage = getSpriteImage(getResolvedStandSpriteSheet(snapshot));
      const battleSpriteImage = getSpriteImage(getBattleSpritePath(snapshot));
      const totalBattleFrames = snapshot.battleSpriteFrames || 12;
      const useStandPortrait = isCustomStandSprite(snapshot) && spriteImage && spriteImage.complete && spriteImage.width && spriteImage.height;

      ctx.save();
      ctx.globalAlpha = opacity;
      if (flip) {
        ctx.translate(x, 0);
        ctx.scale(-1, 1);
        x = 0;
      }

      if (useStandPortrait) {
        drawBattleStandPortrait(
          ctx,
          snapshot,
          x + shake,
          y + 22,
          spriteImage,
          frame,
          state === "attack" && snapshot.finisherGauge >= 100 ? "finisher" : state
        );
      } else if (battleSpriteImage && battleSpriteImage.complete && battleSpriteImage.width && battleSpriteImage.height) {
        const stateForFrame = state === "attack" && snapshot.finisherGauge >= 100 ? "finisher" : state;
        const frameIndex = getBattleSpriteFrameIndex(frame, stateForFrame, totalBattleFrames);
        drawBattleSpriteFrame(ctx, x + shake, y, battleSpriteImage, frameIndex, totalBattleFrames);
        ctx.fillStyle = "#ecf0f1";
        ctx.font = '10px "Courier New"';
        ctx.textAlign = "center";
        ctx.fillText(snapshot.name, x + shake, y + 24);
      } else if (spriteImage && spriteImage.complete) {
        drawWrestlerVisual(ctx, snapshot, x + shake, y, frame, state);
      } else {
        drawWrestler(ctx, x + shake, y, snapshot.spriteColor, snapshot.grade, frame, state, snapshot.name);
      }
      ctx.restore();
    }

    function initCrowd() {
      if (crowdDots.length) {
        return;
      }
      const colors = ["#e74c3c", "#3498db", "#f1c40f", "#ecf0f1", "#2ecc71", "#9b59b6"];
      for (let index = 0; index < 300; index += 1) {
        crowdDots.push({
          x: 20 + (Math.random() * 520),
          y: 10 + (Math.random() * 110),
          color: colors[Math.floor(Math.random() * colors.length)],
          opacity: 0.2 + (Math.random() * 0.5),
          size: 1 + (Math.random() * 2)
        });
      }
    }

    function drawCrowd(ctx, hypeValue, frame = 0) {
      initCrowd();
      const brightness = 0.3 + (clamp(hypeValue, 0, 100) / 100) * 0.7;
      crowdDots.forEach((dot, index) => {
        const pulse = hypeValue >= 90 ? Math.sin((frame * 0.03) + index) * 0.08 : 0;
        ctx.globalAlpha = clamp((dot.opacity * brightness) + pulse, 0.08, 1);
        ctx.fillStyle = dot.color;
        ctx.fillRect(dot.x, dot.y, dot.size, dot.size);
      });
      ctx.globalAlpha = 1;
    }

    function drawHypeHeader(ctx, hypeValue) {
      ctx.fillStyle = "#222";
      ctx.fillRect(0, 0, 640, 4);
      ctx.fillStyle = hypeValue >= 70 ? "#f1c40f" : "#7f8c8d";
      ctx.fillRect(0, 0, 640 * (clamp(hypeValue, 0, 100) / 100), 4);
    }

    function drawCanvasImageCover(ctx, imagePath, alpha = 1) {
      const image = getSpriteImage(imagePath);
      if (!image || !image.complete || !image.width || !image.height) {
        return false;
      }
      const scale = Math.max(640 / image.width, 360 / image.height);
      const width = image.width * scale;
      const height = image.height * scale;
      const x = (640 - width) / 2;
      const y = (360 - height) / 2;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.drawImage(image, x, y, width, height);
      ctx.restore();
      return true;
    }

    function drawCanvasImageContain(ctx, imagePath, x, y, width, height, alpha = 1) {
      const image = getSpriteImage(imagePath);
      if (!image || !image.complete || !image.width || !image.height) {
        return false;
      }
      const scale = Math.min(width / image.width, height / image.height);
      const drawWidth = image.width * scale;
      const drawHeight = image.height * scale;
      const drawX = x + ((width - drawWidth) / 2);
      const drawY = y + ((height - drawHeight) / 2);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.drawImage(image, drawX, drawY, drawWidth, drawHeight);
      ctx.restore();
      return true;
    }

    function drawArenaBackground(ctx, stageValue, hypeValue = gameState.hype, frame = 0, matchMode = false) {
      ctx.clearRect(0, 0, 640, 560);
      ctx.fillStyle = "#05070b";
      ctx.fillRect(0, 0, 640, 560);

      ctx.save();
      ctx.scale(640 / 560, 360 / 320);

      ctx.fillStyle = "#0d0d12";
      ctx.fillRect(0, 0, 560, 320);

      const roofGradient = ctx.createLinearGradient(0, 0, 0, 150);
      roofGradient.addColorStop(0, "#181922");
      roofGradient.addColorStop(1, "#0d0d12");
      ctx.fillStyle = roofGradient;
      ctx.fillRect(0, 0, 560, 135);

      drawCrowd(ctx, hypeValue, frame);

      const standGradient = ctx.createLinearGradient(0, 60, 0, 130);
      standGradient.addColorStop(0, "rgba(13,13,18,0)");
      standGradient.addColorStop(1, "#0d0d12");
      ctx.fillStyle = standGradient;
      ctx.fillRect(0, 60, 560, 70);

      const spotlight = ctx.createRadialGradient(280, 0, 0, 280, 100, 200);
      spotlight.addColorStop(0, "rgba(255,255,220,0.12)");
      spotlight.addColorStop(1, "rgba(255,255,220,0)");
      ctx.fillStyle = spotlight;
      ctx.fillRect(0, 0, 560, 320);

      ctx.fillStyle = "#1a0f07";
      ctx.fillRect(40, 200, 480, 100);

      const apronGradient = ctx.createLinearGradient(40, 200, 40, 300);
      apronGradient.addColorStop(0, "#25140b");
      apronGradient.addColorStop(1, "#120907");
      ctx.fillStyle = apronGradient;
      ctx.fillRect(40, 200, 480, 100);

      ctx.fillStyle = "#2c1810";
      ctx.fillRect(80, 210, 400, 80);

      ctx.strokeStyle = "#e74c3c";
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(280, 250, 50, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;

      const ropeColors = ["#c0392b", "#e74c3c", "#c0392b"];
      ropeColors.forEach((color, index) => {
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(60, 185 + (index * 8));
        ctx.lineTo(500, 185 + (index * 8));
        ctx.stroke();
      });

      const posts = [[60, 170], [500, 170], [60, 210], [500, 210]];
      posts.forEach(([px, py]) => {
        ctx.fillStyle = "#bdc3c7";
        ctx.fillRect(px - 4, py, 8, 50);
      });

      const arenaNames = ["인디 체육관", "중소 아레나", "대형 스타디움", "PPV 글로벌 돔"];
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.font = 'bold 18px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText(arenaNames[stageValue - 1] || "인디 체육관", 280, 160);

      if (matchMode) {
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(0, 0, 560, 320);
      }

      ctx.restore();

      const lowerGradient = ctx.createLinearGradient(0, 360, 0, 560);
      lowerGradient.addColorStop(0, "rgba(5,7,11,0.1)");
      lowerGradient.addColorStop(1, "rgba(5,7,11,0.95)");
      ctx.fillStyle = lowerGradient;
      ctx.fillRect(0, 320, 640, 240);
    }

    function renderEmptyState(ctx, message, actionText) {
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.font = '48px serif';
      ctx.textAlign = "center";
      ctx.fillText("◎", 320, 220);

      ctx.fillStyle = "rgba(255,255,255,0.3)";
      ctx.font = '14px "Courier New"';
      ctx.fillText(message, 320, 260);

      ctx.fillStyle = "rgba(231,76,60,0.6)";
      ctx.font = '12px "Courier New"';
      ctx.fillText(`→ ${actionText}`, 320, 285);
    }

    function drawBattleArena(ctx, hypeValue, frame, matchMode = true) {
      drawArenaBackground(ctx, gameState.stage, hypeValue, frame, matchMode);
    }

    function drawTitleScreenCanvas(ctx, now) {
      ctx.clearRect(0, 0, 640, 560);
      ctx.fillStyle = "#0d0d0d";
      ctx.fillRect(0, 0, 640, 560);
      drawCanvasImageCover(ctx, GENERATED_UI_ASSETS.panels.title, 0.82);
      drawCanvasImageCover(ctx, getShowLogisticsPath(SHOW_LOGISTICS_ASSETS.title), 0.58);
      drawCanvasImageCover(ctx, getShowLogisticsPath(SHOW_LOGISTICS_ASSETS.titleAccent), 0.18);
      ctx.fillStyle = "rgba(6, 10, 18, 0.48)";
      ctx.fillRect(0, 0, 640, 360);
      ctx.strokeStyle = "rgba(231, 76, 60, 0.45)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(60, 170);
      ctx.lineTo(580, 170);
      ctx.moveTo(60, 192);
      ctx.lineTo(580, 192);
      ctx.stroke();

      for (let index = 0; index < 24; index += 1) {
        const x = 40 + (index * 25);
        const y = 40 + (Math.sin((now / 500) + index) * 8);
        ctx.fillStyle = index % 2 === 0 ? "rgba(241, 196, 15, 0.7)" : "rgba(236, 240, 241, 0.5)";
        ctx.fillRect(x, y, 3, 3);
      }

      drawCanvasImageContain(ctx, GENERATED_UI_ASSETS.logo, 100, 48, 440, 98, 1);
      ctx.fillStyle = "#ecf0f1";
      ctx.textAlign = "center";
      ctx.font = '14px "Courier New"';
      ctx.fillText("Build your promotion. Defend your legacy.", 320, 150);
    }

    function drawIdleHomeCanvas(ctx) {
      drawBattleArena(ctx, gameState.hype, performance.now() / 16, false);
      drawHypeHeader(ctx, gameState.hype);
      if (!getReadyMatches().length) {
        renderEmptyState(ctx, "아직 경기 기록이 없습니다", "운영 맵에서 선수를 배치하세요");
      }
    }

    function drawBattleHpBar(ctx, x, y, width, snapshot, alignRight = false) {
      const hpRatio = clamp(snapshot.currentHP / snapshot.maxHP, 0, 1);
      const gradient = ctx.createLinearGradient(x, 0, x + width, 0);
      gradient.addColorStop(0, hpRatio > 0.5 ? "#2ecc71" : hpRatio > 0.2 ? "#f39c12" : "#e74c3c");
      gradient.addColorStop(1, "#e74c3c");

      ctx.strokeStyle = "#333";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, width, 14);
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(x, y, width, 14);
      ctx.fillStyle = gradient;
      ctx.fillRect(x, y, width * hpRatio, 14);

      ctx.fillStyle = "#ecf0f1";
      ctx.font = '10px "Courier New"';
      ctx.textAlign = alignRight ? "right" : "left";
      ctx.fillText(snapshot.name, alignRight ? x + width : x, y - 2);
      ctx.fillStyle = "#95a5a6";
      ctx.font = '9px "Courier New"';
      ctx.fillText(`${Math.floor(snapshot.currentHP)} / ${Math.floor(snapshot.maxHP)}`, alignRight ? x + width : x, y + 26);
    }

    function drawBattleSubBar(ctx, x, y, width, value, maxValue, color, ready = false) {
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(x, y, width, 7);
      ctx.fillStyle = color;
      ctx.fillRect(x, y, width * clamp(value / maxValue, 0, 1), 7);
      if (ready) {
        ctx.strokeStyle = "#ffffff";
        ctx.strokeRect(x - 1, y - 1, width + 2, 9);
      }
    }

    function drawMomentumBar(ctx, leftSnapshot, rightSnapshot) {
      const x = 10;
      const y = 56;
      const width = 620;
      const leftWidth = width * (leftSnapshot.momentum / 100);
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(x, y, width, 8);
      ctx.fillStyle = "#3498db";
      ctx.fillRect(x, y, leftWidth, 8);
      ctx.fillStyle = "#e74c3c";
      ctx.fillRect(x + leftWidth, y, width - leftWidth, 8);
      ctx.fillStyle = "#ecf0f1";
      ctx.fillRect(x + leftWidth - 1, y - 1, 2, 10);
      ctx.font = '9px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText("◀ MOMENTUM ▶", 320, 53);
    }

    function drawBattleLog(ctx, event, turnLimit = 30) {
      ctx.fillStyle = "#bdc3c7";
      ctx.font = '11px "Courier New"';
      ctx.textAlign = "left";
      ctx.fillText(event.actionText || "", 14, 295);
      ctx.fillText(event.resultText || "", 14, 315);
      ctx.fillStyle = "#7f8c8d";
      ctx.textAlign = "right";
      ctx.font = '10px "Courier New"';
      ctx.fillText(`TURN ${event.turn} / ${turnLimit}`, 628, 345);
    }

    function drawBurstParticles(ctx, x, y, colors, count, progress, spread, sizeMin, sizeMax) {
      for (let index = 0; index < count; index += 1) {
        const angle = (Math.PI * 2 * index) / count;
        const distance = spread * progress * (0.7 + ((index % 3) * 0.2));
        const size = sizeMin + ((index % 3) * ((sizeMax - sizeMin) / 2));
        ctx.globalAlpha = 1 - progress;
        ctx.fillStyle = colors[index % colors.length];
        ctx.beginPath();
        ctx.arc(x + Math.cos(angle) * distance, y + Math.sin(angle) * distance, size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawImpactShockwave(ctx, x, y, progress, palette = ["#ecf0f1", "#ff623f"]) {
      const pulse = Math.sin(progress * Math.PI);
      const ringRadius = 14 + (pulse * 34);
      ctx.save();
      ctx.lineWidth = 2.5 + ((1 - progress) * 1.5);
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.28 + ((1 - progress) * 0.22)})`;
      ctx.beginPath();
      ctx.arc(x, y, ringRadius, 0, Math.PI * 2);
      ctx.stroke();
      for (let index = 0; index < 6; index += 1) {
        const angle = ((Math.PI * 2) / 6) * index;
        const inner = 8 + (pulse * 8);
        const outer = 20 + (pulse * 20);
        ctx.strokeStyle = palette[index % palette.length];
        ctx.lineWidth = 1.4 + ((1 - progress) * 0.8);
        ctx.beginPath();
        ctx.moveTo(x + (Math.cos(angle) * inner), y + (Math.sin(angle) * inner));
        ctx.lineTo(x + (Math.cos(angle) * outer), y + (Math.sin(angle) * outer));
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawRingForeground(ctx, pulse = 0) {
      const ropeRows = [
        { y: 216, color: "rgba(173, 35, 35, 0.78)", width: 4 },
        { y: 226, color: "rgba(231, 76, 60, 0.88)", width: 4.5 },
        { y: 236, color: "rgba(173, 35, 35, 0.74)", width: 4 }
      ];
      const sway = Math.sin(pulse * Math.PI) * 2.5;
      ctx.save();
      ropeRows.forEach((rope, index) => {
        ctx.strokeStyle = rope.color;
        ctx.lineWidth = rope.width;
        ctx.beginPath();
        ctx.moveTo(68, rope.y + sway + (index * 0.4));
        ctx.lineTo(572, rope.y - sway - (index * 0.4));
        ctx.stroke();
      });
      ctx.fillStyle = "rgba(220, 228, 236, 0.75)";
      ctx.fillRect(62, 190, 8, 72);
      ctx.fillRect(570, 190, 8, 72);
      ctx.fillStyle = "rgba(241, 196, 15, 0.18)";
      ctx.fillRect(70, 240, 500, 18);
      ctx.restore();
    }

    function drawOrbitStars(ctx, x, y, frame) {
      ctx.fillStyle = "#f1c40f";
      ctx.font = '12px "Courier New"';
      ctx.textAlign = "center";
      for (let index = 0; index < 3; index += 1) {
        const angle = (frame * 0.08) + (index * (Math.PI * 2 / 3));
        ctx.fillText("★", x + Math.cos(angle) * 16, y - 62 + Math.sin(angle) * 8);
      }
    }

    function drawEventTextEffects(ctx, event, progress, attackerX, defenderX, defenderY) {
      if (event.damage > 0 && progress > 0.2 && progress < 0.85) {
        const rise = (progress - 0.2) * 40;
        ctx.fillStyle = event.isCrit ? "#f1c40f" : "#ecf0f1";
        ctx.font = `${event.isCrit ? 28 : event.type === "finisher" ? 36 : 20}px "Courier New"`;
        ctx.textAlign = "center";
        ctx.fillText(`-${event.damage}`, defenderX, defenderY - 60 - rise);
        if (event.isCrit) {
          ctx.fillText("CRITICAL!", defenderX, defenderY - 88 - rise);
        }
      }

      if (event.type === "miss") {
        ctx.fillStyle = "#ecf0f1";
        ctx.font = '18px "Courier New"';
        ctx.textAlign = "center";
        ctx.fillText(event.resultText, defenderX, defenderY - 72);
      }

      if (event.moveType === "power" || event.moveType === "technical") {
        ctx.fillStyle = event.moveType === "technical" ? "#7ed6ff" : "#ecf0f1";
        ctx.font = `${event.moveType === "technical" ? 16 : 14}px "Courier New"`;
        ctx.textAlign = "center";
        ctx.fillText(`${event.moveName}!`, attackerX, 188);
      }

      if (event.type === "finisher") {
        ctx.fillStyle = "#e74c3c";
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.font = '32px "Courier New"';
        ctx.textAlign = "center";
        ctx.strokeText(`${event.moveName}!!!`, 320 + (Math.sin(progress * 30) * 2), 170);
        ctx.fillText(`${event.moveName}!!!`, 320 + (Math.sin(progress * 30) * 2), 170);
      }

      if (event.pinResult) {
        ctx.fillStyle = "#ecf0f1";
        ctx.font = '24px "Courier New"';
        ctx.textAlign = "center";
        if (progress < 0.33) {
          ctx.fillText("1 ...", 320, 110);
        } else if (progress < 0.66) {
          ctx.fillText("2 ...", 320, 110);
        } else {
          ctx.fillText(event.pinResult.pinText, 320, 110);
        }
      }
    }

    function drawDebugOverlay(ctx, leftSnapshot, rightSnapshot, event) {
      if (!DEBUG_MODE) {
        return;
      }
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(122, 72, 398, 58);
      ctx.fillStyle = "#ecf0f1";
      ctx.font = '10px "Courier New"';
      ctx.textAlign = "left";
      ctx.fillText(`A HP:${Math.floor(leftSnapshot.currentHP)} ST:${Math.floor(leftSnapshot.currentStamina)} FG:${Math.floor(leftSnapshot.finisherGauge)} MO:${Math.floor(leftSnapshot.momentum)}`, 128, 88);
      ctx.fillText(`B HP:${Math.floor(rightSnapshot.currentHP)} ST:${Math.floor(rightSnapshot.currentStamina)} FG:${Math.floor(rightSnapshot.finisherGauge)} MO:${Math.floor(rightSnapshot.momentum)}`, 128, 102);
      ctx.fillText(`TURN:${event.turn} ACTION:${event.moveType} DMG:${event.damage} RESULT:${event.resultText}`, 128, 116);
    }

    function drawBattleEventFrame(ctx, battlePackage, event, progress, frame) {
      const leftSnapshot = progress < 0.5 ? event.beforeLeft : event.afterLeft;
      const rightSnapshot = progress < 0.5 ? event.beforeRight : event.afterRight;
      const hypeValue = event.hypeAfter;
      const attackerIsLeft = event.attackerId === leftSnapshot.id;
      const turnLimit = battlePackage?.battleResult?.turnLimit || getBattleTurnLimit(battlePackage?.battleResult?.matchTypeLabel || "");

      drawBattleArena(ctx, hypeValue, frame, true);
      drawHypeHeader(ctx, hypeValue);
      drawBattleHpBar(ctx, 10, 10, 220, leftSnapshot, false);
      drawBattleHpBar(ctx, 410, 10, 220, rightSnapshot, true);
      drawBattleSubBar(ctx, 10, 30, 220, leftSnapshot.currentStamina, leftSnapshot.maxStamina, "#3498db");
      drawBattleSubBar(ctx, 410, 30, 220, rightSnapshot.currentStamina, rightSnapshot.maxStamina, "#3498db");
      drawBattleSubBar(ctx, 10, 42, 220, leftSnapshot.finisherGauge, 100, leftSnapshot.finisherGauge >= 100 ? "#e74c3c" : leftSnapshot.finisherGauge >= 50 ? "#9b59b6" : "#555", leftSnapshot.finisherGauge >= 100);
      drawBattleSubBar(ctx, 410, 42, 220, rightSnapshot.finisherGauge, 100, rightSnapshot.finisherGauge >= 100 ? "#e74c3c" : rightSnapshot.finisherGauge >= 50 ? "#9b59b6" : "#555", rightSnapshot.finisherGauge >= 100);
      drawMomentumBar(ctx, leftSnapshot, rightSnapshot);

      if (leftSnapshot.finisherGauge >= 100) {
        ctx.fillStyle = "#e74c3c";
        ctx.font = '9px "Courier New"';
        ctx.textAlign = "left";
        ctx.fillText("FINISHER READY!", 10, 58);
      }
      if (rightSnapshot.finisherGauge >= 100) {
        ctx.fillStyle = "#e74c3c";
        ctx.font = '9px "Courier New"';
        ctx.textAlign = "right";
        ctx.fillText("FINISHER READY!", 630, 58);
      }

      let leftX = 184;
      let rightX = 456;
      let leftY = 228;
      let rightY = 228;
      let leftState = leftSnapshot.isDown ? "down" : "idle";
      let rightState = rightSnapshot.isDown ? "down" : "idle";
      const actionProgress = ["rest", "stunned", "time-limit"].includes(event.type)
        ? 0
        : Math.sin(clamp(progress / 0.78, 0, 1) * Math.PI);
      const recoilProgress = event.damage > 0
        ? Math.sin(clamp((progress - 0.38) / 0.62, 0, 1) * Math.PI)
        : 0;
      const clashDistance = event.type === "finisher"
        ? 134
        : event.pinResult
          ? 118
          : event.moveType === "technical"
            ? 112
            : event.moveType === "power"
              ? 124
              : 94;
      const pushback = event.type === "finisher" ? 22 : event.damage > 0 ? 14 : 0;
      const cameraShake = event.damage > 0
        ? Math.sin(progress * Math.PI * 10) * (1 - progress) * (event.type === "finisher" ? 4.8 : event.isCrit ? 3.4 : 2)
        : 0;

      if (event.type === "rest" || event.type === "stunned") {
        leftState = leftSnapshot.isDown ? "down" : "idle";
        rightState = rightSnapshot.isDown ? "down" : "idle";
      } else if (attackerIsLeft) {
        leftX += clashDistance * actionProgress;
        rightX -= (clashDistance * (event.pinResult ? 0.72 : 0.54)) * actionProgress;
        leftY -= Math.sin(progress * Math.PI) * 3;
        rightX += recoilProgress * pushback;
        rightY -= recoilProgress * 2;
        leftState = event.type === "finisher" || event.moveType === "power" || event.moveType === "technical" ? "attack" : "walk";
        if (event.pinResult || rightSnapshot.isDown) {
          rightState = "down";
          rightX = 360;
          rightY = 248;
          leftX = Math.max(leftX, 300);
          leftY = 224;
        } else if (event.damage > 0) {
          rightState = "walk";
        }
      } else {
        rightX -= clashDistance * actionProgress;
        leftX += (clashDistance * (event.pinResult ? 0.72 : 0.54)) * actionProgress;
        rightY -= Math.sin(progress * Math.PI) * 3;
        leftX -= recoilProgress * pushback;
        leftY -= recoilProgress * 2;
        rightState = event.type === "finisher" || event.moveType === "power" || event.moveType === "technical" ? "attack" : "walk";
        if (event.pinResult || leftSnapshot.isDown) {
          leftState = "down";
          leftX = 280;
          leftY = 248;
          rightX = Math.min(rightX, 340);
          rightY = 224;
        } else if (event.damage > 0) {
          leftState = "walk";
        }
      }

      const impactX = attackerIsLeft ? rightX - 12 : leftX + 12;
      const impactY = attackerIsLeft ? rightY - 78 : leftY - 78;

      ctx.save();
      ctx.translate(attackerIsLeft ? -cameraShake : cameraShake, Math.abs(cameraShake) * 0.18);
      drawBattleWrestler(ctx, leftSnapshot, leftX, leftY, frame, leftState, false);
      drawBattleWrestler(ctx, rightSnapshot, rightX, rightY, frame, rightState, true);
      drawRingForeground(ctx, event.damage > 0 ? recoilProgress : progress * 0.35);
      if (event.damage > 0) {
        const impactColors = event.type === "finisher"
          ? ["#ffffff", "#ff623f", "#f1c40f"]
          : event.moveType === "technical"
            ? ["#ffffff", "#7ed6ff"]
            : ["#ffffff", "#ff8c69"];
        drawBurstParticles(
          ctx,
          impactX,
          impactY,
          impactColors,
          event.type === "finisher" ? 18 : 10,
          progress,
          event.type === "finisher" ? 60 : 34,
          1,
          event.type === "finisher" ? 4 : 3
        );
        drawImpactShockwave(ctx, impactX, impactY, progress, impactColors);
      }
      ctx.restore();

      if (leftSnapshot.isDown) {
        drawOrbitStars(ctx, leftX, leftY, frame);
      }
      if (rightSnapshot.isDown) {
        drawOrbitStars(ctx, rightX, rightY, frame);
      }

      if (event.type === "pin" || event.type === "finisher") {
        ctx.fillStyle = "#e74c3c";
        ctx.font = '26px "Courier New"';
        ctx.textAlign = "center";
        ctx.fillText("DOWN!", 320, 145);
      }

      if (event.isCrit) {
        drawBurstParticles(ctx, attackerIsLeft ? rightX : leftX, attackerIsLeft ? rightY - 30 : leftY - 30, ["#f1c40f"], 8, progress, 28, 2, 4);
      }
      if (event.type === "finisher") {
        drawBurstParticles(ctx, 320, 180, ["#e74c3c", "#f1c40f"], 40, progress, 120, 3, 8);
        ctx.fillStyle = `rgba(231, 76, 60, ${0.18 + ((1 - progress) * 0.25)})`;
        ctx.fillRect(0, 0, 640, 360);
      }
      if (event.pinResult && event.pinResult.escapedAt > 0) {
        drawBurstParticles(ctx, attackerIsLeft ? rightX : leftX, attackerIsLeft ? rightY - 40 : leftY - 40, ["#2ecc71"], 15, progress, 38, 2, 4);
      }
      if (hypeValue >= 90) {
        drawBurstParticles(ctx, 320, 20, ["#e74c3c", "#3498db", "#f1c40f", "#2ecc71", "#ecf0f1"], 5, progress, 90, 2, 3);
      }

      drawEventTextEffects(ctx, event, progress, attackerIsLeft ? leftX : rightX, attackerIsLeft ? rightX : leftX, attackerIsLeft ? rightY : leftY);
      drawBattleLog(ctx, event, turnLimit);
      drawDebugOverlay(ctx, leftSnapshot, rightSnapshot, event);

      const staminaWarning = attackerIsLeft
        ? getStaminaStateLabel(leftSnapshot.currentStamina)
        : getStaminaStateLabel(rightSnapshot.currentStamina);
      if (staminaWarning) {
        ctx.fillStyle = "#f1c40f";
        ctx.font = '16px "Courier New"';
        ctx.textAlign = "center";
        ctx.fillText(staminaWarning, 320, 190);
      }
    }

    function drawBattleIntro(ctx, battlePackage, progress, frame) {
      drawBattleArena(ctx, gameState.hype, frame, true);
      drawHypeHeader(ctx, gameState.hype);
      const leftSnapshot = snapshotBattleState(battlePackage.leftState);
      const rightSnapshot = snapshotBattleState(battlePackage.rightState);
      const slideProgress = clamp(progress / 0.68, 0, 1);
      const leftX = -100 + (280 * slideProgress);
      const rightX = 740 - (280 * slideProgress);

      ctx.fillStyle = "rgba(3, 5, 10, 0.46)";
      ctx.fillRect(0, 0, 640, 360);
      drawCanvasImageCover(ctx, "data/images/ui/panels/vs_overlay.png", 0.85);

      drawVersusPortrait(ctx, leftSnapshot, leftX, 288, 180, 228, false);
      drawVersusPortrait(ctx, rightSnapshot, rightX, 288, 180, 228, true);

      ctx.fillStyle = "#ecf0f1";
      ctx.font = '18px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText(leftSnapshot.name, 180, 310);
      ctx.fillText(rightSnapshot.name, 460, 310);
      ctx.font = '12px "Courier New"';
      ctx.fillStyle = "#bdc3c7";
      ctx.fillText(`"${leftSnapshot.nickname || ""}"`, 180, 332);
      ctx.fillText(`"${rightSnapshot.nickname || ""}"`, 460, 332);

      if (progress > 0.40) {
        ctx.fillStyle = "#ffffff";
        ctx.strokeStyle = "#b42020";
        ctx.lineWidth = 3;
        ctx.font = '46px "Courier New"';
        ctx.strokeText("VS", 320, 176);
        ctx.fillText("VS", 320, 176);
      }
      if (progress > 0.78) {
        ctx.fillStyle = "#f1c40f";
        ctx.font = '30px "Courier New"';
        ctx.fillText("FIGHT!", 320, 112);
      }
    }

    function drawBattleOutro(ctx, battlePackage, progress, frame) {
      const lastEvent = battlePackage.battleEvents[battlePackage.battleEvents.length - 1];
      const leftSnapshot = lastEvent ? lastEvent.afterLeft : snapshotBattleState(battlePackage.leftState);
      const rightSnapshot = lastEvent ? lastEvent.afterRight : snapshotBattleState(battlePackage.rightState);
      const winnerId = battlePackage.battleResult.winnerId;
      const leftWin = winnerId === leftSnapshot.id;

      drawBattleArena(ctx, clamp(gameState.hype + battlePackage.battleResult.hypeGenerated, 0, 100), frame, true);
      drawHypeHeader(ctx, clamp(gameState.hype + battlePackage.battleResult.hypeGenerated, 0, 100));
      drawBattleHpBar(ctx, 10, 10, 220, leftSnapshot, false);
      drawBattleHpBar(ctx, 410, 10, 220, rightSnapshot, true);
      drawBattleSubBar(ctx, 10, 30, 220, leftSnapshot.currentStamina, leftSnapshot.maxStamina, "#3498db");
      drawBattleSubBar(ctx, 410, 30, 220, rightSnapshot.currentStamina, rightSnapshot.maxStamina, "#3498db");
      drawBattleSubBar(ctx, 10, 42, 220, leftSnapshot.finisherGauge, 100, "#555");
      drawBattleSubBar(ctx, 410, 42, 220, rightSnapshot.finisherGauge, 100, "#555");
      drawMomentumBar(ctx, leftSnapshot, rightSnapshot);

      drawBattleWrestler(ctx, leftSnapshot, leftWin ? 218 : 404, leftWin ? 220 : 248, frame, leftWin ? "victory" : "down", false);
      drawBattleWrestler(ctx, rightSnapshot, leftWin ? 422 : 236, leftWin ? 248 : 220, frame, leftWin ? "down" : "victory", true);
      drawRingForeground(ctx, progress);
      drawBurstParticles(ctx, 320, 170, ["#e74c3c", "#f1c40f"], 40, progress, 100, 3, 7);

      ctx.fillStyle = "#f1c40f";
      ctx.font = '28px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText(`${leftWin ? leftSnapshot.name : rightSnapshot.name} 승리!`, 320, 140);
      if (battlePackage.battleResult.finishType !== "TIME_LIMIT") {
        const winnerSnapshot = leftWin ? leftSnapshot : rightSnapshot;
        ctx.fillStyle = "#ecf0f1";
        ctx.font = '14px "Courier New"';
        ctx.fillText(`${winnerSnapshot.finisher}으로 결정!`, 320, 165);
      }
    }

    function drawBattlePackageFrame(ctx, battlePackage, elapsed, frame) {
      const timings = battlePackage?.animationTimings || BATTLE_ANIMATION_TIMINGS;
      const introDuration = timings.intro;
      const eventDuration = timings.event;
      const outroDuration = timings.outro;
      const eventsDuration = battlePackage.battleEvents.length * eventDuration;

      if (elapsed < introDuration) {
        drawBattleIntro(ctx, battlePackage, elapsed / introDuration, frame);
        return false;
      }

      if (elapsed < introDuration + eventsDuration) {
        const localElapsed = elapsed - introDuration;
        const eventIndex = Math.min(battlePackage.battleEvents.length - 1, Math.floor(localElapsed / eventDuration));
        const event = battlePackage.battleEvents[eventIndex];
        const progress = (localElapsed % eventDuration) / eventDuration;
        drawBattleEventFrame(ctx, battlePackage, event, progress, frame);
        matchAnimationState.currentBattle = battlePackage;
        return false;
      }

      if (elapsed < introDuration + eventsDuration + outroDuration) {
        drawBattleOutro(ctx, battlePackage, (elapsed - introDuration - eventsDuration) / outroDuration, frame);
        return false;
      }

      return true;
    }

    function drawCurrentCanvasFrame(now) {
      const canvas = document.getElementById("matchCanvas");
      if (!canvas) {
        return;
      }
      const ctx = canvas.getContext("2d");
      if (!ctx) {
        return;
      }

      if (titleScreenVisible) {
        drawTitleScreenCanvas(ctx, now);
        return;
      }

      if (!matchAnimationState.running) {
        drawIdleHomeCanvas(ctx);
        return;
      }

      const currentBattle = matchAnimationState.queue[matchAnimationState.matchIndex];
      if (!currentBattle) {
        finishMatchAnimation();
        return;
      }

      const battleFinished = drawBattlePackageFrame(ctx, currentBattle, now - matchAnimationState.matchStartTime, Math.floor(now / 16));
      if (battleFinished) {
        matchAnimationState.matchIndex += 1;
        if (matchAnimationState.matchIndex >= matchAnimationState.queue.length) {
          finishMatchAnimation();
          return;
        }
        matchAnimationState.matchStartTime = now;
        matchAnimationState.currentBattle = matchAnimationState.queue[matchAnimationState.matchIndex];
      }
    }

    function startMatchAnimation(matchQueue) {
      if (!matchQueue.length) {
        openWeeklyResultsModal();
        return;
      }
      matchAnimationState.running = true;
      matchAnimationState.queue = matchQueue;
      matchAnimationState.matchIndex = 0;
      matchAnimationState.matchStartTime = performance.now();
      matchAnimationState.currentBattle = matchQueue[0];
    }

    function finishMatchAnimation() {
      matchAnimationState.running = false;
      matchAnimationState.queue = [];
      matchAnimationState.matchIndex = 0;
      matchAnimationState.currentBattle = null;
      if (typeof matchAnimationState.finishCallback === "function") {
        const callback = matchAnimationState.finishCallback;
        matchAnimationState.finishCallback = null;
        callback();
      } else {
        openWeeklyResultsModal();
      }
      render();
    }

    function skipMatchAnimation() {
      if (!matchAnimationState.running) {
        return;
      }
      finishMatchAnimation();
    }

    function startCanvasLoop() {
      if (canvasAnimationFrameId || activeTab !== "home") {
        return;
      }
      if (canvasLoopPausedAt && matchAnimationState.running) {
        matchAnimationState.matchStartTime += performance.now() - canvasLoopPausedAt;
      }
      canvasLoopPausedAt = 0;
      function frame(now) {
        drawCurrentCanvasFrame(now);
        if (activeTab !== "home") {
          canvasAnimationFrameId = null;
          return;
        }
        canvasAnimationFrameId = requestAnimationFrame(frame);
      }
      canvasAnimationFrameId = requestAnimationFrame(frame);
    }

    function getGradeCssClass(grade) {
      return {
        C: "grade-c",
        B: "grade-b",
        A: "grade-a",
        S: "grade-s",
        LEGEND: "grade-legend"
      }[grade] || "grade-c";
    }

    function getInstantDismantleReward(grade) {
      return {
        C: 25,
        B: 80,
        A: 220,
        S: 700,
        LEGEND: 2200
      }[grade] || 0;
    }

    function formatFragmentRewardLabel(grade, amount, reasons = []) {
      const normalizedAmount = Math.max(0, Math.floor(amount || 0));
      if (normalizedAmount <= 0 || !GRADE_FRAGMENT_LABELS[grade]) {
        return "조각 없음";
      }
      return `${GRADE_FRAGMENT_LABELS[grade]} ${normalizedAmount}개${reasons.length ? ` (${reasons.join(", ")})` : ""}`;
    }

    function getFragmentExchangeEntries() {
      return wrestlerPool
        .filter((wrestler) => gradeRank(wrestler.grade) >= gradeRank("A"))
        .slice()
        .sort((left, right) => gradeRank(right.grade) - gradeRank(left.grade) || left.name.localeCompare(right.name));
    }

    function getFacilityDescription(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      if (facilityKey === "gym" || facilityKey === "matRoom" || facilityKey === "prStudio") {
        return `훈련 슬롯 ${facility.slots || 0}개 · 속도 x${(facility.speedBonus || 1).toFixed(2)}`;
      }
      if (facilityKey === "medical") {
        return `부상 회복 x${(facility.healSpeed || 1).toFixed(1)} · 예방 ${(facility.prevention || 0) * 100}%`;
      }
      if (facilityKey === "scoutTeam") {
        return `주당 후보 ${facility.weeklyCandidates || 3}명 · 최고 ${facility.maxGrade || "B"}급`;
      }
      if (facilityKey === "tvStudio") {
        return `주당 TV 보너스 +${formatNumber(facility.tvBonus || 0)}G`;
      }
      if (facilityKey === "rosterOffice") {
        return `선수단 한도 ${facility.rosterLimit || gameState.rosterLimit}명`;
      }
      return "";
    }

    function getFacilityCurrentEffectText(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      if (facilityKey === "prStudio") {
        return `팬 수익 +${Math.round((facility.incomeBonus || 0) * 100)}% · 주당 인기도 +${facility.weeklyFame || 0}`;
      }
      if (facilityKey === "rosterOffice") {
        return `로스터 한도 ${facility.rosterLimit || gameState.rosterLimit}명`;
      }
      return getFacilityDescription(facilityKey);
    }

    function handleGradeFragmentSummon(grade) {
      if (!GRADE_FRAGMENT_KEYS.includes(grade)) {
        return;
      }
      if (gameState.roster.length >= gameState.rosterLimit) {
        openRosterFullModal();
        return;
      }
      const cost = getFragmentCostByGrade(grade);
      if (!spendGradeFragments(grade, cost)) {
        window.alert("조각이 부족합니다.");
        return;
      }
      const pool = wrestlerPool.filter((wrestler) => wrestler.grade === grade);
      const selected = structuredClone(pickRandom(pool));
      if (gameState.roster.some((wrestler) => wrestler.templateId === selected.id)) {
        addFragments(selected.id, getDuplicateFragmentReward(grade));
      } else {
        addRosterMember(createWrestler({
          ...selected,
          id: createWrestlerId("w"),
          templateId: selected.id,
          joinedWeek: gameState.week,
          status: "idle",
          injuryWeeks: 0,
          wins: 0,
          losses: 0
        }));
      }
      render();
      saveGameState();
    }

    function handleGradeFragmentUpgrade(fromGrade) {
      const rule = getGradeFragmentConvertRequirement(fromGrade);
      if (!rule || !spendGradeFragments(fromGrade, rule.cost)) {
        return;
      }
      addGradeFragments(rule.targetGrade, 1);
      render();
      saveGameState();
    }

    function handleTicketPurchase(count) {
      const normalizedCount = count === 10 ? 10 : 1;
      const cost = normalizedCount * 500;
      if (gameState.gold < cost) {
        window.alert("골드가 부족합니다.");
        return;
      }
      gameState.gold -= cost;
      gameState.tickets += normalizedCount;
      render();
      saveGameState();
    }

    function getFragmentRingSvg(percent, color) {
      const normalized = clamp(percent, 0, 100);
      const radius = 30;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference * (1 - (normalized / 100));
      return `
        <svg viewBox="0 0 80 80" aria-hidden="true">
          <circle cx="40" cy="40" r="${radius}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"></circle>
          <circle cx="40" cy="40" r="${radius}" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"></circle>
        </svg>
      `;
    }

    function getFacilityLevelClass(facilityKey, facility) {
      const maxLevel = Math.max(...Object.keys(FACILITY_LEVELS[facilityKey] || {}).map(Number));
      if ((facility.level || 0) >= maxLevel) {
        return "level-max";
      }
      if ((facility.level || 0) <= 0) {
        return "level-0";
      }
      if ((facility.level || 0) >= 2) {
        return "level-2";
      }
      return "level-1";
    }

    function getFacilityUpgradePreviewText(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      const nextLevel = getFacilityNextLevelData(facilityKey);
      if (!facility || !nextLevel) {
        return "최대 레벨에 도달했습니다.";
      }
      if (facilityKey === "gym" || facilityKey === "matRoom" || facilityKey === "prStudio") {
        return `슬롯 ${facility.slots || 0} → ${nextLevel.slots || 0}개 · 속도 x${(facility.speedBonus || 1).toFixed(2)} → x${(nextLevel.speedBonus || 1).toFixed(2)}`;
      }
      if (facilityKey === "medical") {
        return `회복 x${(facility.healSpeed || 1).toFixed(1)} → x${(nextLevel.healSpeed || 1).toFixed(1)} · 예방 ${(facility.prevention || 0) * 100}% → ${(nextLevel.prevention || 0) * 100}%`;
      }
      if (facilityKey === "scoutTeam") {
        return `후보 ${facility.weeklyCandidates || 0} → ${nextLevel.weeklyCandidates || 0}명 · 최고 ${facility.maxGrade || "B"} → ${nextLevel.maxGrade || "B"}급`;
      }
      if (facilityKey === "tvStudio") {
        return `TV 보너스 ${formatNumber(facility.tvBonus || 0)}G → ${formatNumber(nextLevel.tvBonus || 0)}G`;
      }
      if (facilityKey === "rosterOffice") {
        return `로스터 ${facility.rosterLimit || gameState.rosterLimit} → ${nextLevel.rosterLimit || gameState.rosterLimit}명`;
      }
      return `${getFacilityCurrentEffectText(facilityKey)} → ${nextLevel.nextText || "업그레이드"}`;
    }

    function handleSpecificFragmentSummon(templateId) {
      const target = getPoolWrestlerByTemplateId(templateId);
      if (!target) {
        return;
      }
      if (gradeRank(target.grade) < gradeRank("A")) {
        window.alert("B/C급 조각 소환은 더 이상 지원하지 않습니다.");
        return;
      }
      const current = Number(gameState.fragments[templateId] || 0);
      if (current < 40) {
        window.alert("선수 조각이 부족합니다.");
        return;
      }
      gameState.fragments[templateId] = current - 40;
      const owned = gameState.roster.find((wrestler) => wrestler.templateId === templateId);
      if (owned) {
        ["power", "stamina", "technique", "charisma", "fame"].forEach((statKey) => {
          owned.stats[statKey] = clamp((owned.stats[statKey] || 0) + 2, 1, getAdjustedStatCap(owned));
        });
      } else {
        if (gameState.roster.length >= gameState.rosterLimit) {
          openRosterFullModal();
          gameState.fragments[templateId] += 40;
          return;
        }
        addRosterMember(createWrestler({
          ...structuredClone(target),
          id: createWrestlerId("w"),
          templateId: target.id,
          joinedWeek: gameState.week,
          status: "idle",
          injuryWeeks: 0,
          wins: 0,
          losses: 0
        }));
      }
      render();
      saveGameState();
    }

      if (!pendingGachaRewards?.results?.length || pendingGachaRewards.pullCount !== 1) {
        closeModal(true);

      const [result] = pendingGachaRewards.results;
      const rewardGold = getInstantDismantleReward(result.grade);
      if (rewardGold > 0) {
        gameState.gold += rewardGold;

      pendingGachaRewards = null;

    function getPendingGachaKeptRosterCount(session = pendingGachaRewards) {
      if (!session?.results?.length) {
        return 0;
      }
      return session.results.filter((result) => !result.isDuplicate && !result.convertSelected).length;
    }

    function getPendingGachaRequiredRosterSpace(session = pendingGachaRewards) {
      if (!session?.results?.length) {
        return 0;
      }
      return Math.max(0, gameState.roster.length + getPendingGachaKeptRosterCount(session) - gameState.rosterLimit);
    }

    function canFinalizePendingGachaRewards(session = pendingGachaRewards) {
      return Boolean(session?.results?.length) && getPendingGachaRequiredRosterSpace(session) <= 0;
    }

    function getPendingGachaRewardText(result) {
      if (!result) {
        return "";
      }
      if (result.isDuplicate) {
        return result.fragmentReward > 0
          ? `선수 조각 ${formatNumber(result.fragmentReward)}개`
          : "중복 정리";
      }
      return (result.overflowReward || 0) > 0
        ? `${GRADE_FRAGMENT_LABELS[result.grade]} ${formatNumber(result.overflowReward || 0)}개`
        : "조각 없음 · 정리만";
    }

    function getPendingGachaCapacitySummary(session = pendingGachaRewards) {
      const keepCount = getPendingGachaKeptRosterCount(session);
      const convertCount = session?.results?.filter((result) => !result.isDuplicate && result.convertSelected).length || 0;
      const duplicateCount = session?.results?.filter((result) => result.isDuplicate).length || 0;
      const requiredSpace = getPendingGachaRequiredRosterSpace(session);
      return {
        title: `보유 ${gameState.roster.length}/${gameState.rosterLimit} · 신규 보관 ${keepCount}명`,
        note: requiredSpace > 0
          ? `${requiredSpace}명 더 정리하거나 결과에서 변환을 선택해야 확정됩니다. 중복 ${duplicateCount}장은 자동으로 조각 처리됩니다.`
          : `변환 선택 ${convertCount}장 · 중복 ${duplicateCount}장 자동 조각 처리 후 바로 확정할 수 있습니다.`
      };
    }

    function reopenPendingGachaResultModal() {
      if (!pendingGachaRewards?.results?.length) {
        return;
      }
      openGachaResultModal(pendingGachaRewards.results, pendingGachaRewards.pullCount, { reusePending: true, skipReveal: true });
    }

    function togglePendingGachaResultConversion(index) {
      if (!pendingGachaRewards?.results?.[index] || pendingGachaRewards.results[index].isDuplicate) {
        return;
      }
      pendingGachaRewards.results[index].convertSelected = !pendingGachaRewards.results[index].convertSelected;
      syncPendingGachaSessionToState();
      silentSaveGameState();
    }

    function openPendingGachaConversionModal() {
      if (!pendingGachaRewards?.results?.length) {
        return;
      }
      const selectedCount = pendingGachaRewards.results.filter((result) => !result.isDuplicate && result.convertSelected).length;
      const summary = getPendingGachaCapacitySummary(pendingGachaRewards);
      const cardsHtml = pendingGachaRewards.results.map((result, index) => {
        const selected = !result.isDuplicate && result.convertSelected;
        const displayGrade = getNormalizedDisplayGrade(result.wrestler?.grade || result.grade);
        const gradeClass = getGradeCssClass(displayGrade);
        return `
          <button class="gacha-manage-card ${gradeClass} ${selected ? "selected" : ""} ${result.isDuplicate ? "disabled" : ""}" data-action="toggle-pending-convert" data-result-index="${index}" ${result.isDuplicate ? "disabled" : ""}>
            <div class="gacha-manage-card-top">
              ${getGradeBadgeHtml(displayGrade)}
              <div class="gacha-manage-meta">${result.isDuplicate ? "중복" : selected ? "변환 선택" : "보관 예정"}</div>
            </div>
            <div class="gacha-manage-portrait" style="${getWrestlerVisualStyle(result.wrestler, "background-position:center 10%;")}"></div>
            <div class="gacha-manage-name">${escapeHtml(result.wrestler.name)}</div>
            <div class="gacha-manage-meta">"${escapeHtml(result.wrestler.nickname || "")}"</div>
            <div class="gacha-manage-reward">${getPendingGachaRewardText(result)}</div>
          </button>
        `;
      }).join("");
      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">조각변환 선택</h3>
            <p class="modal-subtitle">결과 카드 중 정리할 선수를 고르세요. 중복 카드는 자동으로 조각 처리됩니다.</p>
          </div>
          <button class="modal-close" id="backFromGachaConvertButton">결과로 돌아가기</button>
        </div>
        <div class="gacha-manage-summary">
          <div class="gacha-manage-summary-pill">선택 ${selectedCount}장</div>
          <div class="gacha-manage-summary-pill">${summary.title}</div>
        </div>
        <div class="gacha-manage-grid">${cardsHtml}</div>
        <div class="gacha-capacity-box" style="margin-bottom:16px;">
          <div class="gacha-capacity-title">확정 조건</div>
          <div class="gacha-capacity-note">${summary.note}</div>
        </div>
        <div class="modal-actions">
          <button class="modal-action-button cancel" id="selectLowGradeGachaConvertButton">B 이하 일괄 선택</button>
          <button class="modal-action-button cancel" id="clearGachaConvertSelectionButton">선택 해제</button>
          <button class="modal-action-button confirm" id="finishGachaConvertButton">완료</button>
        </div>
      `, { locked: true, className: "gacha-management-modal" });
      Array.from(document.querySelectorAll('[data-action="toggle-pending-convert"]')).forEach((button) => {
        button.addEventListener("click", () => {
          togglePendingGachaResultConversion(Number(button.dataset.resultIndex));
          openPendingGachaConversionModal();
        });
      });
      const selectLowGradeButton = document.getElementById("selectLowGradeGachaConvertButton");
      if (selectLowGradeButton) {
        selectLowGradeButton.addEventListener("click", () => {
          pendingGachaRewards.results.forEach((result) => {
            const displayGrade = getNormalizedDisplayGrade(result.wrestler?.grade || result.grade);
            if (!result.isDuplicate && gradeRank(displayGrade) <= gradeRank("B")) {
              result.convertSelected = true;
            }
          });
          syncPendingGachaSessionToState();
          silentSaveGameState();
          openPendingGachaConversionModal();
        });
      }
      const clearButton = document.getElementById("clearGachaConvertSelectionButton");
      if (clearButton) {
        clearButton.addEventListener("click", () => {
          pendingGachaRewards.results.forEach((result) => {
            if (!result.isDuplicate) {
              result.convertSelected = false;
            }
          });
          syncPendingGachaSessionToState();
          silentSaveGameState();
          openPendingGachaConversionModal();
        });
      }
      const finishButton = document.getElementById("finishGachaConvertButton");
      if (finishButton) {
        finishButton.addEventListener("click", reopenPendingGachaResultModal);
      }
      const backButton = document.getElementById("backFromGachaConvertButton");
      if (backButton) {
        backButton.addEventListener("click", reopenPendingGachaResultModal);
      }
    }

    function openGachaRosterCleanupModal() {
      if (!pendingGachaRewards?.results?.length) {
        return;
      }
      const roster = gameState.roster
        .slice()
        .sort((left, right) => gradeRank(left.grade) - gradeRank(right.grade) || getWrestlerPower(left) - getWrestlerPower(right));
      const selectedRoster = roster.filter((wrestler) => pendingGachaRosterReleaseSelection.includes(wrestler.id));
      const summary = summarizeReleaseRewards(selectedRoster);
      const summaryPills = [
        `<div class="gacha-manage-summary-pill">선택 ${selectedRoster.length}명</div>`,
        ...GRADE_FRAGMENT_KEYS
          .filter((grade) => Number(summary.summary?.[grade] || 0) > 0)
          .map((grade) => `<div class="gacha-manage-summary-pill">${GRADE_FRAGMENT_LABELS[grade]} +${formatNumber(summary.summary[grade])}</div>`)
      ].join("");
      const cardsHtml = roster.map((wrestler) => {
        const selected = pendingGachaRosterReleaseSelection.includes(wrestler.id);
        const displayGrade = getNormalizedDisplayGrade(wrestler.grade);
        const gradeClass = getGradeCssClass(displayGrade);
        return `
          <button class="gacha-manage-card ${gradeClass} ${selected ? "selected" : ""}" data-action="toggle-gacha-roster-release" data-wrestler-id="${wrestler.id}">
            <div class="gacha-manage-card-top">
              ${getGradeBadgeHtml(displayGrade)}
              <div class="gacha-manage-meta">PWR ${formatAverage(getWrestlerPower(wrestler))}</div>
            </div>
            <div class="gacha-manage-portrait" style="${getWrestlerVisualStyle(wrestler, "background-position:center 10%;")}"></div>
            <div class="gacha-manage-name">${escapeHtml(wrestler.name)}</div>
            <div class="gacha-manage-meta">계약 ${Math.max(0, wrestler.contractWeeks || 0)}주 · 주급 ${formatNumber(wrestler.salary || 0)}G</div>
            <div class="gacha-manage-reward">${getPendingGachaRewardText({ isDuplicate: false, grade: wrestler.grade, overflowReward: getReleaseFragmentReward(wrestler).amount })}</div>
          </button>
        `;
      }).join("");
      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">보유 선수 정리</h3>
            <p class="modal-subtitle">방출할 선수를 골라 로스터 자리를 비우세요. 정리 후 가챠 결과로 돌아갑니다.</p>
          </div>
          <button class="modal-close" id="backFromGachaCleanupButton">결과로 돌아가기</button>
        </div>
        <div class="gacha-manage-summary">${summaryPills || '<div class="gacha-manage-summary-pill">선택된 선수가 없습니다.</div>'}</div>
        <div class="gacha-manage-grid">${cardsHtml || '<div class="countdown-box">정리할 보유 선수가 없습니다.</div>'}</div>
        <div class="modal-actions">
          <button class="modal-action-button cancel" id="clearGachaCleanupSelectionButton">선택 해제</button>
          <button class="modal-action-button confirm" id="confirmGachaCleanupButton" ${selectedRoster.length ? "" : "disabled"}>선택 방출</button>
        </div>
      `, { locked: true, className: "gacha-management-modal" });
      Array.from(document.querySelectorAll('[data-action="toggle-gacha-roster-release"]')).forEach((button) => {
        button.addEventListener("click", () => {
          const wrestlerId = button.dataset.wrestlerId || "";
          if (!wrestlerId) {
            return;
          }
          if (pendingGachaRosterReleaseSelection.includes(wrestlerId)) {
            pendingGachaRosterReleaseSelection = pendingGachaRosterReleaseSelection.filter((id) => id !== wrestlerId);
          } else {
            pendingGachaRosterReleaseSelection = pendingGachaRosterReleaseSelection.concat(wrestlerId);
          }
          openGachaRosterCleanupModal();
        });
      });
      const clearButton = document.getElementById("clearGachaCleanupSelectionButton");
      if (clearButton) {
        clearButton.addEventListener("click", () => {
          clearPendingGachaRosterReleaseSelection();
          openGachaRosterCleanupModal();
        });
      }
      const confirmButton = document.getElementById("confirmGachaCleanupButton");
      if (confirmButton) {
        confirmButton.addEventListener("click", () => {
          const selectedIds = pendingGachaRosterReleaseSelection.filter((wrestlerId) => gameState.roster.some((wrestler) => wrestler.id === wrestlerId));
          if (!selectedIds.length) {
            return;
          }
          const shouldRelease = window.confirm(`선택한 ${selectedIds.length}명을 방출할까요?`);
          if (!shouldRelease) {
            return;
          }
          const released = releaseRosterMembers(selectedIds);
          clearPendingGachaRosterReleaseSelection();
          syncPendingGachaSessionToState();
          render();
          saveGameState();
          showToast(`${released.length}명을 정리했습니다.`, "warning");
          reopenPendingGachaResultModal();
        });
      }
      const backButton = document.getElementById("backFromGachaCleanupButton");
      if (backButton) {
        backButton.addEventListener("click", () => {
          clearPendingGachaRosterReleaseSelection();
          reopenPendingGachaResultModal();
        });
      }
    }

    function buildGachaCardFrontHtml(result) {
      const wrestler = result.wrestler;
      const displayGrade = getNormalizedDisplayGrade(wrestler?.grade || result.grade);
      const gradeClass = getGradeCssClass(displayGrade);
      const statusMark = result.isDuplicate
        ? '<div class="gacha-result-mark duplicate">중복</div>'
        : result.convertSelected
          ? '<div class="gacha-result-mark convert">변환</div>'
          : '<div></div>';
      return `
        <div class="gacha-face front ${gradeClass} ${result.convertSelected ? "convert-selected" : ""}">
          <div class="gacha-card-top">
            <div class="gacha-grade-chip">${getUiIconImgHtml(getGradeIconPath(displayGrade), "", displayGrade)}</div>
            ${statusMark}
          </div>
          <div class="gacha-portrait full" style="${getWrestlerVisualStyle(wrestler, "background-position:center 8%;")}"></div>
        </div>
      `;
    }

    function buildGachaCardHtml(result, index, single = false, revealed = false) {
      return `
        <div class="gacha-card-stage ${single ? "single" : ""}">
          <div class="gacha-card-inner ${revealed ? "flipped" : ""} ${result.convertSelected ? "convert-selected" : ""}" id="gachaCard_${index}">
            <div class="gacha-face back">RING</div>
            ${buildGachaCardFrontHtml(result)}
          </div>
        </div>
      `;
    }

    function collectPendingGachaRewards() {
      if (!pendingGachaRewards || !pendingGachaRewards.results?.length) {
        closeModal(true);
        return;
      }
      const requiredSpace = getPendingGachaRequiredRosterSpace(pendingGachaRewards);
      if (requiredSpace > 0) {
        showToast(`${requiredSpace}명 더 정리하거나 결과를 변환해야 합니다.`, "warning");
        return;
      }
      pendingGachaRewards.results.forEach((result) => {
        if (result.isDuplicate) {
          if (result.fragmentReward > 0) {
            addFragments(result.templateId, result.fragmentReward);
          }
          return;
        }
        if (result.convertSelected) {
          if ((result.overflowReward || 0) > 0) {
            addGradeFragments(result.grade, result.overflowReward || 0);
          }
          return;
        }
        addRosterMember(result.wrestler);
      });
      pendingGachaRewards = null;
      clearPendingGachaRosterReleaseSelection();
      syncPendingGachaSessionToState();
      closeModal(true);
      render();
      saveGameState();
    }

    function finalizePendingGachaRewardsForSave() {
      syncPendingGachaSessionToState();
    }

    function openGachaResultModal(results, pullCount, options = {}) {
      const reusePending = Boolean(options.reusePending && pendingGachaRewards?.results?.length);
      if (!reusePending) {
        pendingGachaRewards = {
          pullCount: Number.isFinite(pullCount) ? Math.max(1, Math.floor(pullCount)) : Math.max(1, Array.isArray(results) ? results.length : 1),
          revealed: false,
          results: Array.isArray(results)
            ? results.map((result) => ({
                ...result,
                convertSelected: Boolean(result?.convertSelected)
              }))
            : []
        };
        clearPendingGachaRosterReleaseSelection();
      }
      if (!pendingGachaRewards?.results?.length) {
        return;
      }
      if (options.skipReveal) {
        pendingGachaRewards.revealed = true;
      }
      syncPendingGachaSessionToState();
      const session = pendingGachaRewards;
      const single = session.pullCount === 1;
      const highestRank = Math.max(...session.results.map((result) => gradeRank(result.grade)));
      const capacity = getPendingGachaCapacitySummary(session);
      const canFinalize = canFinalizePendingGachaRewards(session);
      const summaryCounts = session.results.reduce((acc, result) => {
        acc[result.grade] = (acc[result.grade] || 0) + 1;
        return acc;
      }, {});
      const summaryHtml = ["LEGEND", "S", "A", "B", "C"]
        .filter((grade) => summaryCounts[grade])
        .map((grade) => `<div class="gacha-summary-pill">${grade}급 ${summaryCounts[grade]}장</div>`)
        .join("");

      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">${single ? "가챠 결과" : "10연 가챠 결과"}</h3>
            <p class="modal-subtitle">결과 카드를 직접 정리하거나 변환한 뒤 확정하세요. 새로고침해도 현재 대기 결과는 유지됩니다.</p>
          </div>
        </div>
        <div class="gacha-modal-shell">
          ${highestRank === 5 ? '<div class="gacha-particle-text legend">LEGEND!!!</div>' : ""}
          <div class="${single ? "gacha-single-wrap" : "gacha-card-grid"}" id="gachaRevealGrid">
            ${session.results.map((result, index) => buildGachaCardHtml(result, index, single, Boolean(options.skipReveal || session.revealed))).join("")}
          </div>
          ${single ? "" : `<div class="gacha-summary-row">${summaryHtml}</div>`}
          <div class="gacha-result-footer">
            <div class="gacha-capacity-box">
              <div class="gacha-capacity-title">${capacity.title}</div>
              <div class="gacha-capacity-note">${capacity.note}</div>
            </div>
            <div class="gacha-result-actions">
              <button class="gacha-result-secondary" id="openGachaRosterCleanupButton">보유 선수 정리</button>
              <button class="gacha-result-secondary" id="openGachaConversionButton">조각변환</button>
              <button class="gacha-result-primary" id="collectGachaRewardsButton" ${canFinalize ? "" : "disabled"}>${single ? "보관 완료" : "결과 확정"}</button>
            </div>
          </div>
        </div>
      `, { locked: true, className: "gacha-management-modal" });

      if (!options.skipReveal && !session.revealed) {
        const revealOrder = single
          ? [0]
          : session.results
              .map((result, index) => ({ index, rank: gradeRank(result.grade) }))
              .sort((left, right) => left.rank - right.rank)
              .map((item) => item.index);
        revealOrder.forEach((cardIndex, revealIndex) => {
          setTimeout(() => {
            const card = document.getElementById(`gachaCard_${cardIndex}`);
            if (card) {
              card.classList.add("flipped");
            }
          }, 500 + revealIndex * (single ? 800 : 400));
        });
        pendingGachaRewards.revealed = true;
        syncPendingGachaSessionToState();
      }

      const collectButton = document.getElementById("collectGachaRewardsButton");
      if (collectButton) {
        collectButton.addEventListener("click", collectPendingGachaRewards);
      }
      const cleanupButton = document.getElementById("openGachaRosterCleanupButton");
      if (cleanupButton) {
        cleanupButton.addEventListener("click", openGachaRosterCleanupModal);
      }
      const convertButton = document.getElementById("openGachaConversionButton");
      if (convertButton) {
        convertButton.addEventListener("click", openPendingGachaConversionModal);
      }
    }

    function handleGachaPull(count) {
      if (pendingGachaRewards?.results?.length) {
        reopenPendingGachaResultModal();
        return;
      }
      if (gameState.tickets < count) {
        window.alert("뽑기권이 부족합니다.");
        return;
      }

      gameState.tickets -= count;
      const seenTemplateIds = new Set(gameState.roster.map((wrestler) => wrestler.templateId).filter(Boolean));
      const results = Array.from({ length: count }, () => performSingleGachaRoll()).map((result) => {
        if (seenTemplateIds.has(result.templateId)) {
          return { ...result, isDuplicate: true };
        }
        seenTemplateIds.add(result.templateId);
        return result;
      });
      render();
      openGachaResultModal(results, count);
      silentSaveGameState();
    }

    function handleFragmentExchange(templateId) {
      const target = getPoolWrestlerByTemplateId(templateId);
      if (!target) {
        return;
      }
      if (gradeRank(target.grade) < gradeRank("A")) {
        window.alert("B/C급 조각 영입은 지원하지 않습니다.");
        return;
      }
      if (gameState.roster.some((wrestler) => wrestler.templateId === templateId)) {
        window.alert("이미 보유 중인 레슬러입니다.");
        return;
      }
      if (gameState.roster.length >= gameState.rosterLimit) {
        window.alert("로스터가 가득 찼습니다.");
        return;
      }

      const cost = getFragmentCostByGrade(target.grade);
      const current = gameState.fragments[templateId] || 0;
      if (current < cost) {
        window.alert("조각이 부족합니다.");
        return;
      }

      gameState.fragments[templateId] = current - cost;
      addRosterMember(createWrestler({
        ...structuredClone(target),
        id: createWrestlerId("w"),
        templateId: target.id,
        status: "idle",
        injuryWeeks: 0,
        wins: 0,
        losses: 0
      }));
      render();
      saveGameState();
    }

    function handleFacilityUpgrade(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      if (!facility) {
        return;
      }
      const upgradeCost = getFacilityUpgradeCost(facilityKey);
      if (!upgradeCost) {
        return;
      }
      if (gameState.gold < upgradeCost) {
        window.alert("골드가 부족합니다.");
        return;
      }
      gameState.gold -= upgradeCost;
      facility.level += 1;
      gameState.facilities = syncFacilitiesDerived(gameState.facilities);
      if (facilityKey === "rosterOffice") {
        gameState.rosterLimit = getRosterLimitFromState();
      }
      render();
      saveGameState();
    }

    function renderActiveTab() {
      if (activeTab === "cards") {
        activeTab = "roster";
      } else if (activeTab === "records") {
        activeTab = "missions";
      }
      syncWeeklyCardToSchedule();
      const content = TAB_CONTENT[activeTab] || TAB_CONTENT.home;

      if (activeTab !== "home") {
        stopCanvasLoop();
      }

      const mainSubtitle = typeof content.mainSubtitle === "function" ? content.mainSubtitle() : (content.mainSubtitle || "");
      const sideSubtitle = content.sideSubtitle || "";
      mainPanelTitleEl.textContent = typeof content.mainTitle === "function" ? content.mainTitle() : content.mainTitle;
      mainPanelSubtitleEl.textContent = mainSubtitle;
      mainPanelSubtitleEl.style.display = mainSubtitle ? "" : "none";
      sidePanelTitleEl.textContent = content.sideTitle;
      sidePanelSubtitleEl.textContent = sideSubtitle;
      sidePanelSubtitleEl.style.display = sideSubtitle ? "" : "none";
      renderMainInfo(content.mainInfo);

      if (activeTab === "roster") {
        renderRosterMainContent();
        renderFreeAgentsPanel();
      } else if (activeTab === "home") {
        renderHomeMainContent();
        renderHomeSidePanel();
      } else if (activeTab === "cards") {
        renderCardsMainContent();
        renderCardsSidePanel();
      } else if (activeTab === "shop") {
        renderShopMainContent();
        renderShopSidePanel();
      } else if (activeTab === "missions") {
        renderMissionsMainContent();
        renderMissionsSidePanel();
      } else if (activeTab === "records") {
        renderRecordsMainContent();
        renderRecordsSidePanel();
      } else {
        renderPlaceholderContent(content.placeholder);
        renderSideCards(content.sideCards);
      }

      if (embeddedSideSectionEl) {
        embeddedSideSectionEl.style.display = activeTab === "home" ? "none" : "";
      }

      tabButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === activeTab);
      });
      renderTabBadges();
      if (activeTab === "home") {
        startCanvasLoop();
      }
    }

    function render() {
      applyUiScale();
      renderResources();
      renderActiveTab();
    }

    function saveGameState() {
      try {
        syncPendingGachaSessionToState();
        gameState.lastSaved = Date.now();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
        showSaveToast();
      } catch (error) {
        console.error("저장에 실패했습니다.", error);
      }
    }

    function silentSaveGameState() {
      try {

    function runButtonActionWithLoading(button, action) {
      if (!button || typeof action !== "function") {
        return;
      }
      button.classList.add("btn-loading");
      button.disabled = true;
      requestAnimationFrame(() => {
        try {
          action();
        } finally {
          if (button.isConnected) {
            button.classList.remove("btn-loading");
            button.disabled = false;
          }
        }
      });
    }
