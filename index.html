        retireQueueCoachButton.addEventListener("click", () => proceed(true));
      }
      const retireQueueOnlyButton = document.getElementById("retireQueueOnlyButton");
      if (retireQueueOnlyButton) {
        retireQueueOnlyButton.addEventListener("click", () => proceed(false));
      }
    }

    function getEligibleChampionCandidates() {
      return gameState.roster
        .filter((wrestler) => wrestler.status !== "injured")
        .slice()
        .sort((left, right) => getWrestlerPower(right) - getWrestlerPower(left));
    }

    function assignInitialChampion(championshipKey) {
      const candidates = getEligibleChampionCandidates();
      if (!candidates.length) {
        return null;
      }
      const holder = candidates[0];
      gameState.championships[championshipKey].holderId = holder.id;
      gameState.championships[championshipKey].defenseWeek = 0;
      return holder;
    }

    function checkChampionshipUnlocks() {
      const unlockMessages = [];
      const hasLegend = gameState.roster.some((wrestler) => wrestler.grade === "LEGEND");
      const unlockRules = [
        { key: "indie", condition: gameState.stage >= 2 },
        { key: "regional", condition: gameState.stage >= 3 },
        { key: "world", condition: gameState.stage >= 4 && hasLegend }
      ];

      unlockRules.forEach(({ key, condition }) => {
        const championship = gameState.championships[key];
        if (!championship.unlocked && condition) {
          championship.unlocked = true;
          const holder = assignInitialChampion(key);
          unlockMessages.push(`${championship.belt} ${championship.name} 해금${holder ? ` · 초대 챔피언 ${holder.name}` : ""}`);
        }
      });

      return unlockMessages;
    }

    function getChampionshipUnlockRequirement(key) {
      if (key === "indie") {
        return "단계 2 이상";
      }
      if (key === "regional") {
        return "단계 3 이상";
      }
      return "단계 4 + 레전드 보유";
    }

    function getScoutSettings() {
      const base = {
        weeklyCandidates: gameState.facilities.scoutTeam.weeklyCandidates || 3,
        maxGrade: gameState.facilities.scoutTeam.maxGrade || "B"
      };
      if (gameState.championships.regional.holderId) {
        base.weeklyCandidates += 1;
        if (base.maxGrade === "B") {
          base.maxGrade = "A";
        }
      }
      return base;
    }

    function unlockAchievement(key, label, rewardText, rewardFn) {
      if (gameState.achievements[key]) {
        return false;
      }
      gameState.achievements[key] = true;
      if (rewardFn) {
        rewardFn();
      }
      showAchievementToast(`🏅 업적 달성! ${label}${rewardText ? ` · ${rewardText}` : ""}`);
      return true;
    }

    function checkPersistentAchievements(summary = null) {
      const unlocked = [];
      if (!gameState.achievements.firstMatch && summary && summary.matchCount > 0) {
        if (unlockAchievement("firstMatch", "첫 경기", "뽑기권 +1", () => { gameState.tickets += 1; })) {
          unlocked.push("첫 경기");
        }
      }
      if (!gameState.achievements.tenWins && getWinStreakLikeValue() >= 10) {
        if (unlockAchievement("tenWins", "10연승", "뽑기권 +3", () => { gameState.tickets += 3; })) {
          unlocked.push("10연승");
        }
      }
      if (!gameState.achievements.starDiscovery && gameState.roster.some((wrestler) => gradeRank(wrestler.grade) >= gradeRank("A"))) {
        if (unlockAchievement("starDiscovery", "스타 발굴", "인기도 +50", () => { gameState.fame += 50; })) {
          unlocked.push("스타 발굴");
        }
      }
      if (!gameState.achievements.legendCompanion && gameState.roster.some((wrestler) => wrestler.grade === "LEGEND")) {
        if (unlockAchievement("legendCompanion", "레전드와 함께", "특별 칭호", () => { gameState.achievements.titles.push("레전드 동행자"); })) {
          unlocked.push("레전드와 함께");
        }
      }
      if (!gameState.achievements.fullHouse && summary && summary.totalAudience >= 1000) {
        if (unlockAchievement("fullHouse", "풀하우스", "골드 +2000", () => { gameState.gold += 2000; })) {
          unlocked.push("풀하우스");
        }
      }
      if (!gameState.achievements.championFactory && Object.values(gameState.championships).every((championship) => championship.unlocked && championship.holderId)) {
        if (unlockAchievement("championFactory", "챔피언 공장", "게임 최고 칭호", () => { gameState.achievements.titles.push("챔피언 공장"); })) {
          unlocked.push("챔피언 공장");
        }
      }
      if (!gameState.achievements.hundredWeeks && gameState.week >= 100) {
        if (unlockAchievement("hundredWeeks", "100주 달성", "특별 엔딩")) {
          unlocked.push("100주 달성");
        }
      }
      return unlocked;
    }

    function getRandomRosterWrestler(filterFn = () => true) {
      const pool = gameState.roster.filter(filterFn);
      return pool.length ? pickRandom(pool) : null;
    }

    function getRandomPromotionName() {
      return pickRandom(["IRON HAVOC", "WORLD BRAWL ALLIANCE", "NEON SLAM", "GALAXY PRO WRESTLING"]);
    }

    function createPromisingScoutFind() {
      const candidatePool = wrestlerPool.filter((wrestler) => wrestler.grade === "B" && !gameState.roster.some((owned) => owned.templateId === wrestler.id));
      return candidatePool.length ? pickRandom(candidatePool) : null;
    }

    function createWeeklyEventChoice(label, hint, tone, icon, run) {
      return { label, hint, tone, icon, run };
    }

    function getWeeklyEventFallbackWrestler() {
      return getRandomRosterWrestler()
        || wrestlerPool.find((wrestler) => wrestler.grade === "LEGEND")
        || wrestlerPool[0]
        || null;
    }

    function getWeeklyEventPortraitStyle(wrestler) {
      return getWrestlerCardPortraitStyle(wrestler, "background-position:center bottom;background-size:contain;");
    }

    function buildWeeklyEventData(type) {
      const topStar = gameState.roster.slice().sort((a, b) => getWrestlerPower(b) - getWrestlerPower(a))[0] || null;
      const featured = getRandomRosterWrestler() || topStar || getWeeklyEventFallbackWrestler();
      const rival = getRandomPromotionName();

      if (type === "stable_complaint") {
        const stable = getPrimaryStable();
        const member = stable.memberIds.map(findWrestlerById).filter(Boolean).sort((a, b) => getGmStats(b).ego - getGmStats(a).ego)[0] || featured;
        return {
          type,
          tag: "스테이블 갈등",
          title: `${member.name}의 자리 요구`,
          body: `${member.name}이 ${stable.name} 안에서 자신의 역할이 너무 작다고 항의했습니다.\n이번 결정을 잘못 내리면 단결도와 라커룸 분위기가 흔들릴 수 있습니다.`,
          wrestler: member,
          impacts: ["스테이블 단결도 변화", "선수 만족도 변화", "다음 주 메인 이벤트 요청 가능"],
          choices: [
            createWeeklyEventChoice("요구를 들어준다", "만족도 +14 · 단결도 -6", "accept", "★", () => {
              member.roleSatisfaction = clamp(Number(member.roleSatisfaction ?? 70) + 14, 0, 100);
              stable.unity = clamp((stable.unity || 0) - 6, 0, 100);
              stable.tension = clamp((stable.tension || 0) + 5, 0, 100);
              stable.eventLog = [`${member.name} 역할 요구 수락`, ...(stable.eventLog || [])].slice(0, 8);
              return true;
            }),
            createWeeklyEventChoice("팀 미팅", "단결도 +8 · 골드 -300", "neutral", "🤝", () => {
              if (gameState.gold < 300) {
                window.alert("골드가 부족합니다.");
                return false;
              }
              gameState.gold -= 300;
              stable.unity = clamp((stable.unity || 0) + 8, 0, 100);
              stable.tension = clamp((stable.tension || 0) - 6, 0, 100);

              gameState.hype = clamp(gameState.hype - 6, 0, 100);

      if (type === "fan_backlash") {

          wrestler,

            createWeeklyEventChoice("계속 민다", "Hype +18 · 인기도 -10", "accept", "✓", () => {

            }),

              gameState.fame += 20;
              return true;
            })
          ]
        };
      }

      if (type === "surprise_challenge") {
        const wrestler = getRandomRosterWrestler((item) => item.status !== "injured") || featured;
        if (!wrestler) return null;

          type,

          wrestler,
          impacts: ["다음 쇼 기대감 상승", "컨디션 소모 가능", "전투 카드 변동"],
          choices: [
            createWeeklyEventChoice("허용", "Hype +20 · 컨디션 -8", "accept", "✓", () => {
              gameState.hype = clamp(gameState.hype + 20, 0, 100);
              wrestler.condition = clamp((wrestler.condition || 70) - 8, 0, 100);
              return true;
            }),
            createWeeklyEventChoice("녹화 세그먼트", "Hype +8 · 인기도 +15", "neutral", "★", () => {
              gameState.hype = clamp(gameState.hype + 8, 0, 100);
              gameState.fame += 15;
              return true;
            }),
            createWeeklyEventChoice("금지", "컨디션 +8 · Hype -6", "reject", "×", () => {
              wrestler.condition = clamp((wrestler.condition || 70) + 8, 0, 100);
              gameState.hype = clamp(gameState.hype - 6, 0, 100);
              return true;
            })
          ]
        };
      }

      return null;
    }

    function rollWeeklyEvent() {
      if (Math.random() >= 0.42) {
        return null;
      }
      const weightedEvents = [
        { type: "stable_complaint", weight: (gameState.stables?.[0]?.memberIds?.length || 0) ? 16 : 0 },
        { type: "stable_alliance", weight: (gameState.stables?.[0]?.unity || 0) >= 50 ? 12 : 4 },
        { type: "legend_return", weight: 5 },
        { type: "rival_promo", weight: 10 },
        { type: "taunt_incident", weight: 10 },
        { type: "injury_risk", weight: 15 },
        { type: "media_exposure", weight: 10 },
        { type: "financial_crisis", weight: 8 },
        { type: "fan_meet", weight: 10 },
        { type: "contract_extension", weight: 12 },
        { type: "scout_report", weight: 10 },
        { type: "tv_offer", weight: 8 },
        { type: "title_challenger", weight: getUnlockedChampionshipKeys().length ? 12 : 0 },
        { type: "viral_clip", weight: 10 },
        { type: "training_breakthrough", weight: 12 },
        { type: "sponsor_offer", weight: 9 },
        { type: "merch_drop", weight: 9 },
        { type: "charity_show", weight: 7 },
        { type: "late_arrival", weight: 8 },
        { type: "fan_backlash", weight: 8 },
        { type: "surprise_challenge", weight: 9 }
      ].filter((item) => item.weight > 0);

      const totalWeight = weightedEvents.reduce((sum, item) => sum + item.weight, 0);
      let roll = Math.random() * totalWeight;
      const selected = weightedEvents.find((item) => {
        roll -= item.weight;
        return roll <= 0;
      }) || weightedEvents[0];

      if (!selected) {
        return null;
      }
      return buildWeeklyEventData(selected.type);
    }

    function openRandomEventModal(eventData) {
      if (!eventData) {
        return;
      }
      const wrestler = eventData.wrestler || getWeeklyEventFallbackWrestler();
      const portraitStyle = getWeeklyEventPortraitStyle(wrestler);
      const impactLines = (Array.isArray(eventData.impacts) && eventData.impacts.length ? eventData.impacts : [eventData.body])
        .slice(0, 4)
        .map((line, index) => `
          <div class="weekly-event-impact-line">
            <span class="weekly-event-impact-icon">${["📈", "👥", "★", "⚠"][index] || "•"}</span>
            <span>${escapeHtml(line)}</span>
          </div>

      const choices = (Array.isArray(eventData.choices) && eventData.choices.length ? eventData.choices : [

        createWeeklyEventChoice("조건부 수락", "리스크를 낮춰 진행", "neutral", "★", eventData.onLeft),
        createWeeklyEventChoice(eventData.rightLabel || "거절", eventData.rightHint || "", "reject", "×", eventData.onRight)
      ]).slice(0, 3);
      openModal(`
        <section class="weekly-event-shell">

                <div class="weekly-event-tag">💬 ${escapeHtml(eventData.tag || "스토리 이벤트")}</div>
                <button class="weekly-event-close" data-event-choice-index="2" aria-label="거절">×</button>
              </div>

              ${impactLines}
            </div>
            <div class="weekly-event-actions">
              ${choices.map((choice, index) => `
                <button class="weekly-event-choice ${choice.tone || "neutral"}" data-event-choice-index="${index}">
                  <span class="weekly-event-choice-icon">${choice.icon || "•"}</span>
                  <span>
                    <span class="weekly-event-choice-title">${escapeHtml(choice.label || "선택")}</span>
                    <span class="weekly-event-choice-hint">${escapeHtml(choice.hint || "")}</span>
                  </span>
                </button>
              `).join("")}

          </div>

      Array.from(modalWindowEl.querySelectorAll("[data-event-choice-index]")).forEach((button) => {
        button.addEventListener("click", () => {

          const ok = choice?.run ? choice.run() : true;
          if (ok !== false) {

    function getWeeklySalaryBreakdown() {
      return gameState.roster.map((wrestler) => ({
        name: wrestler.name,
        salary: wrestler.salary
      }));
    }

    function getWeeklySalaryTotal() {
      return getWeeklySalaryBreakdown().reduce((sum, item) => sum + item.salary, 0);
    }

    function getMonthlyPayrollEstimate() {
      return getWeeklySalaryTotal() * 4;
    }

    function getCurrentUiDateText(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}.${month}.${day} · ${gameState.week}주차`;
    }

    function getStageProgressInfo(stage = gameState.stage, fame = gameState.fame) {
      const nextRequirement = STAGE_FAME_REQUIREMENTS[stage];
      const previousRequirement = stage > 1 ? (STAGE_FAME_REQUIREMENTS[stage - 1] || 0) : 0;
      if (!nextRequirement) {
        return {
          needed: 0,
          ratio: 100,
          text: "최종 단계 도달"
        };
      }
      const tierRange = Math.max(1, nextRequirement - previousRequirement);
      const currentValue = clamp(fame - previousRequirement, 0, tierRange);
      return {
        needed: Math.max(0, nextRequirement - fame),
        ratio: clamp((currentValue / tierRange) * 100, 0, 100),
        text: `다음 단계까지 팬 지수 ${formatNumber(Math.max(0, nextRequirement - fame))}`
      };
    }

    function getTopRosterWrestlers(limit = 1) {
      return gameState.roster
        .slice()
        .sort((left, right) => {
          const powerGap = getWrestlerPower(right) - getWrestlerPower(left);
          if (powerGap !== 0) {
            return powerGap;
          }
          const fameGap = (right.stats?.fame || 0) - (left.stats?.fame || 0);
          if (fameGap !== 0) {
            return fameGap;
          }
          return (right.stats?.charisma || 0) - (left.stats?.charisma || 0);
        })
        .slice(0, Math.max(0, limit));
    }

    function getTopRosterWrestler() {
      return getTopRosterWrestlers(1)[0] || null;
    }

    function getExpiringContractWrestlers(limitWeeks = 2) {
      return gameState.roster
        .filter((wrestler) => wrestler.contractWeeks > 0 && wrestler.contractWeeks <= limitWeeks)
        .slice()
        .sort((left, right) => {
          const contractGap = (left.contractWeeks || 0) - (right.contractWeeks || 0);
          if (contractGap !== 0) {
            return contractGap;
          }
          return getWrestlerPower(right) - getWrestlerPower(left);
        });
    }

    function getContractAlertSummary(limitWeeks = 2, previewCount = 2) {
      const expiring = getExpiringContractWrestlers(limitWeeks);
      if (!expiring.length) {
        return {
          count: 0,
          value: "없음",
          note: "당장 연장할 계약이 없습니다."
        };
      }
      const preview = expiring
        .slice(0, previewCount)
        .map((wrestler) => `${wrestler.name} D-${wrestler.contractWeeks}w`)
        .join(" · ");
      return {
        count: expiring.length,
        value: `${expiring.length}명`,
        note: preview
      };
    }

    function getShowCardSummary() {
      const readyMatches = getReadyMatches().length;
      const totalSlots = getWeeklyCardSlotCount(gameState.week);
      return {
        readyMatches,
        totalSlots,
        value: `${readyMatches} / ${totalSlots}`,
        note: readyMatches >= totalSlots ? "이번 주 카드 편성 완료" : `남은 슬롯 ${Math.max(0, totalSlots - readyMatches)}개`
      };
    }

    function getBestCardSummary() {
      const wrestler = getTopRosterWrestler();
      if (!wrestler) {
        return {
          name: "없음",
          note: "보유 선수가 없습니다."
        };
      }
      return {
        name: wrestler.name,
        note: `${wrestler.grade} · PWR ${formatAverage(getWrestlerPower(wrestler))} · 주급 ${formatNumber(wrestler.salary)}G`
      };
    }

    function getChampionOverview(limit = 3) {
      return Object.values(gameState.championships || {})
        .filter((championship) => championship?.unlocked && championship?.holderId)
        .map((championship) => {
          const holder = findWrestlerById(championship.holderId);
          return {
            belt: championship.belt,
            holderName: holder?.name || "공석"
          };
        })
        .slice(0, limit);
    }

    function getCompactObjectiveLabel(label = "") {
      const replacements = [
        [/이번 주 경기를 (\d+)번 진행하라/g, "경기 $1회 진행"],
        [/골드를 (\d+) 이상 획득하라/g, "골드 $1 획득"],
        [/인기도를 (\d+) 이상 올려라/g, "팬 지수 $1 상승"],
        [/C급 레슬러로 경기를 진행하라/g, "C급 경기 1회"],
        [/관중 (\d+)명을 모아라/g, "관중 $1명"],
        [/이번 주 (\d+)승 이상 달성하라/g, "$1승 달성"],
        [/피니셔로 경기를 끝내라/g, "피니셔 승리"],
        [/Hype (\d+) 이상인 상태로 경기를 진행하라/g, "Hype $1 경기"],
        [/치명타를 (\d+)회 이상 발생시켜라/g, "치명타 $1회"],
        [/라이벌전을 진행하라/g, "라이벌전 1회"],
        [/총 (\d+) 데미지를 누적하라/g, "누적 피해 $1"],
        [/타이틀 매치를 성사시켜라/g, "타이틀전 1회"],
        [/이번 주 전승\(무패\)을 달성하라/g, "무패 달성"],
        [/CLOSE_MATCH 경기를 발생시켜라/g, "접전 경기 1회"],
        [/피니셔를 (\d+)번 이상 사용하라/g, "피니셔 $1회"],
        [/스태미나 10% 이하에서 역전승하라/g, "저체력 역전승"],
        [/라이벌 클라이맥스 경기를 성사시켜라/g, "클라이맥스 1회"]
      ];
      return replacements.reduce((text, [pattern, replacement]) => text.replace(pattern, replacement), label).replace(/인기도/g, "팬 지수");
    }

    function getCompactRewardLabel(label = "") {
      return label.replace(/뽑기권/g, "티켓").replace(/인기도/g, "팬 지수");
    }

    function getMissionDifficultyLabel(difficulty) {
      return difficulty === "easy" ? "쉬움" : difficulty === "medium" ? "보통" : "어려움";
    }

    function getWeeklyMissionMetricLabel(metric) {
      return {
        matchesPlayed: "경기",
        damageDealt: "누적 피해",
        rivalryMatches: "라이벌전",
        rivalryClimaxes: "클라이맥스"
      }[metric] || metric;
    }

    function findWrestler(wrestlerId) {
      return findWrestlerById(wrestlerId);
    }

    function countRemainingCardSlots() {
      return gameState.weeklyCard.filter((slot) => !(slot.wrestlerAId && slot.wrestlerBId)).length;
    }

    function syncWeeklyCardToSchedule() {
      const desired = createEmptyWeeklyCard(gameState.week);
      if (gameState.weeklyCard.length === desired.length) {
        return;
      }
      gameState.weeklyCard = desired.map((slot, index) => ({
        ...slot,
        ...(gameState.weeklyCard[index] || {})
      }));
    }

    function hasTitleMatchBooked() {
      return gameState.weeklyCard.some((slot) => slot.titleMatch && slot.championshipKey);
    }

    function getAvailableTitleMatchChampionship() {
      const forced = gameState.pendingTitleChallenge;
      if (forced && gameState.championships[forced]?.unlocked && gameState.championships[forced]?.holderId) {
        return forced;
      }
      return ["world", "regional", "indie"].find((key) => gameState.championships[key].unlocked && gameState.championships[key].holderId) || "";
    }

    function addTitleMatchToCard() {
      const championshipKey = getAvailableTitleMatchChampionship();
      if (!championshipKey) {
        window.alert("현재 편성 가능한 타이틀 매치가 없습니다.");
        return;
      }
      const championship = gameState.championships[championshipKey];
      const holder = getChampionshipHolder(championshipKey);
      const mainEventSlot = gameState.weeklyCard[gameState.weeklyCard.length - 1];
      if (!holder) {
        return;
      }
      if (mainEventSlot.wrestlerAId || mainEventSlot.wrestlerBId) {
        window.alert("타이틀 매치는 마지막 슬롯에만 추가됩니다. 마지막 슬롯을 비운 뒤 다시 시도하세요.");
        return;
      }
      const challenger = gameState.roster
        .filter((wrestler) => wrestler.id !== holder.id && wrestler.status === "idle")
        .slice()
        .sort((left, right) => getWrestlerPower(right) - getWrestlerPower(left))[0];
      if (!challenger) {
        window.alert("도전자로 배치할 선수가 없습니다.");
        return;
      }
      mainEventSlot.wrestlerAId = holder.id;
      mainEventSlot.wrestlerBId = challenger.id;
      mainEventSlot.titleMatch = true;
      mainEventSlot.championshipKey = championshipKey;
      createOrUpdateRivalry(holder.id, challenger.id, "title", 20);
      gameState.pendingTitleChallenge = "";
      renderActiveTab();
    }

    function getHeartsByHype(hypeValue) {
      const count = Math.max(1, Math.min(5, Math.ceil(hypeValue / 20)));
      return "❤️".repeat(count);
    }

    function updateInjuryRecoveryForNewWeek(skipIds = []) {
      const recoveredIds = [];
      gameState.roster.forEach((wrestler) => {
        if (wrestler.status === "injured") {
          if (skipIds.includes(wrestler.id)) {
            return;
          }
          const healAmount = Math.max(1, Math.floor(getMedicalWeeklyHealAmount() * (getAgeStageMeta(wrestler.age).recoveryMultiplier || 1)));
          wrestler.injuryWeeks = Math.max(0, wrestler.injuryWeeks - healAmount);
          if (wrestler.injuryWeeks === 0) {
            wrestler.status = "idle";
            wrestler.trainingFacility = "";
            wrestler.trainingStartWeek = 0;
            recoveredIds.push(wrestler.id);
          }
        } else if (wrestler.status === "match") {
          wrestler.status = "idle";
        }
      });
      return recoveredIds;
    }

    function ageWrestlerCollection(collection) {
      (collection || []).forEach((wrestler) => {
        if (!wrestler) {
          return;
        }
        wrestler.age = Math.max(16, Math.floor((wrestler.age || 18) + 1));
      });
    }

    function applyWeeklyAgingEffects() {
      const retirementCandidates = [];
      gameState.roster.forEach((wrestler) => {
        pushCareerHistorySnapshot(wrestler, gameState.week);
        if (getAgeStage(wrestler.age) === "twilight") {
          wrestler.stats.stamina = clamp(wrestler.stats.stamina - 1, 1, getAdjustedStatCap(wrestler));
        }
        if (wrestler.age >= 42 && wrestler.stats.stamina <= 20) {
          retirementCandidates.push(wrestler.id);
        }
      });
      return retirementCandidates;
    }

    function applySalaryForWeek() {
      const totalSalary = gameState.roster.reduce((sum, wrestler) => sum + wrestler.salary, 0);
      if (gameState.gold >= totalSalary) {
        gameState.gold -= totalSalary;
        return { totalSalary, paid: true };
      }

      window.alert("⚠️ 급여를 지급하지 못했습니다! 선수 사기가 떨어집니다");
      gameState.roster.forEach((wrestler) => {
        wrestler.stats.charisma = clamp(wrestler.stats.charisma - 5, 1, 100);
      });
      return { totalSalary, paid: false };
    }

    function decrementContracts() {
      gameState.roster.forEach((wrestler) => {
        wrestler.contractWeeks = Math.max(0, wrestler.contractWeeks - 1);
      });
    }

    function checkStageUnlock() {
      if (gameState.fame >= 1200 && gameState.stage < 4) {
        gameState.stage = 4;
        return "4단계 PPV 제국 해금!";
      }
      if (gameState.fame >= 500 && gameState.stage < 3) {
        gameState.stage = 3;
        return "3단계 스타디움 해금!";
      }
      if (gameState.fame >= 100 && gameState.stage < 2) {
        gameState.stage = 2;
        return "2단계 아레나 해금!";
      }
      return "";
    }

    // 랜덤 데이터 생성 도우미를 정의한다.
    function randomBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pickRandom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function createWrestlerId(prefix = "w") {
      const id = `${prefix}_${String(gameState.wrestlerSeq).padStart(3, "0")}`;
      gameState.wrestlerSeq += 1;
      return id;
    }

    function generateFreeAgent() {
      const scout = getScoutSettings();
      const allowedGrades = scout.maxGrade === "S"
        ? ["C", "B", "A", "S"]
        : scout.maxGrade === "A"
          ? ["C", "B", "A"]
          : ["C", "B"];
      const excludedTemplateIds = new Set([
        ...gameState.roster.map((wrestler) => wrestler.templateId).filter(Boolean),
        ...gameState.freeAgents.map((wrestler) => wrestler.templateId).filter(Boolean)
      ]);
      const candidatePool = wrestlerPool.filter((wrestler) => allowedGrades.includes(wrestler.grade) && !excludedTemplateIds.has(wrestler.id));
      const selected = candidatePool.length
        ? pickRandom(candidatePool)
        : pickRandom(wrestlerPool.filter((wrestler) => allowedGrades.includes(wrestler.grade)));

      return createWrestler({
        ...structuredClone(selected),
        id: createWrestlerId("fa"),
        templateId: selected.id,
        age: rollAgeForGrade(selected.grade),
        status: "idle",
        injuryWeeks: 0,
        wins: 0,
        losses: 0
      });
    }

    function generateFreeAgentsForWeek() {
      return Array.from({ length: getScoutSettings().weeklyCandidates }, () => generateFreeAgent());
    }

    // 저장 데이터를 안전하게 정리한다.
    function sanitizeWrestler(rawWrestler, fallbackId) {
      const safeStats = rawWrestler && typeof rawWrestler === "object" ? rawWrestler.stats || {} : {};
      return createWrestler({
        id: typeof rawWrestler?.id === "string" && rawWrestler.id ? rawWrestler.id : fallbackId,
        name: typeof rawWrestler?.name === "string" && rawWrestler.name ? rawWrestler.name : "Unknown",
        nickname: typeof rawWrestler?.nickname === "string" ? rawWrestler.nickname : "No Nickname",
        grade: typeof rawWrestler?.grade === "string" ? rawWrestler.grade : "C",
        stats: {
          power: clamp(Number.isFinite(safeStats.power) ? Math.floor(safeStats.power) : 20, 1, 100),
          stamina: clamp(Number.isFinite(safeStats.stamina) ? Math.floor(safeStats.stamina) : 20, 1, 100),
          technique: clamp(Number.isFinite(safeStats.technique) ? Math.floor(safeStats.technique) : 20, 1, 100),
          charisma: clamp(Number.isFinite(safeStats.charisma) ? Math.floor(safeStats.charisma) : 20, 1, 100),
          fame: clamp(Number.isFinite(safeStats.fame) ? Math.floor(safeStats.fame) : 10, 1, 100)
        },
        spriteSheet: typeof rawWrestler?.spriteSheet === "string" ? rawWrestler.spriteSheet : null,
        battleSpriteSheet: typeof rawWrestler?.battleSpriteSheet === "string" ? rawWrestler.battleSpriteSheet : null,
        attackSpriteSheet: typeof rawWrestler?.attackSpriteSheet === "string" ? rawWrestler.attackSpriteSheet : null,
        spriteFrames: Number.isFinite(rawWrestler?.spriteFrames) ? Math.max(1, Math.floor(rawWrestler.spriteFrames)) : 1,
        battleSpriteFrames: Number.isFinite(rawWrestler?.battleSpriteFrames) ? Math.max(1, Math.floor(rawWrestler.battleSpriteFrames)) : 12,
        attackSpriteFrames: Number.isFinite(rawWrestler?.attackSpriteFrames) ? Math.max(1, Math.floor(rawWrestler.attackSpriteFrames)) : 4,
        portraitMode: Boolean(rawWrestler?.portraitMode),
        spriteColor: typeof rawWrestler?.spriteColor === "string" && rawWrestler.spriteColor ? rawWrestler.spriteColor : "#7f8c8d",
        style: ["powerhouse", "technician", "showman"].includes(rawWrestler?.style)
          ? rawWrestler.style
          : deriveWrestlerStyle({
              power: clamp(Number.isFinite(safeStats.power) ? Math.floor(safeStats.power) : 20, 1, 100),
              technique: clamp(Number.isFinite(safeStats.technique) ? Math.floor(safeStats.technique) : 20, 1, 100),
              charisma: clamp(Number.isFinite(safeStats.charisma) ? Math.floor(safeStats.charisma) : 20, 1, 100)
            }, typeof rawWrestler?.templateId === "string" ? rawWrestler.templateId : fallbackId),
        alignment: ["face", "heel", "neutral"].includes(rawWrestler?.alignment)
          ? rawWrestler.alignment
          : getDefaultAlignmentForGrade(typeof rawWrestler?.grade === "string" ? rawWrestler.grade : "C", typeof rawWrestler?.templateId === "string" ? rawWrestler.templateId : fallbackId),
        alignmentCooldownUntilWeek: Number.isFinite(rawWrestler?.alignmentCooldownUntilWeek) ? Math.max(0, Math.floor(rawWrestler.alignmentCooldownUntilWeek)) : 0,
        recentResults: Array.isArray(rawWrestler?.recentResults)
          ? rawWrestler.recentResults.filter((result) => result === "W" || result === "L").slice(-5)
          : [],
        age: Number.isFinite(rawWrestler?.age) ? Math.max(16, Math.floor(rawWrestler.age)) : getDefaultAgeForGrade(typeof rawWrestler?.grade === "string" ? rawWrestler.grade : "C", typeof rawWrestler?.templateId === "string" ? rawWrestler.templateId : fallbackId),
        isProspect: Boolean(rawWrestler?.isProspect),
        potentialStars: Number.isFinite(rawWrestler?.potentialStars) ? clamp(Math.floor(rawWrestler.potentialStars), 1, 5) : getPotentialStarsForGrade(typeof rawWrestler?.grade === "string" ? rawWrestler.grade : "C", typeof rawWrestler?.templateId === "string" ? rawWrestler.templateId : fallbackId),
        potentialCapGrade: typeof rawWrestler?.potentialCapGrade === "string" ? rawWrestler.potentialCapGrade : getPotentialCapGradeFromStars(Number.isFinite(rawWrestler?.potentialStars) ? rawWrestler.potentialStars : getPotentialStarsForGrade(typeof rawWrestler?.grade === "string" ? rawWrestler.grade : "C", typeof rawWrestler?.templateId === "string" ? rawWrestler.templateId : fallbackId)),
        careerHistory: Array.isArray(rawWrestler?.careerHistory)
          ? rawWrestler.careerHistory.slice(-12).map((entry, index) => ({
              week: Number.isFinite(entry?.week) ? Math.max(1, Math.floor(entry.week)) : index + 1,
              total: Number.isFinite(entry?.total) ? Number(entry.total) : 0
            }))
          : [],
        templateId: typeof rawWrestler?.templateId === "string" ? rawWrestler.templateId : "",
        passiveHypeBonus: Number.isFinite(rawWrestler?.passiveHypeBonus) ? Math.max(0, Math.floor(rawWrestler.passiveHypeBonus)) : 0,
        status: ["idle", "training", "injured", "match"].includes(rawWrestler?.status) ? rawWrestler.status : "idle",
        isFavorite: Boolean(rawWrestler?.isFavorite),
        condition: Number.isFinite(rawWrestler?.condition) ? clamp(Math.floor(rawWrestler.condition), 0, 100) : 100,
        restMode: Boolean(rawWrestler?.restMode),
        roleSatisfaction: Number.isFinite(rawWrestler?.roleSatisfaction) ? clamp(Math.floor(rawWrestler.roleSatisfaction), 0, 100) : 70,
        lastBookedWeek: Number.isFinite(rawWrestler?.lastBookedWeek) ? Math.max(0, Math.floor(rawWrestler.lastBookedWeek)) : 0,
        joinedWeek: Number.isFinite(rawWrestler?.joinedWeek) ? Math.max(1, Math.floor(rawWrestler.joinedWeek)) : 1,
        trainingFacility: typeof rawWrestler?.trainingFacility === "string" ? rawWrestler.trainingFacility : "",
        trainingStartWeek: Number.isFinite(rawWrestler?.trainingStartWeek) ? Math.max(0, Math.floor(rawWrestler.trainingStartWeek)) : 0,
        trainingProgress: rawWrestler?.trainingProgress && typeof rawWrestler.trainingProgress === "object"
          ? {
              gym: Number.isFinite(rawWrestler.trainingProgress.gym) ? Math.max(0, Math.floor(rawWrestler.trainingProgress.gym)) : 0,
              matRoom: Number.isFinite(rawWrestler.trainingProgress.matRoom) ? Math.max(0, Math.floor(rawWrestler.trainingProgress.matRoom)) : 0,
              prStudio: Number.isFinite(rawWrestler.trainingProgress.prStudio) ? Math.max(0, Math.floor(rawWrestler.trainingProgress.prStudio)) : 0
            }
          : structuredClone(wrestlerTemplate.trainingProgress),
        injuryWeeks: Number.isFinite(rawWrestler?.injuryWeeks) ? Math.max(0, Math.floor(rawWrestler.injuryWeeks)) : 0,
        contractWeeks: Number.isFinite(rawWrestler?.contractWeeks) ? Math.max(0, Math.floor(rawWrestler.contractWeeks)) : 12,
        salary: Number.isFinite(rawWrestler?.salary) ? Math.max(0, Math.floor(rawWrestler.salary)) : 50,
        wins: Number.isFinite(rawWrestler?.wins) ? Math.max(0, Math.floor(rawWrestler.wins)) : 0,
        losses: Number.isFinite(rawWrestler?.losses) ? Math.max(0, Math.floor(rawWrestler.losses)) : 0,
        finisher: typeof rawWrestler?.finisher === "string" ? rawWrestler.finisher : "Unknown Finish"
      });
    }

    function serializePendingGachaSession(session = pendingGachaRewards) {
      if (!session || !Array.isArray(session.results) || !session.results.length) {
        return null;
      }
      return {
        pullCount: Number.isFinite(session.pullCount) ? Math.max(1, Math.floor(session.pullCount)) : Math.max(1, session.results.length),
        revealed: Boolean(session.revealed),
        results: session.results.map((result, index) => {
          const grade = typeof result?.grade === "string" ? result.grade.toUpperCase() : (result?.wrestler?.grade || "C");
          return {
            wrestler: sanitizeWrestler(result?.wrestler, `pg_${String(index + 1).padStart(3, "0")}`),
            templateId: typeof result?.templateId === "string" && result.templateId
              ? result.templateId
              : (typeof result?.wrestler?.templateId === "string" ? result.wrestler.templateId : ""),
            isDuplicate: Boolean(result?.isDuplicate),
            grade,
            pityLabel: typeof result?.pityLabel === "string" ? result.pityLabel : "",
            fragmentReward: Number.isFinite(result?.fragmentReward) ? Math.max(0, Math.floor(result.fragmentReward)) : getDuplicateFragmentReward(grade),
            overflowReward: Number.isFinite(result?.overflowReward) ? Math.max(0, Math.floor(result.overflowReward)) : getRosterOverflowFragmentReward(grade),
            convertSelected: Boolean(result?.convertSelected)
          };
        })
      };
    }

    function sanitizePendingGachaSession(rawPending) {
      if (!rawPending || typeof rawPending !== "object" || !Array.isArray(rawPending.results) || !rawPending.results.length) {
        return null;
      }
      const sanitizedResults = rawPending.results.map((result, index) => {
        const wrestler = sanitizeWrestler(result?.wrestler, `pg_${String(index + 1).padStart(3, "0")}`);
        const grade = typeof result?.grade === "string" && result.grade
          ? result.grade.toUpperCase()
          : (wrestler.grade || "C");
        return {
          wrestler,
          templateId: typeof result?.templateId === "string" && result.templateId
            ? result.templateId
            : (typeof wrestler?.templateId === "string" ? wrestler.templateId : ""),
          isDuplicate: Boolean(result?.isDuplicate),
          grade,
          pityLabel: typeof result?.pityLabel === "string" ? result.pityLabel : "",
          fragmentReward: Number.isFinite(result?.fragmentReward) ? Math.max(0, Math.floor(result.fragmentReward)) : getDuplicateFragmentReward(grade),
          overflowReward: Number.isFinite(result?.overflowReward) ? Math.max(0, Math.floor(result.overflowReward)) : getRosterOverflowFragmentReward(grade),
          convertSelected: Boolean(result?.convertSelected)
        };
      });
      return {
        pullCount: Number.isFinite(rawPending.pullCount) ? Math.max(1, Math.floor(rawPending.pullCount)) : Math.max(1, sanitizedResults.length),
        revealed: Boolean(rawPending.revealed),
        results: sanitizedResults
      };
    }

    function syncPendingGachaSessionToState() {
      if (!gameState || typeof gameState !== "object") {
        return;
      }
      gameState.pendingGachaSession = serializePendingGachaSession();
    }

    function sanitizeWeeklyCard(rawWeeklyCard, weekValue = gameState.week) {
      const baseSlots = createEmptyWeeklyCard(weekValue);
      if (!Array.isArray(rawWeeklyCard)) {
        return baseSlots;
      }

      return baseSlots.map((baseSlot, index) => {
        const rawSlot = rawWeeklyCard[index] || {};
        return {
          id: baseSlot.id,
          wrestlerAId: typeof rawSlot.wrestlerAId === "string" ? rawSlot.wrestlerAId : null,
          wrestlerBId: typeof rawSlot.wrestlerBId === "string" ? rawSlot.wrestlerBId : null,
          titleMatch: Boolean(rawSlot.titleMatch),
          championshipKey: typeof rawSlot.championshipKey === "string" ? rawSlot.championshipKey : "",
          matchType: typeof rawSlot.matchType === "string" ? rawSlot.matchType : "",
          divisionGenerated: Boolean(rawSlot.divisionGenerated),
          divisionKey: typeof rawSlot.divisionKey === "string" ? rawSlot.divisionKey : "",
          segmentType: typeof rawSlot.segmentType === "string" ? rawSlot.segmentType : ""
        };
      });
    }

    function sanitizeHistory(rawHistory) {
      if (!Array.isArray(rawHistory)) {
        return [];
      }

      return rawHistory.slice(0, 20).map((entry, index) => ({
        week: Number.isFinite(entry?.week) ? Math.max(1, Math.floor(entry.week)) : index + 1,
        matchCount: Number.isFinite(entry?.matchCount) ? Math.max(0, Math.floor(entry.matchCount)) : 0,
        record: typeof entry?.record === "string" ? entry.record : "0승 0패",
        income: Number.isFinite(entry?.income) ? Math.max(0, Math.floor(entry.income)) : 0,
        hype: Number.isFinite(entry?.hype) ? clamp(Math.floor(entry.hype), 0, 100) : 50
      }));
    }

    function sanitizeMatchHistory(rawMatchHistory) {
      if (!Array.isArray(rawMatchHistory)) {
        return [];
      }

      return rawMatchHistory.slice(-100).map((entry) => ({
        week: Number.isFinite(entry?.week) ? Math.max(1, Math.floor(entry.week)) : 1,
        wrestlerAId: typeof entry?.wrestlerAId === "string" ? entry.wrestlerAId : "",
        wrestlerBId: typeof entry?.wrestlerBId === "string" ? entry.wrestlerBId : "",
        winnerId: typeof entry?.winnerId === "string" ? entry.winnerId : ""
      })).filter((entry) => entry.wrestlerAId && entry.wrestlerBId && entry.winnerId);
    }

    function sanitizeChampionships(rawChampionships) {
      const defaults = createDefaultChampionships();
      const safe = structuredClone(defaults);
      Object.keys(safe).forEach((key) => {
        const raw = rawChampionships?.[key] || {};
        safe[key] = {
          ...safe[key],
          name: typeof raw.name === "string" ? raw.name : safe[key].name,
          belt: typeof raw.belt === "string" ? raw.belt : safe[key].belt,
          holderId: typeof raw.holderId === "string" ? raw.holderId : null,
          defenseWeek: Number.isFinite(raw.defenseWeek) ? Math.max(0, Math.floor(raw.defenseWeek)) : 0,
          unlocked: Boolean(raw.unlocked)
        };
      });
      return safe;
    }

    function sanitizeGmSupportCards(rawCards) {
      const defaults = createDefaultGmSupportCards();
      const rawList = Array.isArray(rawCards) ? rawCards : [];
      return defaults.map((card) => {
        const raw = rawList.find((item) => item?.id === card.id || item?.name === card.name);
        return {
          ...card,
          count: Number.isFinite(raw?.count) ? Math.max(0, Math.floor(raw.count)) : card.count
        };
      });
    }

    function sanitizeStables(rawStables, roster = []) {
      const defaults = createDefaultStables();
      const rosterIds = new Set((roster || []).map((wrestler) => wrestler.id));
      const source = Array.isArray(rawStables) && rawStables.length ? rawStables : defaults;
      return source.slice(0, 6).map((stable, index) => ({
        id: typeof stable?.id === "string" && stable.id ? stable.id : `stable_${index + 1}`,
        name: typeof stable?.name === "string" && stable.name ? stable.name : (index === 0 ? "NEW ERA" : `STABLE ${index + 1}`),
        concept: GM_STABLE_CONCEPTS[stable?.concept] ? stable.concept : "underdog",
        alignment: ["face", "heel", "mixed"].includes(stable?.alignment) ? stable.alignment : "mixed",
        color: typeof stable?.color === "string" && stable.color ? stable.color : "#e11d2e",
        leaderId: rosterIds.has(stable?.leaderId) ? stable.leaderId : "",
        memberIds: Array.isArray(stable?.memberIds) ? stable.memberIds.filter((id) => rosterIds.has(id)).slice(0, 5) : [],
        unity: Number.isFinite(stable?.unity) ? clamp(Math.floor(stable.unity), 0, 100) : 62,
        tension: Number.isFinite(stable?.tension) ? clamp(Math.floor(stable.tension), 0, 100) : 18,
        fanBuzz: Number.isFinite(stable?.fanBuzz) ? clamp(Math.floor(stable.fanBuzz), 0, 100) : 36,
        eventLog: Array.isArray(stable?.eventLog) ? stable.eventLog.filter((item) => typeof item === "string").slice(-8) : []
      }));
    }

    function sanitizeState(rawState) {
      const defaults = createDefaultState();
      if (!rawState || typeof rawState !== "object") {
        return defaults;
      }

      let roster = Array.isArray(rawState.roster) && rawState.roster.length
        ? rawState.roster.map((wrestler, index) => sanitizeWrestler(wrestler, `w_${String(index + 1).padStart(3, "0")}`))
        : createStarterRoster();
      roster = ensureMinimumPlayableRoster(roster);

      const freeAgents = Array.isArray(rawState.freeAgents)
        ? rawState.freeAgents.map((wrestler, index) => sanitizeWrestler(wrestler, `fa_${String(index + 1).padStart(3, "0")}`))
        : [];
      const rawFragments = rawState.fragments && typeof rawState.fragments === "object" ? rawState.fragments : {};
      const fragments = Object.fromEntries(
        Object.entries(rawFragments)
          .filter(([key, value]) => typeof key === "string" && Number.isFinite(value))
          .map(([key, value]) => [key, Math.max(0, Math.floor(value))])
      );
      const rawGradeFragments = rawState.gradeFragments && typeof rawState.gradeFragments === "object" ? rawState.gradeFragments : {};
      const gradeFragments = {
        ...createEmptyGradeFragments(),
        ...Object.fromEntries(
          Object.entries(rawGradeFragments)
            .filter(([key, value]) => GRADE_FRAGMENT_KEYS.includes(key) && Number.isFinite(value))
            .map(([key, value]) => [key, Math.max(0, Math.floor(value))])
        )
      };
      const releaseLog = Array.isArray(rawState.releaseLog)
        ? rawState.releaseLog.slice(-20).map((entry) => ({
            week: Number.isFinite(entry?.week) ? Math.max(1, Math.floor(entry.week)) : 1,
            wrestlerName: typeof entry?.wrestlerName === "string" ? entry.wrestlerName : "Unknown",
            grade: typeof entry?.grade === "string" ? entry.grade : "C",
            fragments: Number.isFinite(entry?.fragments) ? Math.max(0, Math.floor(entry.fragments)) : 0
          }))
        : [];
      const rawReleasedFragmentTotals = rawState.releasedFragmentTotals && typeof rawState.releasedFragmentTotals === "object" ? rawState.releasedFragmentTotals : {};
      const releasedFragmentTotals = {
        ...createEmptyGradeFragments(),

    function loadGameState() {
      const defaults = createDefaultState();
      let loadedState = defaults;
      let offlineGold = 0;

      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          loadedState = sanitizeState(JSON.parse(saved));
          purgeNonRealCWrestlersFromState(loadedState);
        }
      } catch (error) {
        console.error("저장 데이터를 불러오지 못했습니다.", error);
      }

      const now = Date.now();
      const lastSaved = Number.isFinite(loadedState.lastSaved) ? loadedState.lastSaved : now;
      const elapsedMs = Math.max(0, now - lastSaved);
      const cappedSeconds = Math.min(Math.floor(elapsedMs / 1000), 60 * 60 * 24);

      if (cappedSeconds > 0) {
        offlineGold = Math.floor(cappedSeconds * getIdleIncomePerSecond(loadedState.stage, loadedState.legacy, loadedState.promotionBrand));
        loadedState.gold += offlineGold;
      }

      gameState = loadedState;
      ensureLegacyExclusiveUnlocked(loadedState.legacy);
      if (!Array.isArray(loadedState.freeAgents) || loadedState.freeAgentsWeek !== loadedState.week) {
        loadedState.freeAgents = generateFreeAgentsForWeek();
        loadedState.freeAgentsWeek = loadedState.week;
      }

      if (!Array.isArray(loadedState.prospects) || loadedState.prospectsWeek !== loadedState.week) {
        loadedState.prospects = generateProspectScoutsForWeek();
        loadedState.prospectsWeek = loadedState.week;
      }

      loadedState.rosterLimit = Math.max(loadedState.roster.length, getRosterLimitFromState(loadedState.facilities, loadedState.legacy));
      refreshLegendOwnedRecord();
      loadedState.lastSaved = now;

      return { state: loadedState, offlineGold };
    }
    // 공용 렌더링과 토스트 동작을 정의한다.
    function normalizeToastMessage(message) {
      return String(message ?? "").replace(/^[^A-Za-z0-9가-힣]+/u, "").trim();
    }

    function inferToastType(message) {
      const normalized = String(message ?? "");
      if (/위험|부상|실패|다크사이드|파산|패배/u.test(normalized)) {
        return "danger";
      }
      if (/주의|경고/u.test(normalized)) {
        return "warning";
      }
      if (/골드|예산|수익|\bG\b/u.test(normalized)) {
        return "gold";
      }
      if (/완료|달성|승리|보상|회복|영입|획득|돌렸다/u.test(normalized)) {
        return "success";
      }
      return "info";
    }

    function showToast(message, type = "info") {
      if (!toastRootEl) {
        return;
      }
      const styles = {
        success: { icon: "✅" },
        warning: { icon: "⚠️" },
        danger: { icon: "⛔" },
        info: { icon: "ℹ️" },
        gold: { icon: "💰" }
      };
      const resolvedType = styles[type] ? type : "info";
      const toast = document.createElement("div");
      toast.className = `app-toast type-${resolvedType}`;
      toast.innerHTML = `
        <span class="app-toast-icon">${styles[resolvedType].icon}</span>
        <span class="app-toast-message">${escapeHtml(normalizeToastMessage(message))}</span>
      `;
      toastRootEl.appendChild(toast);
      setTimeout(() => {
        toast.classList.add("is-leaving");
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    }

    function showOfflinePopup(amount) {
      if (amount <= 0) {

      showToast(`자리 비운 동안 ${formatNumber(amount)} 골드를 벌었어요!`, "gold");

    function animateNumber(element, from, to, duration = 500, formatter = formatNumber) {
      if (!element) {
        return;
      }
      if (element.__numberAnimationFrame) {
        cancelAnimationFrame(element.__numberAnimationFrame);
        element.__numberAnimationFrame = null;
      }
      if (from === to) {
        element.textContent = formatter(to);
        element.style.color = "";
        return;
      }
      const start = Date.now();
      const diff = to - from;

      function update() {
        const elapsed = Date.now() - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const interpolated = from + (diff * eased);
        const current = progress >= 1 ? to : (diff > 0 ? Math.floor(interpolated) : Math.ceil(interpolated));
        element.textContent = formatter(current);
        element.style.color = diff > 0 ? "#2ecc71" : "#e74c3c";
        if (progress < 1) {
          element.__numberAnimationFrame = requestAnimationFrame(update);
        } else {
          element.style.color = "";
          element.__numberAnimationFrame = null;
        }
      }

      element.__numberAnimationFrame = requestAnimationFrame(update);
    }

    function animateNumberIfChanged(element, key, nextValue) {
      if (!element) {
        return;
      }
      const previousValue = resourceDisplayState[key];
      if (!Number.isFinite(previousValue)) {
        element.textContent = formatNumber(nextValue);
        resourceDisplayState[key] = nextValue;
        return;
      }
      if (previousValue !== nextValue) {
        element.classList.remove("pop");
        void element.offsetWidth;
        element.classList.add("pop");
        animateNumber(element, previousValue, nextValue, 560, formatNumber);
      } else {
        element.textContent = formatNumber(nextValue);
      }
      resourceDisplayState[key] = nextValue;
    }

    function ensureSoundSettings() {
      if (!gameState || typeof gameState !== "object") {
        return structuredClone(DEFAULT_SOUND_SETTINGS);
      }
      gameState.soundSettings = sanitizeSoundSettings(gameState.soundSettings);
      return gameState.soundSettings;

    function getBattleAudioPath(fileName) {
      return fileName ? `data/sounds/${fileName}` : "";
    }

    function getResolvedBgmVolume() {
      const settings = ensureSoundSettings();
      return settings.muted ? 0 : clampVolume(settings.masterVolume, DEFAULT_SOUND_SETTINGS.masterVolume) * clampVolume(settings.bgmVolume, DEFAULT_SOUND_SETTINGS.bgmVolume);
    }

    function getResolvedSfxVolume() {
      const settings = ensureSoundSettings();
      return settings.muted ? 0 : clampVolume(settings.masterVolume, DEFAULT_SOUND_SETTINGS.masterVolume) * clampVolume(settings.sfxVolume, DEFAULT_SOUND_SETTINGS.sfxVolume);
    }

    function getVolumePercentText(value) {
      return `${Math.round(clampVolume(value) * 100)}%`;
    }

    function getStageBattleBgmFile(stage = gameState?.stage || 1) {
      const settings = ensureSoundSettings();
      const stageKey = String(Math.max(1, Math.floor(stage || 1)));
      let selectedFile = settings.stageBgmSelections[stageKey];
      if (BATTLE_BGM_FILES.includes(selectedFile)) {
        return selectedFile;
      }
      selectedFile = BATTLE_BGM_FILES[Math.floor(Math.random() * BATTLE_BGM_FILES.length)] || "";
      if (!selectedFile) {
        return "";
      }
      settings.stageBgmSelections[stageKey] = selectedFile;
      if (gameState) {
        gameState.soundSettings = settings;
      }
      return selectedFile;
    }

    function syncBattleBgmVolume() {
      if (!battleSoundState.bgmAudio) {
        return;
      }
      battleSoundState.bgmAudio.volume = getResolvedBgmVolume();
      battleSoundState.bgmAudio.muted = ensureSoundSettings().muted;
    }

    function stopBattleBgm() {
      if (!battleSoundState.bgmAudio) {
        return;
      }
      battleSoundState.bgmAudio.pause();
      battleSoundState.bgmAudio.currentTime = 0;
      battleSoundState.bgmAudio = null;
      battleSoundState.bgmStage = 0;
      battleSoundState.bgmFile = "";
      battleSoundState.bgmPausedByCanvas = false;
    }

    function startBattleBgm() {
      const stage = Math.max(1, Math.floor(gameState?.stage || 1));
      const fileName = getStageBattleBgmFile(stage);
      if (!fileName) {
        return;
      }
      if (battleSoundState.bgmAudio && battleSoundState.bgmStage === stage && battleSoundState.bgmFile === fileName) {
        syncBattleBgmVolume();
        battleSoundState.bgmPausedByCanvas = false;
        battleSoundState.bgmAudio.play().catch(() => {});
        return;
      }
      stopBattleBgm();
      const audio = new Audio(getBattleAudioPath(fileName));
      audio.loop = true;
      audio.preload = "auto";
      audio.playsInline = true;
      battleSoundState.bgmAudio = audio;
      battleSoundState.bgmStage = stage;
      battleSoundState.bgmFile = fileName;
      battleSoundState.bgmPausedByCanvas = false;
      syncBattleBgmVolume();
      audio.play().catch(() => {});
      if (gameState) {
        silentSaveGameState();
      }
    }

    function pauseBattleBgm() {
      if (!battleSoundState.bgmAudio || battleSoundState.bgmAudio.paused) {
        return;
      }
      battleSoundState.bgmAudio.pause();
      battleSoundState.bgmPausedByCanvas = true;
    }

    function resumeBattleBgm() {
      if (!battleSoundState.bgmAudio || !battleSoundState.bgmPausedByCanvas || activeTab !== "home" || !matchAnimationState.running) {
        return;
      }
      syncBattleBgmVolume();
      battleSoundState.bgmPausedByCanvas = false;
      battleSoundState.bgmAudio.play().catch(() => {
        battleSoundState.bgmPausedByCanvas = true;
      });
    }

    function playBattleSfxFromFile(type) {
      const fileName = BATTLE_SFX_FILES[type] || BATTLE_SFX_FILES.basic;
      if (!fileName) {
        return false;
      }
      const resolvedVolume = getResolvedSfxVolume();
      if (resolvedVolume <= 0) {
        return true;
      }
      let baseAudio = battleSoundState.sfxCache.get(fileName);
      if (!baseAudio) {
        baseAudio = new Audio(getBattleAudioPath(fileName));
        baseAudio.preload = "auto";
        baseAudio.playsInline = true;
        battleSoundState.sfxCache.set(fileName, baseAudio);
      }
      const audio = baseAudio.cloneNode();
      audio.volume = resolvedVolume;
      audio.muted = ensureSoundSettings().muted;
      audio.play().catch(() => {});
      return true;
    }

    function primeBattleAudioAssets() {
      BATTLE_BGM_FILES.forEach((fileName) => {
        const audio = new Audio(getBattleAudioPath(fileName));
        audio.preload = "auto";
        audio.load();
      });
      Object.values(BATTLE_SFX_FILES).forEach((fileName) => {
        if (!fileName || battleSoundState.sfxCache.has(fileName)) {
          return;
        }
        const audio = new Audio(getBattleAudioPath(fileName));
        audio.preload = "auto";
        audio.playsInline = true;
        audio.load();
        battleSoundState.sfxCache.set(fileName, audio);
      });
    }

    function getWrestlerVisualStyle(wrestler, extra = "") {
      const spriteSheet = getResolvedPortraitSpriteSheet(wrestler);

    function upgradePromotionBrand(targetKey) {
      const currentIndex = getPromotionBrandIndex();
      const targetIndex = getPromotionBrandIndex(targetKey);
      const targetTier = PROMOTION_BRAND_TIERS[targetIndex];
      if (!targetTier || targetIndex !== currentIndex + 1) {
        window.alert("다음 단계만 순서대로 승급할 수 있습니다.");
        return;
      }
      if (gameState.gold < targetTier.cost) {
        window.alert("승급 비용이 부족합니다.");
        return;
      }
      gameState.gold -= targetTier.cost;
      gameState.promotionBrand = targetTier.key;
      gameState.rosterLimit = Math.max(gameState.roster.length, getRosterLimitFromState());
      showToast(`${targetTier.label} 승급 완료`, "success");
      render();
      saveGameState();
    }

    function getSpriteImage(path) {
      if (!path) {
        return null;
      }
      if (!spriteImageCache.has(path)) {
        const img = new Image();
        img.src = path;
        spriteImageCache.set(path, img);
      }
      return spriteImageCache.get(path);
    }

    function drawWrestlerSprite(ctx, x, y, img, frameIndex, totalFrames) {
      if (!img || !img.complete || !img.width || !img.height || !totalFrames) {
        return;
      }
      const frameWidth = img.width / totalFrames;
      ctx.drawImage(
        img,
        frameWidth * frameIndex,
        0,
        frameWidth,
        img.height,
        x - frameWidth / 2,
        y - img.height,
        frameWidth,
        img.height
      );
    }

    function normalizeSpriteAssetPath(path) {
      return typeof path === "string" ? path.replaceAll("\\", "/").toLowerCase() : "";
    }

    function isCustomStandSprite(entity) {
      const spritePath = normalizeSpriteAssetPath(getResolvedStandSpriteSheet(entity));
      return spritePath.includes("data/images/wrestlers/");
    }

    function drawImageFittedToFrame(ctx, img, x, y, width, height, options = {}) {
      if (!img || !img.complete || !img.width || !img.height || width <= 0 || height <= 0) {
        return null;
      }
      const alignY = options.alignY || "bottom";
      const zoom = Number.isFinite(options.zoom) ? options.zoom : 1;
      const inset = Number.isFinite(options.inset) ? options.inset : 0;
      const frameX = x + inset;
      const frameY = y + inset;
      const frameWidth = Math.max(1, width - (inset * 2));
      const frameHeight = Math.max(1, height - (inset * 2));
      const scale = Math.min(frameWidth / img.width, frameHeight / img.height) * zoom;
      const drawWidth = img.width * scale;
      const drawHeight = img.height * scale;
      const drawX = frameX + ((frameWidth - drawWidth) / 2);
      const drawY = alignY === "center"
        ? frameY + ((frameHeight - drawHeight) / 2)
        : frameY + (frameHeight - drawHeight);

      ctx.save();
      if (Number.isFinite(options.clipRadius) && options.clipRadius > 0) {
        ctx.beginPath();
        ctx.roundRect(x, y, width, height, options.clipRadius);
        ctx.clip();
      }
      ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
      ctx.restore();
      return { x: drawX, y: drawY, width: drawWidth, height: drawHeight };
    }

    function drawPortraitImage(ctx, x, y, img) {
      if (!img || !img.complete || !img.width || !img.height) {
        return;
      }
      const targetWidth = 56;
      const targetHeight = 84;
      const frameX = x - targetWidth / 2;
      const frameY = y - targetHeight;
      ctx.save();
      ctx.fillStyle = "rgba(8, 12, 18, 0.82)";
      ctx.beginPath();
      ctx.roundRect(frameX, frameY, targetWidth, targetHeight, 10);
      ctx.fill();
      ctx.restore();
      drawImageFittedToFrame(ctx, img, frameX, frameY, targetWidth, targetHeight, {
        alignY: "bottom",
        inset: 4,
        clipRadius: 10
      });

      ctx.strokeStyle = "rgba(236, 240, 241, 0.6)";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(frameX, frameY, targetWidth, targetHeight);
    }

    function drawVersusPortrait(ctx, snapshot, x, y, width, height, flip = false) {
      const portrait = getSpriteImage(getResolvedPortraitSpriteSheet(snapshot));
      const centerX = x;
      const frameY = y - height;
      ctx.save();
      if (flip) {
        ctx.translate(x, 0);
        ctx.scale(-1, 1);
        x = 0;
      }
      const frameX = x - (width / 2);
      const frameGradient = ctx.createLinearGradient(frameX, frameY, frameX, frameY + height);
      frameGradient.addColorStop(0, "rgba(7, 11, 18, 0.88)");
      frameGradient.addColorStop(1, "rgba(24, 11, 16, 0.96)");
      ctx.fillStyle = frameGradient;
      ctx.beginPath();
      ctx.roundRect(frameX, frameY, width, height, 28);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.05)";
      ctx.fillRect(frameX, frameY + height - 66, width, 66);
      if (portrait && portrait.complete && portrait.width && portrait.height) {
        drawImageFittedToFrame(ctx, portrait, frameX, frameY, width, height, {
          alignY: "bottom",
          inset: 10,
          clipRadius: 28,
          zoom: isCustomStandSprite(snapshot) ? 0.98 : 1
        });
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.roundRect(frameX, frameY, width, height, 28);
        ctx.fill();
      }
      ctx.restore();
      ctx.strokeStyle = "rgba(236, 240, 241, 0.65)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.roundRect(centerX - (width / 2), frameY, width, height, 28);
      ctx.stroke();
    }

    function getBattleSpritePath(entity) {
      if (entity?.battleSpriteSheet) {
        return entity.battleSpriteSheet;
      }
      if (entity?.spriteSheet) {
        return entity.spriteSheet;
      }
      return COMMON_BATTLE_SPRITE_ASSETS[entity?.style] || COMMON_BATTLE_SPRITE_ASSETS.powerhouse;
    }

    function getAttackSpriteKey(entity) {
      const candidates = [
        entity?.templateId,
        entity?.id,
        entity?.spriteSheet ? entity.spriteSheet.split(/[\\/]/).pop().replace(/\.[^.]+$/, "") : "",
        entity?.name ? entity.name.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "") : ""
      ];
      return candidates.find((candidate) => candidate && LEGEND_ATTACK_SPRITE_ASSETS[candidate]) || "";
    }

    function getAttackSpritePath(entity) {
      if (entity?.attackSpriteSheet) {
        return entity.attackSpriteSheet;
      }
      if (entity?.grade !== "LEGEND") {
        return "";
      }
      return LEGEND_ATTACK_SPRITE_ASSETS[getAttackSpriteKey(entity)] || "";
    }

    function isAttackSpriteState(state) {
      return state === "attack" || state === "finisher";
    }

    function getBattleSpriteFrameIndex(frame, state, totalFrames = 12) {
      if (totalFrames < 12) {
        return Math.floor(frame / 8) % Math.max(1, totalFrames);
      }
      if (state === "down") {
        return 11;
      }
      if (state === "victory") {
        return 10;
      }
      if (state === "attack") {
        return 4 + (Math.floor(frame / 6) % 3);
      }
      if (state === "finisher") {
        return 7 + (Math.floor(frame / 5) % 3);
      }
      if (state === "walk") {
        return Math.floor(frame / 6) % 4;
      }
      return 1;
    }

    function drawBattleSpriteFrame(ctx, x, y, img, frameIndex, totalFrames) {
      if (!img || !img.complete || !img.width || !img.height || !totalFrames) {
        return;
      }
      const frameWidth = img.width / totalFrames;
      const destWidth = 96;
      const destHeight = 96;
      ctx.drawImage(
        img,
        frameWidth * frameIndex,
        0,
        frameWidth,
        img.height,
        x - (destWidth / 2),
        y - destHeight,
        destWidth,
        destHeight
      );
    }

    function drawAttackSpriteFrame(ctx, x, y, img, frameIndex, totalFrames, destWidth = 128, destHeight = 176) {
      if (!img || !img.complete || !img.width || !img.height || !totalFrames) {
        return;
      }
      const safeFrameCount = Math.max(1, Math.floor(totalFrames));
      const frameWidth = img.width / safeFrameCount;
      const safeFrameIndex = ((Math.floor(frameIndex) % safeFrameCount) + safeFrameCount) % safeFrameCount;
      ctx.drawImage(
        img,
        frameWidth * safeFrameIndex,
        0,
        frameWidth,
        img.height,
        x - (destWidth / 2),
        y - destHeight,
        destWidth,
        destHeight
      );
    }

    /* 
      === 스프라이트 에셋 교체 방법 ===
      1. wrestlerData에 spriteSheet: './assets/wrestler_name.png' 추가
      2. 스프라이트 시트 규격:
         - 프레임 크기: 48x48px
         - 프레임 순서: [0]걷기1 [1]걷기2 [2]걷기3 [3]걷기4
                        [4]공격1 [5]공격2 [6]공격3
                        [7]필살기1 [8]필살기2 [9]필살기3
                        [10]승리포즈 [11]다운
      3. drawWrestler 함수가 spriteSheet 있으면 자동으로 이미지 사용
      4. 배경 투명 PNG 권장 (remove.bg 사용)
    */
    function drawWrestler(ctx, x, y, color, grade, frame, state, name) {
      const scale = 2;
      const jumpOffset = state === "victory" ? Math.abs(Math.sin(frame * 0.18)) * 10 : 0;
      const bodyY = y - jumpOffset;

      ctx.save();
      if (state === "down") {
        ctx.translate(x, bodyY - 8);
        ctx.rotate(-Math.PI / 2);
        ctx.translate(-x, -(bodyY - 8));
      }

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, bodyY - 40, (12 * scale) / 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillRect(x - 8, bodyY - 30, 16, 22);

      if (state === "attack" || state === "victory") {
        ctx.fillRect(x - 14, bodyY - 28, 6, 14);
        ctx.fillRect(x + 8, bodyY - 28, 16, 6);
      } else {
        ctx.fillRect(x - 14, bodyY - 28, 6, 14);
        ctx.fillRect(x + 8, bodyY - 28, 6, 14);
      }

      const legOffset = state === "walk" ? Math.sin(frame * 0.2) * 4 : 0;
      ctx.fillRect(x - 6, bodyY - 8, 5, 20 + legOffset);
      ctx.fillRect(x + 1, bodyY - 8, 5, 20 - legOffset);

      if (grade === "LEGEND" || grade === "S") {
        ctx.fillStyle = "#f1c40f";
        ctx.font = `${(10 * scale) / 2}px serif`;
        ctx.textAlign = "center";
        ctx.fillText(grade === "LEGEND" ? "♛" : "★", x, bodyY - 56);
      }

      ctx.restore();

      ctx.fillStyle = "#ecf0f1";
      ctx.font = '10px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText(name, x, y + 24);
    }

    function drawWrestlerVisual(ctx, wrestler, x, y, frame, state) {
      const spriteImage = getSpriteImage(getResolvedStandSpriteSheet(wrestler));
      if (spriteImage && spriteImage.complete) {
        if (wrestler.portraitMode || (wrestler.spriteFrames || 1) === 1) {
          drawPortraitImage(ctx, x, y, spriteImage);
        } else {
          drawWrestlerSprite(ctx, x, y, spriteImage, Math.floor(frame / 8) % (wrestler.spriteFrames || 4), wrestler.spriteFrames || 4);
        }
        ctx.fillStyle = "#ecf0f1";
        ctx.font = '10px "Courier New"';
        ctx.textAlign = "center";
        ctx.fillText(wrestler.name, x, y + 24);
        return;
      }
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = wrestler.spriteColor || "#7f8c8d";
      ctx.beginPath();
      ctx.arc(0, -92, 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(-24, -68, 48, 78);
      ctx.fillRect(-36, -56, 12, 54);
      ctx.fillRect(24, -56, 12, 54);
      ctx.fillRect(-22, 10, 14, 44);
      ctx.fillRect(8, 10, 14, 44);
      ctx.restore();
      ctx.fillStyle = "#ecf0f1";
      ctx.font = '10px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText(wrestler.name, x, y + 24);
    }

    function drawCrowd(ctx, intensity) {
      const dotCount = Math.floor(90 + intensity * 70);
      const crowdColors = ["#8e44ad", "#3498db", "#f1c40f", "#e74c3c", "#2ecc71", "#ecf0f1"];
      for (let index = 0; index < dotCount; index += 1) {
        ctx.fillStyle = crowdColors[index % crowdColors.length];
        const x = (index * 37) % 640;
        const y = 20 + ((index * 29) % 95);
        const size = 2 + ((index + Math.floor(intensity * 10)) % 3);
        ctx.fillRect(x, y, size, size);
      }
    }

    function drawArenaBase(ctx, hypeValue) {
      ctx.clearRect(0, 0, 640, 360);
      ctx.fillStyle = "#0d0d0d";
      ctx.fillRect(0, 0, 640, 360);

      drawCrowd(ctx, hypeValue / 100);

      ctx.fillStyle = "rgba(255,255,255,0.05)";
      ctx.fillRect(0, 120, 640, 140);

      ctx.strokeStyle = "#ecf0f1";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(40, 220);
      ctx.lineTo(600, 220);
      ctx.moveTo(40, 240);
      ctx.lineTo(600, 240);
      ctx.stroke();

      ctx.strokeStyle = "#8B4513";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(20, 250);
      ctx.lineTo(620, 250);
      ctx.stroke();

      ctx.fillStyle = "#121212";
      ctx.fillRect(140, 250, 360, 36);

      drawCanvasHypeGauge(ctx, hypeValue);
    }

    function drawCanvasHypeGauge(ctx, hypeValue) {
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(20, 16, 600, 14);
      const gradient = ctx.createLinearGradient(20, 0, 620, 0);
      gradient.addColorStop(0, "#2ecc71");
      gradient.addColorStop(0.55, "#f1c40f");
      gradient.addColorStop(1, "#e74c3c");
      ctx.fillStyle = gradient;
      ctx.fillRect(20, 16, 600 * (clamp(hypeValue, 0, 100) / 100), 14);
      ctx.fillStyle = "#ecf0f1";
      ctx.font = '11px "Courier New"';
      ctx.textAlign = "left";
      ctx.fillText(`HYPE ${hypeValue}/100`, 20, 12);
    }

    function drawIdleHomeCanvas(ctx) {
      drawArenaBase(ctx, gameState.hype);

      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(110, 140, 60, 80);
      ctx.fillRect(200, 110, 90, 110);
      ctx.fillRect(320, 90, 120, 130);
      ctx.fillRect(470, 130, 70, 90);

      ctx.fillStyle = "#ecf0f1";
      ctx.textAlign = "center";
      ctx.font = '22px "Courier New"';
      ctx.fillText(`Week ${gameState.week} - ${getHomeArenaLabel()}`, 320, 150);

      ctx.font = '13px "Courier New"';
      const lines = getHomeMatchPreviewLines();
      lines.forEach((line, index) => {
        ctx.fillText(line, 320, 286 + index * 18);
      });
    }

    function getAnimationPhaseData(elapsed) {
      const phases = [
        { key: "entrance", duration: 3000 },
        { key: "staredown", duration: 1000 },
        { key: "battle", duration: 5000 },
        { key: "finisher", duration: 2000 },
        { key: "pinfall", duration: 3000 },
        { key: "victory", duration: 2000 }
      ];

      let offset = 0;
      for (const phase of phases) {
        if (elapsed < offset + phase.duration) {
          return {
            phase: phase.key,
            progress: (elapsed - offset) / phase.duration,
            done: false
          };
        }
        offset += phase.duration;
      }

      return { phase: "complete", progress: 1, done: true };
    }

    function drawFlashOverlay(ctx, alpha) {
      ctx.fillStyle = `rgba(231, 76, 60, ${alpha})`;
      ctx.fillRect(0, 0, 640, 360);
    }

    function drawCanvasText(ctx, text, y, size, color) {
      ctx.fillStyle = color;
      ctx.font = `${size}px "Courier New"`;
      ctx.textAlign = "center";
      ctx.fillText(text, 320, y);
    }

    function drawMatchAnimationFrame(ctx, now) {
      const currentMatch = matchAnimationState.queue[matchAnimationState.matchIndex];
      if (!currentMatch) {
        finishMatchAnimation();
        return;
      }

      const elapsed = now - matchAnimationState.matchStartTime;
      const phaseData = getAnimationPhaseData(elapsed);
      if (phaseData.done) {
        matchAnimationState.matchIndex += 1;
        if (matchAnimationState.matchIndex >= matchAnimationState.queue.length) {
          finishMatchAnimation();
          return;
        }
        matchAnimationState.matchStartTime = now;
        drawMatchAnimationFrame(ctx, now);
        return;
      }

      const wrestlerA = currentMatch.wrestlerA;
      const wrestlerB = currentMatch.wrestlerB;
      const winner = currentMatch.winner;
      const loser = currentMatch.loser;
      const frame = Math.floor(now / 16);

      drawArenaBase(ctx, currentMatch.hypeAfterMatch);

      let xA = 160;
      let xB = 480;
      let yA = 250;
      let yB = 250;
      let stateA = "idle";
      let stateB = "idle";
      let hpA = winner.id === wrestlerA.id ? 0.86 : 1;
      let hpB = winner.id === wrestlerB.id ? 0.86 : 1;

      if (phaseData.phase === "entrance") {
        xA = -40 + (240 * phaseData.progress);
        xB = 680 - (240 * phaseData.progress);
        stateA = "walk";
        stateB = "walk";
        drawCanvasText(ctx, "♪ 입장음악 재생 중...", 54, 16, "#f1c40f");
      } else if (phaseData.phase === "staredown") {
        xA = 200;
        xB = 440;
        const countdown = phaseData.progress < 0.25 ? "3..." : phaseData.progress < 0.5 ? "2..." : phaseData.progress < 0.75 ? "1..." : "FIGHT!";
        drawCanvasText(ctx, countdown, 86, 28, "#e74c3c");
        if (currentMatch.styleMessage) {
          drawCanvasText(ctx, currentMatch.styleMessage, 116, 16, "#2ecc71");
        }
      } else if (phaseData.phase === "battle") {
        const attackPulse = Math.sin(frame * 0.22) * 12;
        xA = 220 + (winner.id === wrestlerA.id ? attackPulse : 0);
        xB = 420 - (winner.id === wrestlerB.id ? attackPulse : 0);
        stateA = winner.id === wrestlerA.id ? "attack" : "idle";
        stateB = winner.id === wrestlerB.id ? "attack" : "idle";
        if (loser.id === wrestlerA.id) {
          yA = 250 + phaseData.progress * 22;
          hpA = 1 - phaseData.progress;
        }
        if (loser.id === wrestlerB.id) {
          yB = 250 + phaseData.progress * 22;
          hpB = 1 - phaseData.progress;
        }
      } else if (phaseData.phase === "finisher") {
        const rush = phaseData.progress;
        if (winner.id === wrestlerA.id) {
          xA = 220 + rush * 130;
          xB = 420;
          stateA = "attack";
          stateB = "down";
          yB = 272;
        } else {
          xB = 420 - rush * 130;
          xA = 220;
          stateB = "attack";
          stateA = "down";
          yA = 272;
        }
        drawFlashOverlay(ctx, 0.18 + Math.abs(Math.sin(frame * 0.35)) * 0.25);
        drawCanvasText(ctx, `${winner.name}의 ${winner.finisher}!!!`, 94, 24, "#ffdfdf");
      } else if (phaseData.phase === "pinfall") {
        if (winner.id === wrestlerA.id) {
          xA = 280;
          xB = 380;
          stateA = "attack";
          stateB = "down";
          yB = 274;
          hpB = 0;
        } else {
          xB = 360;
          xA = 260;
          stateB = "attack";
          stateA = "down";
          yA = 274;
          hpA = 0;
        }
        const pinText = phaseData.progress < 0.33 ? "1 ..." : phaseData.progress < 0.66 ? "2 ..." : `3! ${winner.name} 승리!`;
        drawCanvasText(ctx, pinText, 90, 24, "#ecf0f1");
      } else if (phaseData.phase === "victory") {
        const stars = 3 + (winner.grade === "LEGEND" ? 2 : 1);
        if (winner.id === wrestlerA.id) {
          xA = 320;
          xB = 430;
          stateA = "victory";
          stateB = "down";
          yB = 274;
        } else {
          xB = 320;
          xA = 210;
          stateB = "victory";
          stateA = "down";
          yA = 274;
        }
        drawCrowd(ctx, 1.1);
        for (let index = 0; index < stars; index += 1) {
          const starX = 260 + index * 34 + Math.sin(frame * 0.08 + index) * 10;
          const starY = 126 + Math.cos(frame * 0.08 + index) * 12;
          ctx.fillStyle = "#f1c40f";
          ctx.font = '18px "Courier New"';
          ctx.textAlign = "center";
          ctx.fillText("✦", starX, starY);
        }
      }

      drawHpBar(ctx, xA, yA - 58, hpA, wrestlerA.name);
      drawHpBar(ctx, xB, yB - 58, hpB, wrestlerB.name);
      drawWrestlerVisual(ctx, wrestlerA, xA, yA, frame, stateA);
      drawWrestlerVisual(ctx, wrestlerB, xB, yB, frame, stateB);
    }

    function drawHpBar(ctx, x, y, hpRate) {
      ctx.fillStyle = "rgba(255,255,255,0.12)";
      ctx.fillRect(x - 28, y, 56, 6);
      ctx.fillStyle = hpRate > 0.5 ? "#2ecc71" : hpRate > 0.2 ? "#f1c40f" : "#e74c3c";
      ctx.fillRect(x - 28, y, 56 * clamp(hpRate, 0, 1), 6);
    }

    function drawCurrentCanvasFrame(now) {
      const canvas = document.getElementById("matchCanvas");
      if (!canvas) {
        return;
      }
      const ctx = canvas.getContext("2d");
      if (!ctx) {
        return;
      }

      if (titleScreenVisible) {
        drawTitleScreenCanvas(ctx, now);
        updateBattleActionPanel();
        return;
      }

      if (!matchAnimationState.running) {
        drawIdleHomeCanvas(ctx);
        updateBattleActionPanel();
        return;
      }

      const currentEntry = matchAnimationState.queue[matchAnimationState.matchIndex];
      const currentBattle = matchAnimationState.currentBattle || resolveMatchQueueEntryForAnimation(currentEntry);
      if (!currentBattle) {
        finishMatchAnimation();
        return;
      }
      matchAnimationState.currentBattle = currentBattle;

      syncBattlePlaybackState(now);
      const frame = Math.floor(now / 16);
      if (battlePlaybackState.phase === "intro") {
        drawBattleIntro(ctx, currentBattle, clamp((now - battlePlaybackState.phaseStartTime) / getBattleIntroDuration(), 0, 1), frame);
      } else if (battlePlaybackState.phase === "wait-command") {
        drawBattleCommandStandbyFrame(ctx, currentBattle, getCurrentPlayerCommandEvent(currentBattle), frame);
      } else if (battlePlaybackState.phase === "event-player" || battlePlaybackState.phase === "event-enemy") {
        const event = getActiveBattlePlaybackEvent(currentBattle);
        const timing = typeof getEventTimingProfile === "function"
          ? getEventTimingProfile(event, currentBattle)
          : null;
        drawBattleEventFrame(ctx, currentBattle, event, Math.max(0, now - battlePlaybackState.phaseStartTime), frame, timing);
        matchAnimationState.currentBattle = currentBattle;
      } else {
        drawBattleOutro(ctx, currentBattle, clamp((now - battlePlaybackState.phaseStartTime) / getBattleOutroDuration(), 0, 1), frame);
      }
      updateBattleActionPanel();
      if (battlePlaybackState.phase === "outro" && (now - battlePlaybackState.phaseStartTime) >= getBattleOutroDuration()) {
        if (isWeeklyMatchContext(currentEntry)) {
          applyBattlePackageToWeeklySession(currentEntry, currentBattle);
        }
        matchAnimationState.matchIndex += 1;
        if (matchAnimationState.matchIndex >= matchAnimationState.queue.length) {
          finishMatchAnimation();
          return;
        }
        matchAnimationState.currentBattle = resolveMatchQueueEntryForAnimation(matchAnimationState.queue[matchAnimationState.matchIndex]);
        resetBattlePlaybackState();
      }
    }

    function startMatchAnimation(matchQueue) {
      if (!matchQueue.length) {
        openWeeklyResultsModal();
        return;
      }
      primeBattleAudioAssets();
      battleCommandState = { selectedByTurn: {}, lastPanelKey: "" };
      resetBattlePlaybackState();
      startBattleBgm();
      matchAnimationState.running = true;
      matchAnimationState.queue = matchQueue;
      matchAnimationState.matchIndex = 0;
      matchAnimationState.matchStartTime = performance.now();
      matchAnimationState.currentBattle = resolveMatchQueueEntryForAnimation(matchQueue[0]);
    }

    function finishMatchAnimation() {
      autoResolveRemainingWeeklyMatches();
      stopBattleBgm();
      battleCommandState.lastPanelKey = "";
      resetBattlePlaybackState();
      matchAnimationState.running = false;
      matchAnimationState.queue = [];
      matchAnimationState.matchIndex = 0;
      matchAnimationState.currentBattle = null;
      if (typeof matchAnimationState.finishCallback === "function") {
        const callback = matchAnimationState.finishCallback;
        matchAnimationState.finishCallback = null;
        callback();
      } else {
        openWeeklyResultsModal();
      }
      render();
    }

    function skipMatchAnimation() {
      if (!matchAnimationState.running) {
        return;
      }
      autoResolveRemainingWeeklyMatches();
      finishMatchAnimation();
    }

    function stopCanvasLoop() {
      if (canvasAnimationFrameId) {
        cancelAnimationFrame(canvasAnimationFrameId);
        canvasAnimationFrameId = null;
      }
      if (matchAnimationState.running && !canvasLoopPausedAt) {
        canvasLoopPausedAt = performance.now();
      }
      pauseBattleBgm();
    }

    function startCanvasLoop() {
      if (canvasAnimationFrameId || activeTab !== "home") {
        return;
      }
      if (canvasLoopPausedAt && matchAnimationState.running) {
        matchAnimationState.matchStartTime += performance.now() - canvasLoopPausedAt;
      }
      canvasLoopPausedAt = 0;
      function frame(now) {
        drawCurrentCanvasFrame(now);
        if (activeTab !== "home") {
          canvasAnimationFrameId = null;
          return;
        }
        canvasAnimationFrameId = requestAnimationFrame(frame);
      }
      canvasAnimationFrameId = requestAnimationFrame(frame);
    }

    // STEP 4 전투 시스템 상수를 정의한다.
    const MOVE_COSTS = {
      basic: 5,
      power: 12,
      technical: 18,
      submission: 25,
      finisher: 40
    };

    const MOVE_LABELS = {
      basic: "Basic Strike",
      power: "Power Move",
      technical: "Technical Move",
      submission: "Submission",
      finisher: "Finisher"
    };

    const HIGHLIGHT_BONUS = {
      FINISHER: 12,
      CRITICAL_COMEBACK: 18,
      CLOSE_MATCH: 15,
      DOMINANT: 5
    };

    const PPV_SHOW_NAMES = ["ROYAL DYNASTY", "ELIMINATION NIGHT", "IRON CHAMPIONSHIP", "RING DYNASTY MANIA"];
    const PPV_MATCH_TYPES = ["LADDER_MATCH", "CAGE_MATCH", "IRON_MAN_MATCH"];

    // STEP 4 전용 최대 HP를 계산한다.
    function calcMaxHP(wrestler) {
      const base = 260;
      const staminaBonus = wrestler.stats.stamina * 6.2;
      const gradeMultiplier = {
        C: 1.0,
        B: 1.2,
        A: 1.5,
        S: 1.8,
        LEGEND: 2.2
      };
