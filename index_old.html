            ${getChampionshipCardsHtml()}
          </div>
          ${getRivalrySectionHtml()}
        </div>
      `;
    }

    // 캔버스용 스프라이트 캐시를 가져온다.
    function getSpriteImage(path) {
      if (!path) {
        return null;
      }
      if (!spriteImageCache.has(path)) {
        const img = new Image();
        img.src = path;
        spriteImageCache.set(path, img);
      }
      return spriteImageCache.get(path);
    }

    function drawWrestlerSprite(ctx, x, y, img, frameIndex, totalFrames) {
      if (!img || !img.complete || !img.width || !img.height || !totalFrames) {
        return;
      }
      const frameWidth = img.width / totalFrames;
      ctx.drawImage(
        img,
        frameWidth * frameIndex,
        0,
        frameWidth,
        img.height,
        x - frameWidth / 2,
        y - img.height,
        frameWidth,
        img.height
      );
    }

    function drawWrestler(ctx, x, y, color, grade, frame, state, name) {
      const scale = 2;
      const jumpOffset = state === "victory" ? Math.abs(Math.sin(frame * 0.2)) * 10 : 0;
      const legOffset = state === "walk" || state === "attack" ? Math.sin(frame * 0.2) * 4 : 0;
      const bodyY = y - jumpOffset;

      ctx.save();
      if (state === "down") {
        ctx.translate(x, bodyY - 8);
        ctx.rotate(-Math.PI / 2);
        ctx.translate(-x, -(bodyY - 8));
      }

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, bodyY - 40, 12 * scale / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(x - 8, bodyY - 30, 16, 22);

      if (state === "attack" || state === "victory") {
        ctx.fillRect(x - 14, bodyY - 28, 6, 14);
        ctx.fillRect(x + 8, bodyY - 28, 16, 6);
      } else {
        ctx.fillRect(x - 14, bodyY - 28, 6, 14);
        ctx.fillRect(x + 8, bodyY - 28, 6, 14);
      }

      ctx.fillRect(x - 6, bodyY - 8, 5, 20 + legOffset);
      ctx.fillRect(x + 1, bodyY - 8, 5, 20 - legOffset);

      if (grade === "LEGEND" || grade === "S") {
        ctx.fillStyle = "#f1c40f";
        ctx.font = `${10 * scale / 2}px serif`;
        ctx.textAlign = "center";
        ctx.fillText(grade === "LEGEND" ? "♛" : "★", x, bodyY - 56);
      }
      ctx.restore();

      ctx.fillStyle = "#ecf0f1";
      ctx.font = '10px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText(name, x, y + 24);
    }

    function drawBattleWrestler(ctx, snapshot, x, y, frame, state, flip = false) {
      const staminaRatio = snapshot.currentStamina / snapshot.maxStamina;
      const opacity = staminaRatio <= 0.3 ? 0.8 : 1;
      const shake = staminaRatio <= 0.1 ? Math.sin(frame * 0.55) * 2.5 : 0;
      const spriteImage = getSpriteImage(snapshot.spriteSheet);
      const battleSpriteImage = getSpriteImage(getBattleSpritePath(snapshot));
      const totalBattleFrames = snapshot.battleSpriteFrames || 12;

      ctx.save();
      ctx.globalAlpha = opacity;
      if (flip) {
        ctx.translate(x, 0);
        ctx.scale(-1, 1);
        x = 0;
      }

      if (battleSpriteImage && battleSpriteImage.complete && battleSpriteImage.width && battleSpriteImage.height) {
        const stateForFrame = state === "attack" && snapshot.finisherGauge >= 100 ? "finisher" : state;
        const frameIndex = getBattleSpriteFrameIndex(frame, stateForFrame, totalBattleFrames);
        drawBattleSpriteFrame(ctx, x + shake, y, battleSpriteImage, frameIndex, totalBattleFrames);
        ctx.fillStyle = "#ecf0f1";
        ctx.font = '10px "Courier New"';
        ctx.textAlign = "center";
        ctx.fillText(snapshot.name, x + shake, y + 24);
      } else if (spriteImage && spriteImage.complete) {
        drawWrestlerVisual(ctx, snapshot, x + shake, y, frame, state);
      } else {
        drawWrestler(ctx, x + shake, y, snapshot.spriteColor, snapshot.grade, frame, state, snapshot.name);
      }
      ctx.restore();
    }

    function drawCrowd(ctx, hypeValue, frame) {
      const colors = ["#7f8c8d", "#3498db", "#e74c3c", "#f1c40f", "#2ecc71", "#ecf0f1"];
      const baseAlpha = 0.35 + ((hypeValue / 100) * 0.65);
      for (let index = 0; index < 100; index += 1) {
        const x = (index * 41) % 640;
        const y = 18 + ((index * 23) % 92);
        const pulse = hypeValue >= 90 ? Math.sin((frame * 0.03) + index) * 0.15 : 0;
        ctx.fillStyle = colors[index % colors.length];
        ctx.globalAlpha = clamp(baseAlpha + pulse, 0.2, 1);
        ctx.fillRect(x, y, 2 + (index % 2), 2 + ((index + 1) % 2));
      }
      ctx.globalAlpha = 1;
    }

    function drawHypeHeader(ctx, hypeValue) {
      ctx.fillStyle = "#222";
      ctx.fillRect(0, 0, 640, 4);
      ctx.fillStyle = hypeValue >= 70 ? "#f1c40f" : "#7f8c8d";
      ctx.fillRect(0, 0, 640 * (clamp(hypeValue, 0, 100) / 100), 4);
    }

    function drawCanvasImageCover(ctx, imagePath, alpha = 1) {
      const image = getSpriteImage(imagePath);
      if (!image || !image.complete || !image.width || !image.height) {
        return false;
      }
      const scale = Math.max(640 / image.width, 360 / image.height);
      const width = image.width * scale;
      const height = image.height * scale;
      const x = (640 - width) / 2;
      const y = (360 - height) / 2;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.drawImage(image, x, y, width, height);
      ctx.restore();
      return true;
    }

    function drawCanvasImageContain(ctx, imagePath, x, y, width, height, alpha = 1) {
      const image = getSpriteImage(imagePath);
      if (!image || !image.complete || !image.width || !image.height) {
        return false;
      }
      const scale = Math.min(width / image.width, height / image.height);
      const drawWidth = image.width * scale;
      const drawHeight = image.height * scale;
      const drawX = x + ((width - drawWidth) / 2);
      const drawY = y + ((height - drawHeight) / 2);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.drawImage(image, drawX, drawY, drawWidth, drawHeight);
      ctx.restore();
      return true;
    }

    function drawBattleArena(ctx, hypeValue, frame, matchMode = true) {
      ctx.clearRect(0, 0, 640, 360);
      ctx.fillStyle = "#0d0d0d";
      ctx.fillRect(0, 0, 640, 360);
      if (matchMode) {
        const hasRingArt = drawCanvasImageCover(ctx, getBattleRingImagePath(), 0.96);
        if (hasRingArt) {
          ctx.fillStyle = "rgba(8, 10, 16, 0.18)";
          ctx.fillRect(0, 0, 640, 360);
        } else {
          drawCrowd(ctx, hypeValue, frame);
          ctx.strokeStyle = "#ecf0f1";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(40, 210);
          ctx.lineTo(600, 210);
          ctx.moveTo(40, 220);
          ctx.lineTo(600, 220);
          ctx.stroke();

          ctx.strokeStyle = "#8B4513";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(20, 230);
          ctx.lineTo(620, 230);
          ctx.stroke();
        }
      } else {
        const hasArenaArt = drawCanvasImageCover(ctx, getStageArenaImagePath(), 0.72);
        if (hasArenaArt) {
          ctx.fillStyle = "rgba(8, 12, 20, 0.35)";
          ctx.fillRect(0, 0, 640, 360);
        }
        drawCrowd(ctx, hypeValue, frame);

        ctx.strokeStyle = "#ecf0f1";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(40, 210);
        ctx.lineTo(600, 210);
        ctx.moveTo(40, 220);
        ctx.lineTo(600, 220);
        ctx.stroke();

        ctx.strokeStyle = "#8B4513";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(20, 230);
        ctx.lineTo(620, 230);
        ctx.stroke();
      }
    }

    /* 
      === 배경 이미지 교체 방법 ===
      gameState.stage 값에 따라 아래 이미지 교체:
      stage 1: './assets/bg_indie.png'
      stage 2: './assets/bg_arena.png'
      stage 3: './assets/bg_stadium.png'
      stage 4: './assets/bg_ppv.png'
      Canvas drawImage()로 전체 배경에 렌더링
    */
    function drawTitleScreenCanvas(ctx, now) {
      ctx.clearRect(0, 0, 640, 360);
      ctx.fillStyle = "#0d0d0d";
      ctx.fillRect(0, 0, 640, 360);
      drawCanvasImageCover(ctx, GENERATED_UI_ASSETS.panels.title, 0.82);
      drawCanvasImageCover(ctx, getShowLogisticsPath(SHOW_LOGISTICS_ASSETS.title), 0.58);
      drawCanvasImageCover(ctx, getShowLogisticsPath(SHOW_LOGISTICS_ASSETS.titleAccent), 0.18);
      ctx.fillStyle = "rgba(6, 10, 18, 0.48)";
      ctx.fillRect(0, 0, 640, 360);
      ctx.strokeStyle = "rgba(231, 76, 60, 0.45)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(60, 170);
      ctx.lineTo(580, 170);
      ctx.moveTo(60, 192);
      ctx.lineTo(580, 192);
      ctx.stroke();

      for (let index = 0; index < 24; index += 1) {
        const x = 40 + (index * 25);
        const y = 40 + (Math.sin((now / 500) + index) * 8);
        ctx.fillStyle = index % 2 === 0 ? "rgba(241, 196, 15, 0.7)" : "rgba(236, 240, 241, 0.5)";
        ctx.fillRect(x, y, 3, 3);
      }

      drawCanvasImageContain(ctx, GENERATED_UI_ASSETS.logo, 100, 48, 440, 98, 1);
      ctx.fillStyle = "#ecf0f1";
      ctx.textAlign = "center";
      ctx.font = '14px "Courier New"';
      ctx.fillText("Build your promotion. Defend your legacy.", 320, 150);
    }

    function drawIdleHomeCanvas(ctx) {
      drawBattleArena(ctx, gameState.hype, performance.now() / 16, false);
      drawHypeHeader(ctx, gameState.hype);

      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(110, 130, 60, 90);
      ctx.fillRect(200, 105, 90, 115);
      ctx.fillRect(320, 90, 120, 130);
      ctx.fillRect(470, 125, 70, 95);

      ctx.fillStyle = "#ecf0f1";
      ctx.textAlign = "center";
      ctx.font = '20px "Courier New"';
      ctx.fillText(`Week ${gameState.week} - ${getHomeArenaLabel()}`, 320, 150);
      ctx.font = '12px "Courier New"';
      getHomeMatchPreviewLines().forEach((line, index) => {
        ctx.fillText(line, 320, 290 + (index * 18));
      });
    }

    function drawBattleHpBar(ctx, x, y, width, snapshot, alignRight = false) {
      const hpRatio = clamp(snapshot.currentHP / snapshot.maxHP, 0, 1);
      const gradient = ctx.createLinearGradient(x, 0, x + width, 0);
      gradient.addColorStop(0, hpRatio > 0.5 ? "#2ecc71" : hpRatio > 0.2 ? "#f39c12" : "#e74c3c");
      gradient.addColorStop(1, "#e74c3c");

      ctx.strokeStyle = "#333";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, width, 14);
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(x, y, width, 14);
      ctx.fillStyle = gradient;
      ctx.fillRect(x, y, width * hpRatio, 14);

      ctx.fillStyle = "#ecf0f1";
      ctx.font = '10px "Courier New"';
      ctx.textAlign = alignRight ? "right" : "left";
      ctx.fillText(snapshot.name, alignRight ? x + width : x, y - 2);
      ctx.fillStyle = "#95a5a6";
      ctx.font = '9px "Courier New"';
      ctx.fillText(`${Math.floor(snapshot.currentHP)} / ${Math.floor(snapshot.maxHP)}`, alignRight ? x + width : x, y + 26);
    }

    function drawBattleSubBar(ctx, x, y, width, value, maxValue, color, ready = false) {
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(x, y, width, 7);
      ctx.fillStyle = color;
      ctx.fillRect(x, y, width * clamp(value / maxValue, 0, 1), 7);
      if (ready) {
        ctx.strokeStyle = "#ffffff";
        ctx.strokeRect(x - 1, y - 1, width + 2, 9);
      }
    }

    function drawMomentumBar(ctx, leftSnapshot, rightSnapshot) {
      const x = 10;
      const y = 56;
      const width = 620;
      const leftWidth = width * (leftSnapshot.momentum / 100);
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(x, y, width, 8);
      ctx.fillStyle = "#3498db";
      ctx.fillRect(x, y, leftWidth, 8);
      ctx.fillStyle = "#e74c3c";
      ctx.fillRect(x + leftWidth, y, width - leftWidth, 8);
      ctx.fillStyle = "#ecf0f1";
      ctx.fillRect(x + leftWidth - 1, y - 1, 2, 10);
      ctx.font = '9px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText("◀ MOMENTUM ▶", 320, 53);
    }

    function drawBattleLog(ctx, event) {
      ctx.fillStyle = "#bdc3c7";
      ctx.font = '11px "Courier New"';
      ctx.textAlign = "left";
      ctx.fillText(event.actionText || "", 14, 295);
      ctx.fillText(event.resultText || "", 14, 315);
      ctx.fillStyle = "#7f8c8d";
      ctx.textAlign = "right";
      ctx.font = '10px "Courier New"';
      ctx.fillText(`TURN ${event.turn} / 60`, 628, 345);
    }

    function drawBurstParticles(ctx, x, y, colors, count, progress, spread, sizeMin, sizeMax) {
      for (let index = 0; index < count; index += 1) {
        const angle = (Math.PI * 2 * index) / count;
        const distance = spread * progress * (0.7 + ((index % 3) * 0.2));
        const size = sizeMin + ((index % 3) * ((sizeMax - sizeMin) / 2));
        ctx.globalAlpha = 1 - progress;
        ctx.fillStyle = colors[index % colors.length];
        ctx.beginPath();
        ctx.arc(x + Math.cos(angle) * distance, y + Math.sin(angle) * distance, size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawOrbitStars(ctx, x, y, frame) {
      ctx.fillStyle = "#f1c40f";
      ctx.font = '12px "Courier New"';
      ctx.textAlign = "center";
      for (let index = 0; index < 3; index += 1) {
        const angle = (frame * 0.08) + (index * (Math.PI * 2 / 3));
        ctx.fillText("★", x + Math.cos(angle) * 16, y - 62 + Math.sin(angle) * 8);
      }
    }

    function drawEventTextEffects(ctx, event, progress, attackerX, defenderX, defenderY) {
      if (event.damage > 0 && progress > 0.2 && progress < 0.85) {
        const rise = (progress - 0.2) * 40;
        ctx.fillStyle = event.isCrit ? "#f1c40f" : "#ecf0f1";
        ctx.font = `${event.isCrit ? 28 : event.type === "finisher" ? 36 : 20}px "Courier New"`;
        ctx.textAlign = "center";
        ctx.fillText(`-${event.damage}`, defenderX, defenderY - 60 - rise);
        if (event.isCrit) {
          ctx.fillText("CRITICAL!", defenderX, defenderY - 88 - rise);
        }
      }

      if (event.type === "miss") {
        ctx.fillStyle = "#ecf0f1";
        ctx.font = '18px "Courier New"';
        ctx.textAlign = "center";
        ctx.fillText(event.resultText, defenderX, defenderY - 72);
      }

      if (event.moveType === "power" || event.moveType === "technical") {
        ctx.fillStyle = event.moveType === "technical" ? "#7ed6ff" : "#ecf0f1";
        ctx.font = `${event.moveType === "technical" ? 16 : 14}px "Courier New"`;
        ctx.textAlign = "center";
        ctx.fillText(`${event.moveName}!`, attackerX, 188);
      }

      if (event.type === "finisher") {
        ctx.fillStyle = "#e74c3c";
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.font = '32px "Courier New"';
        ctx.textAlign = "center";
        ctx.strokeText(`${event.moveName}!!!`, 320 + (Math.sin(progress * 30) * 2), 170);
        ctx.fillText(`${event.moveName}!!!`, 320 + (Math.sin(progress * 30) * 2), 170);
      }

      if (event.pinResult) {
        ctx.fillStyle = "#ecf0f1";
        ctx.font = '24px "Courier New"';
        ctx.textAlign = "center";
        if (progress < 0.33) {
          ctx.fillText("1 ...", 320, 110);
        } else if (progress < 0.66) {
          ctx.fillText("2 ...", 320, 110);
        } else {
          ctx.fillText(event.pinResult.pinText, 320, 110);
        }
      }
    }

    function drawDebugOverlay(ctx, leftSnapshot, rightSnapshot, event) {
      if (!DEBUG_MODE) {
        return;
      }
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(122, 72, 398, 58);
      ctx.fillStyle = "#ecf0f1";
      ctx.font = '10px "Courier New"';
      ctx.textAlign = "left";
      ctx.fillText(`A HP:${Math.floor(leftSnapshot.currentHP)} ST:${Math.floor(leftSnapshot.currentStamina)} FG:${Math.floor(leftSnapshot.finisherGauge)} MO:${Math.floor(leftSnapshot.momentum)}`, 128, 88);
      ctx.fillText(`B HP:${Math.floor(rightSnapshot.currentHP)} ST:${Math.floor(rightSnapshot.currentStamina)} FG:${Math.floor(rightSnapshot.finisherGauge)} MO:${Math.floor(rightSnapshot.momentum)}`, 128, 102);
      ctx.fillText(`TURN:${event.turn} ACTION:${event.moveType} DMG:${event.damage} RESULT:${event.resultText}`, 128, 116);
    }

    function drawBattleEventFrame(ctx, battlePackage, event, progress, frame) {
      const leftSnapshot = progress < 0.5 ? event.beforeLeft : event.afterLeft;
      const rightSnapshot = progress < 0.5 ? event.beforeRight : event.afterRight;
      const hypeValue = event.hypeAfter;
      const attackerIsLeft = event.attackerId === leftSnapshot.id;

      drawBattleArena(ctx, hypeValue, frame, true);
      drawHypeHeader(ctx, hypeValue);
      drawBattleHpBar(ctx, 10, 10, 220, leftSnapshot, false);
      drawBattleHpBar(ctx, 410, 10, 220, rightSnapshot, true);
      drawBattleSubBar(ctx, 10, 30, 220, leftSnapshot.currentStamina, leftSnapshot.maxStamina, "#3498db");
      drawBattleSubBar(ctx, 410, 30, 220, rightSnapshot.currentStamina, rightSnapshot.maxStamina, "#3498db");
      drawBattleSubBar(ctx, 10, 42, 220, leftSnapshot.finisherGauge, 100, leftSnapshot.finisherGauge >= 100 ? "#e74c3c" : leftSnapshot.finisherGauge >= 50 ? "#9b59b6" : "#555", leftSnapshot.finisherGauge >= 100);
      drawBattleSubBar(ctx, 410, 42, 220, rightSnapshot.finisherGauge, 100, rightSnapshot.finisherGauge >= 100 ? "#e74c3c" : rightSnapshot.finisherGauge >= 50 ? "#9b59b6" : "#555", rightSnapshot.finisherGauge >= 100);
      drawMomentumBar(ctx, leftSnapshot, rightSnapshot);

      if (leftSnapshot.finisherGauge >= 100) {
        ctx.fillStyle = "#e74c3c";
        ctx.font = '9px "Courier New"';
        ctx.textAlign = "left";
        ctx.fillText("FINISHER READY!", 10, 58);
      }
      if (rightSnapshot.finisherGauge >= 100) {
        ctx.fillStyle = "#e74c3c";
        ctx.font = '9px "Courier New"';
        ctx.textAlign = "right";
        ctx.fillText("FINISHER READY!", 630, 58);
      }

      let leftX = 160;
      let rightX = 480;
      let leftY = 230;
      let rightY = 230;
      let leftState = leftSnapshot.isDown ? "down" : "idle";
      let rightState = rightSnapshot.isDown ? "down" : "idle";
      const swing = progress < 0.55 ? Math.sin(progress * Math.PI) * 24 : 0;

      if (event.type === "rest" || event.type === "stunned") {
        leftState = leftSnapshot.isDown ? "down" : "idle";
        rightState = rightSnapshot.isDown ? "down" : "idle";
      } else if (attackerIsLeft) {
        leftX += swing;
        leftState = event.type === "finisher" || event.moveType === "power" || event.moveType === "technical" ? "attack" : "walk";
        if (event.pinResult || rightSnapshot.isDown) {
          rightState = "down";
          rightY += 18;
        }
      } else {
        rightX -= swing;
        rightState = event.type === "finisher" || event.moveType === "power" || event.moveType === "technical" ? "attack" : "walk";
        if (event.pinResult || leftSnapshot.isDown) {
          leftState = "down";
          leftY += 18;
        }
      }

      drawBattleWrestler(ctx, leftSnapshot, leftX, leftY, frame, leftState, false);
      drawBattleWrestler(ctx, rightSnapshot, rightX, rightY, frame, rightState, true);

      if (leftSnapshot.isDown) {
        drawOrbitStars(ctx, leftX, leftY, frame);
      }
      if (rightSnapshot.isDown) {
        drawOrbitStars(ctx, rightX, rightY, frame);
      }

      if (event.type === "pin" || event.type === "finisher") {
        ctx.fillStyle = "#e74c3c";
        ctx.font = '26px "Courier New"';
        ctx.textAlign = "center";
        ctx.fillText("DOWN!", 320, 145);
      }

      if (event.isCrit) {
        drawBurstParticles(ctx, attackerIsLeft ? rightX : leftX, attackerIsLeft ? rightY - 30 : leftY - 30, ["#f1c40f"], 8, progress, 28, 2, 4);
      }
      if (event.type === "finisher") {
        drawBurstParticles(ctx, 320, 180, ["#e74c3c", "#f1c40f"], 40, progress, 120, 3, 8);
        ctx.fillStyle = `rgba(231, 76, 60, ${0.18 + ((1 - progress) * 0.25)})`;
        ctx.fillRect(0, 0, 640, 360);
      }
      if (event.pinResult && event.pinResult.escapedAt > 0) {
        drawBurstParticles(ctx, attackerIsLeft ? rightX : leftX, attackerIsLeft ? rightY - 40 : leftY - 40, ["#2ecc71"], 15, progress, 38, 2, 4);
      }
      if (hypeValue >= 90) {
        drawBurstParticles(ctx, 320, 20, ["#e74c3c", "#3498db", "#f1c40f", "#2ecc71", "#ecf0f1"], 5, progress, 90, 2, 3);
      }

      drawEventTextEffects(ctx, event, progress, attackerIsLeft ? leftX : rightX, attackerIsLeft ? rightX : leftX, attackerIsLeft ? rightY : leftY);
      drawBattleLog(ctx, event);
      drawDebugOverlay(ctx, leftSnapshot, rightSnapshot, event);

      const staminaWarning = attackerIsLeft
        ? getStaminaStateLabel(leftSnapshot.currentStamina)
        : getStaminaStateLabel(rightSnapshot.currentStamina);
      if (staminaWarning) {
        ctx.fillStyle = "#f1c40f";
        ctx.font = '16px "Courier New"';
        ctx.textAlign = "center";
        ctx.fillText(staminaWarning, 320, 190);
      }
    }

    function drawBattleIntro(ctx, battlePackage, progress, frame) {
      drawBattleArena(ctx, gameState.hype, frame, true);
      drawHypeHeader(ctx, gameState.hype);
      const leftSnapshot = snapshotBattleState(battlePackage.leftState);
      const rightSnapshot = snapshotBattleState(battlePackage.rightState);
      const slideProgress = clamp(progress / 0.68, 0, 1);
      const leftX = -170 + (430 * slideProgress);
      const rightX = 810 - (430 * slideProgress);

      ctx.fillStyle = "rgba(3, 5, 10, 0.46)";
      ctx.fillRect(0, 0, 640, 360);
      drawCanvasImageCover(ctx, "data/images/ui/panels/vs_overlay.png", 0.85);

      drawVersusPortrait(ctx, leftSnapshot, leftX, 312, 180, 244, false);
      drawVersusPortrait(ctx, rightSnapshot, rightX, 312, 180, 244, true);

      ctx.fillStyle = "#ecf0f1";
      ctx.font = '18px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText(leftSnapshot.name, 170, 300);
      ctx.fillText(rightSnapshot.name, 470, 300);
      ctx.font = '12px "Courier New"';
      ctx.fillStyle = "#bdc3c7";
      ctx.fillText(`"${leftSnapshot.nickname || ""}"`, 170, 322);
      ctx.fillText(`"${rightSnapshot.nickname || ""}"`, 470, 322);

      if (progress > 0.40) {
        ctx.fillStyle = "#ffffff";
        ctx.strokeStyle = "#b42020";
        ctx.lineWidth = 3;
        ctx.font = '46px "Courier New"';
        ctx.strokeText("VS", 320, 176);
        ctx.fillText("VS", 320, 176);
      }
      if (progress > 0.78) {
        ctx.fillStyle = "#f1c40f";
        ctx.font = '30px "Courier New"';
        ctx.fillText("FIGHT!", 320, 112);
      }
    }

    function drawBattleOutro(ctx, battlePackage, progress, frame) {
      const lastEvent = battlePackage.battleEvents[battlePackage.battleEvents.length - 1];
      const leftSnapshot = lastEvent ? lastEvent.afterLeft : snapshotBattleState(battlePackage.leftState);
      const rightSnapshot = lastEvent ? lastEvent.afterRight : snapshotBattleState(battlePackage.rightState);
      const winnerId = battlePackage.battleResult.winnerId;
      const leftWin = winnerId === leftSnapshot.id;

      drawBattleArena(ctx, clamp(gameState.hype + battlePackage.battleResult.hypeGenerated, 0, 100), frame, true);
      drawHypeHeader(ctx, clamp(gameState.hype + battlePackage.battleResult.hypeGenerated, 0, 100));
      drawBattleHpBar(ctx, 10, 10, 220, leftSnapshot, false);
      drawBattleHpBar(ctx, 410, 10, 220, rightSnapshot, true);
      drawBattleSubBar(ctx, 10, 30, 220, leftSnapshot.currentStamina, leftSnapshot.maxStamina, "#3498db");
      drawBattleSubBar(ctx, 410, 30, 220, rightSnapshot.currentStamina, rightSnapshot.maxStamina, "#3498db");
      drawBattleSubBar(ctx, 10, 42, 220, leftSnapshot.finisherGauge, 100, "#555");
      drawBattleSubBar(ctx, 410, 42, 220, rightSnapshot.finisherGauge, 100, "#555");
      drawMomentumBar(ctx, leftSnapshot, rightSnapshot);

      drawBattleWrestler(ctx, leftSnapshot, leftWin ? 200 : 430, leftWin ? 220 : 248, frame, leftWin ? "victory" : "down", false);
      drawBattleWrestler(ctx, rightSnapshot, leftWin ? 480 : 320, leftWin ? 248 : 220, frame, leftWin ? "down" : "victory", true);
      drawBurstParticles(ctx, 320, 170, ["#e74c3c", "#f1c40f"], 40, progress, 100, 3, 7);

      ctx.fillStyle = "#f1c40f";
      ctx.font = '28px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText(`${leftWin ? leftSnapshot.name : rightSnapshot.name} 승리!`, 320, 140);
      if (battlePackage.battleResult.finishType !== "TIME_LIMIT") {
        const winnerSnapshot = leftWin ? leftSnapshot : rightSnapshot;
        ctx.fillStyle = "#ecf0f1";
        ctx.font = '14px "Courier New"';
        ctx.fillText(`${winnerSnapshot.finisher}으로 결정!`, 320, 165);
      }
    }

    function drawBattlePackageFrame(ctx, battlePackage, elapsed, frame) {
      const introDuration = 3000;
      const eventDuration = 1800;
      const outroDuration = 4000;
      const eventsDuration = battlePackage.battleEvents.length * eventDuration;

      if (elapsed < introDuration) {
        drawBattleIntro(ctx, battlePackage, elapsed / introDuration, frame);
        return false;
      }

      if (elapsed < introDuration + eventsDuration) {
        const localElapsed = elapsed - introDuration;
        const eventIndex = Math.min(battlePackage.battleEvents.length - 1, Math.floor(localElapsed / eventDuration));
        const event = battlePackage.battleEvents[eventIndex];
        const progress = (localElapsed % eventDuration) / eventDuration;
        drawBattleEventFrame(ctx, battlePackage, event, progress, frame);
        matchAnimationState.currentBattle = battlePackage;
        return false;
      }

      if (elapsed < introDuration + eventsDuration + outroDuration) {
        drawBattleOutro(ctx, battlePackage, (elapsed - introDuration - eventsDuration) / outroDuration, frame);
        return false;
      }

      return true;
    }

    function drawCurrentCanvasFrame(now) {
      const canvas = document.getElementById("matchCanvas");
      if (!canvas) {
        return;
      }
      const ctx = canvas.getContext("2d");
      if (!ctx) {
        return;
      }

      if (titleScreenVisible) {
        drawTitleScreenCanvas(ctx, now);
        return;
      }

      if (!matchAnimationState.running) {
        drawIdleHomeCanvas(ctx);
        return;
      }

      const currentBattle = matchAnimationState.queue[matchAnimationState.matchIndex];
      if (!currentBattle) {
        finishMatchAnimation();
        return;
      }

      const battleFinished = drawBattlePackageFrame(ctx, currentBattle, now - matchAnimationState.matchStartTime, Math.floor(now / 16));
      if (battleFinished) {
        matchAnimationState.matchIndex += 1;
        if (matchAnimationState.matchIndex >= matchAnimationState.queue.length) {
          finishMatchAnimation();
          return;
        }
        matchAnimationState.matchStartTime = now;
        matchAnimationState.currentBattle = matchAnimationState.queue[matchAnimationState.matchIndex];
      }
    }

    function startMatchAnimation(matchQueue) {
      if (!matchQueue.length) {
        openWeeklyResultsModal();
        return;
      }
      matchAnimationState.running = true;
      matchAnimationState.queue = matchQueue;
      matchAnimationState.matchIndex = 0;
      matchAnimationState.matchStartTime = performance.now();
      matchAnimationState.currentBattle = matchQueue[0];
    }

    function finishMatchAnimation() {
      matchAnimationState.running = false;
      matchAnimationState.queue = [];
      matchAnimationState.matchIndex = 0;
      matchAnimationState.currentBattle = null;
      if (typeof matchAnimationState.finishCallback === "function") {
        const callback = matchAnimationState.finishCallback;
        matchAnimationState.finishCallback = null;
        callback();
      } else {
        openWeeklyResultsModal();
      }
      render();
    }

    function skipMatchAnimation() {
      if (!matchAnimationState.running) {
        return;
      }
      finishMatchAnimation();
    }

    function startCanvasLoop() {
      function frame(now) {
        drawCurrentCanvasFrame(now);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    function getGradeCssClass(grade) {
      return {
        C: "grade-c",
        B: "grade-b",
        A: "grade-a",
        S: "grade-s",
        LEGEND: "grade-legend"
      }[grade] || "grade-c";
    }

    function getFragmentExchangeEntries() {
      return wrestlerPool
        .slice()
        .sort((left, right) => gradeRank(right.grade) - gradeRank(left.grade) || left.name.localeCompare(right.name));
    }

    function getFacilityDescription(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      if (facilityKey === "gym" || facilityKey === "matRoom" || facilityKey === "prStudio") {
        return `훈련 슬롯 ${facility.slots || 0}개 · 속도 x${(facility.speedBonus || 1).toFixed(2)}`;
      }
      if (facilityKey === "medical") {
        return `부상 회복 x${(facility.healSpeed || 1).toFixed(1)} · 예방 ${(facility.prevention || 0) * 100}%`;
      }
      if (facilityKey === "scoutTeam") {
        return `주당 후보 ${facility.weeklyCandidates || 3}명 · 최고 ${facility.maxGrade || "B"}급`;
      }
      if (facilityKey === "tvStudio") {
        return `주당 TV 보너스 +${formatNumber(facility.tvBonus || 0)}G`;
      }
      if (facilityKey === "rosterOffice") {
        return `선수단 한도 ${facility.rosterLimit || gameState.rosterLimit}명`;
      }
      return "";
    }

    function getFacilityCurrentEffectText(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      if (facilityKey === "prStudio") {
        return `팬 수익 +${Math.round((facility.incomeBonus || 0) * 100)}% · 주당 인기도 +${facility.weeklyFame || 0}`;
      }
      if (facilityKey === "rosterOffice") {
        return `로스터 한도 ${facility.rosterLimit || gameState.rosterLimit}명`;
      }
      return getFacilityDescription(facilityKey);
    }

    function handleGradeFragmentSummon(grade) {
      if (!GRADE_FRAGMENT_KEYS.includes(grade)) {
        return;
      }
      if (gameState.roster.length >= gameState.rosterLimit) {
        openRosterFullModal();
        return;
      }
      const cost = getFragmentCostByGrade(grade);
      if (!spendGradeFragments(grade, cost)) {
        window.alert("조각이 부족합니다.");
        return;
      }
      const pool = wrestlerPool.filter((wrestler) => wrestler.grade === grade);
      const selected = structuredClone(pickRandom(pool));
      if (gameState.roster.some((wrestler) => wrestler.templateId === selected.id)) {
        addFragments(selected.id, getDuplicateFragmentReward(grade));
      } else {
        addRosterMember(createWrestler({
          ...selected,
          id: createWrestlerId("w"),
          templateId: selected.id,
          joinedWeek: gameState.week,
          status: "idle",
          injuryWeeks: 0,
          wins: 0,
          losses: 0
        }));
      }
      render();
      saveGameState();
    }

    function handleGradeFragmentUpgrade(fromGrade) {
      const rule = getGradeFragmentConvertRequirement(fromGrade);
      if (!rule || !spendGradeFragments(fromGrade, rule.cost)) {
        return;
      }
      addGradeFragments(rule.targetGrade, 1);
      render();
      saveGameState();
    }

    function handleSpecificFragmentSummon(templateId) {
      const target = getPoolWrestlerByTemplateId(templateId);
      if (!target) {
        return;
      }
      const current = Number(gameState.fragments[templateId] || 0);
      if (current < 40) {
        window.alert("선수 조각이 부족합니다.");
        return;
      }
      gameState.fragments[templateId] = current - 40;
      const owned = gameState.roster.find((wrestler) => wrestler.templateId === templateId);
      if (owned) {
        ["power", "stamina", "technique", "charisma", "fame"].forEach((statKey) => {
          owned.stats[statKey] = clamp((owned.stats[statKey] || 0) + 2, 1, getAdjustedStatCap(owned));
        });
      } else {
        if (gameState.roster.length >= gameState.rosterLimit) {
          openRosterFullModal();
          gameState.fragments[templateId] += 40;
          return;
        }
        addRosterMember(createWrestler({
          ...structuredClone(target),
          id: createWrestlerId("w"),
          templateId: target.id,
          joinedWeek: gameState.week,
          status: "idle",
          injuryWeeks: 0,
          wins: 0,
          losses: 0
        }));
      }
      render();
      saveGameState();
    }

            ${rosterOverflow ? `<div class="gacha-small-text" style="color:#ffe28a;margin-top:8px;">로스터가 가득 차 ${GRADE_FRAGMENT_LABELS[result.grade]} ${result.overflowReward || 0}개로 전환됩니다</div>` : ""}
            ${result.pityLabel ? `<div class="gacha-small-text" style="color:#ffe28a;margin-top:8px;">${result.pityLabel}</div>` : ""}

    function buildGachaCardHtml(result, index, single = false) {
      return `
        <div class="gacha-card-stage ${single ? "single" : ""}">
          <div class="gacha-card-inner" id="gachaCard_${index}">
            <div class="gacha-face back">RING</div>
            ${buildGachaCardFrontHtml(result)}
          </div>
        </div>
      `;
    }

    function collectPendingGachaRewards() {
      if (!pendingGachaRewards || !pendingGachaRewards.results?.length) {
        closeModal(true);
        return;
      }

      let rosterSlots = Math.max(0, gameState.rosterLimit - gameState.roster.length);
      pendingGachaRewards.results.forEach((result) => {
        if (!result.isDuplicate && rosterSlots > 0) {
          addRosterMember(result.wrestler);
          rosterSlots -= 1;
        } else {
          if (result.isDuplicate) {
            addFragments(result.templateId, result.fragmentReward);
          } else {
            addGradeFragments(result.grade, result.overflowReward || 0);
          }
        }
      });

      pendingGachaRewards = null;
      closeModal(true);
      render();
      saveGameState();
    }

    function finalizePendingGachaRewardsForSave() {
      if (!pendingGachaRewards || !pendingGachaRewards.results?.length) {
        return;
      }

      let rosterSlots = Math.max(0, gameState.rosterLimit - gameState.roster.length);
      pendingGachaRewards.results.forEach((result) => {
        if (!result.isDuplicate && rosterSlots > 0) {
          addRosterMember(result.wrestler);
          rosterSlots -= 1;
        } else {
          if (result.isDuplicate) {
            addFragments(result.templateId, result.fragmentReward);
          } else {
            addGradeFragments(result.grade, result.overflowReward || 0);
          }
        }
      });
      pendingGachaRewards = null;
    }

    function openGachaResultModal(results, pullCount) {
      pendingGachaRewards = { results, pullCount };
      const single = pullCount === 1;
      const highestRank = Math.max(...results.map((result) => gradeRank(result.grade)));
      const hasRosterSlot = gameState.roster.length < gameState.rosterLimit;
      const rosterFull = !hasRosterSlot;
      const summaryCounts = results.reduce((acc, result) => {
        acc[result.grade] = (acc[result.grade] || 0) + 1;
        return acc;
      }, {});
      const summaryHtml = ["LEGEND", "S", "A", "B", "C"]
        .filter((grade) => summaryCounts[grade])
        .map((grade) => `<div class="gacha-summary-pill">${grade}급 ${summaryCounts[grade]}장</div>`)
        .join("");

      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">${single ? "가챠 결과" : "10연 가챠 결과"}</h3>
            <p class="modal-subtitle">${rosterFull ? `로스터가 가득 차 신규 선수는 자동으로 등급 조각으로 전환됩니다. (${gameState.roster.length}/${gameState.rosterLimit})` : "카드가 순차적으로 공개됩니다. 신규면 로스터에 추가되고, 중복은 선수 전용 조각으로 전환됩니다."}</p>
          </div>
        </div>
        <div class="gacha-modal-shell">
          ${highestRank === 5 ? '<div class="gacha-particle-text legend">LEGEND!!!</div>' : ""}
          <div class="${single ? "gacha-single-wrap" : "gacha-card-grid"}" id="gachaRevealGrid">
            ${results.map((result, index) => buildGachaCardHtml(result, index, single)).join("")}
          </div>
          ${rosterFull ? `<div class="countdown-box">로스터가 가득 차 [A/S/LEGEND] 이상만 등급 조각으로 전환됩니다. C/B는 자동 정리되며 조각을 주지 않습니다.</div>` : ""}
          ${single ? "" : `<div class="gacha-summary-row">${summaryHtml}</div>`}
          <div class="modal-actions">
            <button class="modal-action-button confirm" id="collectGachaRewardsButton">${single && !results[0].isDuplicate && hasRosterSlot ? "로스터 추가" : single ? "조각으로 받기" : "모두 수령"}</button>
          </div>
        </div>
      `, { locked: true });

      const revealOrder = single
        ? [0]
        : results
            .map((result, index) => ({ index, rank: gradeRank(result.grade) }))
            .sort((left, right) => left.rank - right.rank)
            .map((item) => item.index);

      revealOrder.forEach((cardIndex, revealIndex) => {
        setTimeout(() => {
          const card = document.getElementById(`gachaCard_${cardIndex}`);
          if (card) {
            card.classList.add("flipped");
          }
        }, 500 + revealIndex * (single ? 800 : 400));
      });

      const collectButton = document.getElementById("collectGachaRewardsButton");
      if (collectButton) {
        collectButton.addEventListener("click", collectPendingGachaRewards);
      }
    }

    function handleGachaPull(count) {
      if (gameState.tickets < count) {
        window.alert("뽑기권이 부족합니다.");
        return;
      }

      gameState.tickets -= count;
      const seenTemplateIds = new Set(gameState.roster.map((wrestler) => wrestler.templateId).filter(Boolean));
      const results = Array.from({ length: count }, () => performSingleGachaRoll()).map((result) => {
        if (seenTemplateIds.has(result.templateId)) {
          return { ...result, isDuplicate: true };
        }
        seenTemplateIds.add(result.templateId);
        return result;
      });
      render();
      openGachaResultModal(results, count);
    }

    function handleFragmentExchange(templateId) {
      const target = getPoolWrestlerByTemplateId(templateId);
      if (!target) {
        return;
      }
      if (gameState.roster.some((wrestler) => wrestler.templateId === templateId)) {
        window.alert("이미 보유 중인 레슬러입니다.");
        return;
      }
      if (gameState.roster.length >= gameState.rosterLimit) {
        window.alert("로스터가 가득 찼습니다.");
        return;
      }

      const cost = getFragmentCostByGrade(target.grade);
      const current = gameState.fragments[templateId] || 0;
      if (current < cost) {
        window.alert("조각이 부족합니다.");
        return;
      }

      gameState.fragments[templateId] = current - cost;
      addRosterMember(createWrestler({
        ...structuredClone(target),
        id: createWrestlerId("w"),
        templateId: target.id,
        status: "idle",
        injuryWeeks: 0,
        wins: 0,
        losses: 0
      }));
      render();
      saveGameState();
    }

    function handleFacilityUpgrade(facilityKey) {
      const facility = gameState.facilities[facilityKey];
      if (!facility) {
        return;
      }
      const upgradeCost = getFacilityUpgradeCost(facilityKey);
      if (!upgradeCost) {
        return;
      }
      if (gameState.gold < upgradeCost) {
        window.alert("골드가 부족합니다.");
        return;
      }
      gameState.gold -= upgradeCost;
      facility.level += 1;
      gameState.facilities = syncFacilitiesDerived(gameState.facilities);
      if (facilityKey === "rosterOffice") {
        gameState.rosterLimit = getRosterLimitFromState();
      }
      render();
      saveGameState();
    }

    function findBookedSlotPosition(wrestlerId) {
      for (let slotIndex = 0; slotIndex < gameState.weeklyCard.length; slotIndex += 1) {
        const slot = gameState.weeklyCard[slotIndex];
        if (slot.wrestlerAId === wrestlerId) {
          return { slotIndex, side: "A" };
        }
        if (slot.wrestlerBId === wrestlerId) {
          return { slotIndex, side: "B" };
        }
      }
      return null;
    }

    function placeWrestlerIntoSpecificSlot(wrestlerId, slotIndex, side, options = {}) {
      if (!wrestlerId || !["A", "B"].includes(side)) {
        return false;
      }

      const slot = gameState.weeklyCard[slotIndex];
      const wrestler = findWrestlerById(wrestlerId);
      if (!slot || !wrestler || wrestler.status !== "idle") {
        return false;
      }

      const targetKey = side === "A" ? "wrestlerAId" : "wrestlerBId";
      const oppositeKey = side === "A" ? "wrestlerBId" : "wrestlerAId";
      if (slot[oppositeKey] === wrestlerId) {
        if (!options.silent) {
          window.alert("같은 선수는 한 경기 양쪽에 동시에 배치할 수 없습니다");
        }
        return false;
      }

      const currentPosition = findBookedSlotPosition(wrestlerId);
      if (currentPosition && (currentPosition.slotIndex !== slotIndex || currentPosition.side !== side)) {
        const currentSlot = gameState.weeklyCard[currentPosition.slotIndex];
        if (currentPosition.side === "A") {
          currentSlot.wrestlerAId = null;
        } else {
          currentSlot.wrestlerBId = null;
        }
      }

      slot[targetKey] = wrestlerId;
      renderActiveTab();
      return true;
    }

    function placeWrestlerIntoWeeklyCard(wrestlerId) {
      if (!wrestlerId) {
        return;
      }

      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler || wrestler.status !== "idle") {
        return;
      }

      const position = getNextEmptySlotPosition();
      if (!position) {
        window.alert("편성 가능한 슬롯이 없습니다.");
        return;
      }

      placeWrestlerIntoSpecificSlot(wrestlerId, position.slotIndex, position.side);
    }

    function removeWrestlerFromWeeklyCard(slotIndex, side) {
      const slot = gameState.weeklyCard[slotIndex];
      if (!slot) {
        return;
      }

      if (side === "A") {
        slot.wrestlerAId = null;
      } else if (side === "B") {
        slot.wrestlerBId = null;
      }

      renderActiveTab();
    }

    function autoFillWeeklyCard() {
      const available = getAvailableCardRoster().filter((wrestler) => !isWrestlerBooked(wrestler.id));
      const shuffled = available.slice().sort(() => Math.random() - 0.5);

      gameState.weeklyCard.forEach((slot) => {
        if (!slot.wrestlerAId && shuffled.length) {
          slot.wrestlerAId = shuffled.shift().id;
        }
        if (!slot.wrestlerBId && shuffled.length) {
          slot.wrestlerBId = shuffled.shift().id;
        }
      });

      renderActiveTab();
    }

    function getHighlightLabel(highlight) {
      return {
        FINISHER: "피니셔 피니시",
        CRITICAL_COMEBACK: "크리티컬 역전극",
        CLOSE_MATCH: "박빙 승부",
        DOMINANT: "압도적 경기"
      }[highlight] || "일반 경기";
    }

    function startWeeklyMatches() {
      const readyMatches = getReadyMatches();
      if (!readyMatches.length) {
        return;
      }
      const ppvInfo = getPpvInfo();
      if (ppvInfo.isPpv && getAvailableTitleMatchChampionship() && !hasTitleMatchBooked()) {
        window.alert("PPV 주간에는 메인 이벤트 타이틀 매치가 필요합니다.");
        return;
      }
      if (ppvInfo.isPpv && !gameState.ppvState.featuredMatchType) {
        gameState.ppvState.featuredMatchType = ppvInfo.featuredMatchType || PPV_MATCH_TYPES[Math.floor(Math.random() * PPV_MATCH_TYPES.length)];
      }

      const previousHype = getEffectiveHypeValue(gameState.hype);
      const previousFame = gameState.fame;
      let runningHype = clamp(gameState.hype + 5, 0, 100);
      let totalIncome = 0;
      let fameGain = 0;
      let leftWins = 0;
      let leftLosses = 0;
      let totalAudience = 0;
      let heelBribeCostTotal = 0;
      const matchupKeys = [];
      const newlyInjuredIds = [];
      const titleChanges = [];
      const rivalryHighlights = [];
      const touchedRivalryKeys = [];
      let rivalryTicketBonus = 0;
      const medicalHealAmount = getMedicalWeeklyHealAmount();
      const recoveredPreviewIds = gameState.roster
        .filter((wrestler) => wrestler.status === "injured" && wrestler.injuryWeeks > 0 && Math.max(0, wrestler.injuryWeeks - medicalHealAmount) === 0)
        .map((wrestler) => wrestler.id);
      const results = [];
      const battlePackages = [];
      const trainingGrowthPreview = previewWeeklyTraining();
      const salaryBreakdown = getWeeklySalaryBreakdown();
      const salaryTotal = getWeeklySalaryTotal();

      readyMatches.forEach((slot, matchIndex) => {
        const wrestlerA = findWrestlerById(slot.wrestlerAId);
        const wrestlerB = findWrestlerById(slot.wrestlerBId);
        if (!wrestlerA || !wrestlerB) {
          return;
        }

        wrestlerA.status = "match";
        wrestlerB.status = "match";

        const matchupKey = getMatchupKey(wrestlerA.id, wrestlerB.id);
        matchupKeys.push(matchupKey);
        const championshipKey = slot.titleMatch ? slot.championshipKey : "";
        const defendingChampionId = championshipKey ? gameState.championships[championshipKey]?.holderId : "";
        const battleWrestlerA = defendingChampionId === wrestlerA.id ? createTitleDefenseWrestler(wrestlerA) : wrestlerA;
        const battleWrestlerB = defendingChampionId === wrestlerB.id ? createTitleDefenseWrestler(wrestlerB) : wrestlerB;
        const repeatedMatchup = checkRepeatMatchup(wrestlerA.id, wrestlerB.id);
        let rivalry = getRivalryBetween(wrestlerA.id, wrestlerB.id);
        if (!rivalry && repeatedMatchup) {
          rivalry = createOrUpdateRivalry(wrestlerA.id, wrestlerB.id, championshipKey ? "title" : "grudge", championshipKey ? 40 : 30);
        } else if (rivalry) {
          rivalry = createOrUpdateRivalry(wrestlerA.id, wrestlerB.id, championshipKey ? "title" : rivalry.type, 15);
        }
        if (rivalry) {
          touchedRivalryKeys.push(getRivalryKey(wrestlerA.id, wrestlerB.id));
        }
        const rivalryStoryText = getRivalryStoryText(rivalry);
        const rivalryHypeBonus = getRivalryHypeBonus(rivalry);
        const rivalryRevenueMultiplier = getRivalryRevenueMultiplier(rivalry);
        const rivalryBadge = rivalry && rivalry.arc_stage >= 1 ? "🔥 라이벌 매치!" : "";
        const rivalryFinisherMultiplier = rivalry && rivalry.arc_stage >= 2 ? 1.5 : 1;
        const alignmentBonus = getAlignmentMatchupBonus(wrestlerA, wrestlerB);

        const bookingHype = calcHypeChange([{
          aId: wrestlerA.id,
          bId: wrestlerB.id,
          isTitleMatch: Boolean(slot.titleMatch)
        }]) - 5;

        const battlePackage = runBattleSimulation(battleWrestlerA, battleWrestlerB, {
          startingHype: runningHype,
          finisherChargeMultiplier: rivalryFinisherMultiplier,
          matchType: ppvInfo.isPpv && matchIndex === 0 ? gameState.ppvState.featuredMatchType : ""
        });
        battlePackages.push(battlePackage);

        const battleResult = battlePackage.battleResult;
        const winner = battleResult.winnerId === wrestlerA.id ? wrestlerA : wrestlerB;
        const loser = winner.id === wrestlerA.id ? wrestlerB : wrestlerA;
        const winnerBattleState = battleResult.winnerId === wrestlerA.id ? battlePackage.leftState : battlePackage.rightState;
        const loserBattleState = winner.id === wrestlerA.id ? battlePackage.rightState : battlePackage.leftState;

        if (winner.id === wrestlerA.id) {
          leftWins += 1;
        } else {
          leftLosses += 1;
        }

        winner.wins += 1;
        loser.losses += 1;
        gameState.totalWins += 1;
        gameState.totalMatches += 1;
        recordWrestlerResult(winner, true);
        recordWrestlerResult(loser, false);

        const baseIncome = 200 * gameState.stage;
        const winnerIncome = Math.floor(baseIncome * getRosterGradeMultiplier(winner.grade));
        const loserIncome = Math.floor(baseIncome * 0.3);
        const projectedMatchHype = clamp(runningHype + bookingHype + battleResult.hypeGenerated + rivalryHypeBonus + alignmentBonus.hypeBonus, 0, 100);
        const effectiveProjectedMatchHype = getEffectiveHypeValue(projectedMatchHype);
        const revenueTier = getHypeTierInfo(effectiveProjectedMatchHype);
        const faceRevenueMultiplier = getFaceRevenueMultiplierForMatch(wrestlerA, wrestlerB);
        const veteranRevenueMultiplier = Math.max(getAgingRevenueMultiplier(wrestlerA), getAgingRevenueMultiplier(wrestlerB));
        let matchIncome = Math.floor((winnerIncome + loserIncome) * revenueTier.multiplier * rivalryRevenueMultiplier * alignmentBonus.revenueMultiplier * faceRevenueMultiplier * veteranRevenueMultiplier * ppvInfo.revenueMultiplier);
        const heelBribeCost = [wrestlerA, wrestlerB].filter((wrestler) => wrestler.alignment === "heel").length * 200;
        heelBribeCostTotal += heelBribeCost;
        matchIncome = Math.max(0, matchIncome - heelBribeCost);
        totalIncome += matchIncome;
        totalAudience += Math.floor(((120 * gameState.stage * revenueTier.multiplier) + (battleResult.hypeGenerated * 25)) * ppvInfo.audienceMultiplier);

        let totalMatchHype = (battleResult.hypeGenerated + bookingHype + rivalryHypeBonus + alignmentBonus.hypeBonus) * ppvInfo.hypeMultiplier;
        if (winner.alignment === "face") {
          totalMatchHype += Math.max(2, Math.floor(battleResult.hypeGenerated * 0.15));
        }
        runningHype = clamp(runningHype + totalMatchHype, 0, 100);
        fameGain += runningHype >= 80 ? 10 : runningHype >= 50 ? 5 : 1;
        fameGain += (getAgeStageMeta(wrestlerA.age).fameBonus || 0) + (getAgeStageMeta(wrestlerB.age).fameBonus || 0);

        let injuryInfo = null;
        const injuryChance = clamp(
          0.15 + (loserBattleState.downCount * 0.05) + ((loserBattleState.totalDamageReceived / loserBattleState.maxHP) * 0.05) - getMedicalInjuryPrevention() + (getAgeStageMeta(loser.age).injuryBonus || 0),
          0.15,
          0.45
        );
        if (Math.random() < injuryChance) {
          loser.status = "injured";
          loser.injuryWeeks = randomBetween(1, 3);
          newlyInjuredIds.push(loser.id);
          injuryInfo = {
            wrestlerName: loser.name,
            injuryWeeks: loser.injuryWeeks
          };
        }

        let titleOutcome = "";
        if (championshipKey) {
          const championship = gameState.championships[championshipKey];
          if (championship) {
            if (winner.id === defendingChampionId) {
              championship.defenseWeek += 1;
              titleOutcome = `${championship.belt} ${winner.name} 방어 성공 (${championship.defenseWeek}회)`;
            } else {
              championship.holderId = winner.id;
              championship.defenseWeek = 0;
              titleOutcome = `${championship.belt} 새 챔피언 탄생! ${winner.name}`;
            }
            titleChanges.push(titleOutcome);
          }
        }

        if (rivalry && rivalry.arc_stage === 3) {
          rivalryTicketBonus += 2;
          matchIncome = Math.floor(matchIncome * 1);
          winner.stats.fame = clamp(winner.stats.fame + 20, 1, 100);
          loser.stats.fame = clamp(loser.stats.fame + 10, 1, 100);
          totalIncome += 0;
          rivalryHighlights.push(`🔥 라이벌전 클라이맥스! ${winner.name}가 ${loser.name}를 꺾고 악연을 마무리했다.`);
          rivalry.intensity = 0;
        } else if (rivalryStoryText) {
          rivalryHighlights.push(`"${rivalryStoryText}"`);
        }
        if (ppvInfo.isPpv && matchIndex === 0) {
          rivalryHighlights.push(`🎟 ${ppvInfo.name} 특수 경기: ${(battleResult.matchTypeLabel || "").replaceAll("_", " ")}`);
        }

        if (battleResult.alignmentTurn === "heel" && battleResult.alignmentTurnId) {
          const turnedWrestler = findWrestlerById(battleResult.alignmentTurnId);
          if (turnedWrestler && turnedWrestler.alignment !== "heel") {
            applyAlignmentTurn(turnedWrestler, "heel", { direct: false });
          }
        }

        results.push({
          wrestlerAName: wrestlerA.name,
          wrestlerBName: wrestlerB.name,
          wrestlerAId: wrestlerA.id,
          wrestlerBId: wrestlerB.id,
          winnerName: winner.name,
          winnerId: winner.id,
          income: matchIncome,
          hearts: getHeartsByHype(getEffectiveHypeValue(runningHype)),
          injury: injuryInfo,
          hypeAfterMatch: getEffectiveHypeValue(runningHype),
          battleResult,
          finishType: battleResult.finishType,
          highlightLabel: getHighlightLabel(battleResult.highlight),
          turnCount: battleResult.totalTurns,
          crowdLabel: revenueTier.label,
          crowdMultiplier: revenueTier.multiplier,
          titleOutcome,
          championshipKey,
          matchTypeLabel: battleResult.matchTypeLabel || "",
          rivalryBadge,
          rivalryStageLabel: getRivalryStageLabel(rivalry),
          rivalryStoryText,
          rivalryHypeBonus,
          rivalryRevenueMultiplier,
          alignmentLabel: alignmentBonus.label,
          alignmentRevenueMultiplier: alignmentBonus.revenueMultiplier,
          heelBribeCost
        });
      });

      gameState.rivalries = gameState.rivalries.filter((rivalry) => rivalry.intensity > 0);

      const fanRevenueBonus = Math.floor(totalIncome * (getPRIncomeMultiplier() - 1));
      const tvRevenueBonus = getTVWeeklyBonus();
      totalIncome += fanRevenueBonus + tvRevenueBonus;
      const championshipRevenueBonus = Math.floor(totalIncome * (getChampionshipIncomeMultiplier() - 1));
      totalIncome += championshipRevenueBonus;
      const eventRevenueMultiplier = Math.max(1, gameState.eventEffects.nextWeekRevenueMultiplier || 1);
      const preEventIncome = totalIncome;
      totalIncome = Math.floor(totalIncome * eventRevenueMultiplier);
      const eventRevenueBonus = totalIncome - preEventIncome;
      fameGain += getPRWeeklyFameBonus() + getChampionshipWeeklyFameBonus();
      applyPassiveStaminaGrowthFromMatches(results);

      gameState.gold += totalIncome;
      gameState.fame += fameGain;
      gameState.hype = runningHype;

      const monthlyLegendTicketBonus = getChampionshipMonthlyLegendTicketBonus();

      pendingWeeklySummary = {
        week: gameState.week,
        previousHype,
        previousFame,
        results,
        battlePackages,
        totalIncome,
        fanRevenueBonus,
        tvRevenueBonus,
        championshipRevenueBonus,
        eventRevenueBonus,
        eventRevenueMultiplier,
        heelBribeCostTotal,
        salaryTotal,
        salaryBreakdown,
        fameGain,
        finalHype: getEffectiveHypeValue(runningHype),
        currentFame: gameState.fame,
        matchCount: results.length,
        leftWins,
        leftLosses,
        totalAudience,
        matchupKeys,
        newlyInjuredIds,
        recoveredPreviewIds,
        trainingGrowthPreview,
        monthlyLegendTicketBonus,
        ppvInfo,
        ppvMvpId: "",
        ppvAwardText: "",
        titleChanges,
        rivalryHighlights,
        rivalryTicketBonus,
        touchedRivalryKeys
      };

      if (ppvInfo.isPpv && results.length) {
        const mvpResult = results.slice().sort((left, right) => ((right.battleResult?.winnerStats?.damageDealt || 0) + (right.battleResult?.hypeGenerated || 0)) - ((left.battleResult?.winnerStats?.damageDealt || 0) + (left.battleResult?.hypeGenerated || 0)))[0];
        const mvp = findWrestlerById(mvpResult?.winnerId);
        if (mvp) {
          pendingWeeklySummary.ppvMvpId = mvp.id;
          pendingWeeklySummary.ppvAwardText = results.some((result) => result.battleResult?.highlight === "CRITICAL_COMEBACK") ? "올해의 경기상" : "이번 PPV 최우수 선수";
        }
      }

      applyMatchSummaryToWeeklyStats(pendingWeeklySummary);

      activeTab = "home";
      render();
      matchAnimationState.finishCallback = openWeeklyResultsModal;
      startMatchAnimation(battlePackages);
    }

      const resultsHtml = pendingWeeklySummary.results.map((result, index) => `

          ${result.alignmentLabel ? `<div class="result-income">→ 역할 보정: ${result.alignmentLabel}</div>` : ""}
          ${result.rivalryHypeBonus ? `<div class="result-income">→ 라이벌 보정: Hype +${result.rivalryHypeBonus} / 수익 ×${result.rivalryRevenueMultiplier.toFixed(1)}</div>` : ""}
          ${result.heelBribeCost ? `<div class="result-income">→ 힐 심판 매수 비용: -${formatNumber(result.heelBribeCost)} G</div>` : ""}

        </div>
      `).join("");

      const summaryDelay = pendingWeeklySummary.results.length * 0.8;

      openModal(`
        <div class="modal-header">
          <div>

        ${rivalryHeader}

          <div class="result-summary-item" style="margin-bottom:10px;">

              <div>TV 계약 보너스 +${formatNumber(pendingWeeklySummary.tvRevenueBonus)} G</div>
              <div>챔피언십 보너스 +${formatNumber(pendingWeeklySummary.championshipRevenueBonus)} G</div>

              <div>이벤트 배율 보너스 +${formatNumber(pendingWeeklySummary.eventRevenueBonus)} G${pendingWeeklySummary.eventRevenueMultiplier > 1 ? ` (×${pendingWeeklySummary.eventRevenueMultiplier})` : ""}</div>
            </div>

            <div class="result-summary-value" style="margin-top:10px;color:${netProfit >= 0 ? "#2ecc71" : "#e74c3c"};">순수익 ${netProfit >= 0 ? "+" : ""}${formatNumber(netProfit)} G</div>

    function advanceToNextWeek() {
      if (!pendingWeeklySummary) {
        return;
      }

      const salaryResult = applySalaryForWeek();
      const appliedTrainingGrowth = applyWeeklyTraining();
      if (pendingWeeklySummary.ppvMvpId) {
        const mvp = findWrestlerById(pendingWeeklySummary.ppvMvpId);
        if (mvp) {
          mvp.stats.charisma = clamp(mvp.stats.charisma + 5, 1, getAdjustedStatCap(mvp));
          mvp.stats.fame = clamp(mvp.stats.fame + 15, 1, 100);
        }
      }
      if (pendingWeeklySummary.results.some((result) => result.battleResult?.highlight === "CRITICAL_COMEBACK")) {
        gameState.ppvState.annualAwardBuffWeeks = Math.max(gameState.ppvState.annualAwardBuffWeeks, 4);
      }
      if (pendingWeeklySummary.ppvInfo?.isMania) {
        gameState.legacy.points += 3;
        gameState.legacy.totalEarned += 3;
      }
      gameState.tickets += 1 + pendingWeeklySummary.monthlyLegendTicketBonus + pendingWeeklySummary.rivalryTicketBonus;
      pendingWeeklySummary.results.forEach((result) => {
        gameState.matchHistory.push({
          week: pendingWeeklySummary.week,
          wrestlerAId: result.wrestlerAId,
          wrestlerBId: result.wrestlerBId,
          winnerId: result.winnerId
        });
      });
      gameState.matchHistory = gameState.matchHistory.slice(-100);
      gameState.history.unshift({
        week: pendingWeeklySummary.week,
        matchCount: pendingWeeklySummary.matchCount,
        record: `${pendingWeeklySummary.leftWins}승 ${pendingWeeklySummary.leftLosses}패`,
        income: pendingWeeklySummary.totalIncome - salaryResult.totalSalary,
        hype: pendingWeeklySummary.finalHype
      });
      gameState.history = gameState.history.slice(0, 20);
      gameState.lastWeekMatchups = pendingWeeklySummary.matchupKeys.slice();
      decayRivalries(pendingWeeklySummary.touchedRivalryKeys || []);
      if (gameState.eventEffects.fanDoubleWeeks > 0) {
        gameState.eventEffects.fanDoubleWeeks -= 1;
      }
      if (gameState.eventEffects.tvDealWeeks > 0) {
        gameState.eventEffects.tvDealWeeks -= 1;
        if (gameState.eventEffects.tvDealWeeks === 0) {
          gameState.eventEffects.tvDealBonus = 0;
        }
      }
      if (gameState.ppvState.annualAwardBuffWeeks > 0) {
        gameState.ppvState.annualAwardBuffWeeks -= 1;
      }
      gameState.eventEffects.nextWeekRevenueMultiplier = 1;
      decrementContracts();
      const expiringContractIds = gameState.roster
        .filter((wrestler) => wrestler.contractWeeks > 0 && wrestler.contractWeeks <= 2)
        .map((wrestler) => wrestler.id);
      const expiredContractNames = removeExpiredContracts().map((wrestler) => wrestler.name);
      const completedPpvWeek = Boolean(pendingWeeklySummary.ppvInfo?.isPpv);
      const agedUpNames = [];
      if (pendingWeeklySummary.week % 4 === 0) {
        const trackAging = (collection) => {
          (collection || []).forEach((wrestler) => {
            if (!wrestler) {
              return;
            }
            wrestler.age = Math.max(16, Math.floor((wrestler.age || 18) + 1));
            agedUpNames.push(wrestler.name);
          });
        };
        trackAging(gameState.roster);
        trackAging(gameState.freeAgents);
        trackAging(gameState.prospects);
      }
      const retirementCandidates = applyWeeklyAgingEffects();
      gameState.week += 1;
      gameState.weeklyCard = createEmptyWeeklyCard(gameState.week);
      const recoveredIds = updateInjuryRecoveryForNewWeek(pendingWeeklySummary.newlyInjuredIds || []);
      gameState.freeAgents = generateFreeAgentsForWeek();
      gameState.freeAgentsWeek = gameState.week;
      gameState.prospects = generateProspectScoutsForWeek();
      gameState.prospectsWeek = gameState.week;
      if (getWeeksUntilNextPpv() === 2 && gameState.ppvState.selectedMainEventIds.length === 2 && gameState.ppvState.buildAppliedWeek !== gameState.week) {
        const [leftId, rightId] = gameState.ppvState.selectedMainEventIds;
        const rivalry = createOrUpdateRivalry(leftId, rightId, "grudge", 10);
        if (rivalry) {
          gameState.ppvState.buildAppliedWeek = gameState.week;
        }
      }
      if (completedPpvWeek) {
        gameState.ppvState.selectedMainEventIds = [];
      }
      if (!getPpvInfo().isPpv) {
        gameState.ppvState.featuredMatchType = "";
      }
      const stageUnlockMessage = checkStageUnlock();
      const championshipUnlockMessages = checkChampionshipUnlocks();
      const unlockedAchievements = checkPersistentAchievements({
        matchCount: pendingWeeklySummary.matchCount,
        totalAudience: pendingWeeklySummary.totalAudience
      });
      const triggerEnding = getWorldEndingReady();
      if (triggerEnding) {
        gameState.achievements.titles.push("월드 제패");
      }
      const eventData = triggerEnding ? null : rollWeeklyEvent();
      pendingWeeklySummary = null;
      closeModal(true);
      saveGameState();
      render();
      openPostAdvanceNotices({
        stageUnlockMessage,
        championshipUnlockMessages,
        appliedTrainingGrowth,
        recoveredIds,
        retirementCandidates,
        expiringContractIds,
        expiredContractNames,
        agedUpNames,
        unlockedAchievements,
        eventData,
        triggerEnding
      });
    }

    function retireWrestler(wrestlerId, asCoach = false) {
      const targetIndex = gameState.roster.findIndex((item) => item.id === wrestlerId);
      if (targetIndex === -1) {
        return false;
      }
      const wrestler = gameState.roster[targetIndex];
      clearWrestlerFromOwnership(wrestlerId);
      gameState.hype = clamp(gameState.hype + 20, 0, 100);
      if (asCoach) {
        gameState.coaches.push(createCoachFromWrestler(wrestler));
      }
      gameState.roster.splice(targetIndex, 1);
      return true;
    }

        const canAssign = canTrainAtFacility(wrestler, facilityKey) && (availableSlots > 0 || wrestler.trainingFacility === facilityKey);
        return `
          <div class="training-slot-card">
            <div class="facility-title-row">
              <div>
                <div class="facility-title">${facility.name}</div>
                <div class="facility-level">${facility.trainStat === "power" ? "힘" : facility.trainStat === "technique" ? "기술" : "카리스마"} 훈련 · 슬롯 ${occupants.length}/${facility.slots}</div>
              </div>
            </div>
            <div class="fragment-meta">${occupantList}</div>
            <div class="gacha-small-text">주간 성장량 +${formatAverage(getTrainingGainPreview(facilityKey, wrestler))} · 속도 x${facility.speedBonus.toFixed(2)} · 코치 x${getCoachTrainingMultiplier(facilityKey).toFixed(2)}</div>
            <button class="training-assign-button" data-action="assign-training" data-wrestler-id="${wrestler.id}" data-facility-key="${facilityKey}" ${canAssign ? "" : "disabled"}>배치</button>
          </div>
        `;
      }).join("");

      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">${wrestler.name} 훈련 배치</h3>
            <p class="modal-subtitle">해금된 훈련 시설 슬롯 중 하나를 선택해 배치합니다.</p>
          </div>
          <button class="modal-close" data-modal-close>닫기</button>
        </div>
        <div class="training-facility-group">
          <div class="result-summary-item">
            <div class="result-summary-label">현재 상태</div>
            <div class="result-summary-value">${wrestler.status === "training" ? `${gameState.facilities[wrestler.trainingFacility]?.name || "훈련"} 배치 중` : wrestler.status === "injured" ? "부상 중" : "대기 중"}</div>
          </div>
          ${trainingSections}
          ${wrestler.status === "training" ? '<button class="modal-action-button cancel" id="removeTrainingButton">훈련 해제</button>' : ""}
        </div>
      `);

      Array.from(modalWindowEl.querySelectorAll('[data-action="assign-training"]')).forEach((button) => {
        button.addEventListener("click", () => {
          const targetWrestlerId = button.dataset.wrestlerId;
          const facilityKey = button.dataset.facilityKey;
          removeWrestlerFromTraining(targetWrestlerId);
          if (!assignWrestlerToFacility(targetWrestlerId, facilityKey)) {
            window.alert("해당 시설에 배치할 수 없습니다.");
            return;
          }
          closeModal();
          render();
          saveGameState();
        });
      });

      const removeTrainingButton = document.getElementById("removeTrainingButton");
      if (removeTrainingButton) {
        removeTrainingButton.addEventListener("click", () => {
          removeWrestlerFromTraining(wrestler.id);
          closeModal();
          render();
          saveGameState();
        });
      }
    }

    function handleTrainAssignment(wrestlerId) {
      const wrestler = gameState.roster.find((item) => item.id === wrestlerId);
      if (!wrestler) {
        return;
      }
      if (wrestler.status === "injured") {
        window.alert("부상 선수는 훈련할 수 없습니다.");
        return;
      }
      openTrainingAssignmentModal(wrestlerId);
    }

    function handleAlignmentTurnAction(wrestlerId, targetAlignment) {
      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler) {
        return;
      }
      if (!canChangeAlignment(wrestler, targetAlignment)) {
        const cooldown = getAlignmentTurnCooldownRemaining(wrestler);
        if (cooldown > 0) {
          window.alert(`역할 전환은 ${cooldown}주 후 다시 가능합니다.`);
        } else if (gameState.gold < 500) {
          window.alert("골드가 부족합니다.");
        }
        return;
      }
      if (!applyAlignmentTurn(wrestler, targetAlignment, { direct: true })) {
        return;
      }
      render();
      saveGameState();
    }

    function handleReleaseWrestler(wrestlerId) {
      const wrestler = findWrestlerById(wrestlerId);
      if (!wrestler) {
        return;
      }
      releaseRosterMembers([wrestlerId]);
      render();
      saveGameState();
    }

    function handleHireFreeAgent(wrestlerId) {
      const targetIndex = gameState.freeAgents.findIndex((item) => item.id === wrestlerId);
      if (targetIndex === -1) {
        return;
      }

      if (gameState.roster.length >= gameState.rosterLimit) {
        openRosterFullModal();
        return;
      }

      const wrestler = gameState.freeAgents[targetIndex];
      const recruitCost = getGradeHireCost(wrestler.grade);

      if (gameState.gold < recruitCost) {
        window.alert("골드가 부족합니다.");
        return;
      }

      gameState.gold -= recruitCost;
      addRosterMember({ ...wrestler, id: createWrestlerId("w") });
      gameState.freeAgents.splice(targetIndex, 1);

      render();
    }

    function handleHireProspect(wrestlerId) {
      const targetIndex = gameState.prospects.findIndex((item) => item.id === wrestlerId);
      if (targetIndex === -1) {
        return;
      }
      if (gameState.roster.length >= gameState.rosterLimit) {
        openRosterFullModal();
        return;
      }
      const wrestler = gameState.prospects[targetIndex];
      const recruitCost = getProspectHireCost(wrestler);
      if (gameState.gold < recruitCost) {
        window.alert("골드가 부족합니다.");
        return;
      }
      gameState.gold -= recruitCost;
      addRosterMember(createWrestler({
        ...structuredClone(wrestler),
        id: createWrestlerId("w"),
        status: "idle",
        injuryWeeks: 0,
        wins: 0,
        losses: 0
      }));
      gameState.prospects.splice(targetIndex, 1);
      render();
    }

    function startIdleIncome() {
      setInterval(() => {
        const income = getIdleIncomePerSecond();
        gameState.gold += income;
        addWeeklyStat("goldEarned", income);
        ensureMissionRefreshes();
        notifyMissionCompletionIfNeeded();
        renderResources();
        if (activeTab !== "home") {
          renderActiveTab();
        } else {
          renderTabBadges();
        }
      }, 1000);
    }

    function startAutoSave() {
      setInterval(() => {
        saveGameState();
      }, 5000);
    }

    modalOverlayEl.addEventListener("click", (event) => {
      if (event.target === modalOverlayEl) {
        closeModal();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modalOverlayEl.classList.contains("show")) {
        closeModal();
      }
    });

    window.addEventListener("beforeunload", () => {
      finalizePendingGachaRewardsForSave();
      silentSaveGameState();
    });

    function init() {
      titleScreenHasSave = Boolean(localStorage.getItem(STORAGE_KEY));
      const loaded = loadGameState();
      gameState = loaded.state;
      ensureMissionRefreshes();
      window.__lastMissionClaimableCount = getClaimableMissionCount();
      setupTabs();
      render();
      startCanvasLoop();
      startIdleIncome();
      startAutoSave();
      showOfflinePopup(loaded.offlineGold);
    }

    init();
  </script>
</body>
</html>
