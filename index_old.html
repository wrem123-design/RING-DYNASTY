<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RING DYNASTY - STEP 4</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --card-soft: rgba(255, 255, 255, 0.04);
      --accent: #e74c3c;
      --gold: #f1c40f;
      --fame: #e67e22;
      --ticket: #9b59b6;
      --text: #ecf0f1;
      --muted: #7f8c8d;
      --border: rgba(236, 240, 241, 0.1);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      --success: #2ecc71;
      --danger: #ff6b6b;
      --info: #3498db;
      --warning: #f1c40f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Courier New", monospace;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: none;
      background: none;
      color: inherit;
      transition: filter 0.2s ease, transform 0.2s ease, background-color 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      filter: brightness(1.2);
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: none;
    }

    .app-shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 28px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-shadow: 0 0 14px rgba(231, 76, 60, 0.25);
    }

    .stage-badge {
      padding: 10px 14px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
    }

    .resource-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .resource-card {
      background: var(--card);
      border-radius: 14px;
      padding: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      min-height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .resource-label {
      font-size: 14px;
      color: var(--muted);
    }

    .resource-value {
      font-size: 30px;
      font-weight: 700;
      transform-origin: center bottom;
      display: inline-block;
    }

    .resource-value.gold {
      color: var(--gold);
    }

    .resource-value.fame {
      color: var(--fame);
    }

    .resource-value.tickets {
      color: var(--ticket);
    }

    .resource-value.pop,
    .number-pop.pop {
      animation: popValue 0.3s ease;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 7fr) minmax(280px, 3fr);
      gap: 18px;
      min-height: 520px;
    }

    .panel {
      background: var(--card);
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(236, 240, 241, 0.08);
      padding-bottom: 12px;
    }

    .panel-title {
      margin: 0;
      font-size: 20px;
      color: var(--text);
    }

    .panel-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .main-panel-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .main-info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .info-chip {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 12px;
    }

    .info-chip-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .info-chip-value {
      font-size: 18px;
      font-weight: 700;
    }

    .main-dynamic-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .placeholder-box {
      flex: 1;
      min-height: 320px;
      border: 2px dashed rgba(127, 140, 141, 0.75);
      border-radius: 18px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      background: rgba(0, 0, 0, 0.12);
      padding: 24px;
      line-height: 1.8;
    }

    .side-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .side-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .side-card-title {
      font-size: 15px;
      font-weight: 700;
    }

    .side-card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .tab-bar {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .tab-button {
      padding: 14px 12px;
      border-radius: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      box-shadow: var(--shadow);
      font-size: 15px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .tab-button.active {
      background: rgba(231, 76, 60, 0.16);
      color: var(--text);
      border-color: rgba(231, 76, 60, 0.45);
    }

    .tab-badge {
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #e74c3c;
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      padding: 0 5px;
    }

    .tab-badge.hidden {
      display: none;
    }

    .roster-topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 13px;
    }

    .roster-toolbar,
    .roster-filter-grid,
    .roster-sort-grid,
    .roster-selection-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .roster-filter-grid,
    .roster-sort-grid {
      justify-content: space-between;
    }

    .roster-filter-group,
    .roster-sort-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .roster-filter-button,
    .roster-small-button,
    .roster-danger-button {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    .roster-filter-button.active {
      background: rgba(52, 152, 219, 0.18);
      border-color: rgba(52, 152, 219, 0.4);
    }

    .roster-filter-button.grade-c.active { background: rgba(127, 140, 141, 0.25); }
    .roster-filter-button.grade-b.active { background: rgba(52, 152, 219, 0.25); }
    .roster-filter-button.grade-a.active { background: rgba(243, 156, 18, 0.25); }
    .roster-filter-button.grade-s.active { background: rgba(155, 89, 182, 0.25); }
    .roster-filter-button.grade-legend.active { background: rgba(241, 196, 15, 0.22); color: #fff0b5; }

    .roster-danger-button {
      background: rgba(231, 76, 60, 0.16);
      color: #ffb0a7;
    }

    .roster-search-input,
    .roster-select {
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.18);
      color: var(--text);
    }

    .roster-summary-text {
      font-size: 12px;
      color: var(--muted);
    }

    .roster-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 4px;
      padding-bottom: 8px;
    }

    .roster-card {
      display: grid;
      grid-template-columns: 34px 56px 72px minmax(0, 1.35fr) minmax(0, 1.15fr) minmax(96px, 0.8fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 16px;
      background: var(--card-soft);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
      position: relative;
    }

    .roster-card:hover {
      transform: translateY(-2px);
      border-color: rgba(231, 76, 60, 0.35);
      cursor: pointer;
    }

    .roster-card.selected {
      border-color: rgba(52, 152, 219, 0.5);
      background: rgba(52, 152, 219, 0.08);
    }

    .roster-check-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .roster-checkbox {
      width: 18px;
      height: 18px;
      accent-color: #3498db;
    }

    .grade-badge {
      width: 56px;
      min-height: 56px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      padding: 8px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .grade-badge.legend {
      background: linear-gradient(120deg, #e74c3c 0%, #f1c40f 50%, #e74c3c 100%);
      background-size: 220% 100%;
      animation: goldShimmer 2.2s linear infinite;
      color: #fff4d6;
    }

    .sprite-box {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.12);
    }

    .sprite-box.large {
      width: 128px;
      height: 128px;
      border-radius: 20px;
    }

    .gacha-portrait {
      width: 128px;
      height: 171px;
      border-radius: 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.12);
      flex-shrink: 0;
    }

    .wrestler-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .wrestler-name {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wrestler-nickname {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wrestler-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .wrestler-submeta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .roster-inline-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .inline-asset-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 11px;
      color: #ecf0f1;
      line-height: 1;
      white-space: nowrap;
    }

    .inline-asset-badge img {
      width: 16px;
      height: 16px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .inline-asset-badge.alignment-badge.face {
      border-color: rgba(93, 173, 226, 0.35);
    }

    .inline-asset-badge.alignment-badge.heel {
      border-color: rgba(231, 76, 60, 0.35);
    }

    .inline-asset-badge.alignment-badge.neutral {
      border-color: rgba(149, 165, 166, 0.3);
    }

    .power-score {
      color: var(--gold);
      font-weight: 700;
    }

    .stat-stack {
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-width: 0;
    }
    .stat-row {
      display: grid;
      grid-template-columns: 54px 1fr 32px;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }

    .stat-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .stat-fill {
      height: 100%;
      border-radius: inherit;
    }

    .stat-fill.power {
      background: #e74c3c;
    }

    .stat-fill.stamina {
      background: #2ecc71;
    }

    .stat-fill.technique {
      background: #3498db;
    }

    .stat-fill.charisma {
      background: #f39c12;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border-radius: 999px;
      padding: 8px 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
      min-width: 0;
      width: 100%;
      line-height: 1.35;
      flex-direction: column;
      gap: 2px;
    }

    .status-pill.idle {
      color: var(--success);
      background: rgba(46, 204, 113, 0.12);
      border-color: rgba(46, 204, 113, 0.25);
    }

    .status-pill.training {
      color: var(--info);
      background: rgba(52, 152, 219, 0.12);
      border-color: rgba(52, 152, 219, 0.25);
    }

    .status-pill.injured {
      color: var(--danger);
      background: rgba(255, 107, 107, 0.12);
      border-color: rgba(255, 107, 107, 0.25);
    }

    .status-pill.match {
      color: var(--warning);
      background: rgba(241, 196, 15, 0.12);
      border-color: rgba(241, 196, 15, 0.25);
    }

    .action-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 108px;
    }

    .favorite-toggle {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 16px;
      z-index: 1;
      background-image: url('data/images/ui/badges/favorite_star.png');
      background-position: center;
      background-repeat: no-repeat;
      background-size: 16px 16px;
      color: transparent;
      text-indent: -9999px;
      overflow: hidden;
    }

    .favorite-toggle.active {
      background: rgba(241, 196, 15, 0.12);
      border-color: rgba(241, 196, 15, 0.28);
      background-image: url('data/images/ui/badges/favorite_star.png');
      box-shadow: 0 0 16px rgba(241, 196, 15, 0.2);
    }

    .roster-menu {
      position: relative;
    }

    .roster-menu summary {
      list-style: none;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 700;
      text-align: center;
      min-width: 64px;
    }

    .roster-menu summary::-webkit-details-marker {
      display: none;
    }

    .roster-menu-list {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      min-width: 170px;
      padding: 8px;
      border-radius: 14px;
      background: #13213c;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 5;
    }

    .roster-menu-item {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      text-align: left;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
    }

    .action-button {
      padding: 10px 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .action-button.train {
      background: rgba(52, 152, 219, 0.16);
      color: #8fd1ff;
    }

    .action-button.release {
      background: rgba(231, 76, 60, 0.16);
      color: #ff9d92;
    }

    .free-agent-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .section-heading {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .section-heading h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .section-heading p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .free-agent-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .free-agent-card {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .free-agent-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .free-agent-name {
      font-size: 15px;
      font-weight: 700;
    }

    .free-agent-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .hire-button {
      min-width: 92px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(46, 204, 113, 0.16);
      color: #98ffbf;
      border: 1px solid rgba(46, 204, 113, 0.18);
      text-align: center;
      font-size: 12px;
      font-weight: 700;
    }

    .countdown-box {
      padding: 12px 14px;
      border-radius: 14px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 12px;
      line-height: 1.7;
    }

    .booking-topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(52, 152, 219, 0.09);
      border: 1px solid rgba(52, 152, 219, 0.18);
      font-size: 13px;
      color: #b9ddff;
    }

    .match-slot-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .match-slot {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .slot-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .dropzone {
      min-height: 80px;
      border: 2px dashed rgba(127, 140, 141, 0.7);
      border-radius: 16px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      background: rgba(0, 0, 0, 0.08);
      position: relative;
    }

    .dropzone.drag-over {
      border-color: rgba(52, 152, 219, 0.95);
      background: rgba(52, 152, 219, 0.12);
      box-shadow: inset 0 0 0 1px rgba(52, 152, 219, 0.18);
    }

    .dropzone.filled {
      justify-content: flex-start;
      text-align: left;
      border-style: solid;
      border-color: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .slot-card {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      width: 100%;
    }

    .slot-card-name {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot-card-power {
      font-size: 12px;
      color: var(--gold);
    }

    .slot-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(231, 76, 60, 0.2);
      color: #ffb0a7;

    function getLocalDateKey(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getWeeklyResetKey(date = new Date()) {
      const copy = new Date(date);
      const day = copy.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      copy.setDate(copy.getDate() + diff);
      copy.setHours(0, 0, 0, 0);
      return getLocalDateKey(copy);
    }

    function getNextDailyRefreshTimestamp(now = new Date()) {
      const next = new Date(now);
      next.setHours(24, 0, 0, 0);
      return next.getTime();
    }

    function getSpecialFragmentTemplateId() {
      const legend = wrestlerPool.find((wrestler) => wrestler.grade === "LEGEND");
      if (legend) {
        return legend.id;
      }
      const fallback = wrestlerPool.find((wrestler) => wrestler.grade === "S");
      return fallback ? fallback.id : wrestlerPool[0]?.id || "";
    }

    function getCurrentWeekMetric(metric) {
      return Number(gameState.currentWeekStats?.[metric] || 0);
    }

    function buildDailyQuestInstance(definition) {
      return {
        id: `${definition.id}_${Date.now()}_${Math.floor(Math.random() * 1000)}`,
        templateId: definition.id,
        difficulty: definition.difficulty,
        label: definition.label,
        metric: definition.metric,
        target: definition.target,
        reward: structuredClone(definition.reward),
        baseline: getCurrentWeekMetric(definition.metric),
        claimed: false
      };
    }

    function buildWeeklyMissionState() {
      return WEEKLY_MISSION_DEFS.map((definition) => ({
        id: definition.id,
        claimedStages: [false, false, false]
      }));
    }

    function getDailyQuestTemplateById(templateId) {
      return DAILY_QUEST_POOL.find((quest) => quest.id === templateId) || null;
    }

    function getWeeklyMissionStateById(missionId) {
      return gameState.weeklyMissions.missions.find((mission) => mission.id === missionId) || null;
    }

    function getDailyQuestProgress(quest) {
      return clamp(getCurrentWeekMetric(quest.metric) - (quest.baseline || 0), 0, quest.target);
    }

    function isDailyQuestComplete(quest) {
      return getDailyQuestProgress(quest) >= quest.target;
    }

    function getWeeklyMissionProgress(definition, stageIndex) {
      const stage = definition.stages[stageIndex];
      return getCurrentWeekMetric(stage.metric || definition.metric);
    }

    function isWeeklyMissionStageComplete(definition, stageIndex) {
      const stage = definition.stages[stageIndex];
      return getWeeklyMissionProgress(definition, stageIndex) >= stage.target;
    }

    function getDailyQuestRefreshKey(lastRefresh) {
      return lastRefresh ? getLocalDateKey(new Date(lastRefresh)) : "";
    }

    function getWeeklyMissionRefreshKey(lastRefresh) {
      return lastRefresh ? getWeeklyResetKey(new Date(lastRefresh)) : "";
    }

    function refreshDailyQuests(force = false) {
      const now = new Date();
      const currentKey = getLocalDateKey(now);
      if (!force && getDailyQuestRefreshKey(gameState.dailyQuests.lastRefresh) === currentKey && gameState.dailyQuests.quests.length === 3) {
        return false;
      }

      const pool = DAILY_QUEST_POOL.slice().sort(() => Math.random() - 0.5).slice(0, 3);
      if (getWeeksUntilNextPpv() === 1) {
        pool[0] = {
          id: "ppv_training_push",
          difficulty: "medium",
          label: "PPV 전 최종 훈련: 선수 스탯을 70 이상으로 올려라",
          metric: "matchesPlayed",
          target: 1,
          reward: { type: "tickets", amount: 2, label: "뽑기권 +2" }
        };
      }
      gameState.dailyQuests = {
        lastRefresh: now.getTime(),
        quests: pool.map((definition) => buildDailyQuestInstance(definition))
      };
      return true;
    }

    function refreshWeeklyMissions(force = false) {
      const now = new Date();
      const currentKey = getWeeklyResetKey(now);
      if (!force && getWeeklyMissionRefreshKey(gameState.weeklyMissions.lastRefresh) === currentKey && gameState.weeklyMissions.missions.length === WEEKLY_MISSION_DEFS.length) {
        return false;
      }

      gameState.weeklyMissions = {
        lastRefresh: now.getTime(),
        missions: buildWeeklyMissionState()
      };
      gameState.currentWeekStats = createDefaultWeeklyStats();
      return true;
    }

    function sanitizeDailyQuests(rawDailyQuests) {
      const source = rawDailyQuests && typeof rawDailyQuests === "object" ? rawDailyQuests : {};
      return {
        lastRefresh: Number.isFinite(source.lastRefresh) ? source.lastRefresh : 0,
        quests: Array.isArray(source.quests)
          ? source.quests
              .map((quest) => {
                const template = getDailyQuestTemplateById(quest?.templateId);
                if (!template) {
                  return null;
                }
                return {
                  id: typeof quest?.id === "string" ? quest.id : `${template.id}_restored`,
                  templateId: template.id,
                  difficulty: template.difficulty,
                  label: template.label,
                  metric: template.metric,
                  target: template.target,
                  reward: structuredClone(template.reward),
                  baseline: Number.isFinite(quest?.baseline) ? Math.max(0, Math.floor(quest.baseline)) : 0,
                  claimed: Boolean(quest?.claimed)
                };
              })
              .filter(Boolean)
              .slice(0, 3)
          : []
      };
    }

    function sanitizeWeeklyStats(rawWeeklyStats) {
      const defaults = createDefaultWeeklyStats();
      const safe = { ...defaults };
      Object.keys(defaults).forEach((key) => {
        safe[key] = Number.isFinite(rawWeeklyStats?.[key]) ? Math.max(0, Math.floor(rawWeeklyStats[key])) : defaults[key];
      });
      return safe;
    }

    function sanitizeWeeklyMissions(rawWeeklyMissions) {
      const source = rawWeeklyMissions && typeof rawWeeklyMissions === "object" ? rawWeeklyMissions : {};
      const missions = buildWeeklyMissionState();
      missions.forEach((mission) => {
        const rawMission = Array.isArray(source.missions) ? source.missions.find((item) => item?.id === mission.id) : null;
        if (rawMission && Array.isArray(rawMission.claimedStages)) {
          mission.claimedStages = mission.claimedStages.map((_, index) => Boolean(rawMission.claimedStages[index]));
        }
      });
      return {
        lastRefresh: Number.isFinite(source.lastRefresh) ? source.lastRefresh : 0,
        missions
      };
    }

    function getClaimableMissionCount() {
      const dailyCount = gameState.dailyQuests.quests.filter((quest) => !quest.claimed && isDailyQuestComplete(quest)).length;
      const weeklyCount = WEEKLY_MISSION_DEFS.reduce((sum, definition) => {
        const state = getWeeklyMissionStateById(definition.id);
        if (!state) {
          return sum;
        }
        return sum + definition.stages.filter((stage, index) => !state.claimedStages[index] && isWeeklyMissionStageComplete(definition, index)).length;
      }, 0);
      return dailyCount + weeklyCount;
    }

    function addWeeklyStat(metric, amount) {
      if (!metric || !Number.isFinite(amount)) {
        return;
      }
      gameState.currentWeekStats[metric] = Math.max(0, Math.floor((gameState.currentWeekStats[metric] || 0) + amount));
    }

    function applyMatchSummaryToWeeklyStats(summary) {
      if (!summary) {
        return;
      }
      addWeeklyStat("matchesPlayed", summary.matchCount);
      addWeeklyStat("matchesWon", summary.leftWins);
      addWeeklyStat("matchesLost", summary.leftLosses);
      addWeeklyStat("goldEarned", summary.totalIncome);
      addWeeklyStat("fameGained", summary.fameGain);
      addWeeklyStat("audienceTotal", summary.totalAudience);

      let totalDamage = 0;
      let totalCrits = 0;
      let finisherWins = 0;
      let finisherUses = 0;
      let closeMatches = 0;
      let lowStaminaComebacks = 0;
      let cGradeMatches = 0;
      let hype70Matches = 0;
      let rivalryMatches = 0;
      let rivalryClimaxes = 0;
      let titleMatches = 0;

      summary.results.forEach((result) => {
        const wrestlerA = findWrestlerById(result.wrestlerAId);
        const wrestlerB = findWrestlerById(result.wrestlerBId);
        totalDamage += (result.battleResult.winnerStats.damageDealt || 0) + (result.battleResult.loserStats.damageDealt || 0);
        totalCrits += result.battleResult.winnerStats.criticalHits || 0;
        if (result.battleResult.finishType === "PINFALL" && result.battleResult.winnerStats.finisherUsed) {
          finisherWins += 1;
        }
        if (result.battleResult.winnerStats.finisherUsed) {
          finisherUses += 1;
        }
        if (result.battleResult.loserStats.finisherUsed) {
          finisherUses += 1;
        }
        if (result.highlightLabel === "박빙 승부") {
          closeMatches += 1;
        }
        if ((result.battleResult.winnerStats.stamina || 100) <= 10) {
          lowStaminaComebacks += 1;
        }
        if ((wrestlerA && wrestlerA.grade === "C") || (wrestlerB && wrestlerB.grade === "C")) {
          cGradeMatches += 1;
        }
        if (result.hypeAfterMatch >= 70) {
          hype70Matches += 1;
        }
        if (result.rivalryBadge) {
          rivalryMatches += 1;
        }
        if (result.rivalryStageLabel === "클라이맥스 경기") {
          rivalryClimaxes += 1;
        }
        if (result.titleOutcome) {
          titleMatches += 1;
        }
      });

      addWeeklyStat("damageDealt", totalDamage);
      addWeeklyStat("criticalHits", totalCrits);
      addWeeklyStat("finisherWins", finisherWins);
      addWeeklyStat("finishersUsed", finisherUses);
      addWeeklyStat("closeMatches", closeMatches);
      addWeeklyStat("lowStaminaComebackWins", lowStaminaComebacks);
      addWeeklyStat("cGradeMatches", cGradeMatches);
      addWeeklyStat("hype70Matches", hype70Matches);
      addWeeklyStat("rivalryMatches", rivalryMatches);
      addWeeklyStat("rivalryClimaxes", rivalryClimaxes);
      addWeeklyStat("titleMatches", titleMatches);
      if (summary.matchCount > 0 && summary.leftLosses === 0) {
        addWeeklyStat("perfectWeeks", 1);
      }
      notifyMissionCompletionIfNeeded();
    }

      tabButtons.forEach((button) => {
        const badge = button.querySelector(".tab-badge");
        if (!badge) {
          return;
        }
        const count = button.dataset.tab === "missions" ? getClaimableMissionCount() : 0;
        if (count > 0) {
          badge.textContent = count > 9 ? "9+" : String(count);
          badge.classList.remove("hidden");
        } else {
          badge.textContent = "";
          badge.classList.add("hidden");
        }
      });
    }

      const claimable = getClaimableMissionCount();
      if (claimable > (window.__lastMissionClaimableCount || 0)) {
        showAchievementToast("✅ 퀘스트 완료! 보상을 수령하세요");
      }
      window.__lastMissionClaimableCount = claimable;
      renderTabBadges();
    }

    function ensureMissionRefreshes() {
      const dailyChanged = refreshDailyQuests(false);
      const weeklyChanged = refreshWeeklyMissions(false);
      if (dailyChanged || weeklyChanged) {
        window.__lastMissionClaimableCount = getClaimableMissionCount();
      }
    }

    function applyMissionReward(reward) {
      if (!reward) {
        return;
      }
      if (reward.type === "tickets" || reward.type === "legendTicket") {
        gameState.tickets += reward.amount || 0;
        return;
      }
      if (reward.type === "gold") {
        gameState.gold += reward.amount || 0;
        return;
      }
      if (reward.type === "fame") {
        gameState.fame += reward.amount || 0;
        return;
      }
      if (reward.type === "combo") {
        gameState.tickets += reward.tickets || 0;
        gameState.gold += reward.gold || 0;
        gameState.fame += reward.fame || 0;
        return;
      }
      if (reward.type === "specialFragments") {
        addFragments(getSpecialFragmentTemplateId(), reward.amount || 0);
      }
    }

    function claimDailyQuest(questId) {
      const quest = gameState.dailyQuests.quests.find((item) => item.id === questId);
      if (!quest || quest.claimed || !isDailyQuestComplete(quest)) {
        return;
      }
      quest.claimed = true;
      applyMissionReward(quest.reward);
      notifyMissionCompletionIfNeeded();
      render();
      saveGameState();
    }

    function claimWeeklyMissionStage(missionId, stageIndex) {
      const definition = WEEKLY_MISSION_DEFS.find((mission) => mission.id === missionId);
      const state = getWeeklyMissionStateById(missionId);
      if (!definition || !state || state.claimedStages[stageIndex] || !isWeeklyMissionStageComplete(definition, stageIndex)) {
        return;
      }
      state.claimedStages[stageIndex] = true;
      applyMissionReward(definition.stages[stageIndex].reward);
      notifyMissionCompletionIfNeeded();
      render();
      saveGameState();
    }

    function getDailyCountdownText() {
      const remaining = Math.max(0, getNextDailyRefreshTimestamp() - Date.now());
      const hours = String(Math.floor(remaining / 3600000)).padStart(2, "0");
      const minutes = String(Math.floor((remaining % 3600000) / 60000)).padStart(2, "0");
      const seconds = String(Math.floor((remaining % 60000) / 1000)).padStart(2, "0");
      return `${hours}:${minutes}:${seconds}`;
    }

    function syncFacilitiesDerived(facilities) {
      const safeFacilities = structuredClone(createDefaultFacilities());
      Object.keys(safeFacilities).forEach((facilityKey) => {
        const target = safeFacilities[facilityKey];
        const rawFacility = facilities?.[facilityKey] || {};
        const levels = FACILITY_LEVELS[facilityKey];
        const levelKeys = Object.keys(levels).map(Number);
        const minLevel = Math.min(...levelKeys);
        const maxLevel = Math.max(...levelKeys);
        const level = clamp(Number.isFinite(rawFacility.level) ? Math.floor(rawFacility.level) : target.level, minLevel, maxLevel);
        Object.assign(target, rawFacility, { level }, levels[level] || {});
      });
      return safeFacilities;
    }

    function hashString(value) {
      let hash = 0;
      for (let index = 0; index < value.length; index += 1) {
        hash = ((hash << 5) - hash) + value.charCodeAt(index);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function getPortraitBaseName(fileName) {
      return fileName.replace(/\.[^.]+$/, "");
    }

    function toDisplayWord(token) {
      return token.charAt(0).toUpperCase() + token.slice(1);
    }

    function formatPortraitDisplayName(baseName) {
      if (DISPLAY_NAME_OVERRIDES[baseName]) {
        return DISPLAY_NAME_OVERRIDES[baseName];
      }
      return baseName.split("_").map(toDisplayWord).join(" ");
    }

    function getPortraitNickname(baseName, displayName) {
      if (NICKNAME_OVERRIDES[baseName]) {
        return NICKNAME_OVERRIDES[baseName];
      }
      const lastWord = displayName.split(" ").slice(-1)[0];
      return `The ${lastWord}`;
    }

    function getPortraitFinisher(baseName, displayName) {
      if (FINISHER_OVERRIDES[baseName]) {
        return FINISHER_OVERRIDES[baseName];
      }
      const lastWord = displayName.split(" ").slice(-1)[0];
      return `${lastWord} Driver`;
    }

    function getPopularityScore(baseName) {
      if (Number.isFinite(POPULARITY_OVERRIDES[baseName])) {
        return POPULARITY_OVERRIDES[baseName];
      }
      return 42 + (hashString(baseName) % 24);
    }

    function getGradeFromPopularity(popularity) {
      if (popularity >= 98) {
        return "LEGEND";
      }
      if (popularity >= 92) {
        return "S";
      }
      if (popularity >= 78) {
        return "A";
      }
      if (popularity >= 60) {
        return "B";
      }
      return "C";
    }

    function getDeterministicColor(key) {
      return PORTRAIT_COLOR_PALETTE[hashString(key) % PORTRAIT_COLOR_PALETTE.length];
    }

    function getGradeStatRange(grade) {
      return {
        C: [30, 52],
        B: [45, 68],
        A: [62, 82],
        S: [76, 92],
        LEGEND: [88, 98]
      }[grade] || [30, 52];
    }

    function deriveWrestlerStyle(stats, seed = "") {
      const candidates = [
        { style: "powerhouse", value: stats.power },
        { style: "technician", value: stats.technique },
        { style: "showman", value: stats.charisma }
      ];
      const maxValue = Math.max(...candidates.map((item) => item.value));
      const tied = candidates.filter((item) => item.value === maxValue);
      if (tied.length === 1) {
        return tied[0].style;
      }
      return tied[hashString(seed || JSON.stringify(stats)) % tied.length].style;
    }

    function getStyleMeta(style) {
      return STYLE_META[style] || STYLE_META.powerhouse;
    }

    function getDefaultAlignmentForGrade(grade, seed = "") {
      if (grade === "C") {
        return "neutral";
      }
      return (hashString(`${seed}_${grade}_alignment`) % 10) < 7 ? "face" : "heel";
    }

    function getAlignmentMeta(alignment) {
      return ALIGNMENT_META[alignment] || ALIGNMENT_META.neutral;
    }

    function getGeneratedBadgePath(key) {
      return GENERATED_UI_ASSETS.badges[key] || "";
    }

    function getAlignmentBadgeHtml(alignment) {
      const meta = getAlignmentMeta(alignment);
      const badgePath = getGeneratedBadgePath(alignment);
      return `<span class="inline-asset-badge alignment-badge ${alignment}" title="${meta.tooltip}" style="color:${meta.color};font-weight:700;">${badgePath ? `<img src="${badgePath}" alt="${meta.label}">` : meta.icon}<span>${meta.label}</span></span>`;
    }

    function getAlignmentTurnCooldownRemaining(wrestler) {
      return Math.max(0, (wrestler?.alignmentCooldownUntilWeek || 0) - gameState.week);
    }

    function getAlignmentMatchupBonus(leftWrestler, rightWrestler) {
      if (!leftWrestler || !rightWrestler) {
        return { hypeBonus: 0, revenueMultiplier: 1, label: "", recommended: false };
      }
      const left = leftWrestler.alignment || "neutral";
      const right = rightWrestler.alignment || "neutral";
      if ((left === "face" && right === "heel") || (left === "heel" && right === "face")) {
        return { hypeBonus: 20, revenueMultiplier: 1.3, label: "⭐ 추천 매치업! Hype +20 / 수익 ×1.3", recommended: true };
      }
      if (left === "face" && right === "face") {
        return { hypeBonus: 5, revenueMultiplier: 1, label: "🤝 스포츠맨십 매치 · Hype +5", recommended: false };
      }
      if (left === "heel" && right === "heel") {
        return { hypeBonus: -5, revenueMultiplier: 1, label: "🧨 힐 vs 힐 · Hype -5", recommended: false };
      }
      return { hypeBonus: 0, revenueMultiplier: 1, label: "", recommended: false };
    }

    function getAlignmentTurnButtonLabel(wrestler) {
      if (!wrestler) {
        return "";
      }
      if (wrestler.alignment === "heel") {
        return "페이스 전환 -500";
      }
      return "힐 전환 -500";
    }

    function getEventIconPath(eventData) {
      const text = `${eventData?.title || ""} ${eventData?.body || ""}`;
      if (/레전드|복귀/.test(text)) return getUiIconPath("Birth_of_legends.png");
      if (/도발|도전자|크로스오버|정면 승부/.test(text)) return getUiIconPath("Exclusive_decision.png");
      if (/부상|회복|의무/.test(text)) return getUiIconPath("core_body_protection.png");
      if (/미디어|예능|홍보/.test(text)) return getUiIconPath("Perfect_promo.png");
      if (/재정|수리|골드/.test(text)) return getUiIconPath("Financial_suport.png");
      if (/팬|미팅/.test(text)) return getUiIconPath("Viral_spread.png");
      if (/계약|연장/.test(text)) return getUiIconPath("Contract_relaxation.png");
      if (/스카우트|유망주/.test(text)) return getUiIconPath("Spotlight.png");
      if (/TV|중계|방송/.test(text)) return getUiIconPath("Top_viewer.png");
      return getUiIconPath("gold_medal.png");
    }

    function getShowLogisticsPath(fileName) {
      return fileName ? `data/images/SHOW LOGISTICS/${fileName}` : "";
    }

    function getStageArenaImagePath(stageValue = gameState.stage) {
      return getShowLogisticsPath(SHOW_LOGISTICS_ASSETS.arenas[stageValue] || SHOW_LOGISTICS_ASSETS.arenas[1]);
    }

    function getBattleRingImagePath() {
      return getShowLogisticsPath("RING.png");
    }

    function getShowLogoPath(fileName) {
      return fileName ? `data/images/shows/${fileName}` : "";
    }

    function getWeeklyCardSlotCount(weekValue = gameState.week) {
      if (weekValue > 0 && weekValue % 48 === 0) {
        return 7;
      }
      if (weekValue > 0 && weekValue % 4 === 0) {
        return 5;
      }
      return 3;
    }

    function getWeeksUntilNextPpv(weekValue = gameState.week) {
      const mod = weekValue % 4;
      return mod === 0 ? 0 : 4 - mod;
    }

    function getPpvIndexForWeek(weekValue = gameState.week) {
      return Math.floor(((Math.ceil(weekValue / 4) || 1) - 1) % PPV_SHOW_NAMES.length);
    }

    function getPpvInfo(weekValue = gameState.week) {
      const isMania = weekValue > 0 && weekValue % 48 === 0;
      const isPpv = weekValue > 0 && weekValue % 4 === 0;
      const showIndex = getPpvIndexForWeek(weekValue);
      const baseName = isMania ? "RING DYNASTY MANIA" : PPV_SHOW_NAMES[showIndex];
      const ppvLogoByIndex = [
        GENERATED_UI_ASSETS.shows.royalDynasty,
        GENERATED_UI_ASSETS.shows.eliminationNight,
        GENERATED_UI_ASSETS.shows.ironChampionship,
        GENERATED_UI_ASSETS.shows.ringDynastyMania
      ];
      const weeklyShowLogos = ["raw.png", "smack_down.png", "nxt.png"];
      return {
        isPpv,
        isMania,
        name: baseName,
        logoPath: isPpv ? ppvLogoByIndex[showIndex] : getShowLogoPath(weeklyShowLogos[(weekValue - 1) % weeklyShowLogos.length]),
        matchSlots: getWeeklyCardSlotCount(weekValue),
        revenueMultiplier: isMania ? 5 : isPpv ? 2.5 : 1,
        hypeMultiplier: isMania ? 3 : isPpv ? 2 : 1,
        audienceMultiplier: isMania ? 5 : isPpv ? 3 : 1,
        featuredMatchType: isPpv ? (gameState.ppvState.featuredMatchType || PPV_MATCH_TYPES[(Math.floor((weekValue / 4) || 0)) % PPV_MATCH_TYPES.length]) : "",
        weeksUntil: getWeeksUntilNextPpv(weekValue)
      };
    }

    function getPpvBannerText(weekValue = gameState.week) {
      const ppvInfo = getPpvInfo(weekValue);
      if (ppvInfo.isPpv) {
        return ppvInfo.isMania ? "TODAY IS PPV NIGHT! · RING DYNASTY MANIA" : `TODAY IS PPV NIGHT! · ${ppvInfo.name}`;
      }
      if (ppvInfo.weeksUntil > 0 && ppvInfo.weeksUntil <= 3) {
        return `${ppvInfo.name}까지 ${ppvInfo.weeksUntil}주`;
      }
      return "";
    }

    function getPpvMainEventCandidates() {
      return gameState.roster
        .filter((wrestler) => wrestler.status === "idle")
        .slice()
        .sort((left, right) => getWrestlerPower(right) - getWrestlerPower(left))
        .slice(0, 4);
    }

    function setPpvMainEventCandidates(leftId, rightId) {
      gameState.ppvState.selectedMainEventIds = [leftId, rightId].filter(Boolean);
      render();
      saveGameState();
    }

    function getSelectedPpvMainEventWrestlers() {
      return (gameState.ppvState.selectedMainEventIds || []).map((id) => findWrestlerById(id)).filter(Boolean);
    }

    function getAgeRangeForGrade(grade) {
      return {
        C: [18, 24],
        B: [22, 30],
        A: [25, 35],
        S: [28, 38],
        LEGEND: [35, 42]
      }[grade] || [20, 28];
    }

    function getDefaultAgeForGrade(grade, seed = "") {
      const [minAge, maxAge] = getAgeRangeForGrade(grade);
      return minAge + (hashString(`${seed}_${grade}_age`) % (maxAge - minAge + 1));
    }

    function rollAgeForGrade(grade) {
      const [minAge, maxAge] = getAgeRangeForGrade(grade);
      return randomBetween(minAge, maxAge);
    }

    function getAgeStage(age) {
      if (age <= 26) {
        return "growth";
      }
      if (age <= 34) {
        return "prime";
      }
      return "twilight";
    }

    function getAgeStageMeta(age) {
      const stage = getAgeStage(age);
      if (stage === "growth") {
        return { key: stage, label: "🌱 성장 중", short: "🌱", trainingMultiplier: 1.5, recoveryMultiplier: 1.3, fameBonus: 2, capBonus: 0, finisherMultiplier: 1, veteranRevenueMultiplier: 1, injuryBonus: 0 };
      }
      if (stage === "prime") {
        return { key: stage, label: "⚡ 전성기", short: "⚡", trainingMultiplier: 1, recoveryMultiplier: 1, fameBonus: 0, capBonus: 5, finisherMultiplier: 1, veteranRevenueMultiplier: 1, injuryBonus: 0 };
      }
      return { key: stage, label: "🌙 황혼기", short: "🌙", trainingMultiplier: 1, recoveryMultiplier: 1, fameBonus: 0, capBonus: 0, finisherMultiplier: 1.2, veteranRevenueMultiplier: 1.3, injuryBonus: 0.10 };
    }

    function getAgeStageBadgeHtml(age) {
      const meta = getAgeStageMeta(age);
      return `<span title="${meta.label}" style="color:#bdc3c7;">${age}세 ${meta.short}</span>`;
    }

    function getPotentialStarsForGrade(grade, seed = "") {
      const roll = hashString(`${seed}_${grade}_potential`) % 100;
      if (grade === "LEGEND") return 5;
      if (grade === "S") return roll < 40 ? 5 : 4;
      if (grade === "A") return roll < 25 ? 5 : roll < 70 ? 4 : 3;
      if (grade === "B") return roll < 15 ? 4 : roll < 65 ? 3 : 2;
      return roll < 8 ? 5 : roll < 20 ? 4 : roll < 55 ? 3 : 2;
    }

    function getPotentialCapGradeFromStars(stars) {
      return {
        2: "B",
        3: "A",
        4: "S",
        5: "LEGEND"
      }[stars] || "B";
    }

    function getPotentialStarsText(stars) {
      return "★".repeat(Math.max(0, stars)) + "☆".repeat(Math.max(0, 5 - stars));
    }

    function isPotentialRevealUnlocked() {
      return (gameState.facilities?.scoutTeam?.level || 0) >= 2;
    }

    function getPotentialCapLabel(wrestler) {
      if (!wrestler) {
        return "미공개";
      }
      if (!isPotentialRevealUnlocked()) {
        return "스카우트 팀 레벨 2에서 공개";
      }
      return `${wrestler.potentialCapGrade || "B"}급 상한`;
    }

    function getProspectHireCost(wrestler) {
      const baseCost = Math.floor(getGradeHireCost(wrestler?.grade || "C") * 0.5);
      return Math.max(80, baseCost);
    }

    function getAgingRevenueMultiplier(wrestler) {
      return getAgeStageMeta(wrestler?.age || 20).veteranRevenueMultiplier || 1;
    }

    function getAdjustedStatCap(wrestler) {
      return getStatCap(wrestler?.grade || "C", wrestler);
    }

    function getCoachFacilityForWrestler(wrestler) {
      if (!wrestler) {
        return "gym";
      }
      const highest = Math.max(wrestler.stats.power, wrestler.stats.technique, wrestler.stats.charisma);
      if (highest === wrestler.stats.technique) {
        return "matRoom";
      }
      if (highest === wrestler.stats.charisma) {
        return "prStudio";
      }
      return "gym";
    }

    function getCoachTrainingMultiplier(facilityKey) {
      const matchingCoaches = (gameState.coaches || []).filter((coach) => coach.facilityKey === facilityKey).length;
      return 1 + (matchingCoaches * 0.2);
    }

    function getWrestlerWinRateValue(wrestler) {
      const totalMatches = (wrestler.wins || 0) + (wrestler.losses || 0);
      if (!totalMatches) {
        return 0;
      }
      return wrestler.wins / totalMatches;
    }

    function getRosterSortValue(wrestler, sortKey) {
      switch (sortKey) {
        case "joined":
          return Number(wrestler.joinedWeek || 0);
        case "name":
          return wrestler.name || "";
        case "power":
          return getWrestlerPower(wrestler);
        case "powerStat":
          return wrestler.stats.power || 0;
        case "staminaStat":
          return wrestler.stats.stamina || 0;
        case "techniqueStat":
          return wrestler.stats.technique || 0;
        case "charismaStat":
          return wrestler.stats.charisma || 0;
        case "fameStat":
          return wrestler.stats.fame || 0;
        case "age":
          return wrestler.age || 0;
        case "potential":
          return wrestler.potentialStars || 0;
        case "salary":
          return wrestler.salary || 0;
        case "winRate":
          return getWrestlerWinRateValue(wrestler);
        case "contract":
          return wrestler.contractWeeks || 0;
        case "grade":
          return gradeRank(wrestler.grade);
        default:
          return getWrestlerPower(wrestler);
      }
    }

    function matchesRosterStatusFilter(wrestler, filterKey) {
      if (filterKey === "idle") return wrestler.status === "idle";
      if (filterKey === "training") return wrestler.status === "training";
      if (filterKey === "injured") return wrestler.status === "injured";
      return true;
    }

    function getFilteredRoster() {
      const search = rosterViewState.search.trim().toLowerCase();
      const gradeFilters = rosterViewState.gradeFilters;
      const styleFilters = rosterViewState.styleFilters;
      return gameState.roster.filter((wrestler) => {
        if (gradeFilters.length && !gradeFilters.includes(wrestler.grade)) {
          return false;
        }
        if (!matchesRosterStatusFilter(wrestler, rosterViewState.statusFilter)) {
          return false;
        }
        if (styleFilters.length && !styleFilters.includes(wrestler.style)) {
          return false;
        }
        if (rosterViewState.alignmentFilter !== "all" && (wrestler.alignment || "neutral") !== rosterViewState.alignmentFilter) {
          return false;
        }
        if (rosterViewState.favoritesOnly && !wrestler.isFavorite) {
          return false;
        }
        if (search) {
          const haystack = `${wrestler.name} ${wrestler.nickname}`.toLowerCase();
          if (!haystack.includes(search)) {
            return false;
          }
        }
        return true;
      });
    }

    function getSortedRoster() {
      const roster = getFilteredRoster().slice();
      const sortKey = rosterViewState.sortKey || "power";
      const direction = rosterViewState.sortDirection === "asc" ? 1 : -1;
      return roster.sort((left, right) => {
        const leftValue = getRosterSortValue(left, sortKey);
        const rightValue = getRosterSortValue(right, sortKey);
        if (typeof leftValue === "string" || typeof rightValue === "string") {
          return String(leftValue).localeCompare(String(rightValue), "ko") * direction || (getWrestlerPower(right) - getWrestlerPower(left));
        }
        return ((leftValue > rightValue ? 1 : leftValue < rightValue ? -1 : 0) * direction) || (getWrestlerPower(right) - getWrestlerPower(left));
      });
    }

    function clearInvalidRosterSelections() {
      const validIds = new Set(gameState.roster.map((wrestler) => wrestler.id));
      rosterViewState.selectedIds = rosterViewState.selectedIds.filter((id) => validIds.has(id));
    }

    function getSelectedRosterWrestlers() {
      clearInvalidRosterSelections();
      const selectedSet = new Set(rosterViewState.selectedIds);
      return gameState.roster.filter((wrestler) => selectedSet.has(wrestler.id));
    }

    function getRosterFilterSummaryText(filteredCount) {
      const labels = [];
      if (rosterViewState.gradeFilters.length) labels.push(`${rosterViewState.gradeFilters.join("/")}`);
      if (rosterViewState.statusFilter !== "all") {
        labels.push(rosterViewState.statusFilter === "idle" ? "대기중" : rosterViewState.statusFilter === "training" ? "훈련중" : "부상중");
      }
      if (rosterViewState.styleFilters.length) {
        labels.push(rosterViewState.styleFilters.map((style) => getStyleMeta(style).label).join("/"));
      }
      if (rosterViewState.alignmentFilter !== "all") {
        labels.push(getAlignmentMeta(rosterViewState.alignmentFilter).label);
      }
      if (rosterViewState.favoritesOnly) labels.push("즐겨찾기");
      return `총 ${gameState.roster.length}명 중 ${filteredCount}명 표시 중${labels.length ? ` (${labels.join(", ")})` : ""}`;
    }

    function resetRosterFilters() {
      rosterViewState.gradeFilters = [];
      rosterViewState.statusFilter = "all";
      rosterViewState.styleFilters = [];
      rosterViewState.alignmentFilter = "all";
      rosterViewState.favoritesOnly = false;
      rosterViewState.search = "";
      rosterViewState.sortKey = "power";
      rosterViewState.sortDirection = "desc";
    }

    function pushCareerHistorySnapshot(wrestler, weekValue = gameState.week) {
      if (!wrestler) {
        return;
      }
      wrestler.careerHistory = Array.isArray(wrestler.careerHistory) ? wrestler.careerHistory.slice(-11) : [];
      wrestler.careerHistory.push({
        week: weekValue,
        total: Math.round((wrestler.stats.power + wrestler.stats.stamina + wrestler.stats.technique + wrestler.stats.charisma + wrestler.stats.fame) * 10) / 10
      });
      wrestler.careerHistory = wrestler.careerHistory.slice(-12);
    }

    function buildCareerGraphSvg(wrestler) {
      const history = (wrestler.careerHistory || []).slice(-12);
      if (history.length < 2) {
        return '<div class="gacha-small-text">아직 커리어 데이터가 충분하지 않습니다.</div>';
      }
      const width = 320;
      const height = 120;
      const minValue = Math.min(...history.map((entry) => entry.total));
      const maxValue = Math.max(...history.map((entry) => entry.total));
      const range = Math.max(1, maxValue - minValue);
      const points = history.map((entry, index) => {
        const x = 12 + (index * ((width - 24) / Math.max(1, history.length - 1)));
        const y = height - 12 - (((entry.total - minValue) / range) * (height - 24));
        return `${x},${y}`;
      }).join(" ");
      return `
        <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="width:100%;max-width:320px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;">
          <polyline points="${points}" fill="none" stroke="#f1c40f" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polyline>
        </svg>
      `;
    }

    function getStyleMatchup(leftStyle, rightStyle) {
      if (leftStyle === rightStyle) {
        return 0;
      }
      const winsAgainst = {
        powerhouse: "showman",
        showman: "technician",
        technician: "powerhouse"
      };
      return winsAgainst[leftStyle] === rightStyle ? 1 : -1;
    }

    function getStyleImpactModifier(attackerStyle, defenderStyle) {
      const matchup = getStyleMatchup(attackerStyle, defenderStyle);
      if (matchup > 0) {
        return { matchup, damage: 1.2, accuracy: 8, finisher: 1.15, text: "⚡ 스타일 우세!" };
      }
      if (matchup < 0) {
        return { matchup, damage: 0.85, accuracy: -8, finisher: 1, text: "" };
      }
      return { matchup: 0, damage: 1, accuracy: 0, finisher: 1, text: "" };
    }

    function getStyleBadgeHtml(style) {
      const meta = getStyleMeta(style);
      const badgePath = getGeneratedBadgePath(style);
      return `<span class="inline-asset-badge style-badge ${style}" title="${meta.tooltip}">${badgePath ? `<img src="${badgePath}" alt="${meta.label}">` : meta.icon}<span>${meta.label}</span></span>`;
    }

    function getStyleMatchupIndicatorHtml(leftWrestler, rightWrestler) {
      if (!leftWrestler || !rightWrestler) {
        return "";
      }
      const leftMeta = getStyleMeta(leftWrestler.style);
      const rightMeta = getStyleMeta(rightWrestler.style);
      const leftMatchup = getStyleMatchup(leftWrestler.style, rightWrestler.style);
      const rightMatchup = getStyleMatchup(rightWrestler.style, leftWrestler.style);
      const leftIcon = leftMatchup > 0 ? "✅" : leftMatchup < 0 ? "⚠️" : "➖";
      const rightIcon = rightMatchup > 0 ? "✅" : rightMatchup < 0 ? "⚠️" : "➖";
      return `
        <div style="grid-column:1 / -1;color:#bdc3c7;font-size:12px;" title="${leftMeta.tooltip}">
          ${leftMeta.icon} ${leftWrestler.name} ${leftIcon} vs ${rightMeta.icon} ${rightWrestler.name} ${rightIcon}
        </div>
      `;
    }

    function buildStatsForPortrait(baseName, grade, popularity) {
      const [minStat, maxStat] = getGradeStatRange(grade);
      const baseValue = minStat + ((popularity / 100) * (maxStat - minStat));
      const bias = STYLE_BIAS_OVERRIDES[baseName] || { power: 0, stamina: 0, technique: 0, charisma: 0 };
      const hash = hashString(baseName);
      return {
        power: clamp(Math.round(baseValue + bias.power + ((hash % 9) - 4)), minStat, maxStat),
        stamina: clamp(Math.round(baseValue + bias.stamina + (((hash >> 3) % 9) - 4)), minStat, maxStat),
        technique: clamp(Math.round(baseValue + bias.technique + (((hash >> 6) % 9) - 4)), minStat, maxStat),
        charisma: clamp(Math.round(baseValue + bias.charisma + (((hash >> 9) % 9) - 4)), minStat, maxStat),
        fame: clamp(Math.round(popularity + (((hash >> 12) % 7) - 3)), Math.max(minStat, 20), 99)
      };
    }

    function createPoolWrestler(entry) {
      return {
        salary: {
          C: 55,
          B: 90,
          A: 140,
          S: 220,
          LEGEND: 320
        }[entry.grade] || 50,
        passiveHypeBonus: entry.grade === "LEGEND" ? 20 : 0,
        spriteFrames: 1,
        portraitMode: true,
        alignment: entry.alignment || getDefaultAlignmentForGrade(entry.grade, entry.id || entry.name || ""),
        age: Number.isFinite(entry.age) ? entry.age : getDefaultAgeForGrade(entry.grade, entry.id || entry.name || ""),
        potentialStars: Number.isFinite(entry.potentialStars) ? entry.potentialStars : getPotentialStarsForGrade(entry.grade, entry.id || entry.name || ""),
        potentialCapGrade: entry.potentialCapGrade || getPotentialCapGradeFromStars(Number.isFinite(entry.potentialStars) ? entry.potentialStars : getPotentialStarsForGrade(entry.grade, entry.id || entry.name || "")),
        careerHistory: Array.isArray(entry.careerHistory) ? entry.careerHistory : [],
        ...entry
      };
    }

    function createRealPoolWrestler(fileName) {
      const baseName = getPortraitBaseName(fileName);
      if (EXCLUDED_PORTRAIT_BASE_NAMES.has(baseName)) {
        return null;
      }
      const displayName = formatPortraitDisplayName(baseName);
      const popularity = getPopularityScore(baseName);
      const grade = getGradeFromPopularity(popularity);
      const stats = buildStatsForPortrait(baseName, grade, popularity);
      return createPoolWrestler({
        id: baseName,
        name: displayName,
        nickname: getPortraitNickname(baseName, displayName),
        grade,
        finisher: getPortraitFinisher(baseName, displayName),
        spriteColor: getDeterministicColor(baseName),
        spriteSheet: `data/images/wrestlers/${fileName}`,
        stats,
        style: deriveWrestlerStyle(stats, baseName)
      });
    }

    const wrestlerPool = PORTRAIT_FILES
      .map((fileName) => createRealPoolWrestler(fileName))
      .filter(Boolean);

    const LEGACY_EXCLUSIVE_TEMPLATE = createPoolWrestler({
      id: "legacy_ace",
      name: "Apex Legacy",
      nickname: "The Eternal Main Event",
      grade: "S",
      finisher: "Dynasty Driver",
      spriteColor: "#f1c40f",
      stats: {
        power: 84,
        stamina: 82,
        technique: 79,
        charisma: 90,
        fame: 88
      },
      style: "showman",
      alignment: "face",
      age: 29,
      potentialStars: 5,
      potentialCapGrade: "LEGEND"
    });

    function ensureLegacyExclusiveUnlocked(legacyState = null) {
      const resolvedLegacyState = legacyState || createDefaultLegacy();
      const prestigeCount = Number(resolvedLegacyState?.prestigeCount || 0);
      if (prestigeCount >= 3 && !wrestlerPool.some((wrestler) => wrestler.id === LEGACY_EXCLUSIVE_TEMPLATE.id)) {
        wrestlerPool.push(structuredClone(LEGACY_EXCLUSIVE_TEMPLATE));
      }
    }

    // 상태 표시 문자열을 정의한다.
    const STATUS_META = {
      idle: { text: "✅ 대기중", className: "idle" },
      training: { text: "🏋️ 훈련중", className: "training" },
      injured: { text: "🩹 부상", className: "injured" },
      match: { text: "🟡 경기중", className: "match" }
    };

    const GRADE_FRAGMENT_KEYS = ["C", "B", "A", "S", "LEGEND"];
    const GRADE_FRAGMENT_LABELS = {
      C: "C급 조각",
      B: "B급 조각",
      A: "A급 조각",
      S: "S급 조각",
      LEGEND: "레전드 조각"
    };

    const ROSTER_EXPANSION_DATA = {
      1: { rosterLimit: 15, upgradeCost: 3000, nextText: "20명까지 확장" },
      2: { rosterLimit: 20, upgradeCost: 8000, nextText: "25명까지 확장" },
      3: { rosterLimit: 25, upgradeCost: 18000, nextText: "30명까지 확장" },
      4: { rosterLimit: 30, upgradeCost: 0, nextText: "MAX" }
    };

    function createEmptyGradeFragments() {
      return {
        C: 0,
        B: 0,
        A: 0,
        S: 0,
        LEGEND: 0
      };
    }

    function getRosterLimitFromState(facilities = null, legacyState = null) {
      const resolvedFacilities = facilities || createDefaultFacilities();
      const resolvedLegacyState = legacyState || createDefaultLegacy();
      const expansionLevel = Number(resolvedFacilities?.rosterOffice?.level || 1);
      const baseLimit = ROSTER_EXPANSION_DATA[expansionLevel]?.rosterLimit || 15;
      const legacyBonus = Number(resolvedLegacyState?.upgrades?.wrestlerSlots || 0) * 2;
      return baseLimit + legacyBonus;
    }

    // 기본 게임 상태를 생성한다.
    function createDefaultState() {
      const legacy = structuredClone(createDefaultLegacy());
      const startGold = 500 + (legacy.upgrades.startGold * 500);
      const startFame = legacy.upgrades.startReputation * 50;
      const rosterLimit = 15 + (legacy.upgrades.wrestlerSlots * 2);
      return {
        gold: startGold,
        fame: startFame,
        tickets: 3,
        week: 1,
        stage: 1,
        hype: 50,
        roster: createStarterRoster(legacy),
        rosterLimit,

    function createRosterWrestlerFromTemplate(templateId, instanceId) {
      const template = wrestlerPool.find((wrestler) => wrestler.id === templateId);
      if (!template) {
        return null;
      }
      return createWrestler({
        ...structuredClone(template),
        id: instanceId,
        templateId: template.id,
        age: rollAgeForGrade(template.grade),
        status: "idle",
        injuryWeeks: 0,
        wins: 0,
        losses: 0
      });
    }

    // 시작 레슬러 3명을 생성한다.
    function createStarterRoster(legacyState = null) {
      const resolvedLegacyState = legacyState || createDefaultLegacy();
      const prestigeCount = Number(resolvedLegacyState?.prestigeCount || 0);
      ensureLegacyExclusiveUnlocked(resolvedLegacyState);
      const starterIds = prestigeCount >= 3
        ? [
            LEGACY_EXCLUSIVE_TEMPLATE.id,
            (wrestlerPool.find((wrestler) => wrestler.grade === "B") || wrestlerPool[0])?.id,
            "akira_tozawa"
          ]
        : prestigeCount >= 2
        ? [
            (wrestlerPool.find((wrestler) => wrestler.grade === "B") || wrestlerPool[0])?.id,
            "akira_tozawa",
            "andre_chase"
          ]
        : ["akira_tozawa", "andre_chase", "brooks_jensen"];
      return starterIds
        .filter(Boolean)
        .map((templateId, index) => createRosterWrestlerFromTemplate(templateId, `w_${String(index + 1).padStart(3, "0")}`))
        .filter(Boolean);
    }

    // 공용 레슬러 객체를 생성한다.
    function createWrestler(overrides) {
      const mergedStats = {
        ...structuredClone(wrestlerTemplate.stats),
        ...(overrides.stats || {})

      return {
        ...structuredClone(wrestlerTemplate),
        ...overrides,
        stats: mergedStats,
        style: overrides.style || deriveWrestlerStyle(mergedStats, overrides.templateId || overrides.id || overrides.name || ""),
        alignment: overrides.alignment || getDefaultAlignmentForGrade(overrides.grade || "C", overrides.templateId || overrides.id || overrides.name || ""),
        age: Number.isFinite(overrides.age) ? overrides.age : getDefaultAgeForGrade(overrides.grade || "C", overrides.templateId || overrides.id || overrides.name || ""),
        isFavorite: Boolean(overrides.isFavorite),
        joinedWeek: Number.isFinite(overrides.joinedWeek) ? Math.max(1, Math.floor(overrides.joinedWeek)) : 1,

        careerHistory: Array.isArray(overrides.careerHistory) ? overrides.careerHistory.slice(-12) : [],
        trainingProgress: {

    // 숫자를 보기 좋게 포맷한다.
    function formatNumber(value) {
      return Math.floor(value).toLocaleString("ko-KR");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    // 평균값을 보기 좋게 반올림한다.
    function formatAverage(value) {
      return (Math.round(value * 10) / 10).toFixed(1);
    }

    function getLegacyUpgradeLevel(key) {
      return Number(gameState.legacy?.upgrades?.[key] || 0);
    }

    function getBasePityTargets(legacyState = gameState.legacy) {
      const reduce = Number(legacyState?.upgrades?.pityReduce || 0) * 5;
      return {
        pityB: Math.max(5, 10 - reduce),
        pityA: Math.max(20, 50 - reduce),
        pityLegend: Math.max(80, 200 - (reduce * 2))
      };
    }

    function getLegendOwnedCount() {
      return new Set(gameState.roster.filter((wrestler) => wrestler.grade === "LEGEND").map((wrestler) => wrestler.templateId || wrestler.id)).size;
    }

    function refreshLegendOwnedRecord() {
      gameState.legendWrestlersOwned = Math.max(Number(gameState.legendWrestlersOwned || 0), getLegendOwnedCount());
    }

    function addRosterMember(wrestler) {
      if (!wrestler) {
        return;
      }
      wrestler.joinedWeek = Number.isFinite(wrestler.joinedWeek) ? wrestler.joinedWeek : Math.max(1, gameState.week || 1);
      wrestler.isFavorite = Boolean(wrestler.isFavorite);
      gameState.roster.push(wrestler);
      refreshLegendOwnedRecord();
    }

    function canDeclareLegacy() {
      return Boolean(gameState.championships?.world?.holderId) && gameState.stage >= 4 && gameState.week >= 50;
    }

    function calcLegacyPoints(state = gameState) {
      let points = 0;
      points += Math.floor((state.week || 0) / 10);
      points += (Number(state.totalWins || 0) * 0.1);
      points += (Number(state.championships?.world?.defenseWeek || 0) * 5);
      points += (Number(state.legendWrestlersOwned || 0) * 10);
      return Math.floor(points);
    }

    function getLegacyBadgeText() {
      const count = Number(gameState.legacy?.prestigeCount || 0);
      return count > 0 ? ` · 레거시 ${count}회` : "";

      return [
