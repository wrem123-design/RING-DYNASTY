          body: `스카우트가 유망주 ${recruit.name}을 발견했습니다! (B급 보장)`,
          leftLabel: "영입 -400",
          leftHint: "즉시 로스터 합류",
          rightLabel: "패스",
          rightHint: "다음 기회를 노림",
          onLeft: () => {
            if (gameState.gold < 400 || gameState.roster.length >= gameState.rosterLimit) {
              window.alert("골드가 부족하거나 로스터가 가득 찼습니다.");
              return false;
            }
            gameState.gold -= 400;
            addRosterMember(createRosterWrestlerFromTemplate(recruit.id, createWrestlerId("w")));
            checkPersistentAchievements();
            return true;
          }
        };
      }

      if (selected.type === "tv_offer") {
        return {
          title: "TV 중계 제안",
          body: "지역 방송국에서 중계권 계약을 제안했습니다.",
          leftLabel: "계약",
          leftHint: "매주 수익 +500 (4주)",
          rightLabel: "거절",
          rightHint: "변화 없음",
          onLeft: () => {
            gameState.eventEffects.tvDealWeeks = 4;
            gameState.eventEffects.tvDealBonus = 500;
            return true;
          }
        };
      }

      const championshipKey = getAvailableTitleMatchChampionship();
      if (!championshipKey) {
        return null;
      }
      return {
        title: "챔피언 도전자 출현",
        body: "강력한 도전자가 챔피언십 도전을 선언했습니다!",
        leftLabel: "수락",
        leftHint: "다음 주 타이틀 매치 강제 편성",
        rightLabel: "거절",
        rightHint: "인기도 -15",
        onLeft: () => {
          gameState.pendingTitleChallenge = championshipKey;
          return true;
        },
        onRight: () => {
          gameState.fame = Math.max(0, gameState.fame - 15);
          return true;
        }
      };
    }

    function openRandomEventModal(eventData) {
      if (!eventData) {
        return;
      }
      openModal(`
        <div class="modal-header">
          <div>
            <h3 class="modal-title">🎲 ${eventData.title}</h3>
            <p class="modal-subtitle">${eventData.body}</p>
          </div>
        </div>
        <div class="event-art" style="background-image:url('${getEventIconPath(eventData)}');"></div>
        <div class="result-summary-item" style="margin-bottom:14px;">
          <div class="result-summary-label">선택지</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <button class="modal-action-button confirm" id="eventLeftButton">${eventData.leftLabel}<br><span class="gacha-small-text">${eventData.leftHint || ""}</span></button>
            <button class="modal-action-button cancel" id="eventRightButton">${eventData.rightLabel}<br><span class="gacha-small-text">${eventData.rightHint || ""}</span></button>
          </div>
        </div>
      `, { locked: true });

      const leftButton = document.getElementById("eventLeftButton");
      const rightButton = document.getElementById("eventRightButton");
      if (leftButton) {
        leftButton.addEventListener("click", () => {
          const ok = eventData.onLeft ? eventData.onLeft() : true;
          if (ok !== false) {
            closeModal(true);
            render();
            saveGameState();
          }
        });
      }
      if (rightButton) {
        rightButton.addEventListener("click", () => {
          const ok = eventData.onRight ? eventData.onRight() : true;
          if (ok !== false) {
            closeModal(true);
            render();
            saveGameState();
          }
        });
      }
    }

    function getWeeklySalaryBreakdown() {
      return gameState.roster.map((wrestler) => ({
        name: wrestler.name,
        salary: wrestler.salary
      }));
    }

    function getWeeklySalaryTotal() {
      return getWeeklySalaryBreakdown().reduce((sum, item) => sum + item.salary, 0);
    }

    function findWrestler(wrestlerId) {
      return findWrestlerById(wrestlerId);
    }

    function countRemainingCardSlots() {
      return gameState.weeklyCard.filter((slot) => !(slot.wrestlerAId && slot.wrestlerBId)).length;
    }

    function syncWeeklyCardToSchedule() {
      const desired = createEmptyWeeklyCard(gameState.week);
      if (gameState.weeklyCard.length === desired.length) {
        return;
      }
      gameState.weeklyCard = desired.map((slot, index) => ({
        ...slot,
        ...(gameState.weeklyCard[index] || {})
      }));
    }

    function hasTitleMatchBooked() {
      return gameState.weeklyCard.some((slot) => slot.titleMatch && slot.championshipKey);
    }

    function getAvailableTitleMatchChampionship() {
      const forced = gameState.pendingTitleChallenge;
      if (forced && gameState.championships[forced]?.unlocked && gameState.championships[forced]?.holderId) {
        return forced;
      }
      return ["world", "regional", "indie"].find((key) => gameState.championships[key].unlocked && gameState.championships[key].holderId) || "";
    }

    function addTitleMatchToCard() {
      const championshipKey = getAvailableTitleMatchChampionship();
      if (!championshipKey) {
        window.alert("현재 편성 가능한 타이틀 매치가 없습니다.");
        return;
      }
      const championship = gameState.championships[championshipKey];
      const holder = getChampionshipHolder(championshipKey);
      const mainEventSlot = gameState.weeklyCard[gameState.weeklyCard.length - 1];
      if (!holder) {
        return;
      }
      if (mainEventSlot.wrestlerAId || mainEventSlot.wrestlerBId) {
        window.alert("타이틀 매치는 마지막 슬롯에만 추가됩니다. 마지막 슬롯을 비운 뒤 다시 시도하세요.");
        return;
      }
      const challenger = gameState.roster
        .filter((wrestler) => wrestler.id !== holder.id && wrestler.status === "idle")
        .slice()
        .sort((left, right) => getWrestlerPower(right) - getWrestlerPower(left))[0];
      if (!challenger) {
        window.alert("도전자로 배치할 선수가 없습니다.");
        return;
      }
      mainEventSlot.wrestlerAId = holder.id;
      mainEventSlot.wrestlerBId = challenger.id;
      mainEventSlot.titleMatch = true;
      mainEventSlot.championshipKey = championshipKey;
      createOrUpdateRivalry(holder.id, challenger.id, "title", 20);
      gameState.pendingTitleChallenge = "";
      renderActiveTab();
    }

    function getHeartsByHype(hypeValue) {
      const count = Math.max(1, Math.min(5, Math.ceil(hypeValue / 20)));
      return "❤️".repeat(count);
    }

    function updateInjuryRecoveryForNewWeek(skipIds = []) {
      const recoveredIds = [];
      gameState.roster.forEach((wrestler) => {
        if (wrestler.status === "injured") {
          if (skipIds.includes(wrestler.id)) {
            return;
          }
          const healAmount = Math.max(1, Math.floor(getMedicalWeeklyHealAmount() * (getAgeStageMeta(wrestler.age).recoveryMultiplier || 1)));
          wrestler.injuryWeeks = Math.max(0, wrestler.injuryWeeks - healAmount);
          if (wrestler.injuryWeeks === 0) {
            wrestler.status = "idle";
            wrestler.trainingFacility = "";
            wrestler.trainingStartWeek = 0;
            recoveredIds.push(wrestler.id);
          }
        } else if (wrestler.status === "match") {
          wrestler.status = "idle";
        }
      });
      return recoveredIds;
    }

    function ageWrestlerCollection(collection) {
      (collection || []).forEach((wrestler) => {
        if (!wrestler) {
          return;
        }
        wrestler.age = Math.max(16, Math.floor((wrestler.age || 18) + 1));
      });
    }

    function applyWeeklyAgingEffects() {
      const retirementCandidates = [];
      gameState.roster.forEach((wrestler) => {
        pushCareerHistorySnapshot(wrestler, gameState.week);
        if (getAgeStage(wrestler.age) === "twilight") {
          wrestler.stats.stamina = clamp(wrestler.stats.stamina - 1, 1, getAdjustedStatCap(wrestler));
        }
        if (wrestler.age >= 42 && wrestler.stats.stamina <= 20) {
          retirementCandidates.push(wrestler.id);
        }
      });
      return retirementCandidates;
    }

    function applySalaryForWeek() {
      const totalSalary = gameState.roster.reduce((sum, wrestler) => sum + wrestler.salary, 0);
      if (gameState.gold >= totalSalary) {
        gameState.gold -= totalSalary;
        return { totalSalary, paid: true };
      }

      window.alert("⚠️ 급여를 지급하지 못했습니다! 선수 사기가 떨어집니다");
      gameState.roster.forEach((wrestler) => {
        wrestler.stats.charisma = clamp(wrestler.stats.charisma - 5, 1, 100);
      });
      return { totalSalary, paid: false };
    }

    function decrementContracts() {
      gameState.roster.forEach((wrestler) => {
        wrestler.contractWeeks = Math.max(0, wrestler.contractWeeks - 1);
      });
    }

    function checkStageUnlock() {
      if (gameState.fame >= 1200 && gameState.stage < 4) {
        gameState.stage = 4;
        return "4단계 PPV 제국 해금!";
      }
      if (gameState.fame >= 500 && gameState.stage < 3) {
        gameState.stage = 3;
        return "3단계 스타디움 해금!";
      }
      if (gameState.fame >= 100 && gameState.stage < 2) {
        gameState.stage = 2;
        return "2단계 아레나 해금!";
      }
      return "";
    }

    // 랜덤 데이터 생성 도우미를 정의한다.
    function randomBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pickRandom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function createWrestlerId(prefix = "w") {
      const id = `${prefix}_${String(gameState.wrestlerSeq).padStart(3, "0")}`;
      gameState.wrestlerSeq += 1;
      return id;
    }

    function generateFreeAgent() {
      const scout = getScoutSettings();
      const allowedGrades = scout.maxGrade === "S"
        ? ["C", "B", "A", "S"]
        : scout.maxGrade === "A"
          ? ["C", "B", "A"]
          : ["C", "B"];
      const excludedTemplateIds = new Set([
        ...gameState.roster.map((wrestler) => wrestler.templateId).filter(Boolean),
        ...gameState.freeAgents.map((wrestler) => wrestler.templateId).filter(Boolean)
      ]);
      const candidatePool = wrestlerPool.filter((wrestler) => allowedGrades.includes(wrestler.grade) && !excludedTemplateIds.has(wrestler.id));
      const selected = candidatePool.length
        ? pickRandom(candidatePool)
        : pickRandom(wrestlerPool.filter((wrestler) => allowedGrades.includes(wrestler.grade)));

      return createWrestler({
        ...structuredClone(selected),
        id: createWrestlerId("fa"),
        templateId: selected.id,
        age: rollAgeForGrade(selected.grade),
        status: "idle",
        injuryWeeks: 0,
        wins: 0,
        losses: 0
      });
    }

    function generateFreeAgentsForWeek() {
      return Array.from({ length: getScoutSettings().weeklyCandidates }, () => generateFreeAgent());
    }

    // 저장 데이터를 안전하게 정리한다.
    function sanitizeWrestler(rawWrestler, fallbackId) {
      const safeStats = rawWrestler && typeof rawWrestler === "object" ? rawWrestler.stats || {} : {};
      return createWrestler({
        id: typeof rawWrestler?.id === "string" && rawWrestler.id ? rawWrestler.id : fallbackId,
        name: typeof rawWrestler?.name === "string" && rawWrestler.name ? rawWrestler.name : "Unknown",

        grade: typeof rawWrestler?.grade === "string" ? rawWrestler.grade : "C",

          power: clamp(Number.isFinite(safeStats.power) ? Math.floor(safeStats.power) : 20, 1, 100),
          stamina: clamp(Number.isFinite(safeStats.stamina) ? Math.floor(safeStats.stamina) : 20, 1, 100),
          technique: clamp(Number.isFinite(safeStats.technique) ? Math.floor(safeStats.technique) : 20, 1, 100),

        battleSpriteFrames: Number.isFinite(rawWrestler?.battleSpriteFrames) ? Math.max(1, Math.floor(rawWrestler.battleSpriteFrames)) : 12,

        style: ["powerhouse", "technician", "showman"].includes(rawWrestler?.style)

        alignmentCooldownUntilWeek: Number.isFinite(rawWrestler?.alignmentCooldownUntilWeek) ? Math.max(0, Math.floor(rawWrestler.alignmentCooldownUntilWeek)) : 0,

        age: Number.isFinite(rawWrestler?.age) ? Math.max(16, Math.floor(rawWrestler.age)) : getDefaultAgeForGrade(typeof rawWrestler?.grade === "string" ? rawWrestler.grade : "C", typeof rawWrestler?.templateId === "string" ? rawWrestler.templateId : fallbackId),

        potentialStars: Number.isFinite(rawWrestler?.potentialStars) ? clamp(Math.floor(rawWrestler.potentialStars), 1, 5) : getPotentialStarsForGrade(typeof rawWrestler?.grade === "string" ? rawWrestler.grade : "C", typeof rawWrestler?.templateId === "string" ? rawWrestler.templateId : fallbackId),
        potentialCapGrade: typeof rawWrestler?.potentialCapGrade === "string" ? rawWrestler.potentialCapGrade : getPotentialCapGradeFromStars(Number.isFinite(rawWrestler?.potentialStars) ? rawWrestler.potentialStars : getPotentialStarsForGrade(typeof rawWrestler?.grade === "string" ? rawWrestler.grade : "C", typeof rawWrestler?.templateId === "string" ? rawWrestler.templateId : fallbackId)),
        careerHistory: Array.isArray(rawWrestler?.careerHistory)
          ? rawWrestler.careerHistory.slice(-12).map((entry, index) => ({
              week: Number.isFinite(entry?.week) ? Math.max(1, Math.floor(entry.week)) : index + 1,
              total: Number.isFinite(entry?.total) ? Number(entry.total) : 0
            }))
          : [],
        templateId: typeof rawWrestler?.templateId === "string" ? rawWrestler.templateId : "",

              matRoom: Number.isFinite(rawWrestler.trainingProgress.matRoom) ? Math.max(0, Math.floor(rawWrestler.trainingProgress.matRoom)) : 0,
              prStudio: Number.isFinite(rawWrestler.trainingProgress.prStudio) ? Math.max(0, Math.floor(rawWrestler.trainingProgress.prStudio)) : 0
            }
          : structuredClone(wrestlerTemplate.trainingProgress),

        salary: Number.isFinite(rawWrestler?.salary) ? Math.max(0, Math.floor(rawWrestler.salary)) : 50,

    function sanitizeWeeklyCard(rawWeeklyCard, weekValue = gameState.week) {
      const baseSlots = createEmptyWeeklyCard(weekValue);
      if (!Array.isArray(rawWeeklyCard)) {
        return baseSlots;
      }

      return baseSlots.map((baseSlot, index) => {
        const rawSlot = rawWeeklyCard[index] || {};
        return {
          id: baseSlot.id,
          wrestlerAId: typeof rawSlot.wrestlerAId === "string" ? rawSlot.wrestlerAId : null,
          wrestlerBId: typeof rawSlot.wrestlerBId === "string" ? rawSlot.wrestlerBId : null,
          titleMatch: Boolean(rawSlot.titleMatch),
          championshipKey: typeof rawSlot.championshipKey === "string" ? rawSlot.championshipKey : "",
          matchType: typeof rawSlot.matchType === "string" ? rawSlot.matchType : ""
        };
      });
    }

    function sanitizeHistory(rawHistory) {
      if (!Array.isArray(rawHistory)) {
        return [];
      }

      return rawHistory.slice(0, 20).map((entry, index) => ({
        week: Number.isFinite(entry?.week) ? Math.max(1, Math.floor(entry.week)) : index + 1,
        matchCount: Number.isFinite(entry?.matchCount) ? Math.max(0, Math.floor(entry.matchCount)) : 0,
        record: typeof entry?.record === "string" ? entry.record : "0승 0패",
        income: Number.isFinite(entry?.income) ? Math.max(0, Math.floor(entry.income)) : 0,
        hype: Number.isFinite(entry?.hype) ? clamp(Math.floor(entry.hype), 0, 100) : 50
      }));
    }

    function sanitizeMatchHistory(rawMatchHistory) {
      if (!Array.isArray(rawMatchHistory)) {
        return [];
      }

      return rawMatchHistory.slice(-100).map((entry) => ({
        week: Number.isFinite(entry?.week) ? Math.max(1, Math.floor(entry.week)) : 1,
        wrestlerAId: typeof entry?.wrestlerAId === "string" ? entry.wrestlerAId : "",
        wrestlerBId: typeof entry?.wrestlerBId === "string" ? entry.wrestlerBId : "",
        winnerId: typeof entry?.winnerId === "string" ? entry.winnerId : ""
      })).filter((entry) => entry.wrestlerAId && entry.wrestlerBId && entry.winnerId);
    }

    function sanitizeChampionships(rawChampionships) {
      const defaults = createDefaultChampionships();
      const safe = structuredClone(defaults);
      Object.keys(safe).forEach((key) => {
        const raw = rawChampionships?.[key] || {};
        safe[key] = {
          ...safe[key],
          name: typeof raw.name === "string" ? raw.name : safe[key].name,
          belt: typeof raw.belt === "string" ? raw.belt : safe[key].belt,
          holderId: typeof raw.holderId === "string" ? raw.holderId : null,
          defenseWeek: Number.isFinite(raw.defenseWeek) ? Math.max(0, Math.floor(raw.defenseWeek)) : 0,
          unlocked: Boolean(raw.unlocked)
        };
      });
      return safe;
    }

    function sanitizeState(rawState) {
      const defaults = createDefaultState();
      if (!rawState || typeof rawState !== "object") {
        return defaults;
      }

      const roster = Array.isArray(rawState.roster) && rawState.roster.length
        ? rawState.roster.map((wrestler, index) => sanitizeWrestler(wrestler, `w_${String(index + 1).padStart(3, "0")}`))
        : createStarterRoster();

      const freeAgents = Array.isArray(rawState.freeAgents)
        ? rawState.freeAgents.map((wrestler, index) => sanitizeWrestler(wrestler, `fa_${String(index + 1).padStart(3, "0")}`))
        : [];
      const rawFragments = rawState.fragments && typeof rawState.fragments === "object" ? rawState.fragments : {};
      const fragments = Object.fromEntries(
        Object.entries(rawFragments)
          .filter(([key, value]) => typeof key === "string" && Number.isFinite(value))
          .map(([key, value]) => [key, Math.max(0, Math.floor(value))])
      );
      const rawGradeFragments = rawState.gradeFragments && typeof rawState.gradeFragments === "object" ? rawState.gradeFragments : {};
      const gradeFragments = {
        ...createEmptyGradeFragments(),
        ...Object.fromEntries(
          Object.entries(rawGradeFragments)
            .filter(([key, value]) => GRADE_FRAGMENT_KEYS.includes(key) && Number.isFinite(value))
            .map(([key, value]) => [key, Math.max(0, Math.floor(value))])
        )
      };
      const releaseLog = Array.isArray(rawState.releaseLog)
        ? rawState.releaseLog.slice(-20).map((entry) => ({
            week: Number.isFinite(entry?.week) ? Math.max(1, Math.floor(entry.week)) : 1,
            wrestlerName: typeof entry?.wrestlerName === "string" ? entry.wrestlerName : "Unknown",
            grade: GRADE_FRAGMENT_KEYS.includes(entry?.grade) ? entry.grade : "C",
            fragments: Number.isFinite(entry?.fragments) ? Math.max(0, Math.floor(entry.fragments)) : 0
          }))
        : [];
      const rawReleasedFragmentTotals = rawState.releasedFragmentTotals && typeof rawState.releasedFragmentTotals === "object" ? rawState.releasedFragmentTotals : {};
      const releasedFragmentTotals = {
        ...createEmptyGradeFragments(),
        ...Object.fromEntries(
          Object.entries(rawReleasedFragmentTotals)
            .filter(([key, value]) => GRADE_FRAGMENT_KEYS.includes(key) && Number.isFinite(value))
            .map(([key, value]) => [key, Math.max(0, Math.floor(value))])
        )
      };
      const rawAchievements = rawState.achievements && typeof rawState.achievements === "object" ? rawState.achievements : {};
      const legacy = rawState.legacy && typeof rawState.legacy === "object"
        ? {
            points: Number.isFinite(rawState.legacy.points) ? Math.max(0, Math.floor(rawState.legacy.points)) : 0,
            totalEarned: Number.isFinite(rawState.legacy.totalEarned) ? Math.max(0, Math.floor(rawState.legacy.totalEarned)) : 0,
            prestigeCount: Number.isFinite(rawState.legacy.prestigeCount) ? Math.max(0, Math.floor(rawState.legacy.prestigeCount)) : 0,
            titles: Array.isArray(rawState.legacy.titles) ? rawState.legacy.titles.filter((item) => typeof item === "string") : [],
            upgrades: {
              ...createDefaultLegacy().upgrades,
              ...(rawState.legacy.upgrades && typeof rawState.legacy.upgrades === "object" ? rawState.legacy.upgrades : {})
            }
          }
        : defaults.legacy;
      const pityTargets = getBasePityTargets(legacy);
      const pitySystem = rawState.pitySystem && typeof rawState.pitySystem === "object"
        ? {
            pityCount: Number.isFinite(rawState.pitySystem.pityCount) ? Math.max(0, Math.floor(rawState.pitySystem.pityCount)) : 0,
            pityB: Number.isFinite(rawState.pitySystem.pityB) ? clamp(Math.floor(rawState.pitySystem.pityB), 0, pityTargets.pityB) : pityTargets.pityB,
            pityA: Number.isFinite(rawState.pitySystem.pityA) ? clamp(Math.floor(rawState.pitySystem.pityA), 0, pityTargets.pityA) : pityTargets.pityA,
            pityLegend: Number.isFinite(rawState.pitySystem.pityLegend) ? clamp(Math.floor(rawState.pitySystem.pityLegend), 0, pityTargets.pityLegend) : pityTargets.pityLegend
          }
        : {
            pityCount: 0,
            pityB: pityTargets.pityB,
            pityA: pityTargets.pityA,
            pityLegend: pityTargets.pityLegend
          };

      return {
        gold: Number.isFinite(rawState.gold) ? Math.max(0, Math.floor(rawState.gold)) : defaults.gold,
        fame: Number.isFinite(rawState.fame) ? Math.max(0, Math.floor(rawState.fame)) : defaults.fame,

        hype: Number.isFinite(rawState.hype) ? clamp(Math.floor(rawState.hype), 0, 100) : 50,
        roster,

          roster.length,

            ? Math.floor(rawState.rosterLimit)
            : getRosterLimitFromState(syncFacilitiesDerived(rawState.facilities), legacy)
        ),
        weeklyCard: sanitizeWeeklyCard(rawState.weeklyCard, Number.isFinite(rawState.week) ? Math.max(1, Math.floor(rawState.week)) : defaults.week),
        lastWeekMatchups: Array.isArray(rawState.lastWeekMatchups) ? rawState.lastWeekMatchups.filter((item) => typeof item === "string") : [],
        matchHistory: sanitizeMatchHistory(rawState.matchHistory),

            }

          ? rawState.prospects.map((wrestler, index) => sanitizeWrestler(wrestler, `pr_${String(index + 1).padStart(3, "0")}`))

        lastSaved: Number.isFinite(rawState.lastSaved) ? rawState.lastSaved : defaults.lastSaved
      };
    }

    function loadGameState() {
      const defaults = createDefaultState();
      let loadedState = defaults;
      let offlineGold = 0;

      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          loadedState = sanitizeState(JSON.parse(saved));
        }
      } catch (error) {
        console.error("저장 데이터를 불러오지 못했습니다.", error);
      }

      const now = Date.now();
      const lastSaved = Number.isFinite(loadedState.lastSaved) ? loadedState.lastSaved : now;
      const elapsedMs = Math.max(0, now - lastSaved);
      const cappedSeconds = Math.min(Math.floor(elapsedMs / 1000), 60 * 60 * 24);

      if (cappedSeconds > 0) {
        offlineGold = Math.floor(cappedSeconds * getIdleIncomePerSecond(loadedState.stage, loadedState.legacy));
        loadedState.gold += offlineGold;
      }

      gameState = loadedState;
      ensureLegacyExclusiveUnlocked(loadedState.legacy);
      if (!Array.isArray(loadedState.freeAgents) || loadedState.freeAgentsWeek !== loadedState.week) {
        loadedState.freeAgents = generateFreeAgentsForWeek();
        loadedState.freeAgentsWeek = loadedState.week;
      }

      if (!Array.isArray(loadedState.prospects) || loadedState.prospectsWeek !== loadedState.week) {
        loadedState.prospects = generateProspectScoutsForWeek();
        loadedState.prospectsWeek = loadedState.week;
      }

      loadedState.rosterLimit = Math.max(loadedState.roster.length, getRosterLimitFromState(loadedState.facilities, loadedState.legacy));
      refreshLegendOwnedRecord();
      loadedState.lastSaved = now;

      return { state: loadedState, offlineGold };
    }

    function getSpriteImage(path) {
      if (!path) {
        return null;
      }
      if (!spriteImageCache.has(path)) {
        const img = new Image();
        img.src = path;
        spriteImageCache.set(path, img);
      }
      return spriteImageCache.get(path);
    }

    function drawWrestlerSprite(ctx, x, y, img, frameIndex, totalFrames) {
      if (!img || !img.complete || !img.width || !img.height || !totalFrames) {
        return;
      }
      const frameWidth = img.width / totalFrames;
      ctx.drawImage(
        img,
        frameWidth * frameIndex,
        0,
        frameWidth,
        img.height,
        x - frameWidth / 2,
        y - img.height,
        frameWidth,
        img.height
      );
    }

    function drawPortraitImage(ctx, x, y, img) {
      if (!img || !img.complete || !img.width || !img.height) {
        return;
      }
      const targetWidth = 54;
      const targetHeight = 78;
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(x - targetWidth / 2, y - targetHeight, targetWidth, targetHeight, 10);
      ctx.clip();
      ctx.drawImage(img, x - targetWidth / 2, y - targetHeight, targetWidth, targetHeight);
      ctx.restore();

      ctx.strokeStyle = "rgba(236, 240, 241, 0.6)";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x - targetWidth / 2, y - targetHeight, targetWidth, targetHeight);
    }

    function drawVersusPortrait(ctx, snapshot, x, y, width, height, flip = false) {
      const portrait = getSpriteImage(snapshot.spriteSheet);
      ctx.save();
      if (flip) {
        ctx.translate(x, 0);
        ctx.scale(-1, 1);
        x = 0;
      }
      if (portrait && portrait.complete && portrait.width && portrait.height) {
        ctx.beginPath();
        ctx.roundRect(x - (width / 2), y - height, width, height, 28);
        ctx.clip();
        ctx.drawImage(portrait, x - (width / 2), y - height, width, height);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.roundRect(x - (width / 2), y - height, width, height, 28);
        ctx.fill();
      }
      ctx.restore();
      ctx.strokeStyle = "rgba(236, 240, 241, 0.65)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.roundRect(x - (width / 2), y - height, width, height, 28);
      ctx.stroke();
    }

    function getBattleSpritePath(entity) {
      if (entity?.battleSpriteSheet) {
        return entity.battleSpriteSheet;
      }
      return COMMON_BATTLE_SPRITE_ASSETS[entity?.style] || COMMON_BATTLE_SPRITE_ASSETS.powerhouse;
    }

    function getBattleSpriteFrameIndex(frame, state, totalFrames = 12) {
      if (totalFrames < 12) {
        return Math.floor(frame / 8) % Math.max(1, totalFrames);
      }
      if (state === "down") {
        return 11;
      }
      if (state === "victory") {
        return 10;
      }
      if (state === "attack") {
        return 4 + (Math.floor(frame / 6) % 3);
      }
      if (state === "finisher") {
        return 7 + (Math.floor(frame / 5) % 3);
      }
      if (state === "walk") {
        return Math.floor(frame / 6) % 4;
      }
      return 1;
    }

    function drawBattleSpriteFrame(ctx, x, y, img, frameIndex, totalFrames) {
      if (!img || !img.complete || !img.width || !img.height || !totalFrames) {
        return;
      }
      const frameWidth = img.width / totalFrames;
      const destWidth = 96;
      const destHeight = 96;
      ctx.drawImage(
        img,
        frameWidth * frameIndex,
        0,
        frameWidth,
        img.height,
        x - (destWidth / 2),
        y - destHeight,
        destWidth,
        destHeight
      );
    }

    /* 
      === 스프라이트 에셋 교체 방법 ===
      1. wrestlerData에 spriteSheet: './assets/wrestler_name.png' 추가
      2. 스프라이트 시트 규격:
         - 프레임 크기: 48x48px
         - 프레임 순서: [0]걷기1 [1]걷기2 [2]걷기3 [3]걷기4
                        [4]공격1 [5]공격2 [6]공격3
                        [7]필살기1 [8]필살기2 [9]필살기3
                        [10]승리포즈 [11]다운
      3. drawWrestler 함수가 spriteSheet 있으면 자동으로 이미지 사용
      4. 배경 투명 PNG 권장 (remove.bg 사용)
    */
    function drawWrestler(ctx, x, y, color, grade, frame, state, name) {
      const scale = 2;
      const jumpOffset = state === "victory" ? Math.abs(Math.sin(frame * 0.18)) * 10 : 0;
      const bodyY = y - jumpOffset;

      ctx.save();
      if (state === "down") {
        ctx.translate(x, bodyY - 8);
        ctx.rotate(-Math.PI / 2);
        ctx.translate(-x, -(bodyY - 8));
      }

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, bodyY - 40, (12 * scale) / 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillRect(x - 8, bodyY - 30, 16, 22);

      if (state === "attack" || state === "victory") {
        ctx.fillRect(x - 14, bodyY - 28, 6, 14);
        ctx.fillRect(x + 8, bodyY - 28, 16, 6);
      } else {
        ctx.fillRect(x - 14, bodyY - 28, 6, 14);
        ctx.fillRect(x + 8, bodyY - 28, 6, 14);
      }

      const legOffset = state === "walk" ? Math.sin(frame * 0.2) * 4 : 0;
      ctx.fillRect(x - 6, bodyY - 8, 5, 20 + legOffset);
      ctx.fillRect(x + 1, bodyY - 8, 5, 20 - legOffset);

      if (grade === "LEGEND" || grade === "S") {
        ctx.fillStyle = "#f1c40f";
        ctx.font = `${(10 * scale) / 2}px serif`;
        ctx.textAlign = "center";
        ctx.fillText(grade === "LEGEND" ? "♛" : "★", x, bodyY - 56);
      }

      ctx.restore();

      ctx.fillStyle = "#ecf0f1";
      ctx.font = '10px "Courier New"';
      ctx.textAlign = "center";
      ctx.fillText(name, x, y + 24);
    }

    function drawWrestlerVisual(ctx, wrestler, x, y, frame, state) {
      const spriteImage = getSpriteImage(wrestler.spriteSheet);
      if (spriteImage && spriteImage.complete) {
        if (wrestler.portraitMode || (wrestler.spriteFrames || 1) === 1) {
          drawPortraitImage(ctx, x, y, spriteImage);
        } else {
          drawWrestlerSprite(ctx, x, y, spriteImage, Math.floor(frame / 8) % (wrestler.spriteFrames || 4), wrestler.spriteFrames || 4);
        }
        ctx.fillStyle = "#ecf0f1";
        ctx.font = '10px "Courier New"';
        ctx.textAlign = "center";
        ctx.fillText(wrestler.name, x, y + 24);
        return;
      }
      drawWrestler(ctx, x, y, wrestler.spriteColor, wrestler.grade, frame, state, wrestler.name);
    }

    function drawCrowd(ctx, intensity) {
      const dotCount = Math.floor(90 + intensity * 70);
      const crowdColors = ["#8e44ad", "#3498db", "#f1c40f", "#e74c3c", "#2ecc71", "#ecf0f1"];
      for (let index = 0; index < dotCount; index += 1) {
        ctx.fillStyle = crowdColors[index % crowdColors.length];
        const x = (index * 37) % 640;
        const y = 20 + ((index * 29) % 95);
        const size = 2 + ((index + Math.floor(intensity * 10)) % 3);
        ctx.fillRect(x, y, size, size);
      }
    }

    function drawArenaBase(ctx, hypeValue) {
      ctx.clearRect(0, 0, 640, 360);
      ctx.fillStyle = "#0d0d0d";
      ctx.fillRect(0, 0, 640, 360);

      drawCrowd(ctx, hypeValue / 100);

      ctx.fillStyle = "rgba(255,255,255,0.05)";
      ctx.fillRect(0, 120, 640, 140);

      ctx.strokeStyle = "#ecf0f1";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(40, 220);
      ctx.lineTo(600, 220);
      ctx.moveTo(40, 240);
      ctx.lineTo(600, 240);
      ctx.stroke();

      ctx.strokeStyle = "#8B4513";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(20, 250);
      ctx.lineTo(620, 250);
      ctx.stroke();

      ctx.fillStyle = "#121212";
      ctx.fillRect(140, 250, 360, 36);

      drawCanvasHypeGauge(ctx, hypeValue);
    }

    function drawCanvasHypeGauge(ctx, hypeValue) {
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(20, 16, 600, 14);
      const gradient = ctx.createLinearGradient(20, 0, 620, 0);
      gradient.addColorStop(0, "#2ecc71");
      gradient.addColorStop(0.55, "#f1c40f");
      gradient.addColorStop(1, "#e74c3c");
      ctx.fillStyle = gradient;
      ctx.fillRect(20, 16, 600 * (clamp(hypeValue, 0, 100) / 100), 14);
      ctx.fillStyle = "#ecf0f1";
      ctx.font = '11px "Courier New"';
      ctx.textAlign = "left";
      ctx.fillText(`HYPE ${hypeValue}/100`, 20, 12);
    }

    function drawIdleHomeCanvas(ctx) {
      drawArenaBase(ctx, gameState.hype);

      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(110, 140, 60, 80);
      ctx.fillRect(200, 110, 90, 110);
      ctx.fillRect(320, 90, 120, 130);
      ctx.fillRect(470, 130, 70, 90);

      ctx.fillStyle = "#ecf0f1";
      ctx.textAlign = "center";
      ctx.font = '22px "Courier New"';
      ctx.fillText(`Week ${gameState.week} - ${getHomeArenaLabel()}`, 320, 150);

      ctx.font = '13px "Courier New"';
      const lines = getHomeMatchPreviewLines();
      lines.forEach((line, index) => {
        ctx.fillText(line, 320, 286 + index * 18);
      });
    }

    function getAnimationPhaseData(elapsed) {
      const phases = [
        { key: "entrance", duration: 3000 },
        { key: "staredown", duration: 1000 },
        { key: "battle", duration: 5000 },
        { key: "finisher", duration: 2000 },
        { key: "pinfall", duration: 3000 },
        { key: "victory", duration: 2000 }
      ];

      let offset = 0;
      for (const phase of phases) {
        if (elapsed < offset + phase.duration) {
          return {
            phase: phase.key,
            progress: (elapsed - offset) / phase.duration,
            done: false
          };
        }
        offset += phase.duration;
      }

      return { phase: "complete", progress: 1, done: true };
    }

    function drawFlashOverlay(ctx, alpha) {
      ctx.fillStyle = `rgba(231, 76, 60, ${alpha})`;
      ctx.fillRect(0, 0, 640, 360);
    }

    function drawCanvasText(ctx, text, y, size, color) {
      ctx.fillStyle = color;
      ctx.font = `${size}px "Courier New"`;
      ctx.textAlign = "center";
      ctx.fillText(text, 320, y);
    }

    function drawMatchAnimationFrame(ctx, now) {
      const currentMatch = matchAnimationState.queue[matchAnimationState.matchIndex];
      if (!currentMatch) {
        finishMatchAnimation();
        return;
      }

      const elapsed = now - matchAnimationState.matchStartTime;
      const phaseData = getAnimationPhaseData(elapsed);
      if (phaseData.done) {
        matchAnimationState.matchIndex += 1;
        if (matchAnimationState.matchIndex >= matchAnimationState.queue.length) {
          finishMatchAnimation();
          return;
        }
        matchAnimationState.matchStartTime = now;
        drawMatchAnimationFrame(ctx, now);
        return;
      }

      const wrestlerA = currentMatch.wrestlerA;
      const wrestlerB = currentMatch.wrestlerB;
      const winner = currentMatch.winner;
      const loser = currentMatch.loser;
      const frame = Math.floor(now / 16);

      drawArenaBase(ctx, currentMatch.hypeAfterMatch);

      let xA = 160;
      let xB = 480;
      let yA = 250;
      let yB = 250;
      let stateA = "idle";
      let stateB = "idle";
      let hpA = winner.id === wrestlerA.id ? 0.86 : 1;
      let hpB = winner.id === wrestlerB.id ? 0.86 : 1;

      if (phaseData.phase === "entrance") {
        xA = -40 + (240 * phaseData.progress);
        xB = 680 - (240 * phaseData.progress);
        stateA = "walk";
        stateB = "walk";
        drawCanvasText(ctx, "♪ 입장음악 재생 중...", 54, 16, "#f1c40f");
      } else if (phaseData.phase === "staredown") {
        xA = 200;
        xB = 440;
        const countdown = phaseData.progress < 0.25 ? "3..." : phaseData.progress < 0.5 ? "2..." : phaseData.progress < 0.75 ? "1..." : "FIGHT!";
        drawCanvasText(ctx, countdown, 86, 28, "#e74c3c");
        if (currentMatch.styleMessage) {
          drawCanvasText(ctx, currentMatch.styleMessage, 116, 16, "#2ecc71");
        }
      } else if (phaseData.phase === "battle") {
        const attackPulse = Math.sin(frame * 0.22) * 12;
        xA = 220 + (winner.id === wrestlerA.id ? attackPulse : 0);
        xB = 420 - (winner.id === wrestlerB.id ? attackPulse : 0);
        stateA = winner.id === wrestlerA.id ? "attack" : "idle";
        stateB = winner.id === wrestlerB.id ? "attack" : "idle";
        if (loser.id === wrestlerA.id) {
          yA = 250 + phaseData.progress * 22;
          hpA = 1 - phaseData.progress;
        }
        if (loser.id === wrestlerB.id) {
          yB = 250 + phaseData.progress * 22;
          hpB = 1 - phaseData.progress;
        }
      } else if (phaseData.phase === "finisher") {
        const rush = phaseData.progress;
        if (winner.id === wrestlerA.id) {
          xA = 220 + rush * 130;
          xB = 420;
          stateA = "attack";
          stateB = "down";
          yB = 272;
        } else {
          xB = 420 - rush * 130;
          xA = 220;
          stateB = "attack";
          stateA = "down";
          yA = 272;
        }
        drawFlashOverlay(ctx, 0.18 + Math.abs(Math.sin(frame * 0.35)) * 0.25);
        drawCanvasText(ctx, `${winner.name}의 ${winner.finisher}!!!`, 94, 24, "#ffdfdf");
      } else if (phaseData.phase === "pinfall") {
        if (winner.id === wrestlerA.id) {
          xA = 280;
          xB = 380;
          stateA = "attack";
          stateB = "down";
          yB = 274;
          hpB = 0;
        } else {
          xB = 360;
          xA = 260;
          stateB = "attack";
          stateA = "down";
          yA = 274;
          hpA = 0;
        }
        const pinText = phaseData.progress < 0.33 ? "1 ..." : phaseData.progress < 0.66 ? "2 ..." : `3! WINNER: ${winner.name}!`;
        drawCanvasText(ctx, pinText, 90, 24, "#ecf0f1");
      } else if (phaseData.phase === "victory") {
        const stars = 3 + (winner.grade === "LEGEND" ? 2 : 1);
        if (winner.id === wrestlerA.id) {
          xA = 320;
          xB = 430;
          stateA = "victory";
          stateB = "down";
          yB = 274;
        } else {
          xB = 320;
          xA = 210;
          stateB = "victory";
          stateA = "down";
          yA = 274;
        }
        drawCrowd(ctx, 1.1);
        for (let index = 0; index < stars; index += 1) {
          const starX = 260 + index * 34 + Math.sin(frame * 0.08 + index) * 10;
          const starY = 126 + Math.cos(frame * 0.08 + index) * 12;
          ctx.fillStyle = "#f1c40f";
          ctx.font = '18px "Courier New"';
          ctx.textAlign = "center";
          ctx.fillText("✦", starX, starY);
        }
      }

      drawHpBar(ctx, xA, yA - 58, hpA, wrestlerA.name);
      drawHpBar(ctx, xB, yB - 58, hpB, wrestlerB.name);
      drawWrestlerVisual(ctx, wrestlerA, xA, yA, frame, stateA);
      drawWrestlerVisual(ctx, wrestlerB, xB, yB, frame, stateB);
    }

    function drawHpBar(ctx, x, y, hpRate) {
      ctx.fillStyle = "rgba(255,255,255,0.12)";
      ctx.fillRect(x - 28, y, 56, 6);
      ctx.fillStyle = hpRate > 0.5 ? "#2ecc71" : hpRate > 0.2 ? "#f1c40f" : "#e74c3c";
      ctx.fillRect(x - 28, y, 56 * clamp(hpRate, 0, 1), 6);
    }

    function drawCurrentCanvasFrame(now) {
      const canvas = document.getElementById("matchCanvas");
      if (!canvas) {
        return;
      }
      const ctx = canvas.getContext("2d");
      if (!ctx) {
        return;
      }

      if (matchAnimationState.running) {
        drawMatchAnimationFrame(ctx, now);
      } else {
        drawIdleHomeCanvas(ctx);
      }
    }

    function startMatchAnimation(matchQueue) {
      if (!matchQueue.length) {
        openWeeklyResultsModal();
        return;
      }

      matchAnimationState.running = true;
      matchAnimationState.queue = matchQueue;
      matchAnimationState.matchIndex = 0;
      matchAnimationState.matchStartTime = performance.now();
    }

    function finishMatchAnimation() {
      matchAnimationState.running = false;
      matchAnimationState.queue = [];
      matchAnimationState.matchIndex = 0;
      if (typeof matchAnimationState.finishCallback === "function") {
        const callback = matchAnimationState.finishCallback;
        matchAnimationState.finishCallback = null;
        callback();
      } else {
        openWeeklyResultsModal();
      }
      render();
    }

    function skipMatchAnimation() {
      if (!matchAnimationState.running) {
        return;
      }
      finishMatchAnimation();
    }

    function startCanvasLoop() {
      function frame(now) {
        drawCurrentCanvasFrame(now);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    // STEP 4 전투 시스템 상수를 정의한다.
    const MOVE_COSTS = {
      basic: 5,
      power: 12,
      technical: 18,
      submission: 25,
      finisher: 40
    };

    const MOVE_LABELS = {
      basic: "Basic Strike",
      power: "Power Move",
      technical: "Technical Move",
      submission: "Submission",
      finisher: "Finisher"
    };

    const HIGHLIGHT_BONUS = {
      FINISHER: 12,
      CRITICAL_COMEBACK: 18,
      CLOSE_MATCH: 15,
      DOMINANT: 5
    };

    const PPV_SHOW_NAMES = ["ROYAL DYNASTY", "ELIMINATION NIGHT", "IRON CHAMPIONSHIP", "RING DYNASTY MANIA"];
    const PPV_MATCH_TYPES = ["LADDER_MATCH", "CAGE_MATCH", "IRON_MAN_MATCH"];

    // STEP 4 전용 최대 HP를 계산한다.
    function calcMaxHP(wrestler) {
      const base = 300;
      const staminaBonus = wrestler.stats.stamina * 4.5;
      const powerBonus = wrestler.stats.power * 1.2;
      const gradeMultiplier = {
        C: 1.0,
        B: 1.2,
        A: 1.5,
        S: 1.8,
        LEGEND: 2.2
      };

      return Math.floor((base + staminaBonus + powerBonus) * (gradeMultiplier[wrestler.grade] || 1));
    }

    // 경기 시작 시 전투용 임시 상태를 만든다.
    function createBattleState(wrestler) {
      const maxHP = calcMaxHP(wrestler);
      const ageMeta = getAgeStageMeta(wrestler.age || 20);
      return {
        id: wrestler.id,
        name: wrestler.name,
        nickname: wrestler.nickname,
        grade: wrestler.grade,
        style: wrestler.style,
        alignment: wrestler.alignment || "neutral",
        finisher: wrestler.finisher,
        spriteColor: wrestler.spriteColor,
        spriteSheet: wrestler.spriteSheet,
        battleSpriteSheet: wrestler.battleSpriteSheet || null,
        spriteFrames: wrestler.spriteFrames,
        battleSpriteFrames: wrestler.battleSpriteFrames || 12,
        portraitMode: wrestler.portraitMode,
        maxHP,
        currentHP: maxHP,
        maxStamina: 100,
        currentStamina: 100,
        finisherGauge: 0,
        finisherChargeMultiplier: ageMeta.finisherMultiplier || 1,
        momentum: 50,
        isStunned: false,
        isGrapped: false,
        isDown: false,
        downCount: 0,
        pinCount: 0,
        isPinned: false,
        totalDamageDealt: 0,
        totalDamageReceived: 0,
        attackCount: 0,
        finisherUsed: false,
        criticalHits: 0,
        kickoutsAt2: 0,
        forcedRestTurn: false,
        usedFinisherToWin: false,
        usedCheapShot: false,
        lossStreak: getRecentLossStreak(wrestler),
        age: wrestler.age || 20,
        highlightFlags: {
          criticalComeback: false
        },
        stats: { ...wrestler.stats }
      };
    }

    // 전투 상태를 캔버스 렌더링용으로 복사한다.
    function snapshotBattleState(battleState) {
      return {
        id: battleState.id,
        name: battleState.name,
        nickname: battleState.nickname,
        grade: battleState.grade,
        style: battleState.style,
        alignment: battleState.alignment,
        finisher: battleState.finisher,
        spriteColor: battleState.spriteColor,
        spriteSheet: battleState.spriteSheet,
        battleSpriteSheet: battleState.battleSpriteSheet || null,
        spriteFrames: battleState.spriteFrames,
        battleSpriteFrames: battleState.battleSpriteFrames || 12,
        portraitMode: battleState.portraitMode,
        currentHP: battleState.currentHP,
        maxHP: battleState.maxHP,
        currentStamina: battleState.currentStamina,
        maxStamina: battleState.maxStamina,
        finisherGauge: battleState.finisherGauge,
        momentum: battleState.momentum,
        isDown: battleState.isDown,
        isPinned: battleState.isPinned,
        isStunned: battleState.isStunned,
        downCount: battleState.downCount
      };
    }

    // 스태미나 상태에 따른 데미지 보정을 계산한다.
    function getStaminaModifier(currentStamina) {
      if (currentStamina <= 0) {
        return 0;
      }
      if (currentStamina < 10) {
        return 0.4;
      }
      if (currentStamina < 40) {
        return 0.65;
      }
      if (currentStamina < 70) {
        return 0.85;
      }
      return 1;
    }

    // 스태미나 상태에 따른 성공률 패널티를 계산한다.
    function getStaminaAccuracyPenalty(currentStamina) {
      if (currentStamina <= 0) {
        return 100;
      }
      if (currentStamina < 10) {
        return 30;
      }
      if (currentStamina < 40) {
        return 15;
      }
      if (currentStamina < 70) {
        return 5;
      }
      return 0;
    }

    // 스태미나 상태 문구를 만든다.
    function getStaminaStateLabel(currentStamina) {
      if (currentStamina <= 0) {
        return "완전 탈진";
      }
      if (currentStamina < 10) {
        return "체력 한계!";
      }
      if (currentStamina < 30) {
        return "숨이 가쁘다";
      }
      return "";
    }

    // 턴 시작 시 스태미나 회복량을 계산한다.
    function getStaminaRecoveryAmount(battleState) {
      const recovery = 8 + (battleState.stats.stamina * 0.12);
      return battleState.isDown ? recovery * 2 : recovery;
    }

    // 피니셔 게이지를 충전한다.
    function chargeFinisherGauge(battleState, amount) {
      const gainMultiplier = 1 + (battleState.stats.charisma * 0.005);
      const momentumPenalty = battleState.momentum <= 20 ? 0.7 : 1;
      const styleMod = battleState.styleFinisherChargeModifier || 1;
      battleState.finisherGauge = clamp(
        battleState.finisherGauge + (amount * gainMultiplier * momentumPenalty * (battleState.finisherChargeMultiplier || 1) * styleMod),
        0,
        100
      );
    }

    // 모멘텀을 100 합계로 고정한다.
    function normalizeMomentum(leftState, rightState) {
      leftState.momentum = clamp(leftState.momentum, 0, 100);
      rightState.momentum = clamp(100 - leftState.momentum, 0, 100);
      leftState.momentum = clamp(100 - rightState.momentum, 0, 100);
    }

    // 모멘텀 이동을 적용한다.
    function shiftMomentum(attacker, defender, amount, currentHype, leftState, rightState) {
      const actualAmount = amount * (currentHype >= 80 ? 1.3 : 1);
      attacker.momentum += actualAmount;
      defender.momentum -= actualAmount;
      normalizeMomentum(leftState, rightState);
    }

    // 기본 데미지 공식을 반환한다.
    function getMoveBaseDamage(attacker, moveType) {
      if (moveType === "basic") {
        return 15 + (attacker.stats.power * 0.8);
      }
      if (moveType === "power") {
        return 35 + (attacker.stats.power * 1.6);
      }
      if (moveType === "technical") {
        return 28 + (attacker.stats.technique * 1.4);
      }
      if (moveType === "finisher") {
        return (35 + (attacker.stats.power * 1.6)) * 3.5;
      }
      return 0;
    }

    // 실제 데미지를 계산한다.
    function calcDamage(attacker, defender, moveType) {
      const base = getMoveBaseDamage(attacker, moveType);
      const staminaMod = getStaminaModifier(attacker.currentStamina);
      const random = 0.85 + (Math.random() * 0.30);
      const defense = clamp(1 - (defender.stats.stamina * 0.003), 0.7, 1);
      const styleImpact = getStyleImpactModifier(attacker.style, defender.style);
      const momentumMod = attacker.momentum > 60
        ? 1 + ((attacker.momentum - 60) * 0.008)
        : 1 - ((60 - attacker.momentum) * 0.005);
      const critChance = attacker.stats.charisma * 0.004;
      const isCrit = Math.random() < critChance;
      const critMod = isCrit ? 1.75 : 1;
      const finalDamage = Math.floor(base * staminaMod * random * defense * momentumMod * critMod * styleImpact.damage);

      return {
        damage: Math.max(1, finalDamage),
        isCrit,
        styleImpact
      };
    }

    // 명중률을 계산한다.
    function calcAttackSuccessChance(attacker, defender) {
      let successChance = 75;
      successChance += attacker.stats.technique * 0.2;
      successChance -= defender.stats.technique * 0.15;
      successChance -= getStaminaAccuracyPenalty(attacker.currentStamina);
      successChance += getStyleImpactModifier(attacker.style, defender.style).accuracy;
      if (attacker.momentum >= 80) {
        successChance += 8;
      }
      if (attacker.momentum <= 30) {
        successChance -= 10;
      }
      return clamp(successChance, 20, 95);
    }

    // 피니셔 성공률을 계산한다.
    function calcFinisherSuccessChance(attacker, defender) {
      let successChance = 70;
      successChance += attacker.stats.fame * 0.25;
      if ((defender.currentStamina / defender.maxStamina) < 0.2) {
        successChance += 20;
      }
      successChance -= defender.stats.technique * 0.15;
      return clamp(successChance, 40, 95);
    }

    // 자동 전투 AI가 사용할 기술을 선택한다.
    function chooseMove(attacker, defender) {
      if (attacker.finisherGauge >= 100 && ((defender.currentHP / defender.maxHP) < 0.35 || attacker.ppvLadderMode)) {
        return "finisher";
      }

      if (defender.isDown && attacker.stats.technique >= 55 && attacker.currentStamina >= 25) {
        if (Math.random() < attacker.stats.technique * 0.008) {
          return "submission";
        }
      }

      if (attacker.currentStamina < 12) {
        return "basic";
      }

      const powerPrefer = attacker.stats.power * 0.012;
      const techPrefer = attacker.stats.technique * 0.010;
      const random = Math.random();
      const total = powerPrefer + techPrefer + 0.4;

      if (random < 0.4 / total) {
        return "basic";
      }
      if (random < (0.4 + powerPrefer) / total) {
        return "power";
      }
      if (attacker.stats.technique >= 40) {
        return "technical";
      }
      return "basic";
    }

    // 기술 사용 가능 여부를 검사한다.
    function canUseMove(attacker, defender, moveType) {
      if (moveType === "basic") {
        return attacker.currentStamina >= 5;
      }
      if (moveType === "power") {
        return attacker.currentStamina >= 12 && attacker.stats.technique >= 20;
      }
      if (moveType === "technical") {
        return attacker.currentStamina >= 18 && attacker.stats.technique >= 40;
      }
      if (moveType === "submission") {
        return attacker.currentStamina >= 25 && attacker.stats.technique >= 55 && defender.isDown;
      }
      if (moveType === "finisher") {
        return attacker.currentStamina >= 40 && attacker.finisherGauge >= 100 && ((defender.currentHP / defender.maxHP) <= 0.35 || attacker.ppvLadderMode);
      }
      return false;
    }

    // 현재 턴 선공을 정한다.
    function chooseAttackerOrder(leftState, rightState) {
      if (leftState.momentum !== rightState.momentum) {
        return leftState.momentum > rightState.momentum ? [leftState, rightState] : [rightState, leftState];
      }
      if (leftState.stats.technique !== rightState.stats.technique) {
        return leftState.stats.technique > rightState.stats.technique ? [leftState, rightState] : [rightState, leftState];
      }
      return Math.random() < 0.5 ? [leftState, rightState] : [rightState, leftState];
    }

    // 턴 시작 리소스 회복을 처리한다.
    function recoverBattleResources(leftState, rightState, currentHype) {
      [leftState, rightState].forEach((battleState) => {
        if (battleState.currentStamina <= 0) {
          battleState.currentStamina = clamp(battleState.currentStamina + 20, 0, battleState.maxStamina);
          battleState.forcedRestTurn = true;
          return;
        }

        battleState.currentStamina = clamp(
          battleState.currentStamina + getStaminaRecoveryAmount(battleState),
          0,
          battleState.maxStamina
        );

        if (currentHype >= 70) {
          chargeFinisherGauge(battleState, 2);
        }
      });
    }

    // 핀폴 탈출 확률을 계산한다.
    function calcKickoutChance(defender) {
      let chance = ((defender.currentHP / defender.maxHP) * 100) + (defender.stats.stamina * 0.4) - (defender.downCount * 12);
      if (defender.alignment === "face") {
        chance += 5;
      }
      return clamp(chance, 5, 90);
    }

    // 핀폴 시도를 계산한다.
    function resolvePinAttempt(attacker, defender) {
      defender.isPinned = true;
      const kickoutChance = calcKickoutChance(defender);
      const biasedReferee = attacker.alignment === "heel";

      for (let count = 1; count <= (biasedReferee ? 1 : 2); count += 1) {
        if ((Math.random() * 100) < kickoutChance) {
          defender.isPinned = false;
          defender.isDown = false;
          defender.currentHP = clamp(defender.currentHP + (defender.maxHP * 0.05), 0, defender.maxHP);
          if (count === 2) {
            defender.kickoutsAt2 += 1;
            defender.highlightFlags.criticalComeback = true;
          }
          return {
            escapedAt: count,
            kickoutChance,
            winner: null,
            pinText: count === 1 ? "KICK OUT!" : "KICK OUT at 2!"
          };
        }
      }

      return {
        escapedAt: 0,
        kickoutChance,
        winner: attacker,
        pinText: `3! WINNER: ${attacker.name}!`
      };
    }

    // 서브미션 판정을 계산한다.
    function resolveSubmission(attacker, defender) {
      attacker.currentStamina = clamp(attacker.currentStamina - MOVE_COSTS.submission, 0, attacker.maxStamina);
      defender.currentStamina = clamp(defender.currentStamina - 20, 0, defender.maxStamina);
      attacker.attackCount += 1;
      attacker.isGrapped = true;
      const surviveChance = clamp(defender.stats.stamina * 0.9, 5, 95);
      const escaped = (Math.random() * 100) < surviveChance;
      attacker.isGrapped = false;

      return {
        success: true,
        damage: 0,
        isCrit: false,
        tappedOut: !escaped,
        text: escaped ? `${defender.name}가 서브미션을 버텨냈다!` : `${defender.name}가 탭아웃했다!`,
        moveName: "Submission"
      };
    }

    // 다운 판정을 계산한다.
    function shouldKnockDown(defender, moveType, wasFinisherSuccess) {
      if (wasFinisherSuccess) {
        return true;
      }

      let chance = 0;
      if ((defender.currentHP / defender.maxHP) <= 0.3) {
        chance = Math.max(chance, 0.8);
      }
      if (defender.currentStamina <= 0 && moveType === "power") {
        chance = Math.max(chance, 0.5);
      }
      chance += defender.downCount * 0.1;
      return Math.random() < clamp(chance, 0, 0.95);
    }

    // 경기 하이라이트 유형을 판정한다.
    function getBattleHighlight(winnerState, loserState) {
      if (winnerState.usedFinisherToWin) {
        return "FINISHER";
      }
      if (loserState.highlightFlags.criticalComeback && loserState.kickoutsAt2 > 0) {
        return "CRITICAL_COMEBACK";
      }
      if (Math.abs(winnerState.currentHP - loserState.currentHP) <= (winnerState.maxHP * 0.15)) {
        return "CLOSE_MATCH";
      }
      if ((winnerState.currentHP / winnerState.maxHP) >= 0.7) {
        return "DOMINANT";
      }
      return "CLOSE_MATCH";
    }

    // 디버그 로그를 콘솔에 남긴다.
    function logDebugTurn(turn, attacker, moveType, result) {
      if (!DEBUG_MODE) {
        return;
      }
      console.log(`TURN ${turn}: ${attacker.name} uses ${moveType}`);
      console.log(`  → Damage: ${result.damage || 0} (crit: ${Boolean(result.isCrit)})`);
      if (result.defender) {
        console.log(`  → HP: ${Math.floor(result.defender.currentHP)}/${Math.floor(result.defender.maxHP)}`);
      }
      console.log(`  → Finisher: ${Math.floor(attacker.finisherGauge)}%`);
    }

    // 전투 이벤트 데이터를 한 번에 만든다.
    function createBattleEvent(turn, attacker, defender, beforeLeft, beforeRight, afterLeft, afterRight, payload) {
      return {
        turn,
        attackerId: attacker.id,
        defenderId: defender.id,
        beforeLeft,
        beforeRight,
        afterLeft,
        afterRight,
        ...payload
      };
    }

    // 전투를 완전히 계산해서 애니메이션 타임라인과 결과를 만든다.
    function runBattleSimulation(wrestlerA, wrestlerB, options = {}) {
      const leftState = createBattleState(wrestlerA);
      const rightState = createBattleState(wrestlerB);
      const matchType = options.matchType || "";
      const ironManScores = { [leftState.id]: 0, [rightState.id]: 0 };
      leftState.finisherChargeMultiplier = options.finisherChargeMultiplier || 1;
      rightState.finisherChargeMultiplier = options.finisherChargeMultiplier || 1;
      leftState.ppvLadderMode = matchType === "LADDER_MATCH";
      rightState.ppvLadderMode = matchType === "LADDER_MATCH";
      leftState.styleFinisherChargeModifier = getStyleImpactModifier(leftState.style, rightState.style).finisher;
      rightState.styleFinisherChargeModifier = getStyleImpactModifier(rightState.style, leftState.style).finisher;
      const battleEvents = [];
      let winnerState = null;
      let loserState = null;
      let finishType = "PINFALL";
      let turn = 0;
      let currentHype = clamp(options.startingHype ?? gameState.hype, 0, 100);
      const styleMessage = getStyleImpactModifier(leftState.style, rightState.style).text || getStyleImpactModifier(rightState.style, leftState.style).text;
      if (leftState.alignment === "heel" && rightState.alignment !== "heel") {
        leftState.momentum += 10;
        rightState.momentum -= 10;
      }
      if (rightState.alignment === "heel" && leftState.alignment !== "heel") {
        rightState.momentum += 10;
        leftState.momentum -= 10;
      }
      normalizeMomentum(leftState, rightState);

      while (!winnerState && turn < (matchType === "IRON_MAN_MATCH" ? 30 : 60)) {
        turn += 1;
        recoverBattleResources(leftState, rightState, currentHype);
        const [attacker, defender] = chooseAttackerOrder(leftState, rightState);
        const beforeLeft = snapshotBattleState(leftState);
        const beforeRight = snapshotBattleState(rightState);
        let moveType = chooseMove(attacker, defender);
        let eventType = "hit";
        let success = true;
        let damage = 0;
        let isCrit = false;
        let actionText = "";
        let resultText = "";
        let pinResult = null;
        let usedFinisher = false;
        let cheapShotUsed = false;
        let cheapShotCaught = false;
        let escapeAttempted = false;

        if (matchType === "CAGE_MATCH" && Math.random() < 0.10) {
          escapeAttempted = true;
          if (Math.random() < (attacker.alignment === "heel" ? 0.20 : 0.10)) {
            winnerState = attacker;
            loserState = defender;
            finishType = "ESCAPE";
            actionText = `${attacker.name}가 철창 탈출을 시도한다!`;
            resultText = "철창 탈출 성공!";
          } else {
            shiftMomentum(defender, attacker, 15, currentHype, leftState, rightState);
            actionText = `${attacker.name}가 철창 탈출을 시도한다!`;
            resultText = `${defender.name}가 탈출을 저지했다!`;
          }
        }

        if (escapeAttempted) {
          battleEvents.push(createBattleEvent(
            turn,
            attacker,
            defender,
            beforeLeft,
            beforeRight,
            snapshotBattleState(leftState),
            snapshotBattleState(rightState),
            {
              type: "escape",
              moveType: "escape",
              moveName: "Escape",
              success: Boolean(winnerState),
              damage: 0,
              isCrit: false,
              actionText,
              resultText,
              pinResult: null,
              usedFinisher: false,
              hypeAfter: currentHype,
              debugText: "escape-attempt",
              styleAdvantage: false
            }
          ));
          if (winnerState) {
            break;
          }
          continue;
        }

        if (attacker.isStunned) {
          attacker.isStunned = false;
          battleEvents.push(createBattleEvent(
            turn,
            attacker,
            defender,
            beforeLeft,
            beforeRight,
            snapshotBattleState(leftState),
            snapshotBattleState(rightState),
            {
              type: "stunned",
              moveType: "stunned",
              moveName: "Stunned",
              success: false,
              damage: 0,
              isCrit: false,
              actionText: `${attacker.name}는 기절 상태다!`,
              resultText: "이번 턴은 아무것도 하지 못했다.",
              pinResult: null,
              usedFinisher: false,
              hypeAfter: currentHype,
              debugText: "stunned",
              styleAdvantage: false
            }
          ));
          logDebugTurn(turn, attacker, "stunned", { damage: 0, defender });
          continue;
        }

        if (attacker.forcedRestTurn) {
          attacker.forcedRestTurn = false;
          battleEvents.push(createBattleEvent(
            turn,
            attacker,
            defender,
            beforeLeft,
            beforeRight,
            snapshotBattleState(leftState),
            snapshotBattleState(rightState),
            {
              type: "rest",
              moveType: "rest",
              moveName: "Rest",
              success: true,
              damage: 0,
              isCrit: false,
              actionText: `${attacker.name}가 숨을 고른다.`,
              resultText: "스태미나 +20",
              pinResult: null,
              usedFinisher: false,
              hypeAfter: currentHype,
              debugText: "forced-rest",
              styleAdvantage: false
            }
          ));
          logDebugTurn(turn, attacker, "rest", { damage: 0, defender });
          continue;
        }

        if (!canUseMove(attacker, defender, moveType)) {
          moveType = "basic";
        }

        if (!canUseMove(attacker, defender, moveType)) {
          attacker.currentStamina = clamp(attacker.currentStamina + 20, 0, attacker.maxStamina);
          battleEvents.push(createBattleEvent(
            turn,
            attacker,
            defender,
            beforeLeft,
            beforeRight,
            snapshotBattleState(leftState),
            snapshotBattleState(rightState),
            {
              type: "rest",
              moveType: "rest",
              moveName: "Rest",
              success: true,
              damage: 0,
              isCrit: false,
              actionText: `${attacker.name}가 체력을 회복한다.`,
              resultText: "행동 불가로 휴식",
              pinResult: null,
              usedFinisher: false,
              hypeAfter: currentHype,
              debugText: "rest-by-cost",
              styleAdvantage: false
            }
          ));
          logDebugTurn(turn, attacker, "rest", { damage: 0, defender });
          continue;
        }

        actionText = `${attacker.name}가 ${moveType === "finisher" ? attacker.finisher : (MOVE_LABELS[moveType] || moveType)}를 시도한다!`;

        if (moveType === "submission") {
          const submissionResult = resolveSubmission(attacker, defender);
          eventType = "submission";
          success = true;
          resultText = submissionResult.text;
          if (submissionResult.tappedOut) {
            winnerState = attacker;
            loserState = defender;
            finishType = "SUBMISSION";
          }
        } else {
          const successChance = calcAttackSuccessChance(attacker, defender);
          const attackSucceeded = Math.random() * 100 < successChance;

          if (!attackSucceeded) {
            success = false;
            eventType = "miss";
            resultText = Math.random() < 0.5 ? "DODGE!" : "BLOCKED!";
            shiftMomentum(defender, attacker, 5, currentHype, leftState, rightState);
          } else if (moveType === "finisher") {
            usedFinisher = true;
            attacker.currentStamina = clamp(attacker.currentStamina - MOVE_COSTS.finisher, 0, attacker.maxStamina);
            const finisherChance = calcFinisherSuccessChance(attacker, defender);

            if (Math.random() * 100 <= finisherChance) {
            const finisherDamage = calcDamage(attacker, defender, "finisher");
            damage = finisherDamage.damage;
            isCrit = finisherDamage.isCrit;
              defender.currentHP = clamp(defender.currentHP - damage, 0, defender.maxHP);
              attacker.totalDamageDealt += damage;
              defender.totalDamageReceived += damage;
              attacker.attackCount += 1;
              attacker.finisherGauge = 0;
              attacker.finisherUsed = true;
              chargeFinisherGauge(attacker, damage * 0.08);
              chargeFinisherGauge(defender, damage * 0.04);
              defender.isDown = true;
              defender.downCount += 1;
              currentHype = clamp(currentHype + 10, 0, 100);
              eventType = "finisher";
              resultText = `${attacker.finisher}!!! → ${damage} 데미지`;
              shiftMomentum(attacker, defender, isCrit ? 20 : 18, currentHype, leftState, rightState);
              if (matchType === "LADDER_MATCH") {
                winnerState = attacker;
                loserState = defender;
                attacker.usedFinisherToWin = true;
                finishType = "LADDER";
              } else {
                pinResult = resolvePinAttempt(attacker, defender);
                if (pinResult.escapedAt > 0) {
                  currentHype = clamp(currentHype + 8, 0, 100);
                  shiftMomentum(defender, attacker, 12 + (defender.alignment === "face" ? 10 : 0), currentHype, leftState, rightState);
                  chargeFinisherGauge(defender, 15);
                  resultText += ` / ${pinResult.pinText}`;
                  if ((defender.currentHP / defender.maxHP) <= 0.1) {
                    defender.highlightFlags.criticalComeback = true;
                  }
                } else if (pinResult.winner) {
                  if (matchType === "IRON_MAN_MATCH") {
                    ironManScores[attacker.id] += 1;
                    defender.isDown = false;
                    attacker.currentHP = clamp(attacker.currentHP + (attacker.maxHP * 0.15), 0, attacker.maxHP);
                    defender.currentHP = clamp(defender.maxHP * 0.55, 0, defender.maxHP);
                    resultText += ` / 폴 획득! ${ironManScores[leftState.id]}:${ironManScores[rightState.id]}`;
                  } else {
                    winnerState = attacker;
                    loserState = defender;
                    attacker.usedFinisherToWin = true;
                    finishType = "PINFALL";
                  }
                }
              }
            } else {
              success = false;
              eventType = "finisher-counter";
              damage = 50;
              attacker.currentHP = clamp(attacker.currentHP - damage, 0, attacker.maxHP);
              attacker.totalDamageReceived += damage;
              defender.totalDamageDealt += damage;
              attacker.finisherGauge = clamp(attacker.finisherGauge - 50, 0, 100);
              resultText = `${defender.name}이 피니셔를 카운터했다!`;
              shiftMomentum(defender, attacker, 15, currentHype, leftState, rightState);
            }
          } else {
            attacker.currentStamina = clamp(attacker.currentStamina - MOVE_COSTS[moveType], 0, attacker.maxStamina);
            const damageResult = calcDamage(attacker, defender, moveType);
            damage = damageResult.damage;
            isCrit = damageResult.isCrit;
            if (attacker.alignment === "heel" && moveType !== "technical" && Math.random() < 0.15) {
              cheapShotUsed = true;
              attacker.usedCheapShot = true;
              damage = Math.floor(damage * (matchType === "CAGE_MATCH" ? 1.8 : 1.4));
              if (Math.random() < 0.5) {
                cheapShotCaught = true;
                currentHype = clamp(currentHype - 8, 0, 100);
              }
            }
            defender.currentHP = clamp(defender.currentHP - damage, 0, defender.maxHP);
            attacker.totalDamageDealt += damage;
            defender.totalDamageReceived += damage;
            attacker.attackCount += 1;
            chargeFinisherGauge(attacker, damage * 0.08);
            chargeFinisherGauge(defender, damage * 0.04);
            resultText = `→ ${damage} 데미지${isCrit ? " (치명타)" : ""}${cheapShotUsed ? " / 반칙 공격!" : ""}${cheapShotCaught ? " / 발각! Hype -8" : ""}`;
            shiftMomentum(attacker, defender, isCrit ? 10 : 5, currentHype, leftState, rightState);

            if (isCrit) {
              attacker.criticalHits += 1;
              currentHype = clamp(currentHype + 5, 0, 100);
              if ((moveType === "power" || moveType === "technical") && Math.random() < 0.3) {
                defender.isStunned = true;
              }
            }

            if (shouldKnockDown(defender, moveType, false) || defender.currentHP <= 0) {
              defender.isDown = true;
              defender.downCount += 1;
              eventType = "pin";
              if (matchType !== "LADDER_MATCH") {
                pinResult = resolvePinAttempt(attacker, defender);
                if (pinResult.escapedAt > 0) {
                  currentHype = clamp(currentHype + 8, 0, 100);
                  shiftMomentum(defender, attacker, 12 + (defender.alignment === "face" ? 10 : 0), currentHype, leftState, rightState);
                  chargeFinisherGauge(defender, 15);
                  resultText += ` / ${pinResult.pinText}`;
                  if ((defender.currentHP / defender.maxHP) <= 0.1) {
                    defender.highlightFlags.criticalComeback = true;
                  }
                } else if (pinResult.winner) {
                  if (matchType === "IRON_MAN_MATCH") {
                    ironManScores[attacker.id] += 1;
                    defender.isDown = false;
                    attacker.currentHP = clamp(attacker.currentHP + (attacker.maxHP * 0.10), 0, attacker.maxHP);
                    defender.currentHP = clamp(defender.maxHP * 0.55, 0, defender.maxHP);
                    resultText += ` / 폴 획득! ${ironManScores[leftState.id]}:${ironManScores[rightState.id]}`;
                  } else {
                    winnerState = attacker;
                    loserState = defender;
                    finishType = "PINFALL";
                  }
                }
              }
            }
            if (cheapShotUsed && attacker.lossStreak >= 3 && attacker.alignment !== "heel") {
              attacker.pendingAlignmentTurn = "heel";
            }
          }
        }

        const event = createBattleEvent(
          turn,
          attacker,
          defender,
          beforeLeft,
          beforeRight,
          snapshotBattleState(leftState),
          snapshotBattleState(rightState),
          {
            type: eventType,
            moveType,
            moveName: moveType === "finisher" ? attacker.finisher : (MOVE_LABELS[moveType] || moveType),
            success,
            damage,
            isCrit,
            actionText,
            resultText,
            pinResult,
            usedFinisher,
            hypeAfter: currentHype,
            debugText: `${attacker.name}/${moveType}/${resultText}`,
            styleAdvantage: getStyleImpactModifier(attacker.style, defender.style).matchup > 0,
            cheapShotUsed,
            cheapShotCaught
          }
        );
        battleEvents.push(event);
        logDebugTurn(turn, attacker, moveType, { damage, isCrit, defender });
      }

      if ((matchType === "IRON_MAN_MATCH") && !winnerState) {
        winnerState = ironManScores[leftState.id] >= ironManScores[rightState.id] ? leftState : rightState;
        loserState = winnerState.id === leftState.id ? rightState : leftState;
        finishType = "IRON_MAN";
      }

      if (!winnerState || !loserState) {
        winnerState = leftState.currentHP >= rightState.currentHP ? leftState : rightState;
        loserState = winnerState.id === leftState.id ? rightState : leftState;
        finishType = "TIME_LIMIT";
        battleEvents.push(createBattleEvent(
          turn,
          winnerState,
          loserState,
          snapshotBattleState(leftState),
          snapshotBattleState(rightState),
          snapshotBattleState(leftState),
          snapshotBattleState(rightState),
          {
            type: "time-limit",
            moveType: "time-limit",
            moveName: "Time Limit",
            success: true,
            damage: 0,
            isCrit: false,
            actionText: "시간 제한 도달",
            resultText: `TIME LIMIT! ${winnerState.name} 판정승!`,
            pinResult: null,
            usedFinisher: false,
            hypeAfter: currentHype,
            debugText: "time-limit"
          }
        ));
      }

      const highlight = getBattleHighlight(winnerState, loserState);
      let hypeGenerated = clamp(
        Math.floor(turn / 6)
        + HIGHLIGHT_BONUS[highlight]
        + (winnerState.criticalHits * 2)
        + (loserState.kickoutsAt2 * 4),
        5,
        40
      );
      if (matchType === "LADDER_MATCH") {
        hypeGenerated = clamp(hypeGenerated + 20, 5, 60);
      } else if (matchType === "IRON_MAN_MATCH") {
        hypeGenerated = clamp(hypeGenerated + 30, 5, 70);
      }

      return {
        leftState,
        rightState,
        battleEvents,
        styleMessage,
        battleResult: {
          winnerId: winnerState.id,
          loserId: loserState.id,
          totalTurns: Math.max(turn, 1),
          finishType,
          winnerStats: {
            damageDealt: winnerState.totalDamageDealt,
            damageReceived: winnerState.totalDamageReceived,
            finisherUsed: winnerState.finisherUsed,
            criticalHits: winnerState.criticalHits,
            stamina: Math.floor(winnerState.currentStamina),
            cheapShotUsed: Boolean(winnerState.usedCheapShot)
          },
          loserStats: {
            damageDealt: loserState.totalDamageDealt,
            damageReceived: loserState.totalDamageReceived,
            kickoutsAt2: loserState.kickoutsAt2,
            finisherUsed: loserState.finisherUsed,
            cheapShotUsed: Boolean(loserState.usedCheapShot)
          },
          hypeGenerated,
          highlight,
          matchTypeLabel: matchType || "STANDARD",
          alignmentTurn: winnerState.pendingAlignmentTurn || loserState.pendingAlignmentTurn || "",
          alignmentTurnId: winnerState.pendingAlignmentTurn ? winnerState.id : (loserState.pendingAlignmentTurn ? loserState.id : "")
        },
        totalDuration: 3000 + (battleEvents.length * 1800) + 4000
      };
    }

    // 홈 탭 표시 문구를 STEP 4 전투 기준으로 다시 정의한다.
    function getHomeArenaLabel() {
      return `${STAGE_LABELS[gameState.stage] || "인디 체육관"} 경기장`;
    }

    function getHomeMatchPreviewLines() {
      const readyMatches = getReadyMatches().map((slot) => {
        const wrestlerA = findWrestlerById(slot.wrestlerAId);
        const wrestlerB = findWrestlerById(slot.wrestlerBId);
        if (!wrestlerA || !wrestlerB) {
          return null;
        }
        return `${wrestlerA.name} VS ${wrestlerB.name}`;
      }).filter(Boolean);

      return readyMatches.length ? readyMatches : ["이번 주 아직 편성된 경기가 없습니다"];
    }

    function renderHomeMainContent() {
      const ppvInfo = getPpvInfo();
      const selectedMainEvent = getSelectedPpvMainEventWrestlers();
      const candidateButtons = ppvInfo.weeksUntil === 3
        ? getPpvMainEventCandidates().map((wrestler) => `
            <button class="booking-button auto" data-action="select-ppv-main" data-wrestler-id="${wrestler.id}">${wrestler.name}</button>
          `).join("")
        : "";
      const previewLines = getHomeMatchPreviewLines().map((line) => `<div>${line}</div>`).join("");
      mainDynamicContentEl.innerHTML = `
        <div class="home-canvas-wrap">
          <div class="canvas-shell">
            <button class="canvas-skip-button ${matchAnimationState.running ? "" : "hidden"}" id="canvasSkipButton">스킵</button>
            <canvas id="matchCanvas" width="640" height="360"></canvas>
          </div>
          ${titleScreenVisible ? `
            <div class="title-screen-box">
              <div class="title-screen-logo">RING DYNASTY</div>
              <div class="panel-subtitle">최고의 레슬링 단체를 만들어 월드 챔피언십 정상에 도전하세요.</div>
              <div class="title-screen-actions">
                <button class="title-screen-button" id="startGameButton">게임 시작</button>
                <button class="title-screen-button" id="continueGameButton" ${titleScreenHasSave ? "" : "disabled"}>이어하기</button>
              </div>
            </div>
          ` : `
            <div class="home-preview-box">
              ${ppvInfo.logoPath ? `<div style="display:flex;justify-content:center;margin-bottom:10px;"><img src="${ppvInfo.logoPath}" alt="${ppvInfo.name}" style="max-height:56px;max-width:220px;object-fit:contain;"></div>` : ""}
              ${getPpvBannerText() ? `<div style="color:${ppvInfo.isPpv ? "#f1c40f" : "#ecf0f1"};font-weight:700;margin-bottom:8px;">${getPpvBannerText()}</div>` : ""}
              Week ${gameState.week} - ${getHomeArenaLabel()}<br>
              ${previewLines}
              ${selectedMainEvent.length === 2 ? `<div style="margin-top:8px;color:#f1c40f;">메인 이벤트 후보: ${selectedMainEvent[0].name} VS ${selectedMainEvent[1].name}</div>` : ""}
              ${candidateButtons ? `<div class="booking-actions" style="justify-content:flex-start;margin-top:10px;">${candidateButtons}</div><div class="gacha-small-text">PPV 3주 전: 메인 이벤트 후보 2명을 선택하세요.</div>` : ""}
            </div>
          `}
        </div>
      `;

      const skipButton = document.getElementById("canvasSkipButton");
      if (skipButton) {
        skipButton.addEventListener("click", skipMatchAnimation);
      }
      const startGameButton = document.getElementById("startGameButton");
      if (startGameButton) {
        startGameButton.addEventListener("click", startNewGameFromTitle);
      }
      const continueGameButton = document.getElementById("continueGameButton");
      if (continueGameButton) {
        continueGameButton.addEventListener("click", continueFromTitle);
      }
      Array.from(mainDynamicContentEl.querySelectorAll('[data-action="select-ppv-main"]')).forEach((button) => {
        button.addEventListener("click", () => {
          const wrestlerId = button.dataset.wrestlerId;
          const current = (gameState.ppvState.selectedMainEventIds || []).slice();
          if (current.includes(wrestlerId)) {
            gameState.ppvState.selectedMainEventIds = current.filter((id) => id !== wrestlerId);
          } else {
            current.push(wrestlerId);
            gameState.ppvState.selectedMainEventIds = current.slice(-2);
          }
          render();
          saveGameState();
        });
      });

      drawCurrentCanvasFrame(performance.now());
    }

    function renderHomeSidePanel() {
      const ppvInfo = getPpvInfo();
      const selectedMainEvent = getSelectedPpvMainEventWrestlers();
      sideListEl.innerHTML = `
        <div class="hype-panel">
          <div class="hype-box">
            <div class="hype-label">현재 Hype</div>
            <div class="hype-value">${gameState.hype}/100</div>
            <div class="hype-bar">
              <div class="hype-fill" style="width:${clamp(gameState.hype, 0, 100)}%;"></div>
            </div>
          </div>
          <div class="side-card">
            <div class="side-card-title">이번 주 경기 수</div>
            <div class="side-card-desc">${getReadyMatches().length}경기 편성 완료</div>
          </div>
          <div class="side-card">
            <div class="side-card-title">전투 하이라이트</div>
            <div class="side-card-desc">${pendingWeeklySummary ? "결과 대기 중" : "새로운 주간 카드를 준비하세요."}</div>
          </div>
          <div class="side-card">
            <div class="side-card-title">PPV 캘린더</div>
            <div class="side-card-desc">${ppvInfo.isPpv ? `${ppvInfo.name} 개최 주간` : `${ppvInfo.name}까지 ${ppvInfo.weeksUntil}주`}<br>${ppvInfo.isPpv ? `특수 경기: ${(ppvInfo.featuredMatchType || "").replaceAll("_", " ")}` : selectedMainEvent.length === 2 ? `메인 이벤트 후보: ${selectedMainEvent[0].name} VS ${selectedMainEvent[1].name}` : "메인 이벤트 후보 미정"}</div>
          </div>
          <div class="championship-list">
